            Object.assign(ap, {vx:0, vy:0, color:'#7a30b0', size:2+Math.random()*2, life:0.2, type:'voidspark'});
          } else {
            /* Creeping shadow — ground-level dark blob */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.1, color:'rgba(10,5,30,0.15)', size:5+Math.random()*5, type:'creep'});
          }
        } else if(zoneElem === 'light'){
          if(_r2<0.5){
            /* Golden motes — rising warm sparks */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.3, vy:-0.2-Math.random()*0.3, color:'#fde68a', size:1+Math.random(), type:'mote'});
          } else if(_r2<0.8){
            /* Light beam dust — slow vertical rise */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.05, vy:-0.1, color:'rgba(255,240,180,0.12)', size:2+Math.random()*3, type:'beamdust'});
          } else {
            /* Prismatic sparkle — multicolor brief */
            const _pCols=['#fde68a','#fca5a5','#93c5fd','#86efac'];
            Object.assign(ap, {vx:0, vy:0, color:_pCols[Math.floor(Math.random()*4)], size:1.5+Math.random(), life:0.3, type:'prismatic'});
          }
        } else {
          /* Town/meadow — occasional dandelion puff */
          if(Math.random()<0.3) Object.assign(ap, {vx:0.2+Math.random()*0.3, vy:-0.1+Math.sin(now/2000)*0.1, color:'#fff', size:1, type:'seed'});
          else ap.life = 0; /* skip */
        }
        if(ap.life > 0) S._ambientParticles.push(ap);
      }
      /* Render + tick ambient particles */
      S._ambientParticles = S._ambientParticles.filter(ap => {
        ap.x += ap.vx||0; ap.y += ap.vy||0;
        const decayRate = (ap.type==='spark'||ap.type==='lightning'||ap.type==='voidspark'||ap.type==='prismatic'||ap.type==='frostspark') ? 0.03 : 0.004;
        ap.life -= decayRate;
        if(ap.life <= 0) return false;
        const apsx = ap.x-cx, apsy = ap.y-cy;
        if(apsx<-20||apsx>W+20||apsy<-20||apsy>H+20) return false;
        const fastTypes = new Set(['spark','lightning','voidspark','prismatic','frostspark','glint']);
        ctx.globalAlpha = ap.life * (fastTypes.has(ap.type)?0.8:0.5);
        ctx.fillStyle = ap.color;
        if(ap.type==='leaf'||ap.type==='feather'){
          ctx.save(); ctx.translate(apsx,apsy); ctx.rotate(now/500+ap.x);
          ctx.fillRect(-ap.size/2,-1,ap.size,2); ctx.restore();
        } else if(ap.type==='rain'){
          ctx.strokeStyle=ap.color; ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(apsx,apsy); ctx.lineTo(apsx-1,apsy-6); ctx.stroke();
        } else if(ap.type==='windstreak'){
          ctx.strokeStyle=ap.color; ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(apsx,apsy); ctx.lineTo(apsx-8,apsy); ctx.stroke();
        } else if(ap.type==='icecrystal'){
          /* Small diamond shape */
          ctx.beginPath(); ctx.moveTo(apsx,apsy-ap.size); ctx.lineTo(apsx+ap.size*0.6,apsy);
          ctx.lineTo(apsx,apsy+ap.size); ctx.lineTo(apsx-ap.size*0.6,apsy); ctx.closePath(); ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(apsx, apsy, ap.size*ap.life, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        return true;
      });

      /* ═══ RENDER & TICK GATHERING NODES — §18 Life Skills ═══ */
      if(S.gatherNodes){
        S.gatherNodes.forEach(node => {
          /* Respawn check */
          if(!node.alive){
            if(Date.now() > node.respawnAt){
              node.alive = true;
              node.hp = node.maxHp;
            }
            return;
          }
          node._hitThisSwing = false; /* reset per frame */

          const nx = node.x - cx, ny = node.y - cy;
          if(nx < -30 || nx > W+30 || ny < -30 || ny > H+30) return;

          /* Tier-colored base glow */
          const pulse = 0.3 + Math.sin(now/600 + node.x)*0.15;
          ctx.fillStyle = node.color;
          ctx.globalAlpha = pulse * 0.25;
          ctx.beginPath(); ctx.arc(nx, ny, 14, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;

          /* Node body — rock/crystal/herb based on type */
          if(node.resourceType === 'ore'){
            /* Rocky mound */
            ctx.fillStyle = '#5a5a6a';
            ctx.beginPath();
            ctx.moveTo(nx-8, ny+6); ctx.lineTo(nx-3, ny-8); ctx.lineTo(nx+4, ny-6);
            ctx.lineTo(nx+9, ny+6); ctx.closePath(); ctx.fill();
            /* Ore vein colored streak */
            ctx.fillStyle = node.color;
            ctx.fillRect(nx-2, ny-4, 5, 3);
          } else if(node.resourceType === 'crystal'){
            /* Crystal shard pointing up */
            ctx.fillStyle = node.color;
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.moveTo(nx-4, ny+6); ctx.lineTo(nx, ny-10); ctx.lineTo(nx+4, ny+6);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.moveTo(nx+2, ny+6); ctx.lineTo(nx+5, ny-5); ctx.lineTo(nx+8, ny+6);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;
            /* Sparkle */
            if(Math.sin(now/200 + node.y) > 0.7){
              ctx.fillStyle = '#fff';
              ctx.beginPath(); ctx.arc(nx+1, ny-6, 1.5, 0, Math.PI*2); ctx.fill();
            }
          } else {
            /* Herb/flower */
            ctx.fillStyle = '#2a5a1e';
            ctx.fillRect(nx-1, ny-2, 2, 10); /* stem */
            ctx.fillStyle = node.color;
            ctx.beginPath(); ctx.arc(nx, ny-4, 5, 0, Math.PI*2); ctx.fill();
            /* Leaf */
            ctx.fillStyle = '#3a7a2e';
            ctx.beginPath();
            ctx.ellipse(nx+4, ny+2, 3, 1.5, 0.5, 0, Math.PI*2); ctx.fill();
          }

          /* Emoji label */
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(node.emoji, nx, ny-12);

          /* HP bar if damaged */
          if(node.hp < node.maxHp){
            const hpPct = node.hp / node.maxHp;
            ctx.fillStyle = 'rgba(0,0,0,.5)';
            ctx.fillRect(nx-10, ny+10, 20, 3);
            ctx.fillStyle = node.color;
            ctx.fillRect(nx-10, ny+10, 20*hpPct, 3);
          }

          /* Skill level requirement tooltip when nearby */
          const pDist = Math.sqrt((P.x-node.x)**2+(P.y-node.y)**2);
          if(pDist < 50){
            ctx.font = 'bold 7px "VT323", monospace';
            ctx.fillStyle = 'rgba(255,255,255,.6)';
            ctx.fillText(node.name, nx, ny+20);
            const gatherLvl = S.rpg?.lifeSkills?.gathering?.level || 1;
            if(gatherLvl < node.gatherLvl){
              ctx.fillStyle = '#ff5e6c';
              ctx.fillText('Req: Gathering Lv'+node.gatherLvl, nx, ny+28);
            } else {
              ctx.fillStyle = '#3dd497';
              ctx.fillText('Hit to gather', nx, ny+28);
            }
          }
        });
      }

      /* ═══ RENDER MONSTERS — §4 Visual Identity: distinct at a glance ═══ */
      if(S.monsters){
        S.monsters.forEach(m=>{
          if(!m.alive) return;
          const mx = m.x - cx, my = m.y - cy;
          if(mx<-40||mx>W+40||my<-40||my>H+40) return;
          const arch = m.archetype || 'fodder';

          /* ═══ SPAWN POP-IN — scale up from 0 when first visible ═══ */
          if(!m._spawnTs) m._spawnTs = now;
          const spawnAge = (now - m._spawnTs) / 300;
          let spawnScale = 1;
          if(spawnAge < 1){
            /* Elastic ease-out: overshoots slightly then settles */
            spawnScale = 1 - Math.pow(1-spawnAge, 3) * (1 + 2.5*(1-spawnAge));
            spawnScale = Math.max(0, Math.min(1.15, spawnScale));
          }

          const bodySize = ({fodder:8, brute:15, swarm:6, sentinel:12, volatile:9, stalker:10, hexer:10}[arch]||10) * spawnScale;

          /* Ground shadow — oval, darker for bigger monsters */
          ctx.fillStyle = `rgba(0,0,0,${bodySize>10?0.22:0.14})`;
          ctx.beginPath(); ctx.ellipse(mx+2, my+bodySize+3, bodySize*0.9, bodySize*0.25, 0, 0, Math.PI*2); ctx.fill();

          /* Body base color — tinted by zone element for identity */
          const _zElem = ZONES[S.currentZone]?.element;
          const _eCol = _zElem && ELEMENTS[_zElem] ? ELEMENTS[_zElem].color : null;
          let _mBaseColor = m.color;
          /* Blend monster color toward zone element (30% tint) */
          if(_eCol && _zElem){
            const _hex = (h) => { const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return [r,g,b]; };
            try {
              const [mr,mg,mb]=_hex(_mBaseColor); const [er,eg,eb]=_hex(_eCol);
              const mix=0.3;
              const nr=Math.round(mr*(1-mix)+er*mix), ng=Math.round(mg*(1-mix)+eg*mix), nb=Math.round(mb*(1-mix)+eb*mix);
              _mBaseColor='#'+[nr,ng,nb].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
            } catch(e){}
          }
          const darkColor = _mBaseColor + 'cc';
          const lightColor = _mBaseColor;

          if(arch === 'brute'){
            /* Brute: massive rounded square with gradient shading */
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.moveTo(mx-bodySize, my-bodySize*0.8);
            ctx.quadraticCurveTo(mx, my-bodySize*1.1, mx+bodySize, my-bodySize*0.8);
            ctx.lineTo(mx+bodySize*0.9, my+bodySize*0.7);
            ctx.quadraticCurveTo(mx, my+bodySize*0.9, mx-bodySize*0.9, my+bodySize*0.7);
            ctx.closePath(); ctx.fill();
            /* Highlight — upper left */
            ctx.fillStyle = 'rgba(255,255,255,.15)';
            ctx.beginPath();
            ctx.arc(mx-bodySize*0.3, my-bodySize*0.4, bodySize*0.5, 0, Math.PI*2);
            ctx.fill();
            /* Dark underside */
            ctx.fillStyle = 'rgba(0,0,0,.15)';
            ctx.fillRect(mx-bodySize*0.8, my+bodySize*0.3, bodySize*1.6, bodySize*0.4);
          } else if(arch === 'swarm'){
            const flutter = Math.sin(now/60+m.spawnX)*2;
            ctx.fillStyle = lightColor;
            ctx.beginPath(); ctx.ellipse(mx, my+flutter, bodySize, bodySize*0.7, 0, 0, Math.PI*2); ctx.fill();
            /* Translucent wings */
            ctx.fillStyle = 'rgba(255,255,255,.15)';
            ctx.beginPath(); ctx.ellipse(mx-bodySize, my-3+flutter, 5, 2.5, -0.3+Math.sin(now/40)*0.3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(mx+bodySize, my-3+flutter, 5, 2.5, 0.3-Math.sin(now/40)*0.3, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'sentinel'){
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.moveTo(mx, my-bodySize);
            ctx.lineTo(mx+bodySize, my-bodySize*0.3);
            ctx.lineTo(mx+bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx-bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx-bodySize, my-bodySize*0.3);
            ctx.closePath(); ctx.fill();
            /* Shield emboss — lighter top edge */
            ctx.strokeStyle = 'rgba(255,255,255,.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(mx-bodySize, my-bodySize*0.3);
            ctx.lineTo(mx, my-bodySize);
            ctx.lineTo(mx+bodySize, my-bodySize*0.3);
            ctx.stroke();
            /* Dark bottom */
            ctx.strokeStyle = 'rgba(0,0,0,.2)';
            ctx.beginPath();
            ctx.moveTo(mx-bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx+bodySize*0.8, my+bodySize*0.7);
            ctx.stroke();
          } else if(arch === 'volatile'){
            /* Spiky star with pulsing danger glow */
            const vPulse = 1+Math.sin(now/150)*0.2;
            /* Outer glow */
            ctx.fillStyle = m.color+'22';
            ctx.beginPath(); ctx.arc(mx, my, bodySize*1.5*vPulse, 0, Math.PI*2); ctx.fill();
            /* Spiky body */
            ctx.fillStyle = lightColor;
            ctx.beginPath();
            for(let sp=0;sp<8;sp++){
              const spA = (sp/8)*Math.PI*2 + now/800;
              const spR = sp%2===0 ? bodySize*1.2 : bodySize*0.5;
              const spx = mx+Math.cos(spA)*spR, spy = my+Math.sin(spA)*spR;
              sp===0 ? ctx.moveTo(spx,spy) : ctx.lineTo(spx,spy);
            }
            ctx.closePath(); ctx.fill();
            /* Inner bright core */
            ctx.fillStyle = 'rgba(255,200,100,.4)';
            ctx.beginPath(); ctx.arc(mx, my, bodySize*0.4, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'stalker'){
            /* Diamond with gradient — sleek predator look */
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.moveTo(mx, my-bodySize*1.2);
            ctx.lineTo(mx+bodySize*0.6, my);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx-bodySize*0.6, my);
            ctx.closePath(); ctx.fill();
            /* Eye slit */
            ctx.fillStyle = '#fff';
            ctx.fillRect(mx-bodySize*0.3, my-2, bodySize*0.6, 2);
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.arc(mx, my-1, 1.5, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'hexer'){
            ctx.fillStyle = darkColor;
            ctx.beginPath(); ctx.arc(mx, my, bodySize, 0, Math.PI*2); ctx.fill();
            /* Rune orbit */
            ctx.strokeStyle = m.color+'99';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(mx, my, bodySize+5, now/300, now/300+Math.PI*1.5); ctx.stroke();
            /* Inner arcane glow */
            ctx.fillStyle = m.color+'33';
            ctx.beginPath(); ctx.arc(mx, my, bodySize*0.6, 0, Math.PI*2); ctx.fill();
            /* Rune dots */
            for(let rd=0;rd<3;rd++){
              const rda = now/300 + rd*Math.PI*2/3;
              ctx.fillStyle = m.color;
              ctx.beginPath(); ctx.arc(mx+Math.cos(rda)*(bodySize+5), my+Math.sin(rda)*(bodySize+5), 2, 0, Math.PI*2); ctx.fill();
            }
          } else {
            /* Fodder: simple circle with highlight */
            ctx.fillStyle = darkColor;
            ctx.beginPath(); ctx.arc(mx, my, bodySize, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,.12)';
            ctx.beginPath(); ctx.arc(mx-bodySize*0.25, my-bodySize*0.25, bodySize*0.5, 0, Math.PI*2); ctx.fill();
          }

          /* Element indicator dot — small colored gem above body */
          if(m.element && ELEMENTS[m.element]){
            const eCol = ELEMENTS[m.element].color;
            ctx.fillStyle = eCol;
            ctx.beginPath(); ctx.arc(mx, my-bodySize-4, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,.3)';
            ctx.beginPath(); ctx.arc(mx-0.5, my-bodySize-4.5, 1.5, 0, Math.PI*2); ctx.fill();
          }

          /* ═══ AGGRO ALERT — "!" pops above enemy when they notice player ═══ */
          if(m._aggroTs){
            const aggroAge = (now - m._aggroTs) / 500;
            if(aggroAge < 1){
              const alertY = my - bodySize - 18 - (aggroAge < 0.2 ? (0.2-aggroAge)*30 : 0);
              const alertAlpha = aggroAge < 0.8 ? 1 : (1-aggroAge)/0.2;
              const alertScale = aggroAge < 0.1 ? aggroAge/0.1 * 1.3 : (aggroAge < 0.2 ? 1.3 - (aggroAge-0.1)/0.1*0.3 : 1);
              ctx.globalAlpha = alertAlpha;
              ctx.font = `bold ${Math.round(12*alertScale)}px "VT323", monospace`;
              ctx.textAlign = 'center';
              ctx.fillStyle = '#ff5e6c';
              ctx.fillText('!', mx, alertY);
              ctx.globalAlpha = 1;
            } else {
              m._aggroTs = null; /* stop rendering after animation */
            }
          }

          /* Emoji face — zone-themed, scaled to body size */
          const _zoneEmoji = ZONES[S.currentZone]?.enemyEmoji;
          const _mEmoji = (_zoneEmoji && _zoneEmoji[arch]) ? _zoneEmoji[arch] : m.emoji;
          ctx.font = (bodySize > 12 ? 18 : bodySize > 8 ? 14 : 10) + 'px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(_mEmoji, mx, my+(bodySize>12?6:bodySize>8?5:3));

          /* Stun indicator on monster */
          if(m._stunUntil && Date.now() < m._stunUntil){
            const mStunLeft = ((m._stunUntil-Date.now())/1000).toFixed(1);
            ctx.font = '12px sans-serif';
            for(let ms=0;ms<3;ms++){
              const msa = Date.now()/150 + ms*Math.PI*2/3;
              ctx.fillText('💫', mx+Math.cos(msa)*14, my-bodySize-8+Math.sin(msa)*3);
            }
            ctx.font = 'bold 8px sans-serif';
            ctx.fillStyle = '#f5c542';
            ctx.fillText('STUN '+mStunLeft+'s', mx, my-bodySize-18);
          }
          /* HP bar */
          /* §9 Status visual effects on monster body */
          if(m.statuses){
            if(m.statuses.freeze){
              ctx.fillStyle = 'rgba(41,128,185,.3)';
              ctx.beginPath(); ctx.arc(mx, my, 16, 0, Math.PI*2); ctx.fill();
              /* Ice crystals */
              ctx.fillStyle = 'rgba(200,230,255,.5)';
              for(let ic=0;ic<3;ic++){
                const ica = now/200 + ic*2.1;
                ctx.fillRect(mx+Math.cos(ica)*12-1, my+Math.sin(ica)*12-1, 3, 3);
              }
            }
            if(m.statuses.burn){
              ctx.fillStyle = 'rgba(192,57,43,.2)';
              ctx.beginPath(); ctx.arc(mx, my, 14+Math.sin(now/100)*2, 0, Math.PI*2); ctx.fill();
              /* Flame flickers */
              for(let fl=0;fl<2;fl++){
                const fla = now/120 + fl*3.14;
                ctx.fillStyle = `rgba(255,${100+Math.random()*80},0,${0.3+Math.random()*0.3})`;
                ctx.beginPath(); ctx.arc(mx+Math.cos(fla)*10, my-8+Math.sin(fla)*4, 2+Math.random(), 0, Math.PI*2); ctx.fill();
              }
            }
            if(m.statuses.root){
              ctx.strokeStyle = 'rgba(39,174,96,.4)';
              ctx.lineWidth = 2;
              for(let rv=0;rv<3;rv++){
                const rva = rv*2.1;
                ctx.beginPath();
                ctx.moveTo(mx+Math.cos(rva)*6, my+10);
                ctx.lineTo(mx+Math.cos(rva)*14, my+14);
                ctx.stroke();
              }
            }
            if(m.statuses.soak){
              ctx.fillStyle = 'rgba(52,152,219,.15)';
              ctx.beginPath(); ctx.arc(mx, my, 15, 0, Math.PI*2); ctx.fill();
              /* Water drips */
              ctx.fillStyle = 'rgba(52,152,219,.4)';
              const dripY = (now/300) % 20;
              ctx.fillRect(mx-1, my+8+dripY, 2, 3);
            }
            if(m.statuses.shock){
              /* Crackling electricity */
              ctx.strokeStyle = `rgba(142,68,173,${0.4+Math.random()*0.4})`;
              ctx.lineWidth = 1;
              for(let sp=0;sp<2;sp++){
                ctx.beginPath();
                ctx.moveTo(mx+(Math.random()-0.5)*20, my+(Math.random()-0.5)*20);
                ctx.lineTo(mx+(Math.random()-0.5)*20, my+(Math.random()-0.5)*20);
                ctx.stroke();
              }
            }
            if(m.statuses.slow){
              ctx.strokeStyle = 'rgba(127,140,141,.3)';
              ctx.lineWidth = 2;
              ctx.setLineDash([3,3]);
              ctx.beginPath(); ctx.arc(mx, my, 14, 0, Math.PI*2); ctx.stroke();
              ctx.setLineDash([]);
            }
            if(m.statuses.curse){
              ctx.fillStyle = `rgba(44,62,80,${0.2+Math.sin(now/400)*0.1})`;
              ctx.beginPath(); ctx.arc(mx, my, 16, 0, Math.PI*2); ctx.fill();
            }
            if(m.statuses.fracture){
              /* Crack lines */
              ctx.strokeStyle = 'rgba(121,85,72,.5)';
              ctx.lineWidth = 1;
              const stacks = m.statuses.fracture.stacks||1;
              for(let fc=0;fc<stacks;fc++){
                const fca = fc * 1.26;
                ctx.beginPath();
                ctx.moveTo(mx, my);
                ctx.lineTo(mx+Math.cos(fca)*12, my+Math.sin(fca)*12);
                ctx.stroke();
              }
            }
            if(m.statuses.reveal){
              ctx.strokeStyle = 'rgba(241,196,15,.4)';
              ctx.lineWidth = 1.5;
              const revPulse = Math.sin(now/250)*3;
              ctx.beginPath(); ctx.arc(mx, my, 14+revPulse, 0, Math.PI*2); ctx.stroke();
            }
          }
          /* Legacy frozen/slowed visuals — kept for backward compat */
          if(m._frozen && Date.now()<m._frozen && !m.statuses?.freeze){
            ctx.fillStyle = 'rgba(100,200,255,.25)';
            ctx.beginPath(); ctx.arc(mx, my, 16, 0, Math.PI*2); ctx.fill();
          } else if(m._slowed && Date.now()<m._slowed){
            ctx.strokeStyle = 'rgba(100,200,255,.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([3,3]);
            ctx.beginPath(); ctx.arc(mx, my, 14, 0, Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
          }
          /* §4 Monster HP bar + level badge — high contrast, immediately readable */
          const hpPct = Math.max(0, m.curHp / m.hp);
          const barW = bodySize > 12 ? 30 : 24;
          const barY = my - bodySize - 8;
          /* Bar background with dark border */
          ctx.fillStyle = 'rgba(0,0,0,.7)';
          ctx.fillRect(mx-barW/2-1, barY-1, barW+2, 6);
          /* Bar fill — color shifts with HP */
          ctx.fillStyle = hpPct > 0.5 ? '#3dd497' : hpPct > 0.25 ? '#f5c542' : '#ff5e6c';
          ctx.fillRect(mx-barW/2, barY, barW*hpPct, 4);
          /* Highlight line on top for depth */
          ctx.fillStyle = 'rgba(255,255,255,.15)';
          ctx.fillRect(mx-barW/2, barY, barW*hpPct, 1);
          /* Level badge — rounded pill left of bar */
          const lvText = (m._isBoss?'👑':'')+'Lv'+(m.level||1);
          ctx.font = 'bold 7px "VT323", monospace';
          const lvW = ctx.measureText(lvText).width;
          ctx.fillStyle = 'rgba(0,0,0,.6)';
          ctx.fillRect(mx-barW/2-lvW-5, barY-2, lvW+4, 8);
          ctx.fillStyle = m._isBoss ? '#f5c542' : 'rgba(255,255,255,.7)';
          ctx.fillText(lvText, mx-barW/2-lvW-3, barY+4);

          /* §9 — Status effect icons above monster */
          if(m.statuses){
            const statusList = Object.entries(m.statuses);
            if(statusList.length > 0){
              const iconY = my - 28;
              const iconSpacing = 12;
              const startX = mx - (statusList.length - 1) * iconSpacing / 2;
              statusList.forEach(([sid, st], si) => {
                const elem = st.element;
                if(!elem) return;
                const edef = ELEMENTS[elem];
                if(!edef) return;
                const ix = startX + si * iconSpacing;
                /* Icon background pulse */
                const pulse = Math.sin(now/300 + si)*0.2 + 0.8;
                ctx.globalAlpha = pulse;
                /* Element colored dot */
                ctx.fillStyle = edef.color;
                ctx.beginPath();
                ctx.arc(ix, iconY, 4, 0, Math.PI*2);
                ctx.fill();
                /* Shape indicator */
                ctx.fillStyle = '#fff';
                ctx.font = '6px sans-serif';
                ctx.fillText(sid.charAt(0).toUpperCase(), ix, iconY+2);
                /* Duration bar */
                const durPct = st.remaining / (st.maxDur || 1);
                ctx.fillStyle = edef.color;
                ctx.globalAlpha = 0.6;
                ctx.fillRect(ix-4, iconY+5, 8*durPct, 1.5);
                /* Stacks (for Fracture) */
                if(st.stacks > 1){
                  ctx.globalAlpha = 1;
                  ctx.fillStyle = '#fff';
                  ctx.font = 'bold 5px sans-serif';
                  ctx.fillText('×'+st.stacks, ix+5, iconY);
                }
                ctx.globalAlpha = 1;
              });
            }
          }
        });
      }

      /* ═══ RENDER GROUND LOOT ═══ */
      if(S.groundLoot){
        S.groundLoot.forEach(loot=>{
          const lx = loot.x-cx, ly = loot.y-cy;
          if(lx<-30||lx>W+30||ly<-30||ly>H+30) return;
          const age = (Date.now()-loot.ts)/1000;
          const bob = Math.sin(age*3)*2;
          const fadeOut = age > 50 ? 1-(age-50)/10 : 1;
          ctx.globalAlpha = fadeOut;

          /* §4.6 Weapon drops — distinct rendering */
          if(loot.isWeapon && loot.weapon){
            const tc = loot.tierColor || '#8890b8';
            /* Glowing aura based on tier */
            const auraPulse = 0.3 + Math.sin(age*4)*0.15;
            ctx.fillStyle = tc;
            ctx.globalAlpha = auraPulse * fadeOut;
            ctx.beginPath(); ctx.arc(lx, ly+bob, 14, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = fadeOut;
            /* Tier-colored ring */
            ctx.strokeStyle = tc;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(lx, ly+bob, 12, 0, Math.PI*2); ctx.stroke();
            /* Weapon emoji */
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(WEAPON_TYPES[loot.weapon.type]?.emoji || '⚔️', lx, ly+5+bob);
            /* Name label */
            ctx.font = 'bold 7px "VT323", monospace';
            ctx.fillStyle = tc;
            ctx.fillText(loot.weapon.name, lx, ly+18+bob);
            /* Element dots */
            if(loot.weapon.element1){
              ctx.fillStyle = ELEMENTS[loot.weapon.element1]?.color || '#fff';
              ctx.beginPath(); ctx.arc(lx-6, ly-10+bob, 3, 0, Math.PI*2); ctx.fill();
            }
            if(loot.weapon.element2){
              ctx.fillStyle = ELEMENTS[loot.weapon.element2]?.color || '#fff';
              ctx.beginPath(); ctx.arc(lx+6, ly-10+bob, 3, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1;
            return;
          }

          /* Rare loot has special glow */
          if(loot.rare){
            ctx.fillStyle = 'rgba(245,197,66,.25)';
            ctx.beginPath(); ctx.arc(lx, ly+bob, 16, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = `rgba(245,197,66,${0.4+Math.sin(age*4)*0.3})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(lx, ly+bob, 14, 0, Math.PI*2); ctx.stroke();
          }
          /* Gold coins base — glowing circle */
          ctx.fillStyle = 'rgba(245,197,66,.3)';
          ctx.beginPath(); ctx.arc(lx, ly+bob, 10, 0, Math.PI*2); ctx.fill();
          /* Coin stack */
          ctx.fillStyle = '#f5c542';
          ctx.beginPath(); ctx.arc(lx-3, ly+2+bob, 4, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#e8b830';
          ctx.beginPath(); ctx.arc(lx+2, ly+3+bob, 3.5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#d4a020';
          ctx.beginPath(); ctx.arc(lx, ly+4+bob, 3, 0, Math.PI*2); ctx.fill();
          /* Coin text */
          ctx.font = 'bold 7px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#f5c542';
          ctx.fillText(loot.coins+'G', lx, ly+14+bob);

          /* Skull on top */
          ctx.font = '12px sans-serif';
          ctx.fillText(loot.skullEmoji, lx, ly-6+bob);

          /* XP sparkle */
          ctx.fillStyle = 'rgba(96,165,250,.4)';
          const sparkX = lx + Math.sin(age*5)*6;
          const sparkY = ly - 2 + Math.cos(age*4)*4 + bob;
          ctx.beginPath(); ctx.arc(sparkX, sparkY, 2, 0, Math.PI*2); ctx.fill();

          ctx.globalAlpha = 1;
        });
      }

      /* ═══ IMPACT RINGS — expanding flash at point of contact ═══ */
      if(S._impactRings){
        S._impactRings = S._impactRings.filter(ring => {
          const rAge = (Date.now()-ring.ts)/ring.duration;
          if(rAge >= 1) return false;
          const rx = ring.x-cx, ry = ring.y-cy;
          const rr = ring.maxR * rAge;
          ctx.globalAlpha = (1-rAge) * 0.6;
          ctx.strokeStyle = ring.color;
          ctx.lineWidth = (1-rAge)*3+0.5;
          ctx.beginPath(); ctx.arc(rx, ry, rr, 0, Math.PI*2); ctx.stroke();
          /* Inner bright fill at start */
          if(rAge < 0.3){
            ctx.globalAlpha = (0.3-rAge)*0.4;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(rx, ry, rr*0.5, 0, Math.PI*2); ctx.fill();
          }
          ctx.globalAlpha = 1;
          return true;
        });
      }

      /* ═══ HIT PARTICLES (blood/sparks) ═══ */
      if(S.hitParticles){
        S.hitParticles = S.hitParticles.filter(p=>{
          p.x += p.vx; p.y += p.vy; p.vy += 0.15; /* gravity */
          p.life -= 0.04;
          if(p.life <= 0) return false;
          const ppx = p.x-cx+shakeX, ppy = p.y-cy+shakeY;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(ppx, ppy, p.size*p.life, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;
          return true;
        });
      }

      /* ═══ DEATH EXPLOSIONS — §Creative Vision §8: Whimsical, not devastating ═══ */
      if(S.deathExplosions){
        S.deathExplosions = S.deathExplosions.filter(exp=>{
          const age = (Date.now()-exp.ts)/1000;
          const maxAge = exp.isGrandSlam ? 2.5 : 1.5;
          if(age > maxAge) return false;
          const scale = exp.killScale || 1;
          /* Animate particles */
          exp.particles.forEach(p=>{
            p.x += p.vx; p.y += p.vy; p.vy += 0.10;
            p.vx *= 0.96; p.life -= (exp.isGrandSlam ? 0.018 : 0.025);
            if(p.life <= 0) return;
            const epx = p.x-cx+shakeX, epy = p.y-cy+shakeY;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(epx, epy, p.size*p.life, 0, Math.PI*2); ctx.fill();
          });
          const ex = exp.x-cx+shakeX, ey = exp.y-cy+shakeY;

          /* Flash ring — scaled for Grand Slam */
          const flashDur = exp.isGrandSlam ? 0.5 : 0.3;
          if(age < flashDur){
            const flashProg = age/flashDur;
            ctx.globalAlpha = 1-flashProg;
            if(exp.isGrandSlam){
              ctx.fillStyle = `rgba(245,197,66,${0.3*(1-flashProg)})`;
              ctx.beginPath(); ctx.arc(ex, ey, flashProg*80*scale, 0, Math.PI*2); ctx.fill();
              ctx.strokeStyle = '#fbbf24';
              ctx.lineWidth = Math.max(0.5, 4-flashProg*6);
            } else {
              ctx.strokeStyle = '#fff';
              ctx.lineWidth = Math.max(0.5, 3-flashProg*8);
            }
            ctx.beginPath(); ctx.arc(ex, ey, flashProg*60*scale, 0, Math.PI*2); ctx.stroke();
          }

          /* §8 Whimsical death — "comical pile" of parts flying out */
          /* Emoji limbs scatter from death point like ragdoll */
          if(!exp._limbsSpawned){
            exp._limbsSpawned = true;
            const limbEmojis = ['🦴','💀','👁️','🦷','🫀'];
            exp._limbs = limbEmojis.slice(0, exp.isGrandSlam ? 5 : 3).map((le,li) => ({
              emoji: le,
              x: exp.x, y: exp.y,
              vx: (Math.random()-0.5)*8 * scale,
              vy: -3 - Math.random()*5 * scale,
              rot: Math.random()*6 - 3,
              rotSpd: (Math.random()-0.5)*0.3,
              bounce: 0,
            }));
          }

          /* Animate limbs — bones bounce and settle */
          if(exp._limbs){
            exp._limbs.forEach(limb => {
              limb.x += limb.vx;
              limb.y += limb.vy;
              limb.vy += 0.25; /* gravity */
              limb.rot += limb.rotSpd;
              limb.vx *= 0.97;
              /* Ground bounce */
              if(limb.y > exp.y + 15 && limb.vy > 0){
                limb.vy *= -0.4;
                limb.vx *= 0.7;
                limb.bounce++;
              }
              if(limb.bounce < 3){
                const lx = limb.x - cx + shakeX;
                const ly = limb.y - cy + shakeY;
                ctx.save();
                ctx.translate(lx, ly);
                ctx.rotate(limb.rot);
                ctx.globalAlpha = Math.max(0, 1 - age/(maxAge*0.8));
                ctx.font = `${10+2*scale}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(limb.emoji, 0, 0);
                ctx.restore();
              }
            });
          }

          /* Main emoji rises + fades */
          if(age < flashDur + 0.5){
            ctx.globalAlpha = Math.max(0, 1 - (age - flashDur*0.5));
            ctx.font = (14 + 6*scale - age*20)+'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(exp.emoji, ex, ey - age*50*scale);
          }

          /* Grand Slam text — "GRAND SLAM!" rises dramatically */
          if(exp.isGrandSlam && age < 1.5){
            ctx.globalAlpha = Math.max(0, 1 - age/1.5);
            ctx.font = `bold ${14+4*scale}px "VT323", monospace`;
            ctx.fillStyle = '#fbbf24';
            ctx.textAlign = 'center';
            ctx.fillText('GRAND SLAM!', ex, ey - 40 - age*30);
          }

          ctx.globalAlpha = 1;
          return true;
        });
      }

      /* ═══ RENDER DAMAGE NUMBERS — §2 Sensory Proportionality — JUICED ═══ */
      if(S.dmgNumbers){
        S.dmgNumbers.forEach(d=>{
          const age = (Date.now()-d.ts)/1200;
          if(age >= 1) return;

          /* Initialize per-number velocity on first frame */
          if(d._vx === undefined){
            d._vx = (Math.random()-0.5)*1.5;
            d._vy = -2 - Math.random()*2;
            d._gravity = 0.06;
            d._bounce = 0;
            d._sx = d.x; d._sy = d.y; /* original spawn position */
          }

          /* Categorize for proportional rendering */
          const isCollision = d.text.includes('💥');
          const isGrandSlam = d.text.includes('GRAND');
          const isKill = d.text.includes('☠️') || d.text.includes('KILL');
          const isXP = d.text.includes('XP');
          const isGold = d.text.includes('G') && d.text.includes('+');
          const isMana = d.text.includes('MP');
          const isHeal = d.text.includes('Used') || d.text.includes('Buff');
          const isCodex = d.text.includes('📖');
          const isStatus = d.text.includes('STUN') || d.text.includes('mana');
          const isShield = d.text.includes('🛡️');
          const isPlayerDmg = d.color === '#ff5e6c' && d.text.startsWith('-');
          const isCritNum = d.text.includes('💥') && !d.text.includes('GRAND') && !isCollision;
          const isNumericDmg = /^\d+$/.test(d.text.trim());

          /* Size scales with significance */
          let fontSize = 11;
          let useGravity = false;
          if(isCollision) fontSize = 15;
          if(isGrandSlam) fontSize = 20;
          if(isKill) fontSize = 16;
          if(isCritNum) fontSize = 14;
          if(isXP || isGold) { fontSize = 9; useGravity = true; }
          if(isMana) fontSize = 10;
          if(isCodex) fontSize = 11;
          if(isPlayerDmg) fontSize = 14;
          if(isShield) fontSize = 10;
          if(isNumericDmg) { fontSize = 10; useGravity = true; }

          /* Physics — apply velocity and gravity for scattered feel */
          if(useGravity){
            d._vy += d._gravity;
            d.x += d._vx;
            d.y += d._vy;
          } else {
            /* Standard rise */
            d.y -= 0.4;
            d.x += d._vx * 0.3;
          }

          /* Entrance animation — big pop on spawn, settles to normal */
          let popScale = 1;
          if(age < 0.08){
            popScale = 1 + (0.08-age)*15; /* instant big pop */
          } else if(age < 0.2){
            /* Settle back with slight overshoot */
            const settleT = (age-0.08)/0.12;
            popScale = 1 + (1-settleT)*0.3 * Math.cos(settleT*Math.PI*2);
          }
          /* Crits and kills get extra pop */
          if(isCritNum || isCollision || isGrandSlam || isKill) popScale *= 1.15;

          /* Shake on player damage */
          let shakeX = 0, shakeY = 0;
          if(isPlayerDmg && age < 0.15){
            shakeX = (Math.random()-0.5)*4;
            shakeY = (Math.random()-0.5)*4;
          }

          const dnx = d.x-cx + shakeX, dny = d.y-cy + shakeY;
          /* Fade: quick fade-in, slow fade-out */
          const alpha = age < 0.05 ? age/0.05 : Math.max(0, 1 - age*age);
          ctx.globalAlpha = alpha;
          const finalSize = Math.round(fontSize * popScale);
          ctx.font = `bold ${finalSize}px "VT323", monospace`;
          ctx.textAlign = 'center';

          /* Glow trail for big hits */
          if(isCollision || isGrandSlam || isKill || isCritNum){
            ctx.shadowColor = d.color;
            ctx.shadowBlur = isGrandSlam ? 14 : isKill ? 10 : 6;
          }

          /* Dark outline for readability */
          ctx.strokeStyle = 'rgba(0,0,0,.8)';
          ctx.lineWidth = finalSize > 14 ? 3 : 2;
          ctx.lineJoin = 'round';
          ctx.strokeText(d.text, dnx, dny);

          /* Main text */
          ctx.fillStyle = d.color;
          ctx.fillText(d.text, dnx, dny);

          /* Second bright pass for crits/kills — layered glow */
          if(isCollision || isGrandSlam || isKill){
            ctx.globalAlpha = alpha * 0.3;
            ctx.fillStyle = '#fff';
            ctx.fillText(d.text, dnx, dny-1);
          }

          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
        });
      }

      /* Draw local player — with walk bob */
      const isMoving = Math.abs(dx)>0.01 || Math.abs(dy)>0.01;
      const bobY = isMoving ? Math.sin(now/120) * 2 : 0;
      const bobScale = isMoving ? 1 + Math.sin(now/120+Math.PI/2) * 0.03 : 1;
      const px = P.x - cx, py = P.y - cy + bobY;
      /* Footstep sound — throttled */
      if(isMoving){
        if(!S._footstepTimer) S._footstepTimer = 0;
        S._footstepTimer++;
        if(S._footstepTimer % 12 === 0) BT_AUDIO.footstep();
        /* Track steps for stats */
        if(S.stats && S._footstepTimer % 6 === 0) S.stats.steps++;
      }
      /* Footstep dust puffs — zone-tinted */
      if(isMoving){
        if(!S._dustPuffs) S._dustPuffs = [];
        if(Math.random() < 0.3){
          /* Zone-specific dust color */
          const _dustColors = {
            flame:'rgba(200,100,40,ALPHA)', frost:'rgba(200,220,240,ALPHA)',
            venom:'rgba(80,160,60,ALPHA)', storm:'rgba(140,120,180,ALPHA)',
            stone:'rgba(120,110,90,ALPHA)', wind:'rgba(180,200,220,ALPHA)',
            water:'rgba(100,160,200,ALPHA)', dark:'rgba(60,40,80,ALPHA)',
            light:'rgba(220,200,120,ALPHA)',
          };
          const _dustC = _dustColors[zoneElem] || 'rgba(180,170,140,ALPHA)';
          S._dustPuffs.push({
            x: px + (Math.random()-0.5)*8,
            y: py + 14 + Math.random()*4,
            vx: (Math.random()-0.5)*0.5 - dx*0.3,
            vy: -Math.random()*0.5 - 0.2,
            life: 1, decay: 0.03 + Math.random()*0.02,
            colorBase: _dustC,
          });
        }
      }
      if(S._dustPuffs){
        S._dustPuffs = S._dustPuffs.filter(d=>{
          d.x += d.vx; d.y += d.vy; d.life -= d.decay;
          if(d.life <= 0) return false;
          ctx.fillStyle = (d.colorBase||'rgba(180,170,140,ALPHA)').replace('ALPHA', (d.life*0.4).toFixed(2));
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.life*3, 0, Math.PI*2);
          ctx.fill();
          return true;
        });
      }

      /* ═══ DODGE ROLL AFTERIMAGE TRAIL ═══ */
      if(S._dodgeRoll){
        if(!S._dodgeTrail) S._dodgeTrail = [];
        /* Store afterimage snapshots during dodge */
        S._dodgeTrail.push({
          x: P.x, y: P.y, ts: now,
          facing: S._facing || 'down',
          tColor: S.bodyTorso || '#2563eb',
          lColor: S.bodyLegs || '#1e3a5f',
        });
        if(S._dodgeTrail.length > 6) S._dodgeTrail.shift();
      }
      /* Render + decay afterimages */
      if(S._dodgeTrail && S._dodgeTrail.length > 0){
        S._dodgeTrail = S._dodgeTrail.filter(ghost => {
          const gAge = (now - ghost.ts) / 300; /* fade over 300ms */
          if(gAge >= 1) return false;
          const gx = ghost.x - cx, gy = ghost.y - cy;
          const gAlpha = (1-gAge) * 0.35;
          ctx.globalAlpha = gAlpha;
          /* Simple ghost silhouette — tinted blue-white */
          const gSize = _slim ? 8 : 10;
          /* Body */
          ctx.fillStyle = ghost.tColor;
          ctx.beginPath(); ctx.ellipse(gx, gy+4, gSize, 14, 0, 0, Math.PI*2); ctx.fill();
          /* Head */
          ctx.fillStyle = '#f0c68a';
          ctx.beginPath(); ctx.arc(gx, gy-12, _slim?6:7, 0, Math.PI*2); ctx.fill();
          /* Speed lines */
          if(S._dodgeRoll){
            const trailAngle = S._dodgeRoll.angle + Math.PI;
            ctx.strokeStyle = `rgba(255,255,255,${gAlpha*0.8})`;
            ctx.lineWidth = 1;
            for(let sl=0;sl<3;sl++){
              const slOff = (sl-1)*6;
              const slx = gx + Math.cos(trailAngle+Math.PI/2)*slOff;
              const sly = gy + Math.sin(trailAngle+Math.PI/2)*slOff;
              ctx.beginPath();
              ctx.moveTo(slx, sly);
              ctx.lineTo(slx+Math.cos(trailAngle)*12, sly+Math.sin(trailAngle)*12);
              ctx.stroke();
            }
          }
          ctx.globalAlpha = 1;
          return true;
        });
      }

      /* Player shadow */
      ctx.fillStyle = 'rgba(0,0,0,.18)';
      ctx.beginPath();
      ctx.ellipse(px, py+24, _slim?10:14, 4, 0, 0, Math.PI*2);
      ctx.fill();

      /* Facing direction */
      const absDx = Math.abs(dx), absDy = Math.abs(dy);
      const wasUpDown = S._facing === 'up' || S._facing === 'down';
      const vertBias = wasUpDown ? 1.3 : 0.7;
      if(absDx > 0.03 || absDy > 0.03){
        if(absDy > absDx * vertBias) S._facing = dy > 0 ? 'down' : 'up';
        else if(absDx > absDy * (wasUpDown ? 0.7 : 1.3)) S._facing = dx > 0 ? 'right' : 'left';
      }
      const dir = S._facing || 'down';
      const flipAvatar = dir === 'right';
      const isSide = dir === 'left' || dir === 'right';

      /* Animation */
      const fp = now / 80;
      const swingAngle = isMoving ? Math.sin(fp) * 0.5 : 0;
      const animBob = isMoving ? Math.abs(Math.sin(fp)) * 2.5 : 0;
      const tColor = S.bodyTorso || '#2563eb';
      const lColor = S.bodyLegs || '#1e3a5f';

      /* Body size: slim=36x12, armored=36x16 */
      const _slim = S.bodySize !== 'armored';
      const tw=_slim?16:24, aw=_slim?3:5, ah=_slim?14:15;
      const lw=_slim?6:8, lh=10, lg=_slim?2:3;
      const sw2=_slim?7:10, sh2=_slim?4:4.5;
      const hR=_slim?12:14;

      ctx.save();
      ctx.translate(px, py + animBob);

      if(isSide){
        if(dir === 'left') ctx.scale(-1, 1);
        /* Back arm+leg (darker) */
        ctx.globalAlpha = 0.55;
        ctx.save(); ctx.translate(0, 8); ctx.rotate(-swingAngle);
        ctx.fillStyle = tColor; ctx.fillRect(-aw/2, 0, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(-1.5, ah-2, 2.5, 3);
        ctx.restore();
        ctx.save(); ctx.translate(0, 18); ctx.rotate(swingAngle);
        ctx.fillStyle = lColor; ctx.fillRect(-lw/2, 0, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-sw2/2, lh-2, sw2, sh2);
        ctx.restore();
        ctx.globalAlpha = 1;
        /* Torso */
        ctx.fillStyle = tColor; ctx.fillRect(-tw/2+1, 3, tw-2, 16);
        /* Front arm+leg */
        ctx.save(); ctx.translate(0, 8); ctx.rotate(swingAngle);
        ctx.fillStyle = tColor; ctx.fillRect(-aw/2, 0, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(-1.5, ah-2, 2.5, 3);
        ctx.restore();
        ctx.save(); ctx.translate(0, 18); ctx.rotate(-swingAngle);
        ctx.fillStyle = lColor; ctx.fillRect(-lw/2, 0, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-sw2/2, lh-2, sw2, sh2);
        ctx.restore();
      } else {
        const lSl = isMoving ? Math.sin(fp)*1.5 : 0;
        const rSl = isMoving ? Math.sin(fp+Math.PI)*1.5 : 0;
        /* Left arm */
        ctx.fillStyle = tColor; ctx.fillRect(-(tw/2+aw), 8+rSl, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(-(tw/2+aw)+0.5, 8+ah-1+rSl, 3, 3);
        /* Left leg */
        ctx.fillStyle = lColor; ctx.fillRect(-(lg/2+lw), 18+lSl, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-(lg/2+lw)-0.5, 18+lh-2+lSl, sw2, sh2);
        /* Torso */
        ctx.fillStyle = tColor; ctx.fillRect(-tw/2, 3, tw, 16);
        /* Right leg */
        ctx.fillStyle = lColor; ctx.fillRect(lg/2, 18+rSl, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(lg/2-0.5, 18+lh-2+rSl, sw2, sh2);
        /* Right arm */
        ctx.fillStyle = tColor; ctx.fillRect(tw/2, 8+lSl, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(tw/2+0.5, 8+ah-1+lSl, 3, 3);
        /* Eyes (front only) */
        if(dir === 'down'){
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(-3, -10, 2, 0, Math.PI*2); ctx.arc(3, -10, 2, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#1a1a2e';
          ctx.beginPath(); ctx.arc(-2.5, -9.5, 1.1, 0, Math.PI*2); ctx.arc(3.5, -9.5, 1.1, 0, Math.PI*2); ctx.fill();
        }
      }
      ctx.restore();

      /* §4 Visual Identity — Weapon visual on player */
      if(S.rpg){
        const wpn = getActiveWeapon(S.rpg);
        const wpnDef = WEAPON_TYPES[wpn.type];
        const wpnAngle = S._aimAngle != null ? S._aimAngle : 
          (dir==='right'?0:dir==='up'?-Math.PI/2:dir==='left'?Math.PI:Math.PI/2);
        const wpnLen = wpn.type==='greatsword'?20:wpn.type==='sword'?14:wpn.type==='bow'?12:10;
        const wpnX = px + Math.cos(wpnAngle)*8;
        const wpnY = py + animBob + Math.sin(wpnAngle)*8;

        ctx.save();
        ctx.translate(wpnX, wpnY);
        ctx.rotate(wpnAngle + Math.PI/4);

        if(wpn.type === 'bow'){
          /* Bow — curved arc */
          ctx.strokeStyle = '#8B6914';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, wpnLen, -0.8, 0.8);
          ctx.stroke();
          /* String */
          ctx.strokeStyle = '#ddd';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(Math.cos(-0.8)*wpnLen, Math.sin(-0.8)*wpnLen);
          ctx.lineTo(Math.cos(0.8)*wpnLen, Math.sin(0.8)*wpnLen);
          ctx.stroke();
        } else if(wpn.type === 'staff'){
          /* Staff — thin pole with orb */
          ctx.fillStyle = '#6b4423';
          ctx.fillRect(-1, -wpnLen, 2.5, wpnLen);
          ctx.fillStyle = wpn.element1 ? ELEMENTS[wpn.element1].color : '#a78bfa';
          ctx.beginPath(); ctx.arc(0, -wpnLen, 3, 0, Math.PI*2); ctx.fill();
        } else {
          /* Sword/Greatsword — blade */
          ctx.fillStyle = '#c0c0c0';
          ctx.fillRect(-1.5, -wpnLen, 3, wpnLen);
          /* Guard */
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(-4, -2, 8, 3);
          /* Grip */
          ctx.fillStyle = '#4a2e0a';
          ctx.fillRect(-1.5, 0, 3, 5);
        }

        /* Element glow on weapon */
        if(wpn.element1){
          const e1col = ELEMENTS[wpn.element1]?.color || '#fff';
          ctx.shadowColor = e1col;
          ctx.shadowBlur = 6;
          ctx.strokeStyle = e1col;
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.4 + Math.sin(now/300)*0.2;
          if(wpn.type==='bow'){
            ctx.beginPath(); ctx.arc(0, 0, wpnLen+1, -0.8, 0.8); ctx.stroke();
          } else {
            ctx.strokeRect(-2, -wpnLen-1, 4, wpnLen+2);
          }
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;
        }
        /* Volatile crackling boundary */
        if(wpn.isVolatile && wpn.element1 && wpn.element2){
          const e2col = ELEMENTS[wpn.element2]?.color || '#fff';
          ctx.strokeStyle = e2col;
          ctx.lineWidth = 0.8;
          ctx.globalAlpha = 0.3 + Math.random()*0.3;
          for(let vc=0;vc<3;vc++){
            const vy = -wpnLen*Math.random();
            ctx.beginPath();
            ctx.moveTo(-2+Math.random()*4, vy);
            ctx.lineTo(-2+Math.random()*4, vy+3+Math.random()*4);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }

      /* Head */
      ctx.fillStyle = '#f0c68a';
      ctx.beginPath(); ctx.arc(px, py-6+animBob, hR, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3b2414';
      ctx.beginPath(); ctx.arc(px, py-8+animBob, hR, Math.PI, Math.PI*2); ctx.fill();
      /* Avatar override */
      if(S.myAvatar){
        const img = loadAvatarImg(S.myAvatar);
        const ready = img instanceof HTMLCanvasElement ? img.width>0 : (img.complete && img.naturalWidth);
        if(ready){
          ctx.save();
          if(flipAvatar){ ctx.translate(px, 0); ctx.scale(-1, 1); ctx.translate(-px, 0); }
          ctx.beginPath(); ctx.arc(px, py-6+animBob, hR, 0, Math.PI*2); ctx.clip();
          ctx.drawImage(img, px-hR, py-6-hR+animBob, hR*2, hR*2);
          ctx.restore();
        }
      }
            /* Own name */
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,0,0,.65)';
      const myNtw = ctx.measureText(S.myName).width;
      ctx.fillRect(px-myNtw/2-4, py-28, myNtw+8, 14);
      ctx.fillStyle = '#fff';
      ctx.fillText(S.myName, px, py-17);
      /* Own badges below name */
      if(S.badges && S.badges.length > 0){
        ctx.font = '8px sans-serif';
        const badgeStr = S.badges.map(bid=>{const a=BT_ACHIEVEMENTS.find(x=>x.id===bid);return a?a.icon:'';}).join('');
        ctx.fillText(badgeStr, px, py-33);
      }

      /* ═══ SHIELD ARC HUD ═══ */
      if(S._shieldUp){
        const shieldAng = S._shieldAngle !== undefined ? S._shieldAngle : (S._aimAngle || (()=>{
          const fd=S._facing||'down';
          return fd==='right'?0:fd==='up'?-Math.PI/2:fd==='left'?Math.PI:Math.PI/2;
        })());
        ctx.save();
        ctx.strokeStyle = 'rgba(96,165,250,.5)';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.shadowColor = 'rgba(96,165,250,.4)';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(px, py+8, 22, shieldAng-0.8, shieldAng+0.8);
        ctx.stroke();
        /* Inner glow */
        ctx.strokeStyle = 'rgba(150,200,255,.3)';
        ctx.lineWidth = 8;
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(px, py+8, 20, shieldAng-0.6, shieldAng+0.6);
        ctx.stroke();
        ctx.restore();
      }


      /* ═══ BOW AIM LINE — LOS extends across screen ═══ */
      if((S.rpg?.activeSlot === 'ranged' || S.rpg?.activeSlot === 'staff') && S.autoAttack){
        let aimA;
        if(S.lockedTarget && S.lockedTarget.ref){
          const lt3 = S.lockedTarget.ref;
          aimA = Math.atan2((lt3.y||0)-P.y, (lt3.x||0)-P.x);
        } else if(S._aiming){
          aimA = S._aimAngle || 0;
        } else {
          const fd3 = S._facing||'down';
          aimA = fd3==='right'?0:fd3==='up'?-Math.PI/2:fd3==='left'?Math.PI:Math.PI/2;
        }
        const isAiming = S._aiming || (S.lockedTarget && S.lockedTarget.ref);
        const losAlpha = isAiming ? 0.5 : 0.2;
        ctx.save();
        /* Long dashed LOS line */
        ctx.beginPath();
        ctx.moveTo(px, py+14);
        ctx.lineTo(px + Math.cos(aimA)*W*2, py+10 + Math.sin(aimA)*W*2);
        ctx.strokeStyle = 'rgba(255,255,255,'+losAlpha*0.4+')';
        ctx.lineWidth = 2;
        ctx.setLineDash([12,12]);
        ctx.lineDashOffset = -(Date.now()/15)%24;
        ctx.stroke();
        ctx.setLineDash([]);
        /* Shorter solid aim arrow */
        const aimLen = isAiming ? 50 : 30;
        ctx.beginPath();
        ctx.moveTo(px, py+14);
        ctx.lineTo(px + Math.cos(aimA)*aimLen, py+14 + Math.sin(aimA)*aimLen);
        ctx.strokeStyle = 'rgba(255,255,255,'+losAlpha+')';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([5,5]);
        ctx.stroke();
        ctx.setLineDash([]);
        /* Carat/chevron at aim tip */
        const cTip = aimLen + 8;
        const cX = px + Math.cos(aimA)*cTip, cY = py+10 + Math.sin(aimA)*cTip;
        ctx.fillStyle = 'rgba(255,255,255,'+losAlpha+')';
        ctx.beginPath();
        ctx.moveTo(cX + Math.cos(aimA)*6, cY + Math.sin(aimA)*6);
        ctx.lineTo(cX + Math.cos(aimA+2.5)*8, cY + Math.sin(aimA+2.5)*8);
        ctx.lineTo(cX + Math.cos(aimA-2.5)*8, cY + Math.sin(aimA-2.5)*8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      /* ═══ SWORD — longsword held by character + swing ═══ */
      if(S.rpg?.activeSlot === 'melee'){
        let baseA;
        if(S.lockedTarget && S.lockedTarget.ref){
          const lt = S.lockedTarget.ref;
          baseA = Math.atan2((lt.y||lt.renderY||P.y)-P.y, (lt.x||lt.renderX||P.x)-P.x);
        } else if(S._aiming && S._aimAngle != null){
          baseA = S._aimAngle;
        } else {
          const swDir = S._facing||'down';
          baseA = swDir==='right'?0:swDir==='up'?-Math.PI/2:swDir==='left'?Math.PI:Math.PI/2;
        }
        const bladeLen = 38;
        const hiltLen = 8;
        const bpy = py + animBob + 12; /* torso level */

        if(S.isSwinging){
          const swAge = (Date.now()-S.swingTimer)/250;
          if(swAge < 1){
            /* Swing: blade sweeps through the arc */
            const curA = baseA - SWING_ARC/2 + swAge*SWING_ARC;
            const tipX = px+Math.cos(curA)*bladeLen;
            const tipY = bpy+Math.sin(curA)*bladeLen;
            const hiltX = px+Math.cos(curA)*hiltLen;
            const hiltY = bpy+Math.sin(curA)*hiltLen;
            const perpA = curA+Math.PI/2;

            ctx.save();
            /* §Creative Vision Stage 2-3: Element glow on weapon swing */
            const swingElem = S._specialAttack ? activeWpn.element2 : activeWpn.element1;
            const hasElemGlow = !!swingElem;
            if(hasElemGlow){
              const elemColor = ELEMENTS[swingElem]?.color || '#fff';
              const elem2Color = activeWpn.element2 ? ELEMENTS[activeWpn.element2]?.color : null;
              /* Element aura around swing area */
              ctx.save();
              ctx.shadowColor = elemColor; ctx.shadowBlur = 16;
              ctx.fillStyle = elemColor.replace(')', ',.15)').replace('rgb','rgba');
              ctx.beginPath(); ctx.arc(px, bpy, bladeLen*1.4, 0, Math.PI*2); ctx.fill();
              ctx.restore();
              /* Volatile crackle for fusion weapons */
              if(activeWpn.isVolatile && activeWpn.element1 && activeWpn.element2){
                const e1c = ELEMENTS[activeWpn.element1]?.color||'#fff';
                const e2c = ELEMENTS[activeWpn.element2]?.color||'#fff';
                for(let vc=0;vc<3;vc++){
                  const vcA = (Date.now()/150+vc*2.1)%(Math.PI*2);
                  const vcR = bladeLen*0.7+Math.sin(Date.now()/80+vc)*8;
                  ctx.fillStyle = vc%2===0 ? e1c : e2c;
                  ctx.globalAlpha = 0.5+Math.random()*0.3;
                  ctx.beginPath();ctx.arc(px+Math.cos(vcA)*vcR,bpy+Math.sin(vcA)*vcR,2+Math.random(),0,Math.PI*2);ctx.fill();
                }
                ctx.globalAlpha = 1;
              }
            } else if(S._specialAttack){
              /* No element = raw power glow (golden) */
              ctx.fillStyle = 'rgba(245,197,66,0.15)';
              ctx.beginPath(); ctx.arc(px, bpy, bladeLen*1.3, 0, Math.PI*2); ctx.fill();
            }
            /* Motion blur trail — wide element-colored slash arc */
            const trailA = curA - 0.5;
            ctx.globalAlpha = (1-swAge)*0.35;
            const trailColor = hasElemGlow ? ELEMENTS[swingElem].color : 'rgba(200,200,220,0.4)';
            ctx.fillStyle = trailColor;
            ctx.beginPath();
            ctx.moveTo(px, bpy);
            ctx.arc(px, bpy, bladeLen+2, Math.min(trailA, curA), Math.max(trailA, curA));
            ctx.closePath();
            ctx.fill();
            /* Second thinner inner trail */
            ctx.globalAlpha = (1-swAge)*0.15;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(px, bpy);
            ctx.arc(px, bpy, bladeLen*0.7, Math.min(trailA, curA), Math.max(trailA, curA));
            ctx.closePath();
            ctx.fill();
            /* Blade tip spark particles — spray off during swing */
            if(swAge < 0.6 && Math.random() < 0.5){
              const sparkColor = hasElemGlow ? ELEMENTS[swingElem].color : '#ddd';
              S.hitParticles.push({
                x:tipX+cx, y:tipY+cy,
                vx:Math.cos(curA+Math.PI/2)*(1+Math.random()*2), vy:Math.sin(curA+Math.PI/2)*(1+Math.random()*2)-0.5,
                life:0.4, color:sparkColor, size:1+Math.random()
              });
            }

            /* Blade — element-tinted steel */
            ctx.globalAlpha = 1;
            const bladeColor = hasElemGlow ? ELEMENTS[swingElem].color : '#c8c8d0';
            const bladeTint = hasElemGlow ? bladeColor : '#c8c8d0';
            ctx.fillStyle = bladeTint;
            if(hasElemGlow){ ctx.shadowColor=bladeColor; ctx.shadowBlur=10; }
            else { ctx.shadowColor = '#fff'; ctx.shadowBlur = 4; }
            ctx.beginPath();
            ctx.moveTo(hiltX+Math.cos(perpA)*3, hiltY+Math.sin(perpA)*3);
            ctx.lineTo(hiltX-Math.cos(perpA)*3, hiltY-Math.sin(perpA)*3);
            ctx.lineTo(tipX-Math.cos(perpA)*1.2, tipY-Math.sin(perpA)*1.2);
            ctx.lineTo(tipX+Math.cos(curA)*3, tipY+Math.sin(curA)*3); /* sharp tip */
            ctx.lineTo(tipX+Math.cos(perpA)*1.2, tipY+Math.sin(perpA)*1.2);
            ctx.closePath();
            ctx.fill();
            /* Blade edge highlight */
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(hiltX+Math.cos(perpA)*2.5, hiltY+Math.sin(perpA)*2.5);
            ctx.lineTo(tipX+Math.cos(curA)*2, tipY+Math.sin(curA)*2);
            ctx.stroke();
            /* Fuller (groove) */
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            const midBlade = 0.5;
            ctx.moveTo(hiltX+Math.cos(curA)*5, hiltY+Math.sin(curA)*5);
            ctx.lineTo(tipX-Math.cos(curA)*8, tipY-Math.sin(curA)*8);
            ctx.stroke();

            /* Crossguard */
            const cgX = hiltX, cgY = hiltY;
            ctx.strokeStyle = '#8B6914';
            ctx.lineWidth = 3.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cgX+Math.cos(perpA)*7, cgY+Math.sin(perpA)*7);
            ctx.lineTo(cgX-Math.cos(perpA)*7, cgY-Math.sin(perpA)*7);
            ctx.stroke();
            /* Grip */
            ctx.strokeStyle = '#5a3a1e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(px+Math.cos(curA)*3, bpy+Math.sin(curA)*3);
            ctx.lineTo(hiltX, hiltY);
            ctx.stroke();
            /* Pommel */
            ctx.fillStyle = '#8B6914';
            ctx.beginPath();
            ctx.arc(px+Math.cos(curA)*3, bpy+Math.sin(curA)*3, 2.5, 0, Math.PI*2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.restore();
          }
        } else {
          /* Idle — sword resting at character's side */
          const restA = baseA + 0.5;
          /* Bow sprite when equipped */
          if((S.rpg?.activeSlot === 'ranged' || S.rpg?.activeSlot === 'staff')){
            ctx.save();
            ctx.translate(px, bpy);
            ctx.rotate(baseA);
            ctx.strokeStyle = '#8B6914';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(10, 0, 12, -0.8, 0.8);
            ctx.stroke();
            /* Bowstring */
            ctx.strokeStyle = 'rgba(255,255,255,.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(10+Math.cos(-0.8)*12, Math.sin(-0.8)*12);
            ctx.lineTo(10+Math.cos(0.8)*12, Math.sin(0.8)*12);
            ctx.stroke();
            ctx.restore();
          } /* angled slightly from facing direction */
          const restLen = bladeLen * 0.7;
          const tipX = px+Math.cos(restA)*restLen;
          const tipY = bpy+Math.sin(restA)*restLen;
          const hiltX = px+Math.cos(restA)*6;
          const hiltY = bpy+Math.sin(restA)*6;
          const perpA = restA+Math.PI/2;

          ctx.save();
          ctx.globalAlpha = 0.7;
          /* Blade */
          ctx.fillStyle = '#b0b0b8';
          ctx.beginPath();
          ctx.moveTo(hiltX+Math.cos(perpA)*2, hiltY+Math.sin(perpA)*2);
          ctx.lineTo(hiltX-Math.cos(perpA)*2, hiltY-Math.sin(perpA)*2);
          ctx.lineTo(tipX-Math.cos(perpA)*0.8, tipY-Math.sin(perpA)*0.8);
          ctx.lineTo(tipX+Math.cos(restA)*2, tipY+Math.sin(restA)*2);
          ctx.lineTo(tipX+Math.cos(perpA)*0.8, tipY+Math.sin(perpA)*0.8);
          ctx.closePath();
          ctx.fill();
          /* Crossguard */
          ctx.strokeStyle = '#6a4a10';
          ctx.lineWidth = 2.5;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(hiltX+Math.cos(perpA)*5, hiltY+Math.sin(perpA)*5);
          ctx.lineTo(hiltX-Math.cos(perpA)*5, hiltY-Math.sin(perpA)*5);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.restore();
        }
      }

      /* ═══ PET RENDER — follows player, bounces with personality ═══ */
      if(S.rpg?.lifeSkills?.activePet !== null && S._petX){
        const pet = S.rpg.lifeSkills.pets?.[S.rpg.lifeSkills.activePet];
        if(pet){
          const petSx = S._petX - cx, petSy = S._petY - cy;
          const petBob = Math.sin(now/250)*3;
          /* Shadow */
          ctx.fillStyle = 'rgba(0,0,0,.12)';
          ctx.beginPath(); ctx.ellipse(petSx, petSy+10+petBob, 6, 2.5, 0, 0, Math.PI*2); ctx.fill();
          /* Body — colored circle */
          ctx.fillStyle = pet.color;
          ctx.globalAlpha = 0.8;
          ctx.beginPath(); ctx.arc(petSx, petSy+petBob, 7, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;
          /* Emoji */
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(pet.emoji, petSx, petSy+3+petBob);
          /* Name tag */
          ctx.font = 'bold 6px "VT323", monospace';
          ctx.fillStyle = pet.color;
          ctx.fillText(pet.name, petSx, petSy-8+petBob);
          /* Loot collect radius indicator (subtle) */
          ctx.strokeStyle = 'rgba(245,197,66,.06)';
          ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.arc(petSx, petSy+petBob, PET_LOOT_RADIUS/2, 0, Math.PI*2); ctx.stroke();
        }
      }

      /* ═══ OWN RESOURCE BARS — §4 Visual Clarity: immediately readable ═══ */
      if(S.rpg){
        const barW = 34, barY = py+34+animBob;
        const R = S.rpg;

        /* HP bar — largest, most important — with smooth lerp */
        const hpPct = Math.max(0, R.hp / R.maxHp);
        /* Smooth display HP — lerps toward actual for satisfying drain */
        if(S._displayHp === undefined) S._displayHp = hpPct;
        S._displayHp += (hpPct - S._displayHp) * 0.12;
        const dHp = S._displayHp;
        /* Ghost bar — shows where HP was before damage (drains slower) */
        if(S._ghostHp === undefined) S._ghostHp = hpPct;
        if(hpPct < S._ghostHp) S._ghostHp += (hpPct - S._ghostHp) * 0.03; /* slow drain */
        else S._ghostHp = hpPct;

        ctx.fillStyle = 'rgba(0,0,0,.65)';
        ctx.fillRect(px-barW/2-1, barY-1, barW+2, 6);
        /* Ghost bar — faded red showing recent damage */
        if(S._ghostHp > dHp + 0.01){
          ctx.fillStyle = 'rgba(255,94,108,.3)';
          ctx.fillRect(px-barW/2, barY, barW*S._ghostHp, 4);
        }
        /* Actual HP bar */
        ctx.fillStyle = hpPct>0.5?'#3dd497':hpPct>0.25?'#f5c542':'#ff5e6c';
        ctx.fillRect(px-barW/2, barY, barW*dHp, 4);
        /* HP highlight for depth */
        ctx.fillStyle = 'rgba(255,255,255,.2)';
        ctx.fillRect(px-barW/2, barY, barW*dHp, 1);
        /* Low HP pulse — bar throbs red */
        if(hpPct < 0.25 && hpPct > 0){
          const hpThrob = Math.sin(now/200)*0.15+0.15;
          ctx.fillStyle = `rgba(255,50,50,${hpThrob})`;
          ctx.fillRect(px-barW/2-1, barY-1, barW+2, 6);
        }

        /* Stamina bar */
        const stPct = Math.max(0, (R.stamina||0) / (R.maxStamina||100));
        ctx.fillStyle = 'rgba(0,0,0,.5)';
        ctx.fillRect(px-barW/2, barY+6, barW, 3);
        ctx.fillStyle = stPct>0.3?'#f5c542':'#ea580c';
        ctx.fillRect(px-barW/2, barY+6, barW*stPct, 3);

        /* Mana bar */
        const mpPct = Math.max(0, (R.mana||0) / (R.maxMana||80));
        ctx.fillStyle = 'rgba(0,0,0,.5)';
        ctx.fillRect(px-barW/2, barY+10, barW, 3);
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(px-barW/2, barY+10, barW*mpPct, 3);

        /* XP bar — thin, subtle — glows when near level up */
        const xpPct = Math.min(1, R.xp / xpRequired(R.level));
        ctx.fillStyle = 'rgba(0,0,0,.3)';
        ctx.fillRect(px-barW/2, barY+14, barW, 2);
        ctx.fillStyle = '#a78bfa';
        ctx.fillRect(px-barW/2, barY+14, barW*xpPct, 2);
        /* Glow when >80% — pulsing purple aura */
        if(xpPct > 0.8){
          const xpGlow = Math.sin(now/250)*0.3+0.3;
          ctx.fillStyle = `rgba(167,139,250,${xpGlow})`;
          ctx.fillRect(px-barW/2-1, barY+13, barW+2, 4);
        }

        /* Level badge — dark pill with white text */
        const lvStr = 'Lv'+R.level;
        ctx.font = 'bold 8px "VT323", monospace';
        const lvTextW = ctx.measureText(lvStr).width;
        ctx.fillStyle = 'rgba(0,0,0,.6)';
        ctx.fillRect(px-lvTextW/2-3, barY-9, lvTextW+6, 10);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText(lvStr, px, barY-1);

        /* Invuln indicator — flickering ethereal shimmer */
        if(Date.now() < S.respawnTimer){
          /* Rapid flicker */
          const invAge = (S.respawnTimer - Date.now()) / RESPAWN_INVULN;
          const flicker = Math.sin(Date.now()/40)*0.5+0.5;
          ctx.globalAlpha = 0.15 + flicker*0.15;
          /* Pulsing shield bubble */
          const invPulse = 1+Math.sin(Date.now()/200)*0.1;
          ctx.strokeStyle = 'rgba(91,82,255,.5)';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(px, py+animBob, 22*invPulse, 0, Math.PI*2); ctx.stroke();
          /* Inner glow */
          ctx.fillStyle = 'rgba(91,82,255,.12)';
          ctx.beginPath(); ctx.arc(px, py+animBob, 20*invPulse, 0, Math.PI*2); ctx.fill();
          /* Orbiting sparkles */
          for(let iv=0;iv<3;iv++){
            const iva = Date.now()/300 + iv*Math.PI*2/3;
            ctx.fillStyle = `rgba(180,170,255,${0.4+flicker*0.4})`;
            ctx.beginPath(); ctx.arc(px+Math.cos(iva)*18, py+animBob+Math.sin(iva)*18, 1.5, 0, Math.PI*2); ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
        }
        /* Shield active — pulsing blue hexagonal barrier */
        if(Date.now() < S.shieldEnd){
          const shAge = (S.shieldEnd - Date.now()) / 2000;
          const shPulse = Math.sin(Date.now()/80)*0.15 + 0.85;
          ctx.save();
          ctx.globalAlpha = shAge * shPulse * 0.6;
          ctx.strokeStyle = '#60a5fa';
          ctx.lineWidth = 2.5;
          ctx.shadowColor = '#60a5fa';
          ctx.shadowBlur = 10;
          /* Hexagon */
          ctx.beginPath();
          for(let h=0;h<6;h++){
            const ha = h*Math.PI/3 - Math.PI/6 + Date.now()/800;
            const hx = px + Math.cos(ha)*22;
            const hy = py + animBob + Math.sin(ha)*22;
            if(h===0) ctx.moveTo(hx,hy); else ctx.lineTo(hx,hy);
          }
          ctx.closePath();
          ctx.stroke();
          /* Inner glow fill */
          ctx.fillStyle = `rgba(96,165,250,${shAge*0.12})`;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
          ctx.restore();
        }
        /* Stunned indicator — obvious with countdown */
        if(playerStunned){
          const stunLeft = Math.max(0, ((S._playerStunUntil||0)-Date.now())/1000);
          /* Dark overlay on character */
          ctx.fillStyle = 'rgba(0,0,0,.3)';
          ctx.beginPath(); ctx.arc(px, py+animBob, 18, 0, Math.PI*2); ctx.fill();
          /* Spinning stars — larger */
          ctx.font = '14px sans-serif';
          ctx.textAlign = 'center';
          const stunSpin = Date.now()/150;
          for(let s=0;s<4;s++){
            const sa = stunSpin + s*Math.PI*2/4;
            ctx.fillText('💫', px+Math.cos(sa)*18, py-22+animBob+Math.sin(sa)*5);
          }
          /* STUNNED text + countdown */
          ctx.font = 'bold 10px sans-serif';
          ctx.fillStyle = '#f5c542';
          ctx.fillText('STUNNED '+stunLeft.toFixed(1)+'s', px, py-36+animBob);
        }
      /* ── Chat bubbles above all players ── */
      const drawBubble = (bx, by, text) => {
        ctx.font = '11px sans-serif';
        const maxW = 140;
        /* Word wrap */
        const words = text.split(' ');
        const lines = [];
        let line = '';
        words.forEach(w => {
          const test = line ? line + ' ' + w : w;
          if(ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
          else line = test;
        });
        if(line) lines.push(line);
        if(lines.length > 3) { lines.length = 3; lines[2] = lines[2].slice(0,-3) + '...'; }

        const lineH = 14;
        const pad = 8;
        const bw = Math.min(maxW + pad*2, Math.max(...lines.map(l => ctx.measureText(l).width)) + pad*2);
        const bh = lines.length * lineH + pad*2;
        const tipH = 6;
        const bubbleY = by - 36 - bh;

        /* Bubble background */
        ctx.fillStyle = 'rgba(255,255,255,.92)';
        ctx.beginPath();
        const r = 8;
        const x1 = bx - bw/2, y1 = bubbleY, x2 = bx + bw/2, y2 = bubbleY + bh;
        ctx.moveTo(x1+r, y1);
        ctx.lineTo(x2-r, y1); ctx.arcTo(x2,y1,x2,y1+r,r);
        ctx.lineTo(x2, y2-r); ctx.arcTo(x2,y2,x2-r,y2,r);
        /* Tip */
        ctx.lineTo(bx+5, y2); ctx.lineTo(bx, y2+tipH); ctx.lineTo(bx-5, y2);
        ctx.lineTo(x1+r, y2); ctx.arcTo(x1,y2,x1,y2-r,r);
        ctx.lineTo(x1, y1+r); ctx.arcTo(x1,y1,x1+r,y1,r);
        ctx.fill();

        /* Text */
        ctx.fillStyle = '#1a1428';
        ctx.textAlign = 'center';
        lines.forEach((ln, i) => {
          ctx.fillText(ln, bx, bubbleY + pad + 11 + i * lineH);
        });
      };

      /* Draw bubbles (expire after 5s) */
      const bubbleNow = Date.now();
      /* Own bubble */
      const myBubble = S.chatBubbles[S.myId];
      if(myBubble && bubbleNow - myBubble.ts < 5000) {
        const alpha = Math.min(1, (5000 - (bubbleNow - myBubble.ts)) / 500);
        ctx.globalAlpha = alpha;
        drawBubble(px, py, myBubble.text);
        ctx.globalAlpha = 1;
      } else if(myBubble && bubbleNow - myBubble.ts >= 5000) {
        delete S.chatBubbles[S.myId];
      }
      /* Other players' bubbles */
      Object.entries(S.others).forEach(([pid, o]) => {
        const bubble = S.chatBubbles[pid];
        if(bubble && bubbleNow - bubble.ts < 5000) {
          const osx = o.renderX - cx, osy = o.renderY - cy;
          const alpha = Math.min(1, (5000 - (bubbleNow - bubble.ts)) / 500);
          ctx.globalAlpha = alpha;
          drawBubble(osx, osy, bubble.text);
          ctx.globalAlpha = 1;
        } else if(bubble && bubbleNow - bubble.ts >= 5000) {
          delete S.chatBubbles[pid];
        }
      });

      /* Draw NPCs */
      if(S.npcs){
        S.npcs.forEach(npc => {
          if(!npc.alive) return;
          const nx = npc.renderX - cx, ny = npc.renderY - cy;
          if(nx < -50 || nx > W+50 || ny < -50 || ny > H+50) return;
          const nDir = npc._facing || 'down';
          const nSide = nDir==='left'||nDir==='right';
          const nMoving = Math.abs(npc.x-npc.targetX)>4||Math.abs(npc.y-npc.targetY)>4;
          const nFp = now/120;
          const nBob = nMoving ? Math.sin(now/120)*1.5 : 0;
          const nny = ny + nBob;

          /* Shadow */
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath(); ctx.ellipse(nx, nny+22, 9, 3.5, 0, 0, Math.PI*2); ctx.fill();

          /* Body — simplified lego */
          const nTY = nny + 6;
          const nLS = nMoving ? Math.sin(nFp)*3 : 0;
          const nRS = nMoving ? Math.sin(nFp+Math.PI)*3 : 0;
          /* Legs */
          ctx.fillStyle = npc.bl;
          ctx.fillRect(nx-5, nTY+8+nLS, 4, 7);
          ctx.fillRect(nx+1, nTY+8+nRS, 4, 7);
          ctx.fillStyle = '#2a1a0e';
          ctx.fillRect(nx-6, nTY+14+nLS, 6, 2);
          ctx.fillRect(nx, nTY+14+nRS, 6, 2);
          /* Torso */
          ctx.fillStyle = npc.bt;
          ctx.fillRect(nx-6, nTY, 12, 8);
          /* Arms */
          const nLAY = nTY+1 + (nMoving?Math.sin(nFp+Math.PI)*2.5:0);
          const nRAY = nTY+1 + (nMoving?Math.sin(nFp)*2.5:0);
          ctx.fillStyle = npc.bt;
          ctx.fillRect(nx-9, nLAY, 3, 7);
          ctx.fillRect(nx+6, nRAY, 3, 7);
          ctx.fillStyle = '#f0c68a';
          ctx.fillRect(nx-8, nLAY+6, 2, 2);
          ctx.fillRect(nx+6, nRAY+6, 2, 2);

          /* Head — colored circle with NPC badge */
          ctx.fillStyle = npc.color;
          ctx.beginPath(); ctx.arc(nx, nny-4, 11, 0, Math.PI*2); ctx.fill();
          /* NPC HP bar */
          const nHpPct = npc.hp/npc.maxHp;
          ctx.fillStyle = 'rgba(0,0,0,.5)';
          ctx.fillRect(nx-12, nny-18, 24, 3);
          ctx.fillStyle = nHpPct>0.5?'#3dd497':nHpPct>0.25?'#f5c542':'#ff5e6c';
          ctx.fillRect(nx-12, nny-18, 24*nHpPct, 3);
          /* NPC indicator — small star */
          ctx.fillStyle = '#f5c542';
          ctx.font = '8px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('★', nx, nny-14);

          /* §19.1 Quest marker above NPC — ❗ for available, ❓ for turn-in ready */
          if(npc._questMarker){
            const qmPulse = Math.sin(now/300)*3;
            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = npc._questMarker==='❗' ? '#f5c542' : '#3dd497';
            ctx.fillText(npc._questMarker, nx, nny-32+qmPulse);
          }

          /* Name */
          ctx.font = 'bold 8px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = 'rgba(0,0,0,.5)';
          const nnw = ctx.measureText(npc.name).width;
          ctx.fillRect(nx-nnw/2-3, nny-26, nnw+6, 11);
          ctx.fillStyle = npc.color;
          ctx.fillText(npc.name, nx, nny-17);

          /* Chat bubble */
          if(npc.chatBubble){
            const age = Date.now() - npc.chatBubble.ts;
            const alpha = age > 4000 ? 1-(age-4000)/1000 : 1;
            if(alpha > 0){
              ctx.globalAlpha = alpha;
              drawBubble(nx, nny, npc.chatBubble.text);
              ctx.globalAlpha = 1;
            }
          }
        });
      }

      /* Draw emotes above players */
      const emoteNow = Date.now();
      /* Own emote */
      if(S.emote && emoteNow - S.emote.ts < 3000){
        const progress = (emoteNow - S.emote.ts) / 3000;
        const emoteY = py - 46 - progress * 15;
        const alpha = progress > 0.7 ? 1 - (progress - 0.7) / 0.3 : 1;
        const scale = progress < 0.1 ? progress / 0.1 : 1;
        ctx.globalAlpha = alpha;
        ctx.font = `${Math.round(24 * scale)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(S.emote.emoji, px, emoteY);
        ctx.globalAlpha = 1;
      }
      /* Other players' emotes */
      Object.entries(S.others).forEach(([pid, o]) => {
        if(o.emote && emoteNow - o.emote.ts < 3000){
          const osx = o.renderX - cx, osy = o.renderY - cy;
          const progress = (emoteNow - o.emote.ts) / 3000;
          const emoteY = osy - 46 - progress * 15;
          const alpha = progress > 0.7 ? 1 - (progress - 0.7) / 0.3 : 1;
          const scale = progress < 0.1 ? progress / 0.1 : 1;
          ctx.globalAlpha = alpha;
          ctx.font = `${Math.round(24 * scale)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(o.emote.emoji, osx, emoteY);
          ctx.globalAlpha = 1;
        }
      });

      /* Highlight nearby building with glowing border */
      if(S.nearBuilding !== null){
        const b = BUILDINGS[S.nearBuilding];
        const bsx = b.bx * TILE - cx;
        const bsy = b.by * TILE - cy;
        const bsw = b.bw * TILE;
        const bsh = b.bh * TILE;
        ctx.strokeStyle = `rgba(91,82,255,${0.4 + 0.2 * Math.sin(now/300)})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(bsx-1, bsy-1, bsw+2, bsh+2);
        /* Building icon + name below */
        ctx.font = 'bold 10px "Space Mono", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(91,82,255,.9)';
        ctx.fillText(b.icon + ' ' + b.label, bsx + bsw/2, bsy + bsh + 14);
      }

      /* Day/night tint overlay */
      if(nightAlpha > 0){
        ctx.fillStyle = isNight ? `rgba(10,10,40,${nightAlpha})` : `rgba(40,20,10,${nightAlpha})`;
        ctx.fillRect(0, 0, W, H);
      }

      /* ═══ ZONE ATMOSPHERE OVERLAY — element tint + vignette ═══ */
      const _zAtmo = ZONES[S.currentZone]?.atmosphere;
      if(_zAtmo){
        /* Full-screen element color wash */
        if(_zAtmo.tint){
          ctx.fillStyle = _zAtmo.tint;
          ctx.fillRect(0, 0, W, H);
        }
        /* Edge vignette — darker at edges for zone mood */
        if(_zAtmo.vignette){
          const vgr = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.7);
          vgr.addColorStop(0, 'rgba(0,0,0,0)');
          vgr.addColorStop(1, _zAtmo.vignette);
          ctx.fillStyle = vgr;
          ctx.fillRect(0, 0, W, H);
        }
      }

      /* ═══ DAMAGE FLASH — red screen pulse when hit ═══ */
      if(S.lastDamageTaken){
        const dmgAge = (Date.now() - S.lastDamageTaken) / 400;
        if(dmgAge < 1){
          const flashAlpha = (1-dmgAge) * 0.18;
          const dmgVgr = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.2, W/2, H/2, Math.max(W,H)*0.6);
          dmgVgr.addColorStop(0, `rgba(255,30,30,${flashAlpha*0.3})`);
          dmgVgr.addColorStop(1, `rgba(200,0,0,${flashAlpha})`);
          ctx.fillStyle = dmgVgr;
          ctx.fillRect(0, 0, W, H);
        }
      }

      /* ═══ BLOCK FLASH — blue screen pulse on successful shield block ═══ */
      if(S._blockFlash){
        const bfAge = (Date.now()-S._blockFlash)/250;
        if(bfAge < 1){
          ctx.fillStyle = `rgba(96,165,250,${(1-bfAge)*0.12})`;
          ctx.fillRect(0, 0, W, H);
        } else {
          S._blockFlash = null;
        }
      }

      /* ═══ LOW HP WARNING — pulsing red vignette when below 25% ═══ */
      if(S.rpg && S.rpg.hp < S.rpg.maxHp * 0.25 && S.rpg.hp > 0){
        const lowPulse = Math.sin(now/300)*0.5+0.5;
        const lowAlpha = 0.05 + lowPulse * 0.08;
        const lowVgr = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.25, W/2, H/2, Math.max(W,H)*0.55);
        lowVgr.addColorStop(0, 'rgba(0,0,0,0)');
        lowVgr.addColorStop(1, `rgba(180,0,0,${lowAlpha})`);
        ctx.fillStyle = lowVgr;
        ctx.fillRect(0, 0, W, H);
      }

      /* ═══ LEVEL UP FLASH — golden burst ═══ */
      if(S._levelUpFlash){
        const luAge = (Date.now()-S._levelUpFlash)/600;
        if(luAge < 1){
          ctx.fillStyle = `rgba(245,197,66,${(1-luAge)*0.15})`;
          ctx.fillRect(0, 0, W, H);
          /* Golden ring expanding from center */
          ctx.strokeStyle = `rgba(245,197,66,${(1-luAge)*0.4})`;
          ctx.lineWidth = (1-luAge)*4+1;
          ctx.beginPath(); ctx.arc(W/2, H/2, luAge*Math.max(W,H)*0.4, 0, Math.PI*2); ctx.stroke();
        } else {
          S._levelUpFlash = null;
        }
      }

      /* ═══ KILL SLOWMO OVERLAY — cinematic tint during time dilation ═══ */
      if(S._killSlowmo){
        const smAge = (Date.now()-S._killSlowmo)/(S._killSlowmoDuration||200);
        if(smAge < 1){
          /* Subtle dark overlay for drama */
          const smAlpha = smAge < 0.3 ? smAge/0.3 * 0.08 : (1-smAge)*0.08;
          ctx.fillStyle = `rgba(0,0,20,${smAlpha})`;
