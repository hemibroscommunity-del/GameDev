              S.swingTimer = Date.now() + (isStaff ? 300 : 0); /* Staff fires slower */
              BT_AUDIO.beep(isStaff?400:600, 0.04, 0.06, isStaff?'sine':'triangle');
            } else if(!S.isSwinging){
              S.swingTimer = Date.now();
              S.isSwinging = true;
              S._specialAttack = false;
            }
          }
        }
        if(S.isSwinging && Date.now()-S.swingTimer < 400){
          let baseAngle;
          if(S.lockedTarget && S.lockedTarget.ref){
            const lt = S.lockedTarget.ref;
            const tx = lt.x || lt.renderX || P.x;
            const ty = lt.y || lt.renderY || P.y;
            baseAngle = Math.atan2(ty-P.y, tx-P.x);
          } else if(S._aiming && S._aimAngle != null){
            baseAngle = S._aimAngle;
          } else {
            const swDir = S._facing||'down';
            baseAngle = swDir==='right'?0:swDir==='up'?-Math.PI/2:swDir==='left'?Math.PI:Math.PI/2;
          }
          /* Hit monsters */
          S.monsters.forEach(m=>{
            if(!m.alive || m._hitThisSwing) return;
            const mDist = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
            if(mDist > SWING_RANGE) return;
            const mAngle = Math.atan2(m.y-P.y, m.x-P.x);
            let angleDiff = mAngle - baseAngle;
            while(angleDiff > Math.PI) angleDiff -= Math.PI*2;
            while(angleDiff < -Math.PI) angleDiff += Math.PI*2;
            if(Math.abs(angleDiff) < SWING_ARC/2){
              m._hitThisSwing = true;
              const isCrit = Math.random() < critChance;
              const specialMult = S._specialAttack ? SPECIAL_ATK_MULT : 1;

              /* §9 — Apply element status on hit */
              const hitElement = S._specialAttack ? activeWpn.element2 : activeWpn.element1;
              if(hitElement){
                const statusId = ELEMENTS[hitElement]?.status;
                if(statusId){
                  const wasNew = !m.statuses?.[statusId];
                  applyStatus(m, statusId, S.player, Date.now());
                  const elemDef = ELEMENTS[hitElement];
                  /* §Stage 2: "Brief bright pop on first application. Then ambient." */
                  if(wasNew){
                    /* Flash ring at point of contact */
                    for(let ep=0;ep<8;ep++){
                      S.hitParticles.push({
                        x:m.x+(Math.random()-0.5)*4, y:m.y+(Math.random()-0.5)*4,
                        vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-1,
                        life:0.5, color:elemDef.color, size:1.5+Math.random()*2
                      });
                    }
                    /* Soft characteristic sound per element */
                    const pitches = {flame:350,frost:800,water:500,venom:280,storm:900,stone:200,wind:650,dark:120,light:1000};
                    BT_AUDIO.beep(pitches[hitElement]||400, 0.04, 0.06, 'sine');
                  }
                  /* §10.2 Effectiveness indicator — green/red arrow on hit */
                  if(m.element){
                    const eff = getEffectiveness(hitElement, m.element);
                    if(eff > 1.0){
                      S.dmgNumbers.push({x:m.x+12,y:m.y-10,text:'▲',color:'#3dd497',ts:Date.now()});
                      if(!R._questFlags) R._questFlags={};
                      R._questFlags.usedEffectiveness = true;
                    } else if(eff < 1.0){
                      S.dmgNumbers.push({x:m.x+12,y:m.y-10,text:'▼',color:'#ff5e6c',ts:Date.now()});
                    }
                  }
                }
              }

              /* §10.3 — Check for collision (two different elements on target) */
              let collisionResult = null;
              if(hitElement){
                collisionResult = resolveCollision(m, hitElement, S.player, R, Date.now());
              }

              let dmg = Math.round((isCrit ? pDmg*critMult : pDmg) * specialMult);
              /* Level-difference scaling — hard to kill monsters much higher level */
              const lvlDiff = (m.level||1) - (R.level||1);
              if(lvlDiff > 3) dmg = Math.max(1, Math.round(dmg * Math.max(0.1, 1 - lvlDiff*0.08)));
              m.curHp -= dmg;

              /* Collision damage + feedback */
              if(collisionResult){
                m.curHp -= collisionResult.damage;
                const coll = collisionResult.collision;
                const elemColor = ELEMENTS[collisionResult.triggerElement]?.color || '#fff';
                /* Collision burst damage number */
                S.dmgNumbers.push({x:m.x+8,y:m.y-35,text:'💥'+collisionResult.damage+' '+coll.name,color:elemColor,ts:Date.now()});
                /* Mana restore feedback */
                if(collisionResult.manaRestored > 0){
                  S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+collisionResult.manaRestored+' MP',color:'#3b82f6',ts:Date.now()});
                }
                /* Collision burst particles — element colored */
                for(let cp=0;cp<15;cp++){
                  S.hitParticles.push({
                    x:m.x+(Math.random()-0.5)*6, y:m.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-2,
                    life:0.8, color:elemColor, size:2+Math.random()*3
                  });
                }
                S.screenShake = Math.max(S.screenShake, 5);
                /* Codex discovery */
                const isNew = discoverCollision(coll.id);
                if(isNew){
                  S.dmgNumbers.push({x:P.x,y:P.y-65,text:'📖 NEW: '+coll.name+'!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                }
              }
              /* §Creative Vision — material-varied hit sound */
              BT_AUDIO.hitMaterial(m.archetype || m.type);
              /* Three-layer collision sound if collision fired */
              if(collisionResult){
                BT_AUDIO.collisionSound(collisionResult.setupElement, collisionResult.triggerElement, collisionResult.manaRestored);
              }
              /* §6 Hit Stop — freeze frame proportional to hit significance */
              if(collisionResult && isCrit){
                S._hitStopDuration = 120;
                S._hitStop = Date.now() + 120; /* Grand moment: collision + crit */
              } else if(collisionResult){
                S._hitStopDuration = 80;
                S._hitStop = Date.now() + 80; /* Collision burst */
              } else if(isCrit){
                S._hitStopDuration = 60;
                S._hitStop = Date.now() + 60; /* Critical hit */
              } else {
                /* Micro-stop on every hit — subtle weight */
                S._hitStopDuration = 25;
                S._hitStop = Date.now() + 25;
              }
              /* Knockback — §Creative Vision: proportional to hit weight */
              const kbAngle = Math.atan2(m.y-P.y, m.x-P.x);
              const kbForce = isCrit ? 14 : (S._specialAttack ? 10 : 6);
              /* Collision adds extra knockback */
              const collisionKb = collisionResult ? 4 : 0;
              m.x += Math.cos(kbAngle)*(kbForce+collisionKb);
              m.y += Math.sin(kbAngle)*(kbForce+collisionKb);
              /* Blood/impact particles */
              for(let p=0;p<(isCrit?35:20);p++){
                const spd = 1+Math.random()*5;
                const spray = (Math.random()-0.5)*1.5;
                S.hitParticles.push({
                  x:m.x+(Math.random()-0.5)*8, y:m.y+(Math.random()-0.5)*8,
                  vx:Math.cos(kbAngle+spray)*spd,
                  vy:Math.sin(kbAngle+spray)*spd-Math.random()*2,
                  life:1, color:isCrit?'#f5c542':(['#cc2233','#aa1122','#dd3344','#880011'])[Math.floor(Math.random()*4)],
                  size:isCrit?2+Math.random()*3:1.5+Math.random()*2
                });
              }
              /* Blood splatter on ground */
              for(let bs=0;bs<(isCrit?6:4);bs++) /* Blood splatter puddles */{
                S.hitParticles.push({
                  x:m.x+Math.cos(kbAngle)*(8+Math.random()*15), y:m.y+Math.sin(kbAngle)*(8+Math.random()*15),
                  vx:0, vy:0, life:1.5, color:'#880011', size:3+Math.random()*2
                });
              }
              /* Screen shake */
              S.screenShake = isCrit ? 6 : 3;
              /* Camera punch — directional kick toward the hit */
              if(isCrit || collisionResult){
                const cpAngle = Math.atan2(m.y-P.y, m.x-P.x);
                const cpForce = isCrit ? 12 : 8;
                S._camPunch = { dx:Math.cos(cpAngle)*cpForce, dy:Math.sin(cpAngle)*cpForce, ts:Date.now() };
              }
              /* Impact ring flash — expanding ring at point of contact */
              if(!S._impactRings) S._impactRings = [];
              S._impactRings.push({
                x:m.x, y:m.y, ts:Date.now(),
                color: isCrit ? '#f5c542' : (collisionResult ? (ELEMENTS[collisionResult.triggerElement]?.color||'#fff') : '#fff'),
                maxR: isCrit ? 30 : (collisionResult ? 25 : 16),
                duration: isCrit ? 250 : 150,
              });
              /* Damage number — scaled by significance */
              if(isCrit && collisionResult){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥⚡ '+dmg,color:'#f5c542',ts:Date.now()});
              } else if(isCrit){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥 '+dmg,color:'#f5c542',ts:Date.now()});
              } else {
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:''+dmg,color:'#fff',ts:Date.now()});
              }

              if(m.curHp <= 0){
                m.alive = false;
                m.respawnAt = Date.now() + 30000;
                m.statuses = {};

                /* §19.1 Quest kill tracking */
                if(R._questKills === undefined) R._questKills = {};
                Object.keys(QUEST_CHAINS).forEach(qid => {
                  if(R._quests?.[qid] === QUEST_STATUS.active) R._questKills[qid] = (R._questKills[qid]||0) + 1;
                });

                /* ═══ THE GRAND SLAM — §Creative Vision: scaled cinematic micro-event ═══ */
                /* Scale: fodder = small snap. brute/sentinel = dramatic. boss = full treatment. */
                const isGrandSlam = isCrit; /* critical kill = Grand Slam */
                const isBigEnemy = (m.archetype==='brute'||m.archetype==='sentinel'||m.archetype==='hexer');
                const killScale = isGrandSlam ? (isBigEnemy ? 3 : 2) : (isBigEnemy ? 1.5 : 1);

                /* ═══ KILL SLOWMO — brief time dilation on significant kills ═══ */
                if(isGrandSlam || isBigEnemy){
                  S._killSlowmo = Date.now();
                  S._killSlowmoDuration = isGrandSlam && isBigEnemy ? 300 : isGrandSlam ? 200 : 150;
                }

                /* Sound — proportional to significance */
                if(isGrandSlam){
                  BT_AUDIO.grandSlam();
                } else {
                  BT_AUDIO.deathBoom();
                }

                /* Screen shake — proportional */
                S.screenShake = Math.round(4 * killScale);

                /* Death particles — direction of the killing blow */
                const killAngle = Math.atan2(m.y-P.y, m.x-P.x);
                const partCount = Math.round(20 * killScale);
                const deathParts = [];
                for(let dp=0;dp<partCount;dp++){
                  /* Directional spray — particles fly in the kill direction */
                  const spread = (Math.random()-0.5) * 1.2;
                  const spd = (2 + Math.random()*6) * killScale;
                  deathParts.push({
                    x:m.x, y:m.y,
                    vx: Math.cos(killAngle+spread)*spd,
                    vy: Math.sin(killAngle+spread)*spd - Math.random()*3,
                    life:1, color: isGrandSlam ? '#f5c542' : m.color,
                    size: (1.5+Math.random()*2) * (isGrandSlam ? 1.5 : 1)
                  });
                }
                /* Extra debris for Grand Slam */
                if(isGrandSlam){
                  for(let gp=0;gp<10;gp++){
                    deathParts.push({
                      x:m.x, y:m.y,
                      vx: Math.cos(killAngle+(Math.random()-0.5)*0.8)*(5+Math.random()*8),
                      vy: -3-Math.random()*6,
                      life:1.5, color:(['#f5c542','#fff','#fbbf24','#fde68a'])[Math.floor(Math.random()*4)],
                      size: 2+Math.random()*4
                    });
                  }
                }
                S.deathExplosions.push({
                  x:m.x, y:m.y, ts:Date.now(), emoji:m.emoji, particles:deathParts,
                  isGrandSlam, killScale
                });

                /* Loot cascade — scattered in kill direction, then settles */
                const lootCount = isGrandSlam ? 3 : 1;
                const isRare = Math.random() < 0.02;
                for(let li=0;li<lootCount;li++){
                  const lootAngle = killAngle + (Math.random()-0.5)*1.0;
                  const lootDist = 15 + Math.random()*25 * killScale;
                  S.groundLoot.push({
                    x: m.x + Math.cos(lootAngle)*lootDist + (Math.random()-0.5)*10,
                    y: m.y + Math.sin(lootAngle)*lootDist + (Math.random()-0.5)*10,
                    coins: Math.ceil((isRare ? m.gold*10 : m.gold) / lootCount),
                    xp: Math.ceil((isRare ? m.xp*3 : m.xp) / lootCount),
                    skull: m.type, skullEmoji: m.emoji,
                    ts: Date.now() + li*80,
                    rare: isRare && li===0,
                  });
                }
                if(isRare){
                  S.dmgNumbers.push({x:m.x,y:m.y-50,text:'⭐ RARE DROP!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                  setTimeout(()=>BT_AUDIO.collect(),150);
                }

                /* §4.6 Weapon drops — chance scales with monster level and zone element */
                const dropChance = Math.min(0.15, 0.03 + (m.level||1)*0.001 + (isGrandSlam?0.05:0));
                if(Math.random() < dropChance){
                  /* Determine drop tier based on level and luck */
                  const zoneElem = ZONES[S.currentZone]?.element;
                  const secondaryElem = ZONES[S.currentZone]?.secondary;
                  let dropTier, dropE1, dropE2, dropName, dropVolatile=false;
                  const tierRoll = Math.random();

                  if(tierRoll < 0.55 || !zoneElem){
                    /* Common — no element */
                    dropTier = 'common';
                    dropE1 = null; dropE2 = null;
                  } else if(tierRoll < 0.88){
                    /* Elemental — zone's primary element */
                    dropTier = 'elemental';
                    dropE1 = zoneElem; dropE2 = null;
                  } else if(tierRoll < 0.98){
                    /* Fusion — zone primary + secondary */
                    dropTier = 'fusion';
                    dropE1 = zoneElem;
                    dropE2 = secondaryElem || ['flame','frost','water','venom','storm','stone','wind'].filter(e=>e!==zoneElem)[Math.floor(Math.random()*6)];
                    /* Check volatile */
                    const volPairs = [['flame','water'],['water','venom'],['venom','wind'],['wind','stone'],['stone','storm'],['storm','frost'],['frost','flame']];
                    dropVolatile = volPairs.some(([a,b])=>(dropE1===a&&dropE2===b)||(dropE1===b&&dropE2===a));
                  } else {
                    /* Shift — extremely rare adaptive */
                    dropTier = 'shift';
                    dropE1 = zoneElem; dropE2 = null;
                  }

                  /* Random weapon type */
                  const dropTypes = ['greatsword','sword','bow','staff'];
                  const dropType = dropTypes[Math.floor(Math.random()*dropTypes.length)];
                  const wpnLabel = WEAPON_TYPES[dropType].label;
                  const tierMult = RARITY_TIERS[dropTier].mult;
                  const tierColor = RARITY_TIERS[dropTier].color;

                  /* Build name */
                  if(dropTier==='common') dropName = wpnLabel;
                  else if(dropTier==='elemental') dropName = (dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+' '+wpnLabel;
                  else if(dropTier==='fusion') dropName = (dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+(dropE2.charAt(0).toUpperCase()+dropE2.slice(1))+' '+wpnLabel;
                  else dropName = 'Prismatic '+wpnLabel;

                  /* Add to ground loot as weapon drop */
                  const weaponDrop = {
                    x: m.x + (Math.random()-0.5)*20,
                    y: m.y + (Math.random()-0.5)*20,
                    ts: Date.now(),
                    isWeapon: true,
                    weapon: { type:dropType, tier:dropTier, tierMult, element1:dropE1, element2:dropE2, name:dropName, isVolatile:dropVolatile },
                    tierColor,
                  };
                  S.groundLoot.push(weaponDrop);

                  /* Drop announcement */
                  const tierLabel = RARITY_TIERS[dropTier].label;
                  S.dmgNumbers.push({x:m.x,y:m.y-60,text:'🗡️ '+tierLabel+' '+dropName+'!',color:tierColor,ts:Date.now()});
                  if(dropTier!=='common'){
                    BT_AUDIO.collect();
                    if(dropTier==='fusion'||dropTier==='shift') setTimeout(()=>BT_AUDIO.collect(),120);
                  }
                }

                if(isGrandSlam){
                  S.dmgNumbers.push({x:m.x,y:m.y-40,text:'GRAND SLAM!',color:'#fbbf24',ts:Date.now()});
                }

                /* Check level up — §6.2 tri-phase XP curve */
                while(R.xp >= xpRequired(R.level)){
                  R.xp -= xpRequired(R.level);
                  R.level++;
                  R.unspentT1 += 10;
                  R.unspentT2 += 10;
                  R.unspentPts = R.unspentT1 + R.unspentT2;
                  recalcDerived(R);
                  R.hp = R.maxHp; R.stamina = R.maxStamina; R.mana = R.maxMana;
                  setLevelUpMsg({level:R.level, ts:Date.now()});
                  BT_AUDIO.levelUp();
                }
                setRpgState({...R});
                try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                btRpc('bt_monster_kill',{p_id:getBtPlayerId(),p_monster_type:m.type,p_damage:dmg,p_is_crit:isCrit,p_is_special:!!S._specialAttack}).then(sr=>{if(sr&&sr.rpg){R.level=sr.rpg.level;R.xp=sr.rpg.xp;R.coins=sr.rpg.coins;R.unspentPts=sr.rpg.unspent_pts;setRpgState({...R});}});
              }
            }
          });
          /* §18 Gathering nodes — now use action button, not swing */
          /* Hit NPCs */
          if(S.npcs){
            S.npcs.forEach(npc=>{
              if(!npc.alive || npc._hitThisSwing) return;
              const nDist = Math.sqrt((npc.x-P.x)**2+(npc.y-P.y)**2);
              if(nDist > SWING_RANGE) return;
              const nAngle = Math.atan2(npc.y-P.y, npc.x-P.x);
              let naDiff = nAngle - baseAngle;
              while(naDiff>Math.PI) naDiff-=Math.PI*2;
              while(naDiff<-Math.PI) naDiff+=Math.PI*2;
              if(Math.abs(naDiff) < SWING_ARC/2){
                npc._hitThisSwing = true;
                const npcDmg = pDmg;
                npc.hp -= npcDmg;
                BT_AUDIO.thwack();
                const nkbA2 = Math.atan2(npc.y-P.y, npc.x-P.x);
                npc.x += Math.cos(nkbA2)*8; npc.y += Math.sin(nkbA2)*8;
                for(let np2=0;np2<10;np2++) S.hitParticles.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*4+Math.cos(nkbA2)*2,vy:(Math.random()-.5)*4-1,life:1,color:['#cc2233','#aa1122','#dd3344'][Math.floor(Math.random()*3)],size:1.5+Math.random()*2});
                S.screenShake = 2;
                const nkbA = Math.atan2(npc.y-P.y, npc.x-P.x);
                npc.x += Math.cos(nkbA)*5;
                npc.y += Math.sin(nkbA)*5;
                for(let np=0;np<8;np++){
                  S.hitParticles.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*4+Math.cos(nkbA)*2,vy:(Math.random()-.5)*4-1,life:1,color:'#cc2233',size:1.5+Math.random()*2});
                }
                S.dmgNumbers.push({x:npc.x,y:npc.y-20,text:''+npcDmg,color:'#fff',ts:Date.now()});
                S.screenShake = 2;
                if(npc.hp <= 0){
                  npc.alive = false;
                  npc.respawnAt = Date.now() + 10000;
                  BT_AUDIO.deathBoom();
                  S.screenShake = 5;
                  const ndParts = [];
                  for(let dp=0;dp<15;dp++) ndParts.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:1,color:npc.color,size:2+Math.random()*2});
                  S.deathExplosions.push({x:npc.x,y:npc.y,ts:Date.now(),emoji:'💀',particles:ndParts});
                  S.groundLoot.push({x:npc.x,y:npc.y,coins:5,xp:20,skull:'npc',skullEmoji:'💀',ts:Date.now()});
                  S.rpg.xp += 5;
                  S.dmgNumbers.push({x:npc.x,y:npc.y-35,text:'+5XP',color:'#60a5fa',ts:Date.now()});
                }
              }
            });
          }

          /* Hit other players (PvP) — §19 broadcast attack event */
          if(S.channel){
            const specialMult2 = S._specialAttack ? SPECIAL_ATK_MULT : 1;
            /* §19 PvP only works outside town and safe zones */
            const inSafeZone = ZONES[S.currentZone]?.safe;
            if(!inSafeZone){
              const pvpAngle = S.lockedTarget&&S.lockedTarget.type==='player'&&S.lockedTarget.ref
                ? Math.atan2((S.lockedTarget.ref.y||S.lockedTarget.ref.renderY||P.y)-P.y,(S.lockedTarget.ref.x||S.lockedTarget.ref.renderX||P.x)-P.x)
                : baseAngle;
              /* Track threat — attacking a player starts the threat counter */
              S._pvpThreat = Date.now() + PVP_THREAT_DURATION;
              if(S.channel) S.channel.send({type:'broadcast', event:'player_attack', payload:{
                id:S.myId, x:P.x, y:P.y, angle:pvpAngle,
                dmgBase:pDmg*specialMult2, critChance:critChance,
                range:wpnType.range||SWING_RANGE, arc:wpnType.arc||SWING_ARC, ts:Date.now(),
                inDuel:!!S._inDuel,
              }});
            }
          }
          /* Optimistic local visual — show slash effect on nearby players */
          Object.entries(S.others).forEach(([pid, o])=>{
            if(o._hitThisSwing) return;
            const oDist = Math.sqrt((o.x-P.x)**2+(o.y-P.y)**2);
            if(oDist > SWING_RANGE) return;
            const oAngle = Math.atan2(o.y-P.y, o.x-P.x);
            let aDiff = oAngle - baseAngle;
            while(aDiff > Math.PI) aDiff -= Math.PI*2;
            while(aDiff < -Math.PI) aDiff += Math.PI*2;
            if(Math.abs(aDiff) < SWING_ARC/2){
              o._hitThisSwing = true;
              BT_AUDIO.thwack();
              const pvpKbA = Math.atan2(o.y-P.y, o.x-P.x);
              for(let pp=0;pp<12;pp++) S.hitParticles.push({x:o.x+(Math.random()-.5)*6,y:o.y+(Math.random()-.5)*6,vx:Math.cos(pvpKbA+(Math.random()-.5)*1.5)*(1+Math.random()*3),vy:Math.sin(pvpKbA+(Math.random()-.5)*1.5)*(1+Math.random()*3)-1,life:1,color:['#cc2233','#aa1122'][Math.floor(Math.random()*2)],size:1.5+Math.random()*2});
              S.screenShake = 3;
              S.dmgNumbers.push({x:o.x,y:o.y-20,text:'⚔️',color:'#fff',ts:Date.now()});
            }
          });
        }
        if(Date.now()-S.swingTimer > 450) {
          S.isSwinging = false;
          S.monsters.forEach(m=>{ m._hitThisSwing=false; });
          if(S.npcs) S.npcs.forEach(n=>{ n._hitThisSwing=false; });
          Object.values(S.others).forEach(o=>{ o._hitThisSwing=false; });
        }

        /* Save RPG state periodically */
        if(!S._rpgSaveTimer) S._rpgSaveTimer=0;
        S._rpgSaveTimer++;
        if(S._rpgSaveTimer%180===0){
          try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
          syncRpgToServer(R);
        }
      }

      /* Pick up ground loot — walk over it */
      if(S.groundLoot){
        S.groundLoot = S.groundLoot.filter(loot=>{
          /* Expire after 60 seconds */
          if(Date.now()-loot.ts > 60000) return false;
          const lDist = Math.sqrt((P.x-loot.x)**2+(P.y-loot.y)**2);

          /* ═══ LOOT MAGNETISM — pull toward player when close ═══ */
          const magnetRange = 50;
          if(lDist < magnetRange && lDist > 20){
            const pullStrength = (1 - lDist/magnetRange) * 3;
            const pullAngle = Math.atan2(P.y-loot.y, P.x-loot.x);
            loot.x += Math.cos(pullAngle) * pullStrength;
            loot.y += Math.sin(pullAngle) * pullStrength;
          }

          if(lDist < 20){
            /* §4.6 Weapon drop pickup */
            if(loot.isWeapon && loot.weapon){
              const drop = loot.weapon;
              const wpnDef = WEAPON_TYPES[drop.type];
              const isRanged = wpnDef.type === 'ranged';
              const current = isRanged ? S.rpg.rangedWeapon : S.rpg.weapon;
              /* Auto-equip if strictly better tier, or show as equipped */
              const dropPower = drop.tierMult * (WEAPON_TYPES[drop.type]?.base||30);
              const curPower = (current?.tierMult||1) * (WEAPON_TYPES[current?.type||'greatsword']?.base||30);
              if(dropPower >= curPower){
                /* Equip the new weapon */
                if(isRanged) S.rpg.rangedWeapon = drop;
                else S.rpg.weapon = drop;
                S.dmgNumbers.push({x:loot.x,y:loot.y-20,text:'🗡️ EQUIPPED: '+drop.name,color:loot.tierColor||'#fff',ts:Date.now()});
                BT_AUDIO.collect();
                if(drop.tier==='fusion'||drop.tier==='shift'){
                  BT_AUDIO.beep(523,0.1,0.08,'sine');
                  setTimeout(()=>BT_AUDIO.beep(659,0.1,0.08,'sine'),100);
                  setTimeout(()=>BT_AUDIO.beep(784,0.15,0.1,'sine'),200);
                }
              } else {
                /* Weaker drop — sell for gold */
                const sellValue = Math.ceil(dropPower * 0.5);
                S.rpg.coins += sellValue;
                S.dmgNumbers.push({x:loot.x,y:loot.y-20,text:'+'+sellValue+'G (sold)',color:'#f5c542',ts:Date.now()});
                BT_AUDIO.beep(400,0.05,0.08,'sine');
              }
              setRpgState({...S.rpg});
              try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
              return false;
            }

            /* Normal loot pickup (gold + xp) */
            S.rpg.xp += loot.xp||0;
            S.rpg.coins += loot.coins||0;
            syncRpgToServer(S.rpg);
            if(loot.skull && S.rpg.inventory) S.rpg.inventory[loot.skull] = (S.rpg.inventory[loot.skull]||0)+1;
            if(loot.skull){
              if(!S.rpg.skulls) S.rpg.skulls = {};
              S.rpg.skulls[loot.skull] = (S.rpg.skulls[loot.skull]||0) + 1;
            }
            if(loot.xp) S.dmgNumbers.push({x:loot.x,y:loot.y-15,text:'+'+loot.xp+'XP',color:'#60a5fa',ts:Date.now()});
            if(loot.coins) S.dmgNumbers.push({x:loot.x+12,y:loot.y-8,text:'+'+loot.coins+'G',color:'#f5c542',ts:Date.now()});
            BT_AUDIO.beep(500,0.06,0.1,'sine');
            /* ═══ LOOT PICKUP SPARKLE — gold/blue particles burst upward ═══ */
            for(let lsp=0;lsp<8;lsp++){
              const lspA = (lsp/8)*Math.PI*2;
              S.hitParticles.push({
                x:loot.x, y:loot.y,
                vx:Math.cos(lspA)*(1+Math.random()*2), vy:-1.5-Math.random()*3,
                life:0.6, color:lsp%2===0?'#f5c542':'#60a5fa', size:1.5+Math.random()
              });
            }
            /* Check level up — §6.2 tri-phase */
            while(S.rpg.xp >= xpRequired(S.rpg.level)){
              S.rpg.xp -= xpRequired(S.rpg.level);
              S.rpg.level++;
              S.rpg.unspentT1 = (S.rpg.unspentT1||0) + 10;
              S.rpg.unspentT2 = (S.rpg.unspentT2||0) + 10;
              S.rpg.unspentPts = S.rpg.unspentT1 + S.rpg.unspentT2;
              recalcDerived(S.rpg);
              S.rpg.hp = S.rpg.maxHp; S.rpg.stamina = S.rpg.maxStamina; S.rpg.mana = S.rpg.maxMana;
              setLevelUpMsg({level:S.rpg.level, ts:Date.now()});
              BT_AUDIO.collect();
              /* ═══ LEVEL UP BURST — celebratory particle explosion ═══ */
              S.screenShake = 8;
              S._levelUpFlash = Date.now();
              for(let lp=0;lp<40;lp++){
                const lpAngle = (lp/40)*Math.PI*2;
                const lpSpd = 3+Math.random()*5;
                S.hitParticles.push({
                  x:P.x, y:P.y,
                  vx:Math.cos(lpAngle)*lpSpd, vy:Math.sin(lpAngle)*lpSpd-2,
                  life:1.2, color:(['#f5c542','#fbbf24','#60a5fa','#3dd497','#a78bfa','#fff'])[Math.floor(Math.random()*6)],
                  size:2+Math.random()*3
                });
              }
              /* Rising level text */
              S.dmgNumbers.push({x:P.x,y:P.y-50,text:'⬆️ LEVEL '+S.rpg.level+'!',color:'#f5c542',ts:Date.now()});
              S.dmgNumbers.push({x:P.x,y:P.y-35,text:'HP/MANA RESTORED',color:'#3dd497',ts:Date.now()});
              /* Ascending chime */
              BT_AUDIO.beep(523,0.1,0.08,'sine');
              setTimeout(()=>BT_AUDIO.beep(659,0.08,0.06,'sine'),100);
              setTimeout(()=>BT_AUDIO.beep(784,0.08,0.06,'sine'),200);
              setTimeout(()=>BT_AUDIO.beep(1047,0.12,0.1,'sine'),300);
            }
            setRpgState({...S.rpg});
            try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
            return false; /* remove loot */
          }
          return true;
        });
      }

      /* §3.2 HP regeneration — OOC: 1.5%/s after 5s no damage. Restoration scales. */
      if(S.rpg && S.lastDamageTaken && Date.now()-S.lastDamageTaken > 5000){
        const R = S.rpg;
        /* §18.1 Food buff multipliers */
        const hasRegenBuff = S._regenBuff && Date.now() < S._regenBuff;
        const hasHpBuff = S._hpBuff && Date.now() < S._hpBuff;
        const hasManaBuff = S._manaBuff && Date.now() < S._manaBuff;
        const regenMult = hasRegenBuff ? 1.3 : 1.0;

        if(R.hp < R.maxHp){
          if(!S._regenTimer) S._regenTimer = 0;
          S._regenTimer++;
          const restMult = 1 + (R.restoration || 0) * 0.001;
          if(S._regenTimer % 4 === 0){
            const healAmt = Math.max(1, Math.ceil(R.maxHp * 0.001 * restMult * regenMult));
            const effectiveMax = hasHpBuff ? Math.floor(R.maxHp * 1.25) : R.maxHp;
            R.hp = Math.min(effectiveMax, R.hp + healAmt);
            setRpgState({...R});
          }
        }
        /* Stamina regen — §3.3: 20/s base × Restoration */
        if(R.stamina < R.maxStamina){
          const stRestMult = 1 + (R.restoration || 0) * 0.001;
          R.stamina = Math.min(R.maxStamina, R.stamina + 20/60 * stRestMult * regenMult);
        }
        /* Mana regen — §3.4: OOC 2.5%/s after 2s × Restoration */
        if(R.mana < R.maxMana && Date.now()-S.lastDamageTaken > 2000){
          const mRestMult = 1 + (R.restoration || 0) * 0.001;
          const manaRegenMult = hasManaBuff ? 1.3 : 1.0;
          R.mana = Math.min(R.maxMana, R.mana + R.maxMana * 0.0004 * mRestMult * manaRegenMult);
        }
      } else if(S.rpg){
        /* In-combat regen — §3.2: 0.3%/s HP, stamina regens always */
        const R = S.rpg;
        if(R.hp < R.maxHp){
          if(!S._regenTimer) S._regenTimer = 0;
          S._regenTimer++;
          if(S._regenTimer % 10 === 0){
            const healAmt = Math.max(1, Math.ceil(R.maxHp * 0.0005));
            R.hp = Math.min(R.maxHp, R.hp + healAmt);
          }
        }
        /* Stamina always regens after 1s delay */
        if(R.stamina < R.maxStamina){
          R.stamina = Math.min(R.maxStamina, R.stamina + 20/60);
        }
        /* Slow mana regen in combat — 1%/s */
        if(R.mana < R.maxMana){
          R.mana = Math.min(R.maxMana, R.mana + R.maxMana * 0.00017);
        }
      }

      /* Expire damage numbers */
      if(S.dmgNumbers) S.dmgNumbers = S.dmgNumbers.filter(d=>Date.now()-d.ts<1200);

      /* §15 Tutorial progression — teach by doing */
      if(S._tutorialStep >= 0 && S._tutorialStep < 8){
        const moved = Math.abs(dx)>0.01||Math.abs(dy)>0.01;
        if(S._tutorialStep===0 && moved){
          /* Step 0→1: Player moved! */
          setTutorialStep(1);
          try{localStorage.setItem('bt_tutorial','1');}catch(e){}
        }
        if(S._tutorialStep===1 && (S._dodgeRoll || S._hasDodged)){
          /* Step 1→2: Player dodged! */
          setTutorialStep(2);
          try{localStorage.setItem('bt_tutorial','2');}catch(e){}
        }
        if(S._tutorialStep===2 && S.isSwinging){
          /* Step 2→3: Player attacked! */
          setTutorialStep(3);
          try{localStorage.setItem('bt_tutorial','3');}catch(e){}
        }
        if(S._tutorialStep===3 && S.monsters?.some(m=>!m.alive)){
          /* Step 3→4: Player killed a monster! */
          setTutorialStep(4);
          try{localStorage.setItem('bt_tutorial','4');}catch(e){}
        }


        if(S._tutorialStep===4 && S.currentZone !== 'town'){
          /* Step 4→5: Left town! */
          setTutorialStep(5);
          try{localStorage.setItem('bt_tutorial','5');}catch(e){}
        }
        if(S._tutorialStep===5 && (S.rpg?.level||1) >= 3){
          /* Step 7→8: Reached level 3 */
          setTutorialStep(7);
          try{localStorage.setItem('bt_tutorial','7');}catch(e){}
        }
        if(S._tutorialStep===6){
          /* Tutorial complete */
          setTutorialStep(10);
          try{localStorage.setItem('bt_tutorial','10');}catch(e){}
        }
      }

      /* Camera centers player in game area — with directional lead */
      const _camLead = 30; /* pixels ahead in movement direction */
      const _camLeadX = (Math.abs(dx)>0.1 ? dx * _camLead : 0);
      const _camLeadY = (Math.abs(dy)>0.1 ? dy * _camLead : 0);
      /* Camera punch — directional kick on big hits */
      let _camPunchX = 0, _camPunchY = 0;
      if(S._camPunch){
        const cpAge = (Date.now() - S._camPunch.ts) / 300;
        if(cpAge < 1){
          const cpDecay = 1 - cpAge*cpAge; /* ease-out */
          _camPunchX = S._camPunch.dx * cpDecay;
          _camPunchY = S._camPunch.dy * cpDecay;
        } else {
          S._camPunch = null;
        }
      }
      const camTargetX = P.x - W/2 + _camLeadX + _camPunchX;
      const camTargetY = P.y - H/2 + _camLeadY + _camPunchY;
      /* Adaptive lerp — snappier during fast movement / combat */
      const _camSpeed = (S.isSwinging || S._dodgeRoll) ? 0.18 : (Math.abs(dx)>0.5||Math.abs(dy)>0.5) ? 0.14 : 0.08;
      S.camera.x += (camTargetX - S.camera.x) * _camSpeed;
      S.camera.y += (camTargetY - S.camera.y) * _camSpeed;
      S.camera.x = Math.max(0, Math.min(TOWN_W - W, S.camera.x));
      S.camera.y = Math.max(0, Math.min(TOWN_H - H, S.camera.y));

      /* Broadcast position ~10fps */
      const now = performance.now();
      if(now - S.lastBroadcast > 250 && (dx||dy)) {
        S.lastBroadcast = now;
        if(S.channel) {
          if(S.channel && (!S._lastMoveBroadcast || Date.now()-S._lastMoveBroadcast > 200)) { S._lastMoveBroadcast=Date.now(); S.channel.send({type:'broadcast', event:'move', payload:{id:S.myId, x:P.x, y:P.y, dir:P.dir}}); }
          if(S.channel && (!S._lastTrack || Date.now()-S._lastTrack > 2000)) { S._lastTrack=Date.now(); S.channel.track({x:P.x,y:P.y,name:S.myName,color:S.myColor,avatar:S.myAvatar,dir:P.dir,bt:S.bodyTorso,bl:S.bodyLegs,rpgLv:S.rpg?.level||1,rpgHp:S.rpg?.hp||50,rpgMaxHp:S.rpg?.maxHp||50,bs:S.bodySize||'slim',
            zone:S.currentZone||'town',
            wpnType:getActiveWeapon(S.rpg)?.type||'greatsword',
            wpnE1:getActiveWeapon(S.rpg)?.element1||null,
            wpnE2:getActiveWeapon(S.rpg)?.element2||null,
            rep:S._pvpReputation||'neutral',
            pet:S.rpg?.lifeSkills?.activePet!=null?S.rpg.lifeSkills.pets?.[S.rpg.lifeSkills.activePet]?.emoji:null,
          }); }
        }
      }
      /* Attack energy recharge */
      S._atkEnergy = S._atkEnergy ?? 100;
      if(S._atkEnergy < 100) S._atkEnergy = Math.min(100, S._atkEnergy + 0.5);


      /* §2.3 Shield — drains stamina while held. Block uses stamina from player resource pool. */
      if(S._shieldUp && S.rpg){
        /* Passive stamina drain while blocking: 5/sec at 60fps = ~0.083/frame */
        S.rpg.stamina = Math.max(0, (S.rpg.stamina||0) - 0.083);
        /* Also set shieldEnd for legacy code that checks Date.now() < S.shieldEnd */
        S.shieldEnd = Date.now() + 100;
        if(S.rpg.stamina <= 0){
          S.rpg.stamina = 0;
          S._shieldUp = false;
          S._shieldCdUntil = Date.now() + 3000; /* 3s cooldown when fully drained */
          S.shieldEnd = 0;
        }
        /* Update legacy _shieldStamina for ring indicator (0-3000 scale) */
        S._shieldStamina = (S.rpg.stamina / S.rpg.maxStamina) * 3000;
      } else {
        /* Stamina regens via the regen system above — just update the ring indicator */
        if(S.rpg) S._shieldStamina = ((S.rpg.stamina||0) / (S.rpg.maxStamina||100)) * 3000;
        S.shieldEnd = 0;
      }

      /* ── RENDER ── */
      /* Screen shake */
      let shakeX=0, shakeY=0;
      if(S.screenShake > 0.1){
        shakeX = (Math.random()-0.5)*S.screenShake*2;
        shakeY = (Math.random()-0.5)*S.screenShake*2;
        S.screenShake *= 0.85; /* decay */
      } else { S.screenShake = 0; }
      ctx.save();
      ctx.translate(shakeX, shakeY);
      ctx.clearRect(-10,-10,W+20,H+20);
      const cx = S.camera.x, cy = S.camera.y;

      /* Tiles */
      const startCol = Math.max(0,Math.floor(cx/TILE));
      const endCol = Math.min(COLS-1, Math.floor((cx+W)/TILE));
      const startRow = Math.max(0,Math.floor(cy/TILE));
      const endRow = Math.min(ROWS-1, Math.floor((cy+H)/TILE));

      /* Day/night cycle — based on real time */
      const hours = new Date().getHours() + new Date().getMinutes()/60;
      const isNight = hours < 6 || hours > 20;
      const isDusk = (hours >= 18 && hours <= 20) || (hours >= 5 && hours < 7);
      const nightAlpha = isNight ? 0.35 : isDusk ? 0.15 : 0;
      const zoneElem = ZONES[S.currentZone]?.element || null;

      for(let r=startRow;r<=endRow;r++){
        for(let cl=startCol;cl<=endCol;cl++){
          const tile = map[r]?.[cl];
          if(tile===undefined) continue;
          const sx = cl*TILE - cx, sy = r*TILE - cy;

          /* Zone-tinted base colors */
          if(tile===0||tile===5){
            /* Grass — zone palette with subtle texture variation */
            const baseGreen = getTileColor(0, S.currentZone);
            const shade = ((cl*17+r*31)%5);
            ctx.fillStyle = baseGreen;
            ctx.fillRect(sx, sy, TILE+1, TILE+1);
            /* Grass texture — small darker/lighter patches */
            ctx.fillStyle = `rgba(0,0,0,${0.02+shade*0.01})`;
            if(shade<2) ctx.fillRect(sx+4+shade*3,sy+2+shade*5,6,5);
            if(shade>2) ctx.fillRect(sx+12+shade*2,sy+14+shade*3,5,4);

            /* ═══ ZONE-SPECIFIC GROUND DETAILS ═══ */
            const _ze = zoneElem;
            if(_ze==='flame'){
              /* Scorched cracks and ember glow spots */
              if((cl*13+r*29)%7===0){
                ctx.strokeStyle='rgba(180,60,10,.2)'; ctx.lineWidth=0.5;
                ctx.beginPath(); ctx.moveTo(sx+4,sy+6); ctx.lineTo(sx+TILE-3,sy+TILE-4); ctx.stroke();
              }
              if((cl+r*3)%11===0){
                ctx.fillStyle=`rgba(255,100,20,${0.08+Math.sin(now/800+cl+r)*0.04})`;
                ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,3+Math.sin(now/600+cl)*1,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='frost'){
              /* Ice crystal patterns on ground */
              if((cl*7+r*11)%5===0){
                ctx.fillStyle='rgba(200,230,255,.12)';
                ctx.fillRect(sx+8,sy+4,8,2); ctx.fillRect(sx+11,sy+2,2,6);
              }
              /* Frost sparkle */
              if((cl+r)%9===0){
                const fsp=Math.sin(now/400+cl*2+r)*0.5+0.5;
                ctx.fillStyle=`rgba(220,240,255,${fsp*0.2})`;
                ctx.beginPath(); ctx.arc(sx+10+cl%8,sy+12+r%6,1,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='venom'){
              /* Toxic puddle sheen and spore dots */
              if((cl*9+r*17)%13===0){
                ctx.fillStyle='rgba(60,180,60,.08)';
                ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,5,0,Math.PI*2); ctx.fill();
              }
              if((cl+r*5)%7===0){
                ctx.fillStyle='rgba(80,220,80,.15)';
                ctx.beginPath(); ctx.arc(sx+6+cl%12,sy+8+r%10,1,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='storm'){
              /* Lightning scorch marks */
              if((cl*11+r*23)%17===0){
                ctx.strokeStyle='rgba(140,100,200,.15)'; ctx.lineWidth=0.7;
                ctx.beginPath(); ctx.moveTo(sx+TILE/2,sy+2);
                ctx.lineTo(sx+TILE/2+3,sy+TILE/2); ctx.lineTo(sx+TILE/2-2,sy+TILE-3); ctx.stroke();
              }
            } else if(_ze==='stone'){
              /* Gravel texture and mineral glints */
              if((cl+r)%3===0){
                ctx.fillStyle='rgba(100,90,70,.12)';
                ctx.fillRect(sx+3+cl%5,sy+4+r%6,3,2); ctx.fillRect(sx+14+cl%4,sy+16+r%3,2,2);
              }
            } else if(_ze==='wind'){
              /* Wind streaks — horizontal lines */
              if((cl+r*3)%5===0){
                ctx.strokeStyle='rgba(180,200,220,.1)'; ctx.lineWidth=0.5;
                ctx.beginPath(); ctx.moveTo(sx,sy+10+r%8); ctx.lineTo(sx+TILE,sy+8+r%10); ctx.stroke();
              }
            } else if(_ze==='water'){
              /* Damp sheen */
              if((cl*3+r*7)%5===0){
                ctx.fillStyle='rgba(60,140,200,.06)';
                ctx.fillRect(sx+2,sy+6,TILE-4,3);
              }
            } else if(_ze==='dark'){
              /* Creeping shadow tendrils */
              if((cl+r*7)%6===0){
                ctx.fillStyle=`rgba(20,10,40,${0.12+Math.sin(now/1200+cl*3+r*5)*0.06})`;
                ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,4+Math.sin(now/900+r)*2,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='light'){
              /* Golden shimmer patches */
              if((cl+r*3)%5===0){
                const gShim=Math.sin(now/600+cl*2+r*3)*0.5+0.5;
                ctx.fillStyle=`rgba(245,200,60,${gShim*0.08})`;
                ctx.fillRect(sx+4,sy+4,TILE-8,TILE-8);
              }
            } else {
              /* Default grass blades for town/meadow */
              if((cl+r*7)%3===0){
                ctx.strokeStyle = 'rgba(80,160,50,.15)';
                ctx.lineWidth = 0.5;
                const gx = sx+8+(cl*13%12), gy = sy+20+(r*17%8);
                ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx+Math.sin(now/1500+cl)*1,gy-4); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(gx+3,gy+1); ctx.lineTo(gx+3+Math.sin(now/1800+r)*1,gy-3); ctx.stroke();
              }
            }
          } else if(tile===8){
            /* Zone exit — glowing portal */
            const pulse = Math.sin(now/300 + cl + r)*0.15 + 0.85;
            const exit = TOWN_EXITS.find(ex => Math.abs(ex.tx-cl)<=1 && Math.abs(ex.ty-r)<=1);
            ctx.fillStyle = exit ? exit.color : '#5b52ff';
            ctx.globalAlpha = pulse * 0.6;
            ctx.fillRect(sx-2, sy-2, TILE+5, TILE+5);
            ctx.globalAlpha = 1.0;
          } else if(tile===9){
            /* Return to town exit — green glow */
            const pulse = Math.sin(now/400 + cl)*0.2 + 0.8;
            ctx.fillStyle = '#3dd497';
            ctx.globalAlpha = pulse * 0.5;
            ctx.fillRect(sx-2, sy-2, TILE+5, TILE+5);
            ctx.globalAlpha = 1.0;
          } else if(tile === 10){
            /* Dungeon entrance — dramatic swirling portal */
            const dPulse = Math.sin(now/250 + cl*2)*0.25 + 0.75;
            const _dElemCol = _mmZone?.element ? (ELEMENTS[_mmZone.element]?.color||'#ff5e6c') : '#ff5e6c';
            /* Outer glow — zone element colored */
            ctx.fillStyle = _dElemCol;
            ctx.globalAlpha = dPulse * 0.15;

              ctx.fillStyle = cwalls[cShade];
              ctx.fillRect(sx, sy, TILE+1, TILE+1);
              /* Layered sediment lines */
              ctx.strokeStyle='rgba(0,0,0,.1)'; ctx.lineWidth=0.5;
              ctx.beginPath(); ctx.moveTo(sx,sy+TILE/3); ctx.lineTo(sx+TILE,sy+TILE/3+2); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(sx,sy+TILE*2/3); ctx.lineTo(sx+TILE,sy+TILE*2/3-1); ctx.stroke();
              /* Mineral glint */
              if((cl+r*3)%7===0){
                ctx.fillStyle=`rgba(200,180,120,${Math.sin(now/700+cl*3)*0.1+0.1})`;
                ctx.beginPath(); ctx.arc(sx+8+cl%8,sy+10+r%6,1.5,0,Math.PI*2); ctx.fill();
              }
            } else if(zoneElem==='light'){
              /* CRYSTAL SPIRE — golden translucent */
              ctx.fillStyle='#b0a060';
              ctx.fillRect(sx, sy, TILE+1, TILE+1);
              ctx.fillStyle=`rgba(255,220,80,${0.15+Math.sin(now/400+cl+r)*0.08})`;
              ctx.fillRect(sx+2,sy+2,TILE-3,TILE-3);
              ctx.fillStyle='rgba(255,255,200,.12)'; ctx.fillRect(sx+3,sy+2,4,TILE-4);
            } else if(zoneElem==='dark'){
              /* DARK ALTAR — black stone with purple runes */
              ctx.fillStyle='#1a1520';
              ctx.fillRect(sx, sy, TILE+1, TILE+1);
              ctx.strokeStyle=`rgba(100,40,160,${0.2+Math.sin(now/600+cl*2+r)*0.1})`; ctx.lineWidth=0.7;
              ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,5,0,Math.PI*2); ctx.stroke();
            } else if(zoneElem==='water'){
              /* CORAL — reddish rock with organic texture */
              const coShade=((cl*7+r*13)%3);
              const corals=['#8a4a5a','#7a5a4a','#9a5060'];
              ctx.fillStyle=corals[coShade];
              ctx.fillRect(sx, sy, TILE+1, TILE+1);
              ctx.fillStyle='rgba(255,150,140,.1)';
              ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,4,0,Math.PI*2); ctx.fill();
            } else {
              /* Default stone */
              const stoneShade = ((cl*11+r*7)%4);
              const stones = ['#6b6b6b','#5a5a5a','#7a7a7a','#636363'];
              ctx.fillStyle = stones[stoneShade];
              ctx.fillRect(sx, sy, TILE+1, TILE+1);
              ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.lineWidth = 0.5;
              ctx.beginPath(); ctx.moveTo(sx+5,sy+8); ctx.lineTo(sx+TILE-8,sy+TILE-6); ctx.stroke();
              ctx.fillStyle = 'rgba(255,255,255,.06)'; ctx.fillRect(sx+2,sy+2,TILE/2,TILE/3);
            }
          }
        }
      }

      /* Ambient particles — fireflies at night, leaves during day */
      if(!S._particles) S._particles = Array.from({length:40},()=>({
        x:Math.random()*TOWN_W, y:Math.random()*TOWN_H,
        vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
        phase:Math.random()*Math.PI*2, size:Math.random()*2+1
      }));
      S._particles.forEach(p=>{
        p.x += p.vx; p.y += p.vy;
        if(p.x<0) p.x=TOWN_W; if(p.x>TOWN_W) p.x=0;
        if(p.y<0) p.y=TOWN_H; if(p.y>TOWN_H) p.y=0;
        const ppx = p.x - cx, ppy = p.y - cy;
        if(ppx<-10||ppx>W+10||ppy<-10||ppy>H+10) return;
        if(isNight){
          /* Fireflies */
          const glow = Math.sin(now/400+p.phase)*0.5+0.5;
          ctx.fillStyle = `rgba(200,255,100,${glow*0.6})`;
          ctx.beginPath();
          ctx.arc(ppx, ppy, p.size, 0, Math.PI*2);
          ctx.fill();
          /* Glow halo */
          ctx.fillStyle = `rgba(200,255,100,${glow*0.15})`;
          ctx.beginPath();
          ctx.arc(ppx, ppy, p.size*3, 0, Math.PI*2);
          ctx.fill();
        } else {
          /* Floating dust/pollen */
          const a = Math.sin(now/600+p.phase)*0.3+0.3;
          ctx.fillStyle = `rgba(255,255,200,${a})`;
          ctx.beginPath();
          ctx.arc(ppx, ppy, p.size*0.7, 0, Math.PI*2);
          ctx.fill();
        }
      });

      /* Render collectibles */
      if(S.collectibles){
        S.collectibles.forEach(item=>{
          if(item.collected) return;
          const ix = item.x - cx, iy = item.y - cy;
          if(ix < -30 || ix > W+30 || iy < -30 || iy > H+30) return;
          /* Floating bob */
          const bob = Math.sin(now/400 + item.x) * 3;
          /* Glow circle */
          ctx.fillStyle = 'rgba(245,197,66,.15)';
          ctx.beginPath();
          ctx.arc(ix, iy + bob, 12, 0, Math.PI*2);
          ctx.fill();
          /* Sparkle ring */
          const sparkleA = Math.sin(now/300 + item.y) * 0.3 + 0.5;
          ctx.strokeStyle = `rgba(245,197,66,${sparkleA})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(ix, iy + bob, 10 + Math.sin(now/500)*2, 0, Math.PI*2);
          ctx.stroke();
          /* Emoji */
          ctx.font = '16px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(item.emoji, ix, iy + bob + 5);
        });
      }

      /* Render player trail */
      if(S.trail.length > 1){
        for(let i=0;i<S.trail.length;i++){
          const t = S.trail[i];
          const age = (now - t.ts) / 800; /* 0 to 1 */
          if(age >= 1) continue;
          const tx = t.x - cx, ty = t.y - cy;
          const alpha = (1 - age) * 0.4;
          const size = (1 - age) * 4 + 1;
          ctx.fillStyle = `rgba(91,82,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(tx, ty + 8, size, 0, Math.PI*2);
          ctx.fill();
        }
      }

      /* Building signs — large prominent signboards (town only) */
      if(S.currentZone === 'town') BUILDINGS.forEach((b,bi)=>{
        const bsx = (b.bx+b.bw/2)*TILE - cx;
        const bsy = b.by*TILE - cy - 6;
        if(bsx<-150||bsx>W+150||bsy<-80||bsy>H+80) return;
        const isNear = S.nearBuilding === bi;

        /* Sign board — larger, with shadow */
        ctx.font = 'bold 11px "Space Mono", monospace';
        ctx.textAlign = 'center';
        const labelText = b.label;
        const tw = ctx.measureText(labelText).width;
        const signW = Math.max(tw + 36, 70);
        const signH = 24;
        const signR = 6;
        const signY = bsy - signH - 4;

        /* Sign shadow */
        ctx.fillStyle = 'rgba(0,0,0,.25)';
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2+2, signY+2, signW, signH, signR);
        ctx.fill();

        /* Sign background */
        ctx.fillStyle = isNear ? 'rgba(91,82,255,.9)' : 'rgba(20,15,30,.85)';
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2, signY, signW, signH, signR);
        ctx.fill();

        /* Sign border */
        ctx.strokeStyle = isNear ? 'rgba(255,255,255,.5)' : 'rgba(245,197,66,.4)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2, signY, signW, signH, signR);
        ctx.stroke();

        /* Sign post — thin line from sign to building */
        ctx.strokeStyle = 'rgba(100,80,60,.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bsx, signY+signH);
        ctx.lineTo(bsx, bsy);
        ctx.stroke();

        /* Icon */
        ctx.font = '14px sans-serif';
        ctx.fillText(b.icon, bsx - tw/2 - 6, signY + signH - 6);

        /* Label text */
        ctx.font = 'bold 10px "Space Mono", monospace';
        ctx.fillStyle = isNear ? '#fff' : '#f5c542';
        ctx.fillText(labelText, bsx + 6, signY + signH - 8);

        /* "TAP TO ENTER" hint when near — pulsing */
        if(isNear && b.action){
          const pulse = Math.sin(now/300)*0.15 + 0.85;
          ctx.globalAlpha = pulse;
          ctx.fillStyle = 'rgba(91,82,255,.7)';
          ctx.beginPath();
          ctx.roundRect(bsx-40, signY+signH+6, 80, 16, 4);
          ctx.fill();
          ctx.font = 'bold 8px sans-serif';
          ctx.fillStyle = '#fff';
          ctx.fillText('TAP TO ENTER', bsx, signY+signH+17);
          ctx.globalAlpha = 1;
        }
      });

      /* ═══ ZONE EXIT LABELS — show where paths lead ═══ */
      if(S.currentZone === 'town'){
        TOWN_EXITS.forEach(ex => {
          let lx, ly;
          if(ex.dir==='north'){ lx=ex.tx*TILE+TILE-cx; ly=TILE*1.5-cy; }
          if(ex.dir==='south'){ lx=ex.tx*TILE+TILE-cx; ly=(ZONES.town.h-2)*TILE-cy; }
          if(ex.dir==='east'){ lx=(ZONES.town.w-2)*TILE-cx; ly=ex.ty*TILE+TILE-cy; }
          if(ex.dir==='west'){ lx=TILE*2-cx; ly=ex.ty*TILE+TILE-cy; }
          if(lx<-80||lx>W+80||ly<-30||ly>H+30) return;
          /* Glowing label */
          ctx.font = 'bold 9px "Space Mono", monospace';
          ctx.textAlign = 'center';
          const pulse = Math.sin(now/500)*0.2+0.8;
          ctx.fillStyle = ex.color;
          ctx.globalAlpha = pulse;
          ctx.fillText(ex.label, lx, ly);
          ctx.globalAlpha = 1;
          /* Element icon */
          const elem = ZONES[ex.zoneId]?.element;
          if(elem){
            const lvl = ZONES[ex.zoneId].level;
            ctx.font = '7px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,.5)';
            ctx.fillText('Lv'+lvl[0]+'-'+lvl[1], lx, ly+10);
          }
        });
      } else {
        /* In combat zones — show return exits */
        const zone = ZONES[S.currentZone];
        const zW = zone.w, zH = zone.h;
        const retExits = [
          {x:0, y:Math.floor(zH/2), label:'← Town'},
          {x:zW-1, y:Math.floor(zH/2), label:'Town →'},
          {x:Math.floor(zW/2), y:0, label:'Town ↑'},
          {x:Math.floor(zW/2), y:zH-1, label:'Town ↓'},
        ];
        retExits.forEach(re => {
          if(S.map[re.y]?.[re.x] !== 9) return;
          const lx = re.x*TILE+TILE/2-cx, ly = re.y*TILE+TILE/2-cy;
          if(lx<-60||lx>W+60||ly<-20||ly>H+20) return;
          ctx.font = 'bold 8px "Space Mono", monospace';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#3dd497';
          ctx.globalAlpha = Math.sin(now/400)*0.2+0.8;
          ctx.fillText(re.label, lx, ly-4);
          ctx.globalAlpha = 1;
        });

        /* Dungeon entrance labels */
        if(S.currentZone !== 'town'){
          const zone = ZONES[S.currentZone];
          const zW = zone.w, zH = zone.h;
          const dungX = Math.floor(zW/2), dungY = Math.floor(zH * 0.3);
          if(S.map?.[dungY]?.[dungX] === 10){
            const dlx = dungX*TILE+TILE - cx, dly = dungY*TILE+TILE/2 - cy;
            if(dlx > -60 && dlx < W+60 && dly > -30 && dly < H+30){
              ctx.font = 'bold 9px "Space Mono", monospace';
              ctx.textAlign = 'center';
              const dPulse = Math.sin(now/300)*0.2+0.8;
              ctx.fillStyle = '#ff5e6c';
              ctx.globalAlpha = dPulse;
              const currentDepth = S._currentDepth || 'shallow';
              const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[currentDepth];
              if(nextDepth){
                const dc = DEPTH_CONFIG[nextDepth];
                const canEnter = canAccessDepth(S.rpg, S.currentZone, currentDepth);
                ctx.fillText('⚔️ Dungeon → '+nextDepth.charAt(0).toUpperCase()+nextDepth.slice(1), dlx, dly-10);
                ctx.font = '7px sans-serif';
                ctx.fillStyle = canEnter ? 'rgba(255,255,255,.5)' : '#ff5e6c';
                const lvlReq = zone.level[0] + dc.levelMod;
                ctx.fillText(canEnter ? 'Lv'+lvlReq+' recommended' : 'Clear '+currentDepth+' dungeon first', dlx, dly+2);
              } else {
                ctx.fillText('⚔️ Zone Complete!', dlx, dly-6);
              }
              ctx.globalAlpha = 1;
            }
          }
        }
      }

      /* Draw other players — lerp positions + walk bob + zone filter */
      Object.values(S.others).forEach(o => {
        /* Only render players in the same zone */
        if(o.zone && o.zone !== S.currentZone) return;
        o.renderX += (o.x - o.renderX) * ANIM_LERP;
        o.renderY += (o.y - o.renderY) * ANIM_LERP;
        const oMoving = Math.abs(o.x - (o._prevX||o.x)) > 0.1 || Math.abs(o.y - (o._prevY||o.y)) > 0.1;
        o._prevX = o.x; o._prevY = o.y;
        const oBob = oMoving ? Math.sin(now/120) * 2 : 0;
        const ox = o.renderX - cx, oy = o.renderY - cy + oBob;
        if(ox < -40 || ox > W+40 || oy < -40 || oy > H+40) return;

        /* Other player shadow */
        ctx.fillStyle = 'rgba(0,0,0,.15)';
        ctx.beginPath();
        ctx.ellipse(ox, oy+20, 9, 3.5, 0, 0, Math.PI*2);
        ctx.fill();

        /* Facing direction — 4-way with hysteresis */
        const oDx = o.x - (o._facePrevX||o.x);
        const oDy = o.y - (o._facePrevY||o.y);
        o._facePrevX = o.x; o._facePrevY = o.y;
        const oAdx = Math.abs(oDx), oAdy = Math.abs(oDy);
        const oWasUD = o._facing === 'up' || o._facing === 'down';
        const oVB = oWasUD ? 1.3 : 0.7;
        if(oAdx > 0.03 || oAdy > 0.03){
          if(oAdy > oAdx * oVB) o._facing = oDy > 0 ? 'down' : 'up';
          else if(oAdx > oAdy * (oWasUD ? 0.7 : 1.3)) o._facing = oDx > 0 ? 'right' : 'left';
        }
        const oDir = o._facing || 'down';
        const oFlip = oDir === 'right';
        const oSide = oDir === 'left' || oDir === 'right';

        /* Other player body — simple fillRect */
        const oBS = o.bodySize === 'armored' ? 'armored' : 'slim';
        const otw = oBS==='slim'?16:24, oth=16;
        const oaw = oBS==='slim'?3:5, oah2 = oBS==='slim'?14:15;
        const olw = oBS==='slim'?6:8, olh=10, olg=oBS==='slim'?2:3;
        const osw = oBS==='slim'?7:10, osh=oBS==='slim'?4:4.5;
        const ohw = oBS==='slim'?2.5:3, ohh=3;
        const oHR = oBS==='slim'?12:14;

        ctx.save();
        ctx.translate(ox, oy + oAnimBob);

        if(oSide){
          if(oDir === 'left') ctx.scale(-1, 1);
          ctx.globalAlpha = 0.55;
          ctx.save(); ctx.translate(0, 8); ctx.rotate(-oSwing);
          ctx.fillStyle = oTC; ctx.fillRect(-oaw/2, 0, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-ohw/2, oah2-2, ohw, ohh);
          ctx.restore();
          ctx.save(); ctx.translate(0, 18); ctx.rotate(oSwing);
          ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 0, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh-2, osw, osh);
          ctx.restore();
          ctx.globalAlpha = 1;
          ctx.fillStyle = oTC; ctx.fillRect(-otw/2+1, 3, otw-2, 16);
          ctx.save(); ctx.translate(0, 8); ctx.rotate(oSwing);
          ctx.fillStyle = oTC; ctx.fillRect(-oaw/2, 0, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-ohw/2, oah2-2, ohw, ohh);
          ctx.restore();
          ctx.save(); ctx.translate(0, 18); ctx.rotate(-oSwing);
          ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 0, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh-2, osw, osh);
          ctx.restore();
        } else {
          const oLS2 = oMoving ? Math.sin(oFp)*1.2 : 0;
          const oRS2 = oMoving ? Math.sin(oFp+Math.PI)*1.2 : 0;
          ctx.fillStyle = oTC; ctx.fillRect(-(otw/2+oaw), 5+oRS2, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-(otw/2+oaw)+0.5, 5+oah2-1+oRS2, ohw, ohh);
          ctx.fillStyle = oLC; ctx.fillRect(-(olg/2+olw), 13+oLS2, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-(olg/2+olw)-0.5, 13+olh-2+oLS2, osw, osh);
          ctx.fillStyle = oTC; ctx.fillRect(-otw/2, 4, otw, oth);
          ctx.fillStyle = oLC; ctx.fillRect(olg/2, 13+oRS2, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(olg/2-0.5, 13+olh-2+oRS2, osw, osh);
          ctx.fillStyle = oTC; ctx.fillRect(otw/2, 5+oLS2, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(otw/2+0.5, 5+oah2-1+oLS2, ohw, ohh);
        }

        ctx.restore();

        /* Other player default head */
        ctx.fillStyle = '#f0c68a';
        ctx.beginPath(); ctx.arc(ox, oy-6+oAnimBob, oHR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#3b2414';
        ctx.beginPath(); ctx.arc(ox, oy-8+oAnimBob, oHR, Math.PI, Math.PI*2); ctx.fill();

        /* Other player avatar head — overrides default */
        if(o.avatar){
          const img = loadAvatarImg(o.avatar);
          const ready = img instanceof HTMLCanvasElement ? img.width>0 : (img.complete && img.naturalWidth);
          if(ready){
            ctx.save();
            if(oFlip){ ctx.translate(ox, 0); ctx.scale(-1, 1); ctx.translate(-ox, 0); }
            ctx.beginPath(); ctx.arc(ox, oy-6+oAnimBob, oHR, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(img, ox-oHR, oy-6-oHR+oAnimBob, oHR*2, oHR*2);
            ctx.restore();
          }
        }
        /* Name tag */
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,.6)';
        const ntw = ctx.measureText(o.name).width;
        ctx.fillRect(ox-ntw/2-3, oy-22, ntw+6, 12);
        ctx.fillStyle = o.color;
        ctx.fillText(o.name, ox, oy-13);
        /* Other player HP bar + level */
        if(o.rpgLv){
          const oBarW=20, oBarH=2.5, oBarY=oy-24+oAnimBob;
          const oHpPct = (o.rpgHp||50)/(o.rpgMaxHp||50);
          ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(ox-oBarW/2,oBarY,oBarW,oBarH);
          ctx.fillStyle=oHpPct>0.5?'#3dd497':oHpPct>0.25?'#f5c542':'#ff5e6c';
          ctx.fillRect(ox-oBarW/2,oBarY,oBarW*oHpPct,oBarH);
          ctx.font='bold 6px sans-serif'; ctx.textAlign='center';
          ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillText('Lv'+o.rpgLv,ox,oBarY-1);
        }
        /* Other player badges */
        if(o.badges && o.badges.length > 0){
          ctx.font = '7px sans-serif';
          const oBadgeStr = o.badges.map(bid=>{const a=BT_ACHIEVEMENTS.find(x=>x.id===bid);return a?a.icon:'';}).join('');
          ctx.fillText(oBadgeStr, ox, oy-30);
        }
      });

      /* ═══ ARROW PROJECTILES ═══ */
      /* ═══ ARROWS — travel along LOS, follow aim direction ═══ */
      if(S.arrows && S.arrows.length > 0){
        /* Determine current aim angle for LOS tracking */
        let curAim;
        if(S.lockedTarget && S.lockedTarget.ref){
          const lt2 = S.lockedTarget.ref;
          curAim = Math.atan2((lt2.y||0)-P.y, (lt2.x||0)-P.x);
        } else if(S._aiming){
          curAim = S._aimAngle || 0;
        } else {
          const fd2 = S._facing||'down';
          curAim = fd2==='right'?0:fd2==='up'?-Math.PI/2:fd2==='left'?Math.PI:Math.PI/2;
        }
        S.arrows = S.arrows.filter(a=>{
          const activeWpn = S.rpg ? getActiveWeapon(S.rpg) : {element1:null,element2:null};
          const pDmg = S.rpg ? calcWeaponDmg(activeWpn.type||'greatsword', S.rpg.power||0, activeWpn.tierMult||1) : 10;
          a.dist += a.isStaff ? 5 : 8;
          a.life--;
          /* Projectiles follow the active LOS while aiming */
          if(S._aiming || (S.lockedTarget && S.lockedTarget.ref)) a.ang = curAim;
          /* Position = player + angle × distance */
          const ax2 = P.x + Math.cos(a.ang)*a.dist;
          const ay2 = P.y + Math.sin(a.ang)*a.dist;
          if(a.life <= 0) return false;
          /* Hit detection */
          let hit = false;
          if(S.monsters) S.monsters.forEach(m=>{
            if(!m.alive || a.hitIds.has(m.id) || hit) return;
            if(Math.sqrt((m.x-ax2)**2+(m.y-ay2)**2) < (a.isStaff?30:18)){
              a.hitIds.add(m.id);

              /* §9 — Apply element status on arrow hit */
              const arrowElem = a.isSpecial ? activeWpn?.element2 : activeWpn?.element1;
              if(arrowElem){
                const statusId = ELEMENTS[arrowElem]?.status;
                if(statusId) applyStatus(m, statusId, S.player, Date.now());
              }

              /* §10.3 — Check for collision */
              let arrowCollision = null;
              if(arrowElem && S.rpg){
                arrowCollision = resolveCollision(m, arrowElem, S.player, S.rpg, Date.now());
              }

              m.curHp -= a.dmg;

              /* Collision damage + feedback on arrow hit */
              if(arrowCollision){
                m.curHp -= arrowCollision.damage;
                const coll = arrowCollision.collision;
                const elemCol = ELEMENTS[arrowCollision.triggerElement]?.color || '#fff';
                S.dmgNumbers.push({x:m.x+8,y:m.y-30,text:'💥'+arrowCollision.damage+' '+coll.name,color:elemCol,ts:Date.now()});
                if(arrowCollision.manaRestored > 0){
                  S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+arrowCollision.manaRestored+' MP',color:'#3b82f6',ts:Date.now()});
                }
                BT_AUDIO.collisionSound(arrowCollision.setupElement, arrowCollision.triggerElement, arrowCollision.manaRestored);
                for(let cp=0;cp<12;cp++){
                  S.hitParticles.push({x:m.x+(Math.random()-0.5)*6,y:m.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-2,life:0.7,color:elemCol,size:2+Math.random()*2});
                }
                S.screenShake = Math.max(S.screenShake, 4);
                BT_AUDIO.beep(400, 0.1, 0.12, 'sine');
                const isNew = discoverCollision(coll.id);
                if(isNew){
                  S.dmgNumbers.push({x:P.x,y:P.y-60,text:'📖 NEW: '+coll.name+'!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                }
              }

              BT_AUDIO.thwack();
              const kba = Math.atan2(m.y-ay2, m.x-ax2);
              m.x += Math.cos(kba)*5; m.y += Math.sin(kba)*5;
              if(!S.dmgNumbers) S.dmgNumbers=[];
              S.dmgNumbers.push({x:m.x,y:m.y-10,text:a.dmg+'',color:'#ff9',ts:Date.now()});
              /* Kill check — use same reward path as melee kills */
              if(m.curHp <= 0){
                m.alive = false;
                m.respawnAt = Date.now() + 30000;
                m.statuses = {};

                /* Quest kill tracking */
                if(S.rpg){
                  const R = S.rpg;
                  if(!R._questKills) R._questKills = {};
                  Object.keys(QUEST_CHAINS).forEach(qid => {
                    if(R._quests?.[qid] === QUEST_STATUS.active) R._questKills[qid] = (R._questKills[qid]||0) + 1;
                  });

                  /* Death feedback — simplified Grand Slam for arrows */
                  const isCrit = a.dmg > pDmg; /* special arrows count as crit */
                  BT_AUDIO.deathBoom();
                  S.screenShake = isCrit ? 6 : 3;

                  /* Death particles */
                  const killAngle = a.ang;
                  for(let dp=0;dp<15;dp++){
                    S.hitParticles.push({x:m.x,y:m.y,
                      vx:Math.cos(killAngle+(Math.random()-0.5)*1.5)*(2+Math.random()*4),
                      vy:Math.sin(killAngle+(Math.random()-0.5)*1.5)*(2+Math.random()*4)-2,
                      life:1,color:m.color,size:1.5+Math.random()*2});
                  }

                  /* Drop loot on ground */
                  S.groundLoot.push({
                    x:m.x+(Math.random()-0.5)*15, y:m.y+(Math.random()-0.5)*15,
                    coins:m.gold||m.coins||2, xp:m.xp||10,
                    skull:m.type, skullEmoji:m.emoji, ts:Date.now()
                  });

                  /* Weapon drop chance */
                  const dropChance = Math.min(0.15, 0.03 + (m.level||1)*0.001);
                  if(Math.random() < dropChance){
                    const zone = ZONES[S.currentZone];
                    const zoneElem = zone?.element;
                    const dropRoll = Math.random();
                    let dropTier, dropE1=null, dropE2=null, dropName='', dropVolatile=false;
                    if(dropRoll < 0.60) { dropTier='common'; }
                    else if(dropRoll < 0.85) { dropTier='elemental'; dropE1=zoneElem||'flame'; }
                    else if(dropRoll < 0.97) { dropTier='fusion'; dropE1=zoneElem||'flame';
                      const palette=['flame','frost','water','venom','storm','stone','wind'].filter(e=>e!==dropE1);
                      dropE2=palette[Math.floor(Math.random()*palette.length)];
                      const volPairs=[['flame','water'],['water','venom'],['venom','wind'],['wind','stone'],['stone','storm'],['storm','frost'],['frost','flame']];
                      dropVolatile=volPairs.some(([a2,b])=>(dropE1===a2&&dropE2===b)||(dropE1===b&&dropE2===a2));
                    } else { dropTier='shift'; dropE1=zoneElem||'flame'; dropE2='adaptive'; }
                    const dropTypes=['greatsword','sword','bow','staff'];
                    const dropType=dropTypes[Math.floor(Math.random()*dropTypes.length)];
                    const tierMult=RARITY_TIERS[dropTier].mult;
                    if(dropTier==='common') dropName=WEAPON_TYPES[dropType].label;
                    else if(dropTier==='elemental') dropName=(dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+' '+WEAPON_TYPES[dropType].label;
                    else if(dropTier==='fusion') dropName=(dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+(dropE2.charAt(0).toUpperCase()+dropE2.slice(1))+' '+WEAPON_TYPES[dropType].label;
                    else dropName='Prismatic '+WEAPON_TYPES[dropType].label;
                    S.groundLoot.push({x:m.x+(Math.random()-0.5)*20,y:m.y+(Math.random()-0.5)*20,ts:Date.now(),
                      isWeapon:true,weapon:{type:dropType,tier:dropTier,tierMult,element1:dropE1,element2:dropE2,name:dropName,isVolatile:dropVolatile},
                      tierColor:RARITY_TIERS[dropTier].color});
                    S.dmgNumbers.push({x:m.x,y:m.y-40,text:'🗡️ '+dropName+'!',color:RARITY_TIERS[dropTier].color,ts:Date.now()});
                  }

                  setRpgState({...R});
                  try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                }
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'☠️',color:'#ff5e6c',ts:Date.now()});
              }
              hit = true;
            }
          });
          if(hit) return false;
          /* Render arrow */
          const sx = ax2-cx, sy = ay2-cy;
          const fadeA = Math.min(1, a.life/20);
          ctx.save(); ctx.translate(sx, sy); ctx.rotate(a.ang);
          ctx.globalAlpha = fadeA;

          /* Get element color for this projectile */
          const projElem = a.element || activeWpn?.element1;
          const projColor = projElem && ELEMENTS[projElem] ? ELEMENTS[projElem].color : '#c8c8d0';
          const isStaffProj = activeWpn?.type === 'staff' || (a.isSpecial && S.rpg?.activeSlot === 'staff');

          if(a.isSpecial || a.ice){
            /* Special/heavy projectile — large, glowing, element-colored */
            const size = isStaffProj ? 1.5 : 1.0;
            ctx.shadowColor=projColor+'cc';ctx.shadowBlur=18*size;
            ctx.fillStyle = projColor+'dd'; ctx.fillRect(-16*size, -5*size, 32*size, 10*size);
            /* Arrowhead */
            ctx.fillStyle = projColor;
            ctx.beginPath(); ctx.moveTo(16*size,0); ctx.lineTo(10*size,-6*size); ctx.lineTo(10*size,6*size); ctx.closePath(); ctx.fill();
            /* Inner glow */
            ctx.shadowBlur=10*size;
            ctx.fillStyle=projColor+'44'; ctx.beginPath(); ctx.arc(0,0,8*size,0,Math.PI*2); ctx.fill();
            /* Sparkle particles */
            for(let sp=0;sp<3;sp++){
              const spx = -8 + Math.sin(Date.now()/100+sp*2)*10;
              const spy = Math.cos(Date.now()/80+sp*3)*4*size;
              ctx.fillStyle=projColor+'88'; ctx.fillRect(spx-1,spy-1,2,2);
            }
            ctx.shadowBlur=0;
          } else if(isStaffProj){
            /* Staff auto-attack — larger, slower energy orb */
            ctx.shadowColor=projColor+'aa';ctx.shadowBlur=12;
            ctx.fillStyle = projColor+'bb';
            ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = projColor+'44';
            ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
          } else {
            /* Normal bow arrow — element-tinted */
            ctx.fillStyle = '#8B6914'; ctx.fillRect(-8, -1.5, 16, 3);
            ctx.fillStyle = projColor;
            ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(5,-3.5); ctx.lineTo(5,3.5); ctx.closePath(); ctx.fill();
            ctx.fillStyle = projColor+'88'; ctx.fillRect(-8, -2.5, 3, 1.5); ctx.fillRect(-8, 1, 3, 1.5);
          }
          ctx.globalAlpha = 1;
          ctx.restore();
          return true;
        });
      }

      /* ═══ LOCK-ON INDICATOR ═══ */
      if(S.lockedTarget && S.lockedTarget.ref){
        const lt = S.lockedTarget.ref;
        const ltx = (lt.x||lt.renderX||0) - cx;
        const lty = (lt.y||lt.renderY||0) - cy;
        const lockT = Date.now()/500;
        const lockR = 18 + Math.sin(lockT*2)*3;
        ctx.save();
        ctx.strokeStyle = 'rgba(255,60,60,0.8)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4,4]);
        ctx.lineDashOffset = -Date.now()/50;
        ctx.beginPath();
        ctx.arc(ltx, lty, lockR, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
        /* Corner brackets */
        const bsz = 6;
        ctx.strokeStyle = 'rgba(255,60,60,0.9)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ltx-lockR, lty-lockR+bsz); ctx.lineTo(ltx-lockR, lty-lockR); ctx.lineTo(ltx-lockR+bsz, lty-lockR);
        ctx.moveTo(ltx+lockR-bsz, lty-lockR); ctx.lineTo(ltx+lockR, lty-lockR); ctx.lineTo(ltx+lockR, lty-lockR+bsz);
        ctx.moveTo(ltx+lockR, lty+lockR-bsz); ctx.lineTo(ltx+lockR, lty+lockR); ctx.lineTo(ltx+lockR-bsz, lty+lockR);
        ctx.moveTo(ltx-lockR+bsz, lty+lockR); ctx.lineTo(ltx-lockR, lty+lockR); ctx.lineTo(ltx-lockR, lty+lockR-bsz);
        ctx.stroke();
        /* Target name */
        const ltName = lt.name || lt.type || lt.emoji || '?';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,60,60,0.7)';
        ctx.fillText('🎯 '+ltName, ltx, lty-lockR-4);
        ctx.restore();
      }

      /* ═══ ZONE AMBIENT PARTICLES — §2 Immersion Through Accumulation ═══ */
      if(!S._ambientParticles) S._ambientParticles = [];
      const zoneElem = ZONES[S.currentZone]?.element;
      /* Spawn new ambient particles — higher cap in elemental zones */
      const _apMax = zoneElem ? 50 : 30;
      const _apRate = zoneElem ? 0.25 : 0.15;
      if(S._ambientParticles.length < _apMax && Math.random() < _apRate){
        const apx = cx + Math.random()*W;
        const apy = cy + Math.random()*H;
        const ap = { x:apx, y:apy, life:1 };
        const _r2 = Math.random();
        if(zoneElem === 'flame'){
          if(_r2<0.6){
            /* Floating embers — rising orange sparks */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.3, vy:-0.5-Math.random()*0.8, color:'#ff6030', size:1.5+Math.random(), type:'ember'});
          } else if(_r2<0.85){
            /* Heat shimmer — wide faint distortion */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.1, vy:-0.15, color:'rgba(255,160,60,0.15)', size:4+Math.random()*4, type:'shimmer'});
          } else {
            /* Ash flake — slow drifting gray */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.4, vy:0.1+Math.random()*0.2, color:'#888', size:1+Math.random()*0.5, type:'ash'});
          }
        } else if(zoneElem === 'frost'){
          if(_r2<0.5){
            /* Drifting snowflakes */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.5, vy:0.2+Math.random()*0.3, color:'#cce8ff', size:1+Math.random()*2, type:'snow'});
          } else if(_r2<0.8){
            /* Frost sparkle — brief twinkle */
            Object.assign(ap, {vx:0, vy:0, color:'#fff', size:1+Math.random(), life:0.5, type:'frostspark'});
          } else {
            /* Ice crystal — large slow-falling */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:0.1+Math.random()*0.15, color:'#a0d0f0', size:2+Math.random()*2, type:'icecrystal'});
          }
        } else if(zoneElem === 'venom'){
          if(_r2<0.5){
            /* Floating spores — bobbing green dots */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:-0.1+Math.sin(now/1000+apx)*0.2, color:'#4ade80', size:1+Math.random(), type:'spore'});
          } else if(_r2<0.8){
            /* Fog wisp — large faint green cloud */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.15, vy:-0.05, color:'rgba(60,180,60,0.08)', size:6+Math.random()*6, type:'fogwisp'});
          } else {
            /* Toxic bubble — rising, popping */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.1, vy:-0.3-Math.random()*0.3, color:'#80ff80', size:1.5+Math.random(), life:0.6, type:'bubble'});
          }
        } else if(zoneElem === 'storm'){
          if(_r2<0.5){
            /* Spark flashes — bright quick */
            Object.assign(ap, {vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2, color:'#a78bfa', size:1+Math.random()*1.5, life:0.3, type:'spark'});
          } else if(_r2<0.8){
            /* Rain streaks — fast falling lines */
            Object.assign(ap, {vx:0.3, vy:3+Math.random()*2, color:'rgba(160,170,200,0.2)', size:1, type:'rain'});
          } else {
            /* Lightning flash — instant bright */
            Object.assign(ap, {vx:0, vy:0, color:'#d0c0ff', size:3+Math.random()*3, life:0.15, type:'lightning'});
          }
        } else if(zoneElem === 'stone'){
          if(_r2<0.6){
            /* Dust motes — slow settling */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.15, vy:0.05+Math.random()*0.1, color:'#b8a080', size:0.8+Math.random()*0.8, type:'dust'});
          } else {
            /* Mineral glint — brief sparkle on ground */
            Object.assign(ap, {vx:0, vy:0, color:'#e0c880', size:1+Math.random(), life:0.4, type:'glint'});
          }
        } else if(zoneElem === 'wind'){
          if(_r2<0.4){
            /* Leaves drifting — fast horizontal */
            Object.assign(ap, {vx:0.5+Math.random()*0.8, vy:Math.sin(now/800+apx)*0.3, color:'#7a9a4a', size:2+Math.random(), type:'leaf'});
          } else if(_r2<0.7){
            /* Wind streak — horizontal blur */
            Object.assign(ap, {vx:2+Math.random()*2, vy:(Math.random()-0.5)*0.3, color:'rgba(200,220,240,0.08)', size:1, life:0.4, type:'windstreak'});
          } else {
            /* Feather — slow tumbling */
            Object.assign(ap, {vx:0.3+Math.random()*0.5, vy:0.1+Math.random()*0.2, color:'#e0e8f0', size:1.5+Math.random(), type:'feather'});
          }
        } else if(zoneElem === 'water'){
          if(_r2<0.5){
            /* Mist droplets — rising fog */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:-0.2-Math.random()*0.2, color:'#80c0e0', size:1+Math.random(), type:'mist'});
          } else if(_r2<0.8){
            /* Water spray — brief upward burst */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.5, vy:-0.4-Math.random()*0.3, color:'rgba(100,180,240,0.15)', size:2+Math.random()*2, life:0.5, type:'spray'});
          } else {
            /* Bubble — slow rising */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.1, vy:-0.15-Math.random()*0.1, color:'rgba(140,200,240,0.2)', size:1.5+Math.random(), type:'wbubble'});
          }
        } else if(zoneElem === 'dark'){
          if(_r2<0.5){
            /* Shadow wisps — sinuous dark tendrils */
            Object.assign(ap, {vx:Math.sin(now/600+apx)*0.3, vy:-0.3, color:'#3a2a5a', size:2+Math.random()*2, type:'wisp'});
          } else if(_r2<0.8){
            /* Void spark — purple flash */
