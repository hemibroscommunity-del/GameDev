:root {
  --ink:      #0b0c14;
  --ink2:     #12141f;
  --ink3:     #1a1d2e;
  --ink4:     #222639;
  --line:     #2d3251;
  --line2:    #3d4470;
  --pop:      #5b52ff;
  --pop-soft: rgba(91,82,255,.14);

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d0b18;touch-action:none}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}

::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

button{cursor:pointer;font-family:inherit}

/* Landscape recommended but not required */

/* Back to site link */
.back-to-site {

<div id="dbg" style="position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow-y:auto;z-index:999999;
  background:rgba(0,0,0,.92);color:#ff5e6c;font:11px/1.4 monospace;padding:8px;display:none;

<script>
(function(){
  var d=document.getElementById('dbg'), msgs=[];
  function show(s,col){
    d.style.display='block';
    msgs.push('<span style="color:'+(col||'#ff5e6c')+'">'+s+'</span>');
    if(msgs.length>30)msgs.shift();
    d.innerHTML=msgs.join('<br>');
    d.scrollTop=d.scrollHeight;
  }
  window.onerror=function(m,f,l,c,e){ show('ERR: '+m+' @ '+(f||'').split('/').pop()+':'+l+':'+c); };
  window.addEventListener('unhandledrejection',function(e){ show('PROMISE: '+e.reason); });
  var _ce=console.error;
  console.error=function(){ _ce.apply(console,arguments); show('ERR: '+Array.from(arguments).join(' '),'#ff5e6c'); };
  var _cw=console.warn;
  console.warn=function(){ _cw.apply(console,arguments); var m=Array.from(arguments).join(' '); if(m.indexOf('Realtime')>-1||m.indexOf('Babel')>-1||m.indexOf('GoTrue')>-1)return; show('WARN: '+m,'#ea580c'); };
  // Tap overlay 3x to dismiss
  var taps=0;
  d.addEventListener('click',function(){ taps++; if(taps>=3){d.style.display='none';taps=0;} setTimeout(function(){taps=0;},1000); });
  show('v2.0 — Debug overlay active — tap 3x to dismiss','#3dd497');
})();
</script>

function spawnGatherNodes(zoneId, depth) {

  const nodes = [];
  const W = zone.w * TILE, H = zone.h * TILE;
  const margin = 5 * TILE;
  for(let i=0; i<dc.nodeCount; i++){

    const y = margin + Math.random()*(H - margin*2);
    nodes.push(createGatherNode(zoneId, depth||'shallow', x, y));
  }
  return nodes;
}

/* §18.2 Gathering node definition — placed in combat zones */
function createGatheringNodes(zoneId, map) {
  const zone = ZONES[zoneId];
  if(!zone || !zone.element || zone.safe) return [];
  const nodes = [];
  const res = ZONE_RESOURCES[zone.element];
  if(!res) return [];
  const W = zone.w, H = zone.h;

  /* Place nodes on grass tiles, avoiding edges */
  const nodeCount = 8;
  let placed = 0;
  for(let attempt=0; attempt < 200 && placed < nodeCount; attempt++){
    const tx = 3 + Math.floor(Math.random()*(W-6));
    const ty = 3 + Math.floor(Math.random()*(H-6));
    if(map[ty]?.[tx] === 0){ /* grass only */
      /* Determine tier based on position (deeper = further from entrance) */
      const depthPct = Math.min(1, Math.sqrt(tx*tx + ty*ty) / Math.sqrt(W*W + H*H) * 1.5);
      const tier = Math.min(5, Math.max(1, Math.ceil(depthPct * 3)));
      const gatherLvlReq = DEPTH_TIERS[tier-1]?.gatherLvl || 1;

      nodes.push({
        id: 'node-'+zoneId+'-'+placed,
        x: tx*TILE + TILE/2,
        y: ty*TILE + TILE/2,
        tier,
        element: zone.element,
        resourceType: Math.random() < 0.5 ? 'crystal' : (Math.random() < 0.5 ? 'ore' : 'herb'),
        gatherLvlReq,
        depleted: false,
        respawnAt: 0,
        respawnTime: 30000 + tier * 15000, /* higher tier = longer respawn */
      });
      placed++;
    }
  }
  return nodes;
}

/* §18.3 Minigame system — timing bar used by gathering, cooking, enchanting, trapping */
/* Returns: 'perfect' (center), 'good' (near center), 'ok' (hit zone), 'miss' (outside) */
function evaluateMinigame(progress, target, targetSize) {
  const dist = Math.abs(progress - target);
  if(dist <= targetSize * 0.2) return 'perfect';
  if(dist <= targetSize * 0.5) return 'good';
  if(dist <= targetSize) return 'ok';
  return 'miss';
}

/* Award life skill XP */
function awardSkillXp(skills, skillName, amount) {
const addLifeSkillXp = awardSkillXp;
  const skill = skills[skillName];
  if(!skill) return false;
  skill.xp += amount;
  let leveled = false;
  while(skill.xp >= skillXpRequired(skill.level) && skill.level < 100){
    skill.xp -= skillXpRequired(skill.level);
    skill.level++;
    leveled = true;
  }
  return leveled;
}

/* Generate a zone map. Town has buildings+paths. Combat zones have themed terrain. */
function generateZoneMap(zoneId) {
  const zone = ZONES[zoneId];
  const W = zone.w, H = zone.h;
  const map = Array.from({length:H}, ()=> Array(W).fill(0));
  const MX = Math.floor(W/2), MY = Math.floor(H/2);

  if(zoneId === 'town'){
    /* ═══ TOWN — paths, buildings, exits ═══ */
    /* Main cross paths */
    for(let x=0;x<W;x++){ map[MY][x]=1; map[MY+1][x]=1; }
    for(let y=0;y<H;y++){ map[y][MX]=1; map[y][MX+1]=1; }
    /* Ring path around center */
    const ringR = 8;
    for(let a=0;a<360;a+=1){
      const rx = Math.round(MX+Math.cos(a*Math.PI/180)*ringR);
      const ry = Math.round(MY+Math.sin(a*Math.PI/180)*ringR);
      if(rx>=0&&rx<W&&ry>=0&&ry<H) map[ry][rx]=1;
    }
    /* Buildings */
    TOWN_BUILDINGS.forEach(b => {
      for(let dy=0;dy<b.bh;dy++) for(let dx=0;dx<b.bw;dx++){
        const ty=b.by+dy, tx=b.bx+dx;
        if(ty>=0&&ty<H&&tx>=0&&tx<W) map[ty][tx]=3;
      }
    });
    /* Flowers near buildings */
    TOWN_BUILDINGS.forEach(b => {
      for(let i=0;i<6;i++){
        const fx=b.bx+Math.floor(Math.random()*(b.bw+4))-2;
        const fy=b.by+b.bh+Math.floor(Math.random()*2);
        if(fx>=0&&fx<W&&fy>=0&&fy<H&&map[fy][fx]===0) map[fy][fx]=5;
      }
    });
    /* Exit paths — wider paths leading to zone edges */
    TOWN_EXITS.forEach(ex => {
      if(ex.dir==='north') for(let y=0;y<MY;y++){ map[y][ex.tx]=1; map[y][ex.tx+1]=1; }
      if(ex.dir==='south') for(let y=MY;y<H;y++){ map[y][ex.tx]=1; map[y][ex.tx+1]=1; }
      if(ex.dir==='east')  for(let x=MX;x<W;x++){ map[ex.ty][x]=1; map[ex.ty+1][x]=1; }
      if(ex.dir==='west')  for(let x=0;x<MX;x++){ map[ex.ty][x]=1; map[ex.ty+1][x]=1; }
      /* Exit marker tile (type 8 = exit) */
      if(ex.dir==='north') { map[0][ex.tx]=8; map[0][ex.tx+1]=8; }
      if(ex.dir==='south') { map[H-1][ex.tx]=8; map[H-1][ex.tx+1]=8; }
      if(ex.dir==='east')  { map[ex.ty][W-1]=8; map[ex.ty+1][W-1]=8; }
      if(ex.dir==='west')  { map[ex.ty][0]=8; map[ex.ty+1][0]=8; }
    });
    /* Scattered trees */
    for(let i=0;i<30;i++){
      const tx=Math.floor(Math.random()*W), ty=Math.floor(Math.random()*H);
      if(map[ty][tx]===0) map[ty][tx]=4;
    }
    /* Pond near center */
    for(let dy=-2;dy<=2;dy++) for(let dx=-3;dx<=3;dx++){
      if(Math.sqrt(dx*dx+dy*dy)<2.8){
        const py=MY-5+dy, px=MX+8+dx;
        if(py>=0&&py<H&&px>=0&&px<W&&map[py][px]===0) map[py][px]=2;
      }
    }
  } else {
    /* ═══ COMBAT ZONE — themed terrain ═══ */
    const elem = zone.element;

    /* Shared infrastructure: paths + exits + dungeon */
    /* Entry path from edge — cross paths */
    for(let x=0;x<W;x++){ map[MY][x]=1; map[MY+1][x]=1; }
    for(let y=0;y<H;y++){ map[y][MX]=1; }

    /* Return exit (tile type 9 = return to town) */
    for(let y=0;y<H;y++){map[y][0]=9;map[y][W-1]=9;}
    for(let x=0;x<W;x++){map[0][x]=9;map[H-1][x]=9;}

    /* Dungeon entrance (tile type 10) — center-ish, on a path */
    const dungX = MX, dungY = Math.floor(H * 0.85);
    map[dungY][dungX] = 10; map[dungY][dungX+1] = 10;
    for(let y=MY;y<=dungY;y++) map[y][dungX]=1;

    /* ═══ ZONE-SPECIFIC TERRAIN PATTERNS ═══ */
    /* Seeded random for consistent terrain per zone */
    const _seed = zoneId.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const _sr = (i) => { let s=_seed*9301+i*49297+49831; s=((s*s)>>>0)%233280; return s/233280; };
    let _si = 0;
    const sr = () => _sr(_si++);

    if(elem === 'flame'){
      /* EMBER FIELDS: Lava rivers cutting through scorched earth, volcanic rock clusters */
      /* Lava rivers — sinuous water-tile streams (rendered as lava via zone tinting) */
      for(let rv=0;rv<3;rv++){
        let rx = Math.floor(sr()*W*0.6)+Math.floor(W*0.2);
        let ry = 2;
        while(ry < H-2){
          if(map[ry][rx]===0) map[ry][rx]=2; /* lava = water tile tinted by zone */
          if(rx>1 && map[ry][rx-1]===0) map[ry][rx-1]=2;
          rx += Math.floor(sr()*3)-1;
          rx = Math.max(2, Math.min(W-3, rx));
          ry++;
        }
      }
      /* Volcanic rock clusters — irregular stone blobs */
      for(let vc=0;vc<8;vc++){
        const vcx=Math.floor(sr()*(W-8))+4, vcy=Math.floor(sr()*(H-8))+4;
        const vcr = 2+Math.floor(sr()*2);
        for(let dy=-vcr;dy<=vcr;dy++) for(let dx=-vcr;dx<=vcr;dx++){
          if(Math.sqrt(dx*dx+dy*dy)<=vcr+sr()*0.8){
            const ty=vcy+dy, tx=vcx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=7;
          }
        }
      }
      /* Charred stumps (sparse trees) */
      for(let i=0;i<8;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else if(elem === 'frost'){
      /* FROZEN SHORE: Large ice sheets (water), snow drifts (sand), frozen trees */
      /* Ice lake — large frozen body of water in center-west */
      const iceX=Math.floor(W*0.25), iceY=Math.floor(H*0.3);
      for(let dy=-6;dy<=6;dy++) for(let dx=-8;dx<=8;dx++){
        if((dx*dx)/(8*8)+(dy*dy)/(6*6) < 1+sr()*0.2){
          const ty=iceY+dy, tx=iceX+dx;
          if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
        }
      }
      /* Snow drifts (sand tiles rendered white via zone) — windswept banks */
      for(let sd=0;sd<12;sd++){
        const sx2=Math.floor(sr()*W), sy2=Math.floor(sr()*H);
        for(let dx=-3;dx<=3;dx++) for(let dy=-1;dy<=1;dy++){
          const tx=sx2+dx, ty=sy2+dy;
          if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=6;
        }
      }
      /* Frozen trees — sparse, along edges */
      for(let i=0;i<15;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
      /* Scattered ice patches */
      for(let i=0;i<20;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=2; }
    } else if(elem === 'venom'){
      /* MISTWOOD: Dense canopy with winding paths through bogs */
      /* Dense tree clusters forming walls */
      for(let tc=0;tc<12;tc++){
        const tcx=Math.floor(sr()*(W-6))+3, tcy=Math.floor(sr()*(H-6))+3;
        const tcr=2+Math.floor(sr()*3);
        for(let dy=-tcr;dy<=tcr;dy++) for(let dx=-tcr;dx<=tcr;dx++){
          if(Math.abs(dx)+Math.abs(dy)<=tcr+Math.floor(sr()*2)){
            const ty=tcy+dy, tx=tcx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=4;
          }
        }
      }
      /* Bog pools — small murky water patches */
      for(let bp=0;bp<8;bp++){
        const bpx=Math.floor(sr()*(W-4))+2, bpy=Math.floor(sr()*(H-4))+2;
        for(let dy=-1;dy<=1;dy++) for(let dx=-2;dx<=2;dx++){
          if(Math.abs(dx)+Math.abs(dy)<=2){
            const ty=bpy+dy, tx=bpx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
          }
        }
      }
      /* Mushroom meadows (flowers) */
      for(let i=0;i<15;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=5; }
    } else if(elem === 'storm'){
      /* THUNDER PEAKS: Rocky mountain ridges, open plateaus, lightning-scarred ground */
      /* Mountain ridges — long horizontal stone bands */
      for(let ridge=0;ridge<4;ridge++){
        const ry2 = Math.floor(H*0.15) + Math.floor(sr()*H*0.7);
        const rxStart = Math.floor(sr()*Math.floor(W*0.3));
        const rxEnd = rxStart + Math.floor(W*0.3) + Math.floor(sr()*Math.floor(W*0.4));
        for(let rx=rxStart;rx<Math.min(rxEnd,W-1);rx++){
          const thickness = 1+Math.floor(sr()*2);
          for(let t=0;t<thickness;t++){
            const ty=ry2+t;
            if(ty>0&&ty<H-1&&rx>0&&map[ty][rx]===0) map[ty][rx]=7;
          }
        }
      }
      /* Scattered boulders */
      for(let i=0;i<15;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=7; }
      /* Lightning-blasted trees (sparse) */
      for(let i=0;i<6;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else if(elem === 'stone'){
      /* DEEP HOLLOWS: Cave walls funneling paths, crystal deposits, stalagmites */
      /* Cave wall borders — thick stone perimeter leaving inner cavern */
      for(let y2=0;y2<H;y2++) for(let x2=0;x2<W;x2++){
        if(map[y2][x2]!==0) continue;
        const edgeDist = Math.min(x2, y2, W-1-x2, H-1-y2);
        if(edgeDist < 3+Math.floor(sr()*3)){
          map[y2][x2]=7; /* cave wall */
        }
      }
      /* Stalagmite clusters — scattered stone pillars inside */
      for(let sg=0;sg<12;sg++){
        const sgx=5+Math.floor(sr()*(W-10)), sgy=5+Math.floor(sr()*(H-10));
        if(map[sgy]?.[sgx]===0) map[sgy][sgx]=7;
        if(map[sgy-1]?.[sgx]===0) map[sgy-1][sgx]=7;
      }
      /* Crystal deposits (flowers rendered as crystals via zone) */
      for(let i=0;i<10;i++){ const tx=5+Math.floor(sr()*(W-10)),ty=5+Math.floor(sr()*(H-10)); if(map[ty]?.[tx]===0) map[ty][tx]=5; }
    } else if(elem === 'wind'){
      /* SKY REACHES: Wide open plateaus, cloud wisps (flowers), floating island gaps */
      /* Cloud patches (flowers) — large clusters */
      for(let cp=0;cp<10;cp++){
        const cpx=Math.floor(sr()*W), cpy=Math.floor(sr()*H);
        const cpr=2+Math.floor(sr()*3);
        for(let dy=-cpr;dy<=cpr;dy++) for(let dx=-cpr*2;dx<=cpr*2;dx++){
          if((dx*dx)/(cpr*cpr*4)+(dy*dy)/(cpr*cpr)<1){
            const ty=cpy+dy, tx=cpx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=5;
          }
        }
      }
      /* Floating island gaps — water chasms */
      for(let g=0;g<3;g++){
        const gx=Math.floor(sr()*(W-6))+3, gy=Math.floor(sr()*(H-6))+3;
        for(let dy=-2;dy<=2;dy++) for(let dx=-4;dx<=4;dx++){
          if(Math.abs(dx*dy)<6){
            const ty=gy+dy, tx=gx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
          }
        }
      }
      /* Very sparse wind-bent trees */
      for(let i=0;i<5;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else if(elem === 'water'){
      /* TIDAL CAVES: Coastline with sand/water gradients, coral formations, tidal pools */
      /* Large tidal pool in upper area */
      const poolX=Math.floor(W*0.5), poolY=Math.floor(H*0.25);
      for(let dy=-5;dy<=5;dy++) for(let dx=-10;dx<=10;dx++){
        if((dx*dx)/(10*10)+(dy*dy)/(5*5)<1+sr()*0.15){
          const ty=poolY+dy, tx=poolX+dx;
          if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
        }
      }
      /* Sandy beach borders around water */
      for(let y2=1;y2<H-1;y2++) for(let x2=1;x2<W-1;x2++){
        if(map[y2][x2]!==0) continue;
        let nearWater=false;
        for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
          if(map[y2+dy]?.[x2+dx]===2) nearWater=true;
        }
        if(nearWater && sr()<0.6) map[y2][x2]=6;
      }
      /* Coral formations (stone) */
      for(let i=0;i<8;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=7; }
      /* Seaweed patches (trees) */
      for(let i=0;i<10;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
      /* Extra scattered water */
      for(let i=0;i<25;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0&&sr()<0.5) map[ty][tx]=2; }
    } else if(elem === 'dark'){
      /* SHADOW SANCTUM: Void cracks, ritual circles, oppressive dark trees */
      /* Dense shadow trees — clustered walls */
      for(let tc=0;tc<15;tc++){
        const tcx=Math.floor(sr()*(W-4))+2, tcy=Math.floor(sr()*(H-4))+2;
        const tcr=1+Math.floor(sr()*2);
        for(let dy=-tcr;dy<=tcr;dy++) for(let dx=-tcr;dx<=tcr;dx++){
          if(dx*dx+dy*dy<=tcr*tcr+1){
            const ty=tcy+dy, tx=tcx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=4;
          }
        }
      }
      /* Void cracks — thin water (rendered as void via zone) */
      for(let vc=0;vc<4;vc++){
        let vx=2+Math.floor(sr()*(W-4)), vy=2+Math.floor(sr()*(H-4));
        for(let step=0;step<12;step++){
          if(vy>0&&vy<H-1&&vx>0&&vx<W-1&&map[vy][vx]===0) map[vy][vx]=2;
          vx+=Math.floor(sr()*3)-1; vy+=Math.floor(sr()*3)-1;
          vx=Math.max(1,Math.min(W-2,vx)); vy=Math.max(1,Math.min(H-2,vy));
        }
      }
      /* Dark ritual altars (stone) */
      for(let i=0;i<6;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=7; }
    } else if(elem === 'light'){
      /* RADIANT HEIGHTS: Crystal spires, golden meadows, symmetrical clearings */
      /* Golden meadow patches (flowers) — large circles */
      for(let gm=0;gm<8;gm++){
        const gmx=Math.floor(sr()*(W-6))+3, gmy=Math.floor(sr()*(H-6))+3;
        const gmr=2+Math.floor(sr()*2);
        for(let dy=-gmr;dy<=gmr;dy++) for(let dx=-gmr;dx<=gmr;dx++){
          if(dx*dx+dy*dy<=gmr*gmr){
            const ty=gmy+dy, tx=gmx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=5;
          }
        }
      }
      /* Crystal spires (stone — rendered as light pillars) */
      for(let cs=0;cs<10;cs++){
        const csx=Math.floor(sr()*(W-4))+2, csy=Math.floor(sr()*(H-4))+2;
        if(map[csy]?.[csx]===0){ map[csy][csx]=7; if(csy>1&&map[csy-1][csx]===0) map[csy-1][csx]=7; }
      }
      /* Sparse white trees */
      for(let i=0;i<8;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else {
      /* MEADOW / fallback: gentle rolling terrain */
      for(let y2=0;y2<H;y2++) for(let x2=0;x2<W;x2++){
        if(map[y2][x2]!==0) continue;
        if(sr()<0.04) map[y2][x2]=4; /* trees */
        else if(sr()<0.03) map[y2][x2]=5; /* flowers */
        else if(sr()<0.02) map[y2][x2]=2; /* ponds */
      }
    }
  }

  return map;
}

/* Get zone-tinted tile color */
function getTileColor(tile, zoneId) {
  const zone = ZONES[zoneId];
  if(!zone) return TILE_COLORS_BASE[tile] || '#2d5a1e';
  if(tile===0) return zone.palette.ground;
  if(tile===1) return zone.palette.path;
  return TILE_COLORS_BASE[tile] || zone.palette.ground;
}

/* ═══ ZONE TRANSITION ═══ */
function spawnMonstersForZone(zone) {
  const monsters = [];
  if(!zone.spawns) return monsters;
  const W = zone.w * TILE, H = zone.h * TILE;
  const margin = 4 * TILE;
  let idx = 0;
  zone.spawns.forEach(({arch, count}) => {
    for(let i=0; i<count; i++){
      const x = margin + Math.random()*(W - margin*2);
      const y = margin + Math.random()*(H - margin*2);
      /* Level scales by vertical position — top=level 1, bottom=level 10 */
      const depthPct = Math.max(0, Math.min(1, y / H));
      const baseLvl = zone.level[0] || 1;
      const maxLvl = zone.level[1] || 10;
      const lvl = Math.max(1, Math.round(baseLvl + depthPct * (maxLvl - baseLvl)));
      const m = createMonster('m-'+zone.id+'-'+idx, arch, lvl, x, y, zone.element);
      m.curHp = m.hp; m.type = arch;
      monsters.push(m);
      idx++;
    }
  });
  return monsters;
}

/* §10.2 Effectiveness Circle */
const EFFECTIVENESS = [
  ['flame','frost'], ['frost','storm'], ['storm','stone'],
  ['stone','wind'],  ['wind','venom'],  ['venom','water'], ['water','flame'],
];
function getEffectiveness(attackElem, targetElem) {
  if (!attackElem || !targetElem || attackElem === targetElem) return 1.0;
  /* Dark <-> Light mutual bonus */
  if ((attackElem==='dark'&&targetElem==='light')||(attackElem==='light'&&targetElem==='dark')) return 1.25;
  for (const [strong, weak] of EFFECTIVENESS) {
    if (attackElem===strong && targetElem===weak) return 1.25;
    if (attackElem===weak && targetElem===strong) return 0.75;
  }
  return 1.0;
}

/* ═══ STATUS EFFECT SYSTEM — §9 ═══ */

/* Apply a status to a target. Returns true if applied. */
function applyStatus(target, statusId, source, now) {
  if(!target.statuses) target.statuses = {};
  const def = STATUS_DEFS[statusId];
  if(!def) return false;

  const existing = target.statuses[statusId];
  if(existing) {
    /* Refresh — extend or reset duration */
    if(def.refresh > 0) {
      existing.remaining = Math.min(existing.remaining + def.refresh, def.maxDur);
    } else {
      existing.remaining = def.dur; /* reset */
    }
    /* Stack if applicable (Fracture) */
    if(def.maxStacks && existing.stacks < def.maxStacks) {
      existing.stacks++;
    }
    existing.lastRefresh = now;
    return true;
  }

  /* New application */
  /* §2.6 Influence — increases CC duration applied by player */
  const influenceBonus = source?._rpgInfluence ? (1 + source._rpgInfluence * 0.003) : 1.0;
  target.statuses[statusId] = {
    id: statusId,
    remaining: def.dur * influenceBonus,
    maxDur: (def.maxDur || def.dur) * influenceBonus,
    stacks: 1,
    source: source,
    appliedAt: now,
    lastRefresh: now,
    lastTick: now,
    element: Object.keys(ELEMENTS).find(e => ELEMENTS[e].status === statusId) || null,
  };
  return true;
}

/* Tick all statuses on a target. Applies DoT damage. Returns array of expired status IDs. */
function tickStatuses(target, dt, now, rpg) {
  if(!target.statuses) return [];
  const expired = [];
  const emMult = rpg ? (1 + (rpg.elementalMastery||0) * 0.0015) : 1;

  for(const [id, status] of Object.entries(target.statuses)) {
    status.remaining -= dt;

    /* DoT ticking */
    const def = STATUS_DEFS[id];
    if(def.tick && now - status.lastTick >= def.tick * 1000) {
      status.lastTick = now;
      let dotDmg = 0;
      if(id === 'burn') dotDmg = (5 + (rpg?.power||0) * 0.3) * emMult;
      if(id === 'root') dotDmg = (3 + (rpg?.power||0) * 0.15) * emMult;
      if(dotDmg > 0) {
        target.curHp = (target.curHp||target.hp) - Math.round(dotDmg);
        target._lastDotDmg = { amount: Math.round(dotDmg), statusId: id, ts: now };
      }
    }

    if(status.remaining <= 0) {
      expired.push(id);
      delete target.statuses[id];
    }
  }
  return expired;
}

/* Get the element of the oldest status on a target (for collision detection) */
function getOldestStatusElement(target) {
  if(!target.statuses) return null;
  let oldest = null, oldestTime = Infinity;
  for(const [id, status] of Object.entries(target.statuses)) {
    if(status.appliedAt < oldestTime) {
      oldestTime = status.appliedAt;
      oldest = status;
    }
  }
  return oldest ? oldest.element : null;
}

/* Make collision lookup bidirectional (setup+trigger order doesn't matter for lookup, but
   we always consume the SETUP status, which is the one already on the target) */
function lookupCollision(setupElement, triggerElement) {
  return COLLISION_TABLE[setupElement+'|'+triggerElement]
      || COLLISION_TABLE[triggerElement+'|'+setupElement]
      || null;
}

/* §10.3 Resolve a collision. Returns collision damage dealt, or 0 if no collision. */
function resolveCollision(target, triggerElement, source, rpg, now) {
  if(!target.statuses) return null;

  /* Find the oldest status with a different element than the trigger */
  let setupStatus = null, setupElement = null;
  let oldestTime = Infinity;
  for(const [id, status] of Object.entries(target.statuses)) {
    if(status.element && status.element !== triggerElement && status.appliedAt < oldestTime) {
      oldestTime = status.appliedAt;
      setupStatus = status;
      setupElement = status.element;
    }
  }

  if(!setupElement) return null;

  const collision = lookupCollision(setupElement, triggerElement);
  if(!collision) return null;

  /* Calculate collision damage — §10.6 */
  const statValue = rpg[collision.stat] || 0;
  let dmg = collision.base + statValue * collision.coeff;

  /* Elemental Mastery multiplier — §2.2 */
  dmg *= (1 + (rpg.elementalMastery||0) * 0.0015);

  /* Volatile bonus — §4.7 */
  const activeWpn = getActiveWeapon(rpg);
  if(activeWpn.isVolatile) dmg *= 1.30;

  /* Effectiveness — §10.2 */
  if(target.element) dmg *= getEffectiveness(triggerElement, target.element);

  /* Consume setup status */
  delete target.statuses[setupStatus.id];

  /* §3.5 Mana restore */
  let manaRestored = 0;
  if(rpg && now - (source._lastCollisionMana||0) >= 3000) {
    source._lastCollisionMana = now;
    const baseRestore = 0.04 * rpg.maxMana;
    const restMult = 1 + (rpg.restoration||0) * 0.0012;
    manaRestored = Math.round(baseRestore * restMult);
    rpg.mana = Math.min(rpg.maxMana, (rpg.mana||0) + manaRestored);
  }

  return {
    collision,
    damage: Math.round(dmg),
    setupElement,
    triggerElement,
    manaRestored,
    consumed: setupStatus.id,
  };
}

/* Discovered collisions tracker */
const discoveredCollisions = new Set();
try {
  const saved = JSON.parse(localStorage.getItem('bt_codex'));
  if(saved) saved.forEach(c => discoveredCollisions.add(c));
} catch {}

function discoverCollision(collisionId) {
  if(discoveredCollisions.has(collisionId)) return false;
  discoveredCollisions.add(collisionId);
  try { localStorage.setItem('bt_codex', JSON.stringify([...discoveredCollisions])); } catch {}
  return true; /* first discovery */
}

/* §6.1 Monster Scaling — tri-phase */
function monsterStat(base, level, rRamp, rPlateau, rEndgame) {
  if (level <= 30) return Math.ceil(base * Math.pow(rRamp, level-1));
  const at30 = Math.ceil(base * Math.pow(rRamp, 29));
  if (level <= 65) return Math.ceil(at30 * Math.pow(rPlateau, level-30));
  const at65 = Math.ceil(at30 * Math.pow(rPlateau, 35));
  return Math.ceil(at65 * Math.pow(rEndgame, level-65));
}

/* Spawn a monster instance from archetype + zone level */
function createMonster(id, archetype, level, x, y, element) {
  const a = ARCHETYPES[archetype];
  const baseHp = monsterStat(60, level, 1.065, 1.035, 1.025);
  const baseDmg = monsterStat(12, level, 1.045, 1.025, 1.018);
  const baseXp = monsterStat(10, level, 1.045, 1.025, 1.018);
  const baseGold = monsterStat(5, level, 1.035, 1.020, 1.015);
  return {
    id, archetype, level, element: element||null,
    hp: Math.ceil(baseHp * a.hpMult), maxHp: Math.ceil(baseHp * a.hpMult),
    dmg: Math.ceil(baseDmg * a.dmgMult),
    xp: Math.ceil(baseXp), gold: Math.ceil(baseGold),
    spd: 0.5 * a.spdMult,
    emoji: a.emoji, color: a.color,
    x, y, spawnX: x, spawnY: y,
    alive: true, moveTimer: Math.random()*3000,
    targetX: x, targetY: y,
    statuses: {}, /* {statusId: {remaining, stacks, source}} */
    _hitThisSwing: false, _atkCd: 0, _stunUntil: 0,
    respawnAt: 0,
  };
}

/* §3 Resource Formulas */
function calcMaxHp(level, vitality)  { return 100 + (level-1)*12 + vitality*10; }
function calcMaxStam(endurance)      { return 100 + endurance*3.0; }
function calcMaxMana(mind)           { return 80 + mind*3.5; }

/* §4.4 Weapon Damage */
function calcWeaponDmg(weaponType, power, tierMult) {
  const w = WEAPON_TYPES[weaponType];
  const base = (w.base + power * 0.8) * tierMult;
  if (weaponType === 'staff') return base * (0.75 + Math.random() * 0.5); /* variance roll */
  return base;
}

/* §2.1 Crit */
function calcCritChance(ferocity) {
  if (ferocity <= 300) return (60 * ferocity) / (ferocity + 120) / 100;
  const baseAt300 = (60*300)/(300+120)/100;
  const excess = ferocity - 300;
  return baseAt300 + (8*excess)/(excess+200)/100;
}
function calcCritMult(ferocity) { return 1.75 + ferocity * 0.0008; }

/* §2.3 Block */
function calcBlockReduction(fortification) {
  return Math.min(0.75, 0.25 + fortification * 0.0012);
}

/* §2.5 Movement */
function calcMoveSpeed(agility) {
  return 5.0 * (1 + Math.min(agility * 0.0012, 0.60));
}

/* §6.2 XP Required — tri-phase */
function xpRequired(level) {
  if (level <= 30) return Math.ceil(100 * Math.pow(1.10, level-1));
  const at30 = Math.ceil(100 * Math.pow(1.10, 29));
  if (level <= 65) return Math.ceil(at30 * Math.pow(1.07, level-30));
  const at65 = Math.ceil(at30 * Math.pow(1.07, 35));
  return Math.ceil(at65 * Math.pow(1.04, level-65));
}

/* Create a default player RPG state with the new stat system */
function createDefaultRpg() {
  return {

    power: 0, vitality: 0, endurance: 0, agility: 0, mind: 0,
    /* Tier 2 — allocated points */

    /* Derived (recalculated) */
    hp: 100, maxHp: 100,
    stamina: 100, maxStamina: 100,
    mana: 80, maxMana: 80,
    /* Equipment */
    /* Equipment — start with elemental weapons to experience the system */
    weapon: { type:'greatsword', tier:'fusion', tierMult:2.25, element1:'flame', element2:'frost', name:'Emberice Greatsword', isVolatile:true },
    rangedWeapon: { type:'bow', tier:'elemental', tierMult:1.5, element1:'venom', element2:null, name:'Venom Bow', isVolatile:false },
    staffWeapon: { type:'staff', tier:'elemental', tierMult:1.5, element1:'storm', element2:null, name:'Storm Staff', isVolatile:false },
    armor: { tier:'common', tierMult:1.0, attunement:null, name:'Leather Armor' },
    /* Active weapon slot: 'melee' or 'ranged' */
    activeSlot: 'melee',
  };
}

/* Recalculate derived stats from allocations */
function recalcDerived(rpg) {
  rpg.maxHp = calcMaxHp(rpg.level, rpg.vitality);
  rpg.maxStamina = calcMaxStam(rpg.endurance);
  rpg.maxMana = calcMaxMana(rpg.mind);
  rpg.hp = Math.min(rpg.hp, rpg.maxHp);
  rpg.stamina = Math.min(rpg.stamina, rpg.maxStamina);
  rpg.mana = Math.min(rpg.mana, rpg.maxMana);
  return rpg;
}

/* Get the currently active weapon object */
function getActiveWeapon(rpg) {
  if(rpg.activeSlot === 'ranged') return rpg.rangedWeapon || rpg.weapon;
  if(rpg.activeSlot === 'staff') return rpg.staffWeapon || rpg.weapon;
  return rpg.weapon;
}

        const lfo2 = this.ctx.createOscillator();
        const lfoG2 = this.ctx.createGain();
        lfo2.frequency.value = p2.lfo; lfoG2.gain.value = p2.freq*0.08;
        lfo2.connect(lfoG2); lfoG2.connect(o2.frequency);
        g2.connect(this.ctx.destination); o2.start(); lfo2.start();
        this._ambientOsc2=o2; this._ambientGain2=g2; this._ambientLfo2=lfo2;
      }
    } catch(e) {}
  },
  stopAmbient() {
    try{ if(this._ambientOsc){this._ambientOsc.stop();this._ambientOsc=null;}
      if(this._ambientLfo){this._ambientLfo.stop();this._ambientLfo=null;}
      this._ambientGain=null;
      if(this._ambientOsc2){this._ambientOsc2.stop();this._ambientOsc2=null;}
      if(this._ambientLfo2){this._ambientLfo2.stop();this._ambientLfo2=null;}
      this._ambientGain2=null;
    }catch(e){}
  },
  setCombatIntensity(inCombat) {
    if(!this._ambientGain||!this.ctx) return;
    try{
      this._ambientGain.gain.setTargetAtTime(inCombat?0.018:0.008, this.ctx.currentTime, 0.5);
      if(this._ambientGain2) this._ambientGain2.gain.setTargetAtTime(inCombat?0.008:0.004, this.ctx.currentTime, 0.5);
    }catch(e){}
  },
};

/* Get the current active/available quest for an NPC */
function getNpcQuest(rpg, npcName) {
  const questState = rpg._quests || {};
  /* Find first incomplete quest for this NPC */
  for(const [qid, quest] of Object.entries(QUEST_CHAINS)){
    if(quest.npc !== npcName) continue;
    const state = questState[qid];
    if(!state || state === QUEST_STATUS.available) return { quest, status: QUEST_STATUS.available };
    if(state === QUEST_STATUS.active) return { quest, status: QUEST_STATUS.active };
    if(state === QUEST_STATUS.turnedIn) continue; /* done, check next */
  }
  return null; /* all quests done */
}

/* ═══ SUPABASE RPC HELPER ═══ */
const _btRpcQueue = {};
const btRpc = async (fnName, params) => {
  /* Debounce: skip if same call is already in-flight */
  const key = fnName + JSON.stringify(params);
  if(_btRpcQueue[key]) return _btRpcQueue[key];
  const promise = (async()=>{
    try {
      const r = await fetch(SUPA_URL+'/rest/v1/rpc/'+fnName, {
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
        body: JSON.stringify(params)
      });
      if(!r.ok) return null;
      return await r.json();
    } catch(e){ return null; }
    finally { delete _btRpcQueue[key]; }
  })();
  _btRpcQueue[key] = promise;
  return promise;
};
/* ═══ PASSPHRASE IDENTITY SYSTEM ═══ */
const BT_WORDS = ['alpha','blaze','coral','drift','ember','frost','grove','haven','ivory','jade',
  'karma','lunar','mango','nexus','onyx','pixel','quartz','raven','solar','thunder',
  'ultra','viper','wrath','xenon','yeti','zenith','amber','bolt','cipher','dusk',
  'echo','flare','ghost','haze','iron','jet','knack','lava','mystic','nova',
  'orbit','prism','quest','ridge','storm','titan','umbra','vault','wisp','zeal'];

const generatePassphrase = () => {
  const w = [];
  for(let i=0;i<4;i++) w.push(BT_WORDS[Math.floor(Math.random()*BT_WORDS.length)]);
  return w.join('-') + '-' + Math.floor(Math.random()*99);
};

const passphraseToId = (phrase) => {
  /* Simple hash to create a consistent player ID from a passphrase */
  let hash = 0;
  for(let i=0;i<phrase.length;i++){ hash = ((hash << 5) - hash) + phrase.charCodeAt(i); hash |= 0; }
  return 'bp_' + Math.abs(hash).toString(36) + '_' + phrase.split('-').slice(0,2).join('');
};

const getBtPlayerId = () => {
  const phrase = localStorage.getItem('bt_passphrase');
  if(!phrase) return null; /* not logged in */
  return passphraseToId(phrase);
};

const getBtPassphrase = () => localStorage.getItem('bt_passphrase');

    p_id: pid,
    p_level: rpg.level || 1,

      hp: rpg.hp, maxHp: rpg.maxHp, stamina: rpg.stamina, maxStamina: rpg.maxStamina,
      mana: rpg.mana, maxMana: rpg.maxMana,
      /* 10 stats */
      power: rpg.power, vitality: rpg.vitality, endurance: rpg.endurance,
      agility: rpg.agility, mind: rpg.mind, ferocity: rpg.ferocity,
      elementalMastery: rpg.elementalMastery, fortification: rpg.fortification,
      restoration: rpg.restoration, influence: rpg.influence,
      unspentT1: rpg.unspentT1, unspentT2: rpg.unspentT2,
      /* Weapons */
      weapon: rpg.weapon, rangedWeapon: rpg.rangedWeapon, activeSlot: rpg.activeSlot,
      armor: rpg.armor,

      inventory: rpg.inventory,

      lifeSkills: rpg.lifeSkills ? {

  btRpc('bt_sync_rpg', payload);
}

      const latency = Date.now() - (payload.ts||0);
      if(latency > 500) return; /* reject stale attacks (>500ms old) */
      const dist = Math.sqrt((S.player.x-payload.x)**2+(S.player.y-payload.y)**2);

      const shielded = Date.now() < S.shieldEnd;

      R.hp -= dmgTaken;

      const kbA = Math.atan2(S.player.y-payload.y, S.player.x-payload.x);

  /* Canvas rendering + game loop */
  useEffect(()=>{

    ctx.roundRect = function(x,y,w,h,r){
      const radii = typeof r === 'number' ? [r,r,r,r] : Array.isArray(r) ? r.concat([0,0,0,0]).slice(0,4) : [0,0,0,0];
      this.moveTo(x+radii[0],y);
      this.lineTo(x+w-radii[1],y); this.quadraticCurveTo(x+w,y,x+w,y+radii[1]);
      this.lineTo(x+w,y+h-radii[2]); this.quadraticCurveTo(x+w,y+h,x+w-radii[2],y+h);

      for(let i=0;i<seed.length;i++) hash = ((hash<<5)-hash)+seed.charCodeAt(i);

        while(attempts<100){

            const d = imgData.data;
            /* Sample background color from top-left corner (0,0) */
            const bgR = d[0], bgG = d[1], bgB = d[2];
            /* Remove pixels similar to background color */
            const tolerance = 40;
            for(let i=0; i<d.length; i+=4){
              const dr = Math.abs(d[i]-bgR);
              const dg = Math.abs(d[i+1]-bgG);
              const db = Math.abs(d[i+2]-bgB);
              if(dr < tolerance && dg < tolerance && db < tolerance){
                d[i+3] = 0; /* set alpha to 0 */
              }
            }
            offCtx.putImageData(imgData, 0, 0);
            processedAvatars[url] = offCanvas;
          }catch(e){
            /* CORS or other error — use raw image */
            processedAvatars[url] = img;
          }
        };
        img.src = url;
        avatarImgs[url] = img;
      }
      return avatarImgs[url];
    };
    /* Preload own avatar */
    if(S.myAvatar) loadAvatarImg(S.myAvatar);

    const resize = () => {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement?.getBoundingClientRect() || {width:0,height:0};
      /* Fallback to window dimensions if parent has no size yet */
      const w = rect.width || window.innerWidth || 800;
      const h = rect.height || window.innerHeight || 600;
      if(w < 10 || h < 10) return;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr*0.8, 0, 0, dpr*0.8, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);
    /* Also resize when flex container changes (keyboard open/close) */
    let resizeObs;
    if(window.ResizeObserver && canvas.parentElement) {
      resizeObs = new ResizeObserver(resize);
      resizeObs.observe(canvas.parentElement);
    }
    const vv = window.visualViewport;
    if(vv) { vv.addEventListener('resize', resize); }

    const isSolid = (px,py) => {
      const zone = ZONES[S.currentZone];
      const tx = Math.floor(px/TILE), ty = Math.floor(py/TILE);
      if(tx<0||tx>=zone.w||ty<0||ty>=zone.h) return true;
      const tile = S.map?.[ty]?.[tx];
      if(tile===8||tile===9||tile===10) return false; /* exit/dungeon tiles walkable */
      return TILE_SOLID.has(tile);
    };

    const gameLoop = () => {
      frameRef.current = requestAnimationFrame(gameLoop);


      /* Ensure canvas has dimensions */
      if(canvas.width === 0 || canvas.height === 0) { resize(); return; }

      /* §6 Candy Crush Principle — Hit Stop: freeze simulation for N ms on big hits */
      if(S._hitStop && Date.now() < S._hitStop){
        /* During hit stop, render the frozen frame with impact flash — no simulation */
        const hitAge = 1 - (S._hitStop - Date.now()) / (S._hitStopDuration || 60);
        /* White flash overlay — bright at start, fades during freeze */
        if(hitAge < 0.5){
          ctx.fillStyle = `rgba(255,255,255,${(0.5-hitAge)*0.25})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        /* Chromatic aberration-style color split on the frozen frame */
        if(hitAge < 0.3 && S._hitStopDuration > 60){
          ctx.globalAlpha = 0.08;
          ctx.fillStyle = '#ff0000';
          ctx.fillRect(2, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#0000ff';
          ctx.fillRect(-2, 0, canvas.width, canvas.height);
          ctx.globalAlpha = 1;
        }
        return;
      }

      const W = canvas.width / (window.devicePixelRatio||1) * 1.25;
      const H = canvas.height / (window.devicePixelRatio||1) * 1.25;
      const P = S.player;
      const K = S.keys;
      /* Active weapon — available to all render/combat sections */
      const activeWpn = S.rpg ? getActiveWeapon(S.rpg) : {type:'greatsword',tier:'common',tierMult:1,element1:null,element2:null,isVolatile:false,name:'Fists'};
      /* Live map reference — re-read each frame so zone transitions work */
      const map = S.map;

      /* Check if player is stunned */
      const playerStunned = S._playerStunUntil && Date.now() < S._playerStunUntil;

      /* Movement — analog joystick + keyboard fallback */
      /* Dodge roll */
      if(S._dodgeRoll){
        const rollAge = Date.now() - S._dodgeRoll.startTime;
        if(rollAge < 200){ S.player.x += Math.cos(S._dodgeRoll.angle)*6; S.player.y += Math.sin(S._dodgeRoll.angle)*6; }
        else S._dodgeRoll = null;
      }
      let dx = playerStunned ? 0 : S.stickX, dy = playerStunned ? 0 : S.stickY;
      /* Keyboard overrides if no stick input */
      if(dx===0 && dy===0) {
        if(K['ArrowUp']||K['w']||K['W']) dy=-1;
        if(K['ArrowDown']||K['s']||K['S']) dy=1;
        if(K['ArrowLeft']||K['a']||K['A']) dx=-1;
        if(K['ArrowRight']||K['d']||K['D']) dx=1;
        /* Normalize diagonal keyboard input */
        if(dx&&dy){ const len=Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len; }
      }
      /* Direction for name tag / facing */
      if(Math.abs(dx)>0.1||Math.abs(dy)>0.1){
        if(Math.abs(dx)>Math.abs(dy)) P.dir=dx>0?'right':'left';
        else P.dir=dy>0?'down':'up';
      }

      /* §14 Terrain feel — tile under player affects movement */
      const footTile = S.map?.[Math.floor(P.y/TILE)]?.[Math.floor(P.x/TILE)] ?? 0;
      let terrainMult = 1.0;
      let terrainSlide = 0;
      if(footTile === 6) terrainMult = 0.7; /* sand: slightly slows */
      if(footTile === 1) terrainMult = 1.1; /* path: feels crisp, slight boost */
      if(footTile === 7) terrainMult = 0.85; /* stone: heavy */
      /* Zone-specific terrain effects */
      const curZone = ZONES[S.currentZone];
      if(curZone?.element === 'frost') terrainSlide = 0.92; /* ice: adds momentum/slide */
      if(curZone?.element === 'venom' && footTile === 0) terrainMult *= 0.85; /* swamp: heavy on grass */

      /* Agility-based movement speed */
      const baseSpd = S.rpg ? calcMoveSpeed(S.rpg.agility||0) / 5.0 * SPEED : SPEED;
      /* Food buff speed bonus */
      const spdBuff = (S._spdBuff && Date.now() < S._spdBuff) ? 1.15 : 1.0;
      const finalSpd = baseSpd * terrainMult * spdBuff;

      const nx = P.x + dx*finalSpd;
      const ny = P.y + dy*finalSpd;

      /* Ice slide momentum */
      if(terrainSlide > 0 && (Math.abs(dx)>0.01 || Math.abs(dy)>0.01)){
        if(!S._slideVx) S._slideVx = 0;
        if(!S._slideVy) S._slideVy = 0;
        S._slideVx = S._slideVx * terrainSlide + dx * finalSpd * (1-terrainSlide);
        S._slideVy = S._slideVy * terrainSlide + dy * finalSpd * (1-terrainSlide);
      } else if(terrainSlide > 0){
        S._slideVx = (S._slideVx||0) * terrainSlide;
        S._slideVy = (S._slideVy||0) * terrainSlide;
        if(Math.abs(S._slideVx) < 0.01) S._slideVx = 0;
        if(Math.abs(S._slideVy) < 0.01) S._slideVy = 0;
      } else {
        S._slideVx = 0; S._slideVy = 0;
      }
      /* Collision check — check corners of a 20x20 hitbox */
      const hs = 10;
      if(!isSolid(nx-hs,P.y-hs)&&!isSolid(nx+hs,P.y-hs)&&!isSolid(nx-hs,P.y+hs)&&!isSolid(nx+hs,P.y+hs)) P.x=nx;
      if(!isSolid(P.x-hs,ny-hs)&&!isSolid(P.x+hs,ny-hs)&&!isSolid(P.x-hs,ny+hs)&&!isSolid(P.x+hs,ny+hs)) P.y=ny;
      /* Apply ice slide */
      if(S._slideVx || S._slideVy){
        const sx = P.x + (S._slideVx||0), sy = P.y + (S._slideVy||0);
        if(!isSolid(sx-hs,P.y-hs)&&!isSolid(sx+hs,P.y+hs)) P.x=sx;
        if(!isSolid(P.x-hs,sy-hs)&&!isSolid(P.x+hs,sy+hs)) P.y=sy;
      }
      const zone = ZONES[S.currentZone];
      const ZONE_W = zone.w * TILE, ZONE_H = zone.h * TILE;
      P.x = Math.max(hs, Math.min(ZONE_W-hs, P.x));
      P.y = Math.max(hs, Math.min(ZONE_H-hs, P.y));

      /* ═══ ZONE TRANSITION — edge-based detection ═══ */
      const ptx = Math.floor(P.x / TILE), pty = Math.floor(P.y / TILE);

      /* In town: reaching any edge finds the nearest exit and transitions */
      if(S.currentZone === 'town' && (pty <= 0 || pty >= zone.h-1 || ptx <= 0 || ptx >= zone.w-1)){
        /* Find closest town exit to player position */
        let bestExit = null, bestDist = Infinity;
        TOWN_EXITS.forEach(ex => {
          let edgeMatch = false;
          if(ex.dir==='north' && pty <= 0) edgeMatch = true;
          if(ex.dir==='south' && pty >= zone.h-1) edgeMatch = true;
          if(ex.dir==='east' && ptx >= zone.w-1) edgeMatch = true;
          if(ex.dir==='west' && ptx <= 0) edgeMatch = true;
          if(!edgeMatch) return;
          const d = (ex.dir==='north'||ex.dir==='south') ? Math.abs(ptx-ex.tx) : Math.abs(pty-ex.ty);
          if(d < bestDist){ bestDist = d; bestExit = ex; }
        });
        if(bestExit){
          S.currentZone = bestExit.zoneId;
          updateZoneDimensions(bestExit.zoneId);
          BT_AUDIO.startZoneAmbient(bestExit.zoneId);
          if(S.rpg){
            if(!S.rpg._questFlags) S.rpg._questFlags = {};
            if(!S.rpg._questFlags.zonesVisited) S.rpg._questFlags.zonesVisited = {};
            S.rpg._questFlags.zonesVisited[bestExit.zoneId] = true;
          }
          S.map = generateZoneMap(bestExit.zoneId);
          const newZone = ZONES[bestExit.zoneId];
          S.monsters = spawnMonstersForZone(newZone);
          S.gatherNodes = spawnGatherNodes(bestExit.zoneId, 'shallow');
          const nW = newZone.w*TILE, nH = newZone.h*TILE;
          if(bestExit.dir==='north') { P.x=nW/2; P.y=nH-TILE*3; }
          if(bestExit.dir==='south') { P.x=nW/2; P.y=TILE*3; }
          if(bestExit.dir==='east')  { P.x=TILE*3; P.y=nH/2; }
          if(bestExit.dir==='west')  { P.x=nW-TILE*3; P.y=nH/2; }
          S.dmgNumbers.push({x:P.x,y:P.y-40,text:newZone.name,color:newZone.element?ELEMENTS[newZone.element].color:'#fff',ts:Date.now()});
          S.npcs = null;
          S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
          S._zoneWipe = Date.now(); /* trigger transition wipe */
          S._ambientParticles = []; /* clear old zone particles */
        }
      }

      /* In combat zones: reaching any edge returns to town */
      if(S.currentZone !== 'town' && !S._inDungeon && (pty <= 0 || pty >= zone.h-1 || ptx <= 0 || ptx >= zone.w-1)){
        S.currentZone = 'town';
        updateZoneDimensions('town');
        BT_AUDIO.startZoneAmbient('town');
        S.map = generateZoneMap('town');
        S.monsters = spawnMonstersForZone(ZONES.town);
        P.x = 20*TILE; P.y = 20*TILE;
        S.dmgNumbers.push({x:P.x,y:P.y-40,text:'Town',color:'#5b52ff',ts:Date.now()});
        S.npcs = null;
        S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
        S._zoneWipe = Date.now();
        S._ambientParticles = [];
      }

      /* Dungeon entrance — tile 10 */
      if(S.map && ptx>=0 && pty>=0 && pty<zone.h && ptx<zone.w){
        const tile = S.map[pty]?.[ptx];
        if(tile === 10 && S.currentZone !== 'town' && !S._inDungeon){
          /* §14.1 Dungeon entrance — wave-based encounter */
          const currentDepth = S._currentDepth || 'shallow';
          const nextDepthMap = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'};
          const nextDepth = nextDepthMap[currentDepth];
          if(!nextDepth){
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:'Zone fully cleared!',color:'#3dd497',ts:Date.now()});
          } else if(!canAccessDepth(S.rpg, S.currentZone, currentDepth)){
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:'Clear previous dungeon first!',color:'#ff5e6c',ts:Date.now()});
          } else {
            /* Enter dungeon! */
            S._inDungeon = true;
            S._dungeonZone = S.currentZone;
            S._dungeonDepth = currentDepth;
            S._dungeonWave = 0;
            S._dungeonMaxWaves = 3 + DEPTH_CONFIG[nextDepth].depthIdx;
            S._dungeonBossSpawned = false;
            S._dungeonComplete = false;
            S._preDungeonPos = {x:P.x, y:P.y};

            /* Generate small dungeon arena */
            const dW = 25, dH = 20;
            S._preDungeonMap = S.map;
            S._preDungeonMonsters = S.monsters;
            S._preDungeonNodes = S.gatherNodes;
            const dMap = Array.from({length:dH}, ()=> Array(dW).fill(0));
            /* Walls around edge */
            for(let x=0;x<dW;x++){ dMap[0][x]=7; dMap[dH-1][x]=7; }
            for(let y=0;y<dH;y++){ dMap[y][0]=7; dMap[y][dW-1]=7; }
            /* Path cross */
            const dMX=Math.floor(dW/2), dMY=Math.floor(dH/2);
            for(let x=1;x<dW-1;x++) dMap[dMY][x]=1;
            for(let y=1;y<dH-1;y++) dMap[y][dMX]=1;

            S.map = dMap;
            TOWN_W = dW*TILE; TOWN_H = dH*TILE; COLS = dW; ROWS = dH;
            S.monsters = [];
            S.gatherNodes = [];
            S.groundLoot = [];
            S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
            P.x = dMX*TILE; P.y = (dH-3)*TILE;

            /* Spawn first wave */
            const zone = ZONES[S.currentZone];
            const dc = DEPTH_CONFIG[nextDepth];
            const waveLvl = zone.level[0] + dc.levelMod;
            const waveArchs = ['fodder','swarm','brute','sentinel','volatile','hexer','stalker'];
            for(let wi=0;wi<4+S._dungeonWave;wi++){
              const arch = waveArchs[Math.floor(Math.random()*waveArchs.length)];
              const mx = (3+Math.random()*(dW-6))*TILE;
              const my = (2+Math.random()*(dH/2-2))*TILE;
              const m = createMonster('dw-0-'+wi, arch, waveLvl+Math.floor(Math.random()*5), mx, my, zone.element);
              m.curHp = m.hp; m.type = arch;
              S.monsters.push(m);
            }

            S.dmgNumbers.push({x:P.x,y:P.y-40,text:'⚔️ DUNGEON: Wave 1/'+S._dungeonMaxWaves,color:'#ff5e6c',ts:Date.now()});
            BT_AUDIO.beep(200,0.15,0.2,'sawtooth');
            setTimeout(()=>BT_AUDIO.beep(150,0.2,0.25,'sawtooth'),100);
          }
        }
      }

      /* §14.1 Dungeon wave progression */
      if(S._inDungeon && !S._dungeonComplete){
        const allDead = S.monsters.every(m => !m.alive);
        if(allDead && S.monsters.length > 0){
          S._dungeonWave++;
          if(S._dungeonWave >= S._dungeonMaxWaves && !S._dungeonBossSpawned){
            /* Spawn boss wave! */
            S._dungeonBossSpawned = true;
            const zone = ZONES[S._dungeonZone];
            const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[S._dungeonDepth];
            const dc = DEPTH_CONFIG[nextDepth];
            const bossLvl = zone.level[0] + dc.levelMod + 10;
            const dW = S.map[0].length, dH = S.map.length;
            /* Boss = brute with 5x HP */
            const boss = createMonster('boss-0', 'brute', bossLvl, Math.floor(dW/2)*TILE, Math.floor(dH/3)*TILE, zone.element);
            boss.hp *= 5; boss.maxHp = boss.hp; boss.curHp = boss.hp;
            boss.dmg = Math.ceil(boss.dmg * 1.5);
            boss.emoji = '👑'; boss.color = '#ff5e6c';
            boss._isBoss = true;
            S.monsters = [boss];
            S.dmgNumbers.push({x:P.x,y:P.y-50,text:'👑 BOSS WAVE!',color:'#ff5e6c',ts:Date.now()});
            BT_AUDIO.beep(100,0.25,0.3,'sawtooth');
            setTimeout(()=>BT_AUDIO.beep(80,0.3,0.35,'sawtooth'),150);
            S.screenShake = 8;
          } else if(S._dungeonBossSpawned){
            /* Boss killed — dungeon complete! */
            S._dungeonComplete = true;
            const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[S._dungeonDepth];
            const clearKey = S._dungeonZone + '_' + S._dungeonDepth;
            if(!S.rpg.lifeSkills.dungeonClears) S.rpg.lifeSkills.dungeonClears = {};
            S.rpg.lifeSkills.dungeonClears[clearKey] = true;
            /* Bonus rewards */
            const bonusGold = 100 * (DEPTH_CONFIG[nextDepth]?.depthIdx||1);
            const bonusXp = 200 * (DEPTH_CONFIG[nextDepth]?.depthIdx||1);
            S.rpg.coins += bonusGold;
            S.rpg.xp += bonusXp;
            S.dmgNumbers.push({x:P.x,y:P.y-60,text:'🏆 DUNGEON CLEARED!',color:'#f5c542',ts:Date.now()});
            S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+bonusGold+'G +'+bonusXp+'XP',color:'#f5c542',ts:Date.now()});
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:nextDepth.toUpperCase()+' depth unlocked!',color:'#a855f7',ts:Date.now()});
            BT_AUDIO.levelUp();
            S.screenShake = 10;
            setRpgState({...S.rpg});
            try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
            /* Return to zone after 3 seconds */
            setTimeout(()=>{
              const st = stateRef.current;
              st._inDungeon = false;
              st.map = st._preDungeonMap;
              st.monsters = st._preDungeonMonsters;
              st.gatherNodes = st._preDungeonNodes;
              const zone = ZONES[st._dungeonZone];
              TOWN_W = zone.w*TILE; TOWN_H = zone.h*TILE; COLS = zone.w; ROWS = zone.h;
              st.player.x = st._preDungeonPos.x;
              st.player.y = st._preDungeonPos.y;
              st._currentDepth = nextDepth; /* advance to deeper layer */
              /* Respawn nodes at new depth */
              st.gatherNodes = spawnGatherNodes(st._dungeonZone, nextDepth);
            }, 3000);
          } else if(S._dungeonWave < S._dungeonMaxWaves){
            /* Spawn next wave */
            const zone = ZONES[S._dungeonZone];
            const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[S._dungeonDepth];
            const dc = DEPTH_CONFIG[nextDepth];
            const waveLvl = zone.level[0] + dc.levelMod + S._dungeonWave*2;
            const dW = S.map[0].length, dH = S.map.length;
            const waveArchs = ['fodder','swarm','brute','sentinel','volatile','hexer','stalker'];
            const waveSize = 4 + S._dungeonWave + Math.floor(Math.random()*2);
            for(let wi=0;wi<waveSize;wi++){
              const arch = waveArchs[Math.floor(Math.random()*waveArchs.length)];
              const mx = (3+Math.random()*(dW-6))*TILE;
              const my = (2+Math.random()*(dH/2-2))*TILE;
              const m = createMonster('dw-'+S._dungeonWave+'-'+wi, arch, waveLvl, mx, my, zone.element);
              m.curHp = m.hp; m.type = arch;
              S.monsters.push(m);
            }
            S.dmgNumbers.push({x:P.x,y:P.y-40,text:'⚔️ Wave '+(S._dungeonWave+1)+'/'+S._dungeonMaxWaves,color:'#ff5e6c',ts:Date.now()});
            BT_AUDIO.beep(300,0.1,0.15,'sawtooth');
            S.screenShake = 4;
          }
        }
      }

      /* Check building proximity (town only) */
      const pTileX = Math.floor(P.x / TILE);
      const pTileY = Math.floor(P.y / TILE);
      let nearBldg = null;
      if(S.currentZone === 'town') {
      for(let i=0;i<BUILDINGS.length;i++){
        const b = BUILDINGS[i];
        /* Check if player is within 2 tiles of building edge */
        if(pTileX >= b.bx-2 && pTileX <= b.bx+b.bw+1 && pTileY >= b.by-2 && pTileY <= b.by+b.bh+1){
          nearBldg = i;
          break;
        }
      }
      S.nearBuilding = nearBldg;
      } else { S.nearBuilding = null; }

      /* Detect nearest gatherable node */
      S._nearNode = null;
      if(S.gatherNodes){
        let closest = 60; /* max interaction range */
        S.gatherNodes.forEach(n => {
          if(!n.alive || (n.respawnAt && Date.now() < n.respawnAt)) return;
          const nd = Math.sqrt((n.x-P.x)**2+(n.y-P.y)**2);
          if(nd < closest){ closest = nd; S._nearNode = n; }
        });
      }

      /* Trail — record position every few frames */
      if(!S._trailTimer) S._trailTimer = 0;
      S._trailTimer++;
      if(S._trailTimer % 3 === 0 && (Math.abs(dx)>0.01||Math.abs(dy)>0.01)){
        S.trail.push({x:P.x, y:P.y, ts:now});
        if(S.trail.length > 20) S.trail.shift();
      }
      /* Expire old trail points */
      while(S.trail.length > 0 && now - S.trail[0].ts > 800) S.trail.shift();

      /* Check collectible pickup — within 18px */
      if(S.collectibles){
        S.collectibles.forEach(item=>{
          if(item.collected) return;
          const dist = Math.sqrt((P.x-item.x)**2 + (P.y-item.y)**2);
          if(dist < 18){
            item.collected = true;
            S.collectedIds.add(item.id);
            S.score++;
            if(S.stats){ S.stats.totalCollected++; S.stats.dailyCollected++; }
            BT_AUDIO.collect();
            /* Notify React for UI popup */
            const remaining = S.collectibles.filter(c=>!c.collected).length;
            setCollectScore(S.score);
            setCollectMsg({emoji:item.emoji, text:remaining>0 ? S.score+'/10 found!' : 'ALL 10 FOUND! 🎉', ts:Date.now()});
          }
        });
      }

      /* §18.1 PET FOLLOW + AUTO-LOOT — active pet follows player and vacuums loot */
      if(S.rpg?.lifeSkills?.activePet !== null && S.rpg?.lifeSkills?.activePet !== undefined){
        const pets = S.rpg.lifeSkills.pets || [];
        const petIdx = S.rpg.lifeSkills.activePet;
        const pet = pets[petIdx];
        if(pet){
          /* Initialize pet position */
          if(!S._petX) { S._petX = P.x - 30; S._petY = P.y + 20; }
          /* Follow player — orbit slightly behind */
          const petDistToP = Math.sqrt((S._petX-P.x)**2+(S._petY-P.y)**2);
          const petTargetDist = 35;
          if(petDistToP > petTargetDist + 15){
            const pDx = P.x - S._petX, pDy = P.y - S._petY;
            const pDist = Math.sqrt(pDx*pDx+pDy*pDy)||1;
            S._petX += (pDx/pDist) * 2.0;
            S._petY += (pDy/pDist) * 2.0;
          } else if(petDistToP < petTargetDist - 10){
            /* Too close — drift outward */
            const bx = S._petX-P.x, by = S._petY-P.y;
            const bd = Math.sqrt(bx*bx+by*by)||1;
            S._petX += (bx/bd)*0.5;
            S._petY += (by/bd)*0.5;
          }
          /* Personality idle movement */
          if(pet.personality === 'playful') { S._petX += Math.sin(now/300)*0.3; S._petY += Math.cos(now/400)*0.2; }
          if(pet.personality === 'curious') { S._petX += Math.sin(now/500+1)*0.5; }
          if(pet.personality === 'anxious') { S._petX += (Math.random()-0.5)*0.4; S._petY += (Math.random()-0.5)*0.4; }

          /* AUTO-LOOT — pet collects nearby ground loot */
          if(S.groundLoot){
            S.groundLoot = S.groundLoot.filter(loot => {
              const ld = Math.sqrt((S._petX-loot.x)**2+(S._petY-loot.y)**2);
              if(ld < PET_LOOT_RADIUS && Date.now() > (loot.ts||0) + 500){
                /* Pet picks up the loot! */
                if(loot.isWeapon && loot.weapon){
                  /* Weapon drop — auto-equip or sell same as player pickup */
                  const drop = loot.weapon;
                  const wpnDef = WEAPON_TYPES[drop.type];
                  const isRanged = wpnDef?.type === 'ranged';
                  const current = isRanged ? S.rpg.rangedWeapon : S.rpg.weapon;
                  const dropPower = drop.tierMult * (WEAPON_TYPES[drop.type]?.base||30);
                  const curPower = (current?.tierMult||1) * (WEAPON_TYPES[current?.type||'greatsword']?.base||30);
                  if(dropPower >= curPower){
                    if(isRanged) S.rpg.rangedWeapon = drop; else S.rpg.weapon = drop;
                    S.dmgNumbers.push({x:S._petX,y:S._petY-15,text:pet.emoji+' → 🗡️'+drop.name,color:loot.tierColor||'#fff',ts:Date.now()});
                  } else {
                    S.rpg.coins += Math.ceil(dropPower*0.5);
                    S.dmgNumbers.push({x:S._petX,y:S._petY-15,text:pet.emoji+' → sold',color:'#f5c542',ts:Date.now()});
                  }
                } else {
                  S.rpg.xp += loot.xp||0;
                  S.rpg.coins += loot.coins||0;
                  S.dmgNumbers.push({x:S._petX,y:S._petY-15,text:pet.emoji+' +'+(loot.coins||0)+'G',color:'#f5c542',ts:Date.now()});
                }
                BT_AUDIO.beep(600,0.03,0.04,'sine');
                setRpgState({...S.rpg});
                return false; /* remove loot */
              }
              return true;
            });
          }
        }
      }

      /* Update NPCs — §19.1 companion follow + quest interaction + wander */
      if(S.npcs){
        S.npcs.forEach(npc => {
          if(!npc.alive){
            if(Date.now() > npc.respawnAt){
              npc.alive = true; npc.hp = npc.maxHp;
              npc.x = npc.spawnX; npc.y = npc.spawnY;
            }
            return;
          }

          /* §19.1 Companion follow — NPC follows player if they have an active quest */
          const npcQuest = getNpcQuest(S.rpg, npc.name);
          const isActiveCompanion = npcQuest && npcQuest.status === 'active' &&
            npc.canFollow && npc.followZones?.includes(S.currentZone);
          const distToPlayer = Math.sqrt((npc.x-P.x)**2+(npc.y-P.y)**2);

          if(isActiveCompanion){
            /* Follow the player — stay 40-60px behind */
            if(distToPlayer > 60){
              const fDx = P.x - npc.x, fDy = P.y - npc.y;
              const fDist = Math.sqrt(fDx*fDx+fDy*fDy);
              npc.x += (fDx/fDist)*1.5;
              npc.y += (fDy/fDist)*1.5;
              if(Math.abs(fDx)>Math.abs(fDy)) npc._facing = fDx>0?'right':'left';
              else npc._facing = fDy>0?'down':'up';
            } else if(distToPlayer < 30){
              /* Too close — back off slightly */
              const bDx = npc.x-P.x, bDy = npc.y-P.y;
              const bDist = Math.sqrt(bDx*bDx+bDy*bDy)||1;
              npc.x += (bDx/bDist)*0.5;
              npc.y += (bDy/bDist)*0.5;
            }
            /* Quest-relevant chat — comment on progress */
            npc.chatTimer -= 16.7;
            if(npc.chatTimer <= 0){
              const quest = npcQuest.quest;
              const isComplete = quest.check(S.rpg, S);
              const phrase = isComplete ? quest.dialogue.complete : quest.dialogue.progress;
              npc.chatBubble = {text: phrase, ts: Date.now(), isQuest: true};
              BT_AUDIO.npcChat();
              npc.chatTimer = 12000 + Math.random()*8000;
            }
          } else {
            /* Normal wander behavior */
            npc.moveTimer -= 16.7;
            const distToTarget = Math.sqrt((npc.x-npc.targetX)**2+(npc.y-npc.targetY)**2);
            if(distToTarget < 4 || npc.moveTimer <= 0){
              const angle = Math.random()*Math.PI*2;
              const dist = Math.random()*npc.pathRadius;
              npc.targetX = npc.spawnX + Math.cos(angle)*dist;
              npc.targetY = npc.spawnY + Math.sin(angle)*dist;
              npc.targetX = Math.max(TILE*2, Math.min(TOWN_W-TILE*2, npc.targetX));
              npc.targetY = Math.max(TILE*2, Math.min(TOWN_H-TILE*2, npc.targetY));
              npc.moveTimer = 2000 + Math.random()*4000;
            }
            const nDx = npc.targetX - npc.x, nDy = npc.targetY - npc.y;
            const nDist = Math.sqrt(nDx*nDx+nDy*nDy);
            if(nDist > 2){
              npc.x += (nDx/nDist)*0.8; npc.y += (nDy/nDist)*0.8;
              if(Math.abs(nDx)>Math.abs(nDy)) npc._facing = nDx>0?'right':'left';
              else npc._facing = nDy>0?'down':'up';
            }
            /* Random chat */
            npc.chatTimer -= 16.7;
            if(npc.chatTimer <= 0){
              /* If NPC has available quest, hint at it */
              if(npcQuest && npcQuest.status === 'available' && distToPlayer < 100){
                npc.chatBubble = {text: '❗ I have a task for you! Tap me.', ts: Date.now(), isQuest: true};
              } else {
                npc.chatBubble = {text: npc.phrases[Math.floor(Math.random()*npc.phrases.length)], ts: Date.now()};
              }
              BT_AUDIO.npcChat();
              npc.chatTimer = 8000 + Math.random()*15000;
            }
          }
          npc.renderX += (npc.x - npc.renderX) * 0.12;
          npc.renderY += (npc.y - npc.renderY) * 0.12;
          if(npc.chatBubble && Date.now() - npc.chatBubble.ts > 5000) npc.chatBubble = null;

          /* Quest marker above NPC head — ! for available, ? for turn-in ready */
          npc._questMarker = null;
          if(npcQuest){
            if(npcQuest.status === 'available') npc._questMarker = '❗';
            else if(npcQuest.status === 'active' && npcQuest.quest.check(S.rpg, S)) npc._questMarker = '❓';
          }
        });
      }

      /* ═══ MONSTER AI + COMBAT ═══ */
      if(S.monsters && S.rpg){
        const R = S.rpg;
        /* §2.6 Tag player with Influence for status duration scaling */
        S.player._rpgInfluence = R.influence || 0;
        /* §4.4 Weapon Damage — uses new stat system */
        const activeWpn = getActiveWeapon(R);
        const wpnType = WEAPON_TYPES[activeWpn.type] || WEAPON_TYPES.greatsword;
        let pDmg = calcWeaponDmg(activeWpn.type, R.power, activeWpn.tierMult);
        /* §18.1 Food buff — damage multiplier */
        if(S._dmgBuff && Date.now() < S._dmgBuff) pDmg *= 1.20;
        /* §2.1 Crit from Ferocity */
        const critChance = calcCritChance(R.ferocity);
        const critMult = calcCritMult(R.ferocity);
        const invuln = Date.now() < S.respawnTimer;

        S.monsters.forEach(m=>{
          if(!m.alive){
            if(Date.now() > m.respawnAt){
              m.alive = true; m.curHp = m.hp;
              m.statuses = {}; /* clear statuses on respawn */
              m.x = m.spawnX + (Math.random()-0.5)*60;
              m.y = m.spawnY + (Math.random()-0.5)*60;
            }
            return;
          }

          /* §9 — Tick statuses (DoT damage, expiry) */
          const expired = tickStatuses(m, 16.7/1000, Date.now(), R);
          if(m._lastDotDmg && Date.now() - m._lastDotDmg.ts < 100){
            const dot = m._lastDotDmg;
            const dotElem = Object.keys(ELEMENTS).find(e => ELEMENTS[e].status === dot.statusId);
            const dotColor = dotElem ? ELEMENTS[dotElem].color : '#ff5e6c';
            S.dmgNumbers.push({x:m.x+(Math.random()-0.5)*10,y:m.y-22,text:dot.amount+'',color:dotColor,ts:Date.now()});
            m._lastDotDmg = null;
          }
          /* Check if DoT killed */
          if(m.curHp <= 0 && m.alive){
            m.alive = false; m.respawnAt = Date.now() + 30000;
            m.statuses = {};
            /* Quest kill tracking */
            if(R._questKills === undefined) R._questKills = {};
            Object.keys(QUEST_CHAINS).forEach(qid => {
              if(R._quests?.[qid] === QUEST_STATUS.active) R._questKills[qid] = (R._questKills[qid]||0) + 1;
            });
            /* Death feedback */
            S.dmgNumbers.push({x:m.x,y:m.y-30,text:'☠️',color:'#ff5e6c',ts:Date.now()});
            S.groundLoot.push({x:m.x,y:m.y,coins:m.gold||2,xp:m.xp||10,skull:m.type,skullEmoji:m.emoji,ts:Date.now()});
            S.screenShake = 3;
            /* Death particles */
            for(let dp=0;dp<12;dp++){
              S.hitParticles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,
                life:1,color:m.color,size:1.5+Math.random()*2});
            }
            BT_AUDIO.deathBoom();
            setRpgState({...R});
          }

          /* Skip if stunned */
          if(m._stunUntil && Date.now() < m._stunUntil) return;

          /* Status-based movement modifiers */
          let moveMult = 1.0;
          if(m.statuses.freeze) moveMult = 0; /* frozen = can't move */
          if(m.statuses.root) moveMult = 0;   /* rooted = can't move */
          if(m.statuses.slow) moveMult *= 0.4; /* slowed */
          /* Kill slowmo — everything moves at 30% speed during kill dilation */
          if(S._killSlowmo && Date.now()-S._killSlowmo < (S._killSlowmoDuration||200)){
            moveMult *= 0.3;
          } else if(S._killSlowmo){
            S._killSlowmo = null; /* expired */
          }
          /* Legacy compat for old _frozen/_slowed flags */
          if(m._frozen && Date.now()<m._frozen) moveMult = 0;
          if(m._slowed && Date.now()<m._slowed) moveMult *= 0.3;

          /* ═══ ARCHETYPE AI — §Creative Vision §9: Alive, Not Artificial ═══ */
          const distToP = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
          const arch = m.archetype || 'fodder';

          /* Aggro range varies by archetype */
          const aggroRange = {fodder:100, brute:90, swarm:130, sentinel:80, volatile:110, stalker:160, hexer:140}[arch] || 120;
          const atkRange = arch==='hexer' ? 60 : arch==='stalker' ? 30 : 18;
          const atkCooldown = {fodder:1500, brute:2200, swarm:800, sentinel:1800, volatile:1200, stalker:1000, hexer:2500}[arch] || 1500;

          if(distToP < aggroRange && moveMult > 0){
            /* ═══ AGGRO ALERT — "!" flash when enemy first notices player ═══ */
            if(!m._aggroed){
              m._aggroed = true;
              m._aggroTs = Date.now();
            }
            const chDx = P.x-m.x, chDy = P.y-m.y;
            const chDist = Math.sqrt(chDx*chDx+chDy*chDy);

            /* Archetype-specific movement behavior */
            if(arch === 'stalker'){
              /* Stalker: circle-strafe, then dash in for quick hit */
              if(!m._stalkPhase) m._stalkPhase = 'circle';
              if(m._stalkPhase === 'circle'){
                /* Circle the player */
                const perpAngle = Math.atan2(chDy, chDx) + Math.PI/2;
                if(chDist > 40){
                  m.x += (chDx/chDist)*m.spd*moveMult;
                  m.y += (chDy/chDist)*m.spd*moveMult;
                } else {
                  m.x += Math.cos(perpAngle)*m.spd*moveMult*0.8;
                  m.y += Math.sin(perpAngle)*m.spd*moveMult*0.8;
                }
                if(Math.random() < 0.008) m._stalkPhase = 'dash'; /* randomly dash in */
              } else {
                /* Dash toward player */
                if(chDist > 15) {
                  m.x += (chDx/chDist)*m.spd*moveMult*2.5;
                  m.y += (chDy/chDist)*m.spd*moveMult*2.5;
                }
                if(chDist < 20 || Math.random() < 0.02) m._stalkPhase = 'circle';
              }
            } else if(arch === 'hexer'){
              /* Hexer: keep distance, back away if player gets close */
              const idealRange = 50;
              if(chDist < idealRange * 0.7){
                /* Retreat */
                m.x -= (chDx/chDist)*m.spd*moveMult*1.2;
                m.y -= (chDy/chDist)*m.spd*moveMult*1.2;
              } else if(chDist > idealRange * 1.3){
                /* Approach */
                m.x += (chDx/chDist)*m.spd*moveMult*0.7;
                m.y += (chDy/chDist)*m.spd*moveMult*0.7;
              }
              /* Slight side-to-side wobble */
              m.x += Math.sin(Date.now()/500 + m.spawnX)*0.3;
            } else if(arch === 'swarm'){
              /* Swarm: rush directly at player, fast, erratic zigzag */
              if(chDist > 12){
                const zigzag = Math.sin(Date.now()/200 + m.spawnX*10) * 0.6;
                const moveAngle = Math.atan2(chDy, chDx) + zigzag;
                m.x += Math.cos(moveAngle)*m.spd*moveMult;
                m.y += Math.sin(moveAngle)*m.spd*moveMult;
              }
            } else if(arch === 'volatile'){
              /* Volatile: charge straight, explodes on contact if low HP */
              if(chDist > 12){
                const chargeSpd = m.curHp < m.hp*0.3 ? m.spd*2.0 : m.spd; /* faster when low HP */
                m.x += (chDx/chDist)*chargeSpd*moveMult;
                m.y += (chDy/chDist)*chargeSpd*moveMult;
              }
            } else if(arch === 'sentinel'){
              /* Sentinel: slow, deliberate, stops periodically to "wind up" attack */
              if(!m._sentinelPause) m._sentinelPause = 0;
              m._sentinelPause -= 16.7;
              if(m._sentinelPause <= 0){
                if(chDist > 20){
                  m.x += (chDx/chDist)*m.spd*moveMult*0.6;
                  m.y += (chDy/chDist)*m.spd*moveMult*0.6;
                }
                if(chDist < 30 && Math.random() < 0.01) m._sentinelPause = 800; /* wind-up pause */
              }
            } else {
              /* Fodder + Brute: direct chase */
              if(chDist > 15){
                m.x += (chDx/chDist)*m.spd*moveMult;
                m.y += (chDy/chDist)*m.spd*moveMult;
              }
            }

            /* Monster attacks player if in range */
            if(distToP < atkRange && !invuln){
              if(!m._atkCd || Date.now()-m._atkCd > atkCooldown){
                m._atkCd = Date.now();
                const shielded = Date.now() < S.shieldEnd;
                let rawDmg = Math.max(1, m.dmg);
                /* §18.1 Food buff — resist reduces incoming damage */
                if(S._resistBuff && Date.now() < S._resistBuff) rawDmg = Math.max(1, Math.floor(rawDmg * 0.85));
                const blockReduc = shielded ? calcBlockReduction(R.fortification) : 0;
                const dmgTaken = shielded ? Math.max(1, Math.floor(rawDmg * (1 - blockReduc))) : rawDmg;

                /* Volatile: AoE damage burst when low HP */
                if(arch === 'volatile' && m.curHp < m.hp*0.3 && !m._exploded){
                  m._exploded = true;
                  m.curHp = 0; m.alive = false; m.respawnAt = Date.now()+30000;
                  /* Explosion damages player + visual */
                  const explodeDmg = Math.round(m.dmg * 2);
                  R.hp -= shielded ? Math.max(1, Math.floor(explodeDmg*(1-blockReduc))) : explodeDmg;
                  S.screenShake = 8;
                  S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥BOOM -'+explodeDmg,color:'#ea580c',ts:Date.now()});
                  for(let ep=0;ep<30;ep++){
                    S.hitParticles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-3,
                      life:1.2,color:(['#ea580c','#f5c542','#ff5e6c'])[Math.floor(Math.random()*3)],size:2+Math.random()*3});
                  }
                  BT_AUDIO.deathBoom();
                  BT_AUDIO.beep(100,0.2,0.3,'sawtooth');
                  S.groundLoot.push({x:m.x,y:m.y,coins:m.gold,xp:m.xp,skull:m.type,skullEmoji:m.emoji,ts:Date.now()});
                } else {
                  R.hp -= dmgTaken;
                  S.lastDamageTaken = Date.now();
                  if(shielded){
                    m._stunUntil = Date.now() + 2000;
                    S.dmgNumbers.push({x:P.x,y:P.y-30,text:'🛡️ -'+dmgTaken,color:'#60a5fa',ts:Date.now()});
                    S.dmgNumbers.push({x:m.x,y:m.y-25,text:'STUNNED',color:'#f5c542',ts:Date.now()});
                    BT_AUDIO.beep(300, 0.08, 0.12, 'square');
                    /* ═══ BLOCK FEEDBACK — blue flash + shield particles ═══ */
                    S.screenShake = 3;
                    S._blockFlash = Date.now();
                    if(!S._impactRings) S._impactRings = [];
                    S._impactRings.push({x:P.x, y:P.y, ts:Date.now(), color:'#60a5fa', maxR:25, duration:200});
                    for(let bp=0;bp<10;bp++){
                      const bpA = Math.atan2(m.y-P.y, m.x-P.x) + (Math.random()-0.5)*1.5;
                      S.hitParticles.push({
                        x:P.x+Math.cos(bpA)*20, y:P.y+Math.sin(bpA)*20,
                        vx:Math.cos(bpA)*(1+Math.random()*3), vy:Math.sin(bpA)*(1+Math.random()*3)-1,
                        life:0.5, color:['#60a5fa','#93c5fd','#fff'][Math.floor(Math.random()*3)], size:1.5+Math.random()
                      });
                    }
                    BT_AUDIO.beep(600, 0.05, 0.06, 'sine'); /* metallic ping */
                  } else {
                    S.dmgNumbers.push({x:P.x,y:P.y-30,text:'-'+dmgTaken,color:'#ff5e6c',ts:Date.now()});
                  }
                }
                if(R.hp <= 0){
                  /* §5.5 Player death — respawn in town — CINEMATIC */
                  /* Death explosion from player */
                  for(let dp=0;dp<35;dp++){
                    const dpA = (dp/35)*Math.PI*2;
                    S.hitParticles.push({
                      x:P.x, y:P.y,
                      vx:Math.cos(dpA)*(2+Math.random()*5), vy:Math.sin(dpA)*(2+Math.random()*5)-1,
                      life:1.2, color:(['#ff5e6c','#cc2233','#ff8888','#aa0020','#fff'])[Math.floor(Math.random()*5)],
                      size:2+Math.random()*3
                    });
                  }
                  S.screenShake = 12;
                  S._deathFlash = Date.now();
                  BT_AUDIO.beep(80,0.3,0.4,'sawtooth');
                  setTimeout(()=>BT_AUDIO.beep(60,0.2,0.3,'sawtooth'),150);
                  R.hp = R.maxHp; R.stamina = R.maxStamina; R.mana = R.maxMana;
                  R.coins = Math.max(0, Math.floor(R.coins*0.9));
                  S.currentZone = 'town'; updateZoneDimensions('town'); BT_AUDIO.startZoneAmbient('town');
                  S.map = generateZoneMap('town'); S.monsters = spawnMonstersForZone(ZONES.town);
                  P.x = 20*TILE; P.y = 20*TILE;
                  S.respawnTimer = Date.now() + RESPAWN_INVULN;
                  S.dmgNumbers.push({x:P.x,y:P.y-40,text:'💀 RESPAWN',color:'#f5c542',ts:Date.now()});
                  S.dmgNumbers.push({x:P.x,y:P.y-25,text:'-10% Gold',color:'#ff5e6c',ts:Date.now()});
                  S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
                  S._ambientParticles = [];
                }
                setRpgState({...R});
              }
            }
          } else {
            /* Wander — archetype personality */
            m._aggroed = false;
            m.moveTimer -= 16.7;
            if(m.moveTimer <= 0){
              const wanderDist = arch==='swarm' ? 40 : arch==='stalker' ? 100 : 60;
              m.targetX = m.spawnX + (Math.random()-0.5)*wanderDist*2;
              m.targetY = m.spawnY + (Math.random()-0.5)*wanderDist*2;
              m.moveTimer = arch==='swarm' ? 1000+Math.random()*1500 : 2000+Math.random()*3000;
            }
            const wDx=m.targetX-m.x, wDy=m.targetY-m.y;
            const wDist=Math.sqrt(wDx*wDx+wDy*wDy);
            if(wDist>2){ m.x+=wDx/wDist*m.spd*0.5*moveMult; m.y+=wDy/wDist*m.spd*0.5*moveMult; }
          }
        });

        /* §11 Combat intensity — swell ambient when monsters are nearby */
        const nearestMonsterDist = S.monsters.reduce((min,m)=>{
          if(!m.alive) return min;
          const d = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
          return d<min?d:min;
        }, 9999);
        BT_AUDIO.setCombatIntensity(nearestMonsterDist < 100);

        /* ═══ LOW HP HEARTBEAT — thumping audio pulse below 25% HP ═══ */
        if(R.hp < R.maxHp * 0.25 && R.hp > 0){
          if(!S._heartbeatTimer) S._heartbeatTimer = 0;
          S._heartbeatTimer++;
          const hbRate = R.hp < R.maxHp * 0.1 ? 25 : 40; /* faster when critically low */
          if(S._heartbeatTimer % hbRate === 0){
            BT_AUDIO.beep(45, 0.06, 0.12, 'sine');
            setTimeout(()=>BT_AUDIO.beep(40, 0.04, 0.08, 'sine'), 120);
          }
        } else {
          S._heartbeatTimer = 0;
        }

        /* Sword swing — check hits */
        /* Clear lock if target is dead */
        if(S.lockedTarget){
          const lt = S.lockedTarget;
          if(lt.type==='monster' && (!lt.ref.alive || lt.ref.curHp<=0)) S.lockedTarget = null;
          else if(lt.type==='npc' && !lt.ref.alive) S.lockedTarget = null;
        }
        /* Auto-attack: trigger swing/bow automatically */
        if(S.autoAttack && S.rpg && Date.now()-S.swingTimer >= SWING_COOLDOWN){
          if(!(S._playerStunUntil && Date.now() < S._playerStunUntil)){
            if((S.rpg?.activeSlot === 'ranged' || S.rpg?.activeSlot === 'staff')){
              let arrAngle;
              if(S.lockedTarget && S.lockedTarget.ref){
                const lt = S.lockedTarget.ref;
                arrAngle = Math.atan2((lt.y||0)-P.y, (lt.x||0)-P.x);
              } else if(S._aiming && S._aimAngle != null){
                arrAngle = S._aimAngle;
              } else {
                const fd = S._facing||'down';
                arrAngle = fd==='right'?0:fd==='up'?-Math.PI/2:fd==='left'?Math.PI:Math.PI/2;
              }
              if(!S.arrows) S.arrows = [];
              const isStaff = S.rpg?.activeSlot === 'staff';
              S.arrows.push({ang:arrAngle, dist:14, dmg:Math.round(pDmg*(isStaff?1.0:0.7)),
                life:isStaff?90:120, maxLife:isStaff?90:120, hitIds:new Set(),
                isStaff:isStaff});
