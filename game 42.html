          ctx.fillRect(0, 0, W, H);
          /* Radial focus toward kill point (screen center approx) */
          ctx.fillStyle = `rgba(245,197,66,${smAlpha*0.5})`;
          ctx.beginPath(); ctx.arc(W/2, H/2, 30+smAge*50, 0, Math.PI*2); ctx.fill();
        }
      }

      /* ═══ ZONE TRANSITION WIPE — element-colored cinematic fade ═══ */
      if(S._zoneWipe){
        const wipeAge = (Date.now()-S._zoneWipe)/600;
        if(wipeAge < 1){
          const zWipe = ZONES[S.currentZone];
          const zElemColor = zWipe?.element ? (ELEMENTS[zWipe.element]?.color||'#fff') : '#5b52ff';
          /* Fast fade in, slower fade out */
          const wipeAlpha = wipeAge < 0.25 ? wipeAge/0.25 : 1-(wipeAge-0.25)/0.75;
          /* Dark base */
          ctx.fillStyle = `rgba(0,0,0,${Math.max(0,wipeAlpha)*0.8})`;
          ctx.fillRect(0, 0, W, H);
          /* Element color wash overlay */
          ctx.fillStyle = zElemColor;
          ctx.globalAlpha = Math.max(0,wipeAlpha)*0.1;
          ctx.fillRect(0, 0, W, H);
          ctx.globalAlpha = 1;
          /* Horizontal wipe line — sweeps across screen */
          if(wipeAge < 0.5){
            const lineY = H * (wipeAge/0.5);
            ctx.fillStyle = zElemColor;
            ctx.globalAlpha = 0.3;
            ctx.fillRect(0, lineY-2, W, 4);
            ctx.globalAlpha = 1;
          }
          /* Zone name flash at peak */
          if(wipeAge > 0.15 && wipeAge < 0.65){
            const nameAlpha = wipeAge < 0.35 ? (wipeAge-0.15)/0.2 : (0.65-wipeAge)/0.3;
            ctx.globalAlpha = nameAlpha;
            /* Zone name — large, with glow */
            ctx.shadowColor = zElemColor; ctx.shadowBlur = 20;
            ctx.font = 'bold 28px "VT323", monospace';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText(zWipe?.name||'', W/2, H/2-5);
            ctx.shadowBlur = 0;
            /* Element subtitle */
            ctx.font = '13px "VT323", monospace';
            ctx.fillStyle = zElemColor;
            const subText = zWipe?.element ? '— '+zWipe.element.toUpperCase()+' ZONE —' : '';
            ctx.fillText(subText, W/2, H/2+18);
            /* Level range */
            if(zWipe?.level){
              ctx.font = '10px "VT323", monospace';
              ctx.fillStyle = 'rgba(255,255,255,0.5)';
              ctx.fillText('Lv '+zWipe.level[0]+' - '+zWipe.level[1], W/2, H/2+32);
            }
            ctx.globalAlpha = 1;
          }
        } else {
          S._zoneWipe = null;
        }
      }

      /* ═══ DEATH FLASH — red-black slam on player death ═══ */
      if(S._deathFlash){
        const dfAge = (Date.now()-S._deathFlash)/800;
        if(dfAge < 1){
          const dfAlpha = dfAge < 0.15 ? dfAge/0.15 : Math.max(0, 1-dfAge);
          ctx.fillStyle = dfAge < 0.15 ? `rgba(200,0,0,${dfAlpha*0.4})` : `rgba(10,0,0,${dfAlpha*0.5})`;
          ctx.fillRect(0, 0, W, H);
          if(dfAge > 0.1 && dfAge < 0.5){
            const skullAlpha = dfAge < 0.3 ? (dfAge-0.1)/0.2 : (0.5-dfAge)/0.2;
            ctx.globalAlpha = skullAlpha;
            ctx.font = '40px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('💀', W/2, H/2+10);
            ctx.font = 'bold 16px "VT323", monospace';
            ctx.fillStyle = '#ff5e6c';
            ctx.fillText('YOU DIED', W/2, H/2+35);
            ctx.globalAlpha = 1;
          }
        } else {
          S._deathFlash = null;
        }
      }

      ctx.restore(); /* end screen shake */

      /* Minimap — zone-aware with monsters, exits, dungeon */
      const mmW=100, mmH=75, mmX=W-mmW-8, mmY=46;
      /* Zone-tinted background */
      const _mmZone = ZONES[S.currentZone];
      const _mmBg = _mmZone?.palette?.ground || '#0d0b18';
      ctx.fillStyle = _mmBg;
      ctx.globalAlpha = 0.6;
      ctx.fillRect(mmX, mmY, mmW, mmH);
      ctx.globalAlpha = 1;

      /* Terrain on minimap */
      const mmSx = mmW/COLS, mmSy = mmH/ROWS;
      for(let r=0;r<ROWS;r++) for(let cl=0;cl<COLS;cl++){
        const t = map[r]?.[cl]; if(t===undefined) continue;
        if(t===2){
          /* Water/lava/void — zone tinted */
          const _wCol = zoneElem==='flame'?'rgba(200,80,20,.5)':zoneElem==='dark'?'rgba(40,20,60,.5)':zoneElem==='frost'?'rgba(140,180,220,.5)':'rgba(42,108,168,.5)';
          ctx.fillStyle = _wCol;
          ctx.fillRect(mmX+cl*mmSx, mmY+r*mmSy, mmSx+.5, mmSy+.5);
        } else if(t===6){
          ctx.fillStyle = zoneElem==='frost'?'rgba(200,220,240,.4)':'rgba(212,180,131,.4)';
          ctx.fillRect(mmX+cl*mmSx, mmY+r*mmSy, mmSx+.5, mmSy+.5);
        } else if(t===7){
          ctx.fillStyle = 'rgba(107,107,107,.4)';
          ctx.fillRect(mmX+cl*mmSx, mmY+r*mmSy, mmSx+.5, mmSy+.5);
        } else if(t===4){
          ctx.fillStyle = 'rgba(20,60,10,.3)';
          ctx.fillRect(mmX+cl*mmSx, mmY+r*mmSy, mmSx+.5, mmSy+.5);
        } else if(t===10){
          /* Dungeon entrance — pulsing red dot on minimap */
          const dPulse = Math.sin(now/300)*0.3+0.7;
          ctx.fillStyle = `rgba(255,94,108,${dPulse})`;
          ctx.fillRect(mmX+cl*mmSx-1, mmY+r*mmSy-1, mmSx+2, mmSy+2);
        }
      }

      /* Buildings on minimap (town only) */
      if(S.currentZone === 'town') { ctx.fillStyle = 'rgba(74,58,92,.6)';
      BUILDINGS.forEach(b=>{
        ctx.fillRect(mmX+b.bx*mmSx, mmY+b.by*mmSy, b.bw*mmSx, b.bh*mmSy);
      }); }

      /* Paths on minimap */
      ctx.fillStyle = 'rgba(139,115,85,.25)';
      for(let r=0;r<ROWS;r++) for(let cl=0;cl<COLS;cl++){
        if(map[r]?.[cl]===1) ctx.fillRect(mmX+cl*mmSx, mmY+r*mmSy, mmSx+.5, mmSy+.5);
      }

      /* ═══ MONSTERS on minimap — red dots for alive enemies ═══ */
      if(S.monsters){
        S.monsters.forEach(m=>{
          if(!m.alive) return;
          const mmx = mmX + (m.x/TOWN_W)*mmW;
          const mmy = mmY + (m.y/TOWN_H)*mmH;
          ctx.fillStyle = m._aggroed ? '#ff5e6c' : 'rgba(255,94,108,.4)';
          ctx.fillRect(mmx-0.8, mmy-0.8, 1.6, 1.6);
        });
      }

      /* ═══ EXIT ARROWS on minimap — show which edges lead somewhere ═══ */
      if(S.currentZone !== 'town' && !S._inDungeon){
        /* All edges return to town — green arrows on each edge */
        ctx.fillStyle = '#3dd497';
        ctx.globalAlpha = 0.5+Math.sin(now/500)*0.2;
        /* Top arrow */
        ctx.beginPath(); ctx.moveTo(mmX+mmW/2-4,mmY+3); ctx.lineTo(mmX+mmW/2,mmY); ctx.lineTo(mmX+mmW/2+4,mmY+3); ctx.fill();
        /* Bottom arrow */
        ctx.beginPath(); ctx.moveTo(mmX+mmW/2-4,mmY+mmH-3); ctx.lineTo(mmX+mmW/2,mmY+mmH); ctx.lineTo(mmX+mmW/2+4,mmY+mmH-3); ctx.fill();
        /* Left arrow */
        ctx.beginPath(); ctx.moveTo(mmX+3,mmY+mmH/2-4); ctx.lineTo(mmX,mmY+mmH/2); ctx.lineTo(mmX+3,mmY+mmH/2+4); ctx.fill();
        /* Right arrow */
        ctx.beginPath(); ctx.moveTo(mmX+mmW-3,mmY+mmH/2-4); ctx.lineTo(mmX+mmW,mmY+mmH/2); ctx.lineTo(mmX+mmW-3,mmY+mmH/2+4); ctx.fill();
        ctx.globalAlpha = 1;
      } else if(S.currentZone === 'town'){
        /* In town — colored arrows for each zone exit */
        TOWN_EXITS.forEach(ex=>{
          let ax,ay,dx2=0,dy2=0;
          if(ex.dir==='north'){ax=mmX+ex.tx*mmSx;ay=mmY;dy2=-1;}
          if(ex.dir==='south'){ax=mmX+ex.tx*mmSx;ay=mmY+mmH;dy2=1;}
          if(ex.dir==='east'){ax=mmX+mmW;ay=mmY+ex.ty*mmSy;dx2=1;}
          if(ex.dir==='west'){ax=mmX;ay=mmY+ex.ty*mmSy;dx2=-1;}
          ctx.fillStyle = ex.color;
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.moveTo(ax-3*dy2, ay-3*dx2);
          ctx.lineTo(ax+dx2*4, ay+dy2*4);
          ctx.lineTo(ax+3*dy2, ay+3*dx2);
          ctx.fill();
          ctx.globalAlpha = 1;
        });
      }

      /* Uncollected items on minimap */
      if(S.collectibles){
        ctx.fillStyle = '#f5c542';
        S.collectibles.forEach(item=>{
          if(item.collected) return;
          const ix = mmX + (item.x/TOWN_W)*mmW;
          const iy = mmY + (item.y/TOWN_H)*mmH;
          const pulse = Math.sin(now/400+item.x)*0.5+0.5;
          ctx.globalAlpha = 0.5 + pulse*0.5;
          ctx.fillRect(ix-1, iy-1, 2, 2);
          ctx.globalAlpha = 1;
        });
      }

      /* NPCs on minimap — yellow dots */
      if(S.npcs){
        ctx.fillStyle = '#f5c542';
        S.npcs.forEach(npc=>{
          ctx.fillRect(mmX+(npc.x/TOWN_W)*mmW-1, mmY+(npc.y/TOWN_H)*mmH-1, 2.5, 2.5);
        });
      }

      /* Other players on minimap */
      Object.values(S.others).forEach(o=>{
        const omx = mmX + (o.x/TOWN_W)*mmW;
        const omy = mmY + (o.y/TOWN_H)*mmH;
        ctx.fillStyle = o.color;
        ctx.fillRect(omx-1.5, omy-1.5, 3, 3);
      });

      /* Player dot on minimap — white with directional arrow */
      const mmPx = mmX + (P.x/TOWN_W)*mmW;
      const mmPy = mmY + (P.y/TOWN_H)*mmH;
      ctx.fillStyle = '#fff';
      ctx.fillRect(mmPx-2, mmPy-2, 4, 4);
      /* Direction indicator — small triangle pointing in facing direction */
      const _mmFace = S._facing||'down';
      const _mmFA = _mmFace==='right'?0:_mmFace==='up'?-Math.PI/2:_mmFace==='left'?Math.PI:Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(mmPx+Math.cos(_mmFA)*4, mmPy+Math.sin(_mmFA)*4);
      ctx.lineTo(mmPx+Math.cos(_mmFA+2.3)*2.5, mmPy+Math.sin(_mmFA+2.3)*2.5);
      ctx.lineTo(mmPx+Math.cos(_mmFA-2.3)*2.5, mmPy+Math.sin(_mmFA-2.3)*2.5);
      ctx.closePath(); ctx.fill();
      /* Pulse ring around player */
      const pulse = Math.sin(now/300)*0.3+0.5;
      ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
      ctx.lineWidth = 0.5;
      ctx.strokeRect(mmPx-3, mmPy-3, 6, 6);

      /* Viewport rect on minimap */
      ctx.strokeStyle = 'rgba(255,255,255,.35)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(mmX+(cx/TOWN_W)*mmW, mmY+(cy/TOWN_H)*mmH, (W/TOWN_W)*mmW, (H/TOWN_H)*mmH);

      /* Zone name on minimap — current zone */
      ctx.font = 'bold 6px "VT323", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = _mmZone?.element ? (ELEMENTS[_mmZone.element]?.color||'rgba(255,255,255,.4)') : 'rgba(255,255,255,.4)';
      ctx.fillText(_mmZone?.name||'', mmX+mmW/2, mmY+7);

      /* Minimap border — zone-tinted */
      ctx.strokeStyle = _mmZone?.element ? (ELEMENTS[_mmZone.element]?.color+'44') : 'rgba(255,255,255,.2)';
      ctx.lineWidth = 1;
      ctx.strokeRect(mmX, mmY, mmW, mmH);


    };

    frameRef.current = requestAnimationFrame(gameLoop);

    /* Keyboard */
    const onKeyDown = (e) => {
      if(document.activeElement?.tagName==='INPUT') return;
      S.keys[e.key] = true;
    };
    const onKeyUp = (e) => { S.keys[e.key] = false; };
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);

    return () => {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener('keydown', onKeyDown);
      window.removeEventListener('keyup', onKeyUp);
      window.removeEventListener('resize', resize);
      if(resizeObs) resizeObs.disconnect();
      if(vv) vv.removeEventListener('resize', resize);
    };
  },[showNameModal,showLogin]);



  /* Sync nearBuilding + player list from game loop to React */
  useEffect(()=>{
    if(showNameModal||showLogin) return;
    const interval = setInterval(()=>{
      const S = stateRef.current;
      const nb = S.nearBuilding;

                if(S.lockedTarget && S.lockedTarget.ref === closest){

                  setInspectPlayer({id, name:o.name, color:o.color, avatar:o.avatar, bro:o.bro, x:o.x, y:o.y});

                  <div style={{fontSize:9,color:'rgba(255,255,255,.4)'}}>Gold is never lost on death (only 10% penalty)</div>
                </div>
                <div style={{padding:12,borderRadius:10,background:'rgba(91,82,255,.08)',border:'1px solid rgba(91,82,255,.2)'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#5b52ff',marginBottom:4}}>🗡️ Equipment</div>
                  <div style={{fontSize:9,color:'rgba(255,255,255,.5)',lineHeight:1.5}}>
                    Melee: {rpgState.weapon?.name||'None'}<br/>
                    Ranged: {rpgState.rangedWeapon?.name||'None'}<br/>
                    Armor: {rpgState.armor?.name||'None'}
                  </div>
                </div>
              </>)}

              {/* ENCHANTING — add/upgrade elements */}
              {buildingPanel==='enchant'&&(<>
                <div style={{fontSize:16,fontWeight:800,color:'#a78bfa',marginBottom:4}}>✨ Enchanter</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:8}}>
                  Enchanting Lv{rpgState.lifeSkills?.enchanting?.level||1} · Upgrade your weapon's elements. Cost scales with tier.
                </div>
                {/* Current weapon display */}
                {[{label:'Melee',wpn:rpgState.weapon},{label:'Ranged',wpn:rpgState.rangedWeapon},{label:'Staff',wpn:rpgState.staffWeapon}].map(({label,wpn})=>(
                  <div key={label} style={{marginBottom:10,padding:10,borderRadius:10,background:'rgba(167,139,250,.06)',border:'1px solid rgba(167,139,250,.15)'}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#fff',marginBottom:4}}>{label}: {wpn?.name||'None'}</div>
                    <div style={{fontSize:9,display:'flex',gap:6,flexWrap:'wrap'}}>
                      <span style={{color:RARITY_TIERS[wpn?.tier]?.color||'#888'}}>
                        {RARITY_TIERS[wpn?.tier]?.label||'Common'} ({wpn?.tierMult||1}×)
                      </span>
                      {wpn?.element1&&<span style={{color:ELEMENTS[wpn.element1]?.color}}>
                        E1: {wpn.element1}
                      </span>}
                      {wpn?.element2&&<span style={{color:ELEMENTS[wpn.element2]?.color}}>
                        E2: {wpn.element2}
                      </span>}
                      {wpn?.isVolatile&&<span style={{color:'#ff5e6c',fontSize:8}}>⚡VOLATILE</span>}
                    </div>
                  </div>
                ))}
                {/* Enchanting options */}
                <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.6)',marginBottom:6}}>Available enchantments:</div>
                {['flame','frost','water','venom','storm','stone','wind'].map(elem=>{
                  const edef = ELEMENTS[elem];
                  const cost = rpgState.weapon?.tier==='common'?500:rpgState.weapon?.tier==='elemental'?2000:5000;
                  return (
                    <div key={elem} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,
                      padding:'4px 8px',borderRadius:6,background:'rgba(255,255,255,.03)'}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:edef.color}}/>
                      <span style={{fontSize:9,fontWeight:600,color:edef.color,flex:1,textTransform:'capitalize'}}>{elem}</span>
                      <span style={{fontSize:8,color:'rgba(255,255,255,.3)'}}>Status: {edef.status}</span>
                      <button style={{padding:'2px 8px',borderRadius:4,border:'none',fontSize:8,fontWeight:700,
                        background:rpgState.coins>=cost?edef.color:'rgba(255,255,255,.1)',
                        color:rpgState.coins>=cost?'#000':'rgba(255,255,255,.3)',cursor:'pointer'}}
                        onClick={()=>{
                          const R=stateRef.current.rpg;
                          if(R.coins<cost) return;
                          R.coins-=cost;
                          const wpn = R.weapon;
                          if(!wpn.element1){
                            wpn.element1=elem; wpn.tier='elemental'; wpn.tierMult=1.5;
                            wpn.name=elem.charAt(0).toUpperCase()+elem.slice(1)+' '+WEAPON_TYPES[wpn.type].label;
                          } else if(!wpn.element2 && wpn.element1!==elem){
                            wpn.element2=elem; wpn.tier='fusion'; wpn.tierMult=2.25;
                            /* Check volatile */
                            const volPairs = [['flame','water'],['water','venom'],['venom','wind'],['wind','stone'],['stone','storm'],['storm','frost'],['frost','flame']];
                            wpn.isVolatile = volPairs.some(([a,b])=>(wpn.element1===a&&wpn.element2===b)||(wpn.element1===b&&wpn.element2===a));
                            const e1n=wpn.element1.charAt(0).toUpperCase()+wpn.element1.slice(1);
                            const e2n=elem.charAt(0).toUpperCase()+elem.slice(1);
                            wpn.name=e1n+e2n.toLowerCase()+' '+WEAPON_TYPES[wpn.type].label;
                          } else {
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'Weapon already has 2 elements!',color:'#ff5e6c',ts:Date.now()});
                            return;
                          }
                          /* Enchanting XP + quest flag */
                          const sk = R.lifeSkills;
                          if(sk) addLifeSkillXp(sk, 'enchanting', wpn.tier==='fusion'?50:25);
                          if(!R._questFlags) R._questFlags={};
                          R._questFlags.enchantedWeapon = true;
                          setRpgState({...R});
                          try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                          BT_AUDIO.collect();
                          stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                            text:'✨ '+elem+' enchanted!',color:edef.color,ts:Date.now()});
                          if(sk?.enchanting) stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-45,
                            text:'+Enchanting XP',color:'#a78bfa',ts:Date.now()});
                        }}>
                        {cost}g
                      </button>
                    </div>
                  );
                })}
              </>)}

              {/* KITCHEN — recipe-based cooking with gathered ingredients */}
              {buildingPanel==='cook'&&(<>
                <div style={{fontSize:16,fontWeight:800,color:'#ea580c',marginBottom:4}}>🍳 Kitchen</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:6}}>
                  Cooking Lv{rpgState.lifeSkills?.cooking?.level||1} · Cook recipes from gathered ingredients.
                </div>

                {COOKING_RECIPES.map((recipe,ri) => {
                  const cookLvl = rpgState.lifeSkills?.cooking?.level || 1;
                  const canCook = cookLvl >= recipe.cookLvl;
                  const inv = rpgState.inventory || {};
                  /* Check if player has all ingredients (match by resource type) */
                  const hasIngredients = Object.entries(recipe.ingredients).every(([type, count]) => {
                    /* Count all items of this resource type in inventory */
                    const total = Object.entries(inv).filter(([k,v]) => k.includes(type) && v > 0)
                      .reduce((sum,[k,v]) => sum + v, 0);
                    return total >= count;
                  });

                  const buffDesc = recipe.buff === 'all' ? `+${Math.round(recipe.power*100)}% all stats`
                    : recipe.buff === 'regen' ? `+${Math.round(recipe.power*100)}% regen`
                    : recipe.buff === 'resist' ? `+${Math.round(recipe.power*100)}% resist`
                    : `+${Math.round(recipe.power*100)}% ${recipe.buff}`;

                  return (
                    <div key={ri} style={{display:'flex',alignItems:'center',gap:6,marginBottom:5,
                      padding:'6px 8px',borderRadius:8,background:'rgba(255,255,255,.03)',
                      border:'1px solid rgba(255,255,255,.06)',opacity:canCook?1:0.5}}>
                      <span style={{fontSize:16}}>🍲</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,fontWeight:700,color:canCook?'#fff':'#666'}}>
                          {recipe.name} <span style={{fontSize:7,color:'rgba(255,255,255,.3)'}}>T{recipe.tier}</span>
                        </div>
                        <div style={{fontSize:7,color:'rgba(255,255,255,.4)'}}>
                          {buffDesc} · {Math.round(recipe.duration/60)}min
                        </div>
                        <div style={{fontSize:7,color:'rgba(255,255,255,.3)'}}>
                          Needs: {Object.entries(recipe.ingredients).map(([t,c])=>c+'× '+t).join(', ')}
                          {!canCook && ` · Req Cooking Lv${recipe.cookLvl}`}
                        </div>
                      </div>
                      <button style={{padding:'3px 8px',borderRadius:5,border:'none',fontSize:8,fontWeight:700,
                        background:(canCook&&hasIngredients)?'#ea580c':'rgba(255,255,255,.08)',
                        color:(canCook&&hasIngredients)?'#fff':'rgba(255,255,255,.3)',cursor:'pointer'}}
                        onClick={()=>{
                          if(!canCook||!hasIngredients) return;
                          const R=stateRef.current.rpg;
                          const sk=R.lifeSkills;
                          /* Consume ingredients */
                          Object.entries(recipe.ingredients).forEach(([type, count]) => {
                            let remaining = count;
                            Object.keys(R.inventory||{}).forEach(k => {
                              if(remaining <= 0 || !k.includes(type)) return;
                              const take = Math.min(R.inventory[k], remaining);
                              R.inventory[k] -= take;
                              remaining -= take;
                              if(R.inventory[k] <= 0) delete R.inventory[k];
                            });
                          });
                          /* Apply food buff */
                          const dur = recipe.duration * 1000;
                          const S = stateRef.current;
                          if(recipe.buff==='regen') S._regenBuff = Date.now()+dur;
                          if(recipe.buff==='resist') S._resistBuff = Date.now()+dur;
                          if(recipe.buff==='damage') S._dmgBuff = Date.now()+dur;
                          if(recipe.buff==='all'){ S._dmgBuff=Date.now()+dur; S._spdBuff=Date.now()+dur; S._hpBuff=Date.now()+dur; S._manaBuff=Date.now()+dur; }
                          /* Cooking XP */
                          const leveled = addLifeSkillXp(sk, 'cooking', recipe.tier * 25);
                          S.dmgNumbers.push({x:S.player.x,y:S.player.y-30,text:'🍳 '+recipe.name+'!',color:'#ea580c',ts:Date.now()});
                          if(leveled) S.dmgNumbers.push({x:S.player.x,y:S.player.y-50,text:'🍳 Cooking Lv'+sk.cooking.level+'!',color:'#f5c542',ts:Date.now()});
                          setRpgState({...R});
                          try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                          BT_AUDIO.collect();
                        }}>
                        Cook
                      </button>
                    </div>
                  );
                })}
              </>)}

              {/* FARM — plant seeds, harvest crops */}
              {buildingPanel==='farm'&&(<>
                <div style={{fontSize:16,fontWeight:800,color:'#3dd497',marginBottom:4}}>🌾 Farm</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:6}}>
                  Farming Lv{rpgState.lifeSkills?.farming?.level||1} · Plant seeds from zones, harvest when grown.
                </div>

                {/* Farm plots — 6 slots */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:8}}>
                  {[0,1,2,3,4,5].map(plotIdx => {
                    const plot = rpgState.lifeSkills?.farmPlots?.[plotIdx];
                    const isGrowing = plot && plot.plantedAt && Date.now()/1000 < plot.plantedAt + plot.growTime;
                    const isReady = plot && plot.plantedAt && Date.now()/1000 >= plot.plantedAt + plot.growTime;
                    const progress = plot ? Math.min(1, (Date.now()/1000 - plot.plantedAt) / plot.growTime) : 0;
                    const farmLvl = rpgState.lifeSkills?.farming?.level || 1;
                    const plotUnlocked = plotIdx < 2 || (plotIdx < 4 && farmLvl >= 10) || farmLvl >= 25;

                    return (
                      <div key={plotIdx} style={{padding:8,borderRadius:8,textAlign:'center',minHeight:70,
                        background: isReady ? 'rgba(61,220,151,.1)' : isGrowing ? 'rgba(245,197,66,.06)' : 'rgba(255,255,255,.03)',
                        border: `1px solid ${isReady?'rgba(61,220,151,.3)':isGrowing?'rgba(245,197,66,.2)':'rgba(255,255,255,.08)'}`,
                        opacity: plotUnlocked ? 1 : 0.4}}>
                        {!plotUnlocked ? (
                          <div style={{fontSize:8,color:'rgba(255,255,255,.3)',marginTop:16}}>🔒 Farm Lv{plotIdx<4?10:25}</div>
                        ) : isReady ? (
                          <div>
                            <div style={{fontSize:18}}>{plot.emoji||'🌱'}</div>
                            <div style={{fontSize:8,fontWeight:700,color:'#3dd497'}}>Ready!</div>
                            <button style={{marginTop:4,padding:'2px 8px',borderRadius:4,border:'none',
                              fontSize:8,fontWeight:700,background:'#3dd497',color:'#000',cursor:'pointer'}}
                              onClick={()=>{
                                const R=stateRef.current.rpg;
                                const sk = R.lifeSkills;
                                const p = sk.farmPlots[plotIdx];
                                const invKey = (p.rType||'herb') + '_' + p.name.replace(/\s+/g,'_').toLowerCase();
                                if(!R.inventory) R.inventory = {};
                                R.inventory[invKey] = (R.inventory[invKey]||0) + (1 + Math.floor(Math.random()*p.tier));
                                addLifeSkillXp(sk, 'farming', p.tier * 20);
                                delete sk.farmPlots[plotIdx];
                                if(!R._questFlags) R._questFlags={};
                                R._questFlags.harvestedCrop = true;
                                setRpgState({...R});
                                try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                                BT_AUDIO.collect();
                                stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                                  text:'🌾 Harvested '+p.name+'!',color:'#3dd497',ts:Date.now()});
                              }}>Harvest</button>
                          </div>
                        ) : isGrowing ? (
                          <div>
                            <div style={{fontSize:14}}>{plot.emoji||'🌱'}</div>
                            <div style={{fontSize:7,color:'#f5c542',marginTop:2}}>{plot.name}</div>
                            <div style={{height:3,background:'rgba(255,255,255,.1)',borderRadius:2,marginTop:3,overflow:'hidden'}}>
                              <div style={{width:progress*100+'%',height:'100%',background:'#f5c542',borderRadius:2}}/>
                            </div>
                            <div style={{fontSize:7,color:'rgba(255,255,255,.3)',marginTop:2}}>
                              {Math.ceil((plot.plantedAt + plot.growTime - Date.now()/1000)/60)}m left
                            </div>
                          </div>
                        ) : (
                          <div style={{fontSize:8,color:'rgba(255,255,255,.3)',marginTop:16}}>Empty plot</div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Plantable seeds from inventory */}
                <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.5)',marginBottom:4}}>Plant seeds:</div>
                {(() => {
                  const seeds = [];
                  const inv = rpgState.inventory || {};
                  Object.entries(ZONE_RESOURCES).forEach(([elem, res]) => {
                    ['crystal','ore','herb'].forEach(rType => {
                      [1,2,3,4,5].forEach(tier => {
                        const tierLabel = RESOURCE_TIERS[tier]?.label || 'Rough';
                        const name = tierLabel + ' ' + res[rType];
                        const key = rType + '_' + name.replace(/\s+/g,'_').toLowerCase();
                        if((inv[key]||0) > 0){
                          seeds.push({key, name, emoji: rType==='crystal'?'💎':rType==='ore'?'⛏️':'🌿', count: inv[key], tier, elem, rType});
                        }
                      });
                    });
                  });
                  if(seeds.length === 0) return <div style={{fontSize:8,color:'rgba(255,255,255,.3)'}}>No seeds. Gather resources from zones!</div>;
                  return seeds.slice(0,8).map(seed => (
                    <div key={seed.key} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,
                      padding:'3px 6px',borderRadius:4,background:'rgba(255,255,255,.03)'}}>
                      <span style={{fontSize:12}}>{seed.emoji}</span>
                      <span style={{fontSize:8,flex:1,color:'rgba(255,255,255,.6)'}}>{seed.name} ×{seed.count}</span>
                      <button style={{padding:'1px 6px',borderRadius:3,border:'none',fontSize:7,fontWeight:700,
                        background:'#3dd497',color:'#000',cursor:'pointer'}}
                        onClick={()=>{
                          const R=stateRef.current.rpg;
                          const sk=R.lifeSkills;
                          if(!sk.farmPlots) sk.farmPlots={};
                          /* Find empty plot */
                          const emptyIdx = [0,1,2,3,4,5].find(i=> !sk.farmPlots[i] && (i<2||(i<4&&sk.farming?.level>=10)||sk.farming?.level>=25));
                          if(emptyIdx===undefined){
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'No empty plots!',color:'#ff5e6c',ts:Date.now()});
                            return;
                          }
                          if(!R.inventory) R.inventory={};
                          if((R.inventory[seed.key]||0)<1) return;
                          R.inventory[seed.key]--;
                          if(R.inventory[seed.key]<=0) delete R.inventory[seed.key];
                          /* Plant! Growth time: tier 1=1min, tier 2=5min, tier 3=15min, tier 4=30min, tier 5=60min */
                          const growTimes = [0, 60, 300, 900, 1800, 3600];
                          sk.farmPlots[emptyIdx] = {
                            name: seed.name, emoji: seed.emoji, tier: seed.tier,
                            element: seed.elem, rType: seed.rType,
                            plantedAt: Math.floor(Date.now()/1000),
                            growTime: growTimes[seed.tier] || 60,
                          };
                          setRpgState({...R});
                          try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                          BT_AUDIO.beep(400,0.06,0.1,'sine');
                          stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                            text:'🌱 Planted '+seed.name,color:'#3dd497',ts:Date.now()});
                        }}>Plant</button>
                    </div>
                  ));
                })()}

                <div style={{fontSize:7,color:'rgba(255,255,255,.25)',marginTop:8,lineHeight:1.5}}>
                  Plots unlock at Farming Lv1 (×2), Lv10 (×4), Lv25 (×6).
                  Higher tier resources grow longer but yield more.
                  Deeper zones have rarer resources — complete dungeons to access them.
                </div>
              </>)}

              {/* TAVERN — party formation */}
              {buildingPanel==='party'&&(<>
                <div style={{fontSize:16,fontWeight:800,color:'#ff5e6c',marginBottom:8}}>🍺 Tavern</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.5)',lineHeight:1.5}}>
                  Form parties with other players. Grouped players share XP and can enter dungeons together.
                  <br/><br/>
                  <span style={{color:'#f5c542'}}>Coming soon!</span> Party formation and dungeon queue.
                </div>
              </>)}

              {/* MARKETPLACE — player trading */}
              {buildingPanel==='exchange'&&(<>
                <div style={{fontSize:16,fontWeight:800,color:'#5b52ff',marginBottom:8}}>🏪 Marketplace</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.5)',lineHeight:1.5}}>
                  Buy and sell items with other players. Global async marketplace.
                  <br/><br/>
                  <span style={{color:'#f5c542'}}>Coming soon!</span> Item listings and player-to-player trading.
                </div>
              </>)}

            </div>
          </div>
        )}

        {/* ═══ QUEST DIALOG — NPC quest interaction ═══ */}
        {questPanel&&rpgState&&(
          <div className="bt-inspect" onClick={()=>setQuestPanel(null)}>
            <div className="bt-inspect-card" onClick={e=>e.stopPropagation()} style={{width:300}}>
              <button className="bt-inspect-close" onClick={()=>setQuestPanel(null)}>✕</button>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <div style={{width:36,height:36,borderRadius:'50%',background:questPanel.npcRef?.color||'#888',
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:900,color:'#fff'}}>
                  {questPanel.npc.charAt(0)}
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{questPanel.npc}</div>
                  <div style={{fontSize:8,color:'rgba(255,255,255,.4)'}}>
                    {questPanel.status==='available'?'New Quest!':questPanel.status==='active'?'Quest Active':''}
                  </div>
                </div>
              </div>

              <div style={{fontSize:13,fontWeight:700,color:'#f5c542',marginBottom:4}}>{questPanel.quest.title}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.6)',lineHeight:1.5,marginBottom:8}}>
                {questPanel.status==='available' ? questPanel.quest.dialogue.start
                  : questPanel.quest.check(rpgState, stateRef.current)
                    ? questPanel.quest.dialogue.complete
                    : questPanel.quest.dialogue.progress}
              </div>

              <div style={{padding:8,borderRadius:8,background:'rgba(255,255,255,.04)',marginBottom:8}}>
                <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.5)'}}>Objective:</div>
                <div style={{fontSize:10,color:'#fff'}}>{questPanel.quest.desc}</div>
                {questPanel.quest.check(rpgState, stateRef.current) &&
                  <div style={{fontSize:9,fontWeight:700,color:'#3dd497',marginTop:4}}>✓ Complete!</div>}
              </div>

              <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:8}}>
                Reward: 💰{questPanel.quest.reward.gold}g · ⭐{questPanel.quest.reward.xp}XP
              </div>

              {questPanel.status==='available'&&(
                <button style={{width:'100%',padding:'8px',borderRadius:8,border:'none',
                  background:'#5b52ff',color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}
                  onClick={()=>{
                    const R=stateRef.current.rpg;
                    if(!R._quests) R._quests={};
                    R._quests[questPanel.quest.id] = QUEST_STATUS.active;
                    setRpgState({...R});
                    try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                    setQuestPanel({...questPanel, status:'active'});
                    stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-40,
                      text:'📜 Quest Accepted: '+questPanel.quest.title,color:'#5b52ff',ts:Date.now()});
                    BT_AUDIO.collect();
                  }}>Accept Quest</button>
              )}

              {questPanel.status==='active'&&questPanel.quest.check(rpgState, stateRef.current)&&(
                <button style={{width:'100%',padding:'8px',borderRadius:8,border:'none',
                  background:'#3dd497',color:'#000',fontWeight:700,fontSize:12,cursor:'pointer'}}
                  onClick={()=>{
                    const R=stateRef.current.rpg;
                    if(!R._quests) R._quests={};
                    R._quests[questPanel.quest.id] = QUEST_STATUS.turnedIn;
                    R.coins += questPanel.quest.reward.gold;
                    R.xp += questPanel.quest.reward.xp;
                    /* Unlock next quest in chain */
                    if(questPanel.quest.next && !R._quests[questPanel.quest.next]){
                      R._quests[questPanel.quest.next] = QUEST_STATUS.available;
                    }
                    setRpgState({...R});

            if(sk.pets.length >= MAX_PET_SLOTS){
              S.dmgNumbers.push({x:S.player.x,y:S.player.y-30,text:'Pet slots full! ('+MAX_PET_SLOTS+')',color:'#ff5e6c',ts:Date.now()});
              return;
            }
            /* Trap success based on trapping skill — higher skill = higher chance */
            const trapLvl = sk.trapping?.level || 1;
            const baseChance = 0.4 + trapLvl * 0.005; /* 40% at lv1, 90% at lv100 */
            const levelPenalty = Math.max(0, (m.level||1) - R.level) * 0.05;
            const chance = Math.max(0.1, Math.min(0.95, baseChance - levelPenalty));
            if(Math.random() > chance){
              S.dmgNumbers.push({x:m.x,y:m.y-25,text:'🪤 Escaped!',color:'#ff5e6c',ts:Date.now()});
              /* Trapping XP even on failure */
              addLifeSkillXp(sk, 'trapping', 5);
              BT_AUDIO.beep(200,0.08,0.12,'square');
              return;
            }
            /* Capture success! */
            const pet = createPet(m);
            sk.pets.push(pet);
            if(sk.activePet === null) sk.activePet = sk.pets.length - 1;
            m.alive = false; m.respawnAt = Date.now() + 60000;
            /* Trapping XP */
            const leveled = addLifeSkillXp(sk, 'trapping', 15 + (m.level||1)*2);
            S.dmgNumbers.push({x:m.x,y:m.y-20,text:'🪤 Captured '+pet.name+'!',color:'#3dd497',ts:Date.now()});
            S.dmgNumbers.push({x:m.x,y:m.y-35,text:pet.emoji+' '+pet.archetype+' Lv'+(m.level||1),color:pet.color,ts:Date.now()});
            if(leveled) S.dmgNumbers.push({x:S.player.x,y:S.player.y-50,text:'🪤 Trapping Lv'+sk.trapping.level+'!',color:'#f5c542',ts:Date.now()});
            S.lockedTarget = null;
            BT_AUDIO.collect();
            setTimeout(()=>BT_AUDIO.beep(523,0.1,0.08,'sine'),100);
            setTimeout(()=>BT_AUDIO.beep(659,0.1,0.08,'sine'),200);
            setTimeout(()=>BT_AUDIO.beep(784,0.15,0.1,'sine'),300);
            setRpgState({...R});
            try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
          }},
          {e:'🔑',fn:()=>{const p=getBtPassphrase();if(p)alert('Passphrase:\n\n'+p);}},
          {e:'🚪',fn:async()=>{
            if(!confirm('Log out?')) return;
            const S=stateRef.current,pid=getBtPlayerId();
            if(pid&&S.rpg){
              await btRpc('bt_register_player',{p_id:pid,p_name:S.myName||'Anon',p_avatar:S.myAvatar,p_color:S.myColor,p_body_torso:S.bodyTorso,p_body_legs:S.bodyLegs,p_bro_id:S.myBroData?.ID||null,p_bro_data:S.myBroData||null});
              syncRpgToServer(S.rpg);
              if(S.rpg.inventory) for(const [k,v] of Object.entries(S.rpg.inventory)) if(v>0) await btRpc('bt_sync_inventory',{p_id:pid,p_item:k,p_qty:v});
              if(S.rpg.skills) for(const [k,v] of Object.entries(S.rpg.skills)) if(typeof v==='number') await btRpc('bt_sync_skill',{p_id:pid,p_skill:k,p_value:v});
              if(S.stats) await btRpc('bt_update_stats',{p_id:pid,p_steps:S.stats.steps||0,p_msgs:S.stats.msgsSent||0,p_emotes:S.stats.emotesUsed||0});
            }
            try{localStorage.removeItem('bt_passphrase');localStorage.removeItem('bt_player');localStorage.removeItem('bt_rpg');localStorage.removeItem('bt_stats');}catch(e){}
            window.location.reload();
          }},
        ].map((b,i)=>(
          <button key={i} onClick={b.fn} style={{width:24,height:24,borderRadius:5,border:'none',flexShrink:0,
            background:b.e==='🚪'?'rgba(255,80,80,.15)':'rgba(255,255,255,.04)',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,padding:0}}>
            {b.e}
          </button>
        ))}
      </div>

      {/* Left joystick — overlaps game/bar border */}
      <div className="bt-joystick-zone" style={{position:'fixed',bottom:52,left:isLandscape?90:50,zIndex:30,width:isLandscape?120:100,height:isLandscape?120:100}}>
        <div className="bt-joystick-base" ref={joystickRef} style={{width:isLandscape?110:90,height:isLandscape?110:90}}>
          <div className="bt-joystick-knob" ref={knobRef}/>
        </div>
      </div>

      {/* Right joystick (aim+attack) — overlaps game/bar border */}
      <div style={{position:'fixed',bottom:52,right:isLandscape?140:90,zIndex:30,
        width:isLandscape?120:100,height:isLandscape?120:100}}>
        <div ref={rJoyRef} style={{
          width:isLandscape?110:90,height:isLandscape?110:90,borderRadius:'50%',
          border:'3px solid '+(autoAttack?'rgba(255,100,100,.6)':'rgba(180,40,40,.25)'),
          background:autoAttack
            ?'radial-gradient(circle,rgba(160,30,30,.5) 0%,rgba(80,15,15,.3) 100%)'
            :'radial-gradient(circle,rgba(60,30,30,.35) 0%,rgba(30,15,15,.25) 100%)',
          position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
          boxShadow:autoAttack?'0 0 15px rgba(255,60,60,.3)':'none',
          touchAction:'none'}}>
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',transform:'rotate(-90deg)',pointerEvents:'none'}}>
            {/* Mana ring — shows swipe resource */}
            <circle cx="50%" cy="50%" r="46%" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="3"/>
            <circle cx="50%" cy="50%" r="46%" fill="none"
              stroke={(()=>{const R=stateRef.current?.rpg; if(!R)return'rgba(80,220,120,.5)'; const pct=(R.mana||0)/(R.maxMana||80); return pct>0.5?'rgba(80,120,220,.6)':pct>0.25?'rgba(180,120,60,.5)':'rgba(255,60,60,.6)';})()}
              strokeWidth="3" strokeLinecap="round"
              strokeDasharray={`${Math.PI*2*46/100*((stateRef.current?.rpg?.mana||80)/(stateRef.current?.rpg?.maxMana||80))*100} 999`}/>
            {/* §25 Swipe cooldown arc — fills as cooldown completes */}
            {(()=>{
              const lastSwipe = stateRef.current?._lastSwipe||0;
              const cd = 1500;
              const elapsed = Date.now()-lastSwipe;
              const pct = Math.min(1, elapsed/cd);
              if(pct < 1) return React.createElement('circle', {
                cx:'50%',cy:'50%',r:'40%',fill:'none',
                stroke: pct>0.8?'rgba(180,255,180,.4)':'rgba(255,255,255,.2)',
                strokeWidth:2, strokeLinecap:'round',
                strokeDasharray:`${Math.PI*2*40/100*pct*100} 999`
              });
              return null;
            })()}
          </svg>
          <div ref={rKnobRef} style={{
            position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
            width:isLandscape?38:32,height:isLandscape?38:32,borderRadius:'50%',
            background:(()=>{
              const wpn=stateRef.current?.rpg?getActiveWeapon(stateRef.current.rpg):null;
              const elem=wpn?.element1;
              const col=elem?ELEMENTS[elem]?.color:'rgba(200,60,60,1)';
              return autoAttack
                ?`radial-gradient(circle,${col}cc 0%,${col}88 100%)`
                :`radial-gradient(circle,${col}66 0%,${col}44 100%)`;
            })(),
            border:'2px solid rgba(255,255,255,.2)',
            display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',
            fontSize:14,pointerEvents:'none',lineHeight:1}}>
            {(()=>{const slot=stateRef.current?.rpg?.activeSlot||'melee'; return slot==='ranged'?'🏹':slot==='staff'?'🪄':'⚔️';})()}
            <span style={{fontSize:7,fontWeight:800,color:'#fff',opacity:0.9,marginTop:-1}}>
              {(()=>{const R=stateRef.current?.rpg;if(!R)return'';const pct=Math.round((R.mana||0)/(R.maxMana||80)*100);return pct>=100?'':pct+'%';})()}
            </span>
          </div>
        </div>
      </div>

      {/* Shield joystick — hold and drag to aim shield direction */}
      <div ref={shieldJoyRef} style={{position:'fixed',bottom:isLandscape?66:60,right:isLandscape?20:10,zIndex:30,
        width:isLandscape?70:60,height:isLandscape?70:60,touchAction:'none'}}>
        <div style={{
          width:'100%',height:'100%',borderRadius:'50%',position:'relative',
          border:'3px solid '+(shieldUp?'rgba(96,165,250,.8)':'rgba(96,165,250,.2)'),
          background:shieldUp
            ?'radial-gradient(circle,rgba(96,165,250,.5) 0%,rgba(40,80,180,.3) 100%)'
            :'radial-gradient(circle,rgba(50,60,100,.3) 0%,rgba(30,40,70,.2) 100%)',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:shieldUp?'0 0 15px rgba(96,165,250,.4)':'none',
          cursor:'pointer',WebkitTouchCallout:'none',WebkitUserSelect:'none',userSelect:'none'}}>
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',transform:'rotate(-90deg)',pointerEvents:'none'}}>
            <circle cx="50%" cy="50%" r="45%" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="4"/>
            <circle cx="50%" cy="50%" r="45%" fill="none"
              stroke={stateRef.current._shieldCdUntil&&Date.now()<stateRef.current._shieldCdUntil?'rgba(255,60,60,.5)':
                (stateRef.current._shieldStamina||3000)>2000?'rgba(80,220,120,.6)':
                (stateRef.current._shieldStamina||3000)>1000?'rgba(220,180,60,.6)':'rgba(255,60,60,.6)'}
              strokeWidth="4" strokeLinecap="round"
              strokeDasharray={`${Math.PI*2*45/100*((stateRef.current._shieldStamina||3000)/3000)*100} 999`}/>
            {/* Shield direction indicator */}
            {shieldUp && (()=>{
              const ang = (stateRef.current._shieldAngle||0) + Math.PI/2;
              const r = isLandscape?28:24;
              const cx = isLandscape?35:30, cy = cx;
              return <line x1={cx} y1={cy} x2={cx+Math.cos(ang)*r} y2={cy+Math.sin(ang)*r}
                stroke="rgba(96,165,250,.9)" strokeWidth="3" strokeLinecap="round"/>;
            })()}
          </svg>
          <span style={{fontSize:isLandscape?28:24,pointerEvents:'none',zIndex:1}}>🛡️</span>
        </div>
      </div>
    </div>
  );
};



/* ════════════════════════════════════
   Standalone App Wrapper
════════════════════════════════════ */
const GameApp = () => {
  return React.createElement(BroTown, {
    nfts: [],
    onExit: () => { window.location.href = 'index.html'; }
  });
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GameApp));
</script>
</body>
</html>
