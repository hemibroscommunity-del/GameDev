<div style="padding:0">
<div style="display:flex;gap:8px;align-items:center;padding:5px 0;font-size:12px;color:var(--color-text-secondary)">
<span>Ranged:</span>
<button id="wS" onclick="sR(0)" style="padding:3px 10px;font-size:11px;border-radius:5px;border:1px solid rgba(180,100,255,.4);background:rgba(180,100,255,.08);color:rgba(200,160,255,.9);cursor:pointer">Staff</button>

<span style="margin-left:auto;font-size:10px;color:var(--color-text-tertiary)">+ Sword always equipped</span>
</div>
<div id="gw" style="position:relative;width:100%;aspect-ratio:16/9;background:#12121f;border-radius:8px;overflow:hidden;border:0.5px solid var(--color-border-secondary);touch-action:none;user-select:none">

<div id="dg" style="position:absolute;top:20%;left:2%;font-size:9px;color:rgba(255,255,255,.12);pointer-events:none;line-height:1.6;font-family:monospace"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;padding:8px 0;font-size:11px">
<div style="display:flex;align-items:center;gap:5px"><label style="min-width:80px;color:var(--color-text-tertiary);font-size:11px">Short flick</label><input type="range" min="20" max="200" value="120" id="xST" oninput="U()" style="flex:1"><span id="xSTV" style="min-width:28px;text-align:right;color:var(--color-text-secondary)">120</span></div>
<div style="display:flex;align-items:center;gap:5px"><label style="min-width:80px;color:var(--color-text-tertiary);font-size:11px">Long flick</label><input type="range" min="80" max="350" value="250" id="xLT" oninput="U()"><span id="xLTV" style="min-width:28px;text-align:right;color:var(--color-text-secondary)">250</span></div>
<div style="display:flex;align-items:center;gap:5px"><label style="min-width:80px;color:var(--color-text-tertiary);font-size:11px">Flick speed</label><input type="range" min="10" max="200" value="120" id="xMS" oninput="U()"><span id="xMSV" style="min-width:28px;text-align:right;color:var(--color-text-secondary)">1.20</span></div>
<div style="display:flex;align-items:center;gap:5px"><label style="min-width:80px;color:var(--color-text-tertiary);font-size:11px">Aim lock</label><input type="range" min="400" max="4000" value="2500" step="100" id="xAL" oninput="U()"><span id="xALV" style="min-width:28px;text-align:right;color:var(--color-text-secondary)">2.5s</span></div>
<div style="display:flex;align-items:center;gap:5px"><label style="min-width:80px;color:var(--color-text-tertiary);font-size:11px">Trail window</label><input type="range" min="40" max="300" value="200" step="10" id="xTW" oninput="U()"><span id="xTWV" style="min-width:28px;text-align:right;color:var(--color-text-secondary)">200</span></div>
<div style="display:flex;align-items:center;gap:5px"><label style="min-width:80px;color:var(--color-text-tertiary);font-size:11px">Proj speed</label><input type="range" min="1" max="15" value="10" id="xPS" oninput="U()"><span id="xPSV" style="min-width:28px;text-align:right;color:var(--color-text-secondary)">10</span></div>
</div>
</div>
<script>

cv.addEventListener('pointerdown',function(e){e.preventDefault();var r=cv.getBoundingClientRect(),sx=W/r.width,px=(e.clientX-r.left)*sx,py=(e.clientY-r.top)*sx;if(inSh(px,py)){shOn=!shOn;afb(shOn?'Shield up':'Shield down',shOn?'rgba(80,200,120,.9)':'rgba(200,200,200,.5)');return;}if(inL(px,py)&&lP.id<0){cv.setPointerCapture(e.pointerId);lP.id=e.pointerId;lP.x=px-JCL.x;lP.y=py-JCL.y;lP.tr=[{x:lP.x,y:lP.y,t:performance.now()}];}else if(inR(px,py)&&rP.id<0){cv.setPointerCapture(e.pointerId);rP.id=e.pointerId;rP.x=px-JCR.x;rP.y=py-JCR.y;rP.sp={x:rP.x,y:rP.y};rP.st=performance.now();rP.tr=[{x:rP.x,y:rP.y,t:performance.now()}];aLk=false;aLT=0;aaT=0;}});

function endP(e){e.preventDefault();if(e.pointerId===lP.id){var r=cv.getBoundingClientRect(),sx=W/r.width,px=(e.clientX-r.left)*sx,py=(e.clientY-r.top)*sx;lP.tr.push({x:px-JCL.x,y:py-JCL.y,t:performance.now()});var g=clTr(lP.tr);if(g.t==='s'||g.t==='l')doD();lP.id=-1;lP.x=0;lP.y=0;mD={x:0,y:0};}else if(e.pointerId===rP.id){var r=cv.getBoundingClientRect(),sx=W/r.width,px=(e.clientX-r.left)*sx,py=(e.clientY-r.top)*sx;var dx=px-JCR.x,dy=py-JCR.y;rP.tr.push({x:dx,y:dy,t:performance.now()});var tdx=dx-rP.sp.x,tdy=dy-rP.sp.y,td=Math.sqrt(tdx*tdx+tdy*tdy),dur=performance.now()-rP.st;if(td<JR*.15&&dur<350){cyc();document.getElementById('dg').innerHTML='TAP weapon';}else{var g=clTr(rP.tr);document.getElementById('dg').innerHTML=g.t.toUpperCase()+' d:'+g.d+' s:'+g.s;if(g.t==='s'){fSk(0);aST(rP.tr,'s');}else if(g.t==='l'){fSk(1);aST(rP.tr,'l');}else{aLk=true;aLT=$AL;}}rP.id=-1;rP.x=0;rP.y=0;}}

rez();initE();
var fs;
function draw(){c.clearRect(0,0,W,H);la+=.004;fs=Math.max(H*.028,10);
for(var i=0;i<ens.length;i++){var e=ens[i];e.x+=e.vx;e.y+=e.vy;if(e.x<W*.05||e.x>W*.95)e.vx*=-1;if(e.y<H*.08||e.y>H*.92)e.vy*=-1;c.beginPath();c.arc(e.x,e.y,H*.018,0,Math.PI*2);c.fillStyle='rgba(255,80,80,.3)';c.fill();c.strokeStyle='rgba(255,80,80,.5)';c.lineWidth=2;c.stroke();}
if(rP.id>=0||aLk){var ar=aD*Math.PI/180,al=aLk?(aLT/$AL)*.4:.4;if(cW){c.beginPath();c.moveTo(pl.x,pl.y);c.lineTo(pl.x+Math.cos(ar)*H*.8,pl.y+Math.sin(ar)*H*.8);c.strokeStyle='rgba(160,160,170,'+(al*.3)+')';c.lineWidth=1.5;c.setLineDash([8,8]);c.lineDashOffset=-la*1e4;c.stroke();c.setLineDash([]);c.lineDashOffset=0;}c.beginPath();c.moveTo(pl.x,pl.y);c.lineTo(pl.x+Math.cos(ar)*H*.12,pl.y+Math.sin(ar)*H*.12);c.strokeStyle='rgba(255,160,80,'+al+')';c.lineWidth=2.5;c.setLineDash([5,5]);c.stroke();c.setLineDash([]);crt(c,pl.x,pl.y,ar,H*.14,'rgba(255,160,80,'+al+')',H*.025);}

for(var i=pj.length-1;i>=0;i--){var p=pj[i];p.x+=p.dx*$PS*(W/800);p.y+=p.dy*$PS*(H/450);p.l--;if(p.l<=0||p.x<-40||p.x>W+40||p.y<-40||p.y>H+40){pj.splice(i,1);continue;}var a2=Math.min(1,p.l/30),cc=p.c;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fillStyle='rgba('+cc[0]+','+cc[1]+','+cc[2]+','+a2+')';c.fill();if(p.t!=='a'){c.strokeStyle='rgba('+cc[0]+','+cc[1]+','+cc[2]+','+(a2*.5)+')';c.lineWidth=2;c.stroke();}}
c.beginPath();c.arc(pl.x,pl.y,H*.025,0,Math.PI*2);c.fillStyle='rgba(100,200,255,.5)';c.fill();c.strokeStyle='rgba(100,200,255,.7)';c.lineWidth=2;c.stroke();
if(aLk&&aLT>0){var pc=aLT/$AL;c.beginPath();c.arc(pl.x,pl.y,H*.045,-Math.PI/2,-Math.PI/2+Math.PI*2*pc,false);c.strokeStyle='rgba(255,160,80,'+(0.5*pc)+')';c.lineWidth=3;c.lineCap='round';c.stroke();}
var hW=W*.18,hX=(W-hW)/2,hY=H*.04;c.fillStyle='rgba(255,255,255,.05)';c.fillRect(hX,hY,hW,H*.016);c.fillStyle='rgba(80,200,120,.5)';c.fillRect(hX,hY,hW*.85,H*.016);c.fillStyle='rgba(255,255,255,.05)';c.fillRect(hX,hY+H*.024,hW,H*.012);c.fillStyle='rgba(255,200,80,.5)';c.fillRect(hX,hY+H*.024,hW*(en/mE),H*.012);
var pS=H*.07;for(var i=0;i<2;i++){var x=W*.02+i*(pS+H*.01),y=hY,rd=cd[i]<=0,cp=cd[i]/cM[i];c.fillStyle=rd?(i?'rgba(255,180,80,.1)':'rgba(100,180,255,.1)'):'rgba(50,50,55,.35)';c.strokeStyle=rd?(i?'rgba(255,180,80,.35)':'rgba(100,180,255,.35)'):'rgba(80,80,85,.25)';c.lineWidth=1.5;c.beginPath();c.roundRect(x,y,pS,pS,H*.01);c.fill();c.stroke();if(cp>0){c.fillStyle=i?'rgba(255,180,80,.1)':'rgba(100,180,255,.1)';c.fillRect(x+2,y+pS*(1-cp),pS-4,pS*cp);}c.fillStyle=rd?'rgba(255,255,255,.6)':'rgba(130,130,140,.35)';c.font='500 '+fs+'px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(i?'HV':'LT',x+pS/2,y+pS/2);}
var wc2=cW?(ranT?'rgba(160,230,210,.6)':'rgba(200,160,255,.6)'):'rgba(255,150,120,.6)';c.fillStyle=wc2;c.font='500 '+fs+'px sans-serif';c.textAlign='right';c.fillText(gCN(),W*.98,hY+fs*.7);
for(var i=fbb.length-1;i>=0;i--){var f=fbb[i];f.t--;f.y+=1;if(f.t<=0){fbb.splice(i,1);continue;}c.globalAlpha=Math.min(1,f.t/25);c.fillStyle=f.c;c.font='600 '+(fs*1.2)+'px sans-serif';c.textAlign='center';c.fillText(f.m,pl.x,pl.y-H*.1-f.y);c.globalAlpha=1;}
for(var i=swT.length-1;i>=0;i--){var s=swT[i];s.l--;if(s.l<=0){swT.splice(i,1);continue;}var a3=s.l/s.m;if(s.p.length>1){c.beginPath();c.moveTo(s.p[0].x,s.p[0].y);for(var j=1;j<s.p.length;j++)c.lineTo(s.p[j].x,s.p[j].y);c.strokeStyle='rgba('+s.c[0]+','+s.c[1]+','+s.c[2]+','+(a3*.5)+')';c.lineWidth=H*.015*a3;c.lineCap='round';c.lineJoin='round';c.stroke();c.strokeStyle='rgba('+s.c[0]+','+s.c[1]+','+s.c[2]+','+(a3*.1)+')';c.lineWidth=H*.04*a3;c.stroke();}}
c.save();c.translate(JCL.x,JCL.y);c.beginPath();c.arc(0,0,JR,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.01)';c.fill();c.strokeStyle=shOn?'rgba(80,200,120,.12)':'rgba(255,255,255,.07)';c.lineWidth=2;c.stroke();var lDst=Math.sqrt(lP.x*lP.x+lP.y*lP.y);if(lP.id>=0&&lDst>JR*.12){var lAg=Math.atan2(lP.y,lP.x);crt(c,0,0,lAg,JR*.88,shOn?'rgba(80,200,120,.3)':'rgba(255,255,255,.2)',JR*.13);}c.beginPath();c.arc(lP.x,lP.y,JR*.2,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.03)';c.fill();c.strokeStyle='rgba(255,255,255,.1)';c.lineWidth=2;c.stroke();c.restore();
c.beginPath();c.arc(SBX,SBY,SBR,0,Math.PI*2);c.fillStyle=shOn?'rgba(80,200,120,.12)':'rgba(80,200,120,.03)';c.fill();c.strokeStyle=shOn?'rgba(80,200,120,.45)':'rgba(80,200,120,.15)';c.lineWidth=2;c.stroke();var si=SBR*.5;c.beginPath();c.moveTo(SBX,SBY-si);c.quadraticCurveTo(SBX+si,SBY-si*.5,SBX+si,SBY+si*.2);c.quadraticCurveTo(SBX+si*.5,SBY+si*.9,SBX,SBY+si*1.1);c.quadraticCurveTo(SBX-si*.5,SBY+si*.9,SBX-si,SBY+si*.2);c.quadraticCurveTo(SBX-si,SBY-si*.5,SBX,SBY-si);c.closePath();c.fillStyle=shOn?'rgba(80,200,120,.25)':'rgba(80,200,120,.06)';c.fill();c.strokeStyle=shOn?'rgba(80,200,120,.5)':'rgba(80,200,120,.18)';c.lineWidth=1.5;c.stroke();
c.save();c.translate(JCR.x,JCR.y);c.beginPath();c.arc(0,0,JR,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.01)';c.fill();c.strokeStyle='rgba(255,160,80,.13)';c.lineWidth=2;c.stroke();
var sRC=Math.min($ST*.55,JR*.85),lRC2=Math.min($LT*.55,JR*1.1);c.beginPath();c.arc(0,0,sRC,0,Math.PI*2);c.strokeStyle='rgba(100,180,255,.04)';c.lineWidth=1;c.setLineDash([3,5]);c.stroke();c.setLineDash([]);c.beginPath();c.arc(0,0,lRC2,0,Math.PI*2);c.strokeStyle='rgba(255,180,80,.04)';c.lineWidth=1;c.setLineDash([3,5]);c.stroke();c.setLineDash([]);
if(aLk&&aLT>0){var pc2=aLT/$AL;c.beginPath();c.arc(0,0,JR+JR*.08,-Math.PI/2,-Math.PI/2+Math.PI*2*pc2,false);c.strokeStyle='rgba(255,160,80,'+(0.3*pc2)+')';c.lineWidth=4;c.lineCap='round';c.stroke();}
