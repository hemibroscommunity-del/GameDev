function getBtPlayerId() {
  try { 
    const pp = localStorage.getItem('bt_passphrase');
    if(!pp) return null;
    let hash = 0;
    for(let i=0;i<pp.length;i++){ hash=((hash<<5)-hash)+pp.charCodeAt(i); hash|=0; }
    return 'player_' + Math.abs(hash).toString(36);
  } catch { return null; }
}

async function btRpc(fn, params) {
  try {
    const {data, error} = await supa.rpc(fn, params);
    if(error) console.warn('[btRpc]', fn, error.message);
    return data;
  } catch(e) { console.warn('[btRpc]', fn, e); return null; }
}

/* Generate a zone map. Town has buildings+paths. Combat zones have themed terrain. */
function generateZoneMap(zoneId) {
  const zone = ZONES[zoneId];
  const W = zone.w, H = zone.h;
  const map = Array.from({length:H}, ()=> Array(W).fill(0));
  const MX = Math.floor(W/2), MY = Math.floor(H/2);

  if(zoneId === 'town'){
    /* ═══ TOWN — paths, buildings, exits ═══ */
    /* Main cross paths */
    for(let x=0;x<W;x++){ map[MY][x]=1; map[MY+1][x]=1; }
    for(let y=0;y<H;y++){ map[y][MX]=1; map[y][MX+1]=1; }
    /* Ring path around center */
    const ringR = 8;
    for(let a=0;a<360;a+=1){
      const rx = Math.round(MX+Math.cos(a*Math.PI/180)*ringR);
      const ry = Math.round(MY+Math.sin(a*Math.PI/180)*ringR);
      if(rx>=0&&rx<W&&ry>=0&&ry<H) map[ry][rx]=1;
    }
    /* Buildings */
    TOWN_BUILDINGS.forEach(b => {
      for(let dy=0;dy<b.bh;dy++) for(let dx=0;dx<b.bw;dx++){
        const ty=b.by+dy, tx=b.bx+dx;
        if(ty>=0&&ty<H&&tx>=0&&tx<W) map[ty][tx]=3;
      }
    });
    /* Flowers near buildings */
    TOWN_BUILDINGS.forEach(b => {
      for(let i=0;i<6;i++){
        const fx=b.bx+Math.floor(Math.random()*(b.bw+4))-2;
        const fy=b.by+b.bh+Math.floor(Math.random()*2);
        if(fx>=0&&fx<W&&fy>=0&&fy<H&&map[fy][fx]===0) map[fy][fx]=5;
      }
    });
    /* Exit paths — wider paths leading to zone edges */
    TOWN_EXITS.forEach(ex => {
      if(ex.dir==='north') for(let y=0;y<MY;y++){ map[y][ex.tx]=1; map[y][ex.tx+1]=1; }
      if(ex.dir==='south') for(let y=MY;y<H;y++){ map[y][ex.tx]=1; map[y][ex.tx+1]=1; }
      if(ex.dir==='east')  for(let x=MX;x<W;x++){ map[ex.ty][x]=1; map[ex.ty+1][x]=1; }
      if(ex.dir==='west')  for(let x=0;x<MX;x++){ map[ex.ty][x]=1; map[ex.ty+1][x]=1; }
      /* Exit marker tile (type 8 = exit) */
      if(ex.dir==='north') { map[0][ex.tx]=8; map[0][ex.tx+1]=8; }
      if(ex.dir==='south') { map[H-1][ex.tx]=8; map[H-1][ex.tx+1]=8; }
      if(ex.dir==='east')  { map[ex.ty][W-1]=8; map[ex.ty+1][W-1]=8; }
      if(ex.dir==='west')  { map[ex.ty][0]=8; map[ex.ty+1][0]=8; }
    });
    /* Scattered trees */
    for(let i=0;i<30;i++){
      const tx=Math.floor(Math.random()*W), ty=Math.floor(Math.random()*H);
      if(map[ty][tx]===0) map[ty][tx]=4;
    }
    /* Pond near center */
    for(let dy=-2;dy<=2;dy++) for(let dx=-3;dx<=3;dx++){
      if(Math.sqrt(dx*dx+dy*dy)<2.8){
        const py=MY-5+dy, px=MX+8+dx;
        if(py>=0&&py<H&&px>=0&&px<W&&map[py][px]===0) map[py][px]=2;
      }
    }
  } else {
    /* ═══ COMBAT ZONE — themed terrain ═══ */
    const elem = zone.element;

    /* Zone-specific terrain generation */
    /* Entry path from edge */
    for(let x=0;x<W;x++){ map[MY][x]=1; map[MY+1][x]=1; }
    for(let y=0;y<H;y++){ map[y][MX]=1; }

    /* Return exit (tile type 9 = return to town) */
    map[MY][0]=9; map[MY+1][0]=9; map[MY][W-1]=9; map[MY+1][W-1]=9;
    map[0][MX]=9; map[H-1][MX]=9;

    /* Themed decorations based on element */
    const decorTile = {
      flame:7, frost:7, water:2, venom:4, storm:7, stone:7, wind:5, dark:4, light:5,
    }[elem] || 4;
    const decorDensity = elem==='water'||elem==='frost' ? 0.12 : 0.08;

    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      if(map[y][x]!==0) continue;
      /* Zone-specific water/special terrain */
      if(elem==='water' || elem==='frost'){
        if(Math.random()<0.06) map[y][x]=2; /* water patches */
      }
      if(elem==='flame' || elem==='stone' || elem==='storm'){
        if(Math.random()<0.05) map[y][x]=7; /* stone/rock */
      }
      if(elem==='venom' || elem==='dark'){
        if(Math.random()<0.08) map[y][x]=4; /* trees/swamp */
      }
      if(elem==='wind' || elem==='light'){
        if(Math.random()<0.06) map[y][x]=5; /* flowers */
      }
      /* Sand for beach zones */
      if(elem==='water' && Math.random()<0.1) map[y][x]=6;
    }
    /* Scattered trees everywhere */
    for(let i=0;i<20;i++){
      const tx=Math.floor(Math.random()*W), ty=Math.floor(Math.random()*H);
      if(map[ty][tx]===0) map[ty][tx]=4;
    }
  }

  return map;
}

function spawnMonstersForZone(zone) {
  const monsters = [];
  if(!zone.spawns) return monsters;
  const W = zone.w * TILE, H = zone.h * TILE;
  const margin = 4 * TILE; /* keep away from edges */
  let idx = 0;
  zone.spawns.forEach(({arch, count}) => {
    for(let i=0; i<count; i++){
      const lvl = zone.level[0] + Math.floor(Math.random()*(zone.level[1]-zone.level[0]+1));
      const x = margin + Math.random()*(W - margin*2);
      const y = margin + Math.random()*(H - margin*2);
      const m = createMonster('m-'+zone.id+'-'+idx, arch, lvl, x, y, zone.element);
      m.curHp = m.hp; m.type = arch;
      monsters.push(m);
      idx++;
    }
  });
  return monsters;
}

/* §10.2 Effectiveness Circle */
const EFFECTIVENESS = [
  ['flame','frost'], ['frost','storm'], ['storm','stone'],
  ['stone','wind'],  ['wind','venom'],  ['venom','water'], ['water','flame'],
];
function getEffectiveness(attackElem, targetElem) {
  if (!attackElem || !targetElem || attackElem === targetElem) return 1.0;
  /* Dark <-> Light mutual bonus */
  if ((attackElem==='dark'&&targetElem==='light')||(attackElem==='light'&&targetElem==='dark')) return 1.25;
  for (const [strong, weak] of EFFECTIVENESS) {
    if (attackElem===strong && targetElem===weak) return 1.25;
    if (attackElem===weak && targetElem===strong) return 0.75;
  }
  return 1.0;
}

/* ═══ STATUS EFFECT SYSTEM — §9 ═══ */

/* Apply a status to a target. Returns true if applied. */
function applyStatus(target, statusId, source, now) {
  if(!target.statuses) target.statuses = {};
  const def = STATUS_DEFS[statusId];
  if(!def) return false;

  const existing = target.statuses[statusId];
  if(existing) {
    /* Refresh — extend or reset duration */
    if(def.refresh > 0) {
      existing.remaining = Math.min(existing.remaining + def.refresh, def.maxDur);
    } else {
      existing.remaining = def.dur; /* reset */
    }
    /* Stack if applicable (Fracture) */
    if(def.maxStacks && existing.stacks < def.maxStacks) {
      existing.stacks++;
    }
    existing.lastRefresh = now;
    return true;
  }

  /* New application */
  target.statuses[statusId] = {
    id: statusId,
    remaining: def.dur,
    maxDur: def.maxDur || def.dur,
    stacks: 1,
    source: source,
    appliedAt: now,
    lastRefresh: now,
    lastTick: now,
    element: Object.keys(ELEMENTS).find(e => ELEMENTS[e].status === statusId) || null,
  };
  return true;
}

/* Tick all statuses on a target. Applies DoT damage. Returns array of expired status IDs. */
function tickStatuses(target, dt, now, rpg) {
  if(!target.statuses) return [];
  const expired = [];
  const emMult = rpg ? (1 + (rpg.elementalMastery||0) * 0.0015) : 1;

  for(const [id, status] of Object.entries(target.statuses)) {
    status.remaining -= dt;

    /* DoT ticking */
    const def = STATUS_DEFS[id];
    if(def.tick && now - status.lastTick >= def.tick * 1000) {
      status.lastTick = now;
      let dotDmg = 0;
      if(id === 'burn') dotDmg = (5 + (rpg?.power||0) * 0.3) * emMult;
      if(id === 'root') dotDmg = (3 + (rpg?.power||0) * 0.15) * emMult;
      if(dotDmg > 0) {
        target.curHp = (target.curHp||target.hp) - Math.round(dotDmg);
        target._lastDotDmg = { amount: Math.round(dotDmg), statusId: id, ts: now };
      }
    }

    if(status.remaining <= 0) {
      expired.push(id);
      delete target.statuses[id];
    }
  }
  return expired;
}

/* Get the element of the oldest status on a target (for collision detection) */
function getOldestStatusElement(target) {
  if(!target.statuses) return null;
  let oldest = null, oldestTime = Infinity;
  for(const [id, status] of Object.entries(target.statuses)) {
    if(status.appliedAt < oldestTime) {
      oldestTime = status.appliedAt;
      oldest = status;
    }
  }
  return oldest ? oldest.element : null;
}

/* Make collision lookup bidirectional (setup+trigger order doesn't matter for lookup, but
   we always consume the SETUP status, which is the one already on the target) */
function lookupCollision(setupElement, triggerElement) {
  return COLLISION_TABLE[setupElement+'|'+triggerElement]
      || COLLISION_TABLE[triggerElement+'|'+setupElement]
      || null;
}

/* §10.3 Resolve a collision. Returns collision damage dealt, or 0 if no collision. */
function resolveCollision(target, triggerElement, source, rpg, now) {
  if(!target.statuses) return null;

  /* Find the oldest status with a different element than the trigger */
  let setupStatus = null, setupElement = null;
  let oldestTime = Infinity;
  for(const [id, status] of Object.entries(target.statuses)) {
    if(status.element && status.element !== triggerElement && status.appliedAt < oldestTime) {
      oldestTime = status.appliedAt;
      setupStatus = status;
      setupElement = status.element;
    }
  }

  if(!setupElement) return null;

  const collision = lookupCollision(setupElement, triggerElement);
  if(!collision) return null;

  /* Calculate collision damage — §10.6 */
  const statValue = rpg[collision.stat] || 0;
  let dmg = collision.base + statValue * collision.coeff;

  /* Elemental Mastery multiplier — §2.2 */
  dmg *= (1 + (rpg.elementalMastery||0) * 0.0015);

  /* Volatile bonus — §4.7 */
  const activeWpn = getActiveWeapon(rpg);
  if(activeWpn.isVolatile) dmg *= 1.30;

  /* Effectiveness — §10.2 */
  if(target.element) dmg *= getEffectiveness(triggerElement, target.element);

  /* Consume setup status */
  delete target.statuses[setupStatus.id];

  /* §3.5 Mana restore */
  let manaRestored = 0;
  if(rpg && now - (source._lastCollisionMana||0) >= 3000) {
    source._lastCollisionMana = now;
    const baseRestore = 0.04 * rpg.maxMana;
    const restMult = 1 + (rpg.restoration||0) * 0.0012;
    manaRestored = Math.round(baseRestore * restMult);
    rpg.mana = Math.min(rpg.maxMana, (rpg.mana||0) + manaRestored);
  }

  return {
    collision,
    damage: Math.round(dmg),
    setupElement,
    triggerElement,
    manaRestored,
    consumed: setupStatus.id,
  };
}

/* Discovered collisions tracker */
const discoveredCollisions = new Set();
try {
  const saved = JSON.parse(localStorage.getItem('bt_codex'));
  if(saved) saved.forEach(c => discoveredCollisions.add(c));
} catch {}

function discoverCollision(collisionId) {
  if(discoveredCollisions.has(collisionId)) return false;
  discoveredCollisions.add(collisionId);
  try { localStorage.setItem('bt_codex', JSON.stringify([...discoveredCollisions])); } catch {}
  return true; /* first discovery */
}

/* §6.1 Monster Scaling — tri-phase */
function monsterStat(base, level, rRamp, rPlateau, rEndgame) {
  if (level <= 30) return Math.ceil(base * Math.pow(rRamp, level-1));
  const at30 = Math.ceil(base * Math.pow(rRamp, 29));
  if (level <= 65) return Math.ceil(at30 * Math.pow(rPlateau, level-30));
  const at65 = Math.ceil(at30 * Math.pow(rPlateau, 35));
  return Math.ceil(at65 * Math.pow(rEndgame, level-65));
}

/* Spawn a monster instance from archetype + zone level */
function createMonster(id, archetype, level, x, y, element) {
  const a = ARCHETYPES[archetype];
  const baseHp = monsterStat(40, level, 1.065, 1.035, 1.025);
  const baseDmg = monsterStat(8, level, 1.045, 1.025, 1.018);
  const baseXp = monsterStat(10, level, 1.045, 1.025, 1.018);
  const baseGold = monsterStat(5, level, 1.035, 1.020, 1.015);
  return {
    id, archetype, level, element: element||null,
    hp: Math.ceil(baseHp * a.hpMult), maxHp: Math.ceil(baseHp * a.hpMult),
    dmg: Math.ceil(baseDmg * a.dmgMult),
    xp: Math.ceil(baseXp), gold: Math.ceil(baseGold),
    spd: 0.5 * a.spdMult,
    emoji: a.emoji, color: a.color,
    x, y, spawnX: x, spawnY: y,
    alive: true, moveTimer: Math.random()*3000,
    targetX: x, targetY: y,
    statuses: {}, /* {statusId: {remaining, stacks, source}} */
    _hitThisSwing: false, _atkCd: 0, _stunUntil: 0,
    respawnAt: 0,
  };
}

/* §3 Resource Formulas */
function calcMaxHp(level, vitality)  { return 100 + (level-1)*12 + vitality*10; }
function calcMaxStam(endurance)      { return 100 + endurance*3.0; }
function calcMaxMana(mind)           { return 80 + mind*3.5; }

/* §4.4 Weapon Damage */
function calcWeaponDmg(weaponType, power, tierMult) {
  const w = WEAPON_TYPES[weaponType];
  const base = (w.base + power * 0.8) * tierMult;
  if (weaponType === 'staff') return base * (0.75 + Math.random() * 0.5); /* variance roll */
  return base;
}

/* §2.1 Crit */
function calcCritChance(ferocity) {
  if (ferocity <= 300) return (60 * ferocity) / (ferocity + 120) / 100;
  const baseAt300 = (60*300)/(300+120)/100;
  const excess = ferocity - 300;
  return baseAt300 + (8*excess)/(excess+200)/100;
}
function calcCritMult(ferocity) { return 1.75 + ferocity * 0.0008; }

/* §2.3 Block */
function calcBlockReduction(fortification) {
  return Math.min(0.75, 0.25 + fortification * 0.0012);
}

/* §2.5 Movement */
function calcMoveSpeed(agility) {
  return 5.0 * (1 + Math.min(agility * 0.0012, 0.60));
}

/* §6.2 XP Required — tri-phase */
function xpRequired(level) {
  if (level <= 30) return Math.ceil(100 * Math.pow(1.10, level-1));
  const at30 = Math.ceil(100 * Math.pow(1.10, 29));
  if (level <= 65) return Math.ceil(at30 * Math.pow(1.07, level-30));
  const at65 = Math.ceil(at30 * Math.pow(1.07, 35));
  return Math.ceil(at65 * Math.pow(1.04, level-65));
}

/* §15.2 Special attack multiplier (no element = raw damage boost) */
const SPECIAL_ATK_MULT = 1.8;

/* Create a default player RPG state with the new stat system */
function createDefaultRpg() {
  return {
    level: 1, xp: 0, coins: 50,
    /* Tier 1 — allocated points */
    power: 0, vitality: 0, endurance: 0, agility: 0, mind: 0,
    /* Tier 2 — allocated points */
    ferocity: 0, elementalMastery: 0, fortification: 0, restoration: 0, influence: 0,
    /* Unspent */
    unspentT1: 10, unspentT2: 10,
    /* Derived (recalculated) */
    hp: 100, maxHp: 100,
    stamina: 100, maxStamina: 100,
    mana: 80, maxMana: 80,
    /* Equipment */
    /* Equipment — start with elemental weapons to experience the system */
    weapon: { type:'greatsword', tier:'fusion', tierMult:2.25, element1:'flame', element2:'frost', name:'Emberice Greatsword', isVolatile:true },
    rangedWeapon: { type:'bow', tier:'elemental', tierMult:1.5, element1:'venom', element2:null, name:'Venom Bow', isVolatile:false },
    armor: { tier:'common', tierMult:1.0, attunement:null, name:'Leather Armor' },
    /* Active weapon slot: 'melee' or 'ranged' */
    activeSlot: 'melee',
  };
}

/* Recalculate derived stats from allocations */
function recalcDerived(rpg) {
  rpg.maxHp = calcMaxHp(rpg.level, rpg.vitality);
  rpg.maxStamina = calcMaxStam(rpg.endurance);
  rpg.maxMana = calcMaxMana(rpg.mind);
  rpg.hp = Math.min(rpg.hp, rpg.maxHp);
  rpg.stamina = Math.min(rpg.stamina, rpg.maxStamina);
  rpg.mana = Math.min(rpg.mana, rpg.maxMana);
  return rpg;
}

/* Get the currently active weapon object */
function getActiveWeapon(rpg) {
  return rpg.activeSlot === 'ranged' ? rpg.rangedWeapon : rpg.weapon;
}

/* ═══ Audio Engine — Web Audio API chiptune sounds ═══ */
const BT_AUDIO = {
  ctx: null,
  muted: false,
  init(){
    if(this.ctx) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      if(this.ctx.state==='suspended') this.ctx.resume();
    }catch(e){}
  },
  beep(freq=440, dur=0.08, vol=0.12, type='square'){
    if(!this.ctx||this.muted) return;
    try{
      const o=this.ctx.createOscillator();
      const g=this.ctx.createGain();
      o.type=type; o.frequency.value=freq;
      g.gain.setValueAtTime(vol,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(); o.stop(this.ctx.currentTime+dur);
    }catch(e){}
  },
  /* Sound effects */
  footstep(){
    const f = 80 + Math.random()*40;
    this.beep(f, 0.04, 0.04, 'triangle');
  },
  collect(){
    /* Rising arpeggio */
    this.beep(523, 0.08, 0.15, 'square');
    setTimeout(()=>this.beep(659, 0.08, 0.12, 'square'), 60);
    setTimeout(()=>this.beep(784, 0.1, 0.12, 'square'), 120);
    setTimeout(()=>this.beep(1047, 0.15, 0.1, 'square'), 200);
  },
  chatSend(){
    this.beep(600, 0.06, 0.08, 'sine');
    setTimeout(()=>this.beep(800, 0.06, 0.06, 'sine'), 50);
  },
  chatReceive(){
    this.beep(500, 0.05, 0.06, 'sine');
  },
  enterBuilding(){
    this.beep(330, 0.1, 0.1, 'triangle');
    setTimeout(()=>this.beep(440, 0.1, 0.08, 'triangle'), 80);
    setTimeout(()=>this.beep(550, 0.15, 0.08, 'triangle'), 160);
  },
  emote(){
    this.beep(700, 0.06, 0.1, 'square');
    setTimeout(()=>this.beep(900, 0.08, 0.08, 'square'), 60);
  },
  npcChat(){
    this.beep(400, 0.05, 0.04, 'sine');
  },
  thwack(){
    /* Meaty impact sound */
    if(!this.ctx||this.muted) return;
    try{
      /* Low thud */
      const o1=this.ctx.createOscillator();
      const g1=this.ctx.createGain();
      o1.type='sawtooth'; o1.frequency.value=80;
      o1.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime+0.08);
      g1.gain.setValueAtTime(0.25, this.ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.12);
      o1.connect(g1); g1.connect(this.ctx.destination);
      o1.start(); o1.stop(this.ctx.currentTime+0.12);
      /* High crack */
      const o2=this.ctx.createOscillator();
      const g2=this.ctx.createGain();
      o2.type='square'; o2.frequency.value=300;
      g2.gain.setValueAtTime(0.12, this.ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.06);
      o2.connect(g2); g2.connect(this.ctx.destination);
      o2.start(); o2.stop(this.ctx.currentTime+0.06);
      /* Noise burst via oscillator detune */
      const o3=this.ctx.createOscillator();
      const g3=this.ctx.createGain();
      o3.type='sawtooth'; o3.frequency.value=800;
      o3.detune.value=1200;
      g3.gain.setValueAtTime(0.08, this.ctx.currentTime);
      g3.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.04);
      o3.connect(g3); g3.connect(this.ctx.destination);
      o3.start(); o3.stop(this.ctx.currentTime+0.04);
    }catch(e){}
  },
  deathBoom(){
    this.beep(120, 0.15, 0.2, 'sawtooth');
    setTimeout(()=>this.beep(60, 0.2, 0.15, 'triangle'), 50);
    setTimeout(()=>this.beep(200, 0.08, 0.1, 'square'), 80);
  },
  /* §Creative Vision: Hit sound varies by weapon type */
  weaponHit(weaponType, isCrit){
    if(!this.ctx||this.muted) return;
    if(weaponType === 'greatsword'){
      /* Heavy, weighty thud + metallic ring */
      this.thwack();
      if(isCrit){ this.beep(200, 0.15, 0.18, 'sawtooth'); setTimeout(()=>this.beep(100, 0.2, 0.15, 'triangle'), 30); }
    } else if(weaponType === 'sword'){
      /* Quick, sharp slash */
      this.beep(400, 0.08, 0.06, 'sawtooth');
      this.beep(800, 0.05, 0.04, 'square');
      if(isCrit) setTimeout(()=>this.beep(600, 0.1, 0.08, 'triangle'), 20);
    } else if(weaponType === 'bow'){
      /* Thwick + arrow impact */
      this.beep(300, 0.04, 0.05, 'triangle');
      setTimeout(()=>this.beep(150, 0.08, 0.06, 'sawtooth'), 30);
    } else if(weaponType === 'staff'){
      /* Magical whomp */
      this.beep(250, 0.1, 0.12, 'sine');
      this.beep(500, 0.06, 0.08, 'triangle');
    } else {
      this.thwack();
    }
  },
  /* Loot collect — satisfying pickup chime */
  lootCollect(){
    this.beep(523, 0.06, 0.08, 'sine');
    setTimeout(()=>this.beep(659, 0.05, 0.06, 'sine'), 50);
    setTimeout(()=>this.beep(784, 0.04, 0.05, 'sine'), 100);
  },
  /* §Creative Vision — Grand Slam sound (critical kill) */
  grandSlam(){
    if(!this.ctx||this.muted) return;
    try{
      /* Deep resonant boom */
      const o=this.ctx.createOscillator(); const g=this.ctx.createGain();
      o.type='sawtooth'; o.frequency.value=60;
      o.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime+0.3);
      g.gain.setValueAtTime(0.3, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.4);
      o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+0.4);
    }catch(e){}
    /* Rising impact */
    setTimeout(()=>this.beep(200, 0.12, 0.2, 'square'), 30);
    setTimeout(()=>this.beep(400, 0.1, 0.15, 'square'), 80);
    setTimeout(()=>this.beep(800, 0.15, 0.12, 'sine'), 140);
    /* Triumphant chime */
    setTimeout(()=>this.beep(523, 0.12, 0.1, 'sine'), 250);
    setTimeout(()=>this.beep(659, 0.12, 0.08, 'sine'), 320);
    setTimeout(()=>this.beep(784, 0.2, 0.1, 'sine'), 400);
  },
  /* Material-varied hit sounds — archetype determines material */
  hitMaterial(archetype){
    if(!this.ctx||this.muted) return;
    if(archetype==='brute'||archetype==='sentinel'){
      /* Metal/stone — high crack + ring */
      this.beep(400, 0.04, 0.15, 'square');
      setTimeout(()=>this.beep(1200, 0.06, 0.08, 'sine'), 15);
    } else if(archetype==='volatile'){
      /* Squishy + sizzle */
      this.beep(150, 0.06, 0.12, 'sawtooth');
      setTimeout(()=>this.beep(600, 0.04, 0.06, 'sawtooth'), 20);
    } else {
      /* Flesh/soft — the standard thwack */
      this.thwack();
    }
  },
  /* §22 Three-layer collision sound: consumption + burst + mana chime */
  collisionSound(setupElement, triggerElement, manaRestored){
    if(!this.ctx||this.muted) return;
    /* Layer 1: Consumption — setup element removed */
    const consumeSounds = {
      burn:  ()=>{ this.beep(200, 0.06, 0.1, 'sawtooth'); }, /* hiss */
      freeze:()=>{ this.beep(1200, 0.04, 0.12, 'square'); },  /* crack */
      soak:  ()=>{ this.beep(300, 0.05, 0.08, 'sine'); },     /* splash */
      root:  ()=>{ this.beep(150, 0.05, 0.1, 'triangle'); },   /* pop */
      shock: ()=>{ this.beep(900, 0.03, 0.12, 'square'); },   /* snap */
      fracture:()=>{ this.beep(100, 0.08, 0.1, 'sawtooth');}, /* crumble */
      slow:  ()=>{ this.beep(500, 0.04, 0.06, 'sine'); },     /* whoosh */
      curse: ()=>{ this.beep(80, 0.1, 0.08, 'triangle'); },    /* low tone */
      reveal:()=>{ this.beep(1000, 0.05, 0.08, 'sine'); },    /* chime */
    };
    const setupStatus = ELEMENTS[setupElement]?.status;
    if(consumeSounds[setupStatus]) consumeSounds[setupStatus]();
    /* Layer 2: Collision burst — unique per element pair (using trigger pitch) */
    const triggerPitch = {flame:300,frost:500,water:400,venom:250,storm:700,stone:200,wind:600,dark:120,light:900};
    setTimeout(()=>{
      const freq = triggerPitch[triggerElement] || 400;
      this.beep(freq, 0.1, 0.15, 'sawtooth');
      this.beep(freq*1.5, 0.08, 0.1, 'square');
    }, 100);
    /* Layer 3: Mana restore chime (pitch scales with amount) */
    if(manaRestored > 0){
      setTimeout(()=>{
        const pitch = 600 + Math.min(manaRestored * 8, 400);
        this.beep(pitch, 0.12, 0.08, 'sine');
        setTimeout(()=>this.beep(pitch*1.25, 0.1, 0.06, 'sine'), 60);
      }, 200);
    }
  },
  /* §7 Level-up fanfare */
  levelUp(){
    if(!this.ctx||this.muted) return;
    /* Rising triumphant arpeggio */
    const notes = [262, 330, 392, 523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      setTimeout(()=>this.beep(freq, 0.15, 0.12 - i*0.01, 'square'), i * 80);
    });
    /* Final sustained chord */
    setTimeout(()=>{
      this.beep(523, 0.4, 0.08, 'sine');
      this.beep(659, 0.4, 0.06, 'sine');
      this.beep(784, 0.5, 0.06, 'sine');
    }, 600);
  },
  /* Whimsical death jingle */
  playerDeath(){
    this.beep(400, 0.1, 0.12, 'square');
    setTimeout(()=>this.beep(350, 0.1, 0.1, 'square'), 120);
    setTimeout(()=>this.beep(300, 0.1, 0.08, 'square'), 240);
    setTimeout(()=>this.beep(200, 0.2, 0.1, 'triangle'), 380);
    setTimeout(()=>this.beep(100, 0.3, 0.08, 'sine'), 500);
  },
  join(){
    /* Welcome jingle */
    this.beep(262, 0.12, 0.1, 'square');
    setTimeout(()=>this.beep(330, 0.12, 0.08, 'square'), 100);
    setTimeout(()=>this.beep(392, 0.12, 0.08, 'square'), 200);
    setTimeout(()=>this.beep(523, 0.2, 0.1, 'square'), 300);
  },
  bgNote(freq, dur=0.8){
    if(!this.ctx||this.muted) return;
    try{
      const o=this.ctx.createOscillator();
      const g=this.ctx.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.02,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(); o.stop(this.ctx.currentTime+dur);
    }catch(e){}
  },
};

/* ═══ SUPABASE RPC HELPER ═══ */
const _btRpcQueue = {};
const btRpc = async (fnName, params) => {
  /* Debounce: skip if same call is already in-flight */
  const key = fnName + JSON.stringify(params);
  if(_btRpcQueue[key]) return _btRpcQueue[key];
  const promise = (async()=>{
    try {
      const r = await fetch(SUPA_URL+'/rest/v1/rpc/'+fnName, {
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
        body: JSON.stringify(params)
      });
      if(!r.ok) return null;
      return await r.json();
    } catch(e){ return null; }
    finally { delete _btRpcQueue[key]; }
  })());
  _btRpcQueue[key] = promise;
  return promise;
};
/* ═══ PASSPHRASE IDENTITY SYSTEM ═══ */
const BT_WORDS = ['alpha','blaze','coral','drift','ember','frost','grove','haven','ivory','jade',
  'karma','lunar','mango','nexus','onyx','pixel','quartz','raven','solar','thunder',
  'ultra','viper','wrath','xenon','yeti','zenith','amber','bolt','cipher','dusk',
  'echo','flare','ghost','haze','iron','jet','knack','lava','mystic','nova',
  'orbit','prism','quest','ridge','storm','titan','umbra','vault','wisp','zeal'];

const generatePassphrase = () => {
  const w = [];
  for(let i=0;i<4;i++) w.push(BT_WORDS[Math.floor(Math.random()*BT_WORDS.length)]);
  return w.join('-') + '-' + Math.floor(Math.random()*99);
};

const passphraseToId = (phrase) => {
  /* Simple hash to create a consistent player ID from a passphrase */
  let hash = 0;
  for(let i=0;i<phrase.length;i++){ hash = ((hash << 5) - hash) + phrase.charCodeAt(i); hash |= 0; }
  return 'bp_' + Math.abs(hash).toString(36) + '_' + phrase.split('-').slice(0,2).join('');
};

const getBtPlayerId = () => {
  const phrase = localStorage.getItem('bt_passphrase');
  if(!phrase) return null; /* not logged in */
  return passphraseToId(phrase);
};

const getBtPassphrase = () => localStorage.getItem('bt_passphrase');

    channel.on('broadcast', { event: 'trade_reject' }, ({payload}) => {
      if(!payload || payload.target !== S.myId) return;
      S.dmgNumbers.push({x:S.player.x,y:S.player.y-30,text:'❌ Trade declined',color:'#ff5e6c',ts:Date.now()});
    });

    /* PvP — defender validates attack using attacker's position+angle */
    channel.on('broadcast', { event: 'player_attack' }, ({payload}) => {
      if(!payload || payload.id === S.myId) return;
      if(Date.now() < S.respawnTimer) return;
      const R = S.rpg;
      if(!R) return;
      /* Verify the hit — check if WE are in the attack's arc using attacker's reported position */
      const latency = Date.now() - (payload.ts||0);
      if(latency > 500) return; /* reject stale attacks (>500ms old) */
      const dist = Math.sqrt((S.player.x-payload.x)**2+(S.player.y-payload.y)**2);
      if(dist > (payload.range||40)*1.3) return; /* 30% forgiveness for latency */
      const angle = Math.atan2(S.player.y-payload.y, S.player.x-payload.x);
      let aDiff = angle - (payload.angle||0);
      while(aDiff > Math.PI) aDiff -= Math.PI*2;
      while(aDiff < -Math.PI) aDiff += Math.PI*2;
      if(Math.abs(aDiff) > (payload.arc||Math.PI*0.7)/2*1.2) return; /* 20% arc forgiveness */
      /* Hit confirmed by defender! */
      const isCrit = Math.random() < (payload.critChance||0);
      const rawDmg = Math.max(1, (isCrit?(payload.dmgBase||5)*2:(payload.dmgBase||5)) - R.def);
      const shielded = Date.now() < S.shieldEnd;
      const dmgTaken = shielded ? Math.max(1, Math.floor(rawDmg*0.2)) : rawDmg;
      R.hp -= dmgTaken;
      S.lastDamageTaken = Date.now();
      /* Blood + knockback on self */
      const kbA = Math.atan2(S.player.y-payload.y, S.player.x-payload.x);
      S.player.x += Math.cos(kbA)*4;
      S.player.y += Math.sin(kbA)*4;
      if(shielded){
        S.dmgNumbers.push({x:S.player.x,y:S.player.y-30,text:'🛡️ -'+dmgTaken,color:'#60a5fa',ts:Date.now()});

      }
      /* Confirm hit back to attacker */
      if(S.channel) S.channel.send({type:'broadcast',event:'pvp_confirmed',payload:{target:payload.id,from:S.myId,dmg:dmgTaken,isCrit,died:R.hp<=0}});
      if(R.hp <= 0){
        R.hp = R.maxHp; R.stamina = R.maxStamina; R.mana = R.maxMana;
        R.coins = Math.max(0, Math.floor(R.coins*0.9));
        /* §5.5 Respawn in town */
        S.currentZone = 'town'; updateZoneDimensions('town');
        S.map = generateZoneMap('town'); S.monsters = spawnMonstersForZone(ZONES.town);

        S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
      }
      setRpgState({...R});
      if(getBtPlayerId()) btRpc('bt_sync_rpg',{p_id:getBtPlayerId(),p_coins:R.coins,p_xp:R.xp,p_hp:R.hp,p_level:R.level,p_sword_tier:R.swordTier||0});
    });

    /* PvP hit confirmation — attacker gets feedback */
    channel.on('broadcast', { event: 'pvp_confirmed' }, ({payload}) => {
      if(!payload || payload.target !== S.myId) return;
      S.dmgNumbers.push({x:S.player.x,y:S.player.y-40,text:(payload.isCrit?'💥 ':'')+payload.dmg+' dmg!',color:payload.isCrit?'#f5c542':'#3dd497',ts:Date.now()});

    });

    channel.on('broadcast', { event: 'move' }, ({payload}) => {
      if(!payload || payload.id === S.myId) return;
      if(S.others[payload.id]) {
        S.others[payload.id].x = payload.x;
        S.others[payload.id].y = payload.y;
        S.others[payload.id].dir = payload.dir;

    channel.subscribe(async(status) => {

  /* Canvas rendering + game loop */
  useEffect(()=>{
    if(showNameModal||showLogin) return;
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    /* Polyfill roundRect for game canvas */
    ctx.roundRect = function(x,y,w,h,r){
      const radii = typeof r === 'number' ? [r,r,r,r] : Array.isArray(r) ? r.concat([0,0,0,0]).slice(0,4) : [0,0,0,0];
      this.moveTo(x+radii[0],y);
      this.lineTo(x+w-radii[1],y); this.quadraticCurveTo(x+w,y,x+w,y+radii[1]);
      this.lineTo(x+w,y+h-radii[2]); this.quadraticCurveTo(x+w,y+h,x+w-radii[2],y+h);
      this.lineTo(x+radii[3],y+h); this.quadraticCurveTo(x,y+h,x,y+h-radii[3]);
      this.lineTo(x,y+radii[0]); this.quadraticCurveTo(x,y,x+radii[0],y);
      this.closePath();
    };

    if(!S.map){
      updateZoneDimensions(S.currentZone);
      S.map = generateZoneMap(S.currentZone);
      /* Spawn monsters for current zone */
      const zone = ZONES[S.currentZone];
      S.monsters = spawnMonstersForZone(zone);
    }
    const map = S.map;

    /* Generate scavenger hunt collectibles — town only */
    if(!S.collectibles && S.currentZone === 'town'){
      const zone = ZONES.town;
      const items = ['💎','⭐','🔑','🍀','🎁','🏆','💰','🎵','🌈','❤️'];
      const collectibles = [];
      const seed = new Date().toDateString();
      let hash = 0;
      for(let i=0;i<seed.length;i++) hash = ((hash<<5)-hash)+seed.charCodeAt(i);
      for(let i=0;i<10;i++){
        let attempts=0;
        while(attempts<100){
          hash = (hash * 1664525 + 1013904223) & 0x7fffffff;
          const tx = hash % zone.w;
          hash = (hash * 1664525 + 1013904223) & 0x7fffffff;
          const ty = hash % zone.h;
          if(map[ty]&&map[ty][tx]===0){
            collectibles.push({x:tx*TILE+TILE/2, y:ty*TILE+TILE/2, emoji:items[i], id:'c'+i, collected:false});
            break;
          }
          attempts++;
        }
      }
      S.collectibles = collectibles;
    } else if(!S.collectibles){
      S.collectibles = []; /* empty in combat zones */
    }

    /* Initialize RPG stats — use localStorage as cache, server overwrites async */
    if(!S.rpg){
      /* Use localStorage cache immediately so game loop can start */
      const savedRpg = (() => { try{ return JSON.parse(localStorage.getItem('bt_rpg')); }catch{ return null; } })();

      /* Detect if saved data uses old system (has 'str') or new (has 'power') */
      if (savedRpg && savedRpg.power !== undefined) {
        /* New stat system — load directly */
        S.rpg = savedRpg;
        recalcDerived(S.rpg);
      } else {
        /* Either no save or old system — create fresh with new system */
        S.rpg = createDefaultRpg();
        recalcDerived(S.rpg);
        /* Migrate coins/level from old save if present */
        if (savedRpg) {
          S.rpg.level = savedRpg.level || 1;
          S.rpg.xp = savedRpg.xp || 0;
          S.rpg.coins = savedRpg.coins || 50;
          /* Give them points to allocate based on their old level */
          const earnedPts = (S.rpg.level - 1) * STAT_POINTS_PER_LEVEL;
          S.rpg.unspentT1 = 10 + Math.floor(earnedPts / 2);
          S.rpg.unspentT2 = 10 + Math.floor(earnedPts / 2);
          recalcDerived(S.rpg);
        }
      }
      if (!S.rpg.inventory) S.rpg.inventory = {};
      S.rpg.hp = Math.min(S.rpg.hp, S.rpg.maxHp);
      S.rpg.stamina = S.rpg.stamina || S.rpg.maxStamina;
      S.rpg.mana = S.rpg.mana || S.rpg.maxMana;
      S.respawnTimer = Date.now();

      /* Legacy compat properties — some UI/render code still reads these */
      S.rpg.str = S.rpg.power; S.rpg.def = S.rpg.fortification;
      S.rpg.vit = S.rpg.vitality; S.rpg.spd = S.rpg.agility;
      S.rpg.lck = S.rpg.ferocity; S.rpg.swordTier = 0;
      S.rpg.maxHp = S.rpg.maxHp; S.rpg.unspentPts = S.rpg.unspentT1 + S.rpg.unspentT2;

      setRpgState({...S.rpg});
      try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}

      /* Then fetch from server and overwrite (async, non-blocking) */
      if(!S._serverLoadStarted && getBtPlayerId()){
        S._serverLoadStarted = true;
        (async()=>{
          const pid = getBtPlayerId();
          const sd = await btRpc('bt_load_player',{p_id:pid});
          if(sd&&sd.rpg){
            const sr=sd.rpg;
            /* Server may still have old format — handle both */
            if (sr.power !== undefined) {
              Object.assign(S.rpg, sr);
            } else {
              S.rpg.level = sr.level||1; S.rpg.xp = sr.xp||0; S.rpg.coins = sr.coins||0;
            }
            recalcDerived(S.rpg);
            /* Update legacy compat */
            S.rpg.str = S.rpg.power; S.rpg.def = S.rpg.fortification;
            S.rpg.vit = S.rpg.vitality; S.rpg.spd = S.rpg.agility;
            S.rpg.lck = S.rpg.ferocity; S.rpg.unspentPts = S.rpg.unspentT1 + S.rpg.unspentT2;
            setRpgState({...S.rpg});
            try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
            console.log('[Game] Server sync: Lv'+S.rpg.level+' '+S.rpg.coins+'G');
          } else if(pid) {
            await btRpc('bt_register_player',{p_id:pid,p_name:S.myName||'Anon'});
          }
        })();
      }
    }

    /* Monsters spawned with zone map — see S.map init above */
    /* Initialize NPCs — only in town */
    if(!S.npcs && S.currentZone === 'town'){
      S.npcs = NPC_DATA.map((npc,i) => ({
        ...npc, id:'npc-'+i,
        hp: 30, maxHp: 30, alive: true, respawnAt: 0,
        x: npc.spawnX, y: npc.spawnY,
        targetX: npc.spawnX, targetY: npc.spawnY,
        moveTimer: Math.random()*3000,
        chatTimer: 5000 + Math.random()*10000,
        chatBubble: null, /* {text, ts} */
        dir: 'down', _facing: 'down',
        renderX: npc.spawnX, renderY: npc.spawnY,
      }));
    }

    /* Loaded avatar images cache */
    const avatarImgs = {};
    const processedAvatars = {}; /* url -> processed canvas with transparent bg */

    const loadAvatarImg = (url) => {
      /* Return processed version if available */
      if(processedAvatars[url]) return processedAvatars[url];
      /* Return raw image (triggers load) */
      if(!avatarImgs[url]){
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          /* Process: remove background color by sampling corner pixels */
          try{
            const size = 64;
            const offCanvas = document.createElement('canvas');
            offCanvas.width = size; offCanvas.height = size;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(img, 0, 0, size, size);
            const imgData = offCtx.getImageData(0, 0, size, size);
            const d = imgData.data;
            /* Sample background color from top-left corner (0,0) */
            const bgR = d[0], bgG = d[1], bgB = d[2];
            /* Remove pixels similar to background color */
            const tolerance = 40;
            for(let i=0; i<d.length; i+=4){
              const dr = Math.abs(d[i]-bgR);
              const dg = Math.abs(d[i+1]-bgG);
              const db = Math.abs(d[i+2]-bgB);
              if(dr < tolerance && dg < tolerance && db < tolerance){
                d[i+3] = 0; /* set alpha to 0 */
              }
            }
            offCtx.putImageData(imgData, 0, 0);
            processedAvatars[url] = offCanvas;
          }catch(e){
            /* CORS or other error — use raw image */
            processedAvatars[url] = img;
          }
        };
        img.src = url;
        avatarImgs[url] = img;
      }
      return avatarImgs[url];
    };
    /* Preload own avatar */
    if(S.myAvatar) loadAvatarImg(S.myAvatar);

    const resize = () => {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      if(rect.width === 0 || rect.height === 0) return;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(dpr*0.8, 0, 0, dpr*0.8, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);
    /* Also resize when flex container changes (keyboard open/close) */
    let resizeObs;
    if(window.ResizeObserver && canvas.parentElement) {
      resizeObs = new ResizeObserver(resize);
      resizeObs.observe(canvas.parentElement);
    }
    const vv = window.visualViewport;
    if(vv) { vv.addEventListener('resize', resize); }

    const isSolid = (px,py) => {
      const zone = ZONES[S.currentZone];
      const tx = Math.floor(px/TILE), ty = Math.floor(py/TILE);
      if(tx<0||tx>=zone.w||ty<0||ty>=zone.h) return true;
      const tile = map[ty]?.[tx];
      if(tile===8||tile===9) return false; /* exit tiles are walkable */
      return TILE_SOLID.has(tile);
    };

    const gameLoop = () => {
      frameRef.current = requestAnimationFrame(gameLoop);
      const W = canvas.width / (window.devicePixelRatio||1) * 1.25;
      const H = canvas.height / (window.devicePixelRatio||1) * 1.25;
      const P = S.player;
      const K = S.keys;

      /* Check if player is stunned */
      const playerStunned = S._playerStunUntil && Date.now() < S._playerStunUntil;

      /* Movement — analog joystick + keyboard fallback */
      /* Dodge roll */
      if(S._dodgeRoll){
        const rollAge = Date.now() - S._dodgeRoll.startTime;
        if(rollAge < 200){ S.player.x += Math.cos(S._dodgeRoll.angle)*6; S.player.y += Math.sin(S._dodgeRoll.angle)*6; }
        else S._dodgeRoll = null;
      }
      let dx = playerStunned ? 0 : S.stickX, dy = playerStunned ? 0 : S.stickY;
      /* Keyboard overrides if no stick input */
      if(dx===0 && dy===0) {
        if(K['ArrowUp']||K['w']||K['W']) dy=-1;
        if(K['ArrowDown']||K['s']||K['S']) dy=1;
        if(K['ArrowLeft']||K['a']||K['A']) dx=-1;
        if(K['ArrowRight']||K['d']||K['D']) dx=1;
        /* Normalize diagonal keyboard input */
        if(dx&&dy){ const len=Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len; }
      }
      /* Direction for name tag / facing */
      if(Math.abs(dx)>0.1||Math.abs(dy)>0.1){
        if(Math.abs(dx)>Math.abs(dy)) P.dir=dx>0?'right':'left';
        else P.dir=dy>0?'down':'up';
      }

      /* §14 Terrain feel — tile under player affects movement */
      const footTile = S.map?.[Math.floor(P.y/TILE)]?.[Math.floor(P.x/TILE)] ?? 0;
      let terrainMult = 1.0;
      let terrainSlide = 0;
      if(footTile === 6) terrainMult = 0.7; /* sand: slightly slows */
      if(footTile === 1) terrainMult = 1.1; /* path: feels crisp, slight boost */
      if(footTile === 7) terrainMult = 0.85; /* stone: heavy */
      /* Zone-specific terrain effects */
      const curZone = ZONES[S.currentZone];
      if(curZone?.element === 'frost') terrainSlide = 0.92; /* ice: adds momentum/slide */
      if(curZone?.element === 'venom' && footTile === 0) terrainMult *= 0.85; /* swamp: heavy on grass */

      /* Agility-based movement speed */
      const baseSpd = S.rpg ? calcMoveSpeed(S.rpg.agility||0) / 5.0 * SPEED : SPEED;
      /* Food buff speed bonus */
      const spdBuff = (S._spdBuff && Date.now() < S._spdBuff) ? 1.15 : 1.0;
      const finalSpd = baseSpd * terrainMult * spdBuff;

      const nx = P.x + dx*finalSpd;
      const ny = P.y + dy*finalSpd;

      /* Ice slide momentum */
      if(terrainSlide > 0 && (Math.abs(dx)>0.01 || Math.abs(dy)>0.01)){
        if(!S._slideVx) S._slideVx = 0;
        if(!S._slideVy) S._slideVy = 0;
        S._slideVx = S._slideVx * terrainSlide + dx * finalSpd * (1-terrainSlide);
        S._slideVy = S._slideVy * terrainSlide + dy * finalSpd * (1-terrainSlide);
      } else if(terrainSlide > 0){
        S._slideVx = (S._slideVx||0) * terrainSlide;
        S._slideVy = (S._slideVy||0) * terrainSlide;
        if(Math.abs(S._slideVx) < 0.01) S._slideVx = 0;
        if(Math.abs(S._slideVy) < 0.01) S._slideVy = 0;
      } else {
        S._slideVx = 0; S._slideVy = 0;
      }
      /* Collision check — check corners of a 20x20 hitbox */
      const hs = 10;
      if(!isSolid(nx-hs,P.y-hs)&&!isSolid(nx+hs,P.y-hs)&&!isSolid(nx-hs,P.y+hs)&&!isSolid(nx+hs,P.y+hs)) P.x=nx;
      if(!isSolid(P.x-hs,ny-hs)&&!isSolid(P.x+hs,ny-hs)&&!isSolid(P.x-hs,ny+hs)&&!isSolid(P.x+hs,ny+hs)) P.y=ny;
      /* Apply ice slide */
      if(S._slideVx || S._slideVy){
        const sx = P.x + (S._slideVx||0), sy = P.y + (S._slideVy||0);
        if(!isSolid(sx-hs,P.y-hs)&&!isSolid(sx+hs,P.y+hs)) P.x=sx;
        if(!isSolid(P.x-hs,sy-hs)&&!isSolid(P.x+hs,sy+hs)) P.y=sy;
      }
      const zone = ZONES[S.currentZone];
      const ZONE_W = zone.w * TILE, ZONE_H = zone.h * TILE;
      P.x = Math.max(hs, Math.min(ZONE_W-hs, P.x));
      P.y = Math.max(hs, Math.min(ZONE_H-hs, P.y));

      /* ═══ ZONE TRANSITION — check if player stepped on exit tile ═══ */
      const ptx = Math.floor(P.x / TILE), pty = Math.floor(P.y / TILE);
      if(S.map && ptx>=0 && pty>=0 && pty<zone.h && ptx<zone.w){
        const tile = S.map[pty][ptx];
        if(tile === 8 && S.currentZone === 'town'){
          /* Exit tile — find which zone this leads to */
          const exit = TOWN_EXITS.find(ex => {
            if(ex.dir==='north' && pty===0 && Math.abs(ptx-ex.tx)<=1) return true;
            if(ex.dir==='south' && pty>=zone.h-1 && Math.abs(ptx-ex.tx)<=1) return true;
            if(ex.dir==='east' && ptx>=zone.w-1 && Math.abs(pty-ex.ty)<=1) return true;
            if(ex.dir==='west' && ptx===0 && Math.abs(pty-ex.ty)<=1) return true;
            return false;
          });
          if(exit){
            /* Transition to new zone */
            S.currentZone = exit.zoneId;
            updateZoneDimensions(exit.zoneId);
            S.map = generateZoneMap(exit.zoneId);
            const newZone = ZONES[exit.zoneId];
            S.monsters = spawnMonstersForZone(newZone);
            /* Place player at opposite edge */
            const nW = newZone.w*TILE, nH = newZone.h*TILE;
            if(exit.dir==='north') { P.x=nW/2; P.y=nH-TILE*2; }
            if(exit.dir==='south') { P.x=nW/2; P.y=TILE*2; }
            if(exit.dir==='east')  { P.x=TILE*2; P.y=nH/2; }
            if(exit.dir==='west')  { P.x=nW-TILE*2; P.y=nH/2; }
            S.dmgNumbers.push({x:P.x,y:P.y-40,text:newZone.name,color:newZone.element?ELEMENTS[newZone.element].color:'#fff',ts:Date.now()});
            S.npcs = null; /* clear NPCs */
            S.groundLoot = [];
            S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
          }
        } else if(tile === 9 && S.currentZone !== 'town'){
          /* Return to town */
          S.currentZone = 'town';
          updateZoneDimensions('town');
          S.map = generateZoneMap('town');
          S.monsters = spawnMonstersForZone(ZONES.town);
          P.x = 20*TILE; P.y = 15*TILE;
          S.dmgNumbers.push({x:P.x,y:P.y-40,text:'Town',color:'#5b52ff',ts:Date.now()});
          S.npcs = null;
          S.groundLoot = [];
          S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
        }
      }

      /* Check building proximity */
      const pTileX = Math.floor(P.x / TILE);
      const pTileY = Math.floor(P.y / TILE);
      let nearBldg = null;
      for(let i=0;i<BUILDINGS.length;i++){
        const b = BUILDINGS[i];
        /* Check if player is within 2 tiles of building edge */
        if(pTileX >= b.bx-2 && pTileX <= b.bx+b.bw+1 && pTileY >= b.by-2 && pTileY <= b.by+b.bh+1){
          nearBldg = i;
          break;
        }
      }
      S.nearBuilding = nearBldg;

      /* Check water proximity for fishing */
      let nearWater = false;
      const zW = ZONES[S.currentZone].w, zH = ZONES[S.currentZone].h;
      for(let wy=Math.max(0,pTileY-2);wy<=Math.min(zH-1,pTileY+2);wy++){
        for(let wx=Math.max(0,pTileX-2);wx<=Math.min(zW-1,pTileX+2);wx++){
          if(map[wy][wx]===2){ nearWater=true; break; }
        }
        if(nearWater) break;
      }
      S.nearWater = nearWater;
      let _nt=false,_nf=false;
      for(let _ty=Math.max(0,pTileY-2);_ty<=Math.min(ROWS-1,pTileY+2);_ty++)for(let _tx=Math.max(0,pTileX-2);_tx<=Math.min(COLS-1,pTileX+2);_tx++)if(map[_ty][_tx]===4&&!S.destroyedTrees.has(_tx+','+_ty))_nt=true;
      if(S._fires)S._fires.forEach(fi=>{if(Math.sqrt((P.x-fi.x)**2+(P.y-fi.y)**2)<50)_nf=true;});
      S.nearTree=_nt; S.nearFire=_nf;

      /* Trail — record position every few frames */
      if(!S._trailTimer) S._trailTimer = 0;
      S._trailTimer++;
      if(S._trailTimer % 3 === 0 && (Math.abs(dx)>0.01||Math.abs(dy)>0.01)){
        S.trail.push({x:P.x, y:P.y, ts:now});
        if(S.trail.length > 20) S.trail.shift();
      }
      /* Expire old trail points */
      while(S.trail.length > 0 && now - S.trail[0].ts > 800) S.trail.shift();

      /* Check collectible pickup — within 18px */
      if(S.collectibles){
        S.collectibles.forEach(item=>{
          if(item.collected) return;
          const dist = Math.sqrt((P.x-item.x)**2 + (P.y-item.y)**2);
          if(dist < 18){
            item.collected = true;
            S.collectedIds.add(item.id);
            S.score++;
            if(S.stats){ S.stats.totalCollected++; S.stats.dailyCollected++; }
            BT_AUDIO.collect();
            /* Notify React for UI popup */
            const remaining = S.collectibles.filter(c=>!c.collected).length;
            setCollectScore(S.score);
            setCollectMsg({emoji:item.emoji, text:remaining>0 ? S.score+'/10 found!' : 'ALL 10 FOUND! 🎉', ts:Date.now()});
          }
        });
      }

      /* Update NPCs — wander + random chat */
      if(S.npcs){
        S.npcs.forEach(npc => {
          /* Respawn check */
          if(!npc.alive){
            if(Date.now() > npc.respawnAt){
              npc.alive = true; npc.hp = npc.maxHp;
              npc.x = npc.spawnX; npc.y = npc.spawnY;
            }
            return;
          }
          /* Movement — pick new target when reached or timer expires */
          npc.moveTimer -= 16.7;
          const distToTarget = Math.sqrt((npc.x-npc.targetX)**2+(npc.y-npc.targetY)**2);
          if(distToTarget < 4 || npc.moveTimer <= 0){
            const angle = Math.random()*Math.PI*2;
            const dist = Math.random()*npc.pathRadius;
            npc.targetX = npc.spawnX + Math.cos(angle)*dist;
            npc.targetY = npc.spawnY + Math.sin(angle)*dist;
            /* Clamp to map */
            npc.targetX = Math.max(TILE*2, Math.min(TOWN_W-TILE*2, npc.targetX));
            npc.targetY = Math.max(TILE*2, Math.min(TOWN_H-TILE*2, npc.targetY));
            npc.moveTimer = 2000 + Math.random()*4000;
          }
          /* Move toward target */
          const nDx = npc.targetX - npc.x;
          const nDy = npc.targetY - npc.y;
          const nDist = Math.sqrt(nDx*nDx+nDy*nDy);
          if(nDist > 2){
            const spd = 0.8;
            npc.x += (nDx/nDist)*spd;
            npc.y += (nDy/nDist)*spd;
            /* Face direction */
            if(Math.abs(nDx) > Math.abs(nDy)){
              npc._facing = nDx > 0 ? 'right' : 'left';
            } else {
              npc._facing = nDy > 0 ? 'down' : 'up';
            }
          }
          npc.renderX += (npc.x - npc.renderX) * 0.12;
          npc.renderY += (npc.y - npc.renderY) * 0.12;

          /* Random chat */
          npc.chatTimer -= 16.7;
          if(npc.chatTimer <= 0){
            const phrase = npc.phrases[Math.floor(Math.random()*npc.phrases.length)];
            npc.chatBubble = {text: phrase, ts: Date.now()};
            BT_AUDIO.npcChat();
            npc.chatTimer = 8000 + Math.random()*15000;
          }
          /* Expire bubble */
          if(npc.chatBubble && Date.now() - npc.chatBubble.ts > 5000) npc.chatBubble = null;
        });
      }

      /* ═══ MONSTER AI + COMBAT ═══ */
      if(S.monsters && S.rpg){
        const R = S.rpg;
        /* §4.4 Weapon Damage — uses new stat system */
        const activeWpn = getActiveWeapon(R);
        const wpnType = WEAPON_TYPES[activeWpn.type] || WEAPON_TYPES.greatsword;
        const pDmg = calcWeaponDmg(activeWpn.type, R.power, activeWpn.tierMult);
        /* §2.1 Crit from Ferocity */
        const critChance = calcCritChance(R.ferocity);
        const critMult = calcCritMult(R.ferocity);
        const invuln = Date.now() < S.respawnTimer;

        S.monsters.forEach(m=>{
          if(!m.alive){
            if(Date.now() > m.respawnAt){
              m.alive = true; m.curHp = m.hp;
              m.statuses = {}; /* clear statuses on respawn */
              m.x = m.spawnX + (Math.random()-0.5)*60;
              m.y = m.spawnY + (Math.random()-0.5)*60;
            }
            return;
          }

          /* §9 — Tick statuses (DoT damage, expiry) */
          const expired = tickStatuses(m, 16.7/1000, Date.now(), R);
          if(m._lastDotDmg && Date.now() - m._lastDotDmg.ts < 100){
            const dot = m._lastDotDmg;
            const dotElem = Object.keys(ELEMENTS).find(e => ELEMENTS[e].status === dot.statusId);
            const dotColor = dotElem ? ELEMENTS[dotElem].color : '#ff5e6c';
            S.dmgNumbers.push({x:m.x+(Math.random()-0.5)*10,y:m.y-22,text:dot.amount+'',color:dotColor,ts:Date.now()});
            m._lastDotDmg = null;
          }
          /* Check if DoT killed */
          if(m.curHp <= 0 && m.alive){
            m.alive = false; m.respawnAt = Date.now() + 30000;
            S.dmgNumbers.push({x:m.x,y:m.y-30,text:'☠️',color:'#ff5e6c',ts:Date.now()});
            /* Drop loot */
            S.groundLoot.push({x:m.x,y:m.y,coins:m.gold,xp:m.xp,skull:m.type,skullEmoji:m.emoji,ts:Date.now()});
            BT_AUDIO.deathBoom();
          }

          /* Skip if stunned */
          if(m._stunUntil && Date.now() < m._stunUntil) return;

          /* Status-based movement modifiers */
          let moveMult = 1.0;
          if(m.statuses.freeze) moveMult = 0; /* frozen = can't move */
          if(m.statuses.root) moveMult = 0;   /* rooted = can't move */
          if(m.statuses.slow) moveMult *= 0.4; /* slowed */
          /* Legacy compat for old _frozen/_slowed flags */
          if(m._frozen && Date.now()<m._frozen) moveMult = 0;
          if(m._slowed && Date.now()<m._slowed) moveMult *= 0.3;

          /* ═══ ARCHETYPE AI — §Creative Vision §9: Alive, Not Artificial ═══ */
          const distToP = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
          const arch = m.archetype || 'fodder';

          /* Aggro range varies by archetype */
          const aggroRange = {fodder:100, brute:90, swarm:130, sentinel:80, volatile:110, stalker:160, hexer:140}[arch] || 120;
          const atkRange = arch==='hexer' ? 60 : arch==='stalker' ? 30 : 18;
          const atkCooldown = {fodder:1500, brute:2200, swarm:800, sentinel:1800, volatile:1200, stalker:1000, hexer:2500}[arch] || 1500;

          if(distToP < aggroRange && moveMult > 0){
            const chDx = P.x-m.x, chDy = P.y-m.y;
            const chDist = Math.sqrt(chDx*chDx+chDy*chDy);

            /* Archetype-specific movement behavior */
            if(arch === 'stalker'){
              /* Stalker: circle-strafe, then dash in for quick hit */
              if(!m._stalkPhase) m._stalkPhase = 'circle';
              if(m._stalkPhase === 'circle'){
                /* Circle the player */
                const perpAngle = Math.atan2(chDy, chDx) + Math.PI/2;
                if(chDist > 40){
                  m.x += (chDx/chDist)*m.spd*moveMult;
                  m.y += (chDy/chDist)*m.spd*moveMult;
                } else {
                  m.x += Math.cos(perpAngle)*m.spd*moveMult*0.8;
                  m.y += Math.sin(perpAngle)*m.spd*moveMult*0.8;
                }
                if(Math.random() < 0.008) m._stalkPhase = 'dash'; /* randomly dash in */
              } else {
                /* Dash toward player */
                if(chDist > 15) {
                  m.x += (chDx/chDist)*m.spd*moveMult*2.5;
                  m.y += (chDy/chDist)*m.spd*moveMult*2.5;
                }
                if(chDist < 20 || Math.random() < 0.02) m._stalkPhase = 'circle';
              }
            } else if(arch === 'hexer'){
              /* Hexer: keep distance, back away if player gets close */
              const idealRange = 50;
              if(chDist < idealRange * 0.7){
                /* Retreat */
                m.x -= (chDx/chDist)*m.spd*moveMult*1.2;
                m.y -= (chDy/chDist)*m.spd*moveMult*1.2;
              } else if(chDist > idealRange * 1.3){
                /* Approach */
                m.x += (chDx/chDist)*m.spd*moveMult*0.7;
                m.y += (chDy/chDist)*m.spd*moveMult*0.7;
              }
              /* Slight side-to-side wobble */
              m.x += Math.sin(Date.now()/500 + m.spawnX)*0.3;
            } else if(arch === 'swarm'){
              /* Swarm: rush directly at player, fast, erratic zigzag */
              if(chDist > 12){
                const zigzag = Math.sin(Date.now()/200 + m.spawnX*10) * 0.6;
                const moveAngle = Math.atan2(chDy, chDx) + zigzag;
                m.x += Math.cos(moveAngle)*m.spd*moveMult;
                m.y += Math.sin(moveAngle)*m.spd*moveMult;
              }
            } else if(arch === 'volatile'){
              /* Volatile: charge straight, explodes on contact if low HP */
              if(chDist > 12){
                const chargeSpd = m.curHp < m.hp*0.3 ? m.spd*2.0 : m.spd; /* faster when low HP */
                m.x += (chDx/chDist)*chargeSpd*moveMult;
                m.y += (chDy/chDist)*chargeSpd*moveMult;
              }
            } else if(arch === 'sentinel'){
              /* Sentinel: slow, deliberate, stops periodically to "wind up" attack */
              if(!m._sentinelPause) m._sentinelPause = 0;
              m._sentinelPause -= 16.7;
              if(m._sentinelPause <= 0){
                if(chDist > 20){
                  m.x += (chDx/chDist)*m.spd*moveMult*0.6;
                  m.y += (chDy/chDist)*m.spd*moveMult*0.6;
                }
                if(chDist < 30 && Math.random() < 0.01) m._sentinelPause = 800; /* wind-up pause */
              }
            } else {
              /* Fodder + Brute: direct chase */
              if(chDist > 15){
                m.x += (chDx/chDist)*m.spd*moveMult;
                m.y += (chDy/chDist)*m.spd*moveMult;
              }
            }

            /* Monster attacks player if in range */
            if(distToP < atkRange && !invuln){
              if(!m._atkCd || Date.now()-m._atkCd > atkCooldown){
                m._atkCd = Date.now();
                const shielded = Date.now() < S.shieldEnd;
                const rawDmg = Math.max(1, m.dmg);
                const blockReduc = shielded ? calcBlockReduction(R.fortification) : 0;
                const dmgTaken = shielded ? Math.max(1, Math.floor(rawDmg * (1 - blockReduc))) : rawDmg;

                /* Volatile: AoE damage burst when low HP */
                if(arch === 'volatile' && m.curHp < m.hp*0.3 && !m._exploded){
                  m._exploded = true;
                  m.curHp = 0; m.alive = false; m.respawnAt = Date.now()+30000;
                  /* Explosion damages player + visual */
                  const explodeDmg = Math.round(m.dmg * 2);
                  R.hp -= shielded ? Math.max(1, Math.floor(explodeDmg*(1-blockReduc))) : explodeDmg;
                  S.screenShake = 8;
                  S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥BOOM -'+explodeDmg,color:'#ea580c',ts:Date.now()});
                  for(let ep=0;ep<30;ep++){
                    S.hitParticles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-3,
                      life:1.2,color:(['#ea580c','#f5c542','#ff5e6c'])[Math.floor(Math.random()*3)],size:2+Math.random()*3});
                  }
                  BT_AUDIO.deathBoom();
                  BT_AUDIO.beep(100,0.2,0.3,'sawtooth');
                  S.groundLoot.push({x:m.x,y:m.y,coins:m.gold,xp:m.xp,skull:m.type,skullEmoji:m.emoji,ts:Date.now()});
                } else {
                  R.hp -= dmgTaken;
                  S.lastDamageTaken = Date.now();
                  if(shielded){
                    m._stunUntil = Date.now() + 2000;
                    S.dmgNumbers.push({x:P.x,y:P.y-30,text:'🛡️ -'+dmgTaken,color:'#60a5fa',ts:Date.now()});
                    S.dmgNumbers.push({x:m.x,y:m.y-25,text:'STUNNED',color:'#f5c542',ts:Date.now()});
                    BT_AUDIO.beep(300, 0.08, 0.12, 'square');
                  } else {
                    S.dmgNumbers.push({x:P.x,y:P.y-30,text:'-'+dmgTaken,color:'#ff5e6c',ts:Date.now()});
                  }
                }
                if(R.hp <= 0){
                  /* §5.5 Player death — respawn in town */
                  R.hp = R.maxHp; R.stamina = R.maxStamina; R.mana = R.maxMana;
                  R.coins = Math.max(0, Math.floor(R.coins*0.9));
                  S.currentZone = 'town'; updateZoneDimensions('town');
                  S.map = generateZoneMap('town'); S.monsters = spawnMonstersForZone(ZONES.town);
                  P.x = 20*TILE; P.y = 15*TILE;
                  S.respawnTimer = Date.now() + RESPAWN_INVULN;
                  S.dmgNumbers.push({x:P.x,y:P.y-40,text:'💀 RESPAWN',color:'#f5c542',ts:Date.now()});
                  S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
                }
                setRpgState({...R});
              }
            }
          } else {
            /* Wander — archetype personality */
            m.moveTimer -= 16.7;
            if(m.moveTimer <= 0){
              const wanderDist = arch==='swarm' ? 40 : arch==='stalker' ? 100 : 60;
              m.targetX = m.spawnX + (Math.random()-0.5)*wanderDist*2;
              m.targetY = m.spawnY + (Math.random()-0.5)*wanderDist*2;
              m.moveTimer = arch==='swarm' ? 1000+Math.random()*1500 : 2000+Math.random()*3000;
            }
            const wDx=m.targetX-m.x, wDy=m.targetY-m.y;
            const wDist=Math.sqrt(wDx*wDx+wDy*wDy);
            if(wDist>2){ m.x+=wDx/wDist*m.spd*0.5*moveMult; m.y+=wDy/wDist*m.spd*0.5*moveMult; }
          }
        });

        /* Sword swing — check hits */
        /* Clear lock if target is dead */
        if(S.lockedTarget){
          const lt = S.lockedTarget;
          if(lt.type==='monster' && (!lt.ref.alive || lt.ref.curHp<=0)) S.lockedTarget = null;
          else if(lt.type==='npc' && !lt.ref.alive) S.lockedTarget = null;
        }
        /* Auto-attack: trigger swing/bow automatically */
        if(S.autoAttack && S.rpg && Date.now()-S.swingTimer >= SWING_COOLDOWN){
          if(!(S._playerStunUntil && Date.now() < S._playerStunUntil)){
            if(S.weapon === 'bow'){
              let arrAngle;
              if(S.lockedTarget && S.lockedTarget.ref){
                const lt = S.lockedTarget.ref;
                arrAngle = Math.atan2((lt.y||0)-P.y, (lt.x||0)-P.x);
              } else if(S._aiming && S._aimAngle != null){
                arrAngle = S._aimAngle;
              } else {
                const fd = S._facing||'down';
                arrAngle = fd==='right'?0:fd==='up'?-Math.PI/2:fd==='left'?Math.PI:Math.PI/2;
              }
              if(!S.arrows) S.arrows = [];
              S.arrows.push({ang:arrAngle, dist:14, dmg:Math.round(pDmg*0.7),
                life:120, maxLife:120, hitIds:new Set()});
              S.swingTimer = Date.now();
              BT_AUDIO.beep(600, 0.04, 0.06, 'triangle');
            } else if(!S.isSwinging){
              S.swingTimer = Date.now();
              S.isSwinging = true;
              S._specialAttack = false;
            }
          }
        }
        if(S.isSwinging && Date.now()-S.swingTimer < 400){
          let baseAngle;
          if(S.lockedTarget && S.lockedTarget.ref){
            const lt = S.lockedTarget.ref;
            const tx = lt.x || lt.renderX || P.x;
            const ty = lt.y || lt.renderY || P.y;
            baseAngle = Math.atan2(ty-P.y, tx-P.x);
          } else if(S._aiming && S._aimAngle != null){
            baseAngle = S._aimAngle;
          } else {
            const swDir = S._facing||'down';
            baseAngle = swDir==='right'?0:swDir==='up'?-Math.PI/2:swDir==='left'?Math.PI:Math.PI/2;
          }
          /* Hit monsters */
          S.monsters.forEach(m=>{
            if(!m.alive || m._hitThisSwing) return;
            const mDist = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
            if(mDist > SWING_RANGE) return;
            const mAngle = Math.atan2(m.y-P.y, m.x-P.x);
            let angleDiff = mAngle - baseAngle;
            while(angleDiff > Math.PI) angleDiff -= Math.PI*2;
            while(angleDiff < -Math.PI) angleDiff += Math.PI*2;
            if(Math.abs(angleDiff) < SWING_ARC/2){
              m._hitThisSwing = true;
              const isCrit = Math.random() < critChance;
              const specialMult = S._specialAttack ? SPECIAL_ATK_MULT : 1;

              /* §9 — Apply element status on hit */
              const hitElement = S._specialAttack ? activeWpn.element2 : activeWpn.element1;
              if(hitElement){
                const statusId = ELEMENTS[hitElement]?.status;
                if(statusId) applyStatus(m, statusId, S.player, Date.now());
              }

              /* §10.3 — Check for collision (two different elements on target) */
              let collisionResult = null;
              if(hitElement){
                collisionResult = resolveCollision(m, hitElement, S.player, R, Date.now());
              }

              const dmg = Math.round((isCrit ? pDmg*critMult : pDmg) * specialMult);
              m.curHp -= dmg;

              /* Collision damage + feedback */
              if(collisionResult){
                m.curHp -= collisionResult.damage;
                const coll = collisionResult.collision;
                const elemColor = ELEMENTS[collisionResult.triggerElement]?.color || '#fff';
                /* Collision burst damage number */
                S.dmgNumbers.push({x:m.x+8,y:m.y-35,text:'💥'+collisionResult.damage+' '+coll.name,color:elemColor,ts:Date.now()});
                /* Mana restore feedback */
                if(collisionResult.manaRestored > 0){
                  S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+collisionResult.manaRestored+' MP',color:'#3b82f6',ts:Date.now()});
                }
                /* Collision burst particles — element colored */
                for(let cp=0;cp<15;cp++){
                  S.hitParticles.push({
                    x:m.x+(Math.random()-0.5)*6, y:m.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-2,
                    life:0.8, color:elemColor, size:2+Math.random()*3
                  });
                }
                S.screenShake = Math.max(S.screenShake, 5);
                /* Codex discovery */
                const isNew = discoverCollision(coll.id);
                if(isNew){
                  S.dmgNumbers.push({x:P.x,y:P.y-65,text:'📖 NEW: '+coll.name+'!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                }
              }
              /* §Creative Vision — material-varied hit sound */
              BT_AUDIO.hitMaterial(m.archetype || m.type);
              /* Three-layer collision sound if collision fired */
              if(collisionResult){
                BT_AUDIO.collisionSound(collisionResult.setupElement, collisionResult.triggerElement, collisionResult.manaRestored);
              }
              /* Knockback — §Creative Vision: proportional to hit weight */
              const kbAngle = Math.atan2(m.y-P.y, m.x-P.x);
              const kbForce = isCrit ? 14 : (S._specialAttack ? 10 : 6);
              /* Collision adds extra knockback */
              const collisionKb = collisionResult ? 4 : 0;
              m.x += Math.cos(kbAngle)*(kbForce+collisionKb);
              m.y += Math.sin(kbAngle)*(kbForce+collisionKb);
              /* Blood/impact particles */
              for(let p=0;p<(isCrit?35:20);p++){
                const spd = 1+Math.random()*5;
                const spray = (Math.random()-0.5)*1.5;
                S.hitParticles.push({
                  x:m.x+(Math.random()-0.5)*8, y:m.y+(Math.random()-0.5)*8,
                  vx:Math.cos(kbAngle+spray)*spd,
                  vy:Math.sin(kbAngle+spray)*spd-Math.random()*2,
                  life:1, color:isCrit?'#f5c542':(['#cc2233','#aa1122','#dd3344','#880011'])[Math.floor(Math.random()*4)],
                  size:isCrit?2+Math.random()*3:1.5+Math.random()*2
                });
              }
              /* Blood splatter on ground */
              for(let bs=0;bs<(isCrit?6:4);bs++) /* Blood splatter puddles */{
                S.hitParticles.push({
                  x:m.x+Math.cos(kbAngle)*(8+Math.random()*15), y:m.y+Math.sin(kbAngle)*(8+Math.random()*15),
                  vx:0, vy:0, life:1.5, color:'#880011', size:3+Math.random()*2
                });
              }
              /* Screen shake */
              S.screenShake = isCrit ? 6 : 3;
              /* Damage number — scaled by significance */
              if(isCrit && collisionResult){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥⚡ '+dmg,color:'#f5c542',ts:Date.now()});
              } else if(isCrit){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥 '+dmg,color:'#f5c542',ts:Date.now()});
              } else {
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:''+dmg,color:'#fff',ts:Date.now()});
              }

              if(m.curHp <= 0){
                m.alive = false;
                m.respawnAt = Date.now() + 30000;
                m.statuses = {}; /* clear statuses */

                /* ═══ THE GRAND SLAM — §Creative Vision: scaled cinematic micro-event ═══ */
                /* Scale: fodder = small snap. brute/sentinel = dramatic. boss = full treatment. */
                const isGrandSlam = isCrit; /* critical kill = Grand Slam */
                const isBigEnemy = (m.archetype==='brute'||m.archetype==='sentinel'||m.archetype==='hexer');
                const killScale = isGrandSlam ? (isBigEnemy ? 3 : 2) : (isBigEnemy ? 1.5 : 1);

                /* Sound — proportional to significance */
                if(isGrandSlam){
                  BT_AUDIO.grandSlam();
                } else {
                  BT_AUDIO.deathBoom();
                }

                /* Screen shake — proportional */
                S.screenShake = Math.round(4 * killScale);

                /* Death particles — direction of the killing blow */
                const killAngle = Math.atan2(m.y-P.y, m.x-P.x);
                const partCount = Math.round(20 * killScale);
                const deathParts = [];
                for(let dp=0;dp<partCount;dp++){
                  /* Directional spray — particles fly in the kill direction */
                  const spread = (Math.random()-0.5) * 1.2;
                  const spd = (2 + Math.random()*6) * killScale;
                  deathParts.push({
                    x:m.x, y:m.y,
                    vx: Math.cos(killAngle+spread)*spd,
                    vy: Math.sin(killAngle+spread)*spd - Math.random()*3,
                    life:1, color: isGrandSlam ? '#f5c542' : m.color,
                    size: (1.5+Math.random()*2) * (isGrandSlam ? 1.5 : 1)
                  });
                }
                /* Extra debris for Grand Slam */
                if(isGrandSlam){
                  for(let gp=0;gp<10;gp++){
                    deathParts.push({
                      x:m.x, y:m.y,
                      vx: Math.cos(killAngle+(Math.random()-0.5)*0.8)*(5+Math.random()*8),
                      vy: -3-Math.random()*6,
                      life:1.5, color:(['#f5c542','#fff','#fbbf24','#fde68a'])[Math.floor(Math.random()*4)],
                      size: 2+Math.random()*4
                    });
                  }
                }
                S.deathExplosions.push({
                  x:m.x, y:m.y, ts:Date.now(), emoji:m.emoji, particles:deathParts,
                  isGrandSlam, killScale
                });

                /* Loot cascade — scattered in kill direction, then settles */
                const lootCount = isGrandSlam ? 3 : 1;
                const isRare = Math.random() < 0.02;
                for(let li=0;li<lootCount;li++){
                  const lootAngle = killAngle + (Math.random()-0.5)*1.0;
                  const lootDist = 15 + Math.random()*25 * killScale;
                  S.groundLoot.push({
                    x: m.x + Math.cos(lootAngle)*lootDist + (Math.random()-0.5)*10,
                    y: m.y + Math.sin(lootAngle)*lootDist + (Math.random()-0.5)*10,
                    coins: Math.ceil((isRare ? m.gold*10 : m.gold) / lootCount),
                    xp: Math.ceil((isRare ? m.xp*3 : m.xp) / lootCount),
                    skull: m.type, skullEmoji: m.emoji,
                    ts: Date.now() + li*80, /* staggered appearance = cascade feel */
                    rare: isRare && li===0,
                  });
                }
                if(isRare){
                  S.dmgNumbers.push({x:m.x,y:m.y-50,text:'⭐ RARE DROP!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                  setTimeout(()=>BT_AUDIO.collect(),150);
                }
                if(isGrandSlam){
                  S.dmgNumbers.push({x:m.x,y:m.y-40,text:'GRAND SLAM!',color:'#fbbf24',ts:Date.now()});
                }

                /* Check level up — §6.2 tri-phase XP curve */
                while(R.xp >= xpRequired(R.level)){
                  R.xp -= xpRequired(R.level);
                  R.level++;
                  R.unspentT1 += 10;
                  R.unspentT2 += 10;
                  R.unspentPts = R.unspentT1 + R.unspentT2;
                  recalcDerived(R);
                  R.hp = R.maxHp; R.stamina = R.maxStamina; R.mana = R.maxMana;
                  setLevelUpMsg({level:R.level, ts:Date.now()});
                  BT_AUDIO.levelUp();
                }
                setRpgState({...R});
                try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                btRpc('bt_monster_kill',{p_id:getBtPlayerId(),p_monster_type:m.type,p_damage:dmg,p_is_crit:isCrit,p_is_special:!!S._specialAttack}).then(sr=>{if(sr&&sr.rpg){R.level=sr.rpg.level;R.xp=sr.rpg.xp;R.coins=sr.rpg.coins;R.unspentPts=sr.rpg.unspent_pts;setRpgState({...R});}});
              }
            }
          });
          /* Hit NPCs */
          if(S.npcs){
            S.npcs.forEach(npc=>{
              if(!npc.alive || npc._hitThisSwing) return;
              const nDist = Math.sqrt((npc.x-P.x)**2+(npc.y-P.y)**2);
              if(nDist > SWING_RANGE) return;
              const nAngle = Math.atan2(npc.y-P.y, npc.x-P.x);
              let naDiff = nAngle - baseAngle;
              while(naDiff>Math.PI) naDiff-=Math.PI*2;
              while(naDiff<-Math.PI) naDiff+=Math.PI*2;
              if(Math.abs(naDiff) < SWING_ARC/2){
                npc._hitThisSwing = true;
                const npcDmg = pDmg;
                npc.hp -= npcDmg;
                BT_AUDIO.thwack();
                const nkbA2 = Math.atan2(npc.y-P.y, npc.x-P.x);
                npc.x += Math.cos(nkbA2)*8; npc.y += Math.sin(nkbA2)*8;
                for(let np2=0;np2<10;np2++) S.hitParticles.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*4+Math.cos(nkbA2)*2,vy:(Math.random()-.5)*4-1,life:1,color:['#cc2233','#aa1122','#dd3344'][Math.floor(Math.random()*3)],size:1.5+Math.random()*2});
                S.screenShake = 2;
                const nkbA = Math.atan2(npc.y-P.y, npc.x-P.x);
                npc.x += Math.cos(nkbA)*5;
                npc.y += Math.sin(nkbA)*5;
                for(let np=0;np<8;np++){
                  S.hitParticles.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*4+Math.cos(nkbA)*2,vy:(Math.random()-.5)*4-1,life:1,color:'#cc2233',size:1.5+Math.random()*2});
                }
                S.dmgNumbers.push({x:npc.x,y:npc.y-20,text:''+npcDmg,color:'#fff',ts:Date.now()});
                S.screenShake = 2;
                if(npc.hp <= 0){
                  npc.alive = false;
                  npc.respawnAt = Date.now() + 10000;
                  BT_AUDIO.deathBoom();
                  S.screenShake = 5;
                  const ndParts = [];
                  for(let dp=0;dp<15;dp++) ndParts.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:1,color:npc.color,size:2+Math.random()*2});
                  S.deathExplosions.push({x:npc.x,y:npc.y,ts:Date.now(),emoji:'💀',particles:ndParts});
                  S.groundLoot.push({x:npc.x,y:npc.y,coins:5,xp:20,skull:'npc',skullEmoji:'💀',ts:Date.now()});
                  S.rpg.xp += 5;
                  S.dmgNumbers.push({x:npc.x,y:npc.y-35,text:'+5XP',color:'#60a5fa',ts:Date.now()});
                }
              }
            });
          }

          /* Hit other players (PvP) — broadcast attack event */
          if(S.channel){
            const specialMult2 = S._specialAttack ? 4 : 1;
            const pvpAngle = S.lockedTarget&&S.lockedTarget.type==='player'&&S.lockedTarget.ref
              ? Math.atan2((S.lockedTarget.ref.y||S.lockedTarget.ref.renderY||P.y)-P.y,(S.lockedTarget.ref.x||S.lockedTarget.ref.renderX||P.x)-P.x)
              : baseAngle;
            S.channel.send({type:'broadcast', event:'player_attack', payload:{
              id:S.myId, x:P.x, y:P.y, angle:pvpAngle,
              dmgBase:pDmg*specialMult2, critChance:critChance,
              range:SWING_RANGE, arc:SWING_ARC, ts:Date.now()
            }});
          }
          /* Optimistic local visual — show slash effect on nearby players */
          Object.entries(S.others).forEach(([pid, o])=>{
            if(o._hitThisSwing) return;
            const oDist = Math.sqrt((o.x-P.x)**2+(o.y-P.y)**2);
            if(oDist > SWING_RANGE) return;
            const oAngle = Math.atan2(o.y-P.y, o.x-P.x);
            let aDiff = oAngle - baseAngle;
            while(aDiff > Math.PI) aDiff -= Math.PI*2;
            while(aDiff < -Math.PI) aDiff += Math.PI*2;
            if(Math.abs(aDiff) < SWING_ARC/2){
              o._hitThisSwing = true;
              BT_AUDIO.thwack();
              const pvpKbA = Math.atan2(o.y-P.y, o.x-P.x);
              for(let pp=0;pp<12;pp++) S.hitParticles.push({x:o.x+(Math.random()-.5)*6,y:o.y+(Math.random()-.5)*6,vx:Math.cos(pvpKbA+(Math.random()-.5)*1.5)*(1+Math.random()*3),vy:Math.sin(pvpKbA+(Math.random()-.5)*1.5)*(1+Math.random()*3)-1,life:1,color:['#cc2233','#aa1122'][Math.floor(Math.random()*2)],size:1.5+Math.random()*2});
              S.screenShake = 3;
              S.dmgNumbers.push({x:o.x,y:o.y-20,text:'⚔️',color:'#fff',ts:Date.now()});
            }
          });
        }
        if(Date.now()-S.swingTimer > 450) {
          S.isSwinging = false;
          S.monsters.forEach(m=>{ m._hitThisSwing=false; });
          if(S.npcs) S.npcs.forEach(n=>{ n._hitThisSwing=false; });
          Object.values(S.others).forEach(o=>{ o._hitThisSwing=false; });
        }

        /* Save RPG state periodically */
        if(!S._rpgSaveTimer) S._rpgSaveTimer=0;
        S._rpgSaveTimer++;
        if(S._rpgSaveTimer%180===0){
          try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
          if(getBtPlayerId()) btRpc('bt_sync_rpg',{p_id:getBtPlayerId(),p_coins:R.coins||0,p_xp:R.xp||0,p_hp:R.hp||50,p_level:R.level||1,p_sword_tier:R.swordTier||0});
        }
      }

      /* Pick up ground loot — walk over it */
      if(S.groundLoot){
        S.groundLoot = S.groundLoot.filter(loot=>{
          /* Expire after 60 seconds */
          if(Date.now()-loot.ts > 60000) return false;
          const lDist = Math.sqrt((P.x-loot.x)**2+(P.y-loot.y)**2);
          if(lDist < 20){
            S.rpg.xp += loot.xp;
            S.rpg.coins += loot.coins;
            if(getBtPlayerId()) btRpc('bt_sync_rpg',{p_id:getBtPlayerId(),p_coins:S.rpg.coins,p_xp:S.rpg.xp,p_hp:S.rpg.hp,p_level:S.rpg.level,p_sword_tier:S.rpg.swordTier||0});
            if(loot.skull && S.rpg.inventory) S.rpg.inventory[loot.skull] = (S.rpg.inventory[loot.skull]||0)+1;
            /* Collect skull */
            if(loot.skull){
              if(!S.rpg.skulls) S.rpg.skulls = {};
              S.rpg.skulls[loot.skull] = (S.rpg.skulls[loot.skull]||0) + 1;
            }
            S.dmgNumbers.push({x:loot.x,y:loot.y-15,text:'+'+loot.xp+'XP',color:'#60a5fa',ts:Date.now()});
            S.dmgNumbers.push({x:loot.x+12,y:loot.y-8,text:'+'+loot.coins+'G',color:'#f5c542',ts:Date.now()});
            BT_AUDIO.beep(500,0.06,0.1,'sine');
            /* Check level up — §6.2 tri-phase */
            while(S.rpg.xp >= xpRequired(S.rpg.level)){
              S.rpg.xp -= xpRequired(S.rpg.level);
              S.rpg.level++;
              S.rpg.unspentT1 = (S.rpg.unspentT1||0) + 10;
              S.rpg.unspentT2 = (S.rpg.unspentT2||0) + 10;
              S.rpg.unspentPts = S.rpg.unspentT1 + S.rpg.unspentT2;
              recalcDerived(S.rpg);
              S.rpg.hp = S.rpg.maxHp; S.rpg.stamina = S.rpg.maxStamina; S.rpg.mana = S.rpg.maxMana;
              setLevelUpMsg({level:S.rpg.level, ts:Date.now()});
              BT_AUDIO.collect();
            }
            setRpgState({...S.rpg});
            try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
            return false; /* remove loot */
          }
          return true;
