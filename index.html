        });
      }

      /* §3.2 HP regeneration — OOC: 1.5%/s after 5s no damage. Restoration scales. */
      if(S.rpg && S.lastDamageTaken && Date.now()-S.lastDamageTaken > 5000){
        const R = S.rpg;
        if(R.hp < R.maxHp){
          if(!S._regenTimer) S._regenTimer = 0;
          S._regenTimer++;
          const restMult = 1 + (R.restoration || 0) * 0.001;
          /* 1.5% max HP per second, at 60fps that's 0.025% per frame */
          if(S._regenTimer % 4 === 0){ /* ~15 times/sec */
            const healAmt = Math.max(1, Math.ceil(R.maxHp * 0.001 * restMult));
            R.hp = Math.min(R.maxHp, R.hp + healAmt);
            setRpgState({...R});
          }
        }
        /* Stamina regen — §3.3: 20/s base × Restoration */
        if(R.stamina < R.maxStamina){
          const stRestMult = 1 + (R.restoration || 0) * 0.001;
          R.stamina = Math.min(R.maxStamina, R.stamina + 20/60 * stRestMult);
        }
        /* Mana regen — §3.4: OOC 2.5%/s after 2s × Restoration */
        if(R.mana < R.maxMana && Date.now()-S.lastDamageTaken > 2000){
          const mRestMult = 1 + (R.restoration || 0) * 0.001;
          R.mana = Math.min(R.maxMana, R.mana + R.maxMana * 0.0004 * mRestMult);
        }
      } else if(S.rpg){
        /* In-combat regen — §3.2: 0.3%/s HP, stamina regens always */
        const R = S.rpg;
        if(R.hp < R.maxHp){
          if(!S._regenTimer) S._regenTimer = 0;
          S._regenTimer++;
          if(S._regenTimer % 10 === 0){
            const healAmt = Math.max(1, Math.ceil(R.maxHp * 0.0005));
            R.hp = Math.min(R.maxHp, R.hp + healAmt);
          }
        }
        /* Stamina always regens after 1s delay */
        if(R.stamina < R.maxStamina){
          R.stamina = Math.min(R.maxStamina, R.stamina + 20/60);
        }
      }

      /* Expire damage numbers */
      if(S.dmgNumbers) S.dmgNumbers = S.dmgNumbers.filter(d=>Date.now()-d.ts<1200);

      /* Camera centers player in game area */
      const camTargetX = P.x - W/2;
      const camTargetY = P.y - H/2; /* center vertically */
      S.camera.x += (camTargetX - S.camera.x) * 0.12;
      S.camera.y += (camTargetY - S.camera.y) * 0.12;
      S.camera.x = Math.max(0, Math.min(TOWN_W - W, S.camera.x));
      S.camera.y = Math.max(0, Math.min(TOWN_H - H, S.camera.y));

      /* Broadcast position ~10fps */
      const now = performance.now();
      if(now - S.lastBroadcast > 250 && (dx||dy)) {
        S.lastBroadcast = now;
        if(S.channel) {
          S.channel.send({type:'broadcast', event:'move', payload:{id:S.myId, x:P.x, y:P.y, dir:P.dir}});
          S.channel.track({x:P.x,y:P.y,name:S.myName,color:S.myColor,avatar:S.myAvatar,dir:P.dir,bt:S.bodyTorso,bl:S.bodyLegs,rpgLv:S.rpg?.level||1,rpgHp:S.rpg?.hp||50,rpgMaxHp:S.rpg?.maxHp||50,bs:S.bodySize||'slim'});
        }
      }
      /* Attack energy recharge */
      S._atkEnergy = S._atkEnergy ?? 100;
      if(S._atkEnergy < 100) S._atkEnergy = Math.min(100, S._atkEnergy + 0.5);


      /* §2.3 Shield — drains stamina while held. Block uses stamina from player resource pool. */
      if(S._shieldUp && S.rpg){
        /* Passive stamina drain while blocking: 5/sec at 60fps = ~0.083/frame */
        S.rpg.stamina = Math.max(0, (S.rpg.stamina||0) - 0.083);
        /* Also set shieldEnd for legacy code that checks Date.now() < S.shieldEnd */
        S.shieldEnd = Date.now() + 100;
        if(S.rpg.stamina <= 0){
          S.rpg.stamina = 0;
          S._shieldUp = false;
          S._shieldCdUntil = Date.now() + 3000; /* 3s cooldown when fully drained */
          S.shieldEnd = 0;
        }
        /* Update legacy _shieldStamina for ring indicator (0-3000 scale) */
        S._shieldStamina = (S.rpg.stamina / S.rpg.maxStamina) * 3000;
      } else {
        /* Stamina regens via the regen system above — just update the ring indicator */
        if(S.rpg) S._shieldStamina = ((S.rpg.stamina||0) / (S.rpg.maxStamina||100)) * 3000;
        S.shieldEnd = 0;
      }

      /* ── RENDER ── */
      /* Screen shake */
      let shakeX=0, shakeY=0;
      if(S.screenShake > 0.1){
        shakeX = (Math.random()-0.5)*S.screenShake*2;
        shakeY = (Math.random()-0.5)*S.screenShake*2;
        S.screenShake *= 0.85; /* decay */
      } else { S.screenShake = 0; }
      ctx.save();
      ctx.translate(shakeX, shakeY);
      ctx.clearRect(-10,-10,W+20,H+20);
      const cx = S.camera.x, cy = S.camera.y;

      /* Tiles */
      const startCol = Math.max(0,Math.floor(cx/TILE));
      const endCol = Math.min(COLS-1, Math.floor((cx+W)/TILE));
      const startRow = Math.max(0,Math.floor(cy/TILE));
      const endRow = Math.min(ROWS-1, Math.floor((cy+H)/TILE));

      /* Day/night cycle — based on real time */
      const hours = new Date().getHours() + new Date().getMinutes()/60;
      const isNight = hours < 6 || hours > 20;
      const isDusk = (hours >= 18 && hours <= 20) || (hours >= 5 && hours < 7);
      const nightAlpha = isNight ? 0.35 : isDusk ? 0.15 : 0;

      for(let r=startRow;r<=endRow;r++){
        for(let cl=startCol;cl<=endCol;cl++){
          const tile = map[r]?.[cl];
          if(tile===undefined) continue;
          const sx = cl*TILE - cx, sy = r*TILE - cy;

          /* Zone-tinted base colors */
          if(tile===0||tile===5){
            /* Grass — zone palette with subtle variation */
            const baseGreen = getTileColor(0, S.currentZone);
            const shade = ((cl*17+r*31)%3);
            const darken = [0, -8, 8][shade];
            ctx.fillStyle = baseGreen;
          } else if(tile===8){
            /* Zone exit — glowing portal */
            const pulse = Math.sin(now/300 + cl + r)*0.15 + 0.85;
            const exit = TOWN_EXITS.find(ex => Math.abs(ex.tx-cl)<=1 && Math.abs(ex.ty-r)<=1);
            ctx.fillStyle = exit ? exit.color : '#5b52ff';
            ctx.globalAlpha = pulse * 0.6;
            ctx.fillRect(sx-2, sy-2, TILE+5, TILE+5);
            ctx.globalAlpha = 1.0;
          } else if(tile===9){
            /* Return to town exit — green glow */
            const pulse = Math.sin(now/400 + cl)*0.2 + 0.8;
            ctx.fillStyle = '#3dd497';
            ctx.globalAlpha = pulse * 0.5;
            ctx.fillRect(sx-2, sy-2, TILE+5, TILE+5);
            ctx.globalAlpha = 1.0;
          } else {
            ctx.fillStyle = getTileColor(tile, S.currentZone);
          }
          ctx.fillRect(sx, sy, TILE+1, TILE+1);

          /* Decorations */
          if(tile===1){
            /* Path — cobblestone pattern */
            ctx.fillStyle = 'rgba(0,0,0,.06)';
            if((cl+r)%2===0){ ctx.fillRect(sx+2,sy+2,6,6); ctx.fillRect(sx+18,sy+14,8,6); }
            else { ctx.fillRect(sx+10,sy+4,8,5); ctx.fillRect(sx+4,sy+18,6,8); }
            ctx.fillStyle = 'rgba(255,255,255,.03)';
            ctx.fillRect(sx+12,sy+10,4,3);
          } else if(tile===3){
            /* Building — roof + walls + windows */
            /* Shadow underneath building */
            ctx.fillStyle = 'rgba(0,0,0,.15)';
            ctx.fillRect(sx+3, sy+3, TILE-2, TILE-2);
            /* Wall */
            ctx.fillStyle = '#4a3a5c';
            ctx.fillRect(sx, sy, TILE, TILE);
            /* Roof accent */
            ctx.fillStyle = '#3a2a4c';
            ctx.fillRect(sx, sy, TILE, 4);
            /* Brick pattern */
            ctx.strokeStyle = 'rgba(0,0,0,.12)';
            ctx.lineWidth = 0.5;
            if(r%2===0) { ctx.beginPath(); ctx.moveTo(sx,sy+TILE/2); ctx.lineTo(sx+TILE,sy+TILE/2); ctx.stroke(); }
            /* Windows — glow at night */
            if(r%2===0 && cl%2===0){
              const winGlow = isNight ? '#f5c542' : isDusk ? '#e8b830' : '#c9a020';
              ctx.fillStyle = winGlow;
              ctx.fillRect(sx+10, sy+10, 6, 8);
              ctx.fillStyle = isNight ? 'rgba(245,197,66,.3)' : 'rgba(255,255,255,.1)';
              ctx.fillRect(sx+10, sy+10, 3, 8);
              /* Window frame */
              ctx.strokeStyle = 'rgba(0,0,0,.25)';
              ctx.lineWidth = 0.5;
              ctx.strokeRect(sx+10, sy+10, 6, 8);
            }
          } else if(tile===4){
            /* Tree — shadow, trunk, two-tone canopy with sway */
            const sway = Math.sin(now/1200 + cl*3 + r*7) * 1.5;
            /* Shadow on ground */
            ctx.fillStyle = 'rgba(0,0,0,.12)';
            ctx.beginPath();
            ctx.ellipse(sx+TILE/2+3, sy+TILE/2+12, 10, 4, 0, 0, Math.PI*2);
            ctx.fill();
            /* Trunk */
            ctx.fillStyle = '#5a3a1e';
            ctx.fillRect(sx+TILE/2-2, sy+TILE/2+2, 4, 12);
            /* Dark canopy */
            ctx.fillStyle = '#0d3608';
            ctx.beginPath();
            ctx.arc(sx+TILE/2+sway, sy+TILE/2-6, 12, 0, Math.PI*2);
            ctx.fill();
            /* Light canopy */
            ctx.fillStyle = '#1a5a10';
            ctx.beginPath();
            ctx.arc(sx+TILE/2+sway-1, sy+TILE/2-7, 9, 0, Math.PI*2);
            ctx.fill();
            /* Highlight */
            ctx.fillStyle = 'rgba(100,200,80,.2)';
            ctx.beginPath();
            ctx.arc(sx+TILE/2+sway-3, sy+TILE/2-9, 5, 0, Math.PI*2);
            ctx.fill();
          } else if(tile===5){
            /* Flower — animated sway */
            const colors = ['#ff6b9d','#f5c542','#a78bfa','#fb923c','#f472b6','#60a5fa'];
            const fc = colors[(cl*7+r*13)%colors.length];
            const fsway = Math.sin(now/900 + cl*5 + r*3) * 1;
            /* Stem */
            ctx.strokeStyle = '#3a8a2a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(sx+TILE/2, sy+TILE/2+8);
            ctx.lineTo(sx+TILE/2+fsway, sy+TILE/2-2);
            ctx.stroke();
            /* Petals */
            ctx.fillStyle = fc;
            const fx = sx+TILE/2+fsway, fy = sy+TILE/2-2;
            for(let p=0;p<5;p++){
              const pa = (p/5)*Math.PI*2 + now/2000;
              ctx.beginPath();
              ctx.arc(fx+Math.cos(pa)*3, fy+Math.sin(pa)*3, 2, 0, Math.PI*2);
              ctx.fill();
            }
            /* Center */
            ctx.fillStyle = '#f5c542';
            ctx.beginPath();
            ctx.arc(fx, fy, 1.5, 0, Math.PI*2);
            ctx.fill();
          } else if(tile===2){
            /* Water — animated ripples */
            ctx.fillStyle = '#2468a0';
            ctx.fillRect(sx, sy, TILE+1, TILE+1);
            const t = now/600;
            ctx.fillStyle = 'rgba(100,180,255,.12)';
            const wx1 = Math.sin(t + cl + r*2) * 4;
            ctx.fillRect(sx+6+wx1, sy+8, 14, 2);
            ctx.fillStyle = 'rgba(255,255,255,.08)';
            const wx2 = Math.sin(t*1.3 + cl*2 + r) * 3;
            ctx.fillRect(sx+10+wx2, sy+20, 10, 1.5);
            if((cl+r*3)%7===0){
              const sparkle = Math.sin(t*2+cl)*0.5+0.5;
              ctx.fillStyle = `rgba(255,255,255,${sparkle*0.2})`;
              ctx.beginPath();
              ctx.arc(sx+TILE/2, sy+TILE/2, 1.5, 0, Math.PI*2);
              ctx.fill();
            }
          } else if(tile===6){
            /* Sand — beach texture */
            const sandShade = ((cl*13+r*17)%3);
            const sands = ['#d4b483','#c9a96e','#dfc08a'];
            ctx.fillStyle = sands[sandShade];
            ctx.fillRect(sx, sy, TILE+1, TILE+1);
            /* Sand grains */
            ctx.fillStyle = 'rgba(0,0,0,.04)';
            if((cl+r)%3===0) ctx.fillRect(sx+6,sy+10,2,1);
            if((cl*3+r*7)%5===0) ctx.fillRect(sx+18,sy+22,1,1);
            /* Shell */
            if((cl*7+r*11)%23===0){
              ctx.fillStyle = 'rgba(255,255,255,.3)';
              ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,2,0,Math.PI*2); ctx.fill();
            }
          } else if(tile===7){
            /* Stone — mountain rocks */
            const stoneShade = ((cl*11+r*7)%4);
            const stones = ['#6b6b6b','#5a5a5a','#7a7a7a','#636363'];
            ctx.fillStyle = stones[stoneShade];
            ctx.fillRect(sx, sy, TILE+1, TILE+1);
            /* Rock cracks */
            ctx.strokeStyle = 'rgba(0,0,0,.15)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(sx+5,sy+8); ctx.lineTo(sx+TILE-8,sy+TILE-6);
            ctx.stroke();
            /* Highlight */
            ctx.fillStyle = 'rgba(255,255,255,.06)';
            ctx.fillRect(sx+2,sy+2,TILE/2,TILE/3);
          }
        }
      }

      /* Ambient particles — fireflies at night, leaves during day */
      if(!S._particles) S._particles = Array.from({length:40},()=>({
        x:Math.random()*TOWN_W, y:Math.random()*TOWN_H,
        vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
        phase:Math.random()*Math.PI*2, size:Math.random()*2+1
      }));
      S._particles.forEach(p=>{
        p.x += p.vx; p.y += p.vy;
        if(p.x<0) p.x=TOWN_W; if(p.x>TOWN_W) p.x=0;
        if(p.y<0) p.y=TOWN_H; if(p.y>TOWN_H) p.y=0;
        const ppx = p.x - cx, ppy = p.y - cy;
        if(ppx<-10||ppx>W+10||ppy<-10||ppy>H+10) return;
        if(isNight){
          /* Fireflies */
          const glow = Math.sin(now/400+p.phase)*0.5+0.5;
          ctx.fillStyle = `rgba(200,255,100,${glow*0.6})`;
          ctx.beginPath();
          ctx.arc(ppx, ppy, p.size, 0, Math.PI*2);
          ctx.fill();
          /* Glow halo */
          ctx.fillStyle = `rgba(200,255,100,${glow*0.15})`;
          ctx.beginPath();
          ctx.arc(ppx, ppy, p.size*3, 0, Math.PI*2);
          ctx.fill();
        } else {
          /* Floating dust/pollen */
          const a = Math.sin(now/600+p.phase)*0.3+0.3;
          ctx.fillStyle = `rgba(255,255,200,${a})`;
          ctx.beginPath();
          ctx.arc(ppx, ppy, p.size*0.7, 0, Math.PI*2);
          ctx.fill();
        }
      });

      /* Render collectibles */
      if(S.collectibles){
        S.collectibles.forEach(item=>{
          if(item.collected) return;
          const ix = item.x - cx, iy = item.y - cy;
          if(ix < -30 || ix > W+30 || iy < -30 || iy > H+30) return;
          /* Floating bob */
          const bob = Math.sin(now/400 + item.x) * 3;
          /* Glow circle */
          ctx.fillStyle = 'rgba(245,197,66,.15)';
          ctx.beginPath();
          ctx.arc(ix, iy + bob, 12, 0, Math.PI*2);
          ctx.fill();
          /* Sparkle ring */
          const sparkleA = Math.sin(now/300 + item.y) * 0.3 + 0.5;
          ctx.strokeStyle = `rgba(245,197,66,${sparkleA})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(ix, iy + bob, 10 + Math.sin(now/500)*2, 0, Math.PI*2);
          ctx.stroke();
          /* Emoji */
          ctx.font = '16px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(item.emoji, ix, iy + bob + 5);
        });
      }

      /* Render player trail */
      if(S.trail.length > 1){
        for(let i=0;i<S.trail.length;i++){
          const t = S.trail[i];
          const age = (now - t.ts) / 800; /* 0 to 1 */
          if(age >= 1) continue;
          const tx = t.x - cx, ty = t.y - cy;
          const alpha = (1 - age) * 0.4;
          const size = (1 - age) * 4 + 1;
          ctx.fillStyle = `rgba(91,82,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(tx, ty + 8, size, 0, Math.PI*2);
          ctx.fill();
        }
      }

      /* Building signs — large prominent signboards */
      BUILDINGS.forEach((b,bi)=>{
        const bsx = (b.bx+b.bw/2)*TILE - cx;
        const bsy = b.by*TILE - cy - 6;
        if(bsx<-150||bsx>W+150||bsy<-80||bsy>H+80) return;
        const isNear = S.nearBuilding === bi;

        /* Sign board — larger, with shadow */
        ctx.font = 'bold 11px "Space Mono", monospace';
        ctx.textAlign = 'center';
        const labelText = b.label;
        const tw = ctx.measureText(labelText).width;
        const signW = Math.max(tw + 36, 70);
        const signH = 24;
        const signR = 6;
        const signY = bsy - signH - 4;

        /* Sign shadow */
        ctx.fillStyle = 'rgba(0,0,0,.25)';
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2+2, signY+2, signW, signH, signR);
        ctx.fill();

        /* Sign background */
        ctx.fillStyle = isNear ? 'rgba(91,82,255,.9)' : 'rgba(20,15,30,.85)';
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2, signY, signW, signH, signR);
        ctx.fill();

        /* Sign border */
        ctx.strokeStyle = isNear ? 'rgba(255,255,255,.5)' : 'rgba(245,197,66,.4)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2, signY, signW, signH, signR);
        ctx.stroke();

        /* Sign post — thin line from sign to building */
        ctx.strokeStyle = 'rgba(100,80,60,.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bsx, signY+signH);
        ctx.lineTo(bsx, bsy);
        ctx.stroke();

        /* Icon */
        ctx.font = '14px sans-serif';
        ctx.fillText(b.icon, bsx - tw/2 - 6, signY + signH - 6);

        /* Label text */
        ctx.font = 'bold 10px "Space Mono", monospace';
        ctx.fillStyle = isNear ? '#fff' : '#f5c542';
        ctx.fillText(labelText, bsx + 6, signY + signH - 8);

        /* "TAP TO ENTER" hint when near — pulsing */
        if(isNear && b.action){
          const pulse = Math.sin(now/300)*0.15 + 0.85;
          ctx.globalAlpha = pulse;
          ctx.fillStyle = 'rgba(91,82,255,.7)';
          ctx.beginPath();
          ctx.roundRect(bsx-40, signY+signH+6, 80, 16, 4);
          ctx.fill();
          ctx.font = 'bold 8px sans-serif';
          ctx.fillStyle = '#fff';
          ctx.fillText('TAP TO ENTER', bsx, signY+signH+17);
          ctx.globalAlpha = 1;
        }
      });

      /* ═══ ZONE EXIT LABELS — show where paths lead ═══ */
      if(S.currentZone === 'town'){
        TOWN_EXITS.forEach(ex => {
          let lx, ly;
          if(ex.dir==='north'){ lx=ex.tx*TILE+TILE-cx; ly=TILE*1.5-cy; }
          if(ex.dir==='south'){ lx=ex.tx*TILE+TILE-cx; ly=(ZONES.town.h-2)*TILE-cy; }
          if(ex.dir==='east'){ lx=(ZONES.town.w-2)*TILE-cx; ly=ex.ty*TILE+TILE-cy; }
          if(ex.dir==='west'){ lx=TILE*2-cx; ly=ex.ty*TILE+TILE-cy; }
          if(lx<-80||lx>W+80||ly<-30||ly>H+30) return;
          /* Glowing label */
          ctx.font = 'bold 9px "Space Mono", monospace';
          ctx.textAlign = 'center';
          const pulse = Math.sin(now/500)*0.2+0.8;
          ctx.fillStyle = ex.color;
          ctx.globalAlpha = pulse;
          ctx.fillText(ex.label, lx, ly);
          ctx.globalAlpha = 1;
          /* Element icon */
          const elem = ZONES[ex.zoneId]?.element;
          if(elem){
            const lvl = ZONES[ex.zoneId].level;
            ctx.font = '7px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,.5)';
            ctx.fillText('Lv'+lvl[0]+'-'+lvl[1], lx, ly+10);
          }
        });
      } else {
        /* In combat zones — show return exits */
        const zone = ZONES[S.currentZone];
        const zW = zone.w, zH = zone.h;
        const retExits = [
          {x:0, y:Math.floor(zH/2), label:'← Town'},
          {x:zW-1, y:Math.floor(zH/2), label:'Town →'},
          {x:Math.floor(zW/2), y:0, label:'Town ↑'},
          {x:Math.floor(zW/2), y:zH-1, label:'Town ↓'},
        ];
        retExits.forEach(re => {
          if(S.map[re.y]?.[re.x] !== 9) return;
          const lx = re.x*TILE+TILE/2-cx, ly = re.y*TILE+TILE/2-cy;
          if(lx<-60||lx>W+60||ly<-20||ly>H+20) return;
          ctx.font = 'bold 8px "Space Mono", monospace';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#3dd497';
          ctx.globalAlpha = Math.sin(now/400)*0.2+0.8;
          ctx.fillText(re.label, lx, ly-4);
          ctx.globalAlpha = 1;
        });
      }

      /* Draw other players — lerp positions + walk bob */
      Object.values(S.others).forEach(o => {
        o.renderX += (o.x - o.renderX) * ANIM_LERP;
        o.renderY += (o.y - o.renderY) * ANIM_LERP;
        const oMoving = Math.abs(o.x - (o._prevX||o.x)) > 0.1 || Math.abs(o.y - (o._prevY||o.y)) > 0.1;
        o._prevX = o.x; o._prevY = o.y;
        const oBob = oMoving ? Math.sin(now/120) * 2 : 0;
        const ox = o.renderX - cx, oy = o.renderY - cy + oBob;
        if(ox < -40 || ox > W+40 || oy < -40 || oy > H+40) return;

        /* Other player shadow */
        ctx.fillStyle = 'rgba(0,0,0,.15)';
        ctx.beginPath();
        ctx.ellipse(ox, oy+20, 9, 3.5, 0, 0, Math.PI*2);
        ctx.fill();

        /* Facing direction — 4-way with hysteresis */
        const oDx = o.x - (o._facePrevX||o.x);
        const oDy = o.y - (o._facePrevY||o.y);
        o._facePrevX = o.x; o._facePrevY = o.y;
        const oAdx = Math.abs(oDx), oAdy = Math.abs(oDy);
        const oWasUD = o._facing === 'up' || o._facing === 'down';
        const oVB = oWasUD ? 1.3 : 0.7;
        if(oAdx > 0.03 || oAdy > 0.03){
          if(oAdy > oAdx * oVB) o._facing = oDy > 0 ? 'down' : 'up';
          else if(oAdx > oAdy * (oWasUD ? 0.7 : 1.3)) o._facing = oDx > 0 ? 'right' : 'left';
        }
        const oDir = o._facing || 'down';
        const oFlip = oDir === 'right';
        const oSide = oDir === 'left' || oDir === 'right';

        /* Other player body — simple fillRect */
        const oBS = o.bodySize === 'armored' ? 'armored' : 'slim';
        const otw = oBS==='slim'?16:24, oth=16;
        const oaw = oBS==='slim'?3:5, oah2 = oBS==='slim'?14:15;
        const olw = oBS==='slim'?6:8, olh=10, olg=oBS==='slim'?2:3;
        const osw = oBS==='slim'?7:10, osh=oBS==='slim'?4:4.5;
        const ohw = oBS==='slim'?2.5:3, ohh=3;
        const oHR = oBS==='slim'?12:14;

        ctx.save();
        ctx.translate(ox, oy + oAnimBob);

        if(oSide){
          if(oDir === 'left') ctx.scale(-1, 1);
          ctx.globalAlpha = 0.55;
          ctx.save(); ctx.translate(0, 8); ctx.rotate(-oSwing);
          ctx.fillStyle = oTC; ctx.fillRect(-oaw/2, 0, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-ohw/2, oah2-2, ohw, ohh);
          ctx.restore();
          ctx.save(); ctx.translate(0, 18); ctx.rotate(oSwing);
          ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 0, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh-2, osw, osh);
          ctx.restore();
          ctx.globalAlpha = 1;
          ctx.fillStyle = oTC; ctx.fillRect(-otw/2+1, 3, otw-2, 16);
          ctx.save(); ctx.translate(0, 8); ctx.rotate(oSwing);
          ctx.fillStyle = oTC; ctx.fillRect(-oaw/2, 0, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-ohw/2, oah2-2, ohw, ohh);
          ctx.restore();
          ctx.save(); ctx.translate(0, 18); ctx.rotate(-oSwing);
          ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 0, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh-2, osw, osh);
          ctx.restore();
        } else {
          const oLS2 = oMoving ? Math.sin(oFp)*1.2 : 0;
          const oRS2 = oMoving ? Math.sin(oFp+Math.PI)*1.2 : 0;
          ctx.fillStyle = oTC; ctx.fillRect(-(otw/2+oaw), 5+oRS2, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-(otw/2+oaw)+0.5, 5+oah2-1+oRS2, ohw, ohh);
          ctx.fillStyle = oLC; ctx.fillRect(-(olg/2+olw), 13+oLS2, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-(olg/2+olw)-0.5, 13+olh-2+oLS2, osw, osh);
          ctx.fillStyle = oTC; ctx.fillRect(-otw/2, 4, otw, oth);
          ctx.fillStyle = oLC; ctx.fillRect(olg/2, 13+oRS2, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(olg/2-0.5, 13+olh-2+oRS2, osw, osh);
          ctx.fillStyle = oTC; ctx.fillRect(otw/2, 5+oLS2, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(otw/2+0.5, 5+oah2-1+oLS2, ohw, ohh);
        }

        ctx.restore();

        /* Other player default head */
        ctx.fillStyle = '#f0c68a';
        ctx.beginPath(); ctx.arc(ox, oy-6+oAnimBob, oHR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#3b2414';
        ctx.beginPath(); ctx.arc(ox, oy-8+oAnimBob, oHR, Math.PI, Math.PI*2); ctx.fill();

        /* Other player avatar head — overrides default */
        if(o.avatar){
          const img = loadAvatarImg(o.avatar);
          const ready = img instanceof HTMLCanvasElement ? img.width>0 : (img.complete && img.naturalWidth);
          if(ready){
            ctx.save();
            if(oFlip){ ctx.translate(ox, 0); ctx.scale(-1, 1); ctx.translate(-ox, 0); }
            ctx.beginPath(); ctx.arc(ox, oy-6+oAnimBob, oHR, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(img, ox-oHR, oy-6-oHR+oAnimBob, oHR*2, oHR*2);
            ctx.restore();
          }
        }
        /* Name tag */
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,.6)';
        const ntw = ctx.measureText(o.name).width;
        ctx.fillRect(ox-ntw/2-3, oy-22, ntw+6, 12);
        ctx.fillStyle = o.color;
        ctx.fillText(o.name, ox, oy-13);
        /* Other player HP bar + level */
        if(o.rpgLv){
          const oBarW=20, oBarH=2.5, oBarY=oy-24+oAnimBob;
          const oHpPct = (o.rpgHp||50)/(o.rpgMaxHp||50);
          ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(ox-oBarW/2,oBarY,oBarW,oBarH);
          ctx.fillStyle=oHpPct>0.5?'#3dd497':oHpPct>0.25?'#f5c542':'#ff5e6c';
          ctx.fillRect(ox-oBarW/2,oBarY,oBarW*oHpPct,oBarH);
          ctx.font='bold 6px sans-serif'; ctx.textAlign='center';
          ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillText('Lv'+o.rpgLv,ox,oBarY-1);
        }
        /* Other player badges */
        if(o.badges && o.badges.length > 0){
          ctx.font = '7px sans-serif';
          const oBadgeStr = o.badges.map(bid=>{const a=BT_ACHIEVEMENTS.find(x=>x.id===bid);return a?a.icon:'';}).join('');
          ctx.fillText(oBadgeStr, ox, oy-30);
        }
      });

      /* ═══ ARROW PROJECTILES ═══ */
      /* ═══ ARROWS — travel along LOS, follow aim direction ═══ */
      if(S.arrows && S.arrows.length > 0){
        /* Determine current aim angle for LOS tracking */
        let curAim;
        if(S.lockedTarget && S.lockedTarget.ref){
          const lt2 = S.lockedTarget.ref;
          curAim = Math.atan2((lt2.y||0)-P.y, (lt2.x||0)-P.x);
        } else if(S._aiming){
          curAim = S._aimAngle || 0;
        } else {
          const fd2 = S._facing||'down';
          curAim = fd2==='right'?0:fd2==='up'?-Math.PI/2:fd2==='left'?Math.PI:Math.PI/2;
        }
        S.arrows = S.arrows.filter(a=>{
          a.dist += 8;
          a.life--;
          /* Projectiles follow the active LOS while aiming */
          if(S._aiming || (S.lockedTarget && S.lockedTarget.ref)) a.ang = curAim;
          /* Position = player + angle × distance */
          const ax2 = P.x + Math.cos(a.ang)*a.dist;
          const ay2 = P.y + Math.sin(a.ang)*a.dist;
          if(a.life <= 0) return false;
          /* Hit detection */
          let hit = false;
          if(S.monsters) S.monsters.forEach(m=>{
            if(!m.alive || a.hitIds.has(m.id) || hit) return;
            if(Math.sqrt((m.x-ax2)**2+(m.y-ay2)**2) < 18){
              a.hitIds.add(m.id);

              /* §9 — Apply element status on arrow hit */
              const arrowElem = a.isSpecial ? activeWpn?.element2 : activeWpn?.element1;
              if(arrowElem){
                const statusId = ELEMENTS[arrowElem]?.status;
                if(statusId) applyStatus(m, statusId, S.player, Date.now());
              }

              /* §10.3 — Check for collision */
              let arrowCollision = null;
              if(arrowElem && S.rpg){
                arrowCollision = resolveCollision(m, arrowElem, S.player, S.rpg, Date.now());
              }

              m.curHp -= a.dmg;

              /* Collision damage + feedback on arrow hit */
              if(arrowCollision){
                m.curHp -= arrowCollision.damage;
                const coll = arrowCollision.collision;
                const elemCol = ELEMENTS[arrowCollision.triggerElement]?.color || '#fff';
                S.dmgNumbers.push({x:m.x+8,y:m.y-30,text:'💥'+arrowCollision.damage+' '+coll.name,color:elemCol,ts:Date.now()});
                if(arrowCollision.manaRestored > 0){
                  S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+arrowCollision.manaRestored+' MP',color:'#3b82f6',ts:Date.now()});
                }
                BT_AUDIO.collisionSound(arrowCollision.setupElement, arrowCollision.triggerElement, arrowCollision.manaRestored);
                for(let cp=0;cp<12;cp++){
                  S.hitParticles.push({x:m.x+(Math.random()-0.5)*6,y:m.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-2,life:0.7,color:elemCol,size:2+Math.random()*2});
                }
                S.screenShake = Math.max(S.screenShake, 4);
                BT_AUDIO.beep(400, 0.1, 0.12, 'sine');
                const isNew = discoverCollision(coll.id);
                if(isNew){
                  S.dmgNumbers.push({x:P.x,y:P.y-60,text:'📖 NEW: '+coll.name+'!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                }
              }

              BT_AUDIO.thwack();
              const kba = Math.atan2(m.y-ay2, m.x-ax2);
              m.x += Math.cos(kba)*5; m.y += Math.sin(kba)*5;
              if(!S.dmgNumbers) S.dmgNumbers=[];
              S.dmgNumbers.push({x:m.x,y:m.y-10,text:a.dmg+'',color:'#ff9',ts:Date.now()});
              /* Kill check */
              if(m.curHp <= 0){
                m.alive = false;
                if(S.rpg){
                  btRpc('bt_monster_kill',{p_id:getBtPlayerId(),p_type:m.type});
                  S.rpg.coins += m.coins||2;
                  S.rpg.xp += m.xp||10;
                  while(S.rpg.xp >= xpRequired(S.rpg.level)){S.rpg.xp-=xpRequired(S.rpg.level);S.rpg.level++;S.rpg.unspentT1=(S.rpg.unspentT1||0)+10;S.rpg.unspentT2=(S.rpg.unspentT2||0)+10;S.rpg.unspentPts=S.rpg.unspentT1+S.rpg.unspentT2;recalcDerived(S.rpg);}
                  btRpc('bt_sync_rpg',{p_id:getBtPlayerId(),p_coins:S.rpg.coins,p_xp:S.rpg.xp,p_hp:S.rpg.hp,p_level:S.rpg.level,p_sword_tier:S.rpg.swordTier||0});
                }
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'☠️ KILL!',color:'#ff5e6c',ts:Date.now()});
                m.respawnAt = Date.now() + 30000;
                S._atkEnergy = Math.min(100, (S._atkEnergy||100) + 25);
              }
              hit = true;
            }
          });
          if(hit) return false;
          /* Render arrow */
          const sx = ax2-cx, sy = ay2-cy;
          const fadeA = Math.min(1, a.life/20);
          ctx.save(); ctx.translate(sx, sy); ctx.rotate(a.ang);
          ctx.globalAlpha = fadeA;
          if(a.ice){
            /* Ice arrow — LARGE glowing */
            ctx.shadowColor='rgba(100,200,255,.8)';ctx.shadowBlur=15;
            ctx.fillStyle = 'rgba(100,200,255,.9)'; ctx.fillRect(-16, -4, 32, 8);
            ctx.fillStyle = 'rgba(200,240,255,.9)';
            ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(8,-5); ctx.lineTo(8,5); ctx.closePath(); ctx.fill();
            ctx.shadowColor='rgba(100,200,255,.6)'; ctx.shadowBlur=8;
            ctx.fillStyle='rgba(150,220,255,.3)'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
          } else {
            ctx.fillStyle = '#8B6914'; ctx.fillRect(-8, -1.5, 16, 3);
            ctx.fillStyle = '#c8c8d0';
            ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(5,-3.5); ctx.lineTo(5,3.5); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#aa4444'; ctx.fillRect(-8, -2.5, 3, 1.5); ctx.fillRect(-8, 1, 3, 1.5);
          }
          ctx.globalAlpha = 1;
          ctx.restore();
          return true;
        });
      }

      /* ═══ LOCK-ON INDICATOR ═══ */
      if(S.lockedTarget && S.lockedTarget.ref){
        const lt = S.lockedTarget.ref;
        const ltx = (lt.x||lt.renderX||0) - cx;
        const lty = (lt.y||lt.renderY||0) - cy;
        const lockT = Date.now()/500;
        const lockR = 18 + Math.sin(lockT*2)*3;
        ctx.save();
        ctx.strokeStyle = 'rgba(255,60,60,0.8)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4,4]);
        ctx.lineDashOffset = -Date.now()/50;
        ctx.beginPath();
        ctx.arc(ltx, lty, lockR, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
        /* Corner brackets */
        const bsz = 6;
        ctx.strokeStyle = 'rgba(255,60,60,0.9)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ltx-lockR, lty-lockR+bsz); ctx.lineTo(ltx-lockR, lty-lockR); ctx.lineTo(ltx-lockR+bsz, lty-lockR);
        ctx.moveTo(ltx+lockR-bsz, lty-lockR); ctx.lineTo(ltx+lockR, lty-lockR); ctx.lineTo(ltx+lockR, lty-lockR+bsz);
        ctx.moveTo(ltx+lockR, lty+lockR-bsz); ctx.lineTo(ltx+lockR, lty+lockR); ctx.lineTo(ltx+lockR-bsz, lty+lockR);
        ctx.moveTo(ltx-lockR+bsz, lty+lockR); ctx.lineTo(ltx-lockR, lty+lockR); ctx.lineTo(ltx-lockR, lty+lockR-bsz);
        ctx.stroke();
        /* Target name */
        const ltName = lt.name || lt.type || lt.emoji || '?';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,60,60,0.7)';
        ctx.fillText('🎯 '+ltName, ltx, lty-lockR-4);
        ctx.restore();
      }

      /* ═══ RENDER MONSTERS ═══ */
      if(S.monsters){
        S.monsters.forEach(m=>{
          if(!m.alive) return;
          const mx = m.x - cx, my = m.y - cy;
          if(mx<-40||mx>W+40||my<-40||my>H+40) return;
          const arch = m.archetype || 'fodder';

          /* §Creative Vision: Enemy variety — different sizes and shapes per archetype */
          const bodySize = {fodder:8, brute:15, swarm:6, sentinel:12, volatile:9, stalker:10, hexer:10}[arch]||10;
          const bodyShape = arch; /* used for distinct rendering */

          /* Shadow — scales with body */
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath(); ctx.ellipse(mx, my+bodySize+2, bodySize*0.8, 3, 0, 0, Math.PI*2); ctx.fill();

          /* Body — distinct shape per archetype */
          ctx.fillStyle = m.color;
          if(arch === 'brute'){
            /* Brute: big rounded square, menacing */
            ctx.beginPath();
            ctx.moveTo(mx-bodySize, my-bodySize*0.8);
            ctx.quadraticCurveTo(mx, my-bodySize*1.1, mx+bodySize, my-bodySize*0.8);
            ctx.lineTo(mx+bodySize*0.9, my+bodySize*0.7);
            ctx.quadraticCurveTo(mx, my+bodySize*0.9, mx-bodySize*0.9, my+bodySize*0.7);
            ctx.closePath(); ctx.fill();
          } else if(arch === 'swarm'){
            /* Swarm: tiny oval, fluttery */
            const flutter = Math.sin(now/60+m.id?.charCodeAt(2)||0)*2;
            ctx.beginPath(); ctx.ellipse(mx, my+flutter, bodySize, bodySize*0.7, 0, 0, Math.PI*2); ctx.fill();
            /* Wings */
            ctx.fillStyle = m.color+'88';
            ctx.beginPath(); ctx.ellipse(mx-bodySize, my-3+flutter, 4, 2, -0.3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(mx+bodySize, my-3+flutter, 4, 2, 0.3, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'sentinel'){
            /* Sentinel: angular shield shape */
            ctx.beginPath();
            ctx.moveTo(mx, my-bodySize);
            ctx.lineTo(mx+bodySize, my-bodySize*0.3);
            ctx.lineTo(mx+bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx-bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx-bodySize, my-bodySize*0.3);
            ctx.closePath(); ctx.fill();
          } else if(arch === 'volatile'){
            /* Volatile: spiky/jagged */
            ctx.beginPath();
            for(let sp=0;sp<8;sp++){
              const spA = (sp/8)*Math.PI*2;
              const spR = sp%2===0 ? bodySize*1.2 : bodySize*0.6;
              const spx = mx+Math.cos(spA)*spR, spy = my+Math.sin(spA)*spR;
              sp===0 ? ctx.moveTo(spx,spy) : ctx.lineTo(spx,spy);
            }
            ctx.closePath(); ctx.fill();
            /* Pulsing danger glow */
            ctx.fillStyle = m.color+'33';
            const volatilePulse = 1+Math.sin(now/200)*0.3;
            ctx.beginPath(); ctx.arc(mx, my, bodySize*volatilePulse, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'stalker'){
            /* Stalker: narrow diamond, sleek */
            ctx.beginPath();
            ctx.moveTo(mx, my-bodySize*1.2);
            ctx.lineTo(mx+bodySize*0.6, my);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx-bodySize*0.6, my);
            ctx.closePath(); ctx.fill();
          } else if(arch === 'hexer'){
            /* Hexer: floating circle with rune orbit */
            ctx.beginPath(); ctx.arc(mx, my, bodySize, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = m.color+'77';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(mx, my, bodySize+4, now/300, now/300+Math.PI*1.5); ctx.stroke();
          } else {
            /* Fodder: simple circle (default) */
            ctx.beginPath(); ctx.arc(mx, my, bodySize, 0, Math.PI*2); ctx.fill();
          }

          /* Element indicator on monster body */
          if(m.element && ELEMENTS[m.element]){
            ctx.fillStyle = ELEMENTS[m.element].color+'66';
            ctx.beginPath(); ctx.arc(mx, my-bodySize-2, 3, 0, Math.PI*2); ctx.fill();
          }

          /* Emoji face — centered on body */
          ctx.font = (bodySize > 12 ? 18 : bodySize > 8 ? 14 : 10) + 'px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(m.emoji, mx, my+(bodySize>12?6:bodySize>8?5:3));

          /* Stun indicator on monster */
          if(m._stunUntil && Date.now() < m._stunUntil){
            const mStunLeft = ((m._stunUntil-Date.now())/1000).toFixed(1);
            ctx.font = '12px sans-serif';
            for(let ms=0;ms<3;ms++){
              const msa = Date.now()/150 + ms*Math.PI*2/3;
              ctx.fillText('💫', mx+Math.cos(msa)*14, my-bodySize-8+Math.sin(msa)*3);
            }
            ctx.font = 'bold 8px sans-serif';
            ctx.fillStyle = '#f5c542';
            ctx.fillText('STUN '+mStunLeft+'s', mx, my-bodySize-18);
          }
          /* HP bar */
          /* §9 Status visual effects on monster body */
          if(m.statuses){
            if(m.statuses.freeze){
              ctx.fillStyle = 'rgba(41,128,185,.3)';
              ctx.beginPath(); ctx.arc(mx, my, 16, 0, Math.PI*2); ctx.fill();
              /* Ice crystals */
              ctx.fillStyle = 'rgba(200,230,255,.5)';
              for(let ic=0;ic<3;ic++){
                const ica = now/200 + ic*2.1;
                ctx.fillRect(mx+Math.cos(ica)*12-1, my+Math.sin(ica)*12-1, 3, 3);
              }
            }
            if(m.statuses.burn){
              ctx.fillStyle = 'rgba(192,57,43,.2)';
              ctx.beginPath(); ctx.arc(mx, my, 14+Math.sin(now/100)*2, 0, Math.PI*2); ctx.fill();
              /* Flame flickers */
              for(let fl=0;fl<2;fl++){
                const fla = now/120 + fl*3.14;
                ctx.fillStyle = `rgba(255,${100+Math.random()*80},0,${0.3+Math.random()*0.3})`;
                ctx.beginPath(); ctx.arc(mx+Math.cos(fla)*10, my-8+Math.sin(fla)*4, 2+Math.random(), 0, Math.PI*2); ctx.fill();
              }
            }
            if(m.statuses.root){
              ctx.strokeStyle = 'rgba(39,174,96,.4)';
              ctx.lineWidth = 2;
              for(let rv=0;rv<3;rv++){
                const rva = rv*2.1;
                ctx.beginPath();
                ctx.moveTo(mx+Math.cos(rva)*6, my+10);
                ctx.lineTo(mx+Math.cos(rva)*14, my+14);
                ctx.stroke();
              }
            }
            if(m.statuses.soak){
              ctx.fillStyle = 'rgba(52,152,219,.15)';
              ctx.beginPath(); ctx.arc(mx, my, 15, 0, Math.PI*2); ctx.fill();
              /* Water drips */
              ctx.fillStyle = 'rgba(52,152,219,.4)';
              const dripY = (now/300) % 20;
              ctx.fillRect(mx-1, my+8+dripY, 2, 3);
            }
            if(m.statuses.shock){
              /* Crackling electricity */
              ctx.strokeStyle = `rgba(142,68,173,${0.4+Math.random()*0.4})`;
              ctx.lineWidth = 1;
              for(let sp=0;sp<2;sp++){
                ctx.beginPath();
                ctx.moveTo(mx+(Math.random()-0.5)*20, my+(Math.random()-0.5)*20);
                ctx.lineTo(mx+(Math.random()-0.5)*20, my+(Math.random()-0.5)*20);
                ctx.stroke();
              }
            }
            if(m.statuses.slow){
              ctx.strokeStyle = 'rgba(127,140,141,.3)';
              ctx.lineWidth = 2;
              ctx.setLineDash([3,3]);
              ctx.beginPath(); ctx.arc(mx, my, 14, 0, Math.PI*2); ctx.stroke();
              ctx.setLineDash([]);
            }
            if(m.statuses.curse){
              ctx.fillStyle = `rgba(44,62,80,${0.2+Math.sin(now/400)*0.1})`;
              ctx.beginPath(); ctx.arc(mx, my, 16, 0, Math.PI*2); ctx.fill();
            }
            if(m.statuses.fracture){
              /* Crack lines */
              ctx.strokeStyle = 'rgba(121,85,72,.5)';
              ctx.lineWidth = 1;
              const stacks = m.statuses.fracture.stacks||1;
              for(let fc=0;fc<stacks;fc++){
                const fca = fc * 1.26;
                ctx.beginPath();
                ctx.moveTo(mx, my);
                ctx.lineTo(mx+Math.cos(fca)*12, my+Math.sin(fca)*12);
                ctx.stroke();
              }
            }
            if(m.statuses.reveal){
              ctx.strokeStyle = 'rgba(241,196,15,.4)';
              ctx.lineWidth = 1.5;
              const revPulse = Math.sin(now/250)*3;
              ctx.beginPath(); ctx.arc(mx, my, 14+revPulse, 0, Math.PI*2); ctx.stroke();
            }
          }
          /* Legacy frozen/slowed visuals — kept for backward compat */
          if(m._frozen && Date.now()<m._frozen && !m.statuses?.freeze){
            ctx.fillStyle = 'rgba(100,200,255,.25)';
            ctx.beginPath(); ctx.arc(mx, my, 16, 0, Math.PI*2); ctx.fill();
          } else if(m._slowed && Date.now()<m._slowed){
            ctx.strokeStyle = 'rgba(100,200,255,.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([3,3]);
            ctx.beginPath(); ctx.arc(mx, my, 14, 0, Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
          }
          const hpPct = Math.max(0, m.curHp / m.hp);
          ctx.fillStyle = 'rgba(0,0,0,.6)';
          ctx.fillRect(mx-12, my-18, 24, 4);
          ctx.fillStyle = hpPct > 0.5 ? '#3dd497' : hpPct > 0.25 ? '#f5c542' : '#ff5e6c';
          ctx.fillRect(mx-12, my-18, 24*hpPct, 4);
          /* Level indicator */
          ctx.font = 'bold 7px sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,.6)';
          ctx.fillText('Lv'+(m.level||1), mx, my-21);

          /* §9 — Status effect icons above monster */
          if(m.statuses){
            const statusList = Object.entries(m.statuses);
            if(statusList.length > 0){
              const iconY = my - 28;
              const iconSpacing = 12;
              const startX = mx - (statusList.length - 1) * iconSpacing / 2;
              statusList.forEach(([sid, st], si) => {
                const elem = st.element;
                if(!elem) return;
                const edef = ELEMENTS[elem];
                if(!edef) return;
                const ix = startX + si * iconSpacing;
                /* Icon background pulse */
                const pulse = Math.sin(now/300 + si)*0.2 + 0.8;
                ctx.globalAlpha = pulse;
                /* Element colored dot */
                ctx.fillStyle = edef.color;
                ctx.beginPath();
                ctx.arc(ix, iconY, 4, 0, Math.PI*2);
                ctx.fill();
                /* Shape indicator */
                ctx.fillStyle = '#fff';
                ctx.font = '6px sans-serif';
                ctx.fillText(sid.charAt(0).toUpperCase(), ix, iconY+2);
                /* Duration bar */
                const durPct = st.remaining / (st.maxDur || 1);
                ctx.fillStyle = edef.color;
                ctx.globalAlpha = 0.6;
                ctx.fillRect(ix-4, iconY+5, 8*durPct, 1.5);
                /* Stacks (for Fracture) */
                if(st.stacks > 1){
                  ctx.globalAlpha = 1;
                  ctx.fillStyle = '#fff';
                  ctx.font = 'bold 5px sans-serif';
                  ctx.fillText('×'+st.stacks, ix+5, iconY);
                }
                ctx.globalAlpha = 1;
              });
            }
          }
        });
      }

      /* ═══ RENDER CAMPFIRES ═══ */
      if(S._campfires){
        S._campfires = S._campfires.filter(cf=>{
          if(Date.now()-cf.ts > 60000) return false; /* 60s burn time */
          const cfx=cf.x-cx, cfy=cf.y-cy;
          if(cfx<-30||cfx>W+30||cfy<-30||cfy>H+30) return true;
          const cfAge = (Date.now()-cf.ts)/1000;
          const flicker = Math.sin(now/80)*0.3+0.7;
          /* Glow */
          ctx.fillStyle = `rgba(234,88,12,${0.15*flicker})`;
          ctx.beginPath(); ctx.arc(cfx, cfy, 18, 0, Math.PI*2); ctx.fill();
          /* Fire base */
          ctx.fillStyle = '#5a3a1e';
          ctx.fillRect(cfx-6, cfy+2, 12, 4);
          /* Flames */
          ctx.fillStyle = `rgba(245,160,30,${flicker*0.8})`;
          ctx.beginPath(); ctx.moveTo(cfx-5,cfy+2); ctx.lineTo(cfx,cfy-8-Math.sin(now/100)*3); ctx.lineTo(cfx+5,cfy+2); ctx.fill();
          ctx.fillStyle = `rgba(255,80,20,${flicker*0.6})`;
          ctx.beginPath(); ctx.moveTo(cfx-3,cfy+1); ctx.lineTo(cfx+1,cfy-5-Math.sin(now/80)*2); ctx.lineTo(cfx+4,cfy+1); ctx.fill();
          /* Smoke */
          if(cfAge > 40){
            ctx.fillStyle = `rgba(100,100,100,${0.3*(1-(cfAge-40)/20)})`;
            ctx.beginPath(); ctx.arc(cfx+Math.sin(now/200)*3, cfy-12-Math.sin(now/300)*5, 4, 0, Math.PI*2); ctx.fill();
          }
          /* Timer text */
          const remaining = Math.max(0, 60-cfAge);
          ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
          ctx.fillStyle='rgba(255,255,255,.4)';
          ctx.fillText(Math.ceil(remaining)+'s', cfx, cfy+14);
          return true;
        });
      }

      /* ═══ RENDER GROUND LOOT ═══ */
      if(S.groundLoot){
        S.groundLoot.forEach(loot=>{
          const lx = loot.x-cx, ly = loot.y-cy;
          if(lx<-30||lx>W+30||ly<-30||ly>H+30) return;
          const age = (Date.now()-loot.ts)/1000;
          const bob = Math.sin(age*3)*2;
          const fadeOut = age > 50 ? 1-(age-50)/10 : 1;
          ctx.globalAlpha = fadeOut;

          /* Rare loot has special glow */
          if(loot.rare){
            ctx.fillStyle = 'rgba(245,197,66,.25)';
            ctx.beginPath(); ctx.arc(lx, ly+bob, 16, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = `rgba(245,197,66,${0.4+Math.sin(age*4)*0.3})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(lx, ly+bob, 14, 0, Math.PI*2); ctx.stroke();
          }
          /* Gold coins base — glowing circle */
          ctx.fillStyle = 'rgba(245,197,66,.3)';
          ctx.beginPath(); ctx.arc(lx, ly+bob, 10, 0, Math.PI*2); ctx.fill();
          /* Coin stack */
          ctx.fillStyle = '#f5c542';
          ctx.beginPath(); ctx.arc(lx-3, ly+2+bob, 4, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#e8b830';
          ctx.beginPath(); ctx.arc(lx+2, ly+3+bob, 3.5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#d4a020';
          ctx.beginPath(); ctx.arc(lx, ly+4+bob, 3, 0, Math.PI*2); ctx.fill();
          /* Coin text */
          ctx.font = 'bold 7px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#f5c542';
          ctx.fillText(loot.coins+'G', lx, ly+14+bob);

          /* Skull on top */
          ctx.font = '12px sans-serif';
          ctx.fillText(loot.skullEmoji, lx, ly-6+bob);

          /* XP sparkle */
          ctx.fillStyle = 'rgba(96,165,250,.4)';
          const sparkX = lx + Math.sin(age*5)*6;
          const sparkY = ly - 2 + Math.cos(age*4)*4 + bob;
          ctx.beginPath(); ctx.arc(sparkX, sparkY, 2, 0, Math.PI*2); ctx.fill();

          ctx.globalAlpha = 1;
        });
      }

      /* ═══ HIT PARTICLES (blood/sparks) ═══ */
      if(S.hitParticles){
        S.hitParticles = S.hitParticles.filter(p=>{
          p.x += p.vx; p.y += p.vy; p.vy += 0.15; /* gravity */
          p.life -= 0.04;
          if(p.life <= 0) return false;
          const ppx = p.x-cx+shakeX, ppy = p.y-cy+shakeY;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(ppx, ppy, p.size*p.life, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;
          return true;
        });
      }

      /* ═══ DEATH EXPLOSIONS — §Creative Vision §8: Whimsical, not devastating ═══ */
      if(S.deathExplosions){
        S.deathExplosions = S.deathExplosions.filter(exp=>{
          const age = (Date.now()-exp.ts)/1000;
          const maxAge = exp.isGrandSlam ? 2.5 : 1.5;
          if(age > maxAge) return false;
          const scale = exp.killScale || 1;
          /* Animate particles */
          exp.particles.forEach(p=>{
            p.x += p.vx; p.y += p.vy; p.vy += 0.10;
            p.vx *= 0.96; p.life -= (exp.isGrandSlam ? 0.018 : 0.025);
            if(p.life <= 0) return;
            const epx = p.x-cx+shakeX, epy = p.y-cy+shakeY;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(epx, epy, p.size*p.life, 0, Math.PI*2); ctx.fill();
          });
          const ex = exp.x-cx+shakeX, ey = exp.y-cy+shakeY;

          /* Flash ring — scaled for Grand Slam */
          const flashDur = exp.isGrandSlam ? 0.5 : 0.3;
          if(age < flashDur){
            const flashProg = age/flashDur;
            ctx.globalAlpha = 1-flashProg;
            if(exp.isGrandSlam){
              ctx.fillStyle = `rgba(245,197,66,${0.3*(1-flashProg)})`;
              ctx.beginPath(); ctx.arc(ex, ey, flashProg*80*scale, 0, Math.PI*2); ctx.fill();
              ctx.strokeStyle = '#fbbf24';
              ctx.lineWidth = Math.max(0.5, 4-flashProg*6);
            } else {
              ctx.strokeStyle = '#fff';
              ctx.lineWidth = Math.max(0.5, 3-flashProg*8);
            }
            ctx.beginPath(); ctx.arc(ex, ey, flashProg*60*scale, 0, Math.PI*2); ctx.stroke();
          }

          /* §8 Whimsical death — "comical pile" of parts flying out */
          /* Emoji limbs scatter from death point like ragdoll */
          if(!exp._limbsSpawned){
            exp._limbsSpawned = true;
            const limbEmojis = ['🦴','💀','👁️','🦷','🫀'];
            exp._limbs = limbEmojis.slice(0, exp.isGrandSlam ? 5 : 3).map((le,li) => ({
              emoji: le,
              x: exp.x, y: exp.y,
              vx: (Math.random()-0.5)*8 * scale,
              vy: -3 - Math.random()*5 * scale,
              rot: Math.random()*6 - 3,
              rotSpd: (Math.random()-0.5)*0.3,
              bounce: 0,
            }));
          }

          /* Animate limbs — bones bounce and settle */
          if(exp._limbs){
            exp._limbs.forEach(limb => {
              limb.x += limb.vx;
              limb.y += limb.vy;
              limb.vy += 0.25; /* gravity */
              limb.rot += limb.rotSpd;
              limb.vx *= 0.97;
              /* Ground bounce */
              if(limb.y > exp.y + 15 && limb.vy > 0){
                limb.vy *= -0.4;
                limb.vx *= 0.7;
                limb.bounce++;
              }
              if(limb.bounce < 3){
                const lx = limb.x - cx + shakeX;
                const ly = limb.y - cy + shakeY;
                ctx.save();
                ctx.translate(lx, ly);
                ctx.rotate(limb.rot);
                ctx.globalAlpha = Math.max(0, 1 - age/(maxAge*0.8));
                ctx.font = `${10+2*scale}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(limb.emoji, 0, 0);
                ctx.restore();
              }
            });
          }

          /* Main emoji rises + fades */
          if(age < flashDur + 0.5){
            ctx.globalAlpha = Math.max(0, 1 - (age - flashDur*0.5));
            ctx.font = (14 + 6*scale - age*20)+'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(exp.emoji, ex, ey - age*50*scale);
          }

          /* Grand Slam text — "GRAND SLAM!" rises dramatically */
          if(exp.isGrandSlam && age < 1.5){
            ctx.globalAlpha = Math.max(0, 1 - age/1.5);
            ctx.font = `bold ${14+4*scale}px "VT323", monospace`;
            ctx.fillStyle = '#fbbf24';
            ctx.textAlign = 'center';
            ctx.fillText('GRAND SLAM!', ex, ey - 40 - age*30);
          }

          ctx.globalAlpha = 1;
          return true;
        });
      }

      /* ═══ RENDER DAMAGE NUMBERS — §2 Sensory Proportionality ═══ */
      if(S.dmgNumbers){
        S.dmgNumbers.forEach(d=>{
          const age = (Date.now()-d.ts)/1200;
          if(age >= 1) return;

          /* Categorize for proportional rendering */
          const isCollision = d.text.includes('💥');
          const isGrandSlam = d.text.includes('GRAND');
          const isXP = d.text.includes('XP');
          const isGold = d.text.includes('G') && d.text.includes('+');
          const isMana = d.text.includes('MP');
          const isHeal = d.text.includes('Used') || d.text.includes('Buff');
          const isCodex = d.text.includes('📖');
          const isStatus = d.text.includes('STUN') || d.text.includes('mana');
          const isShield = d.text.includes('🛡️');
          const isPlayerDmg = d.color === '#ff5e6c' && d.text.startsWith('-');

          /* Size scales with significance */
          let fontSize = 11;
          let riseSpeed = 25;
          let sway = 0;
          if(isCollision) { fontSize = 14; riseSpeed = 35; }
          if(isGrandSlam) { fontSize = 18; riseSpeed = 40; }
          if(isXP || isGold) { fontSize = 9; riseSpeed = 20; sway = Math.sin(age*8)*3; }
          if(isMana) { fontSize = 10; riseSpeed = 30; }
          if(isCodex) { fontSize = 11; riseSpeed = 15; }
          if(isPlayerDmg) { fontSize = 13; riseSpeed = 30; }
          if(isShield) { fontSize = 10; }

          /* Entrance pop — numbers start slightly bigger then settle */
          const pop = age < 0.15 ? 1 + (0.15-age)*3 : 1;

          const dnx = d.x-cx + sway, dny = d.y-cy - age*riseSpeed;
          ctx.globalAlpha = Math.max(0, 1 - age*age); /* ease-out fade */
          ctx.font = `bold ${Math.round(fontSize*pop)}px "VT323", monospace`;
          ctx.textAlign = 'center';
          /* Shadow */
          ctx.fillStyle = 'rgba(0,0,0,.6)';
          ctx.fillText(d.text, dnx+1, dny+1);
          /* Main text */
          ctx.fillStyle = d.color;
          ctx.fillText(d.text, dnx, dny);
          /* Collision glow */
          if(isCollision || isGrandSlam){
            ctx.shadowColor = d.color;
            ctx.shadowBlur = 8;
            ctx.fillText(d.text, dnx, dny);
            ctx.shadowBlur = 0;
          }
          ctx.globalAlpha = 1;
        });
      }

      /* Draw local player — with walk bob */
      const isMoving = Math.abs(dx)>0.01 || Math.abs(dy)>0.01;
      const bobY = isMoving ? Math.sin(now/120) * 2 : 0;
      const bobScale = isMoving ? 1 + Math.sin(now/120+Math.PI/2) * 0.03 : 1;
      const px = P.x - cx, py = P.y - cy + bobY;
      /* Footstep sound — throttled */
      if(isMoving){
        if(!S._footstepTimer) S._footstepTimer = 0;
        S._footstepTimer++;
        if(S._footstepTimer % 12 === 0) BT_AUDIO.footstep();
        /* Track steps for stats */
        if(S.stats && S._footstepTimer % 6 === 0) S.stats.steps++;
      }
      /* Footstep dust puffs */
      if(isMoving){
        if(!S._dustPuffs) S._dustPuffs = [];
        if(Math.random() < 0.3){
          S._dustPuffs.push({
            x: px + (Math.random()-0.5)*8,
            y: py + 14 + Math.random()*4,
            vx: (Math.random()-0.5)*0.5 - dx*0.3,
            vy: -Math.random()*0.5 - 0.2,
            life: 1, decay: 0.03 + Math.random()*0.02
          });
        }
      }
      if(S._dustPuffs){
        S._dustPuffs = S._dustPuffs.filter(d=>{
          d.x += d.vx; d.y += d.vy; d.life -= d.decay;
          if(d.life <= 0) return false;
          ctx.fillStyle = `rgba(180,170,140,${d.life*0.4})`;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.life*3, 0, Math.PI*2);
          ctx.fill();
          return true;
        });
      }

      /* Player shadow */
      ctx.fillStyle = 'rgba(0,0,0,.18)';
      ctx.beginPath();
      ctx.ellipse(px, py+24, _slim?10:14, 4, 0, 0, Math.PI*2);
      ctx.fill();

      /* Facing direction */
      const absDx = Math.abs(dx), absDy = Math.abs(dy);
      const wasUpDown = S._facing === 'up' || S._facing === 'down';
      const vertBias = wasUpDown ? 1.3 : 0.7;
      if(absDx > 0.03 || absDy > 0.03){
        if(absDy > absDx * vertBias) S._facing = dy > 0 ? 'down' : 'up';
        else if(absDx > absDy * (wasUpDown ? 0.7 : 1.3)) S._facing = dx > 0 ? 'right' : 'left';
      }
      const dir = S._facing || 'down';
      const flipAvatar = dir === 'right';
      const isSide = dir === 'left' || dir === 'right';

      /* Animation */
      const fp = now / 80;
      const swingAngle = isMoving ? Math.sin(fp) * 0.5 : 0;
      const animBob = isMoving ? Math.abs(Math.sin(fp)) * 2.5 : 0;
      const tColor = S.bodyTorso || '#2563eb';
      const lColor = S.bodyLegs || '#1e3a5f';

      /* Body size: slim=36x12, armored=36x16 */
      const _slim = S.bodySize !== 'armored';
      const tw=_slim?16:24, aw=_slim?3:5, ah=_slim?14:15;
      const lw=_slim?6:8, lh=10, lg=_slim?2:3;
      const sw2=_slim?7:10, sh2=_slim?4:4.5;
      const hR=_slim?12:14;

      ctx.save();
      ctx.translate(px, py + animBob);

      if(isSide){
        if(dir === 'left') ctx.scale(-1, 1);
        /* Back arm+leg (darker) */
        ctx.globalAlpha = 0.55;
        ctx.save(); ctx.translate(0, 8); ctx.rotate(-swingAngle);
        ctx.fillStyle = tColor; ctx.fillRect(-aw/2, 0, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(-1.5, ah-2, 2.5, 3);
        ctx.restore();
        ctx.save(); ctx.translate(0, 18); ctx.rotate(swingAngle);
        ctx.fillStyle = lColor; ctx.fillRect(-lw/2, 0, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-sw2/2, lh-2, sw2, sh2);
        ctx.restore();
        ctx.globalAlpha = 1;
        /* Torso */
        ctx.fillStyle = tColor; ctx.fillRect(-tw/2+1, 3, tw-2, 16);
        /* Front arm+leg */
        ctx.save(); ctx.translate(0, 8); ctx.rotate(swingAngle);
        ctx.fillStyle = tColor; ctx.fillRect(-aw/2, 0, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(-1.5, ah-2, 2.5, 3);
        ctx.restore();
        ctx.save(); ctx.translate(0, 18); ctx.rotate(-swingAngle);
        ctx.fillStyle = lColor; ctx.fillRect(-lw/2, 0, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-sw2/2, lh-2, sw2, sh2);
        ctx.restore();
      } else {
        const lSl = isMoving ? Math.sin(fp)*1.5 : 0;
        const rSl = isMoving ? Math.sin(fp+Math.PI)*1.5 : 0;
        /* Left arm */
        ctx.fillStyle = tColor; ctx.fillRect(-(tw/2+aw), 8+rSl, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(-(tw/2+aw)+0.5, 8+ah-1+rSl, 3, 3);
        /* Left leg */
        ctx.fillStyle = lColor; ctx.fillRect(-(lg/2+lw), 18+lSl, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-(lg/2+lw)-0.5, 18+lh-2+lSl, sw2, sh2);
        /* Torso */
        ctx.fillStyle = tColor; ctx.fillRect(-tw/2, 3, tw, 16);
        /* Right leg */
        ctx.fillStyle = lColor; ctx.fillRect(lg/2, 18+rSl, lw, lh);
        ctx.fillStyle = '#2a1a0e'; ctx.fillRect(lg/2-0.5, 18+lh-2+rSl, sw2, sh2);
        /* Right arm */
        ctx.fillStyle = tColor; ctx.fillRect(tw/2, 8+lSl, aw, ah);
        ctx.fillStyle = '#f0c68a'; ctx.fillRect(tw/2+0.5, 8+ah-1+lSl, 3, 3);
        /* Eyes (front only) */
        if(dir === 'down'){
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(-3, -10, 2, 0, Math.PI*2); ctx.arc(3, -10, 2, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#1a1a2e';
          ctx.beginPath(); ctx.arc(-2.5, -9.5, 1.1, 0, Math.PI*2); ctx.arc(3.5, -9.5, 1.1, 0, Math.PI*2); ctx.fill();
        }
      }
      ctx.restore();

      /* §4 Visual Identity — Weapon visual on player */
      if(S.rpg){
        const wpn = getActiveWeapon(S.rpg);
        const wpnDef = WEAPON_TYPES[wpn.type];
        const wpnAngle = S._aimAngle != null ? S._aimAngle : 
          (dir==='right'?0:dir==='up'?-Math.PI/2:dir==='left'?Math.PI:Math.PI/2);
        const wpnLen = wpn.type==='greatsword'?20:wpn.type==='sword'?14:wpn.type==='bow'?12:10;
        const wpnX = px + Math.cos(wpnAngle)*8;
        const wpnY = py + animBob + Math.sin(wpnAngle)*8;

        ctx.save();
        ctx.translate(wpnX, wpnY);
        ctx.rotate(wpnAngle + Math.PI/4);

        if(wpn.type === 'bow'){
          /* Bow — curved arc */
          ctx.strokeStyle = '#8B6914';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, wpnLen, -0.8, 0.8);
          ctx.stroke();
          /* String */
          ctx.strokeStyle = '#ddd';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(Math.cos(-0.8)*wpnLen, Math.sin(-0.8)*wpnLen);
          ctx.lineTo(Math.cos(0.8)*wpnLen, Math.sin(0.8)*wpnLen);
          ctx.stroke();
        } else if(wpn.type === 'staff'){
          /* Staff — thin pole with orb */
          ctx.fillStyle = '#6b4423';
          ctx.fillRect(-1, -wpnLen, 2.5, wpnLen);
          ctx.fillStyle = wpn.element1 ? ELEMENTS[wpn.element1].color : '#a78bfa';
          ctx.beginPath(); ctx.arc(0, -wpnLen, 3, 0, Math.PI*2); ctx.fill();
        } else {
          /* Sword/Greatsword — blade */
          ctx.fillStyle = '#c0c0c0';
          ctx.fillRect(-1.5, -wpnLen, 3, wpnLen);
          /* Guard */
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(-4, -2, 8, 3);
          /* Grip */
          ctx.fillStyle = '#4a2e0a';
          ctx.fillRect(-1.5, 0, 3, 5);
        }

        /* Element glow on weapon */
        if(wpn.element1){
          const e1col = ELEMENTS[wpn.element1]?.color || '#fff';
          ctx.shadowColor = e1col;
          ctx.shadowBlur = 6;
          ctx.strokeStyle = e1col;
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.4 + Math.sin(now/300)*0.2;
          if(wpn.type==='bow'){
            ctx.beginPath(); ctx.arc(0, 0, wpnLen+1, -0.8, 0.8); ctx.stroke();
          } else {
            ctx.strokeRect(-2, -wpnLen-1, 4, wpnLen+2);
          }
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;
        }
        /* Volatile crackling boundary */
        if(wpn.isVolatile && wpn.element1 && wpn.element2){
          const e2col = ELEMENTS[wpn.element2]?.color || '#fff';
          ctx.strokeStyle = e2col;
          ctx.lineWidth = 0.8;
          ctx.globalAlpha = 0.3 + Math.random()*0.3;
          for(let vc=0;vc<3;vc++){
            const vy = -wpnLen*Math.random();
            ctx.beginPath();
            ctx.moveTo(-2+Math.random()*4, vy);
            ctx.lineTo(-2+Math.random()*4, vy+3+Math.random()*4);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }

      /* Head */
      ctx.fillStyle = '#f0c68a';
      ctx.beginPath(); ctx.arc(px, py-6+animBob, hR, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3b2414';
      ctx.beginPath(); ctx.arc(px, py-8+animBob, hR, Math.PI, Math.PI*2); ctx.fill();
      /* Avatar override */
      if(S.myAvatar){
        const img = loadAvatarImg(S.myAvatar);
        const ready = img instanceof HTMLCanvasElement ? img.width>0 : (img.complete && img.naturalWidth);
        if(ready){
          ctx.save();
          if(flipAvatar){ ctx.translate(px, 0); ctx.scale(-1, 1); ctx.translate(-px, 0); }
          ctx.beginPath(); ctx.arc(px, py-6+animBob, hR, 0, Math.PI*2); ctx.clip();
          ctx.drawImage(img, px-hR, py-6-hR+animBob, hR*2, hR*2);
          ctx.restore();
        }
      }
            /* Own name */
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,0,0,.65)';
      const myNtw = ctx.measureText(S.myName).width;
      ctx.fillRect(px-myNtw/2-4, py-28, myNtw+8, 14);
      ctx.fillStyle = '#fff';
      ctx.fillText(S.myName, px, py-17);
      /* Own badges below name */
      if(S.badges && S.badges.length > 0){
        ctx.font = '8px sans-serif';
        const badgeStr = S.badges.map(bid=>{const a=BT_ACHIEVEMENTS.find(x=>x.id===bid);return a?a.icon:'';}).join('');
        ctx.fillText(badgeStr, px, py-33);
      }

      /* ═══ SHIELD ARC HUD ═══ */
      if(S._shieldUp){
        const shieldAng = S._shieldAngle !== undefined ? S._shieldAngle : (S._aimAngle || (()=>{
          const fd=S._facing||'down';
          return fd==='right'?0:fd==='up'?-Math.PI/2:fd==='left'?Math.PI:Math.PI/2;
        })();
        ctx.save();
        ctx.strokeStyle = 'rgba(96,165,250,.5)';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.shadowColor = 'rgba(96,165,250,.4)';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(px, py+8, 22, shieldAng-0.8, shieldAng+0.8);
        ctx.stroke();
        /* Inner glow */
        ctx.strokeStyle = 'rgba(150,200,255,.3)';
        ctx.lineWidth = 8;
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(px, py+8, 20, shieldAng-0.6, shieldAng+0.6);
        ctx.stroke();
        ctx.restore();
      }
      } /* end sword render (weapon !== bow) */

      /* ═══ BOW AIM LINE — LOS extends across screen ═══ */
      if(S.weapon === 'bow' && S.autoAttack){
        let aimA;
        if(S.lockedTarget && S.lockedTarget.ref){
          const lt3 = S.lockedTarget.ref;
          aimA = Math.atan2((lt3.y||0)-P.y, (lt3.x||0)-P.x);
        } else if(S._aiming){
          aimA = S._aimAngle || 0;
        } else {
          const fd3 = S._facing||'down';
          aimA = fd3==='right'?0:fd3==='up'?-Math.PI/2:fd3==='left'?Math.PI:Math.PI/2;
        }
        const isAiming = S._aiming || (S.lockedTarget && S.lockedTarget.ref);
        const losAlpha = isAiming ? 0.5 : 0.2;
        ctx.save();
        /* Long dashed LOS line */
        ctx.beginPath();
        ctx.moveTo(px, py+14);
        ctx.lineTo(px + Math.cos(aimA)*W*2, py+10 + Math.sin(aimA)*W*2);
        ctx.strokeStyle = 'rgba(255,255,255,'+losAlpha*0.4+')';
        ctx.lineWidth = 2;
        ctx.setLineDash([12,12]);
        ctx.lineDashOffset = -(Date.now()/15)%24;
        ctx.stroke();
        ctx.setLineDash([]);
        /* Shorter solid aim arrow */
        const aimLen = isAiming ? 50 : 30;
        ctx.beginPath();
        ctx.moveTo(px, py+14);
        ctx.lineTo(px + Math.cos(aimA)*aimLen, py+14 + Math.sin(aimA)*aimLen);
        ctx.strokeStyle = 'rgba(255,255,255,'+losAlpha+')';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([5,5]);
        ctx.stroke();
        ctx.setLineDash([]);
        /* Carat/chevron at aim tip */
        const cTip = aimLen + 8;
        const cX = px + Math.cos(aimA)*cTip, cY = py+10 + Math.sin(aimA)*cTip;
        ctx.fillStyle = 'rgba(255,255,255,'+losAlpha+')';
        ctx.beginPath();
        ctx.moveTo(cX + Math.cos(aimA)*6, cY + Math.sin(aimA)*6);
        ctx.lineTo(cX + Math.cos(aimA+2.5)*8, cY + Math.sin(aimA+2.5)*8);
        ctx.lineTo(cX + Math.cos(aimA-2.5)*8, cY + Math.sin(aimA-2.5)*8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      /* ═══ SWORD — longsword held by character + swing ═══ */
      if(S.weapon !== 'bow'){
        let baseA;
        if(S.lockedTarget && S.lockedTarget.ref){
          const lt = S.lockedTarget.ref;
          baseA = Math.atan2((lt.y||lt.renderY||P.y)-P.y, (lt.x||lt.renderX||P.x)-P.x);
        } else if(S._aiming && S._aimAngle != null){
          baseA = S._aimAngle;
        } else {
          const swDir = S._facing||'down';
          baseA = swDir==='right'?0:swDir==='up'?-Math.PI/2:swDir==='left'?Math.PI:Math.PI/2;
        }
        const bladeLen = 38;
        const hiltLen = 8;
        const bpy = py + animBob + 12; /* torso level */

        if(S.isSwinging){
          const swAge = (Date.now()-S.swingTimer)/250;
          if(swAge < 1){
            /* Swing: blade sweeps through the arc */
            const curA = baseA - SWING_ARC/2 + swAge*SWING_ARC;
            const tipX = px+Math.cos(curA)*bladeLen;
            const tipY = bpy+Math.sin(curA)*bladeLen;
            const hiltX = px+Math.cos(curA)*hiltLen;
            const hiltY = bpy+Math.sin(curA)*hiltLen;
            const perpA = curA+Math.PI/2;

            ctx.save();
            /* §Creative Vision Stage 2-3: Element glow on weapon swing */
            const swingElem = S._specialAttack ? activeWpn.element2 : activeWpn.element1;
            const hasElemGlow = !!swingElem;
            if(hasElemGlow){
              const elemColor = ELEMENTS[swingElem]?.color || '#fff';
              const elem2Color = activeWpn.element2 ? ELEMENTS[activeWpn.element2]?.color : null;
              /* Element aura around swing area */
              ctx.save();
              ctx.shadowColor = elemColor; ctx.shadowBlur = 16;
              ctx.fillStyle = elemColor.replace(')', ',.15)').replace('rgb','rgba');
              ctx.beginPath(); ctx.arc(px, bpy, bladeLen*1.4, 0, Math.PI*2); ctx.fill();
              ctx.restore();
              /* Volatile crackle for fusion weapons */
              if(activeWpn.isVolatile && activeWpn.element1 && activeWpn.element2){
                const e1c = ELEMENTS[activeWpn.element1]?.color||'#fff';
                const e2c = ELEMENTS[activeWpn.element2]?.color||'#fff';
                for(let vc=0;vc<3;vc++){
                  const vcA = (Date.now()/150+vc*2.1)%(Math.PI*2);
                  const vcR = bladeLen*0.7+Math.sin(Date.now()/80+vc)*8;
                  ctx.fillStyle = vc%2===0 ? e1c : e2c;
                  ctx.globalAlpha = 0.5+Math.random()*0.3;
                  ctx.beginPath();ctx.arc(px+Math.cos(vcA)*vcR,bpy+Math.sin(vcA)*vcR,2+Math.random(),0,Math.PI*2);ctx.fill();
                }
                ctx.globalAlpha = 1;
              }
            } else if(S._specialAttack){
              /* No element = raw power glow (golden) */
              ctx.fillStyle = 'rgba(245,197,66,0.15)';
              ctx.beginPath(); ctx.arc(px, bpy, bladeLen*1.3, 0, Math.PI*2); ctx.fill();
            }
            /* Motion blur trail */
            const trailA = curA - 0.3;
            ctx.globalAlpha = (1-swAge)*0.25;
            ctx.fillStyle = 'rgba(200,200,220,0.3)';
            ctx.beginPath();
            ctx.moveTo(px, bpy);
            ctx.arc(px, bpy, bladeLen, Math.min(trailA, curA), Math.max(trailA, curA));
            ctx.closePath();
            ctx.fill();

            /* Blade — element-tinted steel */
            ctx.globalAlpha = 1;
            const bladeColor = hasElemGlow ? ELEMENTS[swingElem].color : '#c8c8d0';
            const bladeTint = hasElemGlow ? bladeColor : '#c8c8d0';
            ctx.fillStyle = bladeTint;
            if(hasElemGlow){ ctx.shadowColor=bladeColor; ctx.shadowBlur=10; }
            else { ctx.shadowColor = '#fff'; ctx.shadowBlur = 4; }
            ctx.beginPath();
            ctx.moveTo(hiltX+Math.cos(perpA)*3, hiltY+Math.sin(perpA)*3);
            ctx.lineTo(hiltX-Math.cos(perpA)*3, hiltY-Math.sin(perpA)*3);
            ctx.lineTo(tipX-Math.cos(perpA)*1.2, tipY-Math.sin(perpA)*1.2);
            ctx.lineTo(tipX+Math.cos(curA)*3, tipY+Math.sin(curA)*3); /* sharp tip */
            ctx.lineTo(tipX+Math.cos(perpA)*1.2, tipY+Math.sin(perpA)*1.2);
            ctx.closePath();
            ctx.fill();
            /* Blade edge highlight */
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(hiltX+Math.cos(perpA)*2.5, hiltY+Math.sin(perpA)*2.5);
            ctx.lineTo(tipX+Math.cos(curA)*2, tipY+Math.sin(curA)*2);
            ctx.stroke();
            /* Fuller (groove) */
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            const midBlade = 0.5;
            ctx.moveTo(hiltX+Math.cos(curA)*5, hiltY+Math.sin(curA)*5);
            ctx.lineTo(tipX-Math.cos(curA)*8, tipY-Math.sin(curA)*8);
            ctx.stroke();

            /* Crossguard */
            const cgX = hiltX, cgY = hiltY;
            ctx.strokeStyle = '#8B6914';
            ctx.lineWidth = 3.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cgX+Math.cos(perpA)*7, cgY+Math.sin(perpA)*7);
            ctx.lineTo(cgX-Math.cos(perpA)*7, cgY-Math.sin(perpA)*7);
            ctx.stroke();
            /* Grip */
            ctx.strokeStyle = '#5a3a1e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(px+Math.cos(curA)*3, bpy+Math.sin(curA)*3);
            ctx.lineTo(hiltX, hiltY);
            ctx.stroke();
            /* Pommel */
            ctx.fillStyle = '#8B6914';
            ctx.beginPath();
            ctx.arc(px+Math.cos(curA)*3, bpy+Math.sin(curA)*3, 2.5, 0, Math.PI*2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.restore();
          }
        } else {
          /* Idle — sword resting at character's side */
          const restA = baseA + 0.5;
          /* Bow sprite when equipped */
          if(S.weapon === 'bow'){
            ctx.save();
            ctx.translate(px, bpy);
            ctx.rotate(baseA);
            ctx.strokeStyle = '#8B6914';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(10, 0, 12, -0.8, 0.8);
            ctx.stroke();
            /* Bowstring */
            ctx.strokeStyle = 'rgba(255,255,255,.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(10+Math.cos(-0.8)*12, Math.sin(-0.8)*12);
            ctx.lineTo(10+Math.cos(0.8)*12, Math.sin(0.8)*12);
            ctx.stroke();
            ctx.restore();
          } /* angled slightly from facing direction */
          const restLen = bladeLen * 0.7;
          const tipX = px+Math.cos(restA)*restLen;
          const tipY = bpy+Math.sin(restA)*restLen;
          const hiltX = px+Math.cos(restA)*6;
          const hiltY = bpy+Math.sin(restA)*6;
          const perpA = restA+Math.PI/2;

          ctx.save();
          ctx.globalAlpha = 0.7;
          /* Blade */
          ctx.fillStyle = '#b0b0b8';
          ctx.beginPath();
          ctx.moveTo(hiltX+Math.cos(perpA)*2, hiltY+Math.sin(perpA)*2);
          ctx.lineTo(hiltX-Math.cos(perpA)*2, hiltY-Math.sin(perpA)*2);
          ctx.lineTo(tipX-Math.cos(perpA)*0.8, tipY-Math.sin(perpA)*0.8);
          ctx.lineTo(tipX+Math.cos(restA)*2, tipY+Math.sin(restA)*2);
          ctx.lineTo(tipX+Math.cos(perpA)*0.8, tipY+Math.sin(perpA)*0.8);
          ctx.closePath();
          ctx.fill();
          /* Crossguard */
          ctx.strokeStyle = '#6a4a10';
          ctx.lineWidth = 2.5;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(hiltX+Math.cos(perpA)*5, hiltY+Math.sin(perpA)*5);
          ctx.lineTo(hiltX-Math.cos(perpA)*5, hiltY-Math.sin(perpA)*5);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.restore();
        }
      }

      /* ═══ OWN RESOURCE BARS — HP / STAMINA / MANA / XP ═══ */
      if(S.rpg){
        const barW = 28, barH = 3, barY = py+32+animBob;
        const R = S.rpg;

        /* HP bar */
        const hpPct = R.hp / R.maxHp;
        ctx.fillStyle = 'rgba(0,0,0,.5)';
        ctx.fillRect(px-barW/2, barY, barW, barH);
        ctx.fillStyle = hpPct>0.5?'#3dd497':hpPct>0.25?'#f5c542':'#ff5e6c';
        ctx.fillRect(px-barW/2, barY, barW*hpPct, barH);

        /* Stamina bar */
        const stPct = (R.stamina||0) / (R.maxStamina||100);
        ctx.fillStyle = 'rgba(0,0,0,.4)';
        ctx.fillRect(px-barW/2, barY+barH+1, barW, 2);
        ctx.fillStyle = stPct>0.5?'#f5c542':stPct>0.25?'#ea580c':'#ff5e6c';
        ctx.fillRect(px-barW/2, barY+barH+1, barW*stPct, 2);

        /* Mana bar */
        const mpPct = (R.mana||0) / (R.maxMana||80);
        ctx.fillStyle = 'rgba(0,0,0,.4)';
        ctx.fillRect(px-barW/2, barY+barH+4, barW, 2);
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(px-barW/2, barY+barH+4, barW*mpPct, 2);

        /* XP bar */
        const xpPct = R.xp / xpRequired(R.level);
        ctx.fillStyle = 'rgba(0,0,0,.3)';
        ctx.fillRect(px-barW/2, barY+barH+7, barW, 1.5);
        ctx.fillStyle = '#a78bfa';
        ctx.fillRect(px-barW/2, barY+barH+7, barW*xpPct, 1.5);

        /* Level text */
        ctx.font = 'bold 7px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.fillText('Lv'+R.level, px, barY-1);

        /* Invuln indicator */
        if(Date.now() < S.respawnTimer){
          ctx.fillStyle = 'rgba(91,82,255,.2)';
          ctx.beginPath(); ctx.arc(px, py+animBob, 20, 0, Math.PI*2); ctx.fill();
        }
        }
        /* Shield active — pulsing blue hexagonal barrier */
        if(Date.now() < S.shieldEnd){
          const shAge = (S.shieldEnd - Date.now()) / 2000;
          const shPulse = Math.sin(Date.now()/80)*0.15 + 0.85;
          ctx.save();
          ctx.globalAlpha = shAge * shPulse * 0.6;
          ctx.strokeStyle = '#60a5fa';
          ctx.lineWidth = 2.5;
          ctx.shadowColor = '#60a5fa';
          ctx.shadowBlur = 10;
          /* Hexagon */
          ctx.beginPath();
          for(let h=0;h<6;h++){
            const ha = h*Math.PI/3 - Math.PI/6 + Date.now()/800;
            const hx = px + Math.cos(ha)*22;
            const hy = py + animBob + Math.sin(ha)*22;
            if(h===0) ctx.moveTo(hx,hy); else ctx.lineTo(hx,hy);
          }
          ctx.closePath();
          ctx.stroke();
          /* Inner glow fill */
          ctx.fillStyle = `rgba(96,165,250,${shAge*0.12})`;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
          ctx.restore();
        }
        /* Stunned indicator — obvious with countdown */
        if(playerStunned){
          const stunLeft = Math.max(0, ((S._playerStunUntil||0)-Date.now())/1000);
          /* Dark overlay on character */
          ctx.fillStyle = 'rgba(0,0,0,.3)';
          ctx.beginPath(); ctx.arc(px, py+animBob, 18, 0, Math.PI*2); ctx.fill();
          /* Spinning stars — larger */
          ctx.font = '14px sans-serif';
          ctx.textAlign = 'center';
          const stunSpin = Date.now()/150;
          for(let s=0;s<4;s++){
            const sa = stunSpin + s*Math.PI*2/4;
            ctx.fillText('💫', px+Math.cos(sa)*18, py-22+animBob+Math.sin(sa)*5);
          }
          /* STUNNED text + countdown */
          ctx.font = 'bold 10px sans-serif';
          ctx.fillStyle = '#f5c542';
          ctx.fillText('STUNNED '+stunLeft.toFixed(1)+'s', px, py-36+animBob);
        }
      /* ── Chat bubbles above all players ── */
      const drawBubble = (bx, by, text) => {
        ctx.font = '11px sans-serif';
        const maxW = 140;
        /* Word wrap */
        const words = text.split(' ');
        const lines = [];
        let line = '';
        words.forEach(w => {
          const test = line ? line + ' ' + w : w;
          if(ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
          else line = test;
        });
        if(line) lines.push(line);
        if(lines.length > 3) { lines.length = 3; lines[2] = lines[2].slice(0,-3) + '...'; }

        const lineH = 14;
        const pad = 8;
        const bw = Math.min(maxW + pad*2, Math.max(...lines.map(l => ctx.measureText(l).width)) + pad*2);
        const bh = lines.length * lineH + pad*2;
        const tipH = 6;
        const bubbleY = by - 36 - bh;
