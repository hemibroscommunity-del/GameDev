        /* Bubble background */
        ctx.fillStyle = 'rgba(255,255,255,.92)';
        ctx.beginPath();
        const r = 8;
        const x1 = bx - bw/2, y1 = bubbleY, x2 = bx + bw/2, y2 = bubbleY + bh;
        ctx.moveTo(x1+r, y1);
        ctx.lineTo(x2-r, y1); ctx.arcTo(x2,y1,x2,y1+r,r);
        ctx.lineTo(x2, y2-r); ctx.arcTo(x2,y2,x2-r,y2,r);
        /* Tip */
        ctx.lineTo(bx+5, y2); ctx.lineTo(bx, y2+tipH); ctx.lineTo(bx-5, y2);
        ctx.lineTo(x1+r, y2); ctx.arcTo(x1,y2,x1,y2-r,r);
        ctx.lineTo(x1, y1+r); ctx.arcTo(x1,y1,x1+r,y1,r);
        ctx.fill();

        /* Text */
        ctx.fillStyle = '#1a1428';
        ctx.textAlign = 'center';

        const alpha = Math.min(1, (5000 - (bubbleNow - myBubble.ts)) / 500);
        ctx.globalAlpha = alpha;
        drawBubble(px, py, myBubble.text);
        ctx.globalAlpha = 1;
      } else if(myBubble && bubbleNow - myBubble.ts >= 5000) {

          ctx.globalAlpha = alpha;
          drawBubble(osx, osy, bubble.text);

        } else if(t===6){

        } else if(t===7){

            <button onClick={async()=>{

              /* Pre-set RPG so game loop finds it */
              const S = stateRef.current;
              S._serverLoadStarted = true;
              if(regResult && regResult.rpg){
                const sr = regResult.rpg;
                S.rpg = {level:sr.level,xp:sr.xp,hp:sr.hp,maxHp:sr.max_hp,str:sr.str,def:sr.def,vit:sr.vit,spd:sr.spd,lck:sr.lck,coins:sr.coins,swordTier:sr.sword_tier,unspentPts:sr.unspent_pts,inventory:{},skills:{woodcutting:1,woodcuttingXp:0,fishing:1,fishingXp:0,cooking:1,cookingXp:0}};

              setShowLogin(false);

              const data = await btRpc('bt_load_player', {p_id:pid});
              if(!data || !data.player){
                setLoginError('No account found for this passphrase');
                setLoginLoading(false);
                return;
              }
              /* Success — save passphrase and restore ALL state */
              localStorage.setItem('bt_passphrase', loginPassphrase.trim());
              const S = stateRef.current;
              /* Restore profile into stateRef */
              if(data.player){
                S.myName = data.player.name || 'Anon';
                S.myColor = data.player.color || '#5b52ff';
                S.myAvatar = data.player.avatar || null;
                S.bodyTorso = data.player.body_torso || '#2563eb';
                S.bodyLegs = data.player.body_legs || '#1e3a5f';
                S.myBroData = data.player.bro_data || null;
                localStorage.setItem('bt_player', JSON.stringify({
                  name:S.myName, avatar:S.myAvatar, color:S.myColor,
                  bodyTorso:S.bodyTorso, bodyLegs:S.bodyLegs, bro:S.myBroData
                }));
              }
              /* Restore RPG stats into stateRef */
              if(data.rpg){
                const sr = data.rpg;
                const inv = {};
                if(data.inventory) data.inventory.forEach(i=>{ inv[i.item_key]=i.quantity; });
                const sk = {};
                if(data.skills) data.skills.forEach(s=>{ sk[s.skill_key]=s.level; sk[s.skill_key+'Xp']=s.xp; });
                S.rpg = {
                  level:sr.level, xp:sr.xp, hp:sr.hp, maxHp:sr.max_hp,
                  str:sr.str, def:sr.def, vit:sr.vit, spd:sr.spd, lck:sr.lck,
                  coins:sr.coins, swordTier:sr.sword_tier, unspentPts:sr.unspent_pts,
                  inventory:inv, skills:sk
                };
                localStorage.setItem('bt_rpg', JSON.stringify(S.rpg));
                setRpgState({...S.rpg});
              }
              /* Restore badges */
              if(data.achievements) S.badges = data.achievements;
              /* Mark as loaded so game loop doesn't re-init */
              S._serverLoadStarted = true;
              /* Skip name modal if we have a name */
              if(data.player && data.player.name && data.player.name !== 'Anon'){
                setShowNameModal(false);
              }
              setLoginLoading(false);
              setShowLogin(false);
            }}
              style={{width:'100%',padding:'14px',background:'var(--pop)',color:'#fff',border:'none',
                borderRadius:10,fontSize:14,fontWeight:800,cursor:'pointer',
                fontFamily:'VT323,monospace',opacity:loginLoading?0.5:1}}>
              {loginLoading ? 'Loading...' : '🔑 LOG IN'}
            </button>
            <button onClick={()=>{setLoginMode('welcome');setLoginPassphrase('');setLoginError('');}}
              style={{marginTop:6,background:'none',border:'none',color:'var(--txt3)',fontSize:10,cursor:'pointer'}}>
              ← Back
            </button>
          </>
        )}
      </div>
    </div>

  /* Name / avatar selection modal */
  if(showNameModal) return (
    <div className="bt-name-modal">
      <div className="bt-name-box">
        <div style={{fontSize:24,marginBottom:4}}>🏘️</div>
        <div style={{fontSize:18,fontWeight:800,color:'var(--txt)',fontFamily:'VT323,monospace',letterSpacing:'.06em'}}>BRO TOWN</div>
        <div style={{fontSize:11,color:'var(--txt3)',marginBottom:16}}>Enter your name and pick an avatar</div>

          onKeyDown={e=>e.key==='Enter'&&joinTown()}

          maxLength={20}
          style={{width:'100%',padding:'10px 14px',background:'var(--ink3)',border:'1.5px solid var(--line)',
            borderRadius:10,color:'var(--txt)',fontSize:14,fontWeight:600,outline:'none',
            textAlign:'center',marginBottom:12,boxSizing:'border-box'}}
        />
        {avatarPool.length>0&&(
          <>
            <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Pick your Bro</div>
            <div className="bt-avatar-pick">
              {avatarPool.map((n,i)=>(
                <div key={n.ID} className={`bt-avatar-opt ${selectedAvatar===i?'sel':''}`}
                  onClick={()=>setSelectedAvatar(selectedAvatar===i?null:i)}>
                  <img src={wsrvUrl(n.Image, 80)} alt={`#${n.ID}`} loading="lazy"/>
                </div>

        <div style={{marginTop:12}}>

              <div style={{fontSize:8,color:'var(--txt3)',marginBottom:3}}>Shirt</div>
              <div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'center'}}>

                  <div key={col} onClick={()=>setBodyTorsoColor(col)}
                    style={{width:20,height:20,borderRadius:4,background:col,cursor:'pointer',
                      border:bodyTorsoColor===col?'2px solid #fff':'2px solid transparent'}}/>
                ))}

            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'var(--txt3)',marginBottom:3}}>Pants</div>

                {['#1e3a5f','#1e293b','#3b0764','#7f1d1d','#365314','#1a1a1a','#78350f','#334155','#083344','#4a1d96'].map(col=>(

                      border:bodyLegColor===col?'2px solid #fff':'2px solid transparent'}}/>

  return(

      <div style={{flex:1,position:'relative',overflow:'hidden',minWidth:0,minHeight:0}}>
        <canvas ref={canvasRef} className="brotown-canvas" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}
          onTouchStart={e=>{
            const t=e.changedTouches[0];
            canvasTouchRef.current={id:t.identifier,x:t.clientX,y:t.clientY,t:Date.now()};
          }}
          onTouchEnd={e=>{
            const ct=canvasTouchRef.current;
            for(let i=0;i<e.changedTouches.length;i++){
              const t=e.changedTouches[i];
              if(t.identifier===ct.id){
                handleCanvasSwipe(ct.x,ct.y,t.clientX,t.clientY,Date.now()-ct.t);
                ct.id=null;
                break;
              }
            }
          }}
          onClick={e=>{
            const rect = e.currentTarget.getBoundingClientRect();
            const tapX = (e.clientX - rect.left) * 1.25;
            const tapY = (e.clientY - rect.top) * 1.25;
            const S = stateRef.current;
            const cx = S.camera.x, cy = S.camera.y;
            /* Check monsters for lock-on */
            if(S.monsters){
              let closest = null, closestDist = 30;
              S.monsters.forEach(m => {
                if(!m.alive) return;
                const msx = m.x - cx, msy = m.y - cy;
                const d = Math.sqrt((tapX-msx)**2+(tapY-msy)**2);
                if(d < closestDist){ closestDist = d; closest = m; }
              });
              if(closest){
                /* Toggle lock: tap same = unlock, tap new = lock */
                if(S.lockedTarget && S.lockedTarget.ref === closest){
                  S.lockedTarget = null;
                } else {
                  S.lockedTarget = {type:'monster', id:closest.id, ref:closest};
                }
                return;
              }
            }
            /* Check NPCs for lock-on */
            if(S.npcs){
              for(const npc of S.npcs){
                if(!npc.alive) continue;
                const nsx = npc.x - cx, nsy = npc.y - cy;
                if(Math.sqrt((tapX-nsx)**2+(tapY-nsy)**2) < 25){
                  if(S.lockedTarget && S.lockedTarget.ref === npc) S.lockedTarget = null;
                  else S.lockedTarget = {type:'npc', id:npc.name, ref:npc};
                  return;
                }
              }
            }
            /* Check other players for lock-on OR inspect */
            for(const [id, o] of Object.entries(S.others)){
              const osx = o.renderX - cx, osy = o.renderY - cy;
              if(Math.sqrt((tapX-osx)**2 + (tapY-osy)**2) < 20){
                if(S.lockedTarget && S.lockedTarget.id === id){
                  S.lockedTarget = null;
                } else {
                  S.lockedTarget = {type:'player', id:id, ref:o};
                  setInspectPlayer({id, name:o.name, color:o.color, avatar:o.avatar, bro:o.bro, x:o.x, y:o.y});
                }
                return;
              }
            }
            /* Tap on empty space = unlock */
            S.lockedTarget = null;
          }}/>

            <div style={{fontSize:14,fontWeight:800,color:'#fff',marginTop:2}}>{achievementMsg.name}</div>

            border:'1.5px solid rgba(245,197,66,.4)',textAlign:'center',

          </div>

            borderRadius:6,color:'rgba(255,255,255,.7)',fontSize:10,cursor:'pointer',marginRight:4,
            backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)'}}

          </div>
          <button style={{marginLeft:4,padding:'4px 8px',borderRadius:6,background:'rgba(0,0,0,.45)',
            border:'1px solid rgba(255,255,255,.15)',color:'rgba(255,255,255,.7)',fontSize:12,
            cursor:'pointer',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)',
            WebkitTapHighlightColor:'transparent',display:'flex',alignItems:'center'}}
            onClick={()=>{BT_AUDIO.muted=!BT_AUDIO.muted;setPlayerCount(c=>c);}}>
            {BT_AUDIO.muted?'🔇':'🔊'}
          </button>
        </div>

        {/* Top button row — Players + Avatar */}


        {/* Stat allocation screen */}
        {showStatScreen&&rpgState&&(
          <div className="bt-inspect" onClick={()=>setShowStatScreen(false)}>
            <div className="bt-inspect-card" onClick={e=>e.stopPropagation()} style={{width:300,maxHeight:'80vh',overflowY:'auto'}}>
              <button className="bt-inspect-close" onClick={()=>setShowStatScreen(false)}>✕</button>
              <div style={{fontSize:16,fontWeight:800,color:'#f5c542',marginBottom:2}}>⚔️ Level {rpgState.level}</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:4}}>
                XP: {rpgState.xp}/{xpRequired(rpgState.level)} · 💰 {rpgState.coins}
              </div>

              {/* Resource bars */}
              <div style={{display:'flex',gap:4,marginBottom:8}}>
                {[['HP',rpgState.hp,rpgState.maxHp,'#ff5e6c'],['STA',Math.floor(rpgState.stamina||0),rpgState.maxStamina||100,'#f5c542'],['MP',Math.floor(rpgState.mana||0),rpgState.maxMana||80,'#3b82f6']].map(([l,v,mx,c])=>(

                      onClick={()=>{

                        if(!R.unspentT1||R.unspentT1<=0) return;

                        /* Update legacy compat */
                        R.str=R.power; R.def=R.fortification; R.vit=R.vitality; R.spd=R.agility; R.lck=R.ferocity;

                        try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}

              {[

                ['Elem Mastery','elementalMastery','✨','Status & collision dmg','#00d4b8'],
                ['Fortification','fortification','🏰','Block & Thorns','#60a5fa'],

                {' · '}Block: {(calcBlockReduction(rpgState.fortification||0)*100).toFixed(0)}%

              </div>
            </div>
          </div>

        {buildingPanel&&rpgState&&(
          <div className="bt-inspect" onClick={()=>setBuildingPanel(null)}>
            <div className="bt-inspect-card" onClick={e=>e.stopPropagation()} style={{width:300,maxHeight:'80vh',overflowY:'auto'}}>
              <button className="bt-inspect-close" onClick={()=>setBuildingPanel(null)}>✕</button>

        )}
        {!showMinigame&&nearFire&&nearBuilding===null&&!nearWater&&!nearTree&&rpgState?.inventory?.rawFish>0&&(
          <button className="bt-interact-prompt" style={{bottom:130}} onTouchStart={e=>{e.preventDefault();startMinigame('cooking');}} onMouseDown={e=>{e.preventDefault();startMinigame('cooking');}}>🍳 Cook</button>
        )}
        {showMinigame&&(
          <div style={{position:'absolute',bottom:55,left:'50%',transform:'translateX(-50%)',zIndex:25,width:250,padding:'10px 14px',background:'rgba(0,0,0,.85)',borderRadius:12,border:'1.5px solid rgba(255,255,255,.15)',textAlign:'center'}}>
            <div style={{fontSize:11,fontWeight:800,color:'#fff',marginBottom:5}}>{showMinigame==='fishing'?'🎣 Fishing':showMinigame==='chopping'?'🪓 Chopping':'🍳 Cooking'}</div>
            <div style={{position:'relative',height:22,background:'rgba(255,255,255,.08)',borderRadius:5,overflow:'hidden',marginBottom:6}}>
              <div style={{position:'absolute',left:(mgTarget-mgTargetSize/2)+'%',width:mgTargetSize+'%',height:'100%',background:'rgba(61,212,151,.25)',borderLeft:'2px solid #3dd497',borderRight:'2px solid #3dd497'}}/>
              <div style={{position:'absolute',left:mgTarget+'%',top:'50%',transform:'translate(-50%,-50%)',fontSize:12,zIndex:2}}>{showMinigame==='fishing'?'🐟':showMinigame==='chopping'?'🪵':'🍳'}</div>
              <div style={{position:'absolute',left:mgProgress+'%',top:0,width:2,height:'100%',background:mgResult==='hit'?'#3dd497':mgResult==='miss'?'#ff5e6c':'#fff',boxShadow:'0 0 6px '+(mgResult==='hit'?'#3dd497':mgResult==='miss'?'#ff5e6c':'#fff')}}/>
            </div>
            {mgResult?(<div style={{fontSize:13,fontWeight:800,color:mgResult==='hit'?'#3dd497':'#ff5e6c'}}>{mgResult==='hit'?'✅ Got it!':'❌ Missed!'}</div>
            ):(<button style={{padding:'6px 20px',borderRadius:7,border:'none',cursor:'pointer',background:'#f5c542',color:'#1a1428',fontSize:12,fontWeight:800}} onTouchStart={e=>{e.preventDefault();doMinigameHit();}} onMouseDown={e=>{e.preventDefault();doMinigameHit();}}>{showMinigame==='fishing'?'🎣 CATCH':showMinigame==='chopping'?'🪓 CHOP':'🍳 FLIP'}</button>)}
          </div>
        )}
        {isFishing&&(
          <div className="bt-interact-prompt" style={{bottom:130,pointerEvents:'none',animation:'promptPulse 0.8s ease-in-out infinite'}}>
            🎣 Fishing...
          </div>
        )}

        {/* Building interaction prompt */}
        {nearBuilding!==null&&BUILDINGS[nearBuilding]&&(
          <button className="bt-interact-prompt"
            onTouchStart={e=>{e.preventDefault();enterBuilding();}}
            onMouseDown={e=>{e.preventDefault();enterBuilding();}}>
            {BUILDINGS[nearBuilding].icon} Enter {BUILDINGS[nearBuilding].label}
          </button>
        )}

        {/* Chat action buttons — bottom right */}
        {/* Chat log panel */}
        {showChatLog&&(
          <div className="bt-chatlog">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 8px',
              borderBottom:'1px solid rgba(255,255,255,.1)',flexShrink:0}}>
              <span style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.5)',letterSpacing:'.05em'}}>WORLD CHAT</span>
              <button style={{background:'none',border:'none',color:'rgba(255,255,255,.4)',fontSize:16,
                cursor:'pointer',padding:'0 2px',lineHeight:1}}
                onTouchStart={e=>{e.preventDefault();setShowChatLog(false);}}
                onClick={()=>setShowChatLog(false)}>✕</button>
            </div>
            <div style={{overflowY:'auto',flex:1}} ref={el=>{if(el)el.scrollTop=el.scrollHeight;}}>
            {chatLog.filter(m=>!m.npc).length===0&&<div className="bt-chatlog-sys">No messages yet</div>}
            {chatLog.filter(m=>!m.npc).map((m,i)=>(
              <div key={i} className={m.system?'bt-chatlog-sys':'bt-chatlog-msg'}>
                {!m.system&&<><span className="bt-chatlog-name" style={{color:m.color||'#888'}}>{m.name}</span><span className="bt-chatlog-text">{m.text}</span></>}
                {m.system&&m.text}
              </div>
            ))}
            </div>
          </div>
        )}

      </div>

      {/* ═══ CONTROLS ═══ */}
      {/* Compact icon bar — bottom strip */}
      <div style={{height:36,background:'rgba(10,8,20,.95)',borderTop:'1px solid rgba(255,255,255,.08)',
        display:'flex',alignItems:'center',gap:3,padding:'0 8px',flexShrink:0,overflow:'hidden'}}>
        <input ref={chatInputRef} className="bt-chat-input"
          placeholder="Chat…" value={chatInput}
          onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}}}
          onFocus={()=>setChatOpen(true)}
          enterKeyHint="send" autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
          maxLength={200}
          style={{flex:1,padding:'3px 6px',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',
            borderRadius:5,color:'#fff',fontSize:9,outline:'none',minWidth:0,maxWidth:120}}/>
        {rpgState&&<span style={{fontSize:8,fontWeight:800,color:'#f5c542',flexShrink:0}}>Lv{rpgState.level} 💰{rpgState.coins} ❤️{rpgState.hp}/{rpgState.maxHp}</span>}
        {[
          {e:'💬',fn:()=>setShowChatLog(s=>{if(!s)setUnreadChats(0);return!s;})},
          {e:'⚔️',fn:()=>setShowStatScreen(s=>!s)},
          {e:'🎒',fn:()=>setShowInventory(s=>!s)},
          {e:'📊',fn:()=>setShowSkills(s=>!s)},
          {e:bodySize==='slim'?'🧍':'🛡️',fn:()=>{const nb=bodySize==='slim'?'armored':'slim';setBodySize(nb);stateRef.current.bodySize=nb;}},

          {e:'💥',fn:()=>doSpecialAttack()},
          {e:'🔑',fn:()=>{const p=getBtPassphrase();if(p)alert('Passphrase:\n\n'+p);}},
          {e:'🚪',fn:async()=>{
            if(!confirm('Log out?')) return;
            const S=stateRef.current,pid=getBtPlayerId();
            if(pid&&S.rpg){
              await btRpc('bt_register_player',{p_id:pid,p_name:S.myName||'Anon',p_avatar:S.myAvatar,p_color:S.myColor,p_body_torso:S.bodyTorso,p_body_legs:S.bodyLegs,p_bro_id:S.myBroData?.ID||null,p_bro_data:S.myBroData||null});
              await btRpc('bt_sync_rpg',{p_id:pid,p_coins:S.rpg.coins||0,p_xp:S.rpg.xp||0,p_hp:S.rpg.hp||50,p_level:S.rpg.level||1,p_sword_tier:S.rpg.swordTier||0});
              if(S.rpg.inventory) for(const [k,v] of Object.entries(S.rpg.inventory)) if(v>0) await btRpc('bt_sync_inventory',{p_id:pid,p_item:k,p_qty:v});
              if(S.rpg.skills) for(const [k,v] of Object.entries(S.rpg.skills)) if(typeof v==='number') await btRpc('bt_sync_skill',{p_id:pid,p_skill:k,p_value:v});
              if(S.stats) await btRpc('bt_update_stats',{p_id:pid,p_steps:S.stats.steps||0,p_msgs:S.stats.msgsSent||0,p_emotes:S.stats.emotesUsed||0});
            }
            try{localStorage.removeItem('bt_passphrase');localStorage.removeItem('bt_player');localStorage.removeItem('bt_rpg');localStorage.removeItem('bt_stats');}catch(e){}
            window.location.reload();
          }},
        ].map((b,i)=>(
          <button key={i} onClick={b.fn} style={{width:24,height:24,borderRadius:5,border:'none',flexShrink:0,
            background:b.e==='🚪'?'rgba(255,80,80,.15)':'rgba(255,255,255,.04)',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,padding:0}}>
            {b.e}
          </button>
        ))}
      </div>

      {/* Left joystick — overlaps game/bar border */}
      <div className="bt-joystick-zone" style={{position:'fixed',bottom:52,left:isLandscape?90:50,zIndex:30,width:isLandscape?120:100,height:isLandscape?120:100}}>
        <div className="bt-joystick-base" ref={joystickRef} style={{width:isLandscape?110:90,height:isLandscape?110:90}}>
          <div className="bt-joystick-knob" ref={knobRef}/>
        </div>
      </div>

      {/* Right joystick (aim+attack) — overlaps game/bar border */}
      <div style={{position:'fixed',bottom:52,right:isLandscape?140:90,zIndex:30,
        width:isLandscape?120:100,height:isLandscape?120:100}}>
        <div ref={rJoyRef} style={{
          width:isLandscape?110:90,height:isLandscape?110:90,borderRadius:'50%',
          border:'3px solid '+(autoAttack?'rgba(255,100,100,.6)':'rgba(180,40,40,.25)'),
          background:autoAttack
            ?'radial-gradient(circle,rgba(160,30,30,.5) 0%,rgba(80,15,15,.3) 100%)'
            :'radial-gradient(circle,rgba(60,30,30,.35) 0%,rgba(30,15,15,.25) 100%)',
          position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
          boxShadow:autoAttack?'0 0 15px rgba(255,60,60,.3)':'none',
          touchAction:'none'}}>
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',transform:'rotate(-90deg)',pointerEvents:'none'}}>
            <circle cx="50%" cy="50%" r="46%" fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="3"/>
            <circle cx="50%" cy="50%" r="46%" fill="none"
              stroke={(stateRef.current._atkEnergy||100)>60?'rgba(80,220,120,.5)':(stateRef.current._atkEnergy||100)>30?'rgba(220,180,60,.5)':'rgba(255,60,60,.5)'}
              strokeWidth="3" strokeLinecap="round"
              strokeDasharray={`${Math.PI*2*46/100*((stateRef.current._atkEnergy||100)/100)*100} 999`}/>
            {/* Tick mark at 40% (heavy attack cost) */}
            <line x1="50%" y1="4%" x2="50%" y2="10%"
              stroke="rgba(255,255,255,.4)" strokeWidth="2"
              transform={`rotate(${-360*0.4} 50% 50%)`}/>
          </svg>
          <div ref={rKnobRef} style={{
            position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
            width:isLandscape?38:32,height:isLandscape?38:32,borderRadius:'50%',
            background:autoAttack
              ?'radial-gradient(circle,rgba(255,80,80,.9) 0%,rgba(200,40,40,.7) 100%)'
              :'radial-gradient(circle,rgba(200,60,60,.6) 0%,rgba(140,30,30,.5) 100%)',
            border:'2px solid rgba(255,255,255,.15)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:16,pointerEvents:'none'}}>
            {weapon==='bow'?'🏹':'⚔️'}
          </div>
        </div>
      </div>

      {/* Weapon swap — above shield */}
      <div style={{position:'fixed',bottom:isLandscape?130:114,right:isLandscape?24:14,zIndex:30,
        width:40,height:40}}
        onTouchStart={e=>{e.preventDefault();e.stopPropagation();const nw=weapon==='sword'?'bow':'sword';setWeapon(nw);stateRef.current.weapon=nw;}}
        onMouseDown={e=>{e.preventDefault();const nw=weapon==='sword'?'bow':'sword';setWeapon(nw);stateRef.current.weapon=nw;}}
        onContextMenu={e=>e.preventDefault()}>
        <div style={{width:'100%',height:'100%',borderRadius:10,
          border:'2px solid '+(weapon==='bow'?'rgba(200,150,50,.6)':'rgba(255,255,255,.15)'),
          background:weapon==='bow'?'rgba(139,69,19,.4)':'rgba(255,255,255,.06)',
          display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
          touchAction:'none',WebkitTouchCallout:'none',WebkitUserSelect:'none',userSelect:'none'}}>
          <span style={{fontSize:18,pointerEvents:'none'}}>{weapon==='bow'?'⚔️':'🏹'}</span>
        </div>
      </div>

      {/* Shield button — large, right of right joystick, hold to activate */}
      <div style={{position:'fixed',bottom:isLandscape?66:60,right:isLandscape?20:10,zIndex:30,
        width:isLandscape?70:60,height:isLandscape?70:60}}
        onTouchStart={e=>{e.preventDefault();doShield();}}
        onTouchEnd={e=>{e.preventDefault();stateRef.current._shieldUp=false;setShieldUp(false);}}
        onTouchCancel={e=>{e.preventDefault();stateRef.current._shieldUp=false;setShieldUp(false);}}
        onMouseDown={e=>{e.preventDefault();doShield();}}
        onMouseUp={e=>{e.preventDefault();stateRef.current._shieldUp=false;setShieldUp(false);}}
        onMouseLeave={()=>{stateRef.current._shieldUp=false;setShieldUp(false);}}
        onContextMenu={e=>e.preventDefault()}>
        <div style={{
          width:'100%',height:'100%',borderRadius:'50%',position:'relative',
          border:'3px solid '+(shieldUp?'rgba(96,165,250,.8)':'rgba(96,165,250,.2)'),
          background:shieldUp
            ?'radial-gradient(circle,rgba(96,165,250,.5) 0%,rgba(40,80,180,.3) 100%)'
            :'radial-gradient(circle,rgba(50,60,100,.3) 0%,rgba(30,40,70,.2) 100%)',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:shieldUp?'0 0 15px rgba(96,165,250,.4)':'none',
          touchAction:'none',cursor:'pointer',WebkitTouchCallout:'none',WebkitUserSelect:'none',userSelect:'none'}}>
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',transform:'rotate(-90deg)',pointerEvents:'none'}}>
            <circle cx="50%" cy="50%" r="45%" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="4"/>
            <circle cx="50%" cy="50%" r="45%" fill="none"
              stroke={stateRef.current._shieldCdUntil&&Date.now()<stateRef.current._shieldCdUntil?'rgba(255,60,60,.5)':
                (stateRef.current._shieldStamina||3000)>2000?'rgba(80,220,120,.6)':
                (stateRef.current._shieldStamina||3000)>1000?'rgba(220,180,60,.6)':'rgba(255,60,60,.6)'}
              strokeWidth="4" strokeLinecap="round"
              strokeDasharray={`${Math.PI*2*45/100*((stateRef.current._shieldStamina||3000)/3000)*100} 999`}/>
          </svg>
          <span style={{fontSize:isLandscape?28:24,pointerEvents:'none',zIndex:1}}>🛡️</span>
        </div>
      </div>
    </div>
  );
};



/* ════════════════════════════════════
   Standalone App Wrapper
════════════════════════════════════ */
const GameApp = () => {
  return React.createElement(BroTown, {
    nfts: [],
    onExit: () => { window.location.href = 'index.html'; }
  });
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GameApp));
</script>
</body>
</html>
