   GAME — Base
═══════════════════════════════════════════ */
:root {
  --ink:      #0b0c14;
  --ink2:     #12141f;
  --ink3:     #1a1d2e;
  --ink4:     #222639;
  --line:     #2d3251;
  --line2:    #3d4470;
  --pop:      #5b52ff;
  --pop-soft: rgba(91,82,255,.14);
  --pop-glow: rgba(91,82,255,.35);
  --teal:     #00d4b8;
  --txt:      #e8eaf8;
  --txt2:     #8890b8;
  --txt3:     #4d5580;
  --red:      #ff5e6c;
  --gold:     #f5c542;
  --green:    #3ddc97;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d0b18;touch-action:none;position:fixed;width:100%;top:0;left:0}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
img{display:block}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}

/* Landscape recommended but not required */

/* Back to site link */
.back-to-site {
  position: fixed; top: 8px; right: 8px; z-index: 100;
  padding: 6px 14px; border-radius: 8px;
  background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.6); font-size: 11px; font-weight: 600;
  text-decoration: none; backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.back-to-site:active { background: rgba(91,82,255,.4); }

/* ═══════════════════════════════════════════
   GAME — BroTown styles
═══════════════════════════════════════════ */
.brotown-wrap:fullscreen,.brotown-wrap:-webkit-full-screen{width:100vw!important;height:100vh!important}
.brotown-wrap{position:relative;width:100%;height:100%;overflow:hidden;background:#0d0b18;-webkit-touch-callout:none;display:flex;flex-direction:column}
.brotown-canvas{display:block;image-rendering:pixelated;-webkit-touch-callout:none;touch-action:none}
.brotown-hud{position:absolute;top:46px;right:12px;pointer-events:none;z-index:10;display:flex;align-items:flex-start}
.brotown-hud>*{pointer-events:auto}
.bt-player-count{display:flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(0,0,0,.65);border-radius:8px;font-size:11px;font-weight:700;color:#3dd497;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.bt-player-dot{width:6px;height:6px;border-radius:50%;background:#3dd497;animation:pulse-dot 2s ease-in-out infinite}
/* bt-minimap removed */
.bt-chat-bar{flex-shrink:0;display:flex;gap:6px;padding:6px 10px;
  background:#0d0b18;border-bottom:1px solid rgba(255,255,255,.12);
  align-items:center;z-index:25;
  padding-top:max(6px,env(safe-area-inset-top));
  touch-action:auto;-webkit-touch-callout:default;-webkit-user-select:text;user-select:text}
.bt-emote-bar{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;gap:6px;padding:5px 10px;background:rgba(0,0,0,.55);border-radius:12px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  -webkit-touch-callout:none;touch-action:manipulation;border:1px solid rgba(255,255,255,.1)}
.bt-emote-btn{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.08);border:none;
  font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.bt-emote-btn:active{background:rgba(91,82,255,.4);transform:scale(.9)}
.bt-interact-prompt{position:absolute;left:50%;bottom:140px;transform:translateX(-50%);z-index:18;
  padding:8px 18px;background:rgba(0,0,0,.7);border:1.5px solid var(--pop);border-radius:10px;
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  animation:promptPulse 1.5s ease-in-out infinite;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
@keyframes promptPulse{0%,100%{opacity:.9;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.04)}}
.bt-players-btn{position:absolute;top:8px;left:52px;z-index:20;height:30px;padding:0 10px;
  border-radius:8px;background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.15);
  display:flex;align-items:center;gap:5px;cursor:pointer;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);color:rgba(255,255,255,.8);
  font-size:10px;font-weight:700;-webkit-tap-highlight-color:transparent}
.bt-players-btn:active{background:rgba(91,82,255,.4)}
.bt-chatlog{position:absolute;bottom:70px;right:16px;z-index:25;width:220px;max-height:200px;
  background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.12);border-radius:10px;
  overflow-y:auto;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;flex-direction:column}
.bt-chatlog-msg{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.05);font-size:10px;line-height:1.3}
.bt-chatlog-msg:last-child{border-bottom:none}
.bt-chatlog-name{font-weight:700;margin-right:4px}
.bt-chatlog-text{color:rgba(255,255,255,.7)}
.bt-chatlog-sys{color:rgba(255,255,255,.35);font-style:italic;font-size:9px;padding:3px 8px}
.bt-chatlog-btn{width:36px;height:36px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.15);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;position:relative}
.bt-chatlog-btn:active{background:rgba(91,82,255,.4)}
.bt-chatlog-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;
  background:#ff5e6c;border:1px solid rgba(0,0,0,.3)}
.bt-plist{position:absolute;top:46px;left:8px;z-index:25;width:200px;max-height:260px;
  background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.15);border-radius:10px;
  overflow-y:auto;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.bt-plist-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);transition:background .1s}
.bt-plist-item:active{background:rgba(91,82,255,.25)}
.bt-plist-item:last-child{border-bottom:none}
.bt-plist-av{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0}
.bt-plist-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;

.bt-plist-name{font-size:11px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt-plist-sub{font-size:8px;color:rgba(255,255,255,.4)}
.bt-inspect{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;

.bt-inspect-card{background:#1a1428;border:1px solid rgba(255,255,255,.15);border-radius:14px;

.bt-inspect-close{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;

  display:flex;align-items:center;justify-content:center;cursor:pointer}
.bt-inspect-close:active{background:rgba(255,94,108,.4)}
.bt-inspect-av{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 8px;

.bt-inspect-name{font-size:16px;font-weight:800;color:#fff;margin-bottom:2px}
.bt-inspect-stat{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}

  display:flex;gap:8px;padding:6px 10px;background:rgba(0,0,0,.5);border-radius:14px;
  border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.bt-combat-btn{width:44px;height:44px;border-radius:10px;border:none;display:flex;align-items:center;
  justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative}
.bt-combat-btn:active{transform:scale(.92)}
.bt-chat-fab{width:48px;height:48px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.bt-chat-fab.send{background:rgba(61,212,151,.7);border:1.5px solid rgba(61,212,151,.4)}
.bt-chat-fab.send:active{background:rgba(61,212,151,1)}
.bt-chat-fab.close{background:rgba(255,94,108,.5);border:1.5px solid rgba(255,94,108,.3)}
.bt-chat-fab.close:active{background:rgba(255,94,108,.8)}
@media(min-width:769px){.bt-fab-group{display:none}}
.bt-chat-input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:8px;padding:8px 12px;color:#fff;font-size:16px;outline:none;font-family:inherit;
  -webkit-touch-callout:default;-webkit-user-select:text;user-select:text;touch-action:auto}
.bt-chat-input::placeholder{color:rgba(255,255,255,.3)}
.bt-chat-input:focus{border-color:var(--pop)}
.bt-joystick-zone{z-index:30;display:block;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:none}

.bt-joystick-base{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.15);position:relative;touch-action:none}
.bt-joystick-knob{width:48px;height:48px;border-radius:50%;background:rgba(91,82,255,.55);
  border:2px solid rgba(255,255,255,.3);position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none}
.bt-name-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bt-name-box{background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:24px;max-width:320px;width:100%;text-align:center;margin:auto 0}
.bt-avatar-pick{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.bt-avatar-opt{width:56px;height:56px;border-radius:10px;border:2px solid var(--line);cursor:pointer;overflow:hidden;transition:border-color .15s,transform .15s}
.bt-avatar-opt.sel{border-color:var(--pop);transform:scale(1.1)}
.bt-avatar-opt img{width:100%;height:100%;object-fit:cover}

</style>

/* Apply zone flavor to a base tier name */
function flavorName(baseName, element, type) {
  if(!element || !ELEMENT_FLAVOR[element]) return baseName;
  const f = ELEMENT_FLAVOR[element];
  if(type === 'fish') return f.fish + ' ' + baseName;
  if(type === 'wood') return f.wood + ' ' + baseName;
  if(type === 'ore')  return f.ore + ' ' + baseName;
  return f.adj + ' ' + baseName;
}

function flavorSpotName(baseSpotName, element, type) {
  if(!element || !ELEMENT_FLAVOR[element]) return baseSpotName;
  const f = ELEMENT_FLAVOR[element];
  /* Replace full spot names for better readability */
  if(type === 'fishSpot'){
    /* Special replacements for small water bodies */
    const fishReplace = {
      'Tiny Pond': f.spotAdj+' Puddle',
      'Stream': f.spotAdj+' Stream',
      'Pond': f.spotAdj+' Pond',
      'River': f.spotAdj+' River',
      'Lake': f.spotAdj+' Lake',
    };
    return fishReplace[baseSpotName] || f.spotAdj+' '+baseSpotName;
  }
  if(type === 'tree') return f.treeAdj+' '+baseSpotName;
  if(type === 'oreVein') return f.veinAdj+' '+baseSpotName;
  return baseSpotName;
}

/* Helper: find the best tier a node should be based on zone depth */
function getNodeTierForDepth(tiersArray, depth) {
  const depthLvlRanges = {
    shallow:[1,10], mid:[11,20], deep:[21,40], abyss:[41,60], core:[61,80]
  };
  const range = depthLvlRanges[depth] || [1,10];
  /* Pick tiers that fit within this depth's level range */
  const eligible = tiersArray.filter(t => t.lvl >= range[0] && t.lvl <= range[1]);
  if(eligible.length === 0) return tiersArray[0];
  /* Return random tier from eligible */
  return eligible[Math.floor(Math.random()*eligible.length)];
}

/* Create a resource node using the tiered progression system */
function createGatherNode(zoneId, depth, x, y, nodeType) {
  const zone = ZONES[zoneId];
  const dc = DEPTH_CONFIG[depth];
  const elem = zone?.element;
  const res = elem ? ZONE_RESOURCES[elem] : null;

  /* Pick tier from appropriate table based on node type and zone depth */
  const tiersTable = nodeType==='tree' ? WOODCUTTING_TIERS : nodeType==='fishSpot' ? FISHING_TIERS : MINING_TIERS;
  const tier = getNodeTierForDepth(tiersTable, depth);
  const skillName = nodeType==='tree' ? 'woodcutting' : nodeType==='fishSpot' ? 'fishing' : 'mining';
  const resType = nodeType==='tree' ? 'wood' : nodeType==='fishSpot' ? 'fish' : 'ore';

  /* Zone-flavored names — "Magma Trout" instead of just "Trout" */
  const flavoredName = flavorName(tier.name, elem, resType);
  const baseSpot = tier.spot || tier.tree || tier.vein || 'Node';
  const flavoredSpot = flavorSpotName(baseSpot, elem, nodeType);

  /* XP scales with tier level */
  const xp = Math.ceil(tier.lvl * 1.5 + 5);
  const respawnTime = 20000 + tier.lvl * 500;

  return {
    x, y, zoneId, depth, resTier: dc.resTier,
    nodeType: nodeType || 'oreVein',
    skill: skillName,
    resourceType: resType,
    name: flavoredName,       /* "Magma Trout", "Charred Kindling", "Molten Copper Ore" */
    spotName: flavoredSpot,   /* "Lava Tiny Pond", "Ash Sapling", "Volcanic Dirt Mound" */
    baseName: tier.name,      /* unflavored base: "Trout", "Kindling", "Copper Ore" */
    gatherLvl: tier.lvl,
    color: nodeType==='tree' ? tier.canopyColor : nodeType==='fishSpot' ? '#3498DB' : tier.streakColor,
    emoji: nodeType==='tree' ? '🪓' : nodeType==='fishSpot' ? '🎣' : '⛏️',
    hp: tier.hp, maxHp: tier.hp,
    respawnTime,
    alive: true, respawnAt: 0,
    xp,
    element: elem,
    gemName: res?.gem || null,
    gemColor: res?.gemColor || null,
    _tier: tier,
    _tierIdx: tiersTable.indexOf(tier),
  };
}

/* Spawn gathering nodes — mix of trees, fish spots, ore veins */
function spawnGatherNodes(zoneId, depth) {
  const zone = ZONES[zoneId];
  if(!zone || zone.safe) return [];
  const dc = DEPTH_CONFIG[depth || 'shallow'];
  const nodes = [];
  const W = zone.w * TILE, H = zone.h * TILE;
  const margin = 5 * TILE;
  const totalNodes = dc.nodeCount;
  const treeCt = Math.ceil(totalNodes * 0.4);
  const fishCt = Math.ceil(totalNodes * 0.25);
  const oreCt = Math.max(1, totalNodes - treeCt - fishCt);
  /* Grade placement: low-level nodes near south (entrance), high-level near north (dungeon) */
  const placeNode = (type, tierBias) => {
    /* tierBias 0=near entrance(south), 1=near dungeon(north) */
    const yCenter = H - margin - tierBias * (H - margin*2);
    const y = Math.max(margin, Math.min(H-margin, yCenter + (Math.random()-0.5)*TILE*6));
    const x = margin + Math.random()*(W - margin*2);
    nodes.push(createGatherNode(zoneId, depth||'shallow', x, y, type));
  };
  for(let i=0;i<treeCt;i++) placeNode('tree', i/Math.max(1,treeCt-1));
  for(let i=0;i<fishCt;i++) placeNode('fishSpot', i/Math.max(1,fishCt-1));
  for(let i=0;i<oreCt;i++) placeNode('oreVein', i/Math.max(1,oreCt-1));
  return nodes;
}

/* ── WEAPON HIT EFFECTS ── */
/* Returns particles array for the weapon's hit visual */
function spawnWeaponHitFX(hitX, hitY, kbAngle, weaponType, isCrit) {
  const parts = [];
  const scale = isCrit ? 1.6 : 1;
  const count = isCrit ? 1.4 : 1;

  if(weaponType === 'greatsword') {
    /* Wide slash arc — heavy, chunky particles in an arc */
    const arcStart = kbAngle - 0.8;
    const arcEnd = kbAngle + 0.8;
    for(let i=0; i<Math.round(14*count); i++){
      const a = arcStart + Math.random()*(arcEnd-arcStart);
      const r = 8 + Math.random()*16;
      parts.push({ x:hitX+Math.cos(a)*r*0.3, y:hitY+Math.sin(a)*r*0.3,
        vx:Math.cos(a)*(2+Math.random()*3)*scale, vy:Math.sin(a)*(2+Math.random()*3)*scale-1,
        life:0.5, color:isCrit?'#f5c542':'#ddd', size:(2.5+Math.random()*2)*scale,
        type:'slash' });
    }
    /* Central impact flash — white rectangle that fades (the "weight") */
    parts.push({ x:hitX, y:hitY, vx:Math.cos(kbAngle)*1, vy:Math.sin(kbAngle)*1,
      life:0.3, color:'#fff', size:6*scale, type:'flash' });
  } else if(weaponType === 'sword') {
    /* Thin quick slice — a line of small fast particles */
    const perpA = kbAngle + Math.PI/2;
    for(let i=0; i<Math.round(10*count); i++){
      const t = (i/10 - 0.5) * 2; /* -1 to 1 along the cut line */
      parts.push({ x:hitX+Math.cos(perpA)*t*10, y:hitY+Math.sin(perpA)*t*10,
        vx:Math.cos(kbAngle)*(3+Math.random()*2)*scale + (Math.random()-0.5)*2,
        vy:Math.sin(kbAngle)*(1+Math.random())*scale - Math.random(),
        life:0.35, color:isCrit?'#f5c542':'#ccc', size:(1+Math.random()*1.5)*scale,
        type:'slice' });
    }
  } else if(weaponType === 'bow') {
    /* Arrow impact — small burst at point + wood splinter particles */
    for(let i=0; i<Math.round(8*count); i++){
      const spread = (Math.random()-0.5)*1.2;
      parts.push({ x:hitX, y:hitY,
        vx:Math.cos(kbAngle+spread+Math.PI)*(1+Math.random()*3)*scale,
        vy:Math.sin(kbAngle+spread+Math.PI)*(1+Math.random()*3)*scale - Math.random()*2,
        life:0.4, color:i<3?'#8B6914':'#ddd', size:(1+Math.random()*1.5)*scale,
        type:'splinter' });
    }
    /* Dust puff at impact point */
    for(let i=0; i<4; i++){
      parts.push({ x:hitX, y:hitY,
        vx:(Math.random()-0.5)*2, vy:-1-Math.random()*2,
        life:0.5, color:'rgba(200,180,140,0.6)', size:(3+Math.random()*2)*scale,
        type:'dust' });
    }
  } else if(weaponType === 'staff') {
    /* Magic pulse — expanding ring of element-colored sparks */
    for(let i=0; i<Math.round(12*count); i++){
      const a = (i/12)*Math.PI*2 + (Math.random()-0.5)*0.4;
      parts.push({ x:hitX, y:hitY,
        vx:Math.cos(a)*(3+Math.random()*3)*scale, vy:Math.sin(a)*(3+Math.random()*3)*scale,
        life:0.45, color:isCrit?'#f5c542':(['#a78bfa','#c084fc','#e9d5ff'])[Math.floor(Math.random()*3)],
        size:(1.5+Math.random()*2)*scale, type:'magic' });
    }
    /* Central glow */
    parts.push({ x:hitX, y:hitY, vx:0, vy:-0.5,
      life:0.4, color:'#e9d5ff', size:5*scale, type:'glow' });
  }
  return parts;
}

/* ── ELEMENT-SPECIFIC DEATH EFFECTS ── */
/* Returns {particles, deathStyle, extraFX} for element-killed monsters */
function getElementDeathFX(deathX, deathY, element, killAngle, bodyColor, bodySize, killScale) {
  const parts = [];
  const e = ELEMENTS[element];
  const c = e ? e.color : '#fff';
  const sc = killScale || 1;
  const bs = bodySize || 10;

  const styles = {
    flame: {
      deathStyle: 'incinerate',
      spawn: () => {
        /* Body burns to ash — orange/red particles rise, dark char particles fall */
        for(let i=0; i<Math.round(25*sc); i++){
          const isAsh = i > 15;
          parts.push({ x:deathX+(Math.random()-0.5)*bs, y:deathY+(Math.random()-0.5)*bs,
            vx:(Math.random()-0.5)*3, vy: isAsh ? 0.5+Math.random()*1 : -2-Math.random()*4,
            life:isAsh?1.2:0.8+Math.random()*0.5, 
            color: isAsh ? '#333' : (['#C0392B','#E74C3C','#F39C12','#F5B041'])[Math.floor(Math.random()*4)],
            size:(isAsh?1:1.5+Math.random()*2)*sc });
        }
      }
    },
    frost: {
      deathStyle: 'shatter',
      spawn: () => {
        /* Freeze solid then shatter — angular ice fragments fly outward */
        for(let i=0; i<Math.round(20*sc); i++){
          const a = Math.random()*Math.PI*2;
          const spd = 2+Math.random()*5;
          parts.push({ x:deathX+(Math.random()-0.5)*bs*0.5, y:deathY+(Math.random()-0.5)*bs*0.5,
            vx:Math.cos(a)*spd*sc, vy:Math.sin(a)*spd*sc-1,
            life:0.8+Math.random()*0.5,
            color:(['#2980B9','#AED6F1','#D6EAF8','#EBF5FB','#fff'])[Math.floor(Math.random()*5)],
            size:(2+Math.random()*3)*sc, type:'shard' });
        }
      }
    },
    water: {
      deathStyle: 'dissolve',
      spawn: () => {
        /* Dissolve into water droplets that splash on ground */
        for(let i=0; i<Math.round(22*sc); i++){
          const a = Math.random()*Math.PI*2;
          parts.push({ x:deathX+(Math.random()-0.5)*bs, y:deathY+(Math.random()-0.5)*bs,
            vx:Math.cos(a)*(1+Math.random()*3)*sc, vy:-1+Math.random()*3,
            life:0.6+Math.random()*0.4,
            color:(['#3498DB','#5DADE2','#85C1E9','#AED6F1'])[Math.floor(Math.random()*4)],
            size:(1.5+Math.random()*2)*sc });
        }
      }
    },
    venom: {
      deathStyle: 'melt',
      spawn: () => {
        /* Toxic melt — green goo pools downward, gas bubbles rise */
        for(let i=0; i<Math.round(20*sc); i++){
          const isGas = i < 8;
          parts.push({ x:deathX+(Math.random()-0.5)*bs*1.2, y:deathY+(isGas?-Math.random()*10:Math.random()*6),
            vx:(Math.random()-0.5)*2, vy:isGas?-1.5-Math.random()*2:0.5+Math.random()*1,
            life:isGas?0.5:1.0+Math.random()*0.5,
            color:isGas?'#58D68D':(['#27AE60','#1E8449','#145A32'])[Math.floor(Math.random()*3)],
            size:(isGas?1.5:2.5+Math.random()*2)*sc });
        }
      }
    },
    storm: {
      deathStyle: 'electrocute',
      spawn: () => {
        /* Lightning chains outward from body, bright flashes */
        for(let i=0; i<Math.round(18*sc); i++){
          const a = Math.random()*Math.PI*2;
          const spd = 4+Math.random()*6;
          parts.push({ x:deathX, y:deathY,
            vx:Math.cos(a)*spd*sc, vy:Math.sin(a)*spd*sc,
            life:0.2+Math.random()*0.2, /* Short-lived = flickery */
            color:(['#8E44AD','#D7BDE2','#fff','#F4ECF7'])[Math.floor(Math.random()*4)],
            size:(1+Math.random()*1.5)*sc });
        }
        /* Lingering sparks */
        for(let i=0; i<8; i++){
          parts.push({ x:deathX+(Math.random()-0.5)*20, y:deathY+(Math.random()-0.5)*20,
            vx:(Math.random()-0.5)*1, vy:(Math.random()-0.5)*1,
            life:0.8+Math.random()*0.5, color:'#D7BDE2', size:1*sc });
        }
      }
    },
    stone: {
      deathStyle: 'crumble',
      spawn: () => {
        /* Crumble into rubble — heavy chunks fall straight down */
        for(let i=0; i<Math.round(16*sc); i++){
          parts.push({ x:deathX+(Math.random()-0.5)*bs, y:deathY+(Math.random()-0.5)*bs*0.5,
            vx:(Math.random()-0.5)*3*sc, vy:-1+Math.random()*2,
            life:1.0+Math.random()*0.5,
            color:(['#795548','#A0522D','#8D6E63','#6D4C41','#999'])[Math.floor(Math.random()*5)],
            size:(2+Math.random()*3)*sc, type:'chunk' });
        }
      }
    },
    wind: {
      deathStyle: 'scatter',
      spawn: () => {
        /* Blown apart — particles spiral outward in a vortex */
        for(let i=0; i<Math.round(20*sc); i++){
          const a = (i/20)*Math.PI*2;
          const spd = 2+Math.random()*4;
          parts.push({ x:deathX, y:deathY,
            vx:Math.cos(a)*spd*sc + (Math.random()-0.5)*2,
            vy:Math.sin(a)*spd*sc - 1 - Math.random()*2,
            life:0.6+Math.random()*0.4,
            color:i%3===0?bodyColor:(['#7F8C8D','#BDC3C7','#ECF0F1'])[Math.floor(Math.random()*3)],
            size:(1.5+Math.random()*2)*sc });
        }
      }
    },
    dark: {
      deathStyle: 'implode',
      spawn: () => {
        /* Dark implosion — particles pull INWARD then burst */
        for(let i=0; i<Math.round(22*sc); i++){
          const a = Math.random()*Math.PI*2;
          const r = 20+Math.random()*15;
          /* Start far out, velocity toward center */
          parts.push({ x:deathX+Math.cos(a)*r, y:deathY+Math.sin(a)*r,
            vx:-Math.cos(a)*(3+Math.random()*4)*sc, vy:-Math.sin(a)*(3+Math.random()*4)*sc,
            life:0.6+Math.random()*0.3,
            color:(['#2C3E50','#1A1A2E','#0D0D1A','#4A235A'])[Math.floor(Math.random()*4)],
            size:(2+Math.random()*2)*sc });
        }
      }
    },
    light: {
      deathStyle: 'purify',
      spawn: () => {
        /* Purification — golden motes rise like released souls, body turns white */
        for(let i=0; i<Math.round(24*sc); i++){
          const isBeam = i < 6;
          parts.push({ x:deathX+(Math.random()-0.5)*(isBeam?4:bs*1.5), y:deathY+(isBeam?0:(Math.random()-0.5)*bs),
            vx:(Math.random()-0.5)*(isBeam?0.5:2), vy:isBeam?-3-Math.random()*4:-0.5-Math.random()*2,
            life:isBeam?1.0:0.6+Math.random()*0.4,
            color:isBeam?'#fff':(['#F1C40F','#F4D03F','#FEF9E7','#fff'])[Math.floor(Math.random()*4)],
            size:(isBeam?1:1.5+Math.random()*2)*sc });
        }
      }
    },
  };

  const s = styles[element];
  if(s){
    s.spawn();
    return { particles:parts, deathStyle:s.deathStyle };
  }
  return { particles:parts, deathStyle:'default' };
}

/* ── COLLISION-SPECIFIC DEATH FX ── */
/* Special deaths for collision kills — the showpiece moments */
function getCollisionDeathFX(deathX, deathY, collisionId, killAngle, bodySize, killScale) {
  const parts = [];
  const sc = killScale || 1;
  const bs = bodySize || 10;

  if(collisionId === 'eclipse') {
    /* ECLIPSE — dark/gold vortex implosion then burst */
    for(let i=0; i<40; i++){
      const a = (i/40)*Math.PI*2;
      const r = 25+Math.random()*20;
      const isDark = i%2===0;
      /* Phase 1: inward pull */
      parts.push({ x:deathX+Math.cos(a)*r, y:deathY+Math.sin(a)*r,
        vx:-Math.cos(a)*(4+Math.random()*3)*sc, vy:-Math.sin(a)*(4+Math.random()*3)*sc,
        life:1.2, color:isDark?'#2C3E50':'#F1C40F', size:(2+Math.random()*3)*sc });
    }
    /* Central burst — delayed by using high initial life */
    for(let i=0; i<20; i++){
      const a = Math.random()*Math.PI*2;
      parts.push({ x:deathX, y:deathY,
        vx:Math.cos(a)*(1+Math.random()*2)*sc, vy:Math.sin(a)*(1+Math.random()*2)*sc,
        life:1.5, color:i%3===0?'#fff':i%3===1?'#F1C40F':'#2C3E50', size:(1.5+Math.random()*2)*sc });
    }
  } else if(collisionId === 'steam' || collisionId === 'quench') {
    /* Steam cloud dissolution */
    for(let i=0; i<25; i++){
      parts.push({ x:deathX+(Math.random()-0.5)*bs*2, y:deathY+(Math.random()-0.5)*bs,
        vx:(Math.random()-0.5)*2, vy:-1.5-Math.random()*3,
        life:1.0+Math.random()*0.5, color:(['#ECF0F1','#D5DBDB','#fff','#AEB6BF'])[Math.floor(Math.random()*4)],
        size:(3+Math.random()*4)*sc });
    }
  } else if(collisionId === 'shatter') {
    /* Frost+Venom shatter — cracks then sharp fragments */
    for(let i=0; i<30; i++){
      const a = Math.random()*Math.PI*2;
      const spd = 3+Math.random()*7;
      parts.push({ x:deathX+(Math.random()-0.5)*4, y:deathY+(Math.random()-0.5)*4,
        vx:Math.cos(a)*spd*sc, vy:Math.sin(a)*spd*sc-2,
        life:0.7+Math.random()*0.4,
        color:i%2===0?'#2980B9':'#27AE60', size:(1.5+Math.random()*2.5)*sc });
    }
  } else if(collisionId === 'overcharge' || collisionId === 'divine_strike') {
    /* Massive single burst — white/element flash */
    for(let i=0; i<35; i++){
      const a = Math.random()*Math.PI*2;
      const spd = 5+Math.random()*8;
      parts.push({ x:deathX, y:deathY,
        vx:Math.cos(a)*spd*sc, vy:Math.sin(a)*spd*sc,
        life:0.3+Math.random()*0.3, color:i%4===0?'#fff':'#F1C40F', size:(2+Math.random()*3)*sc });
    }
  } else if(collisionId === 'hellfire') {
    /* Dark flame explosion */
    for(let i=0; i<30; i++){
      const a = Math.random()*Math.PI*2;
      parts.push({ x:deathX+(Math.random()-0.5)*8, y:deathY+(Math.random()-0.5)*8,
        vx:Math.cos(a)*(2+Math.random()*5)*sc, vy:Math.sin(a)*(2+Math.random()*5)*sc-2,
        life:0.7+Math.random()*0.4,
        color:(['#2C3E50','#C0392B','#E74C3C','#1A1A2E','#F39C12'])[Math.floor(Math.random()*5)],
        size:(2+Math.random()*3)*sc });
    }
  }
  /* For unlisted collisions, return empty — the element death will handle it */
  return parts;
}

/* Calculate amulet stat bonus from tier + gem */
function getAmuletBonus(amulet) {
  if(!amulet || !amulet.gem) return null;
  const gemStat = AMULET_GEM_STATS[amulet.gem];
  if(!gemStat) return null;
  const tierData = AMULET_TIERS[amulet.tier];
  const power = tierData?.basePower || 1.0;
  const value = Math.round((gemStat.base + gemStat.perPower * power) * 10) / 10;
  return { ...gemStat, value, element: amulet.gem };
}

/* Crafted at blacksmith using same ore tiers. Gem provides defensive stat boost. */

function getShieldBonus(shield) {
  if(!shield || !shield.gem) return null;
  const gemStat = SHIELD_GEM_STATS[shield.gem];
  if(!gemStat) return null;
  const bt = BLACKSMITH_TIERS[shield.gearBase];
  const power = bt ? bt.tierMult : 1.0;
  const value = Math.round((gemStat.base + gemStat.perPower * power) * 10) / 10;
  return { ...gemStat, value, element: shield.gem };
}

/* Shield base stats scale with tier multiplier from BLACKSMITH_TIERS */
function getShieldStats(shield) {
  if(!shield) return { blockBonus:0, staminaBonus:0, flatDef:0, gemBonus:null };
  const tierMult = shield.tierMult || (BLACKSMITH_TIERS[shield.gearBase]?.tierMult) || 1.0;
  /* Base block reduction bonus: 2% at tier 1.0, scaling up */
  const blockBonus = Math.round(2 * tierMult * 10) / 10;
  /* Extra shield stamina */
  const staminaBonus = Math.round(15 * tierMult);
  /* Flat damage reduction */
  const flatDef = Math.round(tierMult * 1.5 * 10) / 10;
  /* Gem bonus — uses SHIELD_GEM_STATS with perPower */
  let gemBonus = null;
  if(shield.gem && SHIELD_GEM_STATS[shield.gem]){
    const gs = SHIELD_GEM_STATS[shield.gem];
    const val = Math.round((gs.base + gs.perPower * tierMult) * 10) / 10;
    gemBonus = { ...gs, value: val, element: shield.gem };
  }
  return { blockBonus, staminaBonus, flatDef, gemBonus };
}

/* Calculate gem extraction cost based on item tier */
function gemExtractCost(item) {
  if(!item) return 0;
  const tierMult = item.tierMult || BLACKSMITH_TIERS[item.gearBase]?.tierMult || WOODWORKING_TIERS[item.gearBase?.replace('ww_','')]?.tierMult || 1;
  return Math.ceil(GEM_EXTRACT_BASE_COST * tierMult);
}

/* Calculate salvage returns for an item */
function getSalvageReturns(item) {
  if(!item || !item.gearBase) return null;
  /* Can't salvage if gem is still socketed */
  if(item.gem) return null;

  const isWood = item.gearBase.startsWith('ww_');
  const tierKey = isWood ? item.gearBase.slice(3) : item.gearBase;
  const tierTable = isWood ? WOODWORKING_TIERS : BLACKSMITH_TIERS;
  const tier = tierTable[tierKey];
  if(!tier) return null;

  const returns = [];
  if(isWood){
    const woodReturn = Math.max(1, Math.floor((tier.woodCost||3) * SALVAGE_RETURN_RATE));
    returns.push({ key:'wood_'+tier.wood, label:tier.wood.replace(/_/g,' '), qty:woodReturn, type:'wood' });
  } else {
    const oreReturn = Math.max(1, Math.floor((tier.oreCost||3) * SALVAGE_RETURN_RATE));
    returns.push({ key:'ore_'+tier.oreName+'_ore', label:tier.oreName+' ore', qty:oreReturn, type:'ore' });
  }
  const goldReturn = Math.max(1, Math.floor((tier.goldCost||10) * SALVAGE_RETURN_RATE));
  returns.push({ key:'_gold', label:'gold', qty:goldReturn, type:'gold' });
  return returns;
}

/* Calculate salvage returns for an amulet */
function getAmuletSalvageReturns(amulet) {
  if(!amulet) return null;
  if(amulet.gem) return null; /* must extract gem first */
  const tier = AMULET_TIERS[amulet.tier];
  if(!tier) return null;
  const barReturn = Math.max(1, Math.floor(tier.bars * SALVAGE_RETURN_RATE));
  const goldReturn = Math.max(1, Math.floor(tier.goldCost * SALVAGE_RETURN_RATE));
  return [
    { key:'_goldBars', label:'gold bars', qty:barReturn, type:'goldBars' },
    { key:'_gold', label:'gold', qty:goldReturn, type:'gold' },
  ];
}

/* Stat required to EQUIP gear by weapon type */
const EQUIP_STAT_MAP = {
  greatsword: 'power',    /* Heavy hitter */
  sword:      'agility',  /* Fast pressure */
  bow:        'agility',  /* Ranged precision */
  staff:      'mind',     /* Mana-dependent caster */
};
const SHIELD_EQUIP_STAT = 'endurance';
const ARMOR_EQUIP_STAT = 'vitality';
const AMULET_EQUIP_STAT = 'mind';

/* Check if player meets stat requirement for an item */
function canEquipItem(rpg, item, slotType) {
  if(!item || !item.gearBase) return true; /* non-crafted items have no stat gate */
  const isWood = item.gearBase?.startsWith('ww_');
  const tierKey = isWood ? item.gearBase.slice(3) : item.gearBase;
  const tierTable = isWood ? WOODWORKING_TIERS : BLACKSMITH_TIERS;
  let tier = tierTable[tierKey];
  /* Amulet uses AMULET_TIERS */
  if(slotType === 'amulet') tier = AMULET_TIERS[item.tier];
  if(!tier || !tier.statReq) return true;

  let reqStat, playerVal;
  if(slotType === 'shield'){
    reqStat = SHIELD_EQUIP_STAT;
    playerVal = rpg[reqStat] || 0;
  } else if(slotType === 'amulet'){
    reqStat = AMULET_EQUIP_STAT;
    playerVal = rpg[reqStat] || 0;
  } else if(slotType === 'armor'){
    reqStat = ARMOR_EQUIP_STAT;
    playerVal = rpg[reqStat] || 0;
  } else {
    /* Weapon — stat depends on weapon type */
    reqStat = EQUIP_STAT_MAP[item.type] || 'power';
    playerVal = rpg[reqStat] || 0;
  }
  return playerVal >= tier.statReq;
}

function getEquipReqLabel(item, slotType) {
  if(!item || !item.gearBase) return null;
  const isWood = item.gearBase?.startsWith('ww_');
  const tierKey = isWood ? item.gearBase.slice(3) : item.gearBase;
  const tierTable = isWood ? WOODWORKING_TIERS : BLACKSMITH_TIERS;
  let tier = tierTable[tierKey];
  if(slotType === 'amulet') tier = AMULET_TIERS[item.tier];
  if(!tier || !tier.statReq) return null;
  let reqStat;
  if(slotType === 'shield') reqStat = SHIELD_EQUIP_STAT;
  else if(slotType === 'amulet') reqStat = AMULET_EQUIP_STAT;
  else if(slotType === 'armor') reqStat = ARMOR_EQUIP_STAT;
  else reqStat = EQUIP_STAT_MAP[item.type] || 'power';
  return { stat: reqStat, req: tier.statReq, label: reqStat.charAt(0).toUpperCase()+reqStat.slice(1) };
}

/* ═══ REFORGE + HARDEN SYSTEM — RNG crafting depth ═══ */
/* Reforge: re-roll a random bonus on crafted gear (replaces previous bonus). Costs materials. */
/* Harden: attempt to add a SECOND bonus. Risk of breaking the item on failure. */
const REFORGE_BONUSES = [
  { id:'atkSpd',  label:'Attack Speed',  unit:'%', min:1, max:5, scale:0.03 },
  { id:'critCh',  label:'Crit Chance',   unit:'%', min:1, max:4, scale:0.025 },
  { id:'critDmg', label:'Crit Damage',   unit:'%', min:2, max:8, scale:0.04 },
  { id:'baseDmg', label:'Base Damage',   unit:'',  min:3, max:15,scale:0.8 },
  { id:'moveSpd', label:'Move Speed',    unit:'%', min:1, max:3, scale:0.02 },
  { id:'hp',      label:'Max HP',        unit:'',  min:5, max:30,scale:1.5 },
  { id:'mana',    label:'Max Mana',      unit:'',  min:3, max:20,scale:1.0 },
  { id:'elemDmg', label:'Elemental Dmg', unit:'%', min:1, max:5, scale:0.03 },
];

/* Roll a reforge bonus — higher tier items get better ranges */
function rollReforgeBonus(tierMult) {
  const bonus = REFORGE_BONUSES[Math.floor(Math.random() * REFORGE_BONUSES.length)];
  const tierScale = Math.max(1, tierMult);
  const value = bonus.min + Math.floor(Math.random() * (bonus.max - bonus.min + 1));
  const scaled = Math.round(value * tierScale * 10) / 10;
  return { id: bonus.id, label: bonus.label, unit: bonus.unit, value: scaled };
}

/* Harden success chance — decreases with tier, increases with skill level */
function hardenChance(tierMult, skillLevel) {
  const base = 0.75; /* 75% at tier 1 */
  const tierPenalty = Math.max(0, (tierMult - 1) * 0.08); /* -8% per tier mult above 1 */
  const skillBonus = skillLevel * 0.003; /* +0.3% per skill level */
  return Math.max(0.15, Math.min(0.90, base - tierPenalty + skillBonus));
}

/* §18.2 Gathering node definition — placed in combat zones */
function createGatheringNodes(zoneId, map) {
  const zone = ZONES[zoneId];
  if(!zone || !zone.element || zone.safe) return [];
  const nodes = [];
  const res = ZONE_RESOURCES[zone.element];
  if(!res) return [];
  const W = zone.w, H = zone.h;

  /* Place nodes on grass tiles, avoiding edges */
  const nodeCount = 8;
  let placed = 0;
  for(let attempt=0; attempt < 200 && placed < nodeCount; attempt++){
    const tx = 3 + Math.floor(Math.random()*(W-6));
    const ty = 3 + Math.floor(Math.random()*(H-6));
    if(map[ty]?.[tx] === 0){ /* grass only */
      /* Determine tier based on position (deeper = further from entrance) */
      const depthPct = Math.min(1, Math.sqrt(tx*tx + ty*ty) / Math.sqrt(W*W + H*H) * 1.5);
      const tier = Math.min(5, Math.max(1, Math.ceil(depthPct * 3)));
      const gatherLvlReq = DEPTH_TIERS[tier-1]?.gatherLvl || 1;

      nodes.push({
        id: 'node-'+zoneId+'-'+placed,
        x: tx*TILE + TILE/2,
        y: ty*TILE + TILE/2,
        tier,
        element: zone.element,
        resourceType: Math.random() < 0.5 ? 'crystal' : (Math.random() < 0.5 ? 'ore' : 'herb'),
        gatherLvlReq,
        depleted: false,
        respawnAt: 0,
        respawnTime: 30000 + tier * 15000, /* higher tier = longer respawn */
      });
      placed++;
    }
  }
  return nodes;
}

/* §18 Fish Healing — fish must be COOKED via minigame to become edible */
/* Raw fish → cooking minigame → cooked fish (heals) or burnt fish (wasted) */
function getFishHealAmount(fishKey) {
  const name = fishKey.replace(/^(fish_|cooked_)/,'').toLowerCase();
  const tier = FISHING_TIERS.find(t => name.includes(t.name.toLowerCase().replace(/\s+/g,'_')));
  if(!tier) return 20;
  return Math.ceil(15 + tier.lvl * 8);
}

function getFishTierLevel(fishKey) {
  const name = fishKey.replace(/^fish_/,'').toLowerCase();
  const tier = FISHING_TIERS.find(t => name.includes(t.name.toLowerCase().replace(/\s+/g,'_')));
  return tier ? tier.lvl : 1;
}

/* Cooking minigame sweet spot: cookingLevel widens it, fishTier narrows it */
/* Returns {center: 0-1, width: 0-1} — center is random, width is the green zone fraction */
function getCookingSweetSpot(cookingLevel, fishTierLvl) {
  /* Base width: 40% of bar. Cooking level adds up to +30%. Fish tier subtracts up to -25%. */
  const baseWidth = 0.40;
  const skillBonus = Math.min(0.30, cookingLevel * 0.004); /* +0.4% per level, max +30% */
  const tierPenalty = Math.min(0.25, fishTierLvl * 0.003); /* -0.3% per fish tier level, max -25% */
  const width = Math.max(0.10, Math.min(0.65, baseWidth + skillBonus - tierPenalty));
  /* Center is random but always allows the full sweet spot to fit */
  const halfW = width / 2;
  const center = halfW + Math.random() * (1 - width);
  return { center, width };
}

/* Migrate old saves — convert gathering → mining, ensure new skills exist */
function migrateLifeSkills(sk) {
  if(!sk) return createDefaultLifeSkills();
  /* Migrate gathering → mining if old save */
  if(sk.gathering && sk.gathering.level && !sk.mining) {
    sk.mining = { level: sk.gathering.level, xp: sk.gathering.xp || 0 };
    sk.gathering = null;
  }
  /* Ensure all new skills exist */
  if(!sk.woodcutting) sk.woodcutting = { level:1, xp:0 };
  if(!sk.fishing)     sk.fishing = { level:1, xp:0 };
  if(!sk.mining)      sk.mining = { level:1, xp:0 };
  if(!sk.blacksmithing) sk.blacksmithing = { level:1, xp:0 };
  if(!sk.woodworking) sk.woodworking = { level:1, xp:0 };
  if(!sk.gemCutting)  sk.gemCutting = { level:1, xp:0 };
  if(!sk.gems)        sk.gems = {};
  if(!sk.resources)   sk.resources = {};
  if(!sk.farmPlots)   sk.farmPlots = {};
  if(!sk.dungeonClears) sk.dungeonClears = {};
  if(!sk.pets)        sk.pets = [];
  return sk;
}

/* §18.3 Minigame system — timing bar used by gathering, cooking, enchanting, trapping */
/* Returns: 'perfect' (center), 'good' (near center), 'ok' (hit zone), 'miss' (outside) */
function evaluateMinigame(progress, target, targetSize) {
  const dist = Math.abs(progress - target);
  if(dist <= targetSize * 0.2) return 'perfect';
  if(dist <= targetSize * 0.5) return 'good';
  if(dist <= targetSize) return 'ok';
  return 'miss';
}

/* Award life skill XP */
function awardSkillXp(skills, skillName, amount) {
  const skill = skills[skillName];
  if(!skill) return false;
  skill.xp += amount;
  let leveled = false;
  while(skill.xp >= skillXpRequired(skill.level) && skill.level < 100){
    skill.xp -= skillXpRequired(skill.level);
    skill.level++;
    leveled = true;
  }
  return leveled;
}

/* Add resource to inventory */
function addResource(skills, element, type, tier, amount) {

/* Get resource count */

/* Check if player has cleared a dungeon depth for a zone */
function hasDungeonClear(skills, zoneId, depthId) {
  return !!skills.dungeonClears[zoneId+'_'+depthId];

/* Get maximum accessible depth tier for a zone */
function getMaxDepth(skills, zoneId) {
  for(let i=DEPTH_TIERS.length-1; i>=0; i--){
    const dt = DEPTH_TIERS[i];
    if(!dt.gate) return i; /* shallow is always accessible */
    if(hasDungeonClear(skills, zoneId, dt.gate)) return i;
  }
  return 0;
}

/* Generate a zone map. Town has buildings+paths. Combat zones have themed terrain. */
function generateZoneMap(zoneId) {
  const zone = ZONES[zoneId];
  const W = zone.w, H = zone.h;
  const map = Array.from({length:H}, ()=> Array(W).fill(0));
  const MX = Math.floor(W/2), MY = Math.floor(H/2);

  if(zoneId === 'town'){
    /* ═══ TOWN — paths, buildings, exits ═══ */
    /* Main cross paths */
    for(let x=0;x<W;x++){ map[MY][x]=1; map[MY+1][x]=1; }
    for(let y=0;y<H;y++){ map[y][MX]=1; map[y][MX+1]=1; }
    /* Ring path around center */
    const ringR = 8;
    for(let a=0;a<360;a+=1){
      const rx = Math.round(MX+Math.cos(a*Math.PI/180)*ringR);
      const ry = Math.round(MY+Math.sin(a*Math.PI/180)*ringR);
      if(rx>=0&&rx<W&&ry>=0&&ry<H) map[ry][rx]=1;
    }
    /* Buildings */
    TOWN_BUILDINGS.forEach(b => {
      for(let dy=0;dy<b.bh;dy++) for(let dx=0;dx<b.bw;dx++){
        const ty=b.by+dy, tx=b.bx+dx;
        if(ty>=0&&ty<H&&tx>=0&&tx<W) map[ty][tx]=3;
      }
    });
    /* Flowers near buildings */
    TOWN_BUILDINGS.forEach(b => {
      for(let i=0;i<6;i++){
        const fx=b.bx+Math.floor(Math.random()*(b.bw+4))-2;
        const fy=b.by+b.bh+Math.floor(Math.random()*2);
        if(fx>=0&&fx<W&&fy>=0&&fy<H&&map[fy][fx]===0) map[fy][fx]=5;
      }
    });
    /* Exit paths — wider paths leading to zone edges */
    TOWN_EXITS.forEach(ex => {
      if(ex.dir==='north') for(let y=0;y<MY;y++){ map[y][ex.tx]=1; map[y][ex.tx+1]=1; }
      if(ex.dir==='south') for(let y=MY;y<H;y++){ map[y][ex.tx]=1; map[y][ex.tx+1]=1; }
      if(ex.dir==='east')  for(let x=MX;x<W;x++){ map[ex.ty][x]=1; map[ex.ty+1][x]=1; }
      if(ex.dir==='west')  for(let x=0;x<MX;x++){ map[ex.ty][x]=1; map[ex.ty+1][x]=1; }
      /* Exit marker tile (type 8 = exit) */
      if(ex.dir==='north') { map[0][ex.tx]=8; map[0][ex.tx+1]=8; }
      if(ex.dir==='south') { map[H-1][ex.tx]=8; map[H-1][ex.tx+1]=8; }
      if(ex.dir==='east')  { map[ex.ty][W-1]=8; map[ex.ty+1][W-1]=8; }
      if(ex.dir==='west')  { map[ex.ty][0]=8; map[ex.ty+1][0]=8; }
    });
    /* Scattered trees */
    for(let i=0;i<30;i++){
      const tx=Math.floor(Math.random()*W), ty=Math.floor(Math.random()*H);
      if(map[ty][tx]===0) map[ty][tx]=4;
    }
    /* Pond near center */
    for(let dy=-2;dy<=2;dy++) for(let dx=-3;dx<=3;dx++){
      if(Math.sqrt(dx*dx+dy*dy)<2.8){
        const py=MY-5+dy, px=MX+8+dx;
        if(py>=0&&py<H&&px>=0&&px<W&&map[py][px]===0) map[py][px]=2;
      }
    }
  } else if(zoneId === 'wasteland'){
    /* ═══ WASTELAND — lawless PvP zone ═══ */
    /* Safe spawn pad in bottom-center, surrounded by fence (tile 11) */
    const padX = MX - 4, padY = H - 10, padW = 9, padH = 6;

    /* Ground is barren wasteland */
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      if(Math.random()<0.15) map[y][x] = 7; /* scattered rocks */
      else if(Math.random()<0.03) map[y][x] = 6; /* sand patches */
    }

    /* Spawn pad — path tiles (safe area) */
    for(let dy=0;dy<padH;dy++) for(let dx=0;dx<padW;dx++){
      map[padY+dy][padX+dx] = 1;
    }

    /* Fence around spawn pad — tile 11 (new: fence) */
    for(let dx=-1;dx<=padW;dx++){
      if(padX+dx>=0&&padX+dx<W){ map[padY-1][padX+dx]=11; map[padY+padH][padX+dx]=11; }
    }
    for(let dy=-1;dy<=padH;dy++){
      if(padY+dy>=0&&padY+dy<H){ map[padY+dy][padX-1]=11; map[padY+dy][padX+padW]=11; }
    }

    /* Gate opening — front of fence (north side, center) */
    map[padY-1][MX] = 12; /* gate tile — climbable */
    map[padY-1][MX+1] = 12;

    /* Path from gate into the wasteland */
    for(let y=0;y<padY-1;y++){ map[y][MX]=1; map[y][MX+1]=1; }

    /* Return exit at bottom edge */
    map[H-1][MX] = 9; map[H-1][MX+1] = 9;

    /* Store fence bounds for lawless check */
    ZONES.wasteland._safePad = {x:padX*TILE, y:padY*TILE, w:padW*TILE, h:padH*TILE};
    ZONES.wasteland._gateY = (padY-1)*TILE;

  } else if(zoneId === 'farm_home'){
    /* ═══ PERSONAL FARM — house, plots, garden, path to exit ═══ */
    /* Grass everywhere */
    for(let y=0;y<H;y++) for(let x=0;x<W;x++) map[y][x] = 0;

    /* Path from entrance (south) to house (north-center) */
    for(let y=3;y<H;y++){ map[y][MX]=1; map[y][MX+1]=1; }

    /* House — 5x4 building tiles in upper area */
    const hx=MX-2, hy=3;
    for(let dy=0;dy<4;dy++) for(let dx=0;dx<5;dx++) map[hy+dy][hx+dx]=3;
    /* House door — walkable path tile at center bottom */
    map[hy+3][MX]=1; map[hy+3][MX+1]=1;

    /* Farm plots — 3x2 grid of sand tiles (tilled soil) on the left */
    for(let py=0;py<3;py++) for(let px=0;px<4;px++){
      const fx=3+px, fy=10+py*3;
      for(let dy=0;dy<2;dy++) for(let dx=0;dx<3;dx++){
        if(fy+dy<H && fx+dx<W) map[fy+dy][fx+dx]=6;
      }
    }

    /* Garden — flower tiles on the right */
    for(let gy=10;gy<18;gy++) for(let gx=W-8;gx<W-3;gx++){
      if(Math.random()<0.6) map[gy][gx]=5;
    }

    /* Fence border — trees around edges */
    for(let x=0;x<W;x++){ map[0][x]=4; map[1][x]=4; map[H-1][x]=4; }
    for(let y=0;y<H;y++){ map[y][0]=4; map[y][1]=4; map[y][W-1]=4; map[y][W-2]=4; }

    /* Return exit at bottom */
    map[H-1][MX]=9; map[H-1][MX+1]=9; map[H-2][MX]=1; map[H-2][MX+1]=1;

    /* Water feature — small pond */
    for(let dy=-1;dy<=1;dy++) for(let dx=-2;dx<=2;dx++){
      const px2=W-6+dx, py2=6+dy;
      if(px2>1&&px2<W-2&&py2>1&&py2<H-2&&(dx*dx+dy*dy*2)<6) map[py2][px2]=2;
    }

    /* Store house location for sleep mechanic */
    ZONES.farm_home._house = {x:(hx+2)*TILE, y:(hy+2)*TILE, w:5*TILE, h:4*TILE};

  } else {
    /* ═══ COMBAT ZONE — single entrance (south), dungeon at far north ═══ */
    const elem = zone.element;

    /* All edges are walls (tile 7 = rock/wall) except south entrance */
    for(let x=0;x<W;x++){ map[0][x]=7; map[H-1][x]=7; }
    for(let y=0;y<H;y++){ map[y][0]=7; map[y][W-1]=7; }

    /* South entrance — 4-tile-wide gap in the south wall = return to town (tile 9) */
    for(let dx=-2;dx<=1;dx++){
      map[H-1][MX+dx]=9;
      map[H-2][MX+dx]=1; /* path leading in */
    }

    /* Main road from south entrance to dungeon at north */
    for(let y=2;y<H-2;y++){ map[y][MX]=1; map[y][MX+1]=1; }

    /* Side paths branching off the main road */
    const branchYs = [Math.floor(H*0.3), Math.floor(H*0.5), Math.floor(H*0.7)];
    branchYs.forEach(by => {
      /* Left branch */
      for(let x=3;x<MX;x++) map[by][x]=1;
      /* Right branch */
      for(let x=MX+2;x<W-3;x++) map[by][x]=1;
    });

    /* Dungeon entrance (tile 10) at the far north end of the road */
    const dungX = MX, dungY = 2;
    map[dungY][dungX] = 10; map[dungY][dungX+1] = 10;
    /* Short path to dungeon */
    map[dungY+1][dungX]=1; map[dungY+1][dungX+1]=1;

    /* ═══ ZONE-SPECIFIC TERRAIN PATTERNS ═══ */
    /* Seeded random for consistent terrain per zone */
    const _seed = zoneId.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const _sr = (i) => { let s=_seed*9301+i*49297+49831; s=((s*s)>>>0)%233280; return s/233280; };
    let _si = 0;
    const sr = () => _sr(_si++);

    if(elem === 'flame'){
      /* EMBER FIELDS: Lava rivers cutting through scorched earth, volcanic rock clusters */
      /* Lava rivers — sinuous water-tile streams (rendered as lava via zone tinting) */
      for(let rv=0;rv<3;rv++){
        let rx = Math.floor(sr()*W*0.6)+Math.floor(W*0.2);
        let ry = 2;
        while(ry < H-2){
          if(map[ry][rx]===0) map[ry][rx]=2; /* lava = water tile tinted by zone */
          if(rx>1 && map[ry][rx-1]===0) map[ry][rx-1]=2;
          rx += Math.floor(sr()*3)-1;
          rx = Math.max(2, Math.min(W-3, rx));
          ry++;
        }
      }
      /* Volcanic rock clusters — irregular stone blobs */
      for(let vc=0;vc<8;vc++){
        const vcx=Math.floor(sr()*(W-8))+4, vcy=Math.floor(sr()*(H-8))+4;
        const vcr = 2+Math.floor(sr()*2);
        for(let dy=-vcr;dy<=vcr;dy++) for(let dx=-vcr;dx<=vcr;dx++){
          if(Math.sqrt(dx*dx+dy*dy)<=vcr+sr()*0.8){
            const ty=vcy+dy, tx=vcx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=7;
          }
        }
      }
      /* Charred stumps (sparse trees) */
      for(let i=0;i<8;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else if(elem === 'frost'){
      /* FROZEN SHORE: Large ice sheets (water), snow drifts (sand), frozen trees */
      /* Ice lake — large frozen body of water in center-west */
      const iceX=Math.floor(W*0.25), iceY=Math.floor(H*0.3);
      for(let dy=-6;dy<=6;dy++) for(let dx=-8;dx<=8;dx++){
        if((dx*dx)/(8*8)+(dy*dy)/(6*6) < 1+sr()*0.2){
          const ty=iceY+dy, tx=iceX+dx;
          if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
        }
      }
      /* Snow drifts (sand tiles rendered white via zone) — windswept banks */
      for(let sd=0;sd<12;sd++){
        const sx2=Math.floor(sr()*W), sy2=Math.floor(sr()*H);
        for(let dx=-3;dx<=3;dx++) for(let dy=-1;dy<=1;dy++){
          const tx=sx2+dx, ty=sy2+dy;
          if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=6;
        }
      }
      /* Frozen trees — sparse, along edges */
      for(let i=0;i<15;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
      /* Scattered ice patches */
      for(let i=0;i<20;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=2; }
    } else if(elem === 'venom'){
      /* MISTWOOD: Dense canopy with winding paths through bogs */
      /* Dense tree clusters forming walls */
      for(let tc=0;tc<12;tc++){
        const tcx=Math.floor(sr()*(W-6))+3, tcy=Math.floor(sr()*(H-6))+3;
        const tcr=2+Math.floor(sr()*3);
        for(let dy=-tcr;dy<=tcr;dy++) for(let dx=-tcr;dx<=tcr;dx++){
          if(Math.abs(dx)+Math.abs(dy)<=tcr+Math.floor(sr()*2)){
            const ty=tcy+dy, tx=tcx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=4;
          }
        }
      }
      /* Bog pools — small murky water patches */
      for(let bp=0;bp<8;bp++){
        const bpx=Math.floor(sr()*(W-4))+2, bpy=Math.floor(sr()*(H-4))+2;
        for(let dy=-1;dy<=1;dy++) for(let dx=-2;dx<=2;dx++){
          if(Math.abs(dx)+Math.abs(dy)<=2){
            const ty=bpy+dy, tx=bpx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
          }
        }
      }
      /* Mushroom meadows (flowers) */
      for(let i=0;i<15;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=5; }
    } else if(elem === 'storm'){
      /* THUNDER PEAKS: Rocky mountain ridges, open plateaus, lightning-scarred ground */
      /* Mountain ridges — long horizontal stone bands */
      for(let ridge=0;ridge<4;ridge++){
        const ry2 = Math.floor(H*0.15) + Math.floor(sr()*H*0.7);
        const rxStart = Math.floor(sr()*Math.floor(W*0.3));
        const rxEnd = rxStart + Math.floor(W*0.3) + Math.floor(sr()*Math.floor(W*0.4));
        for(let rx=rxStart;rx<Math.min(rxEnd,W-1);rx++){
          const thickness = 1+Math.floor(sr()*2);
          for(let t=0;t<thickness;t++){
            const ty=ry2+t;
            if(ty>0&&ty<H-1&&rx>0&&map[ty][rx]===0) map[ty][rx]=7;
          }
        }
      }
      /* Scattered boulders */
      for(let i=0;i<15;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=7; }
      /* Lightning-blasted trees (sparse) */
      for(let i=0;i<6;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else if(elem === 'stone'){
      /* DEEP HOLLOWS: Cave walls funneling paths, crystal deposits, stalagmites */
      /* Cave wall borders — thick stone perimeter leaving inner cavern */
      for(let y2=0;y2<H;y2++) for(let x2=0;x2<W;x2++){
        if(map[y2][x2]!==0) continue;
        const edgeDist = Math.min(x2, y2, W-1-x2, H-1-y2);
        if(edgeDist < 3+Math.floor(sr()*3)){
          map[y2][x2]=7; /* cave wall */
        }
      }
      /* Stalagmite clusters — scattered stone pillars inside */
      for(let sg=0;sg<12;sg++){
        const sgx=5+Math.floor(sr()*(W-10)), sgy=5+Math.floor(sr()*(H-10));
        if(map[sgy]?.[sgx]===0) map[sgy][sgx]=7;
        if(map[sgy-1]?.[sgx]===0) map[sgy-1][sgx]=7;
      }
      /* Crystal deposits (flowers rendered as crystals via zone) */
      for(let i=0;i<10;i++){ const tx=5+Math.floor(sr()*(W-10)),ty=5+Math.floor(sr()*(H-10)); if(map[ty]?.[tx]===0) map[ty][tx]=5; }
    } else if(elem === 'wind'){
      /* SKY REACHES: Wide open plateaus, cloud wisps (flowers), floating island gaps */
      /* Cloud patches (flowers) — large clusters */
      for(let cp=0;cp<10;cp++){
        const cpx=Math.floor(sr()*W), cpy=Math.floor(sr()*H);
        const cpr=2+Math.floor(sr()*3);
        for(let dy=-cpr;dy<=cpr;dy++) for(let dx=-cpr*2;dx<=cpr*2;dx++){
          if((dx*dx)/(cpr*cpr*4)+(dy*dy)/(cpr*cpr)<1){
            const ty=cpy+dy, tx=cpx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=5;
          }
        }
      }
      /* Floating island gaps — water chasms */
      for(let g=0;g<3;g++){
        const gx=Math.floor(sr()*(W-6))+3, gy=Math.floor(sr()*(H-6))+3;
        for(let dy=-2;dy<=2;dy++) for(let dx=-4;dx<=4;dx++){
          if(Math.abs(dx*dy)<6){
            const ty=gy+dy, tx=gx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
          }
        }
      }
      /* Very sparse wind-bent trees */
      for(let i=0;i<5;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else if(elem === 'water'){
      /* TIDAL CAVES: Coastline with sand/water gradients, coral formations, tidal pools */
      /* Large tidal pool in upper area */
      const poolX=Math.floor(W*0.5), poolY=Math.floor(H*0.25);
      for(let dy=-5;dy<=5;dy++) for(let dx=-10;dx<=10;dx++){
        if((dx*dx)/(10*10)+(dy*dy)/(5*5)<1+sr()*0.15){
          const ty=poolY+dy, tx=poolX+dx;
          if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=2;
        }
      }
      /* Sandy beach borders around water */
      for(let y2=1;y2<H-1;y2++) for(let x2=1;x2<W-1;x2++){
        if(map[y2][x2]!==0) continue;
        let nearWater=false;
        for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
          if(map[y2+dy]?.[x2+dx]===2) nearWater=true;
        }
        if(nearWater && sr()<0.6) map[y2][x2]=6;
      }
      /* Coral formations (stone) */
      for(let i=0;i<8;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=7; }
      /* Seaweed patches (trees) */
      for(let i=0;i<10;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
      /* Extra scattered water */
      for(let i=0;i<25;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0&&sr()<0.5) map[ty][tx]=2; }
    } else if(elem === 'dark'){
      /* SHADOW SANCTUM: Void cracks, ritual circles, oppressive dark trees */
      /* Dense shadow trees — clustered walls */
      for(let tc=0;tc<15;tc++){
        const tcx=Math.floor(sr()*(W-4))+2, tcy=Math.floor(sr()*(H-4))+2;
        const tcr=1+Math.floor(sr()*2);
        for(let dy=-tcr;dy<=tcr;dy++) for(let dx=-tcr;dx<=tcr;dx++){
          if(dx*dx+dy*dy<=tcr*tcr+1){
            const ty=tcy+dy, tx=tcx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=4;
          }
        }
      }
      /* Void cracks — thin water (rendered as void via zone) */
      for(let vc=0;vc<4;vc++){
        let vx=2+Math.floor(sr()*(W-4)), vy=2+Math.floor(sr()*(H-4));
        for(let step=0;step<12;step++){
          if(vy>0&&vy<H-1&&vx>0&&vx<W-1&&map[vy][vx]===0) map[vy][vx]=2;
          vx+=Math.floor(sr()*3)-1; vy+=Math.floor(sr()*3)-1;
          vx=Math.max(1,Math.min(W-2,vx)); vy=Math.max(1,Math.min(H-2,vy));
        }
      }
      /* Dark ritual altars (stone) */
      for(let i=0;i<6;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=7; }
    } else if(elem === 'light'){
      /* RADIANT HEIGHTS: Crystal spires, golden meadows, symmetrical clearings */
      /* Golden meadow patches (flowers) — large circles */
      for(let gm=0;gm<8;gm++){
        const gmx=Math.floor(sr()*(W-6))+3, gmy=Math.floor(sr()*(H-6))+3;
        const gmr=2+Math.floor(sr()*2);
        for(let dy=-gmr;dy<=gmr;dy++) for(let dx=-gmr;dx<=gmr;dx++){
          if(dx*dx+dy*dy<=gmr*gmr){
            const ty=gmy+dy, tx=gmx+dx;
            if(ty>0&&ty<H-1&&tx>0&&tx<W-1&&map[ty][tx]===0) map[ty][tx]=5;
          }
        }
      }
      /* Crystal spires (stone — rendered as light pillars) */
      for(let cs=0;cs<10;cs++){
        const csx=Math.floor(sr()*(W-4))+2, csy=Math.floor(sr()*(H-4))+2;
        if(map[csy]?.[csx]===0){ map[csy][csx]=7; if(csy>1&&map[csy-1][csx]===0) map[csy-1][csx]=7; }
      }
      /* Sparse white trees */
      for(let i=0;i<8;i++){ const tx=Math.floor(sr()*W),ty=Math.floor(sr()*H); if(map[ty]?.[tx]===0) map[ty][tx]=4; }
    } else {
      /* MEADOW / fallback: gentle rolling terrain */
      for(let y2=0;y2<H;y2++) for(let x2=0;x2<W;x2++){
        if(map[y2][x2]!==0) continue;
        if(sr()<0.04) map[y2][x2]=4; /* trees */
        else if(sr()<0.03) map[y2][x2]=5; /* flowers */
        else if(sr()<0.02) map[y2][x2]=2; /* ponds */
      }
    }
  }

  return map;
}

/* ═══ ZONE TRANSITION ═══ */
function spawnMonstersForZone(zone, levelMod) {
  const monsters = [];
  if(!zone.spawns) return monsters;
  const W = zone.w * TILE, H = zone.h * TILE;
  const margin = 4 * TILE;
  const lm = levelMod || 0;
  let idx = 0;
  zone.spawns.forEach(({arch, count}) => {
    for(let i=0; i<count; i++){
      const x = margin + Math.random()*(W - margin*2);
      const y = margin + Math.random()*(H - margin*2);
      const depthPct = Math.max(0, Math.min(1, y / H));
      const baseLvl = (zone.level[0] || 1) + lm;
      const maxLvl = (zone.level[1] || 10) + lm;
      const lvl = Math.max(1, Math.round(baseLvl + depthPct * (maxLvl - baseLvl)));
      const m = createMonster('m-'+zone.id+'-'+idx, arch, lvl, x, y, zone.element);
      m.curHp = m.hp; m.type = arch;
      monsters.push(m);
      idx++;
    }
  });
  return monsters;
}

/* ═══ GEAR STAT REQUIREMENTS — Tier 1 stat thresholds replace level gating ═══ */
/* Each gear type requires a specific Tier 1 stat. Threshold = tierIndex × 10. */
const GEAR_STAT_REQ = {
  greatsword: 'power',     /* Heavy hitter identity */
  sword:      'agility',   /* Fast pressure identity */
  bow:        'agility',   /* Ranged precision */
  staff:      'mind',      /* Mana-dependent caster */
  shield:     'endurance', /* Stamina-based blocking */
  armor:      'vitality',  /* HP-based survival */
  amulet:     'mind',      /* Enhancement/utility */
};

/* Calculate the stat requirement for a given crafting tier */
/* tierIndex: 0-based position in the tier table (0=first tier, 19=last) */
function getGearStatReq(gearType, tierIndex) {
  const stat = GEAR_STAT_REQ[gearType];
  if(!stat) return { stat:'power', value:0 };
  return { stat, value: tierIndex * 10 };
}

/* Check if player meets the stat requirement for a piece of gear */
function meetsGearReq(rpg, gearType, tierIndex) {
  const req = getGearStatReq(gearType, tierIndex);
  return (rpg[req.stat] || 0) >= req.value;
}

/* Get the stat name for display */
const STAT_LABELS = {
  power:'Power', vitality:'Vitality', endurance:'Endurance', agility:'Agility', mind:'Mind',
};

/* Check stat requirement for a specific item (works with crafted gearBase or dropped tierMult) */
function meetsStatReq(rpg, item, weaponType) {
  if(!item || !weaponType) return true;
  const gearType = GEAR_STAT_REQ[weaponType] ? weaponType : 'greatsword';
  const stat = GEAR_STAT_REQ[gearType];
  if(!stat) return true;

  /* For crafted items with gearBase — look up tier index */
  if(item.gearBase){
    const isWW = item.gearBase.startsWith('ww_');
    const tierKey = isWW ? item.gearBase.slice(3) : item.gearBase;
    const table = isWW ? WOODWORKING_TIERS : BLACKSMITH_TIERS;
    const tierIdx = Object.keys(table).indexOf(tierKey);
    if(tierIdx < 0) return true;
    return (rpg[stat]||0) >= tierIdx * 10;
  }

  /* For dropped items — estimate tier from tierMult */
  const tierMult = item.tierMult || 1;
  /* Approximate: tierMult 1.0=tier0, 1.5=tier5, 2.0=tier8, 3.0=tier12, 6.0=tier19 */
  const estIdx = Math.max(0, Math.round((tierMult - 1) * 6));
  return (rpg[stat]||0) >= estIdx * 10;
}

/* §10.2 Effectiveness Circle */
const EFFECTIVENESS = [
  ['flame','frost'], ['frost','storm'], ['storm','stone'],
  ['stone','wind'],  ['wind','venom'],  ['venom','water'], ['water','flame'],
];
function getEffectiveness(attackElem, targetElem) {
  if (!attackElem || !targetElem || attackElem === targetElem) return 1.0;
  /* Dark <-> Light mutual bonus */
  if ((attackElem==='dark'&&targetElem==='light')||(attackElem==='light'&&targetElem==='dark')) return 1.25;
  for (const [strong, weak] of EFFECTIVENESS) {
    if (attackElem===strong && targetElem===weak) return 1.25;
    if (attackElem===weak && targetElem===strong) return 0.75;
  }
  return 1.0;
}

/* ═══ STATUS EFFECT SYSTEM — §9 ═══ */

/* Apply a status to a target. Returns true if applied. */
function applyStatus(target, statusId, source, now) {
  if(!target.statuses) target.statuses = {};
  const def = STATUS_DEFS[statusId];
  if(!def) return false;

  const existing = target.statuses[statusId];
  if(existing) {
    /* Refresh — extend or reset duration */
    if(def.refresh > 0) {
      existing.remaining = Math.min(existing.remaining + def.refresh, def.maxDur);
    } else {
      existing.remaining = def.dur; /* reset */
    }
    /* Stack if applicable (Fracture) */
    if(def.maxStacks && existing.stacks < def.maxStacks) {
      existing.stacks++;
    }
    existing.lastRefresh = now;
    return true;
  }

  /* New application */
  /* §2.6 Influence — increases CC duration applied by player */
  const influenceBonus = source?._rpgInfluence ? (1 + source._rpgInfluence * 0.003) : 1.0;
  target.statuses[statusId] = {
    id: statusId,
    remaining: def.dur * influenceBonus,
    maxDur: (def.maxDur || def.dur) * influenceBonus,
    stacks: 1,
    source: source,
    appliedAt: now,
    lastRefresh: now,
    lastTick: now,
    element: Object.keys(ELEMENTS).find(e => ELEMENTS[e].status === statusId) || null,
  };
  return true;
}

/* Tick all statuses on a target. Applies DoT damage. Returns array of expired status IDs. */
function tickStatuses(target, dt, now, rpg) {
  if(!target.statuses) return [];
  const expired = [];
  const emMult = rpg ? (1 + (rpg.elementalMastery||0) * 0.0015) : 1;

  for(const [id, status] of Object.entries(target.statuses)) {
    status.remaining -= dt;

    /* DoT ticking */
    const def = STATUS_DEFS[id];
    if(def.tick && now - status.lastTick >= def.tick * 1000) {
      status.lastTick = now;
      let dotDmg = 0;
      if(id === 'burn') dotDmg = (5 + (rpg?.power||0) * 0.3) * emMult;
      if(id === 'root') dotDmg = (3 + (rpg?.power||0) * 0.15) * emMult;
      if(dotDmg > 0) {
        target.curHp = (target.curHp||target.hp) - Math.round(dotDmg);
        target._lastDotDmg = { amount: Math.round(dotDmg), statusId: id, ts: now };
      }
    }

    if(status.remaining <= 0) {
      expired.push(id);
      delete target.statuses[id];
    }
  }
  return expired;
}

/* Get the element of the oldest status on a target (for collision detection) */
function getOldestStatusElement(target) {
  if(!target.statuses) return null;
  let oldest = null, oldestTime = Infinity;
  for(const [id, status] of Object.entries(target.statuses)) {
    if(status.appliedAt < oldestTime) {
      oldestTime = status.appliedAt;
      oldest = status;
    }
  }
  return oldest ? oldest.element : null;
}

/* Make collision lookup bidirectional (setup+trigger order doesn't matter for lookup, but
   we always consume the SETUP status, which is the one already on the target) */
function lookupCollision(setupElement, triggerElement) {
  return COLLISION_TABLE[setupElement+'|'+triggerElement]
      || COLLISION_TABLE[triggerElement+'|'+setupElement]
      || null;
}

/* §10.3 Resolve a collision. Returns collision damage dealt, or 0 if no collision. */
function resolveCollision(target, triggerElement, source, rpg, now) {
  if(!target.statuses) return null;

  /* Find the oldest status with a different element than the trigger */
  let setupStatus = null, setupElement = null;
  let oldestTime = Infinity;
  for(const [id, status] of Object.entries(target.statuses)) {
    if(status.element && status.element !== triggerElement && status.appliedAt < oldestTime) {
      oldestTime = status.appliedAt;
      setupStatus = status;
      setupElement = status.element;
    }
  }

  if(!setupElement) return null;

  const collision = lookupCollision(setupElement, triggerElement);
  if(!collision) return null;

  /* Calculate collision damage — §10.6 */
  const statValue = rpg[collision.stat] || 0;
  let dmg = collision.base + statValue * collision.coeff;

  /* Elemental Mastery multiplier — §2.2 */
  dmg *= (1 + (rpg.elementalMastery||0) * 0.0015);

  /* Volatile bonus — §4.7 */
  const activeWpn = getActiveWeapon(rpg);
  if(activeWpn.isVolatile) dmg *= 1.30;

  /* Effectiveness — §10.2 */
  if(target.element) dmg *= getEffectiveness(triggerElement, target.element);

  /* Consume setup status */
  delete target.statuses[setupStatus.id];

  /* §3.5 Mana restore */
  let manaRestored = 0;
  if(rpg && now - (source._lastCollisionMana||0) >= 3000) {
    source._lastCollisionMana = now;
    const baseRestore = 0.04 * rpg.maxMana;
    const restMult = 1 + (rpg.restoration||0) * 0.0012;
    manaRestored = Math.round(baseRestore * restMult);
    rpg.mana = Math.min(rpg.maxMana, (rpg.mana||0) + manaRestored);
  }

  return {
    collision,
    damage: Math.round(dmg),
    setupElement,
    triggerElement,
    manaRestored,
    consumed: setupStatus.id,
  };
}

/* Discovered collisions tracker */
const discoveredCollisions = new Set();
try {
  const saved = JSON.parse(localStorage.getItem('bt_codex'));
  if(saved) saved.forEach(c => discoveredCollisions.add(c));
} catch {}

function discoverCollision(collisionId) {
  if(discoveredCollisions.has(collisionId)) return false;
  discoveredCollisions.add(collisionId);
  try { localStorage.setItem('bt_codex', JSON.stringify([...discoveredCollisions])); } catch {}
  return true; /* first discovery */
}

/* §6.1 Monster Scaling — tri-phase */
function monsterStat(base, level, rRamp, rPlateau, rEndgame) {
  if (level <= 30) return Math.ceil(base * Math.pow(rRamp, level-1));
  const at30 = Math.ceil(base * Math.pow(rRamp, 29));
  if (level <= 65) return Math.ceil(at30 * Math.pow(rPlateau, level-30));
  const at65 = Math.ceil(at30 * Math.pow(rPlateau, 35));
  return Math.ceil(at65 * Math.pow(rEndgame, level-65));
}

/* Spawn a monster instance from archetype + zone level */
function createMonster(id, archetype, level, x, y, element) {
  const a = ARCHETYPES[archetype];

  const baseGold = monsterStat(5, level, 1.035, 1.020, 1.015);
  return {
    id, archetype, level, element: element||null,
    hp: Math.ceil(baseHp * a.hpMult), maxHp: Math.ceil(baseHp * a.hpMult),
    dmg: Math.ceil(baseDmg * a.dmgMult),
    xp: Math.ceil(baseXp), gold: Math.ceil(baseGold),

/* §3 Resource Formulas */
function calcMaxHp(level, vitality)  { return 100 + (level-1)*12 + vitality*10; }
function calcMaxStam(endurance)      { return 100 + endurance*3.0; }
function calcMaxMana(mind)           { return 80 + mind*3.5; }

/* §4.4 Weapon Damage */
function calcWeaponDmg(weaponType, power, tierMult) {
  const w = WEAPON_TYPES[weaponType];
  const base = (w.base + power * 0.8) * tierMult;
  if (weaponType === 'staff') return base * (0.75 + Math.random() * 0.5); /* variance roll */
  return base;
}

/* §2.1 Crit */
function calcCritChance(ferocity) {
  if (ferocity <= 300) return (60 * ferocity) / (ferocity + 120) / 100;
  const baseAt300 = (60*300)/(300+120)/100;
  const excess = ferocity - 300;
  return baseAt300 + (8*excess)/(excess+200)/100;
}
function calcCritMult(ferocity) { return 1.75 + ferocity * 0.0008; }

/* §2.3 Block */
function calcBlockReduction(fortification, shield) {
  let base = 0.25 + fortification * 0.0012;
  /* Shield gear bonus */
  if(shield){
    const ss = getShieldStats(shield);
    base += ss.blockBonus / 100;
  }
  return Math.min(0.75, base);
}

/* §2.5 Movement */
function calcMoveSpeed(agility) {
  return 5.0 * (1 + Math.min(agility * 0.0012, 0.60));
}

/* §6.2 XP Required — tri-phase */
function xpRequired(level) {
  if (level <= 30) return Math.ceil(500 * Math.pow(1.10, level-1));
  const at30 = Math.ceil(500 * Math.pow(1.10, 29));
  if (level <= 65) return Math.ceil(at30 * Math.pow(1.07, level-30));
  const at65 = Math.ceil(at30 * Math.pow(1.07, 35));
  return Math.ceil(at65 * Math.pow(1.04, level-65));
}

/* Recalculate derived stats from allocations */
function recalcDerived(rpg) {
  rpg.maxHp = calcMaxHp(rpg.level, rpg.vitality);
  rpg.maxStamina = calcMaxStam(rpg.endurance);
  rpg.maxMana = calcMaxMana(rpg.mind);

  /* §4 Amulet stat bonuses — applied to derived stats */
  if(rpg.amulet && rpg.amulet.gem){
    const bonus = getAmuletBonus(rpg.amulet);
    if(bonus){
      if(bonus.stat === 'maxHp')     rpg.maxHp += bonus.value;
      if(bonus.stat === 'maxMana')   rpg.maxMana += bonus.value;
      /* Other amulet stats (elemDmg, atkSpd, moveSpd, hpRegen, staminaRegen, elemResist, critDmg) */
      /* are applied at point-of-use in combat code via rpg._amuletBonus cache */
    }
    rpg._amuletBonus = bonus; /* cache for combat lookups */
  } else {
    rpg._amuletBonus = null;
  }

  /* §4 Shield defensive gem bonus */
  if(rpg.shield && rpg.shield.gem){
    rpg._shieldBonus = getShieldBonus(rpg.shield);
  } else {
    rpg._shieldBonus = null;
  }

  rpg.hp = Math.min(rpg.hp, rpg.maxHp);
  rpg.stamina = Math.min(rpg.stamina, rpg.maxStamina);
  rpg.mana = Math.min(rpg.mana, rpg.maxMana);
  return rpg;
}

/* Get the currently active weapon object */
function getActiveWeapon(rpg) {
  if(rpg.activeSlot === 'ranged') return rpg.rangedWeapon || rpg.weapon;
  if(rpg.activeSlot === 'staff') return rpg.staffWeapon || rpg.weapon;
  return rpg.weapon;
}

    if(!this.ctx || this.muted) return;
    if(this._currentZoneAmbient === zoneId) return;
    this._currentZoneAmbient = zoneId;
    this.stopAmbient();
    const zone = ZONES[zoneId];
    if(!zone) return;
    try {
      /* Primary drone — base atmosphere */
      const ambientParams = {
        town:    { freq:220, type:'sine',     vol:0.008, lfo:0.5 },
        meadow:  { freq:180, type:'sine',     vol:0.006, lfo:0.3 },
        flame:   { freq:80,  type:'sawtooth', vol:0.010, lfo:2.0 },
        frost:   { freq:300, type:'sine',     vol:0.007, lfo:0.8 },
        water:   { freq:250, type:'triangle', vol:0.008, lfo:1.2 },
        venom:   { freq:100, type:'sawtooth', vol:0.009, lfo:1.5 },
        storm:   { freq:150, type:'square',   vol:0.006, lfo:3.0 },
        stone:   { freq:60,  type:'triangle', vol:0.008, lfo:0.4 },
        wind:    { freq:400, type:'sine',     vol:0.005, lfo:2.5 },
        dark:    { freq:55,  type:'sawtooth', vol:0.012, lfo:0.6 },
        light:   { freq:520, type:'sine',     vol:0.006, lfo:0.3 },
      };
      /* Secondary texture — adds depth and character */
      const ambientParams2 = {
        flame:   { freq:160, type:'triangle', vol:0.004, lfo:0.3 },  /* crackling undertone */
        frost:   { freq:600, type:'sine',     vol:0.003, lfo:0.15 }, /* high wind whistle */
        water:   { freq:120, type:'sine',     vol:0.004, lfo:0.8 },  /* deep current */
        venom:   { freq:200, type:'square',   vol:0.003, lfo:0.7 },  /* insect buzz */
        storm:   { freq:300, type:'sawtooth', vol:0.003, lfo:5.0 },  /* crackling static */
        stone:   { freq:40,  type:'sine',     vol:0.005, lfo:0.1 },  /* deep rumble */
        wind:    { freq:800, type:'sine',     vol:0.002, lfo:4.0 },  /* high whistling */
        dark:    { freq:110, type:'square',   vol:0.004, lfo:0.2 },  /* ominous pulse */
        light:   { freq:1040,type:'sine',     vol:0.002, lfo:0.5 },  /* crystalline overtone */
      };
      const elem = zone.element || (zoneId==='town'?'town':'meadow');
      const params = ambientParams[elem] || ambientParams.town;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = params.type; o.frequency.value = params.freq; g.gain.value = params.vol;
      o.connect(g);
      const lfo = this.ctx.createOscillator();
      const lfoG = this.ctx.createGain();
      lfo.frequency.value = params.lfo; lfoG.gain.value = params.freq*0.05;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      g.connect(this.ctx.destination); o.start(); lfo.start();
      this._ambientOsc=o; this._ambientGain=g; this._ambientLfo=lfo;
      /* Secondary oscillator — adds texture */
      const p2 = ambientParams2[elem];
      if(p2){
        const o2 = this.ctx.createOscillator();
        const g2 = this.ctx.createGain();
        o2.type = p2.type; o2.frequency.value = p2.freq; g2.gain.value = p2.vol;
        o2.connect(g2);
        const lfo2 = this.ctx.createOscillator();
        const lfoG2 = this.ctx.createGain();
        lfo2.frequency.value = p2.lfo; lfoG2.gain.value = p2.freq*0.08;
        lfo2.connect(lfoG2); lfoG2.connect(o2.frequency);
        g2.connect(this.ctx.destination); o2.start(); lfo2.start();
        this._ambientOsc2=o2; this._ambientGain2=g2; this._ambientLfo2=lfo2;
      }
    } catch(e) {}
  },
  stopAmbient() {
    try{ if(this._ambientOsc){this._ambientOsc.stop();this._ambientOsc=null;}
      if(this._ambientLfo){this._ambientLfo.stop();this._ambientLfo=null;}
      this._ambientGain=null;
      if(this._ambientOsc2){this._ambientOsc2.stop();this._ambientOsc2=null;}
      if(this._ambientLfo2){this._ambientLfo2.stop();this._ambientLfo2=null;}
      this._ambientGain2=null;
    }catch(e){}
  },
  setCombatIntensity(inCombat) {
    if(!this._ambientGain||!this.ctx) return;
    try{
      this._ambientGain.gain.setTargetAtTime(inCombat?0.018:0.008, this.ctx.currentTime, 0.5);
      if(this._ambientGain2) this._ambientGain2.gain.setTargetAtTime(inCombat?0.008:0.004, this.ctx.currentTime, 0.5);
    }catch(e){}
  },
};

/* Get the current active/available quest for an NPC */
/* Check if player has earned a specific quest unlock */
function hasUnlock(rpg, unlockId) {
  if(!rpg || !rpg._quests) return false;
  for(const qid of Object.keys(QUEST_CHAINS)){
    const q = QUEST_CHAINS[qid];
    if(q.unlocks === unlockId && rpg._quests[qid] === QUEST_STATUS.turnedIn) return true;
  }
  return false;
}

function getNpcQuest(rpg, npcName) {
  const questState = rpg._quests || {};
  /* Find first incomplete quest for this NPC */
  for(const [qid, quest] of Object.entries(QUEST_CHAINS)){
    if(quest.npc !== npcName) continue;
    const state = questState[qid];
    if(!state || state === QUEST_STATUS.available) return { quest, status: QUEST_STATUS.available };
    if(state === QUEST_STATUS.active) return { quest, status: QUEST_STATUS.active };
    if(state === QUEST_STATUS.turnedIn) continue; /* done, check next */
  }
  return null; /* all quests done */
}

/* ═══ SUPABASE RPC HELPER ═══ */
const _btRpcQueue = {};
const btRpc = async (fnName, params) => {
  /* Debounce: skip if same call is already in-flight */
  const key = fnName + JSON.stringify(params);
  if(_btRpcQueue[key]) return _btRpcQueue[key];
  const promise = (async()=>{
    try {
      const r = await fetch(SUPA_URL+'/rest/v1/rpc/'+fnName, {
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
        body: JSON.stringify(params)
      });
      if(!r.ok) return null;
      return await r.json();
    } catch(e){ return null; }
    finally { delete _btRpcQueue[key]; }
  })();
  _btRpcQueue[key] = promise;
  return promise;
};
/* ═══ PASSPHRASE IDENTITY SYSTEM ═══ */
const BT_WORDS = ['alpha','blaze','coral','drift','ember','frost','grove','haven','ivory','jade',
  'karma','lunar','mango','nexus','onyx','pixel','quartz','raven','solar','thunder',
  'ultra','viper','wrath','xenon','yeti','zenith','amber','bolt','cipher','dusk',
  'echo','flare','ghost','haze','iron','jet','knack','lava','mystic','nova',
  'orbit','prism','quest','ridge','storm','titan','umbra','vault','wisp','zeal'];

const generatePassphrase = () => {
  const w = [];
  for(let i=0;i<4;i++) w.push(BT_WORDS[Math.floor(Math.random()*BT_WORDS.length)]);
  return w.join('-') + '-' + Math.floor(Math.random()*99);
};

const passphraseToId = (phrase) => {
  /* Simple hash to create a consistent player ID from a passphrase */
  let hash = 0;
  for(let i=0;i<phrase.length;i++){ hash = ((hash << 5) - hash) + phrase.charCodeAt(i); hash |= 0; }
  return 'bp_' + Math.abs(hash).toString(36) + '_' + phrase.split('-').slice(0,2).join('');
};

const getBtPlayerId = () => {
  const phrase = localStorage.getItem('bt_passphrase');
  if(!phrase) return null; /* not logged in */
  return passphraseToId(phrase);
};

const getBtPassphrase = () => localStorage.getItem('bt_passphrase');

    /* Also handle orientation changes — re-lock to new height */
    const handleOrientationChange = () => {
      setTimeout(() => {
        const newHeight = window.innerHeight;
        if(el) el.style.height = newHeight + 'px';
      }, 300); /* delay for iOS to settle */
    };

    if(window.visualViewport){
      window.visualViewport.addEventListener('resize', handleResize);
      window.visualViewport.addEventListener('scroll', handleResize);
    }
    window.addEventListener('resize', handleOrientationChange);
    window.addEventListener('orientationchange', handleOrientationChange);

    return () => {
      document.documentElement.style.overflow = orig.htmlOF;
      document.body.style.overflow = orig.bodyOF;
      document.body.style.position = orig.bodyPos;
      document.body.style.width = orig.bodyW;
      document.body.style.height = orig.bodyH;
      if(vv) vv.removeEventListener('resize', update);
      if(window.visualViewport){
        window.visualViewport.removeEventListener('resize', handleResize);
        window.visualViewport.removeEventListener('scroll', handleResize);
      }
      window.removeEventListener('resize', handleOrientationChange);
      window.removeEventListener('orientationchange', handleOrientationChange);
    };
  },[showNameModal,showLogin]);

  /* Initialize WebSocket connection to Durable Objects game server */
  useEffect(()=>{
    if(showNameModal||showLogin) return;
    const S = stateRef.current;
    
    /* ═══ DURABLE OBJECTS WEBSOCKET CLIENT ═══ */
    const WS_URL = (window.BROTOWN_WS_URL || 'wss://brotown-server.YOUR_SUBDOMAIN.workers.dev') + '/ws?room=brotown';
    let ws = null;
    let reconnectTimer = null;
    let reconnectDelay = 1000;

    function connect() {
      try { ws = new WebSocket(WS_URL); } catch(e) { scheduleReconnect(); return; }

      ws.onopen = () => {
        S._realtimeStatus = 'connected';
        reconnectDelay = 1000;
        ws.send(JSON.stringify({
          type: 'join', id: S.myId, name: S.myName,
          data: {
            x: S.player.x, y: S.player.y, d: S.player.dir,
            z: S.currentZone || 'town',
