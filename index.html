          if(m.statuses.slow) moveMult *= 0.4; /* slowed */
          /* Kill slowmo — everything moves at 30% speed during kill dilation */
          if(S._killSlowmo && Date.now()-S._killSlowmo < (S._killSlowmoDuration||200)){
            moveMult *= 0.3;
          } else if(S._killSlowmo){
            S._killSlowmo = null; /* expired */
          }
          /* Legacy compat for old _frozen/_slowed flags */
          if(m._frozen && Date.now()<m._frozen) moveMult = 0;
          if(m._slowed && Date.now()<m._slowed) moveMult *= 0.3;

          /* ═══ ARCHETYPE AI — §Creative Vision §9: Alive, Not Artificial ═══ */
          const distToP = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
          const arch = m.archetype || 'fodder';

          /* Aggro range varies by archetype */
          let aggroRange = {fodder:100, brute:90, swarm:130, sentinel:80, volatile:110, stalker:160, hexer:140}[arch] || 120;
          /* Deep Hollows echo — combat noise doubles aggro range */
          if(S._echoActive) aggroRange *= ECHO_AGGRO_MULT;
          const atkRange = arch==='hexer' ? 60 : arch==='stalker' ? 30 : 18;
          const atkCooldown = {fodder:1500, brute:2200, swarm:800, sentinel:1800, volatile:1200, stalker:1000, hexer:2500}[arch] || 1500;

          if(distToP < aggroRange && moveMult > 0){
            /* ═══ AGGRO ALERT — "!" flash when enemy first notices player ═══ */
            if(!m._aggroed){
              m._aggroed = true;
              m._aggroTs = Date.now();
            }
            const chDx = P.x-m.x, chDy = P.y-m.y;
            const chDist = Math.sqrt(chDx*chDx+chDy*chDy);

            /* Archetype-specific movement behavior */
            if(arch === 'stalker'){
              /* Stalker: circle-strafe, then dash in for quick hit */
              if(!m._stalkPhase) m._stalkPhase = 'circle';
              if(m._stalkPhase === 'circle'){
                /* Circle the player */
                const perpAngle = Math.atan2(chDy, chDx) + Math.PI/2;
                if(chDist > 40){
                  m.x += (chDx/chDist)*m.spd*moveMult;
                  m.y += (chDy/chDist)*m.spd*moveMult;
                } else {
                  m.x += Math.cos(perpAngle)*m.spd*moveMult*0.8;
                  m.y += Math.sin(perpAngle)*m.spd*moveMult*0.8;
                }
                if(Math.random() < 0.008) m._stalkPhase = 'dash'; /* randomly dash in */
              } else {
                /* Dash toward player */
                if(chDist > 15) {
                  m.x += (chDx/chDist)*m.spd*moveMult*2.5;
                  m.y += (chDy/chDist)*m.spd*moveMult*2.5;
                }
                if(chDist < 20 || Math.random() < 0.02) m._stalkPhase = 'circle';
              }
            } else if(arch === 'hexer'){
              /* Hexer: keep distance, back away if player gets close */
              const idealRange = 50;
              if(chDist < idealRange * 0.7){
                /* Retreat */
                m.x -= (chDx/chDist)*m.spd*moveMult*1.2;
                m.y -= (chDy/chDist)*m.spd*moveMult*1.2;
              } else if(chDist > idealRange * 1.3){
                /* Approach */
                m.x += (chDx/chDist)*m.spd*moveMult*0.7;
                m.y += (chDy/chDist)*m.spd*moveMult*0.7;
              }
              /* Slight side-to-side wobble */
              m.x += Math.sin(Date.now()/500 + m.spawnX)*0.3;
            } else if(arch === 'swarm'){
              /* Swarm: rush directly at player, fast, erratic zigzag */
              if(chDist > 12){
                const zigzag = Math.sin(Date.now()/200 + m.spawnX*10) * 0.6;
                const moveAngle = Math.atan2(chDy, chDx) + zigzag;
                m.x += Math.cos(moveAngle)*m.spd*moveMult;
                m.y += Math.sin(moveAngle)*m.spd*moveMult;
              }
            } else if(arch === 'volatile'){
              /* Volatile: charge straight, explodes on contact if low HP */
              if(chDist > 12){
                const chargeSpd = m.curHp < m.hp*0.3 ? m.spd*2.0 : m.spd; /* faster when low HP */
                m.x += (chDx/chDist)*chargeSpd*moveMult;
                m.y += (chDy/chDist)*chargeSpd*moveMult;
              }
            } else if(arch === 'sentinel'){
              /* Sentinel: slow, deliberate, stops periodically to "wind up" attack */
              if(!m._sentinelPause) m._sentinelPause = 0;
              m._sentinelPause -= 16.7;
              if(m._sentinelPause <= 0){
                if(chDist > 20){
                  m.x += (chDx/chDist)*m.spd*moveMult*0.6;
                  m.y += (chDy/chDist)*m.spd*moveMult*0.6;
                }
                if(chDist < 30 && Math.random() < 0.01) m._sentinelPause = 800; /* wind-up pause */
              }
            } else {
              /* Fodder + Brute: direct chase */
              if(chDist > 15){
                m.x += (chDx/chDist)*m.spd*moveMult;
                m.y += (chDy/chDist)*m.spd*moveMult;
              }
            }

            /* ═══ BOSS ABILITIES — special attacks on cooldown ═══ */
            if(m._isBoss && m._bossAbilities && Date.now() > (m._nextAbility||0)){
              /* ═══ BOSS PHASE CYCLING ═══
                 idle → telegraph (1s warning) → attack → recovery (2s, VULNERABLE) → idle
                 Boss is invulnerable except during recovery phase */
              if(!m._attackPhase || m._attackPhase === 'idle'){
                /* Start telegraph — warning indicator before attack */
                m._attackPhase = 'telegraph';
                m._phaseTimer = Date.now() + 1000; /* 1s telegraph */
                const abilities = m._bossAbilities;
                m._currentAttack = abilities[m._attackPattern % abilities.length];
                m._attackPattern++;
                S.dmgNumbers.push({x:m.x,y:m.y-40,text:'⚠️ '+m._currentAttack.toUpperCase()+'!',color:'#fbbf24',ts:Date.now()});
                BT_AUDIO.beep(400,0.08,0.1,'sine');
                /* Boss glows during telegraph */
                m.color = '#fbbf24';
              } else if(m._attackPhase === 'telegraph' && Date.now() > m._phaseTimer){
                /* Execute the attack */
                m._attackPhase = 'attack';
                m._phaseTimer = Date.now() + 500; /* attack lasts 500ms */
                m.color = '#ff2020';
                const abilities = m._bossAbilities;
                const ability = m._currentAttack;
              const bossAngle = Math.atan2(P.y-m.y, P.x-m.x);

              if(ability === 'slam'){
                const slamRange = 80;
                S.screenShake = 10;
                BT_AUDIO.beep(80, 0.2, 0.25, 'sawtooth');
                S.dmgNumbers.push({x:m.x,y:m.y-30,text:'💥 SLAM!',color:'#f5c542',ts:Date.now()});
                if(!S._impactRings) S._impactRings = [];
                S._impactRings.push({x:m.x, y:m.y, ts:Date.now(), color:'#f5c542', maxR:slamRange, duration:400});
                for(let sp=0;sp<20;sp++){
                  const sa = (sp/20)*Math.PI*2;
                  S.hitParticles.push({x:m.x,y:m.y,vx:Math.cos(sa)*(2+Math.random()*4),vy:Math.sin(sa)*(2+Math.random()*4),
                    life:0.8,color:'#f5c542',size:2+Math.random()*2});
                }
                /* Dodging or shielding avoids damage */
                const dodged = S._dodgeRoll;
                const blocked = Date.now() < S.shieldEnd;
                if(distToP < slamRange && !invuln && !dodged){
                  const slamDmg = Math.ceil(m.dmg * 1.5);
                  const finalDmg = blocked ? Math.max(1,Math.ceil(slamDmg*0.3)) : slamDmg;
                  R.hp -= finalDmg;
                  S.dmgNumbers.push({x:P.x,y:P.y-20,text:blocked?'🛡️ Blocked! -'+finalDmg:'-'+finalDmg,color:'#f5c542',ts:Date.now()});
                  S.lastDamageTaken = Date.now();
                } else if(distToP < slamRange && dodged){
                  S.dmgNumbers.push({x:P.x,y:P.y-20,text:'💨 Dodged!',color:'#3dd497',ts:Date.now()});
                }
              }
              if(ability === 'charge'){
                m._chargeUntil = Date.now() + 600;
                m._chargeAngle = bossAngle;
                m._chargeSpeed = m.spd * 6;
                S.dmgNumbers.push({x:m.x,y:m.y-30,text:'🐂 CHARGE!',color:'#ea580c',ts:Date.now()});
                BT_AUDIO.beep(200,0.15,0.2,'sawtooth');
              }
              if(ability === 'sweep'){
                /* Wide arc sweep — must dodge or shield */
                const sweepRange = 70;
                S.dmgNumbers.push({x:m.x,y:m.y-30,text:'🌀 SWEEP!',color:'#a855f7',ts:Date.now()});
                BT_AUDIO.beep(150,0.15,0.2,'square');
                S.screenShake = 6;
                if(!S._impactRings) S._impactRings = [];
                S._impactRings.push({x:m.x, y:m.y, ts:Date.now(), color:'#a855f7', maxR:sweepRange, duration:300});
                const dodged = S._dodgeRoll;
                const blocked = Date.now() < S.shieldEnd;
                if(distToP < sweepRange && !invuln && !dodged){
                  const sweepDmg = Math.ceil(m.dmg * 1.2);
                  const finalDmg = blocked ? Math.max(1,Math.ceil(sweepDmg*0.3)) : sweepDmg;
                  R.hp -= finalDmg;
                  S.dmgNumbers.push({x:P.x,y:P.y-20,text:blocked?'🛡️ -'+finalDmg:'-'+finalDmg,color:'#a855f7',ts:Date.now()});
                  S.lastDamageTaken = Date.now();
                }
              }
              if(ability === 'summon'){
                const summonCount = 2 + Math.floor(Math.random()*2);
                const zone2 = ZONES[S.currentZone||S._dungeonZone];
                const dW2 = S.map[0]?.length||25, dH2 = S.map?.length||20;
                for(let si=0;si<summonCount;si++){
                  const mx = m.x + (Math.random()-0.5)*80;
                  const my = m.y + (Math.random()-0.5)*60;
                  const minion = createMonster('summon-'+Date.now()+'-'+si,'swarm',Math.max(1,m.level-5),
                    Math.max(TILE*2,Math.min(mx,(dW2-2)*TILE)),Math.max(TILE*2,Math.min(my,(dH2-2)*TILE)),zone2?.element);
                  minion.curHp = minion.hp; minion.type = 'swarm';
                  minion.hp = Math.ceil(minion.hp * 0.3); minion.curHp = minion.hp; minion.maxHp = minion.hp;
                  S.monsters.push(minion);
                }
                S.dmgNumbers.push({x:m.x,y:m.y-30,text:'👥 Summon!',color:'#9333ea',ts:Date.now()});
                BT_AUDIO.beep(300,0.1,0.15,'square');
              }
              if(ability === 'enrage' && m.curHp < m.hp * 0.3 && !m._enraged){
                m._enraged = true;
                m.dmg = Math.ceil(m.dmg * 1.5);
                m.spd *= 1.4;
                S.dmgNumbers.push({x:m.x,y:m.y-30,text:'😡 ENRAGED!',color:'#ff2020',ts:Date.now()});
                S.screenShake = 6;
                BT_AUDIO.beep(120,0.2,0.3,'sawtooth');
              }

              } else if(m._attackPhase === 'attack' && Date.now() > m._phaseTimer){
                /* Recovery phase — BOSS IS NOW VULNERABLE */
                m._attackPhase = 'recovery';
                m._phaseTimer = Date.now() + 2000; /* 2s vulnerability window */
                m._invulnerable = false;
                m.color = '#3dd497'; /* green = vulnerable */
                S.dmgNumbers.push({x:m.x,y:m.y-30,text:'💫 EXPOSED!',color:'#3dd497',ts:Date.now()});
                BT_AUDIO.beep(600,0.06,0.08,'sine');
              } else if(m._attackPhase === 'recovery' && Date.now() > m._phaseTimer){
                /* Back to idle — invulnerable again */
                m._attackPhase = 'idle';
                m._invulnerable = true;
                m.color = '#ff5e6c';
                m._nextAbility = Date.now() + (m._abilityInterval||4000);
              }
            }
            /* Boss charge movement */
            if(m._chargeUntil && Date.now() < m._chargeUntil){
              m.x += Math.cos(m._chargeAngle) * (m._chargeSpeed||3) * moveMult;
              m.y += Math.sin(m._chargeAngle) * (m._chargeSpeed||3) * moveMult;
              /* Charge hit detection */
              if(distToP < 20 && !invuln){
                const chargeDmg = Math.ceil(m.dmg * 1.5);
                const blocked = Date.now() < S.shieldEnd;
                const finalDmg = blocked ? Math.max(1,Math.ceil(chargeDmg*(1-calcBlockReduction(R.fortification, R.shield)))) : chargeDmg;
                R.hp -= finalDmg;
                S.dmgNumbers.push({x:P.x,y:P.y-20,text:'💨 -'+finalDmg,color:'#ea580c',ts:Date.now()});
                S.lastDamageTaken = Date.now();
                S.screenShake = 6;
                m._chargeUntil = 0; /* stop charging on hit */
                /* Knockback */
                const kbA = Math.atan2(P.y-m.y, P.x-m.x);
                P.x += Math.cos(kbA)*18;
                P.y += Math.sin(kbA)*18;
              }
            }

            /* Monster attacks player if in range */
            if(distToP < atkRange && !invuln){
              if(!m._atkCd || Date.now()-m._atkCd > atkCooldown){
                /* ═══ TELEGRAPH — show warning before attack lands ═══ */
                const telegraphDur = 400; /* ms warning */
                if(!m._telegraphUntil){
                  /* Start telegraph — monster winds up */
                  m._telegraphUntil = Date.now() + telegraphDur;
                  m._telegraphAngle = Math.atan2(P.y - m.y, P.x - m.x);
                  m._telegraphRange = atkRange;
                  return; /* don't attack yet */
                }
                if(Date.now() < m._telegraphUntil) return; /* still telegraphing */
                /* Telegraph done — execute attack */
                m._telegraphUntil = null;
                m._atkCd = Date.now();
                const shielded = Date.now() < S.shieldEnd;
                let rawDmg = Math.max(1, m.dmg);
                /* §18.1 Food buff — resist reduces incoming damage */
                if(S._resistBuff && Date.now() < S._resistBuff) rawDmg = Math.max(1, Math.floor(rawDmg * 0.85));
                /* §4 Amulet elemental resistance */
                if(R._amuletBonus?.stat === 'elemResist') rawDmg = Math.max(1, Math.floor(rawDmg * (1 - R._amuletBonus.value / 100)));
                /* Shield gear — flat defense reduction */
                if(R.shield){
                  const ss = getShieldStats(R.shield);
                  if(ss.flatDef) rawDmg = Math.max(1, Math.floor(rawDmg - ss.flatDef));
                }
                const blockReduc = shielded ? calcBlockReduction(R.fortification, R.shield) : 0;
                const dmgTaken = shielded ? Math.max(1, Math.floor(rawDmg * (1 - blockReduc))) : rawDmg;
                if(shielded){
                  if(!R._questFlags) R._questFlags = {};
                  R._questFlags.blocksLanded = (R._questFlags.blocksLanded||0) + 1;
                  /* Shield gem: HP on block */
                  if(R.shield){
                    const ss = getShieldStats(R.shield);
                    if(ss.gemBonus?.stat === 'hpOnBlock'){
                      R.hp = Math.min(R.maxHp, R.hp + ss.gemBonus.value);
                    }
                  }
                }

                /* Volatile: AoE damage burst when low HP */
                if(arch === 'volatile' && m.curHp < m.hp*0.3 && !m._exploded){
                  m._exploded = true;
                  m.curHp = 0; m.alive = false; m.respawnAt = Date.now()+30000;
                  const explodeDmg = Math.round(m.dmg * 2);
                  R.hp -= shielded ? Math.max(1, Math.floor(explodeDmg*(1-blockReduc))) : explodeDmg;
                  S.screenShake = 8;
                  S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥BOOM -'+explodeDmg,color:'#ea580c',ts:Date.now()});
                  for(let ep=0;ep<30;ep++){
                    S.hitParticles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-3,
                      life:1.2,color:(['#ea580c','#f5c542','#ff5e6c'])[Math.floor(Math.random()*3)],size:2+Math.random()*3});
                  }
                  BT_AUDIO.deathBoom();
                  BT_AUDIO.beep(100,0.2,0.3,'sawtooth');
                  S.groundLoot.push({x:m.x,y:m.y,coins:m.gold,xp:0,skull:m.type,skullEmoji:'🦴',ts:Date.now()});
                } else {
                  R.hp -= dmgTaken;
                  S.lastDamageTaken = Date.now();

                  /* ═══ ARCHETYPE-SPECIFIC ATTACK EFFECTS ═══ */
                  if(arch === 'hexer' && !shielded){
                    /* Hexer: applies curse debuff — reduces player damage for 4s */
                    S._cursedUntil = Date.now() + 4000;
                    S.dmgNumbers.push({x:P.x,y:P.y-20,text:'🔮 Cursed!',color:'#8E44AD',ts:Date.now()});
                    /* Purple curse particles */
                    for(let cp=0;cp<8;cp++){
                      S.hitParticles.push({x:P.x+(Math.random()-0.5)*20,y:P.y+(Math.random()-0.5)*20,
                        vx:(Math.random()-0.5)*2,vy:-1-Math.random(),life:0.8,color:'#8E44AD',size:2+Math.random()});
                    }
                  }
                  if(arch === 'brute' && !shielded){
                    /* Brute: heavy hit — knockback + extra screen shake */
                    const kbAngle = Math.atan2(P.y-m.y, P.x-m.x);
                    P.x += Math.cos(kbAngle)*12;
                    P.y += Math.sin(kbAngle)*12;
                    S.screenShake = Math.max(S.screenShake||0, 6);
                    S._playerStunUntil = Date.now() + 300; /* brief stagger */
                  }
                  if(arch === 'swarm'){
                    /* Swarm: rapid weak hits — apply bleed (1% HP/s for 3s) */
                    S._bleedUntil = Date.now() + 3000;
                    S._bleedDps = Math.max(1, Math.ceil(R.maxHp * 0.01));
                  }
                  if(arch === 'sentinel' && !shielded){
                    /* Sentinel: armor-piercing — ignores 50% of block reduction */
                    const pierceDmg = Math.max(0, Math.floor(rawDmg * blockReduc * 0.5));
                    if(pierceDmg > 0){
                      R.hp -= pierceDmg;
                      S.dmgNumbers.push({x:P.x+10,y:P.y-22,text:'Pierce -'+pierceDmg,color:'#e8e8e8',ts:Date.now()});
                    }
                  }
                  if(arch === 'stalker' && !shielded){
                    /* Stalker: crit chance on dash attacks */
                    if(m._stalkPhase === 'dash' && Math.random() < 0.4){
                      const critDmg = Math.ceil(dmgTaken * 0.5);
                      R.hp -= critDmg;
                      S.dmgNumbers.push({x:P.x,y:P.y-40,text:'💀 CRIT -'+critDmg,color:'#ff5e6c',ts:Date.now()});
                      S.screenShake = Math.max(S.screenShake||0, 4);
                    }
                  }

                  if(shielded){
                    m._stunUntil = Date.now() + 2000;
                    S.dmgNumbers.push({x:P.x,y:P.y-30,text:'🛡️ -'+dmgTaken,color:'#60a5fa',ts:Date.now()});
                    S.dmgNumbers.push({x:m.x,y:m.y-25,text:'STUNNED',color:'#f5c542',ts:Date.now()});
                    BT_AUDIO.beep(300, 0.08, 0.12, 'square');
                    /* ═══ BLOCK FEEDBACK — blue flash + shield particles ═══ */
                    S.screenShake = 3;
                    S._blockFlash = Date.now();
                    if(!S._impactRings) S._impactRings = [];
                    S._impactRings.push({x:P.x, y:P.y, ts:Date.now(), color:'#60a5fa', maxR:25, duration:200});
                    for(let bp=0;bp<10;bp++){
                      const bpA = Math.atan2(m.y-P.y, m.x-P.x) + (Math.random()-0.5)*1.5;
                      S.hitParticles.push({
                        x:P.x+Math.cos(bpA)*20, y:P.y+Math.sin(bpA)*20,
                        vx:Math.cos(bpA)*(1+Math.random()*3), vy:Math.sin(bpA)*(1+Math.random()*3)-1,
                        life:0.5, color:['#60a5fa','#93c5fd','#fff'][Math.floor(Math.random()*3)], size:1.5+Math.random()
                      });
                    }
                    BT_AUDIO.beep(600, 0.05, 0.06, 'sine');
                  } else {
                    S.dmgNumbers.push({x:P.x,y:P.y-30,text:'-'+dmgTaken,color:'#ff5e6c',ts:Date.now()});
                  }
                }
                if(R.hp <= 0){
                  /* Shield gem: Death Save — chance to survive at 1 HP */
                  if(R._shieldBonus?.stat === 'deathResist' && Math.random() < R._shieldBonus.value / 100){
                    R.hp = 1;
                    S.dmgNumbers.push({x:P.x,y:P.y-50,text:'🛡️ DEATH SAVE!',color:'#5b52ff',ts:Date.now()});
                    S.screenShake = 6;
                    BT_AUDIO.beep(800,0.1,0.12,'sine');
                    setTimeout(()=>BT_AUDIO.beep(1000,0.08,0.1,'sine'),80);
                  }
                }
                if(R.hp <= 0){
                  /* §5.5 Player death — inventory scatter + escalating respawn */
                  if(!R._compStats) R._compStats = createDefaultCompStats();
                  R._compStats.deaths++;
                  const deathX = P.x, deathY = P.y;
                  const deathZone = S.currentZone;

                  /* Death explosion — whimsical limb detach */
                  for(let dp=0;dp<35;dp++){
                    const dpA = (dp/35)*Math.PI*2;
                    S.hitParticles.push({
                      x:P.x, y:P.y,
                      vx:Math.cos(dpA)*(2+Math.random()*5), vy:Math.sin(dpA)*(2+Math.random()*5)-1,
                      life:1.2, color:(['#ff5e6c','#cc2233','#ff8888','#aa0020','#fff'])[Math.floor(Math.random()*5)],
                      size:2+Math.random()*3
                    });
                  }
                  /* Whimsical skull + bone emojis scatter */
                  const deathEmojis = ['💀','🦴','🦴','💫','⭐'];
                  for(let de=0;de<5;de++){
                    const deA = (de/5)*Math.PI*2 + Math.random()*0.5;
                    S.deathExplosions.push({x:deathX+Math.cos(deA)*20,y:deathY+Math.sin(deA)*20,
                      ts:Date.now(),emoji:deathEmojis[de],
                      particles:[{vx:Math.cos(deA)*3,vy:Math.sin(deA)*3-2,life:1.5}]});
                  }
                  S.screenShake = 12;
                  S._deathFlash = Date.now();
                  BT_AUDIO.playerDeath ? BT_AUDIO.playerDeath() : (BT_AUDIO.beep(80,0.3,0.4,'sawtooth'), setTimeout(()=>BT_AUDIO.beep(60,0.2,0.3,'sawtooth'),150));

                  /* §5.5 Inventory scatter — carried items drop at death location */
                  /* Equipped weapon + armor are SAFE. Banked items are SAFE. */
                  const scatteredItems = [];
                  if(R.inventory){
                    const invKeys = Object.keys(R.inventory).filter(k=>R.inventory[k]>0 && k!=='potions');
                    invKeys.forEach(k=>{
                      const qty = R.inventory[k];
                      /* Scatter half of each stack (min 1 if have any) */
                      const scatterQty = Math.max(1, Math.floor(qty * 0.5));
                      R.inventory[k] -= scatterQty;
                      if(R.inventory[k] <= 0) delete R.inventory[k];
                      scatteredItems.push({key:k, qty:scatterQty});
                    });
                  }

                  /* Gold penalty */
                  const goldLost = Math.floor(R.coins * DEATH_GOLD_PENALTY);
                  R.coins = Math.max(0, R.coins - goldLost);

                  /* Escalating respawn timer — §5.5 */
                  if(!R._deathTimestamps) R._deathTimestamps = [];
                  const dnow = Date.now();
                  R._deathTimestamps = R._deathTimestamps.filter(t => dnow - t < RESPAWN_ESCALATE_WINDOW);
                  const recentDeaths = R._deathTimestamps.length;
                  R._deathTimestamps.push(dnow);
                  const respawnMs = Math.min(RESPAWN_MAX, RESPAWN_BASE + recentDeaths * RESPAWN_ESCALATE);

                  /* Restore and teleport to town */
                  R.hp = R.maxHp; R.stamina = R.maxStamina; R.mana = R.maxMana;
                  S.currentZone = 'town'; updateZoneDimensions('town'); BT_AUDIO.startZoneAmbient('town');
                  S.map = generateZoneMap('town'); S.monsters = spawnMonstersForZone(ZONES.town);
                  P.x = 20*TILE; P.y = 20*TILE;
                  S.respawnTimer = Date.now() + respawnMs;

                  /* Place scattered items as recoverable ground loot at death site */
                  /* These persist in a special array so they survive zone transitions for recovery */
                  if(scatteredItems.length > 0){
                    if(!S._deathDrops) S._deathDrops = [];
                    S._deathDrops.push({
                      zone: deathZone, x: deathX, y: deathY,
                      items: scatteredItems, ts: Date.now(),
                      expiry: Date.now() + DEATH_SCATTER_RECOVERY
                    });
                  }

                  /* Death feedback */
                  S.dmgNumbers.push({x:P.x,y:P.y-50,text:'💀 YOU DIED',color:'#ff5e6c',ts:Date.now()});
                  S.dmgNumbers.push({x:P.x,y:P.y-35,text:'Respawn: '+(respawnMs/1000).toFixed(0)+'s',color:'#f5c542',ts:Date.now()});
                  if(goldLost > 0) S.dmgNumbers.push({x:P.x,y:P.y-20,text:'-'+goldLost+'G',color:'#ff5e6c',ts:Date.now()});
                  if(scatteredItems.length > 0) S.dmgNumbers.push({x:P.x,y:P.y-5,text:'Items scattered! '+Math.ceil(DEATH_SCATTER_RECOVERY/1000)+'s to recover',color:'#ea580c',ts:Date.now()});
                  S.groundLoot = []; S.hitParticles = []; S.arrows = [];
                  S._ambientParticles = [];
                }
                setRpgState({...R});
              }
            }
          } else {
            /* Wander — archetype personality */
            m._aggroed = false;
            m.moveTimer -= 16.7;
            if(m.moveTimer <= 0){
              const wanderDist = arch==='swarm' ? 40 : arch==='stalker' ? 100 : 60;
              m.targetX = m.spawnX + (Math.random()-0.5)*wanderDist*2;
              m.targetY = m.spawnY + (Math.random()-0.5)*wanderDist*2;
              m.moveTimer = arch==='swarm' ? 1000+Math.random()*1500 : 2000+Math.random()*3000;
            }
            const wDx=m.targetX-m.x, wDy=m.targetY-m.y;
            const wDist=Math.sqrt(wDx*wDx+wDy*wDy);
            if(wDist>2){ m.x+=wDx/wDist*m.spd*0.5*moveMult; m.y+=wDy/wDist*m.spd*0.5*moveMult; }
          }
        });

        /* §11 Combat intensity — swell ambient when monsters are nearby */
        const nearestMonsterDist = S.monsters.reduce((min,m)=>{
          if(!m.alive) return min;
          const d = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
          return d<min?d:min;
        }, 9999);
        BT_AUDIO.setCombatIntensity(nearestMonsterDist < 100);

        /* ═══ LOW HP HEARTBEAT — thumping audio pulse below 25% HP ═══ */
        if(R.hp < R.maxHp * 0.25 && R.hp > 0){
          if(!S._heartbeatTimer) S._heartbeatTimer = 0;
          S._heartbeatTimer++;
          const hbRate = R.hp < R.maxHp * 0.1 ? 25 : 40; /* faster when critically low */
          if(S._heartbeatTimer % hbRate === 0){
            BT_AUDIO.beep(45, 0.06, 0.12, 'sine');
            setTimeout(()=>BT_AUDIO.beep(40, 0.04, 0.08, 'sine'), 120);
          }
        } else {
          S._heartbeatTimer = 0;
        }

        /* Sword swing — check hits */
        /* Clear lock if target is dead */
        if(S.lockedTarget){
          const lt = S.lockedTarget;
          if(lt.type==='monster' && (!lt.ref.alive || lt.ref.curHp<=0)) S.lockedTarget = null;
          else if(lt.type==='npc' && !lt.ref.alive) S.lockedTarget = null;
        }
        /* Auto-attack: trigger swing/bow automatically */
        /* §4.5 Attack speed — base cooldown modified by amulet */
        const atkSpdAmulet = S.rpg?._amuletBonus?.stat === 'atkSpd' ? (1 + S.rpg._amuletBonus.value / 100) : 1.0;
        const effectiveSwingCd = Math.max(200, Math.floor(SWING_COOLDOWN / atkSpdAmulet));
        if(S.autoAttack && S.rpg && Date.now()-S.swingTimer >= effectiveSwingCd){
          if(!(S._playerStunUntil && Date.now() < S._playerStunUntil)){
            if((S.rpg?.activeSlot === 'ranged' || S.rpg?.activeSlot === 'staff')){
              let arrAngle;
              if(S.lockedTarget && S.lockedTarget.ref){
                const lt = S.lockedTarget.ref;
                arrAngle = Math.atan2((lt.y||0)-P.y, (lt.x||0)-P.x);
              } else if(S._aiming && S._aimAngle != null){
                arrAngle = S._aimAngle;
              } else {
                const fd = S._facing||'down';
                arrAngle = fd==='right'?0:fd==='up'?-Math.PI/2:fd==='left'?Math.PI:Math.PI/2;
              }
              if(!S.arrows) S.arrows = [];
              const isStaff = S.rpg?.activeSlot === 'staff';
              S.arrows.push({ang:arrAngle, dist:14, dmg:Math.round(pDmg*(isStaff?1.0:0.7)),
                life:isStaff?90:120, maxLife:isStaff?90:120, hitIds:new Set(),
                isStaff:isStaff});
              S.swingTimer = Date.now() + (isStaff ? 300 : 0); /* Staff fires slower */
              BT_AUDIO.beep(isStaff?400:600, 0.04, 0.06, isStaff?'sine':'triangle');
            } else if(!S.isSwinging){
              S.swingTimer = Date.now();
              S.isSwinging = true;
              S._specialAttack = false;
            }
          }
        }
        if(S.isSwinging && Date.now()-S.swingTimer < 400){
          let baseAngle;
          if(S.lockedTarget && S.lockedTarget.ref){
            const lt = S.lockedTarget.ref;
            const tx = lt.x || lt.renderX || P.x;
            const ty = lt.y || lt.renderY || P.y;
            baseAngle = Math.atan2(ty-P.y, tx-P.x);
          } else if(S._aiming && S._aimAngle != null){
            baseAngle = S._aimAngle;
          } else {
            const swDir = S._facing||'down';
            baseAngle = swDir==='right'?0:swDir==='up'?-Math.PI/2:swDir==='left'?Math.PI:Math.PI/2;
          }
          /* Hit monsters */
          S.monsters.forEach(m=>{
            if(!m.alive || m._hitThisSwing) return;
            const mDist = Math.sqrt((m.x-P.x)**2+(m.y-P.y)**2);
            if(mDist > SWING_RANGE) return;
            const mAngle = Math.atan2(m.y-P.y, m.x-P.x);
            let angleDiff = mAngle - baseAngle;
            while(angleDiff > Math.PI) angleDiff -= Math.PI*2;
            while(angleDiff < -Math.PI) angleDiff += Math.PI*2;
            if(Math.abs(angleDiff) < SWING_ARC/2){
              m._hitThisSwing = true;
              const isCrit = Math.random() < critChance;
              const specialMult = S._specialAttack ? SPECIAL_ATK_MULT : 1;

              /* §9 — Apply element status on hit */
              const hitElement = S._specialAttack ? activeWpn.element2 : activeWpn.element1;
              if(hitElement){
                const statusId = ELEMENTS[hitElement]?.status;
                if(statusId){
                  const wasNew = !m.statuses?.[statusId];
                  applyStatus(m, statusId, S.player, Date.now());
                  const elemDef = ELEMENTS[hitElement];
                  /* §Stage 2: "Brief bright pop on first application. Then ambient." */
                  if(wasNew){
                    /* Flash ring at point of contact */
                    for(let ep=0;ep<8;ep++){
                      S.hitParticles.push({
                        x:m.x+(Math.random()-0.5)*4, y:m.y+(Math.random()-0.5)*4,
                        vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-1,
                        life:0.5, color:elemDef.color, size:1.5+Math.random()*2
                      });
                    }
                    /* Soft characteristic sound per element */
                    const pitches = {flame:350,frost:800,water:500,venom:280,storm:900,stone:200,wind:650,dark:120,light:1000};
                    BT_AUDIO.beep(pitches[hitElement]||400, 0.04, 0.06, 'sine');
                  }
                  /* §10.2 Effectiveness indicator — green/red arrow on hit */
                  if(m.element){
                    const eff = getEffectiveness(hitElement, m.element);
                    if(eff > 1.0){
                      S.dmgNumbers.push({x:m.x+12,y:m.y-10,text:'▲',color:'#3dd497',ts:Date.now()});
                      if(!R._questFlags) R._questFlags={};
                      R._questFlags.usedEffectiveness = true;
                    } else if(eff < 1.0){
                      S.dmgNumbers.push({x:m.x+12,y:m.y-10,text:'▼',color:'#ff5e6c',ts:Date.now()});
                    }
                  }
                }
              }

              /* §10.3 — Check for collision (two different elements on target) */
              let collisionResult = null;
              if(hitElement){
                collisionResult = resolveCollision(m, hitElement, S.player, R, Date.now());
              }

              let dmg = Math.round((isCrit ? pDmg*critMult : pDmg) * specialMult);
              /* Boss invulnerability — can only be damaged during recovery phase */
              if(m._invulnerable){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'IMMUNE',color:'#888',ts:Date.now()});
                BT_AUDIO.beep(200,0.03,0.04,'square');
                return;
              }
              /* Level-difference scaling — hard to kill monsters much higher level */
              const lvlDiff = (m.level||1) - (R.level||1);
              if(lvlDiff > 3) dmg = Math.max(1, Math.round(dmg * Math.max(0.1, 1 - lvlDiff*0.08)));
              m.curHp -= dmg;

              /* Collision damage + feedback */
              if(collisionResult){
                m.curHp -= collisionResult.damage;
                const coll = collisionResult.collision;
                const elemColor = ELEMENTS[collisionResult.triggerElement]?.color || '#fff';
                /* Collision burst damage number */
                S.dmgNumbers.push({x:m.x+8,y:m.y-35,text:'💥'+collisionResult.damage+' '+coll.name,color:elemColor,ts:Date.now()});
                /* Mana restore feedback */
                if(collisionResult.manaRestored > 0){
                  S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+collisionResult.manaRestored+' MP',color:'#3b82f6',ts:Date.now()});
                }
                /* Collision burst particles — element colored */
                for(let cp=0;cp<15;cp++){
                  S.hitParticles.push({
                    x:m.x+(Math.random()-0.5)*6, y:m.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-2,
                    life:0.8, color:elemColor, size:2+Math.random()*3
                  });
                }
                S.screenShake = Math.max(S.screenShake, 5);
                /* Codex discovery */
                const isNew = discoverCollision(coll.id);
                if(isNew){
                  S.dmgNumbers.push({x:P.x,y:P.y-65,text:'📖 NEW: '+coll.name+'!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                }
              }
              /* §Creative Vision — material-varied hit sound */
              BT_AUDIO.hitMaterial(m.archetype || m.type);

              /* §19.1 Quest tracking — combat flags */
              if(!R._questFlags) R._questFlags = {};
              if(isCrit) R._questFlags.critsLanded = (R._questFlags.critsLanded||0) + 1;
              if(hitElement){
                if(!R._questFlags.statusesApplied) R._questFlags.statusesApplied = {};
                R._questFlags.statusesApplied[hitElement] = true;
              }
              if(collisionResult && activeWpn.isVolatile) R._questFlags.volatileCollision = true;
              /* Three-layer collision sound if collision fired */
              if(collisionResult){
                BT_AUDIO.collisionSound(collisionResult.setupElement, collisionResult.triggerElement, collisionResult.manaRestored);
              }
              /* §6 Hit Stop — freeze frame proportional to hit significance */
              if(collisionResult && isCrit){
                S._hitStopDuration = 120;
                S._hitStop = Date.now() + 120; /* Grand moment: collision + crit */
              } else if(collisionResult){
                S._hitStopDuration = 80;
                S._hitStop = Date.now() + 80; /* Collision burst */
              } else if(isCrit){
                S._hitStopDuration = 60;
                S._hitStop = Date.now() + 60; /* Critical hit */
              } else {
                /* Micro-stop on every hit — subtle weight */
                S._hitStopDuration = 25;
                S._hitStop = Date.now() + 25;
              }
              /* Knockback — §Creative Vision: proportional to hit weight */
              const kbAngle = Math.atan2(m.y-P.y, m.x-P.x);
              const kbForce = isCrit ? 14 : (S._specialAttack ? 10 : 6);
              /* Collision adds extra knockback */
              const collisionKb = collisionResult ? 4 : 0;
              m.x += Math.cos(kbAngle)*(kbForce+collisionKb);
              m.y += Math.sin(kbAngle)*(kbForce+collisionKb);
              /* §Creative Vision — Weapon-specific hit particles */
              const wpnHitType = activeWpn.type || 'sword';
              const weaponFX = spawnWeaponHitFX(m.x, m.y, kbAngle, wpnHitType, isCrit);
              weaponFX.forEach(p => S.hitParticles.push(p));
              /* Blood splatter on ground */
              for(let bs=0;bs<(isCrit?6:3);bs++){
                S.hitParticles.push({
                  x:m.x+Math.cos(kbAngle)*(8+Math.random()*15), y:m.y+Math.sin(kbAngle)*(8+Math.random()*15),
                  vx:0, vy:0, life:1.5, color:'#880011', size:2+Math.random()*2
                });
              }
              /* Screen shake */
              S.screenShake = isCrit ? 6 : 3;
              /* Camera punch — directional kick toward the hit */
              if(isCrit || collisionResult){
                const cpAngle = Math.atan2(m.y-P.y, m.x-P.x);
                const cpForce = isCrit ? 12 : 8;
                S._camPunch = { dx:Math.cos(cpAngle)*cpForce, dy:Math.sin(cpAngle)*cpForce, ts:Date.now() };
              }
              /* Impact ring flash — expanding ring at point of contact */
              if(!S._impactRings) S._impactRings = [];
              S._impactRings.push({
                x:m.x, y:m.y, ts:Date.now(),
                color: isCrit ? '#f5c542' : (collisionResult ? (ELEMENTS[collisionResult.triggerElement]?.color||'#fff') : '#fff'),
                maxR: isCrit ? 30 : (collisionResult ? 25 : 16),
                duration: isCrit ? 250 : 150,
              });
              /* Damage number — scaled by significance */
              if(isCrit && collisionResult){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥⚡ '+dmg,color:'#f5c542',ts:Date.now()});
              } else if(isCrit){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'💥 '+dmg,color:'#f5c542',ts:Date.now()});
              } else {
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:''+dmg,color:'#fff',ts:Date.now()});
              }

              if(m.curHp <= 0){
                m.alive = false;
                m.respawnAt = Date.now() + 30000;
                m.statuses = {};

                /* §19.1 Quest kill tracking */
                if(R._questKills === undefined) R._questKills = {};
                Object.keys(QUEST_CHAINS).forEach(qid => {
                  if(R._quests?.[qid] === QUEST_STATUS.active) R._questKills[qid] = (R._questKills[qid]||0) + 1;
                });

                /* ═══ THE GRAND SLAM — §Creative Vision: scaled cinematic micro-event ═══ */
                const isGrandSlam = isCrit;
                const isBigEnemy = (m.archetype==='brute'||m.archetype==='sentinel'||m.archetype==='hexer');
                const killScale = isGrandSlam ? (isBigEnemy ? 3 : 2) : (isBigEnemy ? 1.5 : 1);

                /* ═══ COMPREHENSIVE STATS — monster kill ═══ */
                if(!R._compStats) R._compStats = createDefaultCompStats();
                R._compStats.monstersKilled++;
                if(isGrandSlam) R._compStats.grandSlams++;
                if(m.level > (R._compStats.highestMonsterKill||0)) R._compStats.highestMonsterKill = m.level;
                if(m.isBoss) R._compStats.bossesKilled++;

                /* ═══ RARE DROP — 0.1% chance on any kill ═══ */
                if(Math.random() < RARE_DROP_CHANCE){
                  const rareDrop = RARE_DROP_ITEMS[Math.floor(Math.random()*RARE_DROP_ITEMS.length)];
                  R.achievementPoints = (R.achievementPoints||0) + rareDrop.points;
                  R._compStats.rareDropsFound++;
                  S.dmgNumbers.push({x:m.x,y:m.y-80,text:rareDrop.emoji+' RARE: '+rareDrop.name+' (+'+rareDrop.points+' AP)',color:'#f5c542',ts:Date.now()});
                  S.screenShake = 4;
                  BT_AUDIO.beep(800,0.1,0.12,'sine');
                  setTimeout(()=>BT_AUDIO.beep(1000,0.08,0.1,'sine'),80);
                  setTimeout(()=>BT_AUDIO.beep(1200,0.1,0.12,'sine'),160);
                }

                /* ═══ KILL SLOWMO — brief time dilation on significant kills ═══ */
                if(isGrandSlam || isBigEnemy){
                  S._killSlowmo = Date.now();
                  S._killSlowmoDuration = isGrandSlam && isBigEnemy ? 300 : isGrandSlam ? 200 : 150;
                }

                /* Sound — proportional to significance */
                if(isGrandSlam){
                  BT_AUDIO.grandSlam();
                } else {
                  BT_AUDIO.deathBoom();
                }

                /* Screen shake — proportional */
                S.screenShake = Math.round(4 * killScale);

                /* Death particles — element/weapon specific via getElementDeathFX */
                const killAngle = Math.atan2(m.y-P.y, m.x-P.x);
                const deathParts = [];
                const _killElem = hitElement || activeWpn.element1 || null;
                const _killColl = collisionResult ? collisionResult.collision : null;

                /* Try element-specific death first */
                if(_killColl){
                  /* Collision kill — use the showpiece collision death effect */
                  const collFx = getCollisionDeathFX(m.x, m.y, _killColl.id, killAngle,
                    ({fodder:8,brute:15,swarm:6,sentinel:12,volatile:9,stalker:10,hexer:10})[arch]||10, killScale);
                  collFx.forEach(p => deathParts.push(p));
                  /* Also add element particles for visual richness */
                  if(_killElem){
                    const elemFx = getElementDeathFX(m.x, m.y, _killElem, killAngle, m.color,
                      ({fodder:8,brute:15,swarm:6,sentinel:12,volatile:9,stalker:10,hexer:10})[arch]||10, killScale*0.5);
                    elemFx.particles.forEach(p => deathParts.push(p));
                  }
                } else if(_killElem){
                  const elemFx = getElementDeathFX(m.x, m.y, _killElem, killAngle, m.color, 
                    ({fodder:8,brute:15,swarm:6,sentinel:12,volatile:9,stalker:10,hexer:10})[arch]||10, killScale);
                  elemFx.particles.forEach(p => deathParts.push(p));
                } else {
                  /* No element — generic directional spray */
                  const partCount = Math.round(20 * killScale);
                  for(let dp=0;dp<partCount;dp++){
                    const spread = (Math.random()-0.5) * 1.2;
                    const spd = (2 + Math.random()*6) * killScale;
                    deathParts.push({
                      x:m.x, y:m.y,
                      vx: Math.cos(killAngle+spread)*spd,
                      vy: Math.sin(killAngle+spread)*spd - Math.random()*3,
                      life:1, color: isGrandSlam ? '#f5c542' : m.color,
                      size: (1.5+Math.random()*2) * (isGrandSlam ? 1.5 : 1)
                    });
                  }
                }
                /* Extra debris for Grand Slam — always present */
                if(isGrandSlam){
                  for(let gp=0;gp<10;gp++){
                    deathParts.push({
                      x:m.x, y:m.y,
                      vx: Math.cos(killAngle+(Math.random()-0.5)*0.8)*(5+Math.random()*8),
                      vy: -3-Math.random()*6,
                      life:1.5, color:(['#f5c542','#fff','#fbbf24','#fde68a'])[Math.floor(Math.random()*4)],
                      size: 2+Math.random()*4
                    });
                  }
                }
                S.deathExplosions.push({
                  x:m.x, y:m.y, ts:Date.now(), emoji:m.emoji, particles:deathParts,
                  isGrandSlam, killScale,
                  killType: (activeWpn.type==='staff') ? 'magic' : (activeWpn.type==='bow') ? 'ranged' : 'melee',
                  killElement: _killElem, killCollision: _killColl?.id || null,
                  weaponType: activeWpn.type || 'greatsword',
                  killAngle, bodyColor: m.color, bodySize: ({fodder:8,brute:15,swarm:6,sentinel:12,volatile:9,stalker:10,hexer:10})[arch]||10,
                  archetype: arch, stuckArrows: m._stuckArrows || [],
                });

                /* ═══ GROUND SPLATTER — persistent kill marks ═══ */
                if(!S.groundSplatter) S.groundSplatter = [];
                const splatElem = m.element;
                const splatCol = splatElem ? (ELEMENTS[splatElem]?.color || '#ff5e6c') : '#8a2030';
                const splatCount = isGrandSlam ? 5 : 2 + Math.floor(Math.random()*2);
                for(let si=0; si<splatCount; si++){
                  S.groundSplatter.push({
                    x: m.x + (Math.random()-0.5)*24,
                    y: m.y + (Math.random()-0.5)*16,
                    color: splatCol,
                    size: 3 + Math.random()*5 + (isGrandSlam?3:0),
                    ts: Date.now(),
                    element: splatElem,
                  });
                }
                /* Cap splatter at 80 marks to prevent memory bloat */
                if(S.groundSplatter.length > 80) S.groundSplatter.splice(0, S.groundSplatter.length - 80);

                /* Loot cascade — scattered in kill direction, then settles */
                /* XP and gold granted immediately on kill — no pickup needed */
                const _wrMult = (S.rpg._wellRestedUntil && Date.now() < S.rpg._wellRestedUntil) ? WELL_RESTED_XP_MULT : 1;
                const isRare = Math.random() < 0.002; /* 0.2% — 10x scarcer than before */
                const killXp = Math.ceil((isRare ? m.xp*3 : m.xp) * _wrMult);
                const killGold = Math.ceil(isRare ? m.gold*10 : m.gold);
                R.xp += killXp;
                R.coins += killGold;
                S.dmgNumbers.push({x:m.x,y:m.y-25,text:'+'+killXp+'XP',color:'#60a5fa',ts:Date.now()});
                S.dmgNumbers.push({x:m.x,y:m.y-15,text:'+'+killGold+'G',color:'#f5c542',ts:Date.now()});

                const lootCount = isGrandSlam ? 3 : 1;
                for(let li=0;li<lootCount;li++){
                  const lootAngle = killAngle + (Math.random()-0.5)*1.0;
                  const lootDist = 15 + Math.random()*25 * killScale;
                  S.groundLoot.push({
                    x: m.x + Math.cos(lootAngle)*lootDist + (Math.random()-0.5)*10,
                    y: m.y + Math.sin(lootAngle)*lootDist + (Math.random()-0.5)*10,
                    coins: 0, xp: 0,
                    skull: m.type, skullEmoji: '🦴',
                    ts: Date.now() + li*80,
                    rare: isRare && li===0,
                  });
                }
                if(isRare){
                  S.dmgNumbers.push({x:m.x,y:m.y-50,text:'⭐ RARE DROP!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                  setTimeout(()=>BT_AUDIO.collect(),150);
                }

                /* §4.6 Weapon drops — extremely rare below Lv100, meaningful at Lv100 */
                const mLvl = m.level || 1;
                /* Drop chance itself is much lower at low levels */
                /* Lv1: 0.05%, Lv50: 0.3%, Lv100: 3% */
                const lvlFactor = Math.pow(mLvl / 100, 3); /* cubic — Lv50 = 0.125, Lv100 = 1.0 */
                const dropChance = 0.0005 + lvlFactor * 0.03 + (isGrandSlam ? 0.005 : 0);
                if(Math.random() < dropChance){
                  const zoneElem = ZONES[S.currentZone]?.element;
                  const secondaryElem = ZONES[S.currentZone]?.secondary;
                  let dropTier, dropE1, dropE2, dropName, dropVolatile=false;

                  /* ═══ Level-scaled rarity table — cubic scaling ═══ */
                  /* lvlFactor: Lv1=0.000001, Lv10=0.001, Lv25=0.016, Lv50=0.125, Lv75=0.42, Lv100=1.0 */
                  /* Shift:     Lv1: ~1/5,000,000   Lv50: 1/40,000   Lv100: 1/500 */
                  /* Fusion:    Lv1: ~1/500,000      Lv50: 1/4,000    Lv100: 1/50 */
                  /* Elemental: Lv1: ~1/5,000        Lv50: 1/40       Lv100: 1/4 */
                  const shiftChance   = 0.0000002 + lvlFactor * 0.002;   /* Lv1: 0.00002%, Lv100: 0.2% */
                  const fusionChance  = 0.000002  + lvlFactor * 0.02;    /* Lv1: 0.0002%, Lv100: 2% */
                  const elemChance    = 0.0002    + lvlFactor * 0.25;    /* Lv1: 0.02%, Lv100: 25% */
                  const tierRoll = Math.random();

                  if(tierRoll < shiftChance && zoneElem){
                    dropTier = 'shift';
                    dropE1 = zoneElem; dropE2 = null;
                  } else if(tierRoll < shiftChance + fusionChance && zoneElem){
                    dropTier = 'fusion';
                    dropE1 = zoneElem;
                    dropE2 = secondaryElem || ['flame','frost','water','venom','storm','stone','wind'].filter(e=>e!==zoneElem)[Math.floor(Math.random()*6)];
                    const volPairs = [['flame','water'],['water','venom'],['venom','wind'],['wind','stone'],['stone','storm'],['storm','frost'],['frost','flame']];
                    dropVolatile = volPairs.some(([a,b])=>(dropE1===a&&dropE2===b)||(dropE1===b&&dropE2===a));
                  } else if(tierRoll < shiftChance + fusionChance + elemChance && zoneElem){
                    dropTier = 'elemental';
                    dropE1 = zoneElem; dropE2 = null;
                  } else {
                    dropTier = 'common';
                    dropE1 = null; dropE2 = null;
                  }

                  /* Random weapon type */
                  const dropTypes = ['greatsword','sword','bow','staff'];
                  const dropType = dropTypes[Math.floor(Math.random()*dropTypes.length)];
                  const wpnLabel = WEAPON_TYPES[dropType].label;
                  const tierMult = RARITY_TIERS[dropTier].mult;
                  const tierColor = RARITY_TIERS[dropTier].color;

                  /* Build name */
                  if(dropTier==='common') dropName = wpnLabel;
                  else if(dropTier==='elemental') dropName = (dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+' '+wpnLabel;
                  else if(dropTier==='fusion') dropName = (dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+(dropE2.charAt(0).toUpperCase()+dropE2.slice(1))+' '+wpnLabel;
                  else dropName = 'Prismatic '+wpnLabel;

                  /* Add to ground loot as weapon drop */
                  const weaponDrop = {
                    x: m.x + (Math.random()-0.5)*20,
                    y: m.y + (Math.random()-0.5)*20,
                    ts: Date.now(),
                    isWeapon: true,
                    weapon: { type:dropType, tier:dropTier, tierMult, element1:dropE1, element2:dropE2, name:dropName, isVolatile:dropVolatile },
                    tierColor,
                  };
                  S.groundLoot.push(weaponDrop);

                  /* Drop announcement */
                  const tierLabel = RARITY_TIERS[dropTier].label;
                  S.dmgNumbers.push({x:m.x,y:m.y-60,text:'🗡️ '+tierLabel+' '+dropName+'!',color:tierColor,ts:Date.now()});
                  if(dropTier!=='common'){
                    BT_AUDIO.collect();
                    if(dropTier==='fusion'||dropTier==='shift') setTimeout(()=>BT_AUDIO.collect(),120);
                  }
                }

                /* ═══ GEM DROP FROM MONSTER KILL — less efficient than life skills ═══ */
                const killZoneElem = ZONES[S.currentZone]?.element;
                if(killZoneElem && Math.random() < GEM_DROP_RATES.monsterKill){
                  if(!R.lifeSkills) R.lifeSkills = createDefaultLifeSkills();
                  if(!R.lifeSkills.gems) R.lifeSkills.gems = {};
                  const gemKey = 'raw_'+killZoneElem;
                  R.lifeSkills.gems[gemKey] = (R.lifeSkills.gems[gemKey]||0) + 1;
                  const gemName = ZONE_RESOURCES[killZoneElem]?.gem || (killZoneElem+' Gem');
                  const gemCol = ZONE_RESOURCES[killZoneElem]?.gemColor || '#fff';
                  S.dmgNumbers.push({x:m.x,y:m.y-65,text:'💎 Raw '+gemName+'!',color:gemCol,ts:Date.now()});
                }

                /* ═══ GOLD NUGGET DROP — rare from monster kills ═══ */
                if(Math.random() < GOLD_NUGGET_DROP.monsterKill){
                  R.goldNuggets = (R.goldNuggets||0) + 1;
                  S.dmgNumbers.push({x:m.x,y:m.y-75,text:'✨ Gold Nugget!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.beep(1000,0.08,0.1,'sine');
                  setTimeout(()=>BT_AUDIO.beep(1200,0.06,0.08,'sine'),80);
                }

                if(isGrandSlam){
                  S.dmgNumbers.push({x:m.x,y:m.y-40,text:'GRAND SLAM!',color:'#fbbf24',ts:Date.now()});
                }

                /* Check level up — §6.2 tri-phase XP curve */
                while(R.xp >= xpRequired(R.level)){
                  R.xp -= xpRequired(R.level);
                  R.level++;
                  R.unspentT1 += 5;
                  R.unspentT2 += 5;
                  R.unspentPts = R.unspentT1 + R.unspentT2;
                  recalcDerived(R);
                  R.hp = R.maxHp; R.stamina = R.maxStamina; R.mana = R.maxMana;
                  setLevelUpMsg({level:R.level, ts:Date.now()});
                  BT_AUDIO.levelUp();
                }
                setRpgState({...R});
                try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                btRpc('bt_monster_kill',{p_id:getBtPlayerId(),p_monster_type:m.type,p_damage:dmg,p_is_crit:isCrit,p_is_special:!!S._specialAttack}).then(sr=>{if(sr&&sr.rpg){R.level=sr.rpg.level;R.xp=sr.rpg.xp;R.coins=sr.rpg.coins;R.unspentPts=sr.rpg.unspent_pts;setRpgState({...R});}});
              }
            }
          });
          /* §18 Gathering nodes — now use action button, not swing */
          /* Hit NPCs */
          if(S.npcs){
            S.npcs.forEach(npc=>{
              if(!npc.alive || npc._hitThisSwing) return;
              const nDist = Math.sqrt((npc.x-P.x)**2+(npc.y-P.y)**2);
              if(nDist > SWING_RANGE) return;
              const nAngle = Math.atan2(npc.y-P.y, npc.x-P.x);
              let naDiff = nAngle - baseAngle;
              while(naDiff>Math.PI) naDiff-=Math.PI*2;
              while(naDiff<-Math.PI) naDiff+=Math.PI*2;
              if(Math.abs(naDiff) < SWING_ARC/2){
                npc._hitThisSwing = true;
                const npcDmg = pDmg;
                npc.hp -= npcDmg;
                BT_AUDIO.thwack();
                const nkbA2 = Math.atan2(npc.y-P.y, npc.x-P.x);
                npc.x += Math.cos(nkbA2)*8; npc.y += Math.sin(nkbA2)*8;
                for(let np2=0;np2<10;np2++) S.hitParticles.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*4+Math.cos(nkbA2)*2,vy:(Math.random()-.5)*4-1,life:1,color:['#cc2233','#aa1122','#dd3344'][Math.floor(Math.random()*3)],size:1.5+Math.random()*2});
                S.screenShake = 2;
                const nkbA = Math.atan2(npc.y-P.y, npc.x-P.x);
                npc.x += Math.cos(nkbA)*5;
                npc.y += Math.sin(nkbA)*5;
                for(let np=0;np<8;np++){
                  S.hitParticles.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*4+Math.cos(nkbA)*2,vy:(Math.random()-.5)*4-1,life:1,color:'#cc2233',size:1.5+Math.random()*2});
                }
                S.dmgNumbers.push({x:npc.x,y:npc.y-20,text:''+npcDmg,color:'#fff',ts:Date.now()});
                S.screenShake = 2;
                if(npc.hp <= 0){
                  npc.alive = false;
                  npc.respawnAt = Date.now() + 10000;
                  BT_AUDIO.deathBoom();
                  S.screenShake = 5;
                  const ndParts = [];
                  for(let dp=0;dp<15;dp++) ndParts.push({x:npc.x,y:npc.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:1,color:npc.color,size:2+Math.random()*2});
                  S.deathExplosions.push({x:npc.x,y:npc.y,ts:Date.now(),emoji:'💀',particles:ndParts});
                  S.groundLoot.push({x:npc.x,y:npc.y,coins:5,xp:0,skull:'npc',skullEmoji:'🦴',ts:Date.now()});
                  S.rpg.xp += 5;
                  S.dmgNumbers.push({x:npc.x,y:npc.y-35,text:'+5XP',color:'#60a5fa',ts:Date.now()});
                }
              }
            });
          }

          /* Hit other players (PvP) — §19 broadcast attack event */
          if(S.channel){
            const specialMult2 = S._specialAttack ? SPECIAL_ATK_MULT : 1;
            /* §19 PvP only works outside town and safe zones */
            const inSafeZone = ZONES[S.currentZone]?.safe;
            if(!inSafeZone){
              const pvpAngle = S.lockedTarget&&S.lockedTarget.type==='player'&&S.lockedTarget.ref
                ? Math.atan2((S.lockedTarget.ref.y||S.lockedTarget.ref.renderY||P.y)-P.y,(S.lockedTarget.ref.x||S.lockedTarget.ref.renderX||P.x)-P.x)
                : baseAngle;
              /* Track threat — attacking a player starts the threat counter */
              S._pvpThreat = Date.now() + PVP_THREAT_DURATION;
              if(S.channel) S.channel.send({type:'broadcast', event:'player_attack', payload:{
                id:S.myId, x:P.x, y:P.y, angle:pvpAngle,
                dmgBase:pDmg*specialMult2, critChance:critChance,
                range:wpnType.range||SWING_RANGE, arc:wpnType.arc||SWING_ARC, ts:Date.now(),
                inDuel:!!S._inDuel,
              }});
            }
          }
          /* Optimistic local visual — show slash effect on nearby players */
          Object.entries(S.others).forEach(([pid, o])=>{
            if(o._hitThisSwing) return;
            const oDist = Math.sqrt((o.x-P.x)**2+(o.y-P.y)**2);
            if(oDist > SWING_RANGE) return;
            const oAngle = Math.atan2(o.y-P.y, o.x-P.x);
            let aDiff = oAngle - baseAngle;
            while(aDiff > Math.PI) aDiff -= Math.PI*2;
            while(aDiff < -Math.PI) aDiff += Math.PI*2;
            if(Math.abs(aDiff) < SWING_ARC/2){
              o._hitThisSwing = true;
              BT_AUDIO.thwack();
              const pvpKbA = Math.atan2(o.y-P.y, o.x-P.x);
              for(let pp=0;pp<12;pp++) S.hitParticles.push({x:o.x+(Math.random()-.5)*6,y:o.y+(Math.random()-.5)*6,vx:Math.cos(pvpKbA+(Math.random()-.5)*1.5)*(1+Math.random()*3),vy:Math.sin(pvpKbA+(Math.random()-.5)*1.5)*(1+Math.random()*3)-1,life:1,color:['#cc2233','#aa1122'][Math.floor(Math.random()*2)],size:1.5+Math.random()*2});
              S.screenShake = 3;
              S.dmgNumbers.push({x:o.x,y:o.y-20,text:'⚔️',color:'#fff',ts:Date.now()});
            }
          });
        }
        if(Date.now()-S.swingTimer > 450) {
          S.isSwinging = false;
          S.monsters.forEach(m=>{ m._hitThisSwing=false; });
          if(S.npcs) S.npcs.forEach(n=>{ n._hitThisSwing=false; });
          Object.values(S.others).forEach(o=>{ o._hitThisSwing=false; });
        }

        /* Save RPG state periodically */
        if(!S._rpgSaveTimer) S._rpgSaveTimer=0;
        S._rpgSaveTimer++;
        if(S._rpgSaveTimer%180===0){
          try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
          syncRpgToServer(R);
        }
      }

      /* Pick up ground loot — walk over it */
      if(S.groundLoot){
        S.groundLoot = S.groundLoot.filter(loot=>{
          /* Expire after 60 seconds (death drops use their own expiry timer) */
          if(loot.isDeathDrop && loot.expiry && Date.now() > loot.expiry) return false;
          if(loot._expired) return false;
          if(!loot.isDeathDrop && Date.now()-loot.ts > 60000) return false;
          const lDist = Math.sqrt((P.x-loot.x)**2+(P.y-loot.y)**2);

          /* ═══ LOOT MAGNETISM — pull toward player when close ═══ */
          const magnetRange = 50;
          if(lDist < magnetRange && lDist > 20){
            const pullStrength = (1 - lDist/magnetRange) * 3;
            const pullAngle = Math.atan2(P.y-loot.y, P.x-loot.x);
            loot.x += Math.cos(pullAngle) * pullStrength;
            loot.y += Math.sin(pullAngle) * pullStrength;
          }

          if(lDist < 20){
            /* §4.6 Weapon drop pickup — equip if better, stash otherwise */
            if(loot.isWeapon && loot.weapon){
              const drop = loot.weapon;
              const wpnDef = WEAPON_TYPES[drop.type];
              const isRanged = wpnDef.type === 'ranged';
              const current = isRanged ? S.rpg.rangedWeapon : S.rpg.weapon;
              const dropPower = drop.tierMult * (WEAPON_TYPES[drop.type]?.base||30);
              const curPower = (current?.tierMult||1) * (WEAPON_TYPES[current?.type||'greatsword']?.base||30);
              const canEquipDrop = meetsStatReq(S.rpg, drop, drop.type);
              if(dropPower >= curPower && canEquipDrop){
                /* Better weapon — equip and stash the old one */
                if(current && current.name){
                  if(!S.rpg.weaponStash) S.rpg.weaponStash = [];
                  if(S.rpg.weaponStash.length < WEAPON_STASH_MAX) S.rpg.weaponStash.push({...current});
                  else {
                    /* Stash full — auto-sell the oldest stashed weapon */
                    const sold = S.rpg.weaponStash.shift();
                    const sv = Math.ceil((sold.tierMult||1) * (WEAPON_TYPES[sold.type]?.base||30) * 0.5);
                    S.rpg.coins += sv;
                  }
                }
                if(isRanged) S.rpg.rangedWeapon = drop; else S.rpg.weapon = drop;
                S.dmgNumbers.push({x:loot.x,y:loot.y-20,text:'🗡️ EQUIPPED: '+drop.name,color:loot.tierColor||'#fff',ts:Date.now()});
                BT_AUDIO.collect();
                if(drop.tier==='fusion'||drop.tier==='shift'){
                  BT_AUDIO.beep(523,0.1,0.08,'sine');
                  setTimeout(()=>BT_AUDIO.beep(659,0.1,0.08,'sine'),100);
                  setTimeout(()=>BT_AUDIO.beep(784,0.15,0.1,'sine'),200);
                }
              } else {
                /* Weaker drop — stash it for later comparison */
                if(!S.rpg.weaponStash) S.rpg.weaponStash = [];
                if(S.rpg.weaponStash.length < WEAPON_STASH_MAX){
                  S.rpg.weaponStash.push(drop);
                  S.dmgNumbers.push({x:loot.x,y:loot.y-20,text:'📦 STASHED: '+drop.name,color:'#8890b8',ts:Date.now()});
                } else {
                  /* Stash full — auto-sell */
                  const sellValue = Math.ceil(dropPower * 0.5);
                  S.rpg.coins += sellValue;
                  S.dmgNumbers.push({x:loot.x,y:loot.y-20,text:'+'+sellValue+'G (sold)',color:'#f5c542',ts:Date.now()});
                }
                BT_AUDIO.beep(400,0.05,0.08,'sine');
              }
              setRpgState({...S.rpg});
              try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
              return false;
            }

            /* §5.5 Death drop recovery — pick up scattered inventory items */
            if(loot.isDeathDrop && loot.deathItems){
              if(!S.rpg.inventory) S.rpg.inventory = {};
              let recoveredCount = 0;
              loot.deathItems.forEach(item => {
                S.rpg.inventory[item.key] = (S.rpg.inventory[item.key]||0) + item.qty;
                recoveredCount += item.qty;
              });
              S.dmgNumbers.push({x:loot.x,y:loot.y-20,text:'📦 RECOVERED '+recoveredCount+' items!',color:'#3dd497',ts:Date.now()});
              if(!S.rpg._questFlags) S.rpg._questFlags = {};
              S.rpg._questFlags.recoveredDeathDrop = true;
              BT_AUDIO.collect();
              BT_AUDIO.beep(523,0.08,0.08,'sine');
              setTimeout(()=>BT_AUDIO.beep(659,0.08,0.08,'sine'),80);
              setTimeout(()=>BT_AUDIO.beep(784,0.1,0.1,'sine'),160);
              setRpgState({...S.rpg});
              try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
              return false;
            }

            /* Normal loot pickup (gold only — XP granted on kill) */
            S.rpg.coins += loot.coins||0;
            syncRpgToServer(S.rpg);
            if(loot.skull && S.rpg.inventory) S.rpg.inventory[loot.skull] = (S.rpg.inventory[loot.skull]||0)+1;
            if(loot.skull){
              if(!S.rpg.skulls) S.rpg.skulls = {};
              S.rpg.skulls[loot.skull] = (S.rpg.skulls[loot.skull]||0) + 1;
            }
            if(loot.coins) S.dmgNumbers.push({x:loot.x+12,y:loot.y-8,text:'+'+loot.coins+'G',color:'#f5c542',ts:Date.now()});
            BT_AUDIO.beep(500,0.06,0.1,'sine');
            /* ═══ LOOT PICKUP SPARKLE — gold/blue particles burst upward ═══ */
            for(let lsp=0;lsp<8;lsp++){
              const lspA = (lsp/8)*Math.PI*2;
              S.hitParticles.push({
                x:loot.x, y:loot.y,
                vx:Math.cos(lspA)*(1+Math.random()*2), vy:-1.5-Math.random()*3,
                life:0.6, color:lsp%2===0?'#f5c542':'#60a5fa', size:1.5+Math.random()
              });
            }
            /* Check level up — §6.2 tri-phase */
            while(S.rpg.xp >= xpRequired(S.rpg.level)){
              S.rpg.xp -= xpRequired(S.rpg.level);
              S.rpg.level++;
              S.rpg.unspentT1 = (S.rpg.unspentT1||0) + 5;
              S.rpg.unspentT2 = (S.rpg.unspentT2||0) + 5;
              S.rpg.unspentPts = S.rpg.unspentT1 + S.rpg.unspentT2;
              recalcDerived(S.rpg);
              S.rpg.hp = S.rpg.maxHp; S.rpg.stamina = S.rpg.maxStamina; S.rpg.mana = S.rpg.maxMana;
              setLevelUpMsg({level:S.rpg.level, ts:Date.now()});
              BT_AUDIO.collect();
              /* ═══ LEVEL UP BURST — celebratory particle explosion ═══ */
              S.screenShake = 8;
              S._levelUpFlash = Date.now();
              for(let lp=0;lp<40;lp++){
                const lpAngle = (lp/40)*Math.PI*2;
                const lpSpd = 3+Math.random()*5;
                S.hitParticles.push({
                  x:P.x, y:P.y,
                  vx:Math.cos(lpAngle)*lpSpd, vy:Math.sin(lpAngle)*lpSpd-2,
                  life:1.2, color:(['#f5c542','#fbbf24','#60a5fa','#3dd497','#a78bfa','#fff'])[Math.floor(Math.random()*6)],
                  size:2+Math.random()*3
                });
              }
              /* Rising level text */
              S.dmgNumbers.push({x:P.x,y:P.y-50,text:'⬆️ LEVEL '+S.rpg.level+'!',color:'#f5c542',ts:Date.now()});
              S.dmgNumbers.push({x:P.x,y:P.y-35,text:'HP/MANA RESTORED',color:'#3dd497',ts:Date.now()});
              /* Ascending chime */
              BT_AUDIO.beep(523,0.1,0.08,'sine');
              setTimeout(()=>BT_AUDIO.beep(659,0.08,0.06,'sine'),100);
              setTimeout(()=>BT_AUDIO.beep(784,0.08,0.06,'sine'),200);
              setTimeout(()=>BT_AUDIO.beep(1047,0.12,0.1,'sine'),300);
            }
            setRpgState({...S.rpg});
            try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
            return false; /* remove loot */
          }
          return true;
        });
      }

      /* §3.2 HP regeneration — OOC: 1.5%/s after 5s no damage. Restoration scales. */
      if(S.rpg && S.lastDamageTaken && Date.now()-S.lastDamageTaken > 5000){
        const R = S.rpg;
        /* §18.1 Food buff multipliers */
        const hasRegenBuff = S._regenBuff && Date.now() < S._regenBuff;
        const hasHpBuff = S._hpBuff && Date.now() < S._hpBuff;
        const hasManaBuff = S._manaBuff && Date.now() < S._manaBuff;
        const regenMult = hasRegenBuff ? 1.3 : 1.0;

        if(R.hp < R.maxHp){
          if(!S._regenTimer) S._regenTimer = 0;
          S._regenTimer++;
          const restMult = 1 + (R.restoration || 0) * 0.001;
          if(S._regenTimer % 4 === 0){
            const healAmt = Math.max(1, Math.ceil(R.maxHp * 0.001 * restMult * regenMult));
            const effectiveMax = hasHpBuff ? Math.floor(R.maxHp * 1.25) : R.maxHp;
            R.hp = Math.min(effectiveMax, R.hp + healAmt);
            setRpgState({...R});
          }
        }
        /* Stamina regen — 10/s base (10 sec full recharge) × Restoration */
        if(R.stamina < R.maxStamina){
          const stRestMult = 1 + (R.restoration || 0) * 0.001;
          const stAmuletMult = R._amuletBonus?.stat === 'staminaRegen' ? (1 + R._amuletBonus.value / 100) : 1;
          R.stamina = Math.min(R.maxStamina, R.stamina + 10/60 * stRestMult * regenMult * stAmuletMult);
        }
        /* Mana regen — §3.4: OOC 2.5%/s after 2s × Restoration */
        if(R.mana < R.maxMana && Date.now()-S.lastDamageTaken > 2000){
          const mRestMult = 1 + (R.restoration || 0) * 0.001;
          const manaRegenMult = hasManaBuff ? 1.3 : 1.0;
          R.mana = Math.min(R.maxMana, R.mana + R.maxMana * 0.0004 * mRestMult * manaRegenMult);
        }
      } else if(S.rpg){
        /* In-combat regen — §3.2: 0.3%/s HP, stamina regens always */
        const R = S.rpg;
        if(R.hp < R.maxHp){
          if(!S._regenTimer) S._regenTimer = 0;
          S._regenTimer++;
          if(S._regenTimer % 10 === 0){
            let healAmt = Math.max(1, Math.ceil(R.maxHp * 0.0005));
            if(R._amuletBonus?.stat === 'hpRegen') healAmt = Math.ceil(healAmt * (1 + R._amuletBonus.value));
            R.hp = Math.min(R.maxHp, R.hp + healAmt);
          }
        }
        /* Stamina always regens — 10/sec */
        if(R.stamina < R.maxStamina){
          R.stamina = Math.min(R.maxStamina, R.stamina + 10/60);
        }
        /* Slow mana regen in combat — 1%/s */
        if(R.mana < R.maxMana){
          R.mana = Math.min(R.maxMana, R.mana + R.maxMana * 0.00017);
        }
      }

      /* Expire damage numbers */
      if(S.dmgNumbers) S.dmgNumbers = S.dmgNumbers.filter(d=>Date.now()-d.ts<1200);

      /* ═══ PLAYTIME TRACKING — increment every ~60 frames (1 second) ═══ */
      if(S.rpg?._compStats){
        if(!S._playtimeTick) S._playtimeTick = 0;
        S._playtimeTick++;
        if(S._playtimeTick % 60 === 0) S.rpg._compStats.playtimeSeconds++;
      }

      /* §15 Tutorial progression — teach by doing */
      if(S._tutorialStep >= 0 && S._tutorialStep < 8){
        const moved = Math.abs(dx)>0.01||Math.abs(dy)>0.01;
        if(S._tutorialStep===0 && moved){
          /* Step 0→1: Player moved! */
          setTutorialStep(1);
          try{localStorage.setItem('bt_tutorial','1');}catch(e){}
        }
        if(S._tutorialStep===1 && (S._dodgeRoll || S._hasDodged)){
          /* Step 1→2: Player dodged! */
          setTutorialStep(2);
          try{localStorage.setItem('bt_tutorial','2');}catch(e){}
        }
        if(S._tutorialStep===2 && S.isSwinging){
          /* Step 2→3: Player attacked! */
          setTutorialStep(3);
          try{localStorage.setItem('bt_tutorial','3');}catch(e){}
        }
        if(S._tutorialStep===3 && S.monsters?.some(m=>!m.alive)){
          /* Step 3→4: Player killed a monster! */
          setTutorialStep(4);
          try{localStorage.setItem('bt_tutorial','4');}catch(e){}
        }


        if(S._tutorialStep===4 && S.currentZone !== 'town'){
          /* Step 4→5: Left town! */
          setTutorialStep(5);
          try{localStorage.setItem('bt_tutorial','5');}catch(e){}
        }
        if(S._tutorialStep===5 && (S.rpg?.level||1) >= 3){
          /* Step 7→8: Reached level 3 */
          setTutorialStep(7);
          try{localStorage.setItem('bt_tutorial','7');}catch(e){}
        }
        if(S._tutorialStep===6){
          /* Tutorial complete */
          setTutorialStep(10);
          try{localStorage.setItem('bt_tutorial','10');}catch(e){}
        }
      }

      /* Camera centers player in game area — with directional lead */
      const _camLead = 30; /* pixels ahead in movement direction */
      const _camLeadX = (Math.abs(dx)>0.1 ? dx * _camLead : 0);
      const _camLeadY = (Math.abs(dy)>0.1 ? dy * _camLead : 0);
      /* Camera punch — directional kick on big hits */
      let _camPunchX = 0, _camPunchY = 0;
      if(S._camPunch){
        const cpAge = (Date.now() - S._camPunch.ts) / 300;
        if(cpAge < 1){
          const cpDecay = 1 - cpAge*cpAge; /* ease-out */
          _camPunchX = S._camPunch.dx * cpDecay;
          _camPunchY = S._camPunch.dy * cpDecay;
        } else {
          S._camPunch = null;
        }
      }
      const camTargetX = P.x - W/2 + _camLeadX + _camPunchX;
      const camTargetY = P.y - H/2 + _camLeadY + _camPunchY;
      /* Adaptive lerp — snappier during fast movement / combat */
      const _camSpeed = (S.isSwinging || S._dodgeRoll) ? 0.18 : (Math.abs(dx)>0.5||Math.abs(dy)>0.5) ? 0.14 : 0.08;
      S.camera.x += (camTargetX - S.camera.x) * _camSpeed;
      S.camera.y += (camTargetY - S.camera.y) * _camSpeed;
      S.camera.x = Math.max(0, Math.min(TOWN_W - W, S.camera.x));
      S.camera.y = Math.max(0, Math.min(TOWN_H - H, S.camera.y));

      /* Broadcast position — slim payload for speed */
      const now = performance.now();
      if(now - S.lastBroadcast > 80 && (dx||dy)) {
        S.lastBroadcast = now;
        if(S.channel) {
          if(S.channel && (!S._lastMoveBroadcast || Date.now()-S._lastMoveBroadcast > 80)) { S._lastMoveBroadcast=Date.now(); S.channel.send({type:'broadcast', event:'move', payload:{i:S.myId, x:Math.round(P.x), y:Math.round(P.y), d:P.dir, z:S.currentZone||'town', vx:Math.round(P.vx*100), vy:Math.round(P.vy*100)}}); }
          if(S.channel && (!S._lastTrack || Date.now()-S._lastTrack > 2000)) { S._lastTrack=Date.now();
            const _rpg = S.rpg;
            const _aw = getActiveWeapon(_rpg);
            S.channel.track({x:P.x,y:P.y,name:S.myName,color:S.myColor,avatar:S.myAvatar,dir:P.dir,bt:S.bodyTorso,bl:S.bodyLegs,rpgLv:_rpg?.level||1,rpgHp:_rpg?.hp||50,rpgMaxHp:_rpg?.maxHp||50,bs:S.bodySize||'slim',
            zone:S.currentZone||'town',
            wpnType:_aw?.type||'greatsword',
            wpnE1:_aw?.element1||null,
            wpnE2:_aw?.element2||null,
            rep:S._pvpReputation||'neutral',
            pet:_rpg?.lifeSkills?.activePet!=null?_rpg.lifeSkills.pets?.[_rpg.lifeSkills.activePet]?.emoji:null,
            /* Extended RPG data for inspect card */
            rpgData: {
              weapon: _aw?.name||'Fists',
              armor: _rpg?.armor?.name||'Rags',
              shield: _rpg?.shield?.name||null,
              amulet: _rpg?.amulet?.name||null,
              power: _rpg?.power||0, vitality: _rpg?.vitality||0,
              endurance: _rpg?.endurance||0, agility: _rpg?.agility||0, mind: _rpg?.mind||0,
              ap: _rpg?.achievementPoints||0,
              kills: _rpg?._compStats?.monstersKilled||0,
              pvpKills: _rpg?._compStats?.pvpKills||0,
              pvpDeaths: _rpg?._compStats?.pvpDeaths||0,
              deaths: _rpg?._compStats?.deaths||0,
              quests: _rpg?._compStats?.questsCompleted||0,
              playtime: Math.floor((_rpg?._compStats?.playtimeSeconds||0)/60),
              clanTag: S._clanData?.tag||null,
              clanName: S._clanData?.name||null,
              clanColor1: S._clanData?.color1||null,
            },
          }); }
        }
      }
      /* Attack energy recharge */
      S._atkEnergy = S._atkEnergy ?? 100;
      if(S._atkEnergy < 100) S._atkEnergy = Math.min(100, S._atkEnergy + 0.5);


      /* §2.3 Shield — drains stamina while held. 20/sec = 5 second hold at 100 max stamina. */
      if(S._shieldUp && S.rpg){
        /* 20 stamina/sec at 60fps = 0.333/frame */
        S.rpg.stamina = Math.max(0, (S.rpg.stamina||0) - 0.333);
        S.shieldEnd = Date.now() + 100;
        if(S.rpg.stamina <= 0){
          S.rpg.stamina = 0;
          S._shieldUp = false;
          S._shieldCdUntil = Date.now() + 2000; /* 2s cooldown when fully drained */
          S.shieldEnd = 0;
        }
      } else {
        S.shieldEnd = 0;
      }

      /* ── RENDER ── */
      /* Screen shake */
      let shakeX=0, shakeY=0;
      if(S.screenShake > 0.1){
        shakeX = (Math.random()-0.5)*S.screenShake*2;
        shakeY = (Math.random()-0.5)*S.screenShake*2;
        S.screenShake *= 0.85; /* decay */
      } else { S.screenShake = 0; }
      ctx.save();
      ctx.translate(shakeX, shakeY);
      ctx.clearRect(-10,-10,W+20,H+20);
      const cx = S.camera.x, cy = S.camera.y;

      /* Tiles */
      const startCol = Math.max(0,Math.floor(cx/TILE));
      const endCol = Math.min(COLS-1, Math.floor((cx+W)/TILE));
      const startRow = Math.max(0,Math.floor(cy/TILE));
      const endRow = Math.min(ROWS-1, Math.floor((cy+H)/TILE));

      /* Day/night cycle — based on real time */
      const hours = new Date().getHours() + new Date().getMinutes()/60;
      const isNight = hours < 6 || hours > 20;
      const isDusk = (hours >= 18 && hours <= 20) || (hours >= 5 && hours < 7);
      const nightAlpha = isNight ? 0.35 : isDusk ? 0.15 : 0;
      const zoneElem = ZONES[S.currentZone]?.element || null;

      for(let r=startRow;r<=endRow;r++){
        for(let cl=startCol;cl<=endCol;cl++){
          const tile = map[r]?.[cl];
          if(tile===undefined) continue;
          const sx = cl*TILE - cx, sy = r*TILE - cy;

          /* Zone-tinted base colors */
          if(tile===0||tile===5){
            /* Grass — zone palette with subtle texture variation */
            const baseGreen = getTileColor(0, S.currentZone);
            const shade = ((cl*17+r*31)%5);
            ctx.fillStyle = baseGreen;
            ctx.fillRect(sx, sy, TILE+1, TILE+1);
            /* Grass texture — small darker/lighter patches */
            ctx.fillStyle = `rgba(0,0,0,${0.02+shade*0.01})`;
            if(shade<2) ctx.fillRect(sx+4+shade*3,sy+2+shade*5,6,5);
            if(shade>2) ctx.fillRect(sx+12+shade*2,sy+14+shade*3,5,4);

            /* ═══ ZONE-SPECIFIC GROUND DETAILS ═══ */
            const _ze = zoneElem;
            if(_ze==='flame'){
              /* Scorched cracks and ember glow spots */
              if((cl*13+r*29)%7===0){
                ctx.strokeStyle='rgba(180,60,10,.2)'; ctx.lineWidth=0.5;
                ctx.beginPath(); ctx.moveTo(sx+4,sy+6); ctx.lineTo(sx+TILE-3,sy+TILE-4); ctx.stroke();
              }
              if((cl+r*3)%11===0){
                ctx.fillStyle=`rgba(255,100,20,${0.08+Math.sin(now/800+cl+r)*0.04})`;
                ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,3+Math.sin(now/600+cl)*1,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='frost'){
              /* Ice crystal patterns on ground */
              if((cl*7+r*11)%5===0){
                ctx.fillStyle='rgba(200,230,255,.12)';
                ctx.fillRect(sx+8,sy+4,8,2); ctx.fillRect(sx+11,sy+2,2,6);
              }
              /* Frost sparkle */
              if((cl+r)%9===0){
                const fsp=Math.sin(now/400+cl*2+r)*0.5+0.5;
                ctx.fillStyle=`rgba(220,240,255,${fsp*0.2})`;
                ctx.beginPath(); ctx.arc(sx+10+cl%8,sy+12+r%6,1,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='venom'){
              /* Toxic puddle sheen and spore dots */
              if((cl*9+r*17)%13===0){
