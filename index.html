          const nx = npc.renderX - cx, ny = npc.renderY - cy;
          if(nx < -50 || nx > W+50 || ny < -50 || ny > H+50) return;
          const nDir = npc._facing || 'down';
          const nSide = nDir==='left'||nDir==='right';
          const nMoving = Math.abs(npc.x-npc.targetX)>4||Math.abs(npc.y-npc.targetY)>4;
          const nFp = now/120;
          const nBob = nMoving ? Math.sin(now/120)*1.5 : 0;
          const nny = ny + nBob;

          /* Shadow */
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath(); ctx.ellipse(nx, nny+22, 9, 3.5, 0, 0, Math.PI*2); ctx.fill();

          /* Body — simplified lego */
          const nTY = nny + 6;
          const nLS = nMoving ? Math.sin(nFp)*3 : 0;
          const nRS = nMoving ? Math.sin(nFp+Math.PI)*3 : 0;
          /* Legs */
          ctx.fillStyle = npc.bl;
          ctx.fillRect(nx-5, nTY+8+nLS, 4, 7);
          ctx.fillRect(nx+1, nTY+8+nRS, 4, 7);
          ctx.fillStyle = '#2a1a0e';
          ctx.fillRect(nx-6, nTY+14+nLS, 6, 2);
          ctx.fillRect(nx, nTY+14+nRS, 6, 2);
          /* Torso */
          ctx.fillStyle = npc.bt;
          ctx.fillRect(nx-6, nTY, 12, 8);
          /* Arms */
          const nLAY = nTY+1 + (nMoving?Math.sin(nFp+Math.PI)*2.5:0);
          const nRAY = nTY+1 + (nMoving?Math.sin(nFp)*2.5:0);
          ctx.fillStyle = npc.bt;
          ctx.fillRect(nx-9, nLAY, 3, 7);
          ctx.fillRect(nx+6, nRAY, 3, 7);
          ctx.fillStyle = '#f0c68a';
          ctx.fillRect(nx-8, nLAY+6, 2, 2);
          ctx.fillRect(nx+6, nRAY+6, 2, 2);

          /* Head — colored circle with NPC badge (or skull for Ferryman) */
          if(npc.avatar === '💀'){
            /* Skull head for The Ferryman */
            ctx.font = '18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('💀', nx, nny+1);
          } else {
            ctx.fillStyle = npc.color;
            ctx.beginPath(); ctx.arc(nx, nny-4, 11, 0, Math.PI*2); ctx.fill();
          }
          /* NPC HP bar */
          const nHpPct = npc.hp/npc.maxHp;
          ctx.fillStyle = 'rgba(0,0,0,.5)';
          ctx.fillRect(nx-12, nny-18, 24, 3);
          ctx.fillStyle = nHpPct>0.5?'#3dd497':nHpPct>0.25?'#f5c542':'#ff5e6c';
          ctx.fillRect(nx-12, nny-18, 24*nHpPct, 3);
          /* NPC indicator — small star */
          ctx.fillStyle = '#f5c542';
          ctx.font = '8px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('★', nx, nny-14);

          /* §19.1 Quest marker above NPC — ❗ for available, ❓ for turn-in ready */
          if(npc._questMarker){
            const qmPulse = Math.sin(now/300)*3;
            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = npc._questMarker==='❗' ? '#f5c542' : '#3dd497';
            ctx.fillText(npc._questMarker, nx, nny-32+qmPulse);
          }

          /* Name */
          ctx.font = 'bold 8px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillStyle = 'rgba(0,0,0,.5)';
          const nnw = ctx.measureText(npc.name).width;
          ctx.fillRect(nx-nnw/2-3, nny-26, nnw+6, 11);
          ctx.fillStyle = npc.color;
          ctx.fillText(npc.name, nx, nny-17);

          /* Chat bubble */
          if(npc.chatBubble){
            const age = Date.now() - npc.chatBubble.ts;
            const alpha = age > 4000 ? 1-(age-4000)/1000 : 1;
            if(alpha > 0){
              ctx.globalAlpha = alpha;
              drawBubble(nx, nny, npc.chatBubble.text);
              ctx.globalAlpha = 1;
            }
          }
        });
      }

      /* Draw emotes above players */
      const emoteNow = Date.now();
      /* Own emote */
      if(S.emote && emoteNow - S.emote.ts < 3000){
        const progress = (emoteNow - S.emote.ts) / 3000;
        const emoteY = py - 46 - progress * 15;
        const alpha = progress > 0.7 ? 1 - (progress - 0.7) / 0.3 : 1;
        const scale = progress < 0.1 ? progress / 0.1 : 1;
        ctx.globalAlpha = alpha;
        ctx.font = `${Math.round(24 * scale)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(S.emote.emoji, px, emoteY);
        ctx.globalAlpha = 1;
      }
      /* Other players' emotes */
      Object.entries(S.others).forEach(([pid, o]) => {
        if(o.emote && emoteNow - o.emote.ts < 3000){
          const osx = o.renderX - cx, osy = o.renderY - cy;
          const progress = (emoteNow - o.emote.ts) / 3000;
          const emoteY = osy - 46 - progress * 15;
          const alpha = progress > 0.7 ? 1 - (progress - 0.7) / 0.3 : 1;
          const scale = progress < 0.1 ? progress / 0.1 : 1;
          ctx.globalAlpha = alpha;
          ctx.font = `${Math.round(24 * scale)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(o.emote.emoji, osx, emoteY);
          ctx.globalAlpha = 1;
        }
      });

      /* Highlight nearby building with glowing border */
      if(S.nearBuilding !== null){
        const b = BUILDINGS[S.nearBuilding];
        const bsx = b.bx * TILE - cx;
        const bsy = b.by * TILE - cy;
        const bsw = b.bw * TILE;
        const bsh = b.bh * TILE;
        ctx.strokeStyle = `rgba(91,82,255,${0.4 + 0.2 * Math.sin(now/300)})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(bsx-1, bsy-1, bsw+2, bsh+2);
        /* Building icon + name below */
        ctx.font = 'bold 10px "Space Mono", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(91,82,255,.9)';
        ctx.fillText(b.icon + ' ' + b.label, bsx + bsw/2, bsy + bsh + 14);
      }

      /* Day/night tint overlay */
      if(nightAlpha > 0){
        ctx.fillStyle = isNight ? `rgba(10,10,40,${nightAlpha})` : `rgba(40,20,10,${nightAlpha})`;
        ctx.fillRect(0, 0, W, H);
      }

      /* ═══ ZONE ATMOSPHERE OVERLAY — element tint + vignette + depth darkness ═══ */
      const _zAtmo = ZONES[S.currentZone]?.atmosphere;
      if(_zAtmo){
        /* Full-screen element color wash */
        if(_zAtmo.tint){
          ctx.fillStyle = _zAtmo.tint;
          ctx.fillRect(0, 0, W, H);
        }
        /* Edge vignette — darker at edges for zone mood */
        if(_zAtmo.vignette){
          const vgr = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.7);
          vgr.addColorStop(0, 'rgba(0,0,0,0)');
          vgr.addColorStop(1, _zAtmo.vignette);
          ctx.fillStyle = vgr;
          ctx.fillRect(0, 0, W, H);
        }
      }
      /* Depth darkness — deeper zones get progressively darker and more oppressive */
      const _depthName = S._currentDepth;
      if(_depthName && _depthName !== 'shallow' && S.currentZone !== 'town'){
        const depthDark = {mid:0.04, deep:0.10, abyss:0.18, core:0.28};
        const darkness = depthDark[_depthName] || 0;
        if(darkness > 0){
          /* Dark overlay gets stronger at deeper depths */
          ctx.fillStyle = `rgba(0,0,0,${darkness})`;
          ctx.fillRect(0, 0, W, H);
          /* Tighter vignette at deeper depths */
          const vigStr = darkness * 1.5;
          const dvgr = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.25, W/2, H/2, Math.max(W,H)*0.55);
          dvgr.addColorStop(0, 'rgba(0,0,0,0)');
          dvgr.addColorStop(1, `rgba(0,0,0,${Math.min(0.4,vigStr)})`);
          ctx.fillStyle = dvgr;
          ctx.fillRect(0, 0, W, H);
        }
        /* Abyss+ gets a subtle pulsing red tint */
        if(_depthName === 'abyss' || _depthName === 'core'){
          const abyssPulse = Math.sin(Date.now()/2000)*0.015+0.02;
          ctx.fillStyle = `rgba(180,20,20,${abyssPulse})`;
          ctx.fillRect(0, 0, W, H);
        }
      }

      /* ═══ ZONE-SPECIFIC RENDERING ═══ */

      /* ── DEEP HOLLOWS: Darkness overlay with torch circle ── */
      if(S.currentZone === 'hollows'){
        const torchR = S._torch ? TORCH_RADIUS_BASE : DARKNESS_RADIUS;
        const darkGrad = ctx.createRadialGradient(px, py, torchR*0.4, px, py, torchR);
        darkGrad.addColorStop(0, 'rgba(0,0,0,0)');
        darkGrad.addColorStop(0.6, 'rgba(0,0,0,0.1)');
        darkGrad.addColorStop(1, 'rgba(0,0,0,0.35)');
        ctx.fillStyle = darkGrad;
        ctx.fillRect(0, 0, W, H);
        /* Dark tint beyond the light radius — visible but dim, not black */
        ctx.fillStyle = 'rgba(15,10,25,0.25)';
        ctx.fillRect(0, 0, W, H);
        /* Torch flicker effect */
        if(S._torch){
          const flicker = Math.sin(now/80)*3 + Math.sin(now/130)*2;
          const glowR = torchR*0.25 + flicker;
          ctx.fillStyle = `rgba(255,160,40,0.04)`;
          ctx.beginPath(); ctx.arc(px, py, glowR, 0, Math.PI*2); ctx.fill();
          /* Torch timer bar */
          const torchPct = Math.max(0, 1 - (Date.now()-S._torch.started)/TORCH_DURATION);
          ctx.fillStyle = 'rgba(0,0,0,.5)';
          ctx.fillRect(px-20, py-35, 40, 4);
          ctx.fillStyle = torchPct > 0.3 ? '#ea580c' : '#ff5e6c';
          ctx.fillRect(px-20, py-35, 40*torchPct, 4);
        }
      }

      /* ── TIDAL CAVES: Tide water level overlay ── */
      if(S.currentZone === 'tidal' && S._tideLevel > 0.5){
        const tideAlpha = (S._tideLevel - 0.5) * 0.15; /* max 0.075 at peak */
        ctx.fillStyle = `rgba(40,100,180,${tideAlpha})`;
        ctx.fillRect(0, 0, W, H);
        /* Swimming indicator */
        if(S._swimming){
          ctx.fillStyle = 'rgba(40,100,180,0.08)';
          ctx.beginPath(); ctx.arc(px, py, 25, 0, Math.PI*2); ctx.fill();
          /* Wave ripples around player */

  /* Virtual joysticks — each tracks its own finger */
  const joystickRef = useRef(null);
  const knobRef = useRef(null);
  const joystickActive = useRef(false);
  const lTouchId = useRef(null);
  const rJoyRef = useRef(null);
  const rKnobRef = useRef(null);
  const rJoyActive = useRef(false);
  const rTouchId = useRef(null);
  const shieldJoyRef = useRef(null);
  const shieldTouchId = useRef(null);
  const shieldJoyActive = useRef(false);

  const lTrail = useRef([]);

  const handleJoystickMove = useCallback((clientX, clientY) => {
    const base = joystickRef.current;
    if(!base) return;
    const rect = base.getBoundingClientRect();
    const bcx = rect.left + rect.width/2;
    const bcy = rect.top + rect.height/2;
    const rawDx = clientX - bcx;
    const rawDy = clientY - bcy;
    const dist = Math.sqrt(rawDx*rawDx + rawDy*rawDy);
    const maxR = rect.width/2 - 10;
    const clampDist = Math.min(dist, maxR);
    const angle = Math.atan2(rawDy, rawDx);
    const knobX = Math.cos(angle) * clampDist;
    const knobY = Math.sin(angle) * clampDist;
    if(knobRef.current){
      knobRef.current.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }
    const S = stateRef.current;
    const deadzone = 12;
    if(dist < deadzone) {
      S.stickX = 0; S.stickY = 0;
    } else {
      /* Analog: normalize to -1..1 range based on distance from center */
      const strength = Math.min((dist - deadzone) / (maxR - deadzone), 1);
      S.stickX = Math.cos(angle) * strength;
      S.stickY = Math.sin(angle) * strength;
    }
    lTrail.current.push({x:rawDx, y:rawDy, t:performance.now()});
    if(lTrail.current.length > 60) lTrail.current.shift();
  },[]);

  const handleJoystickEnd = useCallback(() => {
    joystickActive.current = false;
    if(knobRef.current) knobRef.current.style.transform = 'translate(-50%,-50%)';
    const S = stateRef.current;
    /* Dodge roll disabled on joystick — use screen swipe instead */
    lTrail.current = [];
    S.stickX = 0;
    S.stickY = 0;
  },[]);

  /* Right joystick — aim direction + auto-attack while held */
  const rTrail = useRef([]);

  const handleRJoyMove = useCallback((clientX, clientY) => {
    const base = rJoyRef.current;
    if(!base) return;
    const rect = base.getBoundingClientRect();
    const bcx = rect.left + rect.width/2, bcy = rect.top + rect.height/2;
    const rawDx = clientX - bcx, rawDy = clientY - bcy;
    const dist = Math.sqrt(rawDx*rawDx + rawDy*rawDy);
    const maxR = rect.width/2 - 8;
    const clampDist = Math.min(dist, maxR);
    const angle = Math.atan2(rawDy, rawDx);
    if(rKnobRef.current){
      const kx = Math.cos(angle)*clampDist, ky = Math.sin(angle)*clampDist;
      rKnobRef.current.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
    }
    const S = stateRef.current;
    if(dist > 8){
      const dirs = [['right',0],['down',Math.PI/2],['left',Math.PI],['up',-Math.PI/2]];
      let best='right', bestD=99;
      for(const [d,a] of dirs){ let diff=Math.abs(angle-a); if(diff>Math.PI) diff=Math.PI*2-diff; if(diff<bestD){bestD=diff;best=d;} }
      S._facing = best;
      S._aimAngle = angle;
      S._aiming = true;
      S._lastAimAngle = angle;
      S.autoAttack = true;
    }
    rTrail.current.push({x:rawDx, y:rawDy, t:performance.now()});
    if(rTrail.current.length > 60) rTrail.current.shift();
  },[]);

  const handleRJoyEnd = useCallback(() => {
    rJoyActive.current = false;
    if(rKnobRef.current) rKnobRef.current.style.transform = 'translate(-50%,-50%)';
    const S = stateRef.current;
    S.autoAttack = false;
    setAutoAttack(false);
    /* Aim lock — hold direction 2.5s after release */
    const aimCopy = S._aimAngle;
    S._aiming = false;
  },[]);

  /* Shield joystick — hold+drag to aim shield direction */
  const handleShieldMove = useCallback((clientX, clientY) => {
    const base = shieldJoyRef.current;
    if(!base) return;
    const rect = base.getBoundingClientRect();
    const dx2 = clientX - (rect.left + rect.width/2);
    const dy2 = clientY - (rect.top + rect.height/2);
    if(Math.sqrt(dx2*dx2+dy2*dy2) > 8){
      stateRef.current._shieldAngle = Math.atan2(dy2, dx2);
    }
  },[]);

  /* Dual joystick — each finger tracked independently */
  useEffect(()=>{
    if(showNameModal||showLogin) return;
    const lBase = joystickRef.current;
    const rBase = rJoyRef.current;
    if(!lBase) return;
    const findT = (tl, id) => { for(let i=0;i<tl.length;i++) if(tl[i].identifier===id) return tl[i]; return null; };

    const lS = (e) => { e.preventDefault();e.stopPropagation();const t=e.changedTouches[0];lTouchId.current=t.identifier;joystickActive.current=true;handleJoystickMove(t.clientX,t.clientY); };
    const lM = (e) => { if(lTouchId.current===null)return;const t=findT(e.touches,lTouchId.current);if(t){e.preventDefault();handleJoystickMove(t.clientX,t.clientY);} };
    const lE = (e) => { if(lTouchId.current===null)return;const t=findT(e.changedTouches,lTouchId.current);if(t){lTouchId.current=null;handleJoystickEnd();} };

    const rSwipe = {sx:0,sy:0,st:0,lx:0,ly:0,lt:0};
    let _rLastTap = 0;
    const WEAPON_CYCLE = ['melee','ranged','staff']; /* sword → bow → staff */
    const rS = (e) => {
      e.preventDefault();e.stopPropagation();
      const t=e.changedTouches[0];
      rTouchId.current=t.identifier;
      rJoyActive.current=true;
      setAutoAttack(true);
      stateRef.current.autoAttack=true;
      rSwipe.sx=t.clientX;rSwipe.sy=t.clientY;rSwipe.st=Date.now();
      /* Double-tap detection → weapon swap */
      const now=Date.now();
      if(now - _rLastTap < 350){
        const S2=stateRef.current;
        if(S2.rpg){
          const slots=['melee','ranged'];
          /* Add staff if player has a staff weapon */
          if(S2.rpg.staffWeapon) slots.push('staff');
          const curIdx=slots.indexOf(S2.rpg.activeSlot||'melee');
          const nextSlot=slots[(curIdx+1)%slots.length];
          S2.rpg.activeSlot=nextSlot;
          setRpgState({...S2.rpg});
          const wpnName = nextSlot==='melee'?S2.rpg.weapon?.name:nextSlot==='ranged'?S2.rpg.rangedWeapon?.name:'Staff';
          S2.dmgNumbers.push({x:S2.player.x,y:S2.player.y-40,text:'🔄 '+wpnName,color:'#f5c542',ts:now});
          BT_AUDIO.beep(600,0.06,0.08,'sine');
          setTimeout(()=>BT_AUDIO.beep(800,0.04,0.06,'sine'),60);
          /* ═══ WEAPON SWAP VISUAL — burst of element-colored sparks ═══ */
          S2._weaponSwapFlash = now;
          const swapWpn = getActiveWeapon(S2.rpg);
          const swapElem = swapWpn?.element1;
          const swapColor = swapElem ? (ELEMENTS[swapElem]?.color||'#fff') : '#f5c542';
          for(let ws=0;ws<12;ws++){
            const wsA = (ws/12)*Math.PI*2;
            S2.hitParticles.push({
              x:S2.player.x, y:S2.player.y,
              vx:Math.cos(wsA)*(1.5+Math.random()*2), vy:Math.sin(wsA)*(1.5+Math.random()*2)-1,
              life:0.4, color:swapColor, size:1+Math.random()*1.5
            });
          }
        }
        _rLastTap=0;
        return; /* don't swing on the swap tap */
      }
      _rLastTap=now;
      handleRJoyMove(t.clientX,t.clientY);
      doSwing();
    };
    const rM = (e) => { if(rTouchId.current===null)return;const t=findT(e.touches,rTouchId.current);if(t){e.preventDefault();handleRJoyMove(t.clientX,t.clientY);rSwipe.lx=t.clientX;rSwipe.ly=t.clientY;rSwipe.lt=Date.now();} };
    const rE = (e) => { if(rTouchId.current===null)return;const t=findT(e.changedTouches,rTouchId.current);if(t){
      /* Check for flick/swipe → elemental attack */
      /* Compare against last tracked position (catches flick at end of hold) */
      const refX = rSwipe.lx || rSwipe.sx;
      const refY = rSwipe.ly || rSwipe.sy;
      const refT = rSwipe.lt || rSwipe.st;
      const dx=t.clientX-refX, dy=t.clientY-refY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const dur=Date.now()-refT;
      const spd=dist/Math.max(dur,1);
      /* Also check total distance from start as fallback */
      const totalDx=t.clientX-rSwipe.sx, totalDy=t.clientY-rSwipe.sy;
      const totalDist=Math.sqrt(totalDx*totalDx+totalDy*totalDy);
      const totalDur=Date.now()-rSwipe.st;
      const totalSpd=totalDist/Math.max(totalDur,1);
      const isFlick = (spd>0.15 && dist>8 && dur<400) || (totalSpd>0.2 && totalDist>15 && totalDur<500);
      if(isFlick){
        /* Elemental swipe in flick direction */
        const S2=stateRef.current;
        S2._hasUsedSwipe = true;
        /* Use whichever has more distance for the angle */
        const useDx = totalDist > dist ? totalDx : dx;
        const useDy = totalDist > dist ? totalDy : dy;
        const flickAng=Math.atan2(useDy,useDx);
        S2._aimAngle=flickAng;
        S2._facing=Math.abs(useDx)>Math.abs(useDy)?(useDx>0?'right':'left'):(useDy>0?'down':'up');
        doSpecialAttack();
      }
      rTouchId.current=null;handleRJoyEnd();
    } };

    lBase.addEventListener('touchstart',lS,{passive:false});
    window.addEventListener('touchmove',lM,{passive:false});
    window.addEventListener('touchend',lE,{passive:false});
    window.addEventListener('touchcancel',lE,{passive:false});
    if(rBase){
      rBase.addEventListener('touchstart',rS,{passive:false});
      window.addEventListener('touchmove',rM,{passive:false});
      window.addEventListener('touchend',rE,{passive:false});
      window.addEventListener('touchcancel',rE,{passive:false});
    }
    /* Shield joystick setup */
    const sBase=shieldJoyRef?.current;
    const sS=(e)=>{e.preventDefault();e.stopPropagation();const t=e.changedTouches[0];shieldTouchId.current=t.identifier;shieldJoyActive.current=true;doShield();handleShieldMove(t.clientX,t.clientY);};
    const sM=(e)=>{if(shieldTouchId.current===null)return;const t=findT(e.touches,shieldTouchId.current);if(t){e.preventDefault();handleShieldMove(t.clientX,t.clientY);}};
    const sE=(e)=>{if(shieldTouchId.current===null)return;const t=findT(e.changedTouches,shieldTouchId.current);if(t){shieldTouchId.current=null;shieldJoyActive.current=false;stateRef.current._shieldUp=false;setShieldUp(false);}};
    if(sBase){sBase.addEventListener('touchstart',sS,{passive:false});window.addEventListener('touchmove',sM,{passive:false});window.addEventListener('touchend',sE,{passive:false});window.addEventListener('touchcancel',sE,{passive:false});}

    return ()=>{
      lBase.removeEventListener('touchstart',lS);window.removeEventListener('touchmove',lM);window.removeEventListener('touchend',lE);window.removeEventListener('touchcancel',lE);
      if(rBase){rBase.removeEventListener('touchstart',rS);window.removeEventListener('touchmove',rM);window.removeEventListener('touchend',rE);window.removeEventListener('touchcancel',rE);}
      if(sBase){sBase.removeEventListener('touchstart',sS);window.removeEventListener('touchmove',sM);window.removeEventListener('touchend',sE);window.removeEventListener('touchcancel',sE);}
    };
  },[showNameModal,showLogin, handleJoystickMove, handleJoystickEnd, handleRJoyMove, handleRJoyEnd, handleShieldMove]);

  /* Keep keyboard open — focus input when game starts and periodically re-focus */
  useEffect(()=>{
    if(showNameModal||showLogin) return;
    BT_AUDIO.init();
    const focusChat = () => { if(chatInputRef.current) chatInputRef.current.focus(); };
    /* Initial focus after a short delay for DOM to settle */
    const t1 = setTimeout(focusChat, 300);
    const t2 = setTimeout(focusChat, 600);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  },[showNameModal,showLogin]);

  const joinTown = () => {
    const name = nameInput.trim() || 'Anon';
    const S = stateRef.current;
    S.myName = name;
    /* NFT ID lookup takes priority over random avatar pool pick */
    if(nftLookup && nftLookup.Image){
      S.myAvatar = wsrvUrl(nftLookup.Image, 64);
      S.myBroData = {ID:nftLookup.ID, broType:nftLookup.broType};
    } else if(selectedAvatar !== null && avatarPool[selectedAvatar]){
      const bro = avatarPool[selectedAvatar];
      S.myAvatar = wsrvUrl(bro.Image, 64);
      S.myBroData = {ID:bro.ID, diScore:bro.diScore, rank:bro.rank};
    }
    S.bodyTorso = bodyTorsoColor; S.bodyLegs = bodyLegColor;
    /* Clear old data — fresh start for everyone */
    try{localStorage.removeItem('bt_rpg');localStorage.removeItem('bt_passphrase');localStorage.removeItem('bt_stats');localStorage.removeItem('bt_tutorial');localStorage.removeItem('bt_codex');localStorage.removeItem('bt_player');}catch(e){}
    /* Fresh RPG state for all players */
    S.rpg = createDefaultRpg();
    recalcDerived(S.rpg);
    setRpgState({...S.rpg});
    /* Persist */
    try{ localStorage.setItem('bt_player', JSON.stringify({name:S.myName, avatar:S.myAvatar, bro:S.myBroData, color:S.myColor, bodyTorso:S.bodyTorso, bodyLegs:S.bodyLegs})); }catch(e){}
    try{ localStorage.setItem('bt_rpg', JSON.stringify(S.rpg)); }catch(e){}
    /* Optional server registration */
    const pid = getBtPlayerId();
    if(pid) btRpc('bt_register_player',{p_id:pid,p_name:S.myName,p_avatar:S.myAvatar,p_color:S.myColor,p_body_torso:S.bodyTorso,p_body_legs:S.bodyLegs});
    BT_AUDIO.init();
    BT_AUDIO.join();
    setShowWelcome(false);
  };


  /* Name / avatar selection modal */
  if(showNameModal) return (
    <div className="bt-name-modal">
      <div className="bt-name-box">
        <div style={{fontSize:32,marginBottom:4}}>⚔️</div>
        <div style={{fontSize:22,fontWeight:800,color:'var(--txt)',fontFamily:'VT323,monospace',letterSpacing:'.06em'}}>HEMI BROS</div>
        <div style={{fontSize:12,color:'var(--pop)',fontWeight:700,marginBottom:2}}>Action RPG</div>
        <div style={{fontSize:9,color:'var(--txt3)',marginBottom:16}}>9 Elements · 36 Collisions · Open World</div>
        <input
          value={nameInput} onChange={e=>setNameInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&joinTown()}
          placeholder="Enter your name…"
          maxLength={20}
          autoFocus
          style={{width:'100%',padding:'12px 14px',background:'var(--ink3)',border:'1.5px solid var(--line)',
            borderRadius:10,color:'var(--txt)',fontSize:15,fontWeight:600,outline:'none',
            textAlign:'center',marginBottom:12,boxSizing:'border-box'}}
        />
        {/* ═══ NFT ID LOOKUP ═══ */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Your Hemi Bro NFT</div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input
              value={nftIdInput} onChange={e=>setNftIdInput(e.target.value.replace(/[^0-9]/g,''))}
              onKeyDown={e=>e.key==='Enter'&&lookupNftById(nftIdInput)}
              placeholder="NFT ID (1-6666)"
              maxLength={5}
              style={{flex:1,padding:'10px 12px',background:'var(--ink3)',border:'1.5px solid var(--line)',
                borderRadius:8,color:'var(--txt)',fontSize:14,fontWeight:600,outline:'none',
                textAlign:'center',boxSizing:'border-box'}}
            />
            <button onClick={()=>lookupNftById(nftIdInput)} disabled={nftLoading||!nftIdInput}
              style={{padding:'10px 16px',background:nftLoading?'var(--ink3)':'var(--pop)',color:'#fff',
                border:'none',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',
                opacity:nftLoading||!nftIdInput?0.5:1,fontFamily:'VT323,monospace',whiteSpace:'nowrap'}}>
              {nftLoading?'...':'FIND'}
            </button>
          </div>
          {nftError && <div style={{fontSize:10,color:'#ef4444',marginTop:4,textAlign:'center'}}>{nftError}</div>}
          {nftLookup && (
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:8,padding:'8px 10px',
              background:'var(--ink3)',borderRadius:8,border:'1.5px solid var(--pop)'}}>
              <img src={wsrvUrl(nftLookup.Image, 80)} alt={'#'+nftLookup.ID}
                style={{width:48,height:48,borderRadius:6,imageRendering:'pixelated',background:'var(--ink)'}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:800,color:'var(--txt)',fontFamily:'VT323,monospace'}}>Hemi Bro #{nftLookup.ID}</div>
                <div style={{fontSize:10,color:'var(--pop)',fontWeight:600}}>{nftLookup.broType}</div>
              </div>
              <div style={{fontSize:16,cursor:'pointer',color:'var(--txt3)'}} onClick={()=>{setNftLookup(null);setNftIdInput('');}}>✕</div>
            </div>
          )}
          {!nftLookup && <div style={{fontSize:9,color:'var(--txt3)',marginTop:4,textAlign:'center'}}>Enter your NFT ID to play as your Hemi Bro</div>}
        </div>
        {avatarPool.length>0&&!nftLookup&&(
          <>
            <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Or pick a random Bro</div>
            <div className="bt-avatar-pick">
              {avatarPool.map((n,i)=>(
                <div key={n.ID} className={`bt-avatar-opt ${selectedAvatar===i?'sel':''}`}
                  onClick={()=>setSelectedAvatar(selectedAvatar===i?null:i)}>
                  <img src={wsrvUrl(n.Image, 80)} alt={`#${n.ID}`} loading="lazy"/>
                </div>
              ))}
            </div>
          </>
        )}
        {/* Body color picker */}
        <div style={{marginTop:12}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--txt3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Body Colors</div>
          <div style={{display:'flex',gap:12,justifyContent:'center',alignItems:'center'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'var(--txt3)',marginBottom:3}}>Shirt</div>
              <div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'center'}}>
                {['#2563eb','#dc2626','#16a34a','#9333ea','#ea580c','#0d9488','#db2777','#ca8a04','#1a1a1a','#64748b'].map(col=>(
                  <div key={col} onClick={()=>setBodyTorsoColor(col)}
                    style={{width:20,height:20,borderRadius:4,background:col,cursor:'pointer',
                      border:bodyTorsoColor===col?'2px solid #fff':'2px solid transparent'}}/>
                ))}
              </div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'var(--txt3)',marginBottom:3}}>Pants</div>
              <div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'center'}}>
                {['#1e3a5f','#1e293b','#3b0764','#7f1d1d','#365314','#1a1a1a','#78350f','#334155','#083344','#4a1d96'].map(col=>(
                  <div key={col} onClick={()=>setBodyLegColor(col)}
                    style={{width:20,height:20,borderRadius:4,background:col,cursor:'pointer',
                      border:bodyLegColor===col?'2px solid #fff':'2px solid transparent'}}/>
                ))}
              </div>
            </div>
          </div>
        </div>

        <button onClick={joinTown}
          style={{marginTop:12,padding:'12px 32px',background:'var(--pop)',color:'#fff',
            border:'none',borderRadius:10,fontSize:14,fontWeight:800,cursor:'pointer',
            fontFamily:'VT323,monospace',letterSpacing:'.08em',width:'100%'}}>
          PLAY
        </button>
      </div>
    </div>
  );

  return(
    <div className="brotown-wrap" ref={wrapRef} style={{position:'fixed',top:0,left:0,width:'100vw',height:'100dvh',overflow:'hidden',display:'flex',flexDirection:'column'}}>
      {/* Connection status badge — always visible */}
      <div style={{position:'fixed',top:6,right:6,zIndex:999,padding:'3px 8px',borderRadius:6,
        background:'rgba(0,0,0,.7)',fontSize:9,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',gap:4,
        border:'1px solid rgba(255,255,255,.1)'}}>
        <span style={{width:6,height:6,borderRadius:'50%',
          background:stateRef.current._realtimeStatus==='connected'?'#3dd497':'#ef4444'}}/>
        {playerCount} online
      </div>
      {/* Game area */}
      <div style={{flex:1,position:'relative',overflow:'hidden',minWidth:0,minHeight:0}}>
        <canvas ref={canvasRef} className="brotown-canvas" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}
          onTouchStart={e=>{
            const t=e.changedTouches[0];
            canvasTouchRef.current={id:t.identifier,x:t.clientX,y:t.clientY,t:Date.now()};
          }}
          onTouchEnd={e=>{
            const ct=canvasTouchRef.current;
            for(let i=0;i<e.changedTouches.length;i++){
              const t=e.changedTouches[i];
              if(t.identifier===ct.id){
                handleCanvasSwipe(ct.x,ct.y,t.clientX,t.clientY,Date.now()-ct.t);
                ct.id=null;
                break;
              }
            }
          }}
          onClick={e=>{
            const rect = e.currentTarget.getBoundingClientRect();
            const tapX = (e.clientX - rect.left) * 1.25;
            const tapY = (e.clientY - rect.top) * 1.25;
            const S = stateRef.current;
            const cx = S.camera.x, cy = S.camera.y;
            /* Check monsters for lock-on */
            if(S.monsters){
              let closest = null, closestDist = 30;
              S.monsters.forEach(m => {
                if(!m.alive) return;
                const msx = m.x - cx, msy = m.y - cy;
                const d = Math.sqrt((tapX-msx)**2+(tapY-msy)**2);
                if(d < closestDist){ closestDist = d; closest = m; }
              });
              if(closest){
                /* Toggle lock: tap same = unlock, tap new = lock */
                if(S.lockedTarget && S.lockedTarget.ref === closest){
                  S.lockedTarget = null;
                } else {
                  S.lockedTarget = {type:'monster', id:closest.id, ref:closest};
                }
                return;
              }
            }
            /* Check NPCs — tap opens quest dialog if available, otherwise lock-on */
            if(S.npcs){
              for(const npc of S.npcs){
                if(!npc.alive) continue;
                const nsx = npc.x - cx, nsy = npc.y - cy;
                if(Math.sqrt((tapX-nsx)**2+(tapY-nsy)**2) < 25){
                  /* The Ferryman — special travel dialog */
                  if(npc.isFerryman){
                    setFerrymanPanel(true);
                    return;
                  }
                  /* Check if NPC has a quest */
                  const npcQ = getNpcQuest(S.rpg, npc.name);
                  if(npcQ){
                    setQuestPanel({npc: npc.name, quest: npcQ.quest, status: npcQ.status, npcRef: npc});
                    return;

                    {/* Timing bar — rendered with inline animation */}
                    {(()=>{
                      const spot = cookMinigame.sweetSpot;
                      const barW = 260;

                      /* Indicator position oscillates based on time */
                      const elapsed = (Date.now() - cookMinigame.started) / 1000;
                      const speed = 1.2 + cookMinigame.tier * 0.015; /* faster for harder fish */

                              const leveled = addLifeSkillXp(sk, 'cooking', Math.ceil(cookMinigame.tier * 3));
                              if(!R._questFlags) R._questFlags = {};

                      <div key={key} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,

                          <div style={{fontSize:9,fontWeight:700,color:'#3498DB',textTransform:'capitalize'}}>{fishName} <span style={{color:'rgba(255,255,255,.3)'}}>×{qty}</span></div>
                          <div style={{fontSize:7,color:'rgba(255,255,255,.4)'}}>
                            Heals {healAmt} HP · Sweet spot: {Math.round(spot.width*100)}%

                        <button style={{padding:'3px 8px',borderRadius:5,border:'none',fontSize:8,fontWeight:700,
                          background:'#ea580c',color:'#fff',cursor:'pointer'}}
                          onClick={()=>{
                            const R=stateRef.current.rpg;
                            if(!R.inventory[key] || R.inventory[key] < 1) return;
                            R.inventory[key]--;
                            if(R.inventory[key] <= 0) delete R.inventory[key];
                            setRpgState({...R});
                            /* Start minigame — fish is consumed whether you succeed or fail */
                            setCookMinigame({
                              fishKey: key, fishName,
                              healAmt, tier: tierLvl,
                              sweetSpot: getCookingSweetSpot(rpgState.lifeSkills?.cooking?.level||1, tierLvl),
                              started: Date.now(), result: null
                            });

                          }}>
                          Cook

                      </div>
                    );
                  });
                })()}

                      return (

                        </div>

                {COOKING_RECIPES.map((recipe,ri) => {
                  const cookLvl = rpgState.lifeSkills?.cooking?.level || 1;
                  const canCook = cookLvl >= recipe.cookLvl;
                  const inv = rpgState.inventory || {};
                  const hasIngredients = Object.entries(recipe.ingredients).every(([type, count]) => {
                    const total = Object.entries(inv).filter(([k,v]) => k.includes(type) && v > 0)

                    return total >= count;
                  });

                    : recipe.buff === 'resist' ? `+${Math.round(recipe.power*100)}% resist`
                    : `+${Math.round(recipe.power*100)}% ${recipe.buff}`);

                          const R=stateRef.current.rpg;

                          Object.entries(recipe.ingredients).forEach(([type, count]) => {

                            Object.keys(R.inventory||{}).forEach(k => {
                              if(remaining <= 0 || !k.includes(type)) return;
                              const take = Math.min(R.inventory[k], remaining);
                              R.inventory[k] -= take;
                              remaining -= take;
                              if(R.inventory[k] <= 0) delete R.inventory[k];

                          try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}

                        Cook

                    S2._ambientParticles=[];S2._zoneWipe=Date.now();
                    S2.dmgNumbers.push({x:P2.x,y:P2.y-40,text:'🏡 Your Farm',color:'#3dd497',ts:Date.now()});

                                  text:'💎 Extracted '+R.amulet.gem+' gem',color:'#a78bfa',ts:Date.now()});

                                R.amulet.name = (AMULET_TIERS[R.amulet.tier]?.label||'Simple')+' Gold Amulet';
                              } else if(s.key==='shield' && R.shield?.gem){
                                const polKey = 'polished_'+R.shield.gem;
                                R.lifeSkills.gems[polKey] = (R.lifeSkills.gems[polKey]||0) + 1;
                                stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                                  text:'💎 Extracted '+R.shield.gem+' gem',color:'#a78bfa',ts:Date.now()});
                                R.shield.gem = null;
                                const bt = BLACKSMITH_TIERS[R.shield.gearBase];
                                R.shield.name = (bt?.label||'Basic')+' Shield';
                              } else if(R[s.key]){
                                /* Weapon — extract elements as polished gems */
                                const wpn = R[s.key];
                                if(wpn.element1){
                                  const pk = 'polished_'+wpn.element1;
                                  R.lifeSkills.gems[pk] = (R.lifeSkills.gems[pk]||0) + 1;
                                  stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                                    text:'💎 Extracted '+wpn.element1+' gem',color:'#a78bfa',ts:Date.now()});
                                }
                                if(wpn.element2){
                                  const pk = 'polished_'+wpn.element2;
                                  R.lifeSkills.gems[pk] = (R.lifeSkills.gems[pk]||0) + 1;
                                  stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-45,
                                    text:'💎 Extracted '+wpn.element2+' gem',color:'#a78bfa',ts:Date.now()});
                                }
                                wpn.element1 = null; wpn.element2 = null; wpn.isVolatile = false;
                                wpn.tier = 'common';
                                /* Rebuild name without elements */
                                const isWW = wpn.gearBase?.startsWith('ww_');
                                const tk = isWW ? wpn.gearBase.slice(3) : wpn.gearBase;
                                const tt = isWW ? WOODWORKING_TIERS[tk] : BLACKSMITH_TIERS[tk];
                                wpn.name = (tt?.label||'Basic')+' '+WEAPON_TYPES[wpn.type].label;
                              }
                              recalcDerived(R);
                              BT_AUDIO.beep(600,0.06,0.08,'sine');
                              setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                            }}>
                            💎 Extract Gem ({extractCost}g)
                          </button>
                        )}

                        {/* Step 2: Salvage (only if no gem) */}
                        {canSalvage && (
                          <button style={{width:'100%',padding:'3px 0',borderRadius:4,fontSize:7,fontWeight:700,cursor:'pointer',
                            border:'1px solid rgba(255,94,108,.3)',background:'rgba(255,94,108,.12)',color:'#ff5e6c'}}
                            onClick={()=>{
                              const R=stateRef.current.rpg;
                              if(!R.inventory) R.inventory = {};
                              /* Apply salvage returns */
                              salvReturns.forEach(ret=>{
                                if(ret.type==='gold') R.coins += ret.qty;
                                else if(ret.type==='goldBars') R.goldBars = (R.goldBars||0) + ret.qty;
                                else R.inventory[ret.key] = (R.inventory[ret.key]||0) + ret.qty;
                              });
                              const returnText = salvReturns.map(r=>r.qty+'× '+r.label).join(', ');
                              /* Destroy the item */
                              if(s.key==='amulet') R.amulet = null;
                              else if(s.key==='shield') R.shield = null;
                              else if(s.key==='weapon') R.weapon = {type:'greatsword',tier:'common',tierMult:1.0,element1:null,element2:null,name:'Fists',isVolatile:false};
                              else if(s.key==='rangedWeapon') R.rangedWeapon = null;
                              else if(s.key==='staffWeapon') R.staffWeapon = null;
                              recalcDerived(R);
                              stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                                text:'♻️ Salvaged! '+returnText,color:'#ff5e6c',ts:Date.now()});
                              BT_AUDIO.beep(200,0.1,0.15,'sawtooth');
                              setTimeout(()=>BT_AUDIO.beep(400,0.06,0.08,'sine'),100);
                              setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                            }}>
                            ♻️ Salvage → {salvReturns.map(r=>r.qty+'× '+r.label).join(' + ')}
                          </button>
                        )}

                        {!hasGem && !canSalvage && (
                          <div style={{fontSize:7,color:'rgba(255,255,255,.25)'}}>Cannot salvage (no crafting base)</div>
                        )}
                      </div>
                    );
                  })}

                  {/* Salvage from weapon stash */}
                  {(rpgState.weaponStash||[]).filter(w=>w.gearBase).length > 0 && (
                    <div style={{marginTop:6}}>
                      <div style={{fontSize:8,fontWeight:700,color:'rgba(255,255,255,.4)',marginBottom:3}}>Stashed weapons:</div>
                      {(rpgState.weaponStash||[]).map((sw,si)=>{
                        if(!sw.gearBase) return null;
                        const hasGem = !!(sw.element1||sw.element2);
                        const salvReturns = !hasGem ? getSalvageReturns(sw) : null;
                        return (
                          <div key={si} style={{display:'flex',alignItems:'center',gap:4,marginBottom:3,
                            padding:'3px 6px',borderRadius:4,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)'}}>
                            <div style={{flex:1,fontSize:8,color:'#aaa'}}>{sw.name}</div>
                            {hasGem && (
                              <button style={{padding:'2px 5px',borderRadius:3,fontSize:6,fontWeight:700,cursor:'pointer',
                                border:'1px solid rgba(167,139,250,.3)',background:'rgba(167,139,250,.1)',color:'#a78bfa'}}
                                onClick={()=>{
                                  const R=stateRef.current.rpg;
                                  const cost = gemExtractCost(sw);
                                  if(R.coins < cost) return;
                                  R.coins -= cost;
                                  if(!R.lifeSkills.gems) R.lifeSkills.gems={};
                                  if(sw.element1){ R.lifeSkills.gems['polished_'+sw.element1]=(R.lifeSkills.gems['polished_'+sw.element1]||0)+1; }
                                  if(sw.element2){ R.lifeSkills.gems['polished_'+sw.element2]=(R.lifeSkills.gems['polished_'+sw.element2]||0)+1; }
                                  sw.element1=null; sw.element2=null; sw.isVolatile=false; sw.tier='common';
                                  const isWW = sw.gearBase?.startsWith('ww_');
                                  const tk = isWW ? sw.gearBase.slice(3) : sw.gearBase;
                                  const tt = isWW ? WOODWORKING_TIERS[tk] : BLACKSMITH_TIERS[tk];
                                  sw.name = (tt?.label||'Basic')+' '+WEAPON_TYPES[sw.type].label;
                                  BT_AUDIO.beep(600,0.06,0.08,'sine');
                                  setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                                }}>
                                💎 Extract ({gemExtractCost(sw)}g)
                              </button>
                            )}
                            {salvReturns && (
                              <button style={{padding:'2px 5px',borderRadius:3,fontSize:6,fontWeight:700,cursor:'pointer',
                                border:'1px solid rgba(255,94,108,.3)',background:'rgba(255,94,108,.1)',color:'#ff5e6c'}}
                                onClick={()=>{
                                  const R=stateRef.current.rpg;
                                  if(!R.inventory) R.inventory={};
                                  salvReturns.forEach(ret=>{
                                    if(ret.type==='gold') R.coins+=ret.qty;
                                    else if(ret.type==='goldBars') R.goldBars=(R.goldBars||0)+ret.qty;
                                    else R.inventory[ret.key]=(R.inventory[ret.key]||0)+ret.qty;
                                  });
                                  R.weaponStash.splice(si,1);
                                  stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                                    text:'♻️ Salvaged stash item',color:'#ff5e6c',ts:Date.now()});
                                  BT_AUDIO.beep(200,0.1,0.12,'sawtooth');
                                  setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                                }}>
                                ♻️ Salvage
                              </button>
                            )}
                            {!hasGem && !salvReturns && <span style={{fontSize:6,color:'rgba(255,255,255,.2)'}}>No base</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </>)}

              {/* WOODWORKER — craft bows and staves from wood */}
              {buildingPanel==='woodwork'&&(<>
                <div style={{fontSize:16,fontWeight:800,color:'#8B6914',marginBottom:4}}>🪚 Woodworker</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:6}}>
                  Woodworking Lv{rpgState.lifeSkills?.woodworking?.level||1} · Craft bows and staves from harvested wood. Higher tiers unlock gem slots.
                </div>
                {/* Weapon type selector */}
                <div style={{display:'flex',gap:4,marginBottom:8}}>
                  {[{type:'bow',label:'🏹 Bow',desc:'Ranged single-target'},{type:'staff',label:'🪄 Staff',desc:'Ranged AOE swipe'}].map(wt=>(
                    <button key={wt.type} style={{flex:1,padding:'4px 6px',borderRadius:6,fontSize:9,fontWeight:700,cursor:'pointer',
                      background:stateRef.current?._wwType===wt.type?'rgba(139,105,20,.3)':'rgba(255,255,255,.05)',
                      border:stateRef.current?._wwType===wt.type?'1px solid rgba(139,105,20,.5)':'1px solid rgba(255,255,255,.08)',
                      color:stateRef.current?._wwType===wt.type?'#d4a020':'rgba(255,255,255,.5)'}}
                      onClick={()=>{stateRef.current._wwType=wt.type;setRpgState({...stateRef.current.rpg});}}>
                      {wt.label}<div style={{fontSize:7,fontWeight:400,color:'rgba(255,255,255,.3)'}}>{wt.desc}</div>
                    </button>
                  ))}
                </div>
                {Object.entries(WOODWORKING_TIERS).filter(([key, wt]) => {
                  const wwLvl = rpgState.lifeSkills?.woodworking?.level || 1;
                  return wt.minLvl <= wwLvl + 10;
                }).map(([key, wt]) => {
                  const wwLvl = rpgState.lifeSkills?.woodworking?.level || 1;
                  const canCraftSkill = wwLvl >= wt.minLvl;
                  const woodKey = 'wood_'+wt.wood;
                  const hasWood = (rpgState.inventory?.[woodKey]||0) >= wt.woodCost;
                  const hasGold = rpgState.coins >= wt.goldCost;
                  const craftType = stateRef.current?._wwType || 'bow';
                  const wwFullIdx = Object.keys(WOODWORKING_TIERS).indexOf(key);
                  const wwStatReq = getGearStatReq(craftType, wwFullIdx);
                  const wwMeetsStat = wwStatReq.value === 0 || (rpgState[wwStatReq.stat]||0) >= wwStatReq.value;
                  const canCraft = canCraftSkill && wwMeetsStat;
                  return (
                    <div key={key} style={{display:'flex',alignItems:'center',gap:6,marginBottom:5,
                      padding:'6px 8px',borderRadius:8,background:'rgba(255,255,255,.03)',
                      border:'1px solid rgba(255,255,255,.06)',opacity:canCraft?1:0.4}}>
                      <span style={{fontSize:14}}>{wt.slots>0?'💠':'🪵'}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,fontWeight:700,color:canCraft?'#fff':'#666'}}>
                          {wt.label} {craftType==='bow'?'Bow':'Staff'} <span style={{fontSize:7,color:'rgba(255,255,255,.3)'}}>Lv{wt.minLvl}+ · {wt.tierMult}×</span>
                        </div>
                        <div style={{fontSize:7,color:'rgba(255,255,255,.4)'}}>
                          {wt.desc} {wt.slots>0 ? `· ${wt.slots} gem slot${wt.slots>1?'s':''}` : ''}
                        </div>
                        <div style={{fontSize:7,color:'rgba(255,255,255,.3)'}}>
                          {wt.woodCost}× {wt.wood.replace(/_/g,' ')} + {wt.goldCost}g
                          {!canCraftSkill && ` · Req WW Lv${wt.minLvl}`}
                          {canCraftSkill && !wwMeetsStat && ` · Req ${STAT_LABELS[wwStatReq.stat]||wwStatReq.stat} ${wwStatReq.value}`}
                        </div>
                      </div>
                      <button style={{padding:'3px 8px',borderRadius:5,border:'none',fontSize:8,fontWeight:700,
                        background:(canCraft&&hasWood&&hasGold)?'#8B6914':'rgba(255,255,255,.08)',
                        color:(canCraft&&hasWood&&hasGold)?'#fff':'rgba(255,255,255,.3)',cursor:'pointer'}}
                        onClick={()=>{
                          if(!canCraft||!hasWood||!hasGold) return;
                          const R=stateRef.current.rpg;
                          if(!R.inventory) R.inventory={};
                          R.inventory[woodKey] = (R.inventory[woodKey]||0) - wt.woodCost;
                          if(R.inventory[woodKey]<=0) delete R.inventory[woodKey];
                          R.coins -= wt.goldCost;
                          const wpnKey = craftType==='bow'?'rangedWeapon':'staffWeapon';
                          const wpnType = craftType==='bow'?'bow':'staff';
                          if(R[wpnKey] && R[wpnKey].name){
                            if(!R.weaponStash) R.weaponStash = [];
                            if(R.weaponStash.length < WEAPON_STASH_MAX) R.weaponStash.push({...R[wpnKey]});
                          }
                          R[wpnKey] = {
                            type: wpnType, tier: 'common', tierMult: wt.tierMult,
                            element1: null, element2: null, isVolatile: false,
                            name: wt.label+' '+WEAPON_TYPES[wpnType].label,
                            gearBase: 'ww_'+key, reforgeBonus: null, hardenBonus: null,
                          };
                          const leveled = addLifeSkillXp(R.lifeSkills, 'woodworking', wt.minLvl * 5);
                          if(!R._questFlags) R._questFlags = {};
                          R._questFlags.craftedWoodWeapon = true;
                          stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                            text:'🪚 Crafted '+wt.label+' '+WEAPON_TYPES[wpnType].label+'!',color:'#8B6914',ts:Date.now()});
                          if(wt.slots>0) stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-42,
                            text:wt.slots+' gem slot'+(wt.slots>1?'s':'')+' ready!',color:'#a855f7',ts:Date.now()});
                          if(leveled) stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-54,
                            text:'🪚 Woodworking Lv'+R.lifeSkills.woodworking.level+'!',color:'#f5c542',ts:Date.now()});
                          BT_AUDIO.collect();
                          setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                        }}>
                        Craft
                      </button>
                    </div>
                  );
                })}

                {/* ═══ REFORGE + HARDEN for ranged weapons ═══ */}
                {(()=>{
                  const craftType = stateRef.current?._wwType || 'bow';
                  const wpnKey = craftType==='bow'?'rangedWeapon':'staffWeapon';
                  const wpn = rpgState[wpnKey];
                  if(!wpn?.gearBase?.startsWith('ww_')) return <div style={{fontSize:8,color:'rgba(255,255,255,.25)',marginTop:8}}>Craft a weapon first to unlock Reforge & Harden.</div>;
                  const wwKey = wpn.gearBase.slice(3);
                  const wt = WOODWORKING_TIERS[wwKey];
                  if(!wt) return null;
                  const reforgeCost = Math.ceil(wt.woodCost * 0.5);
                  const reforgeWoodKey = 'wood_'+wt.wood;
                  const reforgeGold = Math.ceil(wt.goldCost * 0.3);
                  const hardenCost = wt.woodCost;
                  const hardenGold = Math.ceil(wt.goldCost * 0.5);
                  const hChance = hardenChance(wt.tierMult, rpgState.lifeSkills?.woodworking?.level||1);
                  return (<div style={{marginTop:8,padding:8,borderRadius:8,background:'rgba(139,105,20,.06)',border:'1px solid rgba(139,105,20,.15)'}}>
                    <div style={{fontSize:10,fontWeight:700,color:'#8B6914',marginBottom:4}}>🔧 Reforge & Harden: {wpn.name}</div>
                    <div style={{fontSize:8,color:'rgba(255,255,255,.4)',marginBottom:4}}>
                      Current: {wpn.reforgeBonus ? `${wpn.reforgeBonus.label} +${wpn.reforgeBonus.value}${wpn.reforgeBonus.unit}` : 'No bonus'}
                      {wpn.hardenBonus ? ` · ${wpn.hardenBonus.label} +${wpn.hardenBonus.value}${wpn.hardenBonus.unit}` : ''}
                    </div>
                    <div style={{display:'flex',gap:4}}>
                      <button style={{flex:1,padding:'4px 0',borderRadius:5,border:'1px solid rgba(139,105,20,.3)',
                        background:'rgba(139,105,20,.12)',color:'#d4a020',fontSize:8,fontWeight:700,cursor:'pointer'}}
                        onClick={()=>{
                          const R=stateRef.current.rpg;
                          if(!R.inventory) R.inventory={};
                          if((R.inventory[reforgeWoodKey]||0)<reforgeCost||R.coins<reforgeGold){
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'Need '+reforgeCost+'× wood + '+reforgeGold+'g',color:'#ff5e6c',ts:Date.now()}); return;
                          }
                          R.inventory[reforgeWoodKey] -= reforgeCost;
                          if(R.inventory[reforgeWoodKey]<=0) delete R.inventory[reforgeWoodKey];
                          R.coins -= reforgeGold;
                          const bonus = rollReforgeBonus(wt.tierMult);
                          R[wpnKey].reforgeBonus = bonus;
                          addLifeSkillXp(R.lifeSkills, 'woodworking', Math.ceil(wt.minLvl * 2));
                          stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                            text:'🔧 Reforged! '+bonus.label+' +'+bonus.value+bonus.unit,color:'#d4a020',ts:Date.now()});
                          BT_AUDIO.beep(600,0.08,0.1,'sine');
                          setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                        }}>
                        🔧 Reforge ({reforgeCost} wood + {reforgeGold}g)
                      </button>
                      <button style={{flex:1,padding:'4px 0',borderRadius:5,
                        border:wpn.hardenBonus?'1px solid rgba(255,255,255,.1)':'1px solid rgba(245,197,66,.3)',
                        background:wpn.hardenBonus?'rgba(255,255,255,.04)':'rgba(245,197,66,.1)',
                        color:wpn.hardenBonus?'rgba(255,255,255,.3)':'#f5c542',fontSize:8,fontWeight:700,cursor:'pointer'}}
                        onClick={()=>{
                          const R=stateRef.current.rpg;
                          if(R[wpnKey].hardenBonus){
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'Already hardened!',color:'#ff5e6c',ts:Date.now()}); return;
                          }
                          if(!R[wpnKey].reforgeBonus){
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'Reforge first!',color:'#ff5e6c',ts:Date.now()}); return;
                          }
                          if(!R.inventory) R.inventory={};
                          if((R.inventory[reforgeWoodKey]||0)<hardenCost||R.coins<hardenGold){
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'Need '+hardenCost+'× wood + '+hardenGold+'g',color:'#ff5e6c',ts:Date.now()}); return;
                          }
                          R.inventory[reforgeWoodKey] -= hardenCost;
                          if(R.inventory[reforgeWoodKey]<=0) delete R.inventory[reforgeWoodKey];
                          R.coins -= hardenGold;
                          if(Math.random() < hChance){
                            const bonus = rollReforgeBonus(wt.tierMult);
                            if(bonus.id === R[wpnKey].reforgeBonus.id) bonus.id = REFORGE_BONUSES[(REFORGE_BONUSES.findIndex(b=>b.id===bonus.id)+1)%REFORGE_BONUSES.length].id;
                            R[wpnKey].hardenBonus = bonus;
                            addLifeSkillXp(R.lifeSkills, 'woodworking', Math.ceil(wt.minLvl * 4));
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'⚒️ HARDENED! +'+bonus.label+' +'+bonus.value+bonus.unit,color:'#f5c542',ts:Date.now()});
                            stateRef.current.screenShake = 4;
                            BT_AUDIO.collect();
                          } else {
                            const oldName = R[wpnKey].name;
                            R[wpnKey].reforgeBonus = null; R[wpnKey].hardenBonus = null;
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,
                              text:'💔 BROKE! '+oldName+' lost all bonuses',color:'#ff5e6c',ts:Date.now()});

                            BT_AUDIO.beep(120,0.15,0.2,'sawtooth');

                          setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                        }}>
                        ⚒️ Harden ({Math.round(hChance*100)}% · {hardenCost} wood + {hardenGold}g)
                      </button>
                    </div>
                  </div>);
                })()}
              </>)}

              {/* GEM CUTTER — cut raw gems into polished gems */}
              {buildingPanel==='gemcut'&&(<>
                <div style={{fontSize:16,fontWeight:800,color:'#a855f7',marginBottom:4}}>💎 Gem Cutter</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginBottom:6}}>
                  Gem Cutting Lv{rpgState.lifeSkills?.gemCutting?.level||1} · Cut raw gems into polished slottable gems. Higher skill = better success rate.
                </div>
                {/* Show each element's raw gem count + cut button */}
                {Object.entries(ELEMENTS).map(([elem, edef]) => {
                  const gems = rpgState.lifeSkills?.gems || {};
                  const rawKey = 'raw_'+elem;
                  const polKey = 'polished_'+elem;
                  const rawCount = gems[rawKey] || 0;
                  const polCount = gems[polKey] || 0;
                  if(rawCount <= 0 && polCount <= 0) return null;
                  const gcLvl = rpgState.lifeSkills?.gemCutting?.level || 1;
                  /* Success rate from GEM_CUT_TIERS */
                  let successRate = 0.6;
                  const tierKeys = Object.keys(GEM_CUT_TIERS);
                  for(let i=tierKeys.length-1; i>=0; i--){
                    if(gcLvl >= GEM_CUT_TIERS[tierKeys[i]].minLvl){ successRate = GEM_CUT_TIERS[tierKeys[i]].successRate; break; }
                  }
                  const gemName = ZONE_RESOURCES[elem]?.gem || (elem+' Gem');
                  const gemCol = ZONE_RESOURCES[elem]?.gemColor || edef.color;
                  return (
                    <div key={elem} style={{display:'flex',alignItems:'center',gap:6,marginBottom:5,

                            {rpgState.amulet.gem} gem
                          </span>
                        </div>
                      )}

                        <div style={{fontSize:7,color:'rgba(255,255,255,.3)',marginTop:2}}>No gem — visit the Enchanter to slot one</div>
                      )}
                    </>) : (<>
                      <div style={{fontSize:11,fontWeight:700,color:'#888'}}>No Amulet</div>
                      <div style={{fontSize:8,color:'rgba(255,255,255,.3)'}}>
                        Craft at Blacksmith from gold bars (nuggets: {rpgState.goldNuggets||0}/{NUGGETS_PER_BAR}, bars: {rpgState.goldBars||0})
                      </div>
                    </>)}
                  </div>
                </div>
              </div>

              {/* Shield */}
              <div style={{marginBottom:8,padding:10,borderRadius:10,
                background:rpgState.shield?'rgba(91,82,255,.05)':'rgba(255,255,255,.03)',
                border:rpgState.shield?'1px solid rgba(91,82,255,.2)':'1px solid rgba(255,255,255,.08)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:22}}>🛡️</span>

                    {rpgState.shield ? (<>
                      <div style={{fontSize:11,fontWeight:700,color:'#5b52ff'}}>{rpgState.shield.name}</div>

                          const bonus = getShieldBonus(rpgState.shield);

                        {rpgState.shield.hardenBonus ? ' · '+rpgState.shield.hardenBonus.label+' +'+rpgState.shield.hardenBonus.value+rpgState.shield.hardenBonus.unit : ''}

                      const fishName = key.replace('cooked_','').replace(/_/g,' ');
                      const healAmt = getFishHealAmount(key);
                      const atFull = rpgState.hp >= rpgState.maxHp;
                      return (
                        <button key={key} style={{padding:'3px 6px',borderRadius:5,fontSize:8,cursor:'pointer',
                          background:atFull?'rgba(255,255,255,.04)':'rgba(61,220,151,.1)',

                          color:atFull?'rgba(255,255,255,.3)':'#3dd497',fontWeight:700,textTransform:'capitalize'}}

                            if(atFull) return;
                            const R=stateRef.current.rpg;
                            if(!R.inventory[key] || R.inventory[key] < 1) return;
                            R.inventory[key]--;
                            if(R.inventory[key] <= 0) delete R.inventory[key];
                            const healed = Math.min(healAmt, R.maxHp - R.hp);

                            setRpgState({...R}); try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                            stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,

              {(rpgState.weaponStash||[]).length > 0 && (
                <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:8}}>
                  {(rpgState.weaponStash||[]).map((sw,si) => {

                    const dmgDiff = stashDmg - curDmg;
                    const stashSpd = swt?.speed||1;
                    const curSpd = current ? (WEAPON_TYPES[current.type]?.speed||1) : 1;
                    const spdDiff = stashSpd - curSpd;
                    const stashDps = Math.round(stashDmg * stashSpd);

                            {dmgDiff!==0&&<span style={{color:dmgDiff>0?'#3dd497':'#ff5e6c',marginLeft:2,fontSize:7}}>
                              {dmgDiff>0?'▲':'▼'}{Math.abs(dmgDiff)}
                            </span>}
                          </span>
                          <span style={{color:'rgba(255,255,255,.5)'}}>SPD: <b style={{color:'#fff'}}>{stashSpd}</b>
                            {spdDiff!==0&&<span style={{color:spdDiff>0?'#3dd497':'#ff5e6c',marginLeft:2,fontSize:7}}>
                              {spdDiff>0?'▲':'▼'}{Math.abs(spdDiff).toFixed(1)}
                            </span>}
                          </span>
                          <span style={{color:'rgba(255,255,255,.5)'}}>DPS: <b style={{color:'#fff'}}>{stashDps}</b>
                            {dpsDiff!==0&&<span style={{color:dpsDiff>0?'#3dd497':'#ff5e6c',marginLeft:2,fontSize:7}}>
                              {dpsDiff>0?'▲':'▼'}{Math.abs(dpsDiff)}
                            </span>}

                        </div>
                        {/* Elements */}
                        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>

                            <span style={{fontSize:7,padding:'1px 4px',borderRadius:3,

                              {sw.element2}

                            </span>;
                          })()}
                        </div>
                        {/* Action buttons */}
                        <div style={{display:'flex',gap:4}}>

                            onClick={()=>{
                              const R = stateRef.current.rpg;
                              if(!R.weaponStash) return;

                              /* Check stat requirement */
                              if(!canEquipItem(R, swapWpn, swapWpn.type)){
                                const req = getEquipReqLabel(swapWpn, swapWpn.type);
                                stateRef.current.dmgNumbers.push({x:stateRef.current.player.x,y:stateRef.current.player.y-30,

                              const swIsRanged = wDef?.type === 'ranged';

                              if(swIsRanged) R.rangedWeapon = swapWpn; else R.weapon = swapWpn;

                          <button style={{flex:1,padding:'3px 0',borderRadius:5,border:'1px solid rgba(245,197,66,.3)',

                            onClick={()=>{

                              setRpgState({...R});
                              try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                              const S = stateRef.current;

    fetch(NFT_CSV_URL)
      .then(r => r.text())
      .then(csv => {
        const lines = csv.split('\n');
        const header = lines[0].split(',');
        const parsed = [];
        for(let i = 1; i < lines.length; i++){
          const line = lines[i].trim();
          if(!line) continue;
          /* Parse CSV carefully — fields might contain commas inside quotes */
          const parts = line.split(',');
          if(parts.length < 2) continue;
          const id = parseInt(parts[0]);
          const image = parts[1];
          if(!id || !image || !image.includes('ipfs')) continue;
          parsed.push({
            ID: id,
            Image: image,
            broType: parts[2] || '',
            headwear: parts[3] || '',
            clothes: parts[4] || '',
            eyes: parts[5] || '',
            eyewear: parts[6] || '',
            mouth: parts[7] || '',
            background: parts[8] || '',
            diScore: 0, rank: 0
          });
        }
        console.log(`[NFT] Loaded ${parsed.length} Hemi Bros from catalogue`);
        setNfts(parsed);
      })
      .catch(err => {
        console.warn('[NFT] Failed to fetch catalogue:', err);
      });
  }, []);

  return React.createElement(BroTown, {
    nfts,
    onExit: () => { window.location.href = 'index.html'; }
  });
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GameApp));

</script>

<!-- Lightweight Error Capture -->
<script>
(function(){
  var errs=[], MAX=50, seen={}, panel=null, open=false;

  function capture(msg,src,line,col,err){
    var key=(msg||'')+'|'+(src||'')+'|'+(line||'');
    if(/babel|supabase|Loading chunk/i.test(msg||'')) return;
    if(seen[key]){seen[key].count++;seen[key].last=Date.now();return;}
    var entry={msg:String(msg||'Unknown'),src:String(src||'').split('/').pop()||'?',line:line||0,col:col||0,stack:(err&&err.stack)?err.stack.split('\n').slice(0,3).join('\n'):'',ts:Date.now(),last:Date.now(),count:1};
    seen[key]=entry; errs.unshift(entry);
    if(errs.length>MAX) errs.pop();
    btn.textContent='🐛'+errs.reduce(function(s,e){return s+e.count;},0);
    btn.style.background=errs.length?'#e53e3e':'rgba(0,0,0,.5)';
  }
  window.onerror=capture;
  window.addEventListener('unhandledrejection',function(e){capture('Promise: '+(e.reason&&e.reason.message||e.reason),'',0,0,e.reason);});

  var btn=document.createElement('div');
  btn.textContent='🐛0';
  btn.style.cssText='position:fixed;top:8px;left:8px;z-index:999999;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font:bold 11px sans-serif;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,.2);user-select:none';
  document.body.appendChild(btn);

  btn.onclick=function(){
    if(open&&panel){panel.remove();panel=null;open=false;return;}
    open=true;
    panel=document.createElement('div');
    panel.style.cssText='position:fixed;bottom:50px;left:8px;z-index:999998;width:340px;max-height:60vh;background:rgba(15,15,25,.95);color:#eee;font:11px monospace;border-radius:8px;border:1px solid rgba(255,255,255,.15);overflow:hidden;display:flex;flex-direction:column';

    var hdr=document.createElement('div');
    hdr.style.cssText='padding:6px 10px;background:rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-shrink:0';
    hdr.innerHTML='<span style="font-weight:700">Errors ('+errs.length+')</span>';

    var btns=document.createElement('div');
    var cpyBtn=document.createElement('button');
    cpyBtn.textContent='📋 Copy';
    cpyBtn.style.cssText='background:#5b52ff;color:#fff;border:none;border-radius:4px;padding:2px 8px;font:bold 10px sans-serif;cursor:pointer;margin-right:4px';
    cpyBtn.onclick=function(){
      var txt='=== ERROR REPORT ===\nTime: '+new Date().toISOString()+'\nErrors: '+errs.length+'\n\n';
      errs.forEach(function(e,i){
        txt+='['+(i+1)+'] '+(e.count>1?'(×'+e.count+') ':'')+e.msg+'\n    at '+e.src+':'+e.line+':'+e.col+'\n';
        if(e.stack) txt+='    '+e.stack.replace(/\n/g,'\n    ')+'\n';
        txt+='\n';
      });
      navigator.clipboard.writeText(txt).then(function(){cpyBtn.textContent='✅ Copied!';setTimeout(function(){cpyBtn.textContent='📋 Copy';},1500);});
    };

    var clrBtn=document.createElement('button');
    clrBtn.textContent='🗑️';
    clrBtn.style.cssText='background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:4px;padding:2px 6px;font:10px sans-serif;cursor:pointer;margin-right:4px';
    clrBtn.onclick=function(){errs.length=0;for(var k in seen)delete seen[k];btn.textContent='🐛0';btn.style.background='rgba(0,0,0,.5)';panel.remove();panel=null;open=false;};

    var xBtn=document.createElement('button');
    xBtn.textContent='✕';
    xBtn.style.cssText='background:none;color:#fff;border:none;font:bold 14px sans-serif;cursor:pointer;padding:0 4px';
    xBtn.onclick=function(){panel.remove();panel=null;open=false;};

    btns.appendChild(cpyBtn);btns.appendChild(clrBtn);btns.appendChild(xBtn);
    hdr.appendChild(btns);panel.appendChild(hdr);

    var body=document.createElement('div');
    body.style.cssText='overflow-y:auto;padding:6px 10px;flex:1';
    if(!errs.length){body.innerHTML='<div style="color:#6f6;padding:8px;text-align:center">No errors captured ✓</div>';}
    else{
      errs.forEach(function(e){
        var d=document.createElement('div');
        d.style.cssText='padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06)';
        d.innerHTML='<div style="color:#fc8181;word-break:break-all">'+(e.count>1?'<span style="background:#e53e3e;color:#fff;border-radius:3px;padding:0 4px;font-size:9px;margin-right:4px">×'+e.count+'</span>':'')+e.msg.replace(/</g,'&lt;')+'</div><div style="color:#888;font-size:9px">'+e.src+':'+e.line+' · '+new Date(e.last).toLocaleTimeString()+'</div>';
        body.appendChild(d);
      });
    }
    panel.appendChild(body);document.body.appendChild(panel);
  };
})();
</script>
