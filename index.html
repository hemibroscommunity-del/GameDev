                ctx.fillStyle='rgba(60,180,60,.08)';
                ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,5,0,Math.PI*2); ctx.fill();
              }
              if((cl+r*5)%7===0){
                ctx.fillStyle='rgba(80,220,80,.15)';
                ctx.beginPath(); ctx.arc(sx+6+cl%12,sy+8+r%10,1,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='storm'){
              /* Lightning scorch marks */
              if((cl*11+r*23)%17===0){
                ctx.strokeStyle='rgba(140,100,200,.15)'; ctx.lineWidth=0.7;
                ctx.beginPath(); ctx.moveTo(sx+TILE/2,sy+2);
                ctx.lineTo(sx+TILE/2+3,sy+TILE/2); ctx.lineTo(sx+TILE/2-2,sy+TILE-3); ctx.stroke();
              }
            } else if(_ze==='stone'){
              /* Gravel texture and mineral glints */
              if((cl+r)%3===0){
                ctx.fillStyle='rgba(100,90,70,.12)';
                ctx.fillRect(sx+3+cl%5,sy+4+r%6,3,2); ctx.fillRect(sx+14+cl%4,sy+16+r%3,2,2);
              }
            } else if(_ze==='wind'){
              /* Wind streaks — horizontal lines */
              if((cl+r*3)%5===0){
                ctx.strokeStyle='rgba(180,200,220,.1)'; ctx.lineWidth=0.5;
                ctx.beginPath(); ctx.moveTo(sx,sy+10+r%8); ctx.lineTo(sx+TILE,sy+8+r%10); ctx.stroke();
              }
            } else if(_ze==='water'){
              /* Damp sheen */
              if((cl*3+r*7)%5===0){
                ctx.fillStyle='rgba(60,140,200,.06)';
                ctx.fillRect(sx+2,sy+6,TILE-4,3);
              }
            } else if(_ze==='dark'){
              /* Creeping shadow tendrils */
              if((cl+r*7)%6===0){
                ctx.fillStyle=`rgba(20,10,40,${0.12+Math.sin(now/1200+cl*3+r*5)*0.06})`;
                ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,4+Math.sin(now/900+r)*2,0,Math.PI*2); ctx.fill();
              }
            } else if(_ze==='light'){
              /* Golden shimmer patches */
              if((cl+r*3)%5===0){
                const gShim=Math.sin(now/600+cl*2+r*3)*0.5+0.5;
                ctx.fillStyle=`rgba(245,200,60,${gShim*0.08})`;
                ctx.fillRect(sx+4,sy+4,TILE-8,TILE-8);
              }
            } else {
              /* Default grass blades for town/meadow */
              if((cl+r*7)%3===0){
                ctx.strokeStyle = 'rgba(80,160,50,.15)';
                ctx.lineWidth = 0.5;
                const gx = sx+8+(cl*13%12), gy = sy+20+(r*17%8);
                ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx+Math.sin(now/1500+cl)*1,gy-4); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(gx+3,gy+1); ctx.lineTo(gx+3+Math.sin(now/1800+r)*1,gy-3); ctx.stroke();
              }
            }
          } else if(tile===8){
            /* Zone exit — glowing portal */
            const pulse = Math.sin(now/300 + cl + r)*0.15 + 0.85;
            const exit = TOWN_EXITS.find(ex => Math.abs(ex.tx-cl)<=1 && Math.abs(ex.ty-r)<=1);
            ctx.fillStyle = exit ? exit.color : '#5b52ff';
            ctx.globalAlpha = pulse * 0.6;
            ctx.fillRect(sx-2, sy-2, TILE+5, TILE+5);
            ctx.globalAlpha = 1.0;
          } else if(tile===9){
            /* Return to town exit — green glow */
            const pulse = Math.sin(now/400 + cl)*0.2 + 0.8;
            ctx.fillStyle = '#3dd497';
            ctx.globalAlpha = pulse * 0.5;
            ctx.fillRect(sx-2, sy-2, TILE+5, TILE+5);
            ctx.globalAlpha = 1.0;
          } else if(tile === 10){
            /* Dungeon entrance — dramatic swirling portal */
            const dPulse = Math.sin(now/250 + cl*2)*0.25 + 0.75;
            const _dElemCol = ZONES[S.currentZone]?.element ? (ELEMENTS[ZONES[S.currentZone].element]?.color||'#ff5e6c') : '#ff5e6c';
            /* Outer glow — zone element colored */
            ctx.fillStyle = _dElemCol;
            ctx.globalAlpha = dPulse * 0.15;
            ctx.beginPath(); ctx.arc(sx+TILE/2, sy+TILE/2, TILE*1.2, 0, Math.PI*2); ctx.fill();
            /* Red/purple base glow */
            ctx.fillStyle = '#ff5e6c';
            ctx.globalAlpha = dPulse * 0.3;
            ctx.fillRect(sx-3, sy-3, TILE+7, TILE+7);
            ctx.globalAlpha = dPulse * 0.2;
            ctx.fillStyle = '#a855f7';
            ctx.beginPath(); ctx.arc(sx+TILE/2, sy+TILE/2, TILE*0.8, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;
            /* Dark portal center — deeper void */
            const voidGrad = ctx.createRadialGradient(sx+TILE/2,sy+TILE/2,0,sx+TILE/2,sy+TILE/2,TILE*0.4);
            voidGrad.addColorStop(0,'#050010');
            voidGrad.addColorStop(1,'#1a0a2e');
            ctx.fillStyle = voidGrad;
            ctx.beginPath(); ctx.arc(sx+TILE/2, sy+TILE/2, TILE*0.38, 0, Math.PI*2); ctx.fill();
            /* Swirling orbit ring */
            ctx.strokeStyle = `rgba(168,85,247,${0.3+Math.sin(now/200)*0.15})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(sx+TILE/2, sy+TILE/2, TILE*0.55, now/400, now/400+Math.PI*1.4); ctx.stroke();
            /* Swirling particles — more and element-tinted */
            for(let dp=0;dp<5;dp++){
              const dpa = now/300 + dp*Math.PI*2/5;
              const dpR = TILE*0.45 + Math.sin(now/200+dp)*3;
              const dpCol = dp%2===0 ? 'rgba(255,94,108,.5)' : `rgba(168,85,247,.5)`;
              ctx.fillStyle = dpCol;
              ctx.beginPath();
              ctx.arc(sx+TILE/2+Math.cos(dpa)*dpR, sy+TILE/2+Math.sin(dpa)*dpR, 1.5+Math.sin(now/150+dp)*0.5, 0, Math.PI*2);
              ctx.fill();
            }
            /* Inner sparkle */
            const spkA = Math.sin(now/100)*0.5+0.5;
            ctx.fillStyle = `rgba(255,255,255,${spkA*0.3})`;
            ctx.beginPath(); ctx.arc(sx+TILE/2+Math.sin(now/300)*3, sy+TILE/2+Math.cos(now/250)*3, 1, 0, Math.PI*2); ctx.fill();
          } else if(tile===11){
            /* Fence — chain-link barrier */
            ctx.fillStyle = S.currentZone==='wasteland' ? '#2a2218' : getTileColor(0, S.currentZone);
            ctx.fillRect(sx, sy, TILE+1, TILE+1);
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(sx, sy, 3, TILE); ctx.fillRect(sx+TILE-3, sy, 3, TILE);
            ctx.fillStyle = '#5a5a5a';
            ctx.fillRect(sx, sy+4, TILE, 2); ctx.fillRect(sx, sy+TILE/2, TILE, 2); ctx.fillRect(sx, sy+TILE-6, TILE, 2);
            ctx.strokeStyle = 'rgba(150,150,150,.3)'; ctx.lineWidth = 0.5;
            for(let fx=4;fx<TILE;fx+=8){
              ctx.beginPath(); ctx.moveTo(sx+fx,sy); ctx.lineTo(sx+fx+4,sy+TILE/2); ctx.lineTo(sx+fx,sy+TILE); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(sx+fx+4,sy); ctx.lineTo(sx+fx,sy+TILE/2); ctx.lineTo(sx+fx+4,sy+TILE); ctx.stroke();
            }
            ctx.fillStyle = '#6a6a6a'; ctx.fillRect(sx, sy, TILE, 3);
          } else if(tile===12){
            /* Gate — climbable opening with warning stripes */
            ctx.fillStyle = S.currentZone==='wasteland' ? '#2a2218' : getTileColor(0, S.currentZone);
            ctx.fillRect(sx, sy, TILE+1, TILE+1);
            ctx.save(); ctx.beginPath(); ctx.rect(sx, sy, TILE, TILE); ctx.clip();
            for(let si=-TILE;si<TILE*2;si+=12){
              ctx.fillStyle = 'rgba(245,197,66,.2)';
              ctx.beginPath(); ctx.moveTo(sx+si,sy); ctx.lineTo(sx+si+6,sy); ctx.lineTo(sx+si+6+TILE,sy+TILE); ctx.lineTo(sx+si+TILE,sy+TILE); ctx.fill();
            }
            ctx.restore();
            ctx.strokeStyle = '#8a7a4a'; ctx.lineWidth = 2; ctx.strokeRect(sx+1,sy+1,TILE-2,TILE-2);
            const gPulse = 0.5+Math.sin(now/400)*0.3;
            ctx.fillStyle = `rgba(245,197,66,${gPulse})`; ctx.font = 'bold 7px "VT323", monospace'; ctx.textAlign = 'center';
            ctx.fillText('CLIMB', sx+TILE/2, sy+TILE/2+3);
          } else if(tile===13){
            /* House building — wooden walls with roof */
            ctx.fillStyle = '#7a5a3a'; ctx.fillRect(sx, sy, TILE+1, TILE+1);
            /* Wood plank lines */
            ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.lineWidth = 0.5;
            for(let ly=4;ly<TILE;ly+=6){ ctx.beginPath(); ctx.moveTo(sx,sy+ly); ctx.lineTo(sx+TILE,sy+ly); ctx.stroke(); }
            /* Roof (top tiles) */
            ctx.fillStyle = '#a04020';
            ctx.fillRect(sx-2, sy, TILE+4, 5);
            /* Window */
            ctx.fillStyle = 'rgba(255,240,150,.4)';
            ctx.fillRect(sx+TILE/2-4, sy+10, 8, 8);
            ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 1;
            ctx.strokeRect(sx+TILE/2-4, sy+10, 8, 8);
            ctx.beginPath(); ctx.moveTo(sx+TILE/2,sy+10); ctx.lineTo(sx+TILE/2,sy+18); ctx.stroke();
          } else if(tile===14){
            /* Farm plot — tilled soil with furrows */
            ctx.fillStyle = '#5a4a2a'; ctx.fillRect(sx, sy, TILE+1, TILE+1);
            ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.lineWidth = 0.5;
            for(let fy=4;fy<TILE;fy+=5){
              ctx.beginPath(); ctx.moveTo(sx+2,sy+fy); ctx.lineTo(sx+TILE-2,sy+fy); ctx.stroke();
            }
            /* Small seed dots */
            ctx.fillStyle = 'rgba(100,180,60,.3)';
            for(let sd=0;sd<3;sd++){
              ctx.beginPath(); ctx.arc(sx+8+sd*8, sy+TILE/2, 2, 0, Math.PI*2); ctx.fill();
            }
          } else if(tile===15){
            /* Bed — sleep to recharge */
            ctx.fillStyle = '#6a4a5a'; ctx.fillRect(sx, sy, TILE+1, TILE+1);
            /* Bed frame */
            ctx.fillStyle = '#8a6a3a'; ctx.fillRect(sx+4, sy+4, TILE-8, TILE-8);
            /* Pillow */
            ctx.fillStyle = '#e0d0c0'; ctx.fillRect(sx+6, sy+6, 10, 6);
            /* Blanket */
            ctx.fillStyle = '#4a6a9a'; ctx.fillRect(sx+6, sy+14, TILE-12, 10);
            /* ZZZ pulse */
            const zzPulse = 0.4+Math.sin(now/600)*0.3;
            ctx.fillStyle = `rgba(150,180,255,${zzPulse})`; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('💤', sx+TILE/2, sy-2);
          } else {
            ctx.fillStyle = getTileColor(tile, S.currentZone);
          }
          ctx.fillRect(sx, sy, TILE+1, TILE+1);

          /* Decorations */
          if(tile===1){
            /* Path — cobblestone pattern */
            ctx.fillStyle = 'rgba(0,0,0,.06)';
            if((cl+r)%2===0){ ctx.fillRect(sx+2,sy+2,6,6); ctx.fillRect(sx+18,sy+14,8,6); }
            else { ctx.fillRect(sx+10,sy+4,8,5); ctx.fillRect(sx+4,sy+18,6,8); }
            ctx.fillStyle = 'rgba(255,255,255,.03)';
            ctx.fillRect(sx+12,sy+10,4,3);
          } else if(tile===3){
            /* Building — pixel-art composite with per-building theming */
            /* Determine which building this tile belongs to */
            let ownerB = null;
            if(S.currentZone==='town'){
              for(let bi2=0;bi2<BUILDINGS.length;bi2++){
                const bb=BUILDINGS[bi2];
                if(cl>=bb.bx&&cl<bb.bx+bb.bw&&r>=bb.by&&r<bb.by+bb.bh){ ownerB=bb; break; }
              }
            }
            const bCol = ownerB?.color || '#4a3a5c';
            const isTop = ownerB ? (r === ownerB.by) : false;
            const isBot = ownerB ? (r === ownerB.by + ownerB.bh - 1) : false;
            const isLeft = ownerB ? (cl === ownerB.bx) : false;
            const isRight = ownerB ? (cl === ownerB.bx + ownerB.bw - 1) : false;

            /* Wall base — warm stone with color influence */
            const wallR = parseInt(bCol.slice(1,3),16)||74;
            const wallG = parseInt(bCol.slice(3,5),16)||58;
            const wallB = parseInt(bCol.slice(5,7),16)||92;
            ctx.fillStyle = `rgb(${Math.min(255,wallR+30)},${Math.min(255,wallG+25)},${Math.min(255,wallB+20)})`;
            ctx.fillRect(sx, sy, TILE, TILE);

            /* Brick mortar lines */
            ctx.strokeStyle = 'rgba(0,0,0,.08)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(sx,sy+TILE*0.33); ctx.lineTo(sx+TILE,sy+TILE*0.33);
            ctx.moveTo(sx,sy+TILE*0.66); ctx.lineTo(sx+TILE,sy+TILE*0.66);
            ctx.stroke();
            if(r%2===0){
              ctx.beginPath(); ctx.moveTo(sx+TILE*0.5,sy); ctx.lineTo(sx+TILE*0.5,sy+TILE*0.33); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(sx+TILE*0.25,sy+TILE*0.33); ctx.lineTo(sx+TILE*0.25,sy+TILE*0.66); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(sx+TILE*0.75,sy+TILE*0.66); ctx.lineTo(sx+TILE*0.75,sy+TILE); ctx.stroke();
            } else {
              ctx.beginPath(); ctx.moveTo(sx+TILE*0.25,sy); ctx.lineTo(sx+TILE*0.25,sy+TILE*0.33); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(sx+TILE*0.75,sy+TILE*0.33); ctx.lineTo(sx+TILE*0.75,sy+TILE*0.66); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(sx+TILE*0.5,sy+TILE*0.66); ctx.lineTo(sx+TILE*0.5,sy+TILE); ctx.stroke();
            }

            /* Roof — top row gets a peaked/colored roof */
            if(isTop){
              /* Dark eave overhang */
              ctx.fillStyle = `rgba(${Math.max(0,wallR-40)},${Math.max(0,wallG-40)},${Math.max(0,wallB-30)},1)`;
              ctx.fillRect(sx-2, sy, TILE+4, 8);
              /* Roof tiles with building color */
              ctx.fillStyle = bCol;
              ctx.fillRect(sx-2, sy-4, TILE+4, 7);
              /* Roof highlight */
              ctx.fillStyle = 'rgba(255,255,255,.12)';
              ctx.fillRect(sx, sy-4, TILE, 3);
              /* Roof edge line */
              ctx.strokeStyle = 'rgba(0,0,0,.2)';
              ctx.lineWidth = 1;
              ctx.beginPath(); ctx.moveTo(sx-2,sy+3); ctx.lineTo(sx+TILE+2,sy+3); ctx.stroke();
            }

            /* Bottom row — foundation/door area */
            if(isBot){
              /* Foundation strip */
              ctx.fillStyle = 'rgba(0,0,0,.1)';
              ctx.fillRect(sx, sy+TILE-4, TILE, 4);
              /* Door — center bottom tiles */
              if(!isLeft && !isRight){
                ctx.fillStyle = `rgb(${Math.max(0,wallR-30)},${Math.max(0,wallG-20)},${Math.max(0,wallB-10)})`;
                ctx.fillRect(sx+6, sy+4, TILE-12, TILE-6);
                /* Door frame */
                ctx.strokeStyle = 'rgba(0,0,0,.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(sx+6, sy+4, TILE-12, TILE-6);
                /* Door handle */
                ctx.fillStyle = '#f5c542';
                ctx.beginPath(); ctx.arc(sx+TILE-10, sy+TILE/2+2, 1.5, 0, Math.PI*2); ctx.fill();
              }
            }

            /* Windows — interior tiles get windows */
            if(!isTop && !isBot && (r+cl)%2===0){
              const winGlow = isNight ? '#f5c542' : isDusk ? '#daa520' : 'rgba(200,180,140,.5)';
              /* Window pane */
              ctx.fillStyle = winGlow;
              ctx.fillRect(sx+8, sy+6, 10, 12);
              /* Window frame — cross */
              ctx.strokeStyle = `rgb(${Math.max(0,wallR-20)},${Math.max(0,wallG-15)},${Math.max(0,wallB-10)})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(sx+13, sy+6); ctx.lineTo(sx+13, sy+18);
              ctx.moveTo(sx+8, sy+12); ctx.lineTo(sx+18, sy+12);
              ctx.stroke();
              /* Window sill */
              ctx.fillStyle = 'rgba(0,0,0,.15)';
              ctx.fillRect(sx+7, sy+18, 12, 2);
              /* Night glow effect */
              if(isNight){
                ctx.fillStyle = 'rgba(245,197,66,.08)';
                ctx.beginPath(); ctx.arc(sx+13, sy+12, 12, 0, Math.PI*2); ctx.fill();
              }
            }

            /* Edge shadows for depth */
            if(isLeft){
              ctx.fillStyle = 'rgba(0,0,0,.08)';
              ctx.fillRect(sx, sy, 3, TILE);
            }
            if(isRight){
              ctx.fillStyle = 'rgba(0,0,0,.12)';
              ctx.fillRect(sx+TILE-3, sy, 3, TILE);
            }
          } else if(tile===4){
            /* Tree — zone-specific variants */
            const sway = Math.sin(now/1200 + cl*3 + r*7) * 1.5;

              /* CHARRED STUMP — blackened trunk, no canopy, ember glow */
              ctx.fillStyle='rgba(0,0,0,.1)';
              ctx.beginPath(); ctx.ellipse(sx+TILE/2+2,sy+TILE/2+12,8,3,0,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='#2a1a0a';

            } else {

              for(let p=0;p<5;p++){
                const pa = (p/5)*Math.PI*2 + now/2000;

              ctx.fillStyle = '#f5c542';
              ctx.beginPath(); ctx.arc(fx, fy, 1.5, 0, Math.PI*2); ctx.fill();
            }
          } else if(tile===2){
            /* Water — zone-specific fluid rendering */
            const t = now/600;
            if(zoneElem==='flame'){
              /* LAVA — molten orange-red with bright surface cracks */
              ctx.fillStyle = '#8a2a0a';
              ctx.fillRect(sx, sy, TILE+1, TILE+1);

              ctx.fillRect(sx+2, sy+2, TILE-3, TILE-3);

              ctx.strokeStyle=`rgba(255,200,50,${0.4+Math.sin(t*1.5+cl*3)*0.2})`; ctx.lineWidth=0.8;

      /* Ambient particles — fireflies at night, leaves during day */
      if(!S._particles) S._particles = Array.from({length:40},()=>({
        x:Math.random()*TOWN_W, y:Math.random()*TOWN_H,
        vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
        phase:Math.random()*Math.PI*2, size:Math.random()*2+1
      }));
      S._particles.forEach(p=>{
        p.x += p.vx; p.y += p.vy;
        if(p.x<0) p.x=TOWN_W; if(p.x>TOWN_W) p.x=0;
        if(p.y<0) p.y=TOWN_H; if(p.y>TOWN_H) p.y=0;

          ctx.beginPath();
          ctx.arc(ppx, ppy, p.size*3, 0, Math.PI*2);
          ctx.fill();
        } else {
          /* Floating dust/pollen */
          const a = Math.sin(now/600+p.phase)*0.3+0.3;
          ctx.fillStyle = `rgba(255,255,200,${a})`;

          ctx.arc(ppx, ppy, p.size*0.7, 0, Math.PI*2);

      /* Collectible rendering removed */

      /* Render player trail */
      if(S.trail.length > 1){
        for(let i=0;i<S.trail.length;i++){
          const t = S.trail[i];
          const age = (now - t.ts) / 800; /* 0 to 1 */
          if(age >= 1) continue;
          const tx = t.x - cx, ty = t.y - cy;
          const alpha = (1 - age) * 0.4;
          const size = (1 - age) * 4 + 1;
          ctx.fillStyle = `rgba(91,82,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(tx, ty + 8, size, 0, Math.PI*2);
          ctx.fill();
        }
      }

      /* Building signs — large prominent signboards (town only) */
      if(S.currentZone === 'town') BUILDINGS.forEach((b,bi)=>{
        const bsx = (b.bx+b.bw/2)*TILE - cx;
        const bsy = b.by*TILE - cy - 6;
        if(bsx<-150||bsx>W+150||bsy<-80||bsy>H+80) return;
        const isNear = S.nearBuilding === bi;

        /* Sign board — larger, with shadow */
        ctx.font = 'bold 11px "Space Mono", monospace';
        ctx.textAlign = 'center';
        const labelText = b.label;
        const tw = ctx.measureText(labelText).width;
        const signW = Math.max(tw + 36, 70);
        const signH = 24;
        const signR = 6;
        const signY = bsy - signH - 4;

        /* Sign shadow */
        ctx.fillStyle = 'rgba(0,0,0,.25)';
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2+2, signY+2, signW, signH, signR);
        ctx.fill();

        /* Sign background */
        ctx.fillStyle = isNear ? 'rgba(91,82,255,.9)' : 'rgba(20,15,30,.85)';
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2, signY, signW, signH, signR);
        ctx.fill();

        /* Sign border */
        ctx.strokeStyle = isNear ? 'rgba(255,255,255,.5)' : 'rgba(245,197,66,.4)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(bsx-signW/2, signY, signW, signH, signR);
        ctx.stroke();

        /* Sign post — thin line from sign to building */
        ctx.strokeStyle = 'rgba(100,80,60,.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bsx, signY+signH);
        ctx.lineTo(bsx, bsy);
        ctx.stroke();

        /* Icon */
        ctx.font = '14px sans-serif';
        ctx.fillText(b.icon, bsx - tw/2 - 6, signY + signH - 6);

        /* Label text */
        ctx.font = 'bold 10px "Space Mono", monospace';
        ctx.fillStyle = isNear ? '#fff' : '#f5c542';
        ctx.fillText(labelText, bsx + 6, signY + signH - 8);

        /* "TAP TO ENTER" hint when near — pulsing */
        if(isNear && b.action){
          const pulse = Math.sin(now/300)*0.15 + 0.85;
          ctx.globalAlpha = pulse;
          ctx.fillStyle = 'rgba(91,82,255,.7)';
          ctx.beginPath();
          ctx.roundRect(bsx-40, signY+signH+6, 80, 16, 4);
          ctx.fill();
          ctx.font = 'bold 8px sans-serif';
          ctx.fillStyle = '#fff';
          ctx.fillText('TAP TO ENTER', bsx, signY+signH+17);
          ctx.globalAlpha = 1;
        }
      });

      /* ═══ ZONE EXIT LABELS — show where paths lead ═══ */
      if(S.currentZone === 'town'){
        TOWN_EXITS.forEach(ex => {
          let lx, ly;
          if(ex.dir==='north'){ lx=ex.tx*TILE+TILE-cx; ly=TILE*1.5-cy; }
          if(ex.dir==='south'){ lx=ex.tx*TILE+TILE-cx; ly=(ZONES.town.h-2)*TILE-cy; }
          if(ex.dir==='east'){ lx=(ZONES.town.w-2)*TILE-cx; ly=ex.ty*TILE+TILE-cy; }
          if(ex.dir==='west'){ lx=TILE*2-cx; ly=ex.ty*TILE+TILE-cy; }
          if(lx<-80||lx>W+80||ly<-30||ly>H+30) return;
          /* Glowing label */
          ctx.font = 'bold 9px "Space Mono", monospace';
          ctx.textAlign = 'center';
          const pulse = Math.sin(now/500)*0.2+0.8;
          ctx.fillStyle = ex.color;
          ctx.globalAlpha = pulse;
          ctx.fillText(ex.label, lx, ly);
          ctx.globalAlpha = 1;
          /* Element icon */
          const elem = ZONES[ex.zoneId]?.element;
          if(elem){
            const lvl = ZONES[ex.zoneId].level;
            ctx.font = '7px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,.5)';
            ctx.fillText('Lv'+lvl[0]+'-'+lvl[1], lx, ly+10);
          }
        });
      } else {
        /* In combat zones — show return exits */
        const zone = ZONES[S.currentZone];
        const zW = zone.w, zH = zone.h;
        const retExits = [
          {x:0, y:Math.floor(zH/2), label:'← Town'},
          {x:zW-1, y:Math.floor(zH/2), label:'Town →'},
          {x:Math.floor(zW/2), y:0, label:'Town ↑'},
          {x:Math.floor(zW/2), y:zH-1, label:'Town ↓'},
        ];
        retExits.forEach(re => {
          if(S.map[re.y]?.[re.x] !== 9) return;
          const lx = re.x*TILE+TILE/2-cx, ly = re.y*TILE+TILE/2-cy;
          if(lx<-60||lx>W+60||ly<-20||ly>H+20) return;
          ctx.font = 'bold 8px "Space Mono", monospace';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#3dd497';
          ctx.globalAlpha = Math.sin(now/400)*0.2+0.8;
          ctx.fillText(re.label, lx, ly-4);
          ctx.globalAlpha = 1;
        });

        /* Dungeon entrance labels */
        if(S.currentZone !== 'town'){
          const zone = ZONES[S.currentZone];
          const zW = zone.w, zH = zone.h;
          const dungX = Math.floor(zW/2), dungY = Math.floor(zH * 0.3);
          if(S.map?.[dungY]?.[dungX] === 10){
            const dlx = dungX*TILE+TILE - cx, dly = dungY*TILE+TILE/2 - cy;
            if(dlx > -60 && dlx < W+60 && dly > -30 && dly < H+30){
              ctx.font = 'bold 9px "Space Mono", monospace';
              ctx.textAlign = 'center';
              const dPulse = Math.sin(now/300)*0.2+0.8;
              ctx.fillStyle = '#ff5e6c';
              ctx.globalAlpha = dPulse;
              const currentDepth = S._currentDepth || 'shallow';
              const clearKey = S.currentZone+'_'+currentDepth;
              const isCleared = S.rpg?.lifeSkills?.dungeonClears?.[clearKey];
              const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[currentDepth];
              if(nextDepth){
                const dc = DEPTH_CONFIG[nextDepth];
                const lr = dc.lvlRange || [1,10];
                if(isCleared){
                  /* Already cleared — will warp to next depth */
                  ctx.fillStyle = '#3dd497';
                  ctx.fillText('🌀 Warp → '+nextDepth.toUpperCase(), dlx, dly-10);
                  ctx.font = '7px sans-serif';
                  ctx.fillStyle = 'rgba(255,255,255,.5)';
                  ctx.fillText('Lv '+lr[0]+'-'+lr[1]+' · Cleared ✓', dlx, dly+2);
                } else {
                  /* Not cleared — dungeon fight */
                  ctx.fillText('⚔️ Dungeon → '+nextDepth.charAt(0).toUpperCase()+nextDepth.slice(1), dlx, dly-10);
                  ctx.font = '7px sans-serif';
                  ctx.fillStyle = 'rgba(255,255,255,.5)';
                  ctx.fillText('Lv '+lr[0]+'-'+lr[1]+' · Clear to unlock', dlx, dly+2);
                }
              } else if(currentDepth==='core' && S.rpg?._questFlags?.endgameUnlocked){
                ctx.fillStyle = '#F1C40F';
                ctx.fillText('✦ Endgame Portals Available', dlx, dly-6);
              } else if(currentDepth==='core'){
                ctx.fillText('⚔️ Final Dungeon', dlx, dly-6);
              } else {
                ctx.fillText('⚔️ Zone Complete!', dlx, dly-6);
              }
              ctx.globalAlpha = 1;
            }
          }
        }
      }

      /* Draw other players — velocity prediction + lerp + zone filter */
      Object.values(S.others).forEach(o => {
        /* Only render players in the same zone */
        const oZone = o.zone || 'town';
        if(oZone !== S.currentZone) return;
        /* Client-side velocity prediction — extrapolate position between updates */
        if(o._vx !== undefined && o._lastUpdate){
          const elapsed = (Date.now() - o._lastUpdate) / 16.67; /* frames since last update */
          if(elapsed < 10){ /* only predict for ~160ms max */
            o.x += o._vx * 0.3;
            o.y += o._vy * 0.3;
          }
        }
        /* Aggressive lerp for snappy movement */
        o.renderX += (o.x - o.renderX) * 0.4;
        o.renderY += (o.y - o.renderY) * 0.4;
        const oMoving = Math.abs(o.x - (o._prevX||o.x)) > 0.1 || Math.abs(o.y - (o._prevY||o.y)) > 0.1;
        o._prevX = o.x; o._prevY = o.y;
        const ox = o.renderX - cx, oy = o.renderY - cy;
        if(ox < -40 || ox > W+40 || oy < -40 || oy > H+40) return;

        /* Other player shadow */
        ctx.fillStyle = 'rgba(0,0,0,.15)';
        ctx.beginPath();
        ctx.ellipse(ox, oy+20, 9, 3.5, 0, 0, Math.PI*2);
        ctx.fill();

        /* Facing direction — discrete (for rectangle fallback) */
        const oDx = o.x - (o._facePrevX||o.x);
        const oDy = o.y - (o._facePrevY||o.y);
        o._facePrevX = o.x; o._facePrevY = o.y;
        const oAdx = Math.abs(oDx), oAdy = Math.abs(oDy);
        const oWasUD = o._facing === 'up' || o._facing === 'down';
        const oVB = oWasUD ? 1.3 : 0.7;
        if(oAdx > 0.03 || oAdy > 0.03){
          if(oAdy > oAdx * oVB) o._facing = oDy > 0 ? 'down' : 'up';
          else if(oAdx > oAdy * (oWasUD ? 0.7 : 1.3)) o._facing = oDx > 0 ? 'right' : 'left';
        }
        const oDir = o._facing || 'down';
        const oFlip = oDir === 'right';
        const oSide = oDir === 'left' || oDir === 'right';

        /* Continuous facing angle — smooth 360° for NFT */
        if(oAdx > 0.02 || oAdy > 0.02){
          o._targetAngle = Math.atan2(oDy, oDx);
        }
        if(o._fAngle === undefined) o._fAngle = Math.PI/2;
        if(o._targetAngle !== undefined){
          let aDiff = o._targetAngle - o._fAngle;
          while(aDiff > Math.PI) aDiff -= Math.PI*2;
          while(aDiff < -Math.PI) aDiff += Math.PI*2;
          o._fAngle += aDiff * (oMoving ? 0.18 : 0.08);
          while(o._fAngle > Math.PI) o._fAngle -= Math.PI*2;
          while(o._fAngle < -Math.PI) o._fAngle += Math.PI*2;
        }

        /* Animation vars (were missing — fix) */
        const oFp = now / 80;
        const oSwing = oMoving ? Math.sin(oFp) * 0.5 : 0;
        const oAnimBob = oMoving ? Math.abs(Math.sin(oFp)) * 2.5 : 0;
        const oTC = o.bt || '#2563eb';
        const oLC = o.bl || '#1e3a5f';

        /* Other player body — check for NFT avatar */
        const oBS = o.bodySize === 'armored' ? 'armored' : 'slim';
        const otw = oBS==='slim'?16:28, oth=oBS==='slim'?16:24;
        const oaw = oBS==='slim'?3:5, oah2 = oBS==='slim'?14:22;
        const olw = oBS==='slim'?6:10, olh=oBS==='slim'?10:16, olg=oBS==='slim'?2:4;
        const osw = oBS==='slim'?7:12, osh=oBS==='slim'?4:6;
        const ohw = oBS==='slim'?2.5:3.5, ohh=3;
        const oHR = oBS==='slim'?12:16;
        const oArmY = oBS==='slim'?8:10, oLegY = oBS==='slim'?18:26;

        /* Check if other player has a processed NFT avatar */
        let _oHasNft = false;
        if(o.avatar){
          const oNftImg = loadAvatarImg(o.avatar);
          _oHasNft = oNftImg instanceof HTMLCanvasElement ? oNftImg.width>0 : (oNftImg && oNftImg.complete && oNftImg.naturalWidth);
        }

        if(_oHasNft){
          /* ═══ OTHER PLAYER — NFT 360° BODY ═══ */
          const oNftImg = loadAvatarImg(o.avatar);
          const oNftDir = getNftDirectional(oNftImg, o.avatar);
          const oNftSz = oNftDir.size;
          const oFA = o._fAngle !== undefined ? o._fAngle : Math.PI/2;

          /* Leg metrics from angle */
          const oTurnFromCam = oFA - Math.PI/2;
          let oTurnAbs = Math.abs(((oTurnFromCam % (Math.PI*2)) + Math.PI*3) % (Math.PI*2) - Math.PI);
          const oSideAmt = Math.sin(oTurnAbs);
          const oMirrorLegs = Math.cos(oFA) > 0;

          /* Draw legs */
          ctx.save();
          ctx.translate(ox, oy + oAnimBob);
          const oNLegY = 8;
          const oLegSpread = olg + (1 - oSideAmt) * 2;
          const oLegNarrow = oSideAmt > 0.4;

          if(oMirrorLegs) ctx.scale(-1, 1);

          if(oLegNarrow){
            ctx.save(); ctx.translate(0, oNLegY); ctx.rotate(oSwing);
            ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 0, olw, olh);
            ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh-2, osw, osh);
            ctx.restore();
            ctx.globalAlpha = 0.55;
            ctx.save(); ctx.translate(0, oNLegY); ctx.rotate(-oSwing);
            ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 2, olw, olh);
            ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh, osw, osh);
            ctx.restore();
            ctx.globalAlpha = 1;
          } else {
            const oNLs = oMoving ? Math.sin(oFp)*1.5 : 0;
            const oNRs = oMoving ? Math.sin(oFp+Math.PI)*1.5 : 0;
            const oHS = oLegSpread/2;
            ctx.fillStyle = oLC; ctx.fillRect(-(oHS+olw), oNLegY+oNLs, olw, olh);
            ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-(oHS+olw)-0.5, oNLegY+olh-2+oNLs, osw, osh);
            ctx.fillStyle = oLC; ctx.fillRect(oHS, oNLegY+oNRs, olw, olh);
            ctx.fillStyle = '#2a1a0e'; ctx.fillRect(oHS-0.5, oNLegY+olh-2+oNRs, osw, osh);
          }
          ctx.restore();

          /* Draw 360° NFT */
          const oNftY = oy + oAnimBob - oNftSz/2 - 4;
          drawNft360(ctx, oNftDir, ox, oNftY, oFA, oNftSz);

        } else {
          /* ═══ OTHER PLAYER — ORIGINAL RECTANGLE BODY ═══ */
        ctx.save();
        ctx.translate(ox, oy + oAnimBob);

        if(oSide){
          if(oDir === 'left') ctx.scale(-1, 1);
          ctx.globalAlpha = 0.55;
          ctx.save(); ctx.translate(0, oArmY); ctx.rotate(-oSwing);
          ctx.fillStyle = oTC; ctx.fillRect(-oaw/2, 0, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-ohw/2, oah2-2, ohw, ohh);
          ctx.restore();
          ctx.save(); ctx.translate(0, oLegY); ctx.rotate(oSwing);
          ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 0, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh-2, osw, osh);
          ctx.restore();
          ctx.globalAlpha = 1;
          ctx.fillStyle = oTC; ctx.fillRect(-otw/2+1, 3, otw-2, oth);
          ctx.save(); ctx.translate(0, oArmY); ctx.rotate(oSwing);
          ctx.fillStyle = oTC; ctx.fillRect(-oaw/2, 0, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-ohw/2, oah2-2, ohw, ohh);
          ctx.restore();
          ctx.save(); ctx.translate(0, oLegY); ctx.rotate(-oSwing);
          ctx.fillStyle = oLC; ctx.fillRect(-olw/2, 0, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-osw/2, olh-2, osw, osh);
          ctx.restore();
        } else {
          const oLS2 = oMoving ? Math.sin(oFp)*1.2 : 0;
          const oRS2 = oMoving ? Math.sin(oFp+Math.PI)*1.2 : 0;
          ctx.fillStyle = oTC; ctx.fillRect(-(otw/2+oaw), oArmY-3+oRS2, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(-(otw/2+oaw)+0.5, oArmY-3+oah2-1+oRS2, ohw, ohh);
          ctx.fillStyle = oLC; ctx.fillRect(-(olg/2+olw), oLegY-5+oLS2, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(-(olg/2+olw)-0.5, oLegY-5+olh-2+oLS2, osw, osh);
          ctx.fillStyle = oTC; ctx.fillRect(-otw/2, 4, otw, oth);
          ctx.fillStyle = oLC; ctx.fillRect(olg/2, oLegY-5+oRS2, olw, olh);
          ctx.fillStyle = '#2a1a0e'; ctx.fillRect(olg/2-0.5, oLegY-5+olh-2+oRS2, osw, osh);
          ctx.fillStyle = oTC; ctx.fillRect(otw/2, oArmY-3+oLS2, oaw, oah2);
          ctx.fillStyle = '#f0c68a'; ctx.fillRect(otw/2+0.5, oArmY-3+oah2-1+oLS2, ohw, ohh);
        }

        ctx.restore();
        } /* end else (original rectangle body for other player) */

        /* Other player head — skip if NFT 360° body drawn */
        if(!_oHasNft){
        const oHeadY = oBS==='slim' ? -6 : -12;
        ctx.fillStyle = '#f0c68a';
        ctx.beginPath(); ctx.arc(ox, oy+oHeadY+oAnimBob, oHR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#3b2414';
        ctx.beginPath(); ctx.arc(ox, oy+oHeadY-2+oAnimBob, oHR, Math.PI, Math.PI*2); ctx.fill();

        /* Other player avatar head — overrides default */
        if(o.avatar){
          const img = loadAvatarImg(o.avatar);
          const ready = img instanceof HTMLCanvasElement ? img.width>0 : (img.complete && img.naturalWidth);
          if(ready){
            ctx.save();
            if(oFlip){ ctx.translate(ox, 0); ctx.scale(-1, 1); ctx.translate(-ox, 0); }
            ctx.beginPath(); ctx.arc(ox, oy+oHeadY+oAnimBob, oHR, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(img, ox-oHR, oy+oHeadY-oHR+oAnimBob, oHR*2, oHR*2);
            ctx.restore();
          }
        }
        } /* end !_oHasNft head */
        /* Name tag */
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        /* Build display name with clan tag */
        const displayName = o.clanTag ? '['+o.clanTag+'] '+o.name : o.name;
        ctx.fillStyle = 'rgba(0,0,0,.6)';
        const ntw = ctx.measureText(displayName).width;
        ctx.fillRect(ox-ntw/2-3, oy-22, ntw+6, 12);
        /* Clan tag in clan color, name in player color */
        if(o.clanTag && o.clanColor1){
          ctx.fillStyle = o.clanColor1;
          const tagText = '['+o.clanTag+'] ';
          ctx.textAlign = 'left';
          ctx.fillText(tagText, ox-ntw/2, oy-13);
          ctx.fillStyle = o.color;
          ctx.fillText(o.name, ox-ntw/2+ctx.measureText(tagText).width, oy-13);
          ctx.textAlign = 'center';
        } else {
          ctx.fillStyle = o.color;
          ctx.fillText(displayName, ox, oy-13);
        }

        /* Clan logo — tiny 8x8 pixel badge next to name */
        if(o.clanLogo){
          const logoSize = 10, px2 = 10/CLAN_LOGO_SIZE;
          const lx = ox + ntw/2 + 4, ly = oy - 22;
          for(let lr=0;lr<CLAN_LOGO_SIZE;lr++) for(let lc=0;lc<CLAN_LOGO_SIZE;lc++){
            const ci = o.clanLogo[lr]?.[lc];
            if(ci >= 0 && ci < CLAN_COLORS.length){
              ctx.fillStyle = CLAN_COLORS[ci];
              ctx.fillRect(lx+lc*px2, ly+lr*px2, px2+0.5, px2+0.5);
            }
          }
        }

        /* §19 PvP skull indicator — red skull (active threat) or white skull (rescinded) */
        if(o.pvpSkull){
          const skullColor = o.pvpSkull === 'red' ? '#ff5e6c' : '#ccc';
          const skullPulse = o.pvpSkull === 'red' ? (0.7 + Math.sin(now/200)*0.3) : 0.6;
          ctx.globalAlpha = skullPulse;
          ctx.font = '12px sans-serif';
          ctx.fillText(o.pvpSkull === 'red' ? '💀' : '☠️', ox, oy-32);
          ctx.globalAlpha = 1;
        }

        /* Other player HP bar + level */
        if(o.rpgLv){
          const oBarW=20, oBarH=2.5, oBarY=oy-24+oAnimBob;
          const oHpPct = (o.rpgHp||50)/(o.rpgMaxHp||50);
          ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(ox-oBarW/2,oBarY,oBarW,oBarH);
          ctx.fillStyle=oHpPct>0.5?'#3dd497':oHpPct>0.25?'#f5c542':'#ff5e6c';
          ctx.fillRect(ox-oBarW/2,oBarY,oBarW*oHpPct,oBarH);
          ctx.font='bold 6px sans-serif'; ctx.textAlign='center';
          ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillText('Lv'+o.rpgLv,ox,oBarY-1);
        }
        /* Other player badges */
        if(o.badges && o.badges.length > 0){
          ctx.font = '7px sans-serif';
          const oBadgeStr = o.badges.map(bid=>{const a=BT_ACHIEVEMENTS.find(x=>x.id===bid);return a?a.icon:'';}).join('');
          ctx.fillText(oBadgeStr, ox, oy-30);
        }
      });

      /* ═══ ARROW PROJECTILES ═══ */
      /* ═══ ARROWS — travel along LOS, follow aim direction ═══ */
      if(S.arrows && S.arrows.length > 0){
        /* Determine current aim angle for LOS tracking */
        let curAim;
        if(S.lockedTarget && S.lockedTarget.ref){
          const lt2 = S.lockedTarget.ref;
          curAim = Math.atan2((lt2.y||0)-P.y, (lt2.x||0)-P.x);
        } else if(S._aiming){
          curAim = S._aimAngle || 0;
        } else {
          const fd2 = S._facing||'down';
          curAim = fd2==='right'?0:fd2==='up'?-Math.PI/2:fd2==='left'?Math.PI:Math.PI/2;
        }
        S.arrows = S.arrows.filter(a=>{
          const activeWpn = S.rpg ? getActiveWeapon(S.rpg) : {element1:null,element2:null};
          const pDmg = S.rpg ? calcWeaponDmg(activeWpn.type||'greatsword', S.rpg.power||0, activeWpn.tierMult||1) : 10;
          a.dist += a.isStaff ? 5 : 8;
          a.life--;
          /* Projectiles follow the active LOS while aiming */
          if(S._aiming || (S.lockedTarget && S.lockedTarget.ref)) a.ang = curAim;
          /* Position = player + angle × distance */
          const ax2 = P.x + Math.cos(a.ang)*a.dist;
          const ay2 = P.y + Math.sin(a.ang)*a.dist;
          if(a.life <= 0) return false;
          /* Hit detection */
          let hit = false;
          if(S.monsters) S.monsters.forEach(m=>{
            if(!m.alive || a.hitIds.has(m.id) || hit) return;
            if(Math.sqrt((m.x-ax2)**2+(m.y-ay2)**2) < (a.isStaff?30:18)){
              a.hitIds.add(m.id);

              /* §9 — Apply element status on arrow hit */
              const arrowElem = a.isSpecial ? activeWpn?.element2 : activeWpn?.element1;
              if(arrowElem){
                const statusId = ELEMENTS[arrowElem]?.status;
                if(statusId) applyStatus(m, statusId, S.player, Date.now());
              }

              /* §10.3 — Check for collision */
              let arrowCollision = null;
              if(arrowElem && S.rpg){
                arrowCollision = resolveCollision(m, arrowElem, S.player, S.rpg, Date.now());
              }

              /* Boss invulnerability check */
              if(m._invulnerable){
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'IMMUNE',color:'#888',ts:Date.now()});
                a.hit = true; return;
              }

              m.curHp -= a.dmg;

              /* Collision damage + feedback on arrow hit */
              if(arrowCollision){
                m.curHp -= arrowCollision.damage;
                const coll = arrowCollision.collision;
                const elemCol = ELEMENTS[arrowCollision.triggerElement]?.color || '#fff';
                S.dmgNumbers.push({x:m.x+8,y:m.y-30,text:'💥'+arrowCollision.damage+' '+coll.name,color:elemCol,ts:Date.now()});
                if(arrowCollision.manaRestored > 0){
                  S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+arrowCollision.manaRestored+' MP',color:'#3b82f6',ts:Date.now()});
                }
                BT_AUDIO.collisionSound(arrowCollision.setupElement, arrowCollision.triggerElement, arrowCollision.manaRestored);
                for(let cp=0;cp<12;cp++){
                  S.hitParticles.push({x:m.x+(Math.random()-0.5)*6,y:m.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-2,life:0.7,color:elemCol,size:2+Math.random()*2});
                }
                S.screenShake = Math.max(S.screenShake, 4);
                BT_AUDIO.beep(400, 0.1, 0.12, 'sine');
                const isNew = discoverCollision(coll.id);
                if(isNew){
                  S.dmgNumbers.push({x:P.x,y:P.y-60,text:'📖 NEW: '+coll.name+'!',color:'#f5c542',ts:Date.now()});
                  BT_AUDIO.collect();
                }
              }

              BT_AUDIO.thwack();
              const kba = Math.atan2(m.y-ay2, m.x-ax2);
              m.x += Math.cos(kba)*5; m.y += Math.sin(kba)*5;
              /* ═══ Weapon-specific hit FX for ranged ═══ */
              const rangedWpnType = a.isStaff ? 'staff' : 'bow';
              const rangedHitFX = spawnWeaponHitFX(m.x, m.y, kba, rangedWpnType, false);
              rangedHitFX.forEach(p => S.hitParticles.push(p));
              /* ═══ STUCK ARROW — embed in monster ═══ */
              if(!m._stuckArrows) m._stuckArrows = [];
              if(m._stuckArrows.length < 6){
                m._stuckArrows.push({
                  ang: a.ang,
                  ox: (Math.random()-0.5)*8, oy: (Math.random()-0.5)*8,
                  isStaff: a.isStaff || false,
                  color: (projElem && ELEMENTS[projElem]) ? ELEMENTS[projElem].color : '#8B6914',
                });
              }
              if(!S.dmgNumbers) S.dmgNumbers=[];
              S.dmgNumbers.push({x:m.x,y:m.y-10,text:a.dmg+'',color:'#ff9',ts:Date.now()});
              /* Kill check — use same reward path as melee kills */
              if(m.curHp <= 0){
                m.alive = false;
                m.respawnAt = Date.now() + 30000;
                m.statuses = {};

                /* Quest kill tracking */
                if(S.rpg){
                  const R = S.rpg;
                  if(!R._questKills) R._questKills = {};
                  Object.keys(QUEST_CHAINS).forEach(qid => {
                    if(R._quests?.[qid] === QUEST_STATUS.active) R._questKills[qid] = (R._questKills[qid]||0) + 1;
                  });

                  /* Death feedback — simplified Grand Slam for arrows */
                  const isCrit = a.dmg > pDmg; /* special arrows count as crit */
                  BT_AUDIO.deathBoom();
                  S.screenShake = isCrit ? 6 : 3;

                  /* Death particles — element-specific for arrow kills */
                  const killAngle = a.ang;
                  const arrowDeathParts = [];
                  const _arrowKillElem = arrowElem || projElem || null;
                  const _arrowKillColl = arrowCollision ? arrowCollision.collision : null;

                  if(_arrowKillColl){
                    const collFx = getCollisionDeathFX(m.x, m.y, _arrowKillColl.id, killAngle,
                      ({fodder:8,brute:15,swarm:6,sentinel:12,volatile:9,stalker:10,hexer:10})[m.archetype||'fodder']||10, isCrit?2:1);
                    collFx.forEach(p => arrowDeathParts.push(p));
                  } else if(_arrowKillElem){
                    const elemFx = getElementDeathFX(m.x, m.y, _arrowKillElem, killAngle, m.color,
                      ({fodder:8,brute:15,swarm:6,sentinel:12,volatile:9,stalker:10,hexer:10})[m.archetype||'fodder']||10, isCrit?2:1);
                    elemFx.particles.forEach(p => arrowDeathParts.push(p));
                  } else {
                    for(let dp=0;dp<15;dp++){
                      arrowDeathParts.push({x:m.x,y:m.y,
                        vx:Math.cos(killAngle+(Math.random()-0.5)*1.5)*(2+Math.random()*4),
                        vy:Math.sin(killAngle+(Math.random()-0.5)*1.5)*(2+Math.random()*4)-2,
                        life:1,color:m.color,size:1.5+Math.random()*2});
                    }
                  }
                  arrowDeathParts.forEach(dp => S.hitParticles.push(dp));
                  /* Death explosion with kill type */
                  const _arrowBodySize = ({fodder:8,brute:15,swarm:6,sentinel:12,volatile:9,stalker:10,hexer:10})[m.archetype||'fodder']||10;
                  S.deathExplosions.push({
                    x:m.x, y:m.y, ts:Date.now(), emoji:m.emoji, particles:arrowDeathParts,
                    isGrandSlam: isCrit, killScale: isCrit ? 2 : 1,
                    killType: isStaffProj ? 'magic' : 'ranged',
                    killElement: _arrowKillElem, killCollision: _arrowKillColl?.id || null,
                    weaponType: isStaffProj ? 'staff' : 'bow',
                    killAngle, bodyColor: m.color, bodySize: _arrowBodySize,
                    archetype: m.archetype||'fodder', stuckArrows: m._stuckArrows || [],
                  });

                  /* Drop loot on ground */
                  S.groundLoot.push({
                    x:m.x+(Math.random()-0.5)*15, y:m.y+(Math.random()-0.5)*15,
                    coins:m.gold||m.coins||2, xp:0,
                    skull:m.type, skullEmoji:'🦴', ts:Date.now()
                  });

                  /* Weapon drop chance */
                  const dropChance = Math.min(0.15, 0.03 + (m.level||1)*0.001);
                  if(Math.random() < dropChance){
                    const zone = ZONES[S.currentZone];
                    const zoneElem = zone?.element;
                    const dropRoll = Math.random();
                    let dropTier, dropE1=null, dropE2=null, dropName='', dropVolatile=false;
                    if(dropRoll < 0.60) { dropTier='common'; }
                    else if(dropRoll < 0.85) { dropTier='elemental'; dropE1=zoneElem||'flame'; }
                    else if(dropRoll < 0.97) { dropTier='fusion'; dropE1=zoneElem||'flame';
                      const palette=['flame','frost','water','venom','storm','stone','wind'].filter(e=>e!==dropE1);
                      dropE2=palette[Math.floor(Math.random()*palette.length)];
                      const volPairs=[['flame','water'],['water','venom'],['venom','wind'],['wind','stone'],['stone','storm'],['storm','frost'],['frost','flame']];
                      dropVolatile=volPairs.some(([a2,b])=>(dropE1===a2&&dropE2===b)||(dropE1===b&&dropE2===a2));
                    } else { dropTier='shift'; dropE1=zoneElem||'flame'; dropE2='adaptive'; }
                    const dropTypes=['greatsword','sword','bow','staff'];
                    const dropType=dropTypes[Math.floor(Math.random()*dropTypes.length)];
                    const tierMult=RARITY_TIERS[dropTier].mult;
                    if(dropTier==='common') dropName=WEAPON_TYPES[dropType].label;
                    else if(dropTier==='elemental') dropName=(dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+' '+WEAPON_TYPES[dropType].label;
                    else if(dropTier==='fusion') dropName=(dropE1.charAt(0).toUpperCase()+dropE1.slice(1))+(dropE2.charAt(0).toUpperCase()+dropE2.slice(1))+' '+WEAPON_TYPES[dropType].label;
                    else dropName='Prismatic '+WEAPON_TYPES[dropType].label;
                    S.groundLoot.push({x:m.x+(Math.random()-0.5)*20,y:m.y+(Math.random()-0.5)*20,ts:Date.now(),
                      isWeapon:true,weapon:{type:dropType,tier:dropTier,tierMult,element1:dropE1,element2:dropE2,name:dropName,isVolatile:dropVolatile},
                      tierColor:RARITY_TIERS[dropTier].color});
                    S.dmgNumbers.push({x:m.x,y:m.y-40,text:'🗡️ '+dropName+'!',color:RARITY_TIERS[dropTier].color,ts:Date.now()});
                  }

                  setRpgState({...R});
                  try{localStorage.setItem('bt_rpg',JSON.stringify(R));}catch(e){}
                }
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'☠️',color:'#ff5e6c',ts:Date.now()});
              }
              hit = true;
            }
          });
          if(hit) return false;
          /* Render arrow */
          const sx = ax2-cx, sy = ay2-cy;
          const fadeA = Math.min(1, a.life/20);
          ctx.save(); ctx.translate(sx, sy); ctx.rotate(a.ang);
          ctx.globalAlpha = fadeA;

          /* Get element color for this projectile */
          const projElem = a.element || activeWpn?.element1;
          const projColor = projElem && ELEMENTS[projElem] ? ELEMENTS[projElem].color : '#c8c8d0';
          const isStaffProj = activeWpn?.type === 'staff' || (a.isSpecial && S.rpg?.activeSlot === 'staff');

          if(a.isSpecial || a.ice){
            /* Special/heavy projectile — large, glowing, element-colored */
            const size = isStaffProj ? 1.5 : 1.0;
            ctx.shadowColor=projColor+'cc';ctx.shadowBlur=18*size;
            ctx.fillStyle = projColor+'dd'; ctx.fillRect(-16*size, -5*size, 32*size, 10*size);
            /* Arrowhead */
            ctx.fillStyle = projColor;
            ctx.beginPath(); ctx.moveTo(16*size,0); ctx.lineTo(10*size,-6*size); ctx.lineTo(10*size,6*size); ctx.closePath(); ctx.fill();
            /* Inner glow */
            ctx.shadowBlur=10*size;
            ctx.fillStyle=projColor+'44'; ctx.beginPath(); ctx.arc(0,0,8*size,0,Math.PI*2); ctx.fill();
            /* Sparkle particles */
            for(let sp=0;sp<3;sp++){
              const spx = -8 + Math.sin(Date.now()/100+sp*2)*10;
              const spy = Math.cos(Date.now()/80+sp*3)*4*size;
              ctx.fillStyle=projColor+'88'; ctx.fillRect(spx-1,spy-1,2,2);
            }
            ctx.shadowBlur=0;
          } else if(isStaffProj){
            /* Staff auto-attack — larger, slower energy orb */
            ctx.shadowColor=projColor+'aa';ctx.shadowBlur=12;
            ctx.fillStyle = projColor+'bb';
            ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = projColor+'44';
            ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
          } else {
            /* Normal bow arrow — element-tinted */
            ctx.fillStyle = '#8B6914'; ctx.fillRect(-8, -1.5, 16, 3);
            ctx.fillStyle = projColor;
            ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(5,-3.5); ctx.lineTo(5,3.5); ctx.closePath(); ctx.fill();
            ctx.fillStyle = projColor+'88'; ctx.fillRect(-8, -2.5, 3, 1.5); ctx.fillRect(-8, 1, 3, 1.5);
          }
          ctx.globalAlpha = 1;
          ctx.restore();
          return true;
        });
      }

      /* ═══ LOCK-ON INDICATOR ═══ */
      if(S.lockedTarget && S.lockedTarget.ref){
        const lt = S.lockedTarget.ref;
        const ltx = (lt.x||lt.renderX||0) - cx;
        const lty = (lt.y||lt.renderY||0) - cy;
        const lockT = Date.now()/500;
        const lockR = 18 + Math.sin(lockT*2)*3;
        ctx.save();
        ctx.strokeStyle = 'rgba(255,60,60,0.8)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4,4]);
        ctx.lineDashOffset = -Date.now()/50;
        ctx.beginPath();
        ctx.arc(ltx, lty, lockR, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
        /* Corner brackets */
        const bsz = 6;
        ctx.strokeStyle = 'rgba(255,60,60,0.9)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ltx-lockR, lty-lockR+bsz); ctx.lineTo(ltx-lockR, lty-lockR); ctx.lineTo(ltx-lockR+bsz, lty-lockR);
        ctx.moveTo(ltx+lockR-bsz, lty-lockR); ctx.lineTo(ltx+lockR, lty-lockR); ctx.lineTo(ltx+lockR, lty-lockR+bsz);
        ctx.moveTo(ltx+lockR, lty+lockR-bsz); ctx.lineTo(ltx+lockR, lty+lockR); ctx.lineTo(ltx+lockR-bsz, lty+lockR);
        ctx.moveTo(ltx-lockR+bsz, lty+lockR); ctx.lineTo(ltx-lockR, lty+lockR); ctx.lineTo(ltx-lockR, lty+lockR-bsz);
        ctx.stroke();
        /* Target name */
        const ltName = lt.name || lt.type || lt.emoji || '?';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,60,60,0.7)';
        ctx.fillText('🎯 '+ltName, ltx, lty-lockR-4);
        ctx.restore();
      }

      /* ═══ ZONE AMBIENT PARTICLES — §2 Immersion Through Accumulation ═══ */
      if(!S._ambientParticles) S._ambientParticles = [];
      /* zoneElem already defined above for tile rendering */
      /* Spawn new ambient particles — higher cap in elemental zones */
      const _apMax = zoneElem ? 50 : 30;
      const _apRate = zoneElem ? 0.25 : 0.15;
      if(S._ambientParticles.length < _apMax && Math.random() < _apRate){
        const apx = cx + Math.random()*W;
        const apy = cy + Math.random()*H;
        const ap = { x:apx, y:apy, life:1 };
        const _r2 = Math.random();
        if(zoneElem === 'flame'){
          if(_r2<0.6){
            /* Floating embers — rising orange sparks */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.3, vy:-0.5-Math.random()*0.8, color:'#ff6030', size:1.5+Math.random(), type:'ember'});
          } else if(_r2<0.85){
            /* Heat shimmer — wide faint distortion */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.1, vy:-0.15, color:'rgba(255,160,60,0.15)', size:4+Math.random()*4, type:'shimmer'});
          } else {
            /* Ash flake — slow drifting gray */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.4, vy:0.1+Math.random()*0.2, color:'#888', size:1+Math.random()*0.5, type:'ash'});
          }
        } else if(zoneElem === 'frost'){
          if(_r2<0.5){
            /* Drifting snowflakes */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.5, vy:0.2+Math.random()*0.3, color:'#cce8ff', size:1+Math.random()*2, type:'snow'});
          } else if(_r2<0.8){
            /* Frost sparkle — brief twinkle */
            Object.assign(ap, {vx:0, vy:0, color:'#fff', size:1+Math.random(), life:0.5, type:'frostspark'});
          } else {
            /* Ice crystal — large slow-falling */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:0.1+Math.random()*0.15, color:'#a0d0f0', size:2+Math.random()*2, type:'icecrystal'});
          }
        } else if(zoneElem === 'venom'){
          if(_r2<0.5){
            /* Floating spores — bobbing green dots */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:-0.1+Math.sin(now/1000+apx)*0.2, color:'#4ade80', size:1+Math.random(), type:'spore'});
          } else if(_r2<0.8){
            /* Fog wisp — large faint green cloud */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.15, vy:-0.05, color:'rgba(60,180,60,0.08)', size:6+Math.random()*6, type:'fogwisp'});
          } else {
            /* Toxic bubble — rising, popping */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.1, vy:-0.3-Math.random()*0.3, color:'#80ff80', size:1.5+Math.random(), life:0.6, type:'bubble'});
          }
        } else if(zoneElem === 'storm'){
          if(_r2<0.5){
            /* Spark flashes — bright quick */
            Object.assign(ap, {vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2, color:'#a78bfa', size:1+Math.random()*1.5, life:0.3, type:'spark'});
          } else if(_r2<0.8){
            /* Rain streaks — fast falling lines */
            Object.assign(ap, {vx:0.3, vy:3+Math.random()*2, color:'rgba(160,170,200,0.2)', size:1, type:'rain'});
          } else {
            /* Lightning flash — instant bright */
            Object.assign(ap, {vx:0, vy:0, color:'#d0c0ff', size:3+Math.random()*3, life:0.15, type:'lightning'});
          }
        } else if(zoneElem === 'stone'){
          if(_r2<0.6){
            /* Dust motes — slow settling */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.15, vy:0.05+Math.random()*0.1, color:'#b8a080', size:0.8+Math.random()*0.8, type:'dust'});
          } else {
            /* Mineral glint — brief sparkle on ground */
            Object.assign(ap, {vx:0, vy:0, color:'#e0c880', size:1+Math.random(), life:0.4, type:'glint'});
          }
        } else if(zoneElem === 'wind'){
          if(_r2<0.4){
            /* Leaves drifting — fast horizontal */
            Object.assign(ap, {vx:0.5+Math.random()*0.8, vy:Math.sin(now/800+apx)*0.3, color:'#7a9a4a', size:2+Math.random(), type:'leaf'});
          } else if(_r2<0.7){
            /* Wind streak — horizontal blur */
            Object.assign(ap, {vx:2+Math.random()*2, vy:(Math.random()-0.5)*0.3, color:'rgba(200,220,240,0.08)', size:1, life:0.4, type:'windstreak'});
          } else {
            /* Feather — slow tumbling */
            Object.assign(ap, {vx:0.3+Math.random()*0.5, vy:0.1+Math.random()*0.2, color:'#e0e8f0', size:1.5+Math.random(), type:'feather'});
          }
        } else if(zoneElem === 'water'){
          if(_r2<0.5){
            /* Mist droplets — rising fog */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:-0.2-Math.random()*0.2, color:'#80c0e0', size:1+Math.random(), type:'mist'});
          } else if(_r2<0.8){
            /* Water spray — brief upward burst */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.5, vy:-0.4-Math.random()*0.3, color:'rgba(100,180,240,0.15)', size:2+Math.random()*2, life:0.5, type:'spray'});
          } else {
            /* Bubble — slow rising */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.1, vy:-0.15-Math.random()*0.1, color:'rgba(140,200,240,0.2)', size:1.5+Math.random(), type:'wbubble'});
          }
        } else if(zoneElem === 'dark'){
          if(_r2<0.5){
            /* Shadow wisps — sinuous dark tendrils */
            Object.assign(ap, {vx:Math.sin(now/600+apx)*0.3, vy:-0.3, color:'#3a2a5a', size:2+Math.random()*2, type:'wisp'});
          } else if(_r2<0.8){
            /* Void spark — purple flash */
            Object.assign(ap, {vx:0, vy:0, color:'#7a30b0', size:2+Math.random()*2, life:0.2, type:'voidspark'});
          } else {
            /* Creeping shadow — ground-level dark blob */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.1, color:'rgba(10,5,30,0.15)', size:5+Math.random()*5, type:'creep'});
          }
        } else if(zoneElem === 'light'){
          if(_r2<0.5){
            /* Golden motes — rising warm sparks */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.3, vy:-0.2-Math.random()*0.3, color:'#fde68a', size:1+Math.random(), type:'mote'});
          } else if(_r2<0.8){
            /* Light beam dust — slow vertical rise */
            Object.assign(ap, {vx:(Math.random()-0.5)*0.05, vy:-0.1, color:'rgba(255,240,180,0.12)', size:2+Math.random()*3, type:'beamdust'});
          } else {
            /* Prismatic sparkle — multicolor brief */
            const _pCols=['#fde68a','#fca5a5','#93c5fd','#86efac'];
            Object.assign(ap, {vx:0, vy:0, color:_pCols[Math.floor(Math.random()*4)], size:1.5+Math.random(), life:0.3, type:'prismatic'});
          }
        } else {
          /* Town/meadow — occasional dandelion puff */
          if(Math.random()<0.3) Object.assign(ap, {vx:0.2+Math.random()*0.3, vy:-0.1+Math.sin(now/2000)*0.1, color:'#fff', size:1, type:'seed'});
          else ap.life = 0; /* skip */
        }
        if(ap.life > 0) S._ambientParticles.push(ap);
      }
      /* Render + tick ambient particles */
      S._ambientParticles = S._ambientParticles.filter(ap => {
        if(isNaN(ap.x)||isNaN(ap.y)) return false;
        ap.x += ap.vx||0; ap.y += ap.vy||0;
        const decayRate = (ap.type==='spark'||ap.type==='lightning'||ap.type==='voidspark'||ap.type==='prismatic'||ap.type==='frostspark') ? 0.03 : 0.004;
        ap.life -= decayRate;
        if(ap.life <= 0) return false;
        const apsx = ap.x-cx, apsy = ap.y-cy;
        if(apsx<-20||apsx>W+20||apsy<-20||apsy>H+20) return false;
        const fastTypes = new Set(['spark','lightning','voidspark','prismatic','frostspark','glint']);
        ctx.globalAlpha = ap.life * (fastTypes.has(ap.type)?0.8:0.5);
        ctx.fillStyle = ap.color;
        if(ap.type==='leaf'||ap.type==='feather'){
          ctx.save(); ctx.translate(apsx,apsy); ctx.rotate(now/500+ap.x);
          ctx.fillRect(-ap.size/2,-1,ap.size,2); ctx.restore();
        } else if(ap.type==='rain'){
          ctx.strokeStyle=ap.color; ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(apsx,apsy); ctx.lineTo(apsx-1,apsy-6); ctx.stroke();
        } else if(ap.type==='windstreak'){
          ctx.strokeStyle=ap.color; ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(apsx,apsy); ctx.lineTo(apsx-8,apsy); ctx.stroke();
        } else if(ap.type==='icecrystal'){
          /* Small diamond shape */
          ctx.beginPath(); ctx.moveTo(apsx,apsy-ap.size); ctx.lineTo(apsx+ap.size*0.6,apsy);
          ctx.lineTo(apsx,apsy+ap.size); ctx.lineTo(apsx-ap.size*0.6,apsy); ctx.closePath(); ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(apsx, apsy, ap.size*ap.life, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        return true;
      });

      /* ═══ RENDER & TICK GATHERING NODES — §18 Life Skills ═══ */
      if(S.gatherNodes){
        S.gatherNodes.forEach(node => {
          /* Respawn check */
          if(!node.alive){
            if(Date.now() > node.respawnAt){
              node.alive = true;
              node.hp = node.maxHp;
            }
            return;
          }
          node._hitThisSwing = false; /* reset per frame */

          const nx = node.x - cx, ny = node.y - cy;
          if(nx < -30 || nx > W+30 || ny < -30 || ny > H+30) return;

          /* Tier determines visual scale — uses _tier data from progression tables */
          const tierLvl = node.gatherLvl || 1;
          const tier = Math.min(10, Math.max(1, Math.ceil(tierLvl / 10))); /* 1-10 visual scale */
          const tierScale = 0.7 + tier * 0.12;
          const tierColor = RESOURCE_TIERS[Math.min(20, node.resTier||1)]?.color || '#8890b8';
          const nodeTier = node._tier || {};

          /* Tier-colored base glow — bigger and brighter at higher tiers */
          const pulse = 0.3 + Math.sin(now/600 + node.x)*0.15;
          ctx.fillStyle = tierColor;
          ctx.globalAlpha = pulse * (0.15 + tier*0.05);
          ctx.beginPath(); ctx.arc(nx, ny, 10 + tier*3, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;

          /* Node body — distinct per type AND tier */
          const nt = node.nodeType || node.resourceType;
          if(nt === 'tree' || nt === 'wood'){
            /* ═══ TREES — size and color from WOODCUTTING_TIERS ═══ */
            const tw2 = nodeTier.trunkW || (3+tier);
            const th2 = nodeTier.trunkH || (6+tier*2);
            const cr = nodeTier.canopyR || (5+tier*3);
            const cc = nodeTier.canopyColor || '#3a8a2a';
            const tc = nodeTier.trunkColor || '#4a3018';
            /* Trunk */
            ctx.fillStyle = tc;
            ctx.fillRect(nx-tw2/2, ny-th2/3, tw2, th2);
            /* Canopy — scales with tier data */
            ctx.fillStyle = cc;
            ctx.beginPath(); ctx.arc(nx, ny-th2/3-cr*0.6, cr, 0, Math.PI*2); ctx.fill();
            /* Highlight canopy */
            ctx.fillStyle = cc.replace(/\d+/g, m => Math.min(255, parseInt(m)+30));
            ctx.beginPath(); ctx.arc(nx-cr*0.2, ny-th2/3-cr*0.7, cr*0.6, 0, Math.PI*2); ctx.fill();
            /* High-tier trees get magical sparkles */
            if(tierLvl >= 31){
              ctx.fillStyle = tierColor;
              ctx.globalAlpha = 0.3+Math.sin(now/300+node.x)*0.2;
              for(let sp=0;sp<Math.min(5,Math.ceil(tier/2));sp++){
                const sa=now/400+sp*2.1;
                ctx.beginPath(); ctx.arc(nx+Math.cos(sa)*cr*0.5, ny-th2/3-cr*0.5+Math.sin(sa)*cr*0.3, 1.5, 0, Math.PI*2); ctx.fill();
              }
              ctx.globalAlpha=1;
            }
            /* Axe mark when damaged */
            if(node.hp < node.maxHp){
              ctx.strokeStyle='#8B6914'; ctx.lineWidth=1;
              ctx.beginPath(); ctx.moveTo(nx-tw2/2-1,ny-2); ctx.lineTo(nx+tw2/2+1,ny+2); ctx.stroke();
            }
          } else if(nt === 'fishSpot' || nt === 'fish'){
            /* ═══ FISH SPOTS — size and color from FISHING_TIERS ═══ */
            const poolR = nodeTier.size || (6+tier*2);
            const wCol = nodeTier.waterColor || 'rgba(52,152,219,.35)';
            /* Pool body */
            ctx.fillStyle = wCol;
            if(poolR <= 12){
              ctx.beginPath(); ctx.arc(nx, ny, poolR, 0, Math.PI*2); ctx.fill();
            } else {
              ctx.beginPath(); ctx.ellipse(nx, ny, poolR*1.2, poolR*0.8, 0, 0, Math.PI*2); ctx.fill();
            }
            /* Ripples — more at higher tiers */
            ctx.strokeStyle = wCol.replace(/[\d.]+\)$/, m => (parseFloat(m)*0.6).toFixed(2)+')');
            ctx.lineWidth = tier>=5?1.5:1;
            const ripple = Math.sin(now/400+node.x)*(1+tier*0.3);
            ctx.beginPath(); ctx.arc(nx, ny, poolR-2+ripple, 0, Math.PI*2); ctx.stroke();
            if(tier >= 3){
              ctx.beginPath(); ctx.arc(nx, ny, poolR+2+ripple*0.5, 0, Math.PI*2); ctx.stroke();
            }
            /* Fish shadow — size scales with tier */
            const fishLen = 3+tier*1.2;
            ctx.fillStyle = `rgba(0,0,0,${0.1+tier*0.02})`;
            ctx.beginPath();
            ctx.ellipse(nx+Math.sin(now/600+node.y)*poolR*0.4, ny+1, fishLen, fishLen*0.35, Math.sin(now/800)*0.3, 0, Math.PI*2);
            ctx.fill();
            /* Second fish at tier 5+ */
            if(tier >= 5){
              ctx.beginPath();
              ctx.ellipse(nx+Math.sin(now/500+node.y+2)*poolR*0.3, ny-2, fishLen*0.7, fishLen*0.25, Math.sin(now/700+1)*0.4, 0, Math.PI*2);
              ctx.fill();
            }
            /* Magical glow for high tiers */
            if(tier >= 7){
              ctx.fillStyle = tierColor;
              ctx.globalAlpha = 0.12+Math.sin(now/250)*0.06;
              ctx.beginPath(); ctx.arc(nx, ny, poolR+3, 0, Math.PI*2); ctx.fill();
              ctx.globalAlpha=1;
            }
            /* Shore stones at tier 3+ */
            if(tier >= 3){
              ctx.fillStyle = 'rgba(120,110,90,.3)';
              const stoneCt = Math.min(6, 2+Math.floor(tier/2));
              for(let st=0;st<stoneCt;st++){
                const sa = st*Math.PI*2/stoneCt + 0.5;
                ctx.beginPath(); ctx.arc(nx+Math.cos(sa)*(poolR+1), ny+Math.sin(sa)*(poolR*0.7+1), 1.5+tier*0.15, 0, Math.PI*2); ctx.fill();
              }
            }
            /* Lily pads at tier 3+ */
            if(tier >= 3 && tier <= 6){
              ctx.fillStyle = 'rgba(40,120,40,.3)';
              ctx.beginPath(); ctx.arc(nx+poolR*0.3, ny-poolR*0.2, 2+tier*0.3, 0, Math.PI*2); ctx.fill();
            }
          } else {
            /* ═══ ORE VEINS — size and color from MINING_TIERS ═══ */
            const rockSz = nodeTier.size || (8+tier*2);
            const rCol = nodeTier.rockColor || '#6a6a7a';
            const sCol = nodeTier.streakColor || '#9a9a9a';
            const rockScale = rockSz / 12;
            /* Base rock shape — gets more complex at higher tiers */
            ctx.fillStyle = rCol;
            if(tier <= 3){
              /* Simple rock mound */
              ctx.beginPath();
              ctx.moveTo(nx-6*rockScale, ny+5*rockScale);
              ctx.lineTo(nx-2*rockScale, ny-6*rockScale);
              ctx.lineTo(nx+3*rockScale, ny-5*rockScale);
              ctx.lineTo(nx+7*rockScale, ny+5*rockScale);
              ctx.closePath(); ctx.fill();
            } else if(tier <= 6){
              /* Multi-rock outcrop */
              ctx.beginPath();
              ctx.moveTo(nx-8*rockScale, ny+6*rockScale);
              ctx.lineTo(nx-5*rockScale, ny-8*rockScale);
              ctx.lineTo(nx+1*rockScale, ny-6*rockScale);
              ctx.lineTo(nx+5*rockScale, ny-9*rockScale);
              ctx.lineTo(nx+9*rockScale, ny+6*rockScale);
              ctx.closePath(); ctx.fill();
              /* Secondary rock */
              ctx.beginPath();
              ctx.moveTo(nx+4*rockScale, ny+5*rockScale);
              ctx.lineTo(nx+7*rockScale, ny-3*rockScale);
              ctx.lineTo(nx+10*rockScale, ny+5*rockScale);
              ctx.closePath(); ctx.fill();
            } else {
              /* Massive crystal-studded boulder */
              ctx.beginPath();
              ctx.moveTo(nx-10*rockScale, ny+7*rockScale);
              ctx.lineTo(nx-7*rockScale, ny-10*rockScale);
              ctx.lineTo(nx, ny-8*rockScale);
              ctx.lineTo(nx+6*rockScale, ny-11*rockScale);
              ctx.lineTo(nx+11*rockScale, ny+7*rockScale);
              ctx.closePath(); ctx.fill();
              /* Crystal protrusions */
              ctx.fillStyle = tierColor;
              ctx.globalAlpha = 0.6;
              ctx.beginPath(); ctx.moveTo(nx-3,ny+2); ctx.lineTo(nx-1,ny-8); ctx.lineTo(nx+1,ny+2); ctx.closePath(); ctx.fill();
              ctx.beginPath(); ctx.moveTo(nx+3,ny+1); ctx.lineTo(nx+5,ny-6); ctx.lineTo(nx+7,ny+1); ctx.closePath(); ctx.fill();
              ctx.globalAlpha=1;
            }
            /* Ore streak in the tier's color */
            ctx.fillStyle = sCol;
            ctx.fillRect(nx-2*rockScale, ny-3*rockScale, 4*rockScale, 2.5*rockScale);
            /* Sparkle at higher tiers */
            if(tier >= 4 && Math.sin(now/300+node.x)>0.5){
              ctx.fillStyle = `rgba(255,255,255,${0.2+tier*0.03})`;
              ctx.beginPath(); ctx.arc(nx+1, ny-3*rockScale, 1.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillRect(nx-2*rockScale, ny-3*rockScale, 4*rockScale, 2*rockScale);
            if(tier >= 3){
              ctx.fillRect(nx+2*rockScale, ny-1*rockScale, 3*rockScale, 2*rockScale);
            }
            /* Sparkle — more frequent at higher tiers */
            if(tier>=2 && Math.sin(now/(400-tier*50)+node.x)>0.5){
              ctx.fillStyle='rgba(255,255,255,.4)';
              ctx.beginPath(); ctx.arc(nx+1*rockScale, ny-2*rockScale, 1+tier*0.3, 0, Math.PI*2); ctx.fill();
            }
            if(tier>=4 && Math.sin(now/200+node.x+2)>0.6){
              ctx.fillStyle=tierColor+'88';
              ctx.beginPath(); ctx.arc(nx-2*rockScale, ny-4*rockScale, 1.5, 0, Math.PI*2); ctx.fill();
            }
          }

          /* Tier badge — small colored pip showing required level */
          ctx.fillStyle = tierColor;
          ctx.globalAlpha = 0.9;
          ctx.beginPath(); ctx.arc(nx+10+tier*2, ny-8, 4, 0, Math.PI*2); ctx.fill();
          ctx.font = 'bold 5px "VT323",monospace';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.fillText(node.gatherLvl, nx+10+tier*2, ny-6.5);
          ctx.globalAlpha = 1;

          /* Emoji label — scaled with tier */
          ctx.font = (8+tier*2)+'px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(node.emoji, nx, ny-(10+tier*3));

          /* HP bar if damaged — wider at higher tiers */
          if(node.hp < node.maxHp){
            const hpPct = node.hp / node.maxHp;
            const barW = 14+tier*4;
            ctx.fillStyle = 'rgba(0,0,0,.5)';
            ctx.fillRect(nx-barW/2, ny+8+tier*2, barW, 3);
            ctx.fillStyle = tierColor;
            ctx.fillRect(nx-barW/2, ny+8+tier*2, barW*hpPct, 3);
          }

          /* Skill level requirement tooltip when nearby */
          const pDist = Math.sqrt((P.x-node.x)**2+(P.y-node.y)**2);
          if(pDist < 50){
            ctx.font = 'bold 7px "VT323", monospace';
            ctx.fillStyle = 'rgba(255,255,255,.7)';
            ctx.fillText(node.spotName || node.name, nx, ny+18+tier*2);
            ctx.fillStyle = 'rgba(255,255,255,.5)';
            ctx.fillText(node.name+' (Lv'+node.gatherLvl+')', nx, ny+26+tier*2);
            const skillLvl = S.rpg?.lifeSkills?.[node.skill]?.level || 1;
            const skillLabel = (node.skill||'mining').charAt(0).toUpperCase()+(node.skill||'mining').slice(1);
            if(skillLvl < node.gatherLvl){
              ctx.fillStyle = '#ff5e6c';
              ctx.fillText('Req: '+skillLabel+' Lv'+node.gatherLvl, nx, ny+34+tier*2);
            } else {
              ctx.fillStyle = '#3dd497';
              const verb = node.skill==='woodcutting'?'Chop':node.skill==='fishing'?'Fish':'Mine';
              ctx.fillText(verb+' ('+skillLabel+' Lv'+skillLvl+')', nx, ny+34+tier*2);
            }
          }
        });
      }

      /* ═══ RENDER MONSTERS — §4 Visual Identity: distinct at a glance ═══ */
      if(S.monsters){
        S.monsters.forEach(m=>{
          if(!m.alive) return;
          const mx = m.x - cx, my = m.y - cy;
          if(mx<-40||mx>W+40||my<-40||my>H+40) return;
          const arch = m.archetype || 'fodder';

          /* ═══ SPAWN POP-IN — scale up from 0 when first visible ═══ */
          if(!m._spawnTs) m._spawnTs = now;
          const spawnAge = (now - m._spawnTs) / 300;
          let spawnScale = 1;
          if(spawnAge < 1){
            /* Elastic ease-out: overshoots slightly then settles */
            spawnScale = 1 - Math.pow(1-spawnAge, 3) * (1 + 2.5*(1-spawnAge));
            spawnScale = Math.max(0, Math.min(1.15, spawnScale));
          }

          const bodySize = ({fodder:8, brute:15, swarm:6, sentinel:12, volatile:9, stalker:10, hexer:10}[arch]||10) * spawnScale;

          /* Ground shadow — oval, darker for bigger monsters */
          ctx.fillStyle = `rgba(0,0,0,${bodySize>10?0.22:0.14})`;
          ctx.beginPath(); ctx.ellipse(mx+2, my+bodySize+3, bodySize*0.9, bodySize*0.25, 0, 0, Math.PI*2); ctx.fill();

          /* Body base color — tinted by zone element for identity */
          const _zElem = ZONES[S.currentZone]?.element;
          const _eCol = _zElem && ELEMENTS[_zElem] ? ELEMENTS[_zElem].color : null;
          let _mBaseColor = m.color;
          /* Blend monster color toward zone element (30% tint) */
          if(_eCol && _zElem){
            const _hex = (h) => { const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return [r,g,b]; };
            try {
              const [mr,mg,mb]=_hex(_mBaseColor); const [er,eg,eb]=_hex(_eCol);
              const mix=0.3;
              const nr=Math.round(mr*(1-mix)+er*mix), ng=Math.round(mg*(1-mix)+eg*mix), nb=Math.round(mb*(1-mix)+eb*mix);
              _mBaseColor='#'+[nr,ng,nb].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
            } catch(e){}
          }
          const darkColor = _mBaseColor + 'cc';
          const lightColor = _mBaseColor;

          if(arch === 'brute'){
            /* Brute: massive rounded square with gradient shading */
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.moveTo(mx-bodySize, my-bodySize*0.8);
            ctx.quadraticCurveTo(mx, my-bodySize*1.1, mx+bodySize, my-bodySize*0.8);
            ctx.lineTo(mx+bodySize*0.9, my+bodySize*0.7);
            ctx.quadraticCurveTo(mx, my+bodySize*0.9, mx-bodySize*0.9, my+bodySize*0.7);
            ctx.closePath(); ctx.fill();
            /* Highlight — upper left */
            ctx.fillStyle = 'rgba(255,255,255,.15)';
            ctx.beginPath();
            ctx.arc(mx-bodySize*0.3, my-bodySize*0.4, bodySize*0.5, 0, Math.PI*2);
            ctx.fill();
            /* Dark underside */
            ctx.fillStyle = 'rgba(0,0,0,.15)';
            ctx.fillRect(mx-bodySize*0.8, my+bodySize*0.3, bodySize*1.6, bodySize*0.4);
          } else if(arch === 'swarm'){
            const flutter = Math.sin(now/60+m.spawnX)*2;
            ctx.fillStyle = lightColor;
            ctx.beginPath(); ctx.ellipse(mx, my+flutter, bodySize, bodySize*0.7, 0, 0, Math.PI*2); ctx.fill();
            /* Translucent wings */
            ctx.fillStyle = 'rgba(255,255,255,.15)';
            ctx.beginPath(); ctx.ellipse(mx-bodySize, my-3+flutter, 5, 2.5, -0.3+Math.sin(now/40)*0.3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(mx+bodySize, my-3+flutter, 5, 2.5, 0.3-Math.sin(now/40)*0.3, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'sentinel'){
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.moveTo(mx, my-bodySize);
            ctx.lineTo(mx+bodySize, my-bodySize*0.3);
            ctx.lineTo(mx+bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx-bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx-bodySize, my-bodySize*0.3);
            ctx.closePath(); ctx.fill();
            /* Shield emboss — lighter top edge */
            ctx.strokeStyle = 'rgba(255,255,255,.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(mx-bodySize, my-bodySize*0.3);
            ctx.lineTo(mx, my-bodySize);
            ctx.lineTo(mx+bodySize, my-bodySize*0.3);
            ctx.stroke();
            /* Dark bottom */
            ctx.strokeStyle = 'rgba(0,0,0,.2)';
            ctx.beginPath();
            ctx.moveTo(mx-bodySize*0.8, my+bodySize*0.7);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx+bodySize*0.8, my+bodySize*0.7);
            ctx.stroke();
          } else if(arch === 'volatile'){
            /* Spiky star with pulsing danger glow */
            const vPulse = 1+Math.sin(now/150)*0.2;
            /* Outer glow */
            ctx.fillStyle = m.color+'22';
            ctx.beginPath(); ctx.arc(mx, my, bodySize*1.5*vPulse, 0, Math.PI*2); ctx.fill();
            /* Spiky body */
            ctx.fillStyle = lightColor;
            ctx.beginPath();
            for(let sp=0;sp<8;sp++){
              const spA = (sp/8)*Math.PI*2 + now/800;
              const spR = sp%2===0 ? bodySize*1.2 : bodySize*0.5;
              const spx = mx+Math.cos(spA)*spR, spy = my+Math.sin(spA)*spR;
              sp===0 ? ctx.moveTo(spx,spy) : ctx.lineTo(spx,spy);
            }
            ctx.closePath(); ctx.fill();
            /* Inner bright core */
            ctx.fillStyle = 'rgba(255,200,100,.4)';
            ctx.beginPath(); ctx.arc(mx, my, bodySize*0.4, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'stalker'){
            /* Diamond with gradient — sleek predator look */
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.moveTo(mx, my-bodySize*1.2);
            ctx.lineTo(mx+bodySize*0.6, my);
            ctx.lineTo(mx, my+bodySize);
            ctx.lineTo(mx-bodySize*0.6, my);
            ctx.closePath(); ctx.fill();
            /* Eye slit */
            ctx.fillStyle = '#fff';
            ctx.fillRect(mx-bodySize*0.3, my-2, bodySize*0.6, 2);
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.arc(mx, my-1, 1.5, 0, Math.PI*2); ctx.fill();
          } else if(arch === 'hexer'){
            ctx.fillStyle = darkColor;
            ctx.beginPath(); ctx.arc(mx, my, bodySize, 0, Math.PI*2); ctx.fill();
            /* Rune orbit */
            ctx.strokeStyle = m.color+'99';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(mx, my, bodySize+5, now/300, now/300+Math.PI*1.5); ctx.stroke();
            /* Inner arcane glow */
            ctx.fillStyle = m.color+'33';
            ctx.beginPath(); ctx.arc(mx, my, bodySize*0.6, 0, Math.PI*2); ctx.fill();
            /* Rune dots */
            for(let rd=0;rd<3;rd++){
              const rda = now/300 + rd*Math.PI*2/3;
              ctx.fillStyle = m.color;
              ctx.beginPath(); ctx.arc(mx+Math.cos(rda)*(bodySize+5), my+Math.sin(rda)*(bodySize+5), 2, 0, Math.PI*2); ctx.fill();
            }
          } else {
            /* Fodder: simple circle with highlight */
            ctx.fillStyle = darkColor;
            ctx.beginPath(); ctx.arc(mx, my, bodySize, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,.12)';
            ctx.beginPath(); ctx.arc(mx-bodySize*0.25, my-bodySize*0.25, bodySize*0.5, 0, Math.PI*2); ctx.fill();
          }
