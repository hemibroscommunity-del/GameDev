            name: S.myName, color: S.myColor, avatar: S.myAvatar,
            bt: S.bodyTorso || '#2563eb', bl: S.bodyLegs || '#1e3a5f',
            bs: S.bodySize || 'slim',
            rpgLv: S.rpg?.level || 1, rpgHp: S.rpg?.hp || 50, rpgMaxHp: S.rpg?.maxHp || 50,
          }
        }));
        const welcomeMsg = {id:'sys-'+Date.now(), name:'', text: S.myName+' joined Bro Town!', color:'', ts:Date.now(), system:true};
        S.chatLog = [...S.chatLog.slice(-50), welcomeMsg];
        setChatLog([...S.chatLog]);
      };

      ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }

        switch(msg.type) {
          case 'tick': {
            const players = msg.players;
            for(const [pid, data] of Object.entries(players)) {
              if(pid === S.myId) continue;
              if(S.others[pid]) {
                S.others[pid].x = data.x;
                S.others[pid].y = data.y;
                S.others[pid].dir = data.d;
                S.others[pid].zone = data.z;
                S.others[pid]._vx = (data.vx || 0) / 100;
                S.others[pid]._vy = (data.vy || 0) / 100;
                S.others[pid]._lastUpdate = Date.now();
              }
            }
            break;
          }
          case 'state_sync': {
            const others = {};
            for(const [pid, data] of Object.entries(msg.players)) {
              if(pid === S.myId) continue;
              others[pid] = {
                x: data.x||0, y: data.y||0,
                renderX: data.x||0, renderY: data.y||0,
                name: data.name||'Anon', color: data.color||'#888',
                avatar: data.avatar||null, dir: data.d||'down',
                bt: data.bt||'#2563eb', bl: data.bl||'#1e3a5f',
                rpgLv: data.rpgLv||1, rpgHp: data.rpgHp||50, rpgMaxHp: data.rpgMaxHp||50,
                bodySize: data.bs||'slim', zone: data.z||'town',
              };
            }
            S.others = others;
            setPlayerCount(msg.playerCount || Object.keys(others).length + 1);
            break;
          }
          case 'player_join': {
            S.others[msg.id] = {
              x: msg.data?.x||0, y: msg.data?.y||0,
              renderX: msg.data?.x||0, renderY: msg.data?.y||0,
              name: msg.name||'Anon', color: msg.data?.color||'#888',
              avatar: msg.data?.avatar||null, dir: msg.data?.d||'down',
              bt: msg.data?.bt||'#2563eb', bl: msg.data?.bl||'#1e3a5f',
              rpgLv: msg.data?.rpgLv||1, rpgHp: msg.data?.rpgHp||50, rpgMaxHp: msg.data?.rpgMaxHp||50,
              bodySize: msg.data?.bs||'slim', zone: msg.data?.z||'town',
            };
            setPlayerCount(prev => { setJoinFlash(true); setTimeout(()=>setJoinFlash(false),1500); return prev+1; });
            break;
          }
          case 'player_leave': {
            delete S.others[msg.id];
            setPlayerCount(prev => Math.max(1, prev-1));
            break;
          }
          case 'player_count': {
            setPlayerCount(msg.count);
            break;
          }
          case 'player_update': {
            if(S.others[msg.id]) Object.assign(S.others[msg.id], msg.data);
            break;
          }
          default: {
            /* All game events: chat, pvp, trade, emote, duel, etc. */
            const payload = msg.payload || msg;
            payload.id = payload.id || msg.from;

            switch(msg.type) {
              case 'chat': {
                if(!payload || payload.id === S.myId) break;
                try{ const bl=JSON.parse(localStorage.getItem('bt_blocked')||'[]'); if(bl.includes(payload.id)) break; }catch(e){}
                let isMuted = false;
                try{ const ml=JSON.parse(localStorage.getItem('bt_muted')||'[]'); isMuted=ml.includes(payload.id); }catch(e){}
                if(!isMuted && payload.id) S.chatBubbles[payload.id] = {text:payload.text, ts:Date.now()};
                BT_AUDIO.chatReceive();
                S.chatLog = [...S.chatLog.slice(-40), {id:payload.id, name:payload.name, text:isMuted?'[muted]':payload.text, color:payload.color, ts:Date.now(), muted:isMuted}];
                setChatLog([...S.chatLog]);
                if(!isMuted) setUnreadChats(prev => prev + 1);
                break;
              }
              case 'emote': {
                if(payload.id && S.others[payload.id]) S.others[payload.id].emote = {emoji:payload.emoji, ts:Date.now()};
                BT_AUDIO.beep(800,0.06,0.06,'sine');
                setTimeout(()=>BT_AUDIO.beep(1000,0.04,0.06,'sine'),60);
                break;
              }
              case 'stunned': { if(payload.target===S.myId) S._stunEnd=Date.now()+(payload.duration||2000); break; }
              case 'trade_offer': { if(payload.target===S.myId) setIncomingTrade({from:payload.from,fromName:payload.fromName,offer:payload.offer,ts:Date.now()}); break; }
              case 'trade_accept': {
                if(payload.target===S.myId){ const R=S.rpg; if(!R) break; const offer=payload.offer;
                  if(offer.coins) R.coins=(R.coins||0)+offer.coins;
                  if(offer.items&&R.inventory) Object.entries(offer.items).forEach(([k,v])=>{R.inventory[k]=(R.inventory[k]||0)+v;});
                  S.dmgNumbers.push({x:S.player.x,y:S.player.y-40,text:'Trade complete!',color:'#3dd497',ts:Date.now()});
                  BT_AUDIO.collect(); setRpgState({...R});
                } break;
              }
              case 'trade_reject': { if(payload.target===S.myId){ S.dmgNumbers.push({x:S.player.x,y:S.player.y-30,text:'Trade declined',color:'#ff5e6c',ts:Date.now()}); BT_AUDIO.beep(200,0.05,0.08,'square'); } break; }
              case 'player_attack': {
                if(payload.target!==S.myId) break;
                const R=S.rpg; if(!R) break;
                const isInDuel=S._activeDuel?.partnerId===payload.id;
                const isLawless=ZONES[S.currentZone]?.lawless;
                if(!isInDuel&&!isLawless&&ZONES[S.currentZone]?.safe){ S.dmgNumbers.push({x:S.player.x,y:S.player.y-30,text:'Safe zone!',color:'#3dd497',ts:Date.now()}); break; }
                const pDef=R.endurance*0.5+(R.armor?.tierMult||1)*3+(R._shieldBonus?.blockFlat||0);
                const rawDmg=payload.dmg||10; let dmgTaken=Math.max(1,rawDmg-pDef*0.3);
                const isCrit=payload.isCrit; if(isCrit) dmgTaken=Math.ceil(dmgTaken*1.5);
                R.hp=Math.max(0,R.hp-Math.ceil(dmgTaken));
                S.dmgNumbers.push({x:S.player.x,y:S.player.y-20,text:'-'+Math.ceil(dmgTaken),color:'#ff5e6c',ts:Date.now()});
                for(let hp2=0;hp2<6;hp2++) S.hitParticles.push({x:S.player.x,y:S.player.y,vx:(Math.random()-.5)*4,vy:-1-Math.random()*2,life:0.8,color:'#ff5e6c',size:2});
                S.screenShake=4; BT_AUDIO.playerHurt();
                if(S.channel) S.channel.send({type:'broadcast',event:'stunned',payload:{target:payload.id,duration:2000}});
                if(R.hp<=0){ S.dmgNumbers.push({x:S.player.x,y:S.player.y-45,text:'Killed by '+payload.name,color:'#ff5e6c',ts:Date.now()}); BT_AUDIO.deathBoom(); }
                if(S.channel) S.channel.send({type:'broadcast',event:'pvp_confirmed',payload:{target:payload.id,from:S.myId,dmg:dmgTaken,isCrit,died:R.hp<=0}});
                setRpgState({...R}); break;
              }
              case 'pvp_confirmed': {
                if(payload.target!==S.myId) break;
                S.dmgNumbers.push({x:S.player.x+20,y:S.player.y-20,text:'Hit! -'+Math.ceil(payload.dmg),color:'#fbbf24',ts:Date.now()});
                if(payload.died){ S.dmgNumbers.push({x:S.player.x,y:S.player.y-50,text:'KILL!',color:'#3dd497',ts:Date.now()}); BT_AUDIO.collect();
                  if(!S.rpg._compStats) S.rpg._compStats=createDefaultCompStats(); S.rpg._compStats.pvpKills++; }
                break;
              }
              case 'duel_request': { if(payload.target===S.myId) setDuelRequest({fromId:payload.from,fromName:payload.fromName,ts:Date.now()}); break; }
              case 'duel_accept': { if(payload.target===S.myId){ S._activeDuel={partnerId:payload.from,startTs:Date.now()}; S.dmgNumbers.push({x:S.player.x,y:S.player.y-40,text:'DUEL STARTED!',color:'#fbbf24',ts:Date.now()}); } break; }
              case 'duel_decline': { if(payload.target===S.myId) S.dmgNumbers.push({x:S.player.x,y:S.player.y-30,text:'Duel declined',color:'#888',ts:Date.now()}); break; }
              case 'pvp_threat': { if(payload.target===S.myId){ setThreatIncoming({fromId:payload.from,fromName:payload.fromName,fromLevel:payload.fromLevel,ts:Date.now(),countdown:payload.countdown||120,responded:false}); BT_AUDIO.beep(300,0.1,0.15,'square'); setTimeout(()=>BT_AUDIO.beep(200,0.08,0.12,'square'),150); } break; }
              case 'threat_response': { if(payload.target===S.myId){ if(payload.accepted) S.dmgNumbers.push({x:S.player.x,y:S.player.y-40,text:'Threat accepted!',color:'#fbbf24',ts:Date.now()}); else S.dmgNumbers.push({x:S.player.x,y:S.player.y-40,text:'They fled!',color:'#888',ts:Date.now()}); } break; }
              case 'duel_wager_request': { if(payload.target===S.myId){ setDuelRequest({fromId:payload.from,fromName:payload.fromName,ts:Date.now(),wager:payload.wager}); BT_AUDIO.beep(600,0.06,0.08,'sine'); setTimeout(()=>BT_AUDIO.beep(800,0.04,0.06,'sine'),80); } break; }
            }
          }
        }
      };

      ws.onclose = () => { S._realtimeStatus = 'disconnected'; scheduleReconnect(); };
      ws.onerror = () => { S._realtimeStatus = 'disconnected'; };
    }

    function scheduleReconnect() {
      if(reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 1.5, 10000); connect(); }, reconnectDelay);
    }

    /* Channel shim — wraps WebSocket with same .send() and .track() interface */
    const channelShim = {
      send(msg) {
        if(!ws || ws.readyState !== WebSocket.OPEN) return;
        if(msg.type === 'broadcast' && msg.event) {
          if(msg.event === 'move') {
            const p = msg.payload;
            ws.send(JSON.stringify({type:'move', x:p.x, y:p.y, d:p.d||p.dir, z:p.z||p.zone, vx:p.vx||0, vy:p.vy||0}));
          } else {
            ws.send(JSON.stringify({type:msg.event, payload:msg.payload}));
          }
        }
      },
      track(data) {
        if(!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({type:'track', data}));
      },
    };

    S.channel = channelShim;
    connect();

    return () => {
      if(reconnectTimer) clearTimeout(reconnectTimer);
      if(ws) { try { ws.close(); } catch(e) {} }
      S.channel = null;
      S._realtimeStatus = 'disconnected';
    };
  },[showNameModal,showLogin]);

  /* Canvas rendering + game loop */
  useEffect(()=>{
    if(showNameModal||showLogin) return;
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    /* Polyfill roundRect for game canvas */
    ctx.roundRect = function(x,y,w,h,r){
      const radii = typeof r === 'number' ? [r,r,r,r] : Array.isArray(r) ? r.concat([0,0,0,0]).slice(0,4) : [0,0,0,0];
      this.moveTo(x+radii[0],y);
      this.lineTo(x+w-radii[1],y); this.quadraticCurveTo(x+w,y,x+w,y+radii[1]);
      this.lineTo(x+w,y+h-radii[2]); this.quadraticCurveTo(x+w,y+h,x+w-radii[2],y+h);
      this.lineTo(x+radii[3],y+h); this.quadraticCurveTo(x,y+h,x,y+h-radii[3]);
      this.lineTo(x,y+radii[0]); this.quadraticCurveTo(x,y,x+radii[0],y);
      this.closePath();
    };
    const S = stateRef.current;
    if(!S.map){
      updateZoneDimensions(S.currentZone);
      S.map = generateZoneMap(S.currentZone);
      /* §11 Start zone ambient sound */
      BT_AUDIO.startZoneAmbient(S.currentZone);
      /* Spawn monsters for current zone */
      const zone = ZONES[S.currentZone];
      S.monsters = spawnMonstersForZone(zone);
      /* Spawn gathering nodes */
      S.gatherNodes = spawnGatherNodes(S.currentZone, 'shallow');
      /* Initialize life skills if missing */
      if(S.rpg && !S.rpg.lifeSkills) S.rpg.lifeSkills = createDefaultLifeSkills();
      if(S.rpg && !S.rpg.dungeonClears) S.rpg.dungeonClears = {};
      if(S.rpg && !S.rpg.inventory) S.rpg.inventory = {};
    }

    /* Collectibles removed */
    S.collectibles = [];

    /* Initialize RPG stats — use localStorage as cache, server overwrites async */
    if(!S.rpg){
      /* Use localStorage cache immediately so game loop can start */
      const savedRpg = (() => { try{ return JSON.parse(localStorage.getItem('bt_rpg')); }catch{ return null; } })();

      /* Detect if saved data uses old system (has 'str') or new (has 'power') */
      if (savedRpg && savedRpg.power !== undefined) {
        /* New stat system — load directly */
        S.rpg = savedRpg;
        recalcDerived(S.rpg);
      } else {
        /* Either no save or old system — create fresh with new system */
        S.rpg = createDefaultRpg();
        recalcDerived(S.rpg);
        /* Migrate coins/level from old save if present */
        if (savedRpg) {
          S.rpg.level = savedRpg.level || 1;
          S.rpg.xp = savedRpg.xp || 0;
          S.rpg.coins = savedRpg.coins || 50;
          /* Give them points to allocate based on their old level */
          const earnedPts = (S.rpg.level - 1) * STAT_POINTS_PER_LEVEL;
          S.rpg.unspentT1 = 5 + Math.floor(earnedPts / 2);
          S.rpg.unspentT2 = 5 + Math.floor(earnedPts / 2);
          recalcDerived(S.rpg);
        }
      }
      if (!S.rpg.inventory) S.rpg.inventory = {};
      if (!S.rpg.lifeSkills) S.rpg.lifeSkills = createDefaultLifeSkills();
      /* Migrate old saves — adds new skills, converts gathering → mining */
      S.rpg.lifeSkills = migrateLifeSkills(S.rpg.lifeSkills);
      if (!S.rpg._quests) S.rpg._quests = {};
      if (!S.rpg._questFlags) S.rpg._questFlags = {};
      if (!S.rpg._questKills) S.rpg._questKills = {};
      if (S.rpg.influence === undefined) S.rpg.influence = 0;
      if (S.rpg.power === undefined) S.rpg.power = 0;
      if (!S.rpg.weapon) S.rpg.weapon = { type:'greatsword', tier:'fusion', tierMult:2.25, element1:'flame', element2:'frost', name:'Emberice Greatsword', isVolatile:true };
      if (!S.rpg.rangedWeapon) S.rpg.rangedWeapon = { type:'bow', tier:'elemental', tierMult:1.5, element1:'venom', element2:null, name:'Venom Bow', isVolatile:false };
      if (!S.rpg.staffWeapon) S.rpg.staffWeapon = { type:'staff', tier:'elemental', tierMult:1.5, element1:'storm', element2:null, name:'Storm Staff', isVolatile:false };
      if (!S.rpg.activeSlot) S.rpg.activeSlot = 'melee';
      if (!S.rpg.armor) S.rpg.armor = { tier:'common', tierMult:1.0, attunement:null, name:'Leather Armor' };
      if (S.rpg.shield === undefined) S.rpg.shield = null;
      if (!S.rpg.amulet) S.rpg.amulet = null; /* {tier, gem, name} */
      if (!S.rpg.shield) S.rpg.shield = null; /* {gearBase, gem, name, reforgeBonus, hardenBonus} */
      if (S.rpg.goldNuggets === undefined) S.rpg.goldNuggets = 0;
      if (S.rpg.goldBars === undefined) S.rpg.goldBars = 0;
      if (S.rpg.achievementPoints === undefined) S.rpg.achievementPoints = 0;
      if (!S.rpg._threatState) S.rpg._threatState = null; /* {target, ts, type:'red'|'white', expires} */
      if (!S.rpg._threatCooldownUntil) S.rpg._threatCooldownUntil = 0;
      if (!S.rpg._guardConfiscateUntil) S.rpg._guardConfiscateUntil = 0;
      if (!S.rpg.weaponStash) S.rpg.weaponStash = [];
      if (!S.rpg._deathTimestamps) S.rpg._deathTimestamps = [];
      if (!S.rpg._compStats) S.rpg._compStats = createDefaultCompStats();
      if (S.rpg.achievementPoints === undefined) S.rpg.achievementPoints = 0;
      S.rpg.hp = Math.min(S.rpg.hp || S.rpg.maxHp, S.rpg.maxHp);
      S.rpg.stamina = S.rpg.stamina || S.rpg.maxStamina;
      S.rpg.mana = S.rpg.mana || S.rpg.maxMana;
      S.respawnTimer = Date.now();

      /* Legacy compat properties — some UI/render code still reads these */
      S.rpg.str = S.rpg.power; S.rpg.def = S.rpg.fortification;
      S.rpg.vit = S.rpg.vitality; S.rpg.spd = S.rpg.agility;
      S.rpg.lck = S.rpg.ferocity;
      S.rpg.maxHp = S.rpg.maxHp; S.rpg.unspentPts = S.rpg.unspentT1 + S.rpg.unspentT2;

      setRpgState({...S.rpg});
      try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}

      /* Then fetch from server and overwrite (async, non-blocking) */
      if(!S._serverLoadStarted && getBtPlayerId()){
        S._serverLoadStarted = true;
        (async()=>{
          const pid = getBtPlayerId();
          const sd = await btRpc('bt_load_player',{p_id:pid});
          if(sd&&sd.rpg){
            const sr=sd.rpg;
            /* Server may still have old format — handle both */
            if (sr.power !== undefined) {
              Object.assign(S.rpg, sr);
            } else {
              S.rpg.level = sr.level||1; S.rpg.xp = sr.xp||0; S.rpg.coins = sr.coins||0;
            }
            recalcDerived(S.rpg);
            /* Update legacy compat */
            S.rpg.str = S.rpg.power; S.rpg.def = S.rpg.fortification;
            S.rpg.vit = S.rpg.vitality; S.rpg.spd = S.rpg.agility;
            S.rpg.lck = S.rpg.ferocity; S.rpg.unspentPts = S.rpg.unspentT1 + S.rpg.unspentT2;
            setRpgState({...S.rpg});
            try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
            console.log('[Game] Server sync: Lv'+S.rpg.level+' '+S.rpg.coins+'G');
          } else if(pid) {
            await btRpc('bt_register_player',{p_id:pid,p_name:S.myName||'Anon'});
          }
        })();
      }
    }

    /* Monsters spawned with zone map — see S.map init above */
    /* Initialize NPCs — only in town */
    if(!S.npcs && S.currentZone === 'town'){
      S.npcs = NPC_DATA.map((npc,i) => ({
        ...npc, id:'npc-'+i,
        hp: 30, maxHp: 30, alive: true, respawnAt: 0,
        x: npc.spawnX, y: npc.spawnY,
        targetX: npc.spawnX, targetY: npc.spawnY,
        moveTimer: Math.random()*3000,
        chatTimer: 5000 + Math.random()*10000,
        chatBubble: null, /* {text, ts} */
        dir: 'down', _facing: 'down',
        renderX: npc.spawnX, renderY: npc.spawnY,
      }));
    }

    /* Loaded avatar images cache */
    const avatarImgs = {};
    const processedAvatars = {}; /* url -> processed canvas with transparent bg */

    const loadAvatarImg = (url) => {
      /* Return processed version if available */
      if(processedAvatars[url]) return processedAvatars[url];
      /* Return raw image (triggers load) */
      if(!avatarImgs[url]){
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          /* Process: remove background color by sampling corner pixels */
          try{
            const size = 64;
            const offCanvas = document.createElement('canvas');
            offCanvas.width = size; offCanvas.height = size;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(img, 0, 0, size, size);
            const imgData = offCtx.getImageData(0, 0, size, size);
            const d = imgData.data;
            /* Sample background color from top-left corner (0,0) */
            const bgR = d[0], bgG = d[1], bgB = d[2];
            /* Remove pixels similar to background color */
            const tolerance = 40;
            for(let i=0; i<d.length; i+=4){
              const dr = Math.abs(d[i]-bgR);
              const dg = Math.abs(d[i+1]-bgG);
              const db = Math.abs(d[i+2]-bgB);
              if(dr < tolerance && dg < tolerance && db < tolerance){
                d[i+3] = 0; /* set alpha to 0 */
              }
            }
            offCtx.putImageData(imgData, 0, 0);
            processedAvatars[url] = offCanvas;
          }catch(e){
            /* CORS or other error — use raw image */
            processedAvatars[url] = img;
          }
        };
        img.src = url;
        avatarImgs[url] = img;
      }
      return avatarImgs[url];
    };
    /* Preload own avatar */
    if(S.myAvatar) loadAvatarImg(S.myAvatar);

    /* ═══ NFT 360° DIRECTIONAL SPRITE SYSTEM — V2 ═══ */
    /* "Volumetric sprite" technique: contrast-based face masking, hue-shift depth, ghost parallax */
    const _nftDirCache = {};
    function getNftDirectional(processedImg, url) {
      if(_nftDirCache[url]) return _nftDirCache[url];
      const sz = 28;
      /* FRONT — full processed NFT */
      const fC = document.createElement('canvas');
      fC.width = sz; fC.height = sz;
      const fX = fC.getContext('2d');
      fX.imageSmoothingEnabled = false;
      fX.drawImage(processedImg, 0, 0, sz, sz);
      const sd = fX.getImageData(0, 0, sz, sz).data;

      /* ── Adaptive Head Bounds Detection ── */
      const centerX = Math.floor(sz / 2);
      let headTop = sz, headBot = 0;
      for(let y = 0; y < sz; y++){
        const i = (y * sz + centerX) * 4;
        if(sd[i+3] > 80){ headTop = Math.min(headTop, y); headBot = Math.max(headBot, y); }
      }
      const headH = headBot - headTop;
      /* Face zone: middle portion of detected head (where eyes/mouth/glasses live) */
      const faceTop = headTop + Math.round(headH * 0.25);
      const faceBot = headTop + Math.round(headH * 0.75);

      /* Find left/right head bounds per row */
      const rowBounds = [];
      for(let y = 0; y < sz; y++){
        let left = sz, right = 0;
        for(let x = 0; x < sz; x++){
          if(sd[(y*sz+x)*4+3] > 80){ left = Math.min(left, x); right = Math.max(right, x); }
        }
        rowBounds.push({left, right});
      }

      /* ── BACK — Contrast-Based Feature Removal ──
         Instead of painting over a fixed rectangle, detect actual facial features
         (eyes, glasses, mouth) by their high contrast/saturation vs surrounding skin.
         Only those pixels get replaced with sampled skin color. */
      const bC = document.createElement('canvas');
      bC.width = sz; bC.height = sz;
      const bX = bC.getContext('2d');
      bX.imageSmoothingEnabled = false;
      bX.drawImage(fC, 0, 0);

      const imgData = bX.getImageData(0, 0, sz, sz);
      const d = imgData.data;

      /* Sample skin color from left & right edges of the face zone rows */
      let sr=0, sg=0, sb=0, sn=0;
      for(let y = faceTop; y < faceBot; y++){
        const rb = rowBounds[y];
        if(rb.left >= rb.right) continue;
        /* Left 2 columns */
        for(let x = rb.left; x < Math.min(rb.left+3, rb.right); x++){
          const i = (y*sz+x)*4;
          if(d[i+3] > 80){ sr+=d[i]; sg+=d[i+1]; sb+=d[i+2]; sn++; }
        }
        /* Right 2 columns */
        for(let x = Math.max(rb.right-2, rb.left); x <= rb.right; x++){
          const i = (y*sz+x)*4;
          if(d[i+3] > 80){ sr+=d[i]; sg+=d[i+1]; sb+=d[i+2]; sn++; }
        }
      }
      /* Fallback: sample from upper head if edges were empty */
      if(sn < 6){
        for(let y = headTop; y < faceTop; y++){
          for(let x = Math.round(sz*0.3); x < Math.round(sz*0.7); x++){
            const i = (y*sz+x)*4;
            if(sd[i+3] > 80){ sr+=sd[i]; sg+=sd[i+1]; sb+=sd[i+2]; sn++; }
          }
        }
      }
      const skinR = sn>0 ? Math.round(sr/sn) : 128;
      const skinG = sn>0 ? Math.round(sg/sn) : 128;
      const skinB = sn>0 ? Math.round(sb/sn) : 128;
      const skinBri = (skinR + skinG + skinB) / 3;

      /* Per-pixel contrast check in face zone:
         High saturation or outlier brightness = facial feature → replace with skin.
         Low saturation + similar brightness to skin = actual skin/hat → keep. */
      for(let y = faceTop; y < faceBot; y++){
        const rb = rowBounds[y];
        if(rb.left >= rb.right) continue;
        /* Only check inner 70% of head width (skip edges which are outline/hat) */
        const span = rb.right - rb.left;
        const innerL = rb.left + Math.round(span * 0.15);
        const innerR = rb.right - Math.round(span * 0.15);
        for(let x = innerL; x <= innerR; x++){
          const i = (y*sz+x)*4;
          if(d[i+3] < 40) continue;
          const r = d[i], g = d[i+1], b = d[i+2];
          const brightness = (r + g + b) / 3;
          const saturation = Math.max(r,g,b) - Math.min(r,g,b);
          const briDiff = Math.abs(brightness - skinBri);

          /* Feature detection: high saturation (colored glasses, red eyes, etc.)
             OR brightness very different from skin (white of eyes, dark pupils, bright teeth) */
          const isFeature = saturation > 35 || briDiff > 45;

          if(isFeature){
            /* Replace with skin, slight 5% darken for back-of-head shading */
            d[i]   = Math.round(skinR * 0.95);
            d[i+1] = Math.round(skinG * 0.95);
            d[i+2] = Math.round(skinB * 0.95);
          }
        }
      }

      /* Hue-shift depth: shift all visible pixels toward cool blue/purple.
         Shadows in pixel art are cool-toned, not flat black. */
      for(let i = 0; i < d.length; i += 4){
        if(d[i+3] < 40) continue;
        d[i]   = Math.round(d[i]   * 0.90);
        d[i+1] = Math.round(d[i+1] * 0.93);
        d[i+2] = Math.min(255, Math.round(d[i+2] * 1.04 + 4));
      }

      bX.putImageData(imgData, 0, 0);

      /* Sample region colors for reference */
      function regionCol(y1, y2) {
        let r=0,g=0,b=0,n=0;
        for(let y=y1;y<y2;y++) for(let x=Math.round(sz*0.15);x<Math.round(sz*0.85);x++){
          const i=(y*sz+x)*4;
          if(sd[i+3]>80){r+=sd[i];g+=sd[i+1];b+=sd[i+2];n++;}
        }
        return n>0?`rgb(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)})`:'#555';
      }
      const topCol = regionCol(0, Math.round(sz*0.3));
      const midCol = regionCol(Math.round(sz*0.3), Math.round(sz*0.6));
      const botCol = regionCol(Math.round(sz*0.6), sz);

      _nftDirCache[url] = { front:fC, back:bC, size:sz, topCol, midCol, botCol };
      return _nftDirCache[url];
    }

    /* ── V2 Render: Single-matrix transform with cross-fade and ghost depth ── */
    function drawNft360(ctx, nftDir, cx, cy, facingAngle, nftSize) {
      /* turnFromCam: 0=facing camera, π=facing away */
      const rawTurn = facingAngle - Math.PI/2;
      const turnFromCam = Math.abs(((rawTurn % (Math.PI*2)) + Math.PI*3) % (Math.PI*2) - Math.PI);
      const isFacingRight = Math.cos(facingAngle) > 0;
      const sinTurn = Math.sin(turnFromCam);
      const halfSz = nftSize / 2;

      /* sx: Width compression — 0.5 at pure side, 1.0 at front/back */
      const sx = 0.5 + 0.5 * Math.abs(Math.cos(turnFromCam));

      /* kx: Shear factor — peaks at 90°, gives the "3D lean" */
      const kx = sinTurn * 0.25 * (isFacingRight ? -1 : 1);

      /* Cross-fade: blend front↔back between 70°–110° (1.22–1.92 rad) */
      const fadeStart = 1.22, fadeEnd = 1.92;
      let frontAlpha, backAlpha;
      if(turnFromCam < fadeStart){ frontAlpha = 1; backAlpha = 0; }
      else if(turnFromCam > fadeEnd){ frontAlpha = 0; backAlpha = 1; }
      else {
        const t = (turnFromCam - fadeStart) / (fadeEnd - fadeStart);
        frontAlpha = 1 - t;
        backAlpha = t;
      }

      ctx.save();
      ctx.translate(cx, cy + nftSize); /* pivot at feet (bottom-center) */

      /* Single matrix: scale (with mirror baked in), shear, no separate calls */
      ctx.transform(
        isFacingRight ? -sx : sx,  /* a: horizontal scale + mirror */
        0,                          /* b: no vertical skew */
        kx,                         /* c: the "3D lean" shear */
        1,                          /* d: keep height constant */
        0, 0
      );

      /* Ghost depth — 1px parallax shadow at high side amounts */
      if(sinTurn > 0.7){
        ctx.globalAlpha = 0.4;
        const ghostTex = frontAlpha > backAlpha ? nftDir.front : nftDir.back;
        ctx.drawImage(ghostTex, -halfSz + 1, -nftSize, nftSize, nftSize);
        ctx.globalAlpha = 1;
      }

      /* Draw front layer */
      if(frontAlpha > 0.01){
        ctx.globalAlpha = frontAlpha;
        ctx.drawImage(nftDir.front, -halfSz, -nftSize, nftSize, nftSize);
      }
      /* Draw back layer */
      if(backAlpha > 0.01){
        ctx.globalAlpha = backAlpha;
        ctx.drawImage(nftDir.back, -halfSz, -nftSize, nftSize, nftSize);
      }

      /* Cool-toned depth overlay */
      const depthAmt = sinTurn * 0.07 + (backAlpha > 0 ? 0.03 : 0);
      if(depthAmt > 0.01){
        ctx.globalAlpha = depthAmt;
        ctx.fillStyle = 'rgba(20,15,50,1)';
        ctx.fillRect(-halfSz, -nftSize, nftSize, nftSize);
      }

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    const resize = () => {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement?.getBoundingClientRect() || {width:0,height:0};
      /* Fallback to window dimensions if parent has no size yet */
      const w = rect.width || window.innerWidth || 800;
      const h = rect.height || window.innerHeight || 600;
      if(w < 10 || h < 10) return;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr*0.8, 0, 0, dpr*0.8, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);
    /* Also resize when flex container changes (keyboard open/close) */
    let resizeObs;
    if(window.ResizeObserver && canvas.parentElement) {
      resizeObs = new ResizeObserver(resize);
      resizeObs.observe(canvas.parentElement);
    }
    const vv = window.visualViewport;
    if(vv) { vv.addEventListener('resize', resize); }

    const isSolid = (px,py) => {
      const zone = ZONES[S.currentZone];
      const tx = Math.floor(px/TILE), ty = Math.floor(py/TILE);
      if(tx<0||tx>=zone.w||ty<0||ty>=zone.h) return true;
      const tile = S.map?.[ty]?.[tx];
      if(tile===8||tile===9||tile===10||tile===12||tile===14||tile===15) return false; /* exit/dungeon/gate/plot/bed walkable */
      return TILE_SOLID.has(tile);
    };

    const gameLoop = () => {
      frameRef.current = requestAnimationFrame(gameLoop);

      try {

      /* Ensure canvas has dimensions */
      if(canvas.width === 0 || canvas.height === 0) { resize(); return; }

      /* §6 Candy Crush Principle — Hit Stop: freeze simulation for N ms on big hits */
      if(S._hitStop && Date.now() < S._hitStop){
        /* During hit stop, render the frozen frame with impact flash — no simulation */
        const hitAge = 1 - (S._hitStop - Date.now()) / (S._hitStopDuration || 60);
        /* White flash overlay — bright at start, fades during freeze */
        if(hitAge < 0.5){
          ctx.fillStyle = `rgba(255,255,255,${(0.5-hitAge)*0.25})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        /* Chromatic aberration-style color split on the frozen frame */
        if(hitAge < 0.3 && S._hitStopDuration > 60){
          ctx.globalAlpha = 0.08;
          ctx.fillStyle = '#ff0000';
          ctx.fillRect(2, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#0000ff';
          ctx.fillRect(-2, 0, canvas.width, canvas.height);
          ctx.globalAlpha = 1;
        }
        return;
      }

      const W = canvas.width / (window.devicePixelRatio||1) * 1.25;
      const H = canvas.height / (window.devicePixelRatio||1) * 1.25;
      const P = S.player;
      const K = S.keys;

      /* Re-initialize NPCs when entering town (they get nulled on zone transitions) */
      if(!S.npcs && S.currentZone === 'town'){
        S.npcs = NPC_DATA.map((npc,i) => ({
          ...npc, id:'npc-'+i,
          hp: 30, maxHp: 30, alive: true, respawnAt: 0,
          x: npc.spawnX, y: npc.spawnY,
          targetX: npc.spawnX, targetY: npc.spawnY,
          moveTimer: Math.random()*3000,
          chatTimer: 5000 + Math.random()*10000,
          chatBubble: null,
          dir: 'down', _facing: 'down',
          renderX: npc.spawnX, renderY: npc.spawnY,
        }));
      }
      /* Active weapon — available to all render/combat sections */
      const activeWpn = S.rpg ? getActiveWeapon(S.rpg) : {type:'greatsword',tier:'common',tierMult:1,element1:null,element2:null,isVolatile:false,name:'Fists'};
      /* Live map reference — re-read each frame so zone transitions work */
      const map = S.map;

      /* Check if player is stunned */
      const playerStunned = S._playerStunUntil && Date.now() < S._playerStunUntil;

      /* Movement — analog joystick + keyboard fallback */
      /* Dodge roll */
      if(S._dodgeRoll){
        const rollAge = Date.now() - S._dodgeRoll.startTime;
        if(rollAge < 200){ S.player.x += Math.cos(S._dodgeRoll.angle)*6; S.player.y += Math.sin(S._dodgeRoll.angle)*6; }
        else S._dodgeRoll = null;
      }
      let dx = playerStunned ? 0 : S.stickX, dy = playerStunned ? 0 : S.stickY;
      /* Keyboard overrides if no stick input */
      if(dx===0 && dy===0) {
        if(K['ArrowUp']||K['w']||K['W']) dy=-1;
        if(K['ArrowDown']||K['s']||K['S']) dy=1;
        if(K['ArrowLeft']||K['a']||K['A']) dx=-1;
        if(K['ArrowRight']||K['d']||K['D']) dx=1;
        /* Normalize diagonal keyboard input */
        if(dx&&dy){ const len=Math.sqrt(dx*dx+dy*dy); dx/=len; dy/=len; }
      }
      /* Direction for name tag / facing */
      if(Math.abs(dx)>0.1||Math.abs(dy)>0.1){
        if(Math.abs(dx)>Math.abs(dy)) P.dir=dx>0?'right':'left';
        else P.dir=dy>0?'down':'up';
      }

      /* §14 Terrain feel — tile under player affects movement */
      const footTile = S.map?.[Math.floor(P.y/TILE)]?.[Math.floor(P.x/TILE)] ?? 0;
      let terrainMult = 1.0;
      let terrainSlide = 0;
      if(footTile === 6) terrainMult = 0.7; /* sand: slightly slows */
      if(footTile === 1) terrainMult = 1.1; /* path: feels crisp, slight boost */
      if(footTile === 7) terrainMult = 0.85; /* stone: heavy */
      /* Zone-specific terrain effects */
      const curZone = ZONES[S.currentZone];
      if(curZone?.element === 'frost') terrainSlide = 0.92; /* ice: adds momentum/slide */
      if(curZone?.element === 'venom' && footTile === 0) terrainMult *= 0.85; /* swamp: heavy on grass */

      /* Frost zone: walking on sand (snow drifts) collects snow */
      if(curZone?.element === 'frost' && footTile === 6 && S.rpg){
        if(!S._lastSnowCollect || Date.now()-S._lastSnowCollect > 2000){
          S._lastSnowCollect = Date.now();
          if(!S.rpg.inventory) S.rpg.inventory = {};
          S.rpg.inventory.snow = (S.rpg.inventory.snow||0) + 1;
          S.dmgNumbers.push({x:P.x,y:P.y-20,text:'❄️+1 snow',color:'#a0d8f0',ts:Date.now()});
        }
      }

      /* Agility-based movement speed */
      const baseSpd = S.rpg ? calcMoveSpeed(S.rpg.agility||0) / 5.0 * SPEED : SPEED;
      /* Food buff speed bonus */
      const spdBuff = (S._spdBuff && Date.now() < S._spdBuff) ? 1.15 : 1.0;
      /* Amulet move speed bonus */
      const amuletSpdMult = S.rpg?._amuletBonus?.stat === 'moveSpd' ? (1 + S.rpg._amuletBonus.value / 100) : 1.0;
      const swimMult = S._swimming ? SWIM_SPEED_MULT : 1.0;
      const finalSpd = S._sled ? 0 : baseSpd * terrainMult * spdBuff * amuletSpdMult * swimMult; /* sled overrides movement */

      const nx = P.x + dx*finalSpd;
      const ny = P.y + dy*finalSpd;

      /* Ice slide momentum */
      if(terrainSlide > 0 && (Math.abs(dx)>0.01 || Math.abs(dy)>0.01)){
        if(!S._slideVx) S._slideVx = 0;
        if(!S._slideVy) S._slideVy = 0;
        S._slideVx = S._slideVx * terrainSlide + dx * finalSpd * (1-terrainSlide);
        S._slideVy = S._slideVy * terrainSlide + dy * finalSpd * (1-terrainSlide);
      } else if(terrainSlide > 0){
        S._slideVx = (S._slideVx||0) * terrainSlide;
        S._slideVy = (S._slideVy||0) * terrainSlide;
        if(Math.abs(S._slideVx) < 0.01) S._slideVx = 0;
        if(Math.abs(S._slideVy) < 0.01) S._slideVy = 0;
      } else {
        S._slideVx = 0; S._slideVy = 0;
      }

      /* ═══ PERSONAL FARM — Bed sleep mechanic ═══ */
      if(S.currentZone === 'farm_home' && footTile === FARM_BED_TILE && S.rpg){
        if(!S._sleeping){
          S._sleeping = { started: Date.now() };
          S.dmgNumbers.push({x:P.x,y:P.y-30,text:'💤 Resting... (3s)',color:'#a0a0ff',ts:Date.now()});
          BT_AUDIO.beep(300,0.04,0.06,'sine');
        } else {
          const sleepElapsed = Date.now() - S._sleeping.started;
          if(sleepElapsed >= HOUSE_SLEEP_MS){
            /* Full recharge + Well Rested buff */
            const R2 = S.rpg;
            R2.hp = R2.maxHp; R2.stamina = R2.maxStamina; R2.mana = R2.maxMana;
            R2._wellRestedUntil = Date.now() + WELL_RESTED_DURATION;
            S.dmgNumbers.push({x:P.x,y:P.y-40,text:'✨ Fully Rested!',color:'#3dd497',ts:Date.now()});
            S.dmgNumbers.push({x:P.x,y:P.y-25,text:'🌟 +10% XP for 30 min',color:'#f5c542',ts:Date.now()});
            BT_AUDIO.collect();
            setTimeout(()=>BT_AUDIO.beep(600,0.08,0.1,'sine'),100);
            setTimeout(()=>BT_AUDIO.beep(800,0.06,0.08,'sine'),200);
            S._sleeping = null;
            setRpgState({...R2}); try{localStorage.setItem('bt_rpg',JSON.stringify(R2));}catch(e){}
          }
        }
      } else {
        S._sleeping = null;
      }

      /* Collision check — check corners of a 20x20 hitbox */
      const hs = 10;
      if(!isSolid(nx-hs,P.y-hs)&&!isSolid(nx+hs,P.y-hs)&&!isSolid(nx-hs,P.y+hs)&&!isSolid(nx+hs,P.y+hs)) P.x=nx;
      if(!isSolid(P.x-hs,ny-hs)&&!isSolid(P.x+hs,ny-hs)&&!isSolid(P.x-hs,ny+hs)&&!isSolid(P.x+hs,ny+hs)) P.y=ny;
      /* Apply ice slide */
      if(S._slideVx || S._slideVy){
        const sx = P.x + (S._slideVx||0), sy = P.y + (S._slideVy||0);
        if(!isSolid(sx-hs,P.y-hs)&&!isSolid(sx+hs,P.y+hs)) P.x=sx;
        if(!isSolid(P.x-hs,sy-hs)&&!isSolid(P.x+hs,sy+hs)) P.y=sy;
      }
      const zone = ZONES[S.currentZone];
      const ZONE_W = zone.w * TILE, ZONE_H = zone.h * TILE;
      P.x = Math.max(hs, Math.min(ZONE_W-hs, P.x));
      P.y = Math.max(hs, Math.min(ZONE_H-hs, P.y));

      /* ═══ ZONE TRANSITION — edge-based detection ═══ */
      const ptx = Math.floor(P.x / TILE), pty = Math.floor(P.y / TILE);

      /* In town: reaching any edge finds the nearest exit and transitions */
      if(S.currentZone === 'town' && (pty <= 0 || pty >= zone.h-1 || ptx <= 0 || ptx >= zone.w-1)){
        /* Find closest town exit to player position */
        let bestExit = null, bestDist = Infinity;
        TOWN_EXITS.forEach(ex => {
          let edgeMatch = false;
          if(ex.dir==='north' && pty <= 0) edgeMatch = true;
          if(ex.dir==='south' && pty >= zone.h-1) edgeMatch = true;
          if(ex.dir==='east' && ptx >= zone.w-1) edgeMatch = true;
          if(ex.dir==='west' && ptx <= 0) edgeMatch = true;
          if(!edgeMatch) return;
          const d = (ex.dir==='north'||ex.dir==='south') ? Math.abs(ptx-ex.tx) : Math.abs(pty-ex.ty);
          if(d < bestDist){ bestDist = d; bestExit = ex; }
        });
        if(bestExit){
          /* Zone exits — open to all players (quest gate removed) */
          {
          S.currentZone = bestExit.zoneId;
          updateZoneDimensions(bestExit.zoneId);
          BT_AUDIO.startZoneAmbient(bestExit.zoneId);
          if(S.rpg){
            if(!S.rpg._questFlags) S.rpg._questFlags = {};
            if(!S.rpg._questFlags.zonesVisited || typeof S.rpg._questFlags.zonesVisited !== 'object') S.rpg._questFlags.zonesVisited = {};
            /* Fix broken Set from old save data */
            if(S.rpg._questFlags.zonesVisited instanceof Set) {
              const old = S.rpg._questFlags.zonesVisited;
              S.rpg._questFlags.zonesVisited = {};
              old.forEach(v => S.rpg._questFlags.zonesVisited[v] = true);
            }
            if(typeof S.rpg._questFlags.zonesVisited.add === 'function') S.rpg._questFlags.zonesVisited = {}; /* nuclear fallback */
            S.rpg._questFlags.zonesVisited[bestExit.zoneId] = true;
          }
          /* ═══ ZONE ENTRY — always start at shallow depth ═══ */
          /* Players always enter the first zone layer. Dungeons warp to deeper depths. */
          /* This preserves the sense of progression — you walk through the shallow zone */
          /* to reach the dungeon entrance, which then takes you to your deepest unlocked depth. */
          const entryDepth = 'shallow';
          S._currentDepth = entryDepth;
          S.map = generateZoneMap(bestExit.zoneId);
          const newZone = ZONES[bestExit.zoneId];
          /* Monsters + nodes at shallow depth */
          const depthCfg = DEPTH_CONFIG[entryDepth];
          S.monsters = spawnMonstersForZone(newZone, depthCfg?.levelMod||0);
          S.gatherNodes = spawnGatherNodes(bestExit.zoneId, entryDepth);
          const nW = newZone.w*TILE, nH = newZone.h*TILE;
          /* Always enter from the south (single entrance) */
          P.x = Math.floor(newZone.w/2)*TILE; P.y = nH - TILE*3;
          S.dmgNumbers.push({x:P.x,y:P.y-40,text:newZone.name,color:newZone.element?ELEMENTS[newZone.element].color:'#fff',ts:Date.now()});
          S.npcs = null;
          S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
          /* §5.5 Restore death-scattered items if returning to death zone */
          if(S._deathDrops){
            const zoneDrops = S._deathDrops.filter(d => d.zone === bestExit.zoneId && Date.now() < d.expiry);
            zoneDrops.forEach(dd => {
              S.groundLoot.push({
                x:dd.x, y:dd.y, ts:Date.now(),
                isDeathDrop:true, deathItems:dd.items,
                coins:0, xp:0,
                expiry:dd.expiry
              });
            });
            /* Remove expired drops */
            S._deathDrops = S._deathDrops.filter(d => Date.now() < d.expiry && d.zone !== bestExit.zoneId);
          }
          S._zoneWipe = Date.now(); /* trigger transition wipe */
          S._ambientParticles = []; /* clear old zone particles */
          } /* end zone transition */
        }
      } else if(S.currentZone !== 'town' && !S._inDungeon){
        /* In combat zones: only south entrance returns to town */
        const czZone = ZONES[S.currentZone];
        const czPtx = Math.floor(P.x / TILE), czPty = Math.floor(P.y / TILE);
        const czMX = Math.floor(czZone.w/2);
        /* Check if player is at the south edge near the entrance gap */
        if(czPty >= czZone.h-1 && Math.abs(czPtx - czMX) <= 2){
          S.currentZone = 'town';
          updateZoneDimensions('town');
          BT_AUDIO.startZoneAmbient('town');
          S.map = generateZoneMap('town');
          S.monsters = spawnMonstersForZone(ZONES.town);
          P.x = 20*TILE; P.y = 20*TILE;
          S.dmgNumbers.push({x:P.x,y:P.y-40,text:'Town',color:'#5b52ff',ts:Date.now()});
          S.npcs = null;
          S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
          S._zoneWipe = Date.now();
          S._ambientParticles = [];
        }
      }

      /* Dungeon entrance — tile 10 */
      if(S.map && ptx>=0 && pty>=0 && pty<zone.h && ptx<zone.w){
        const tile = S.map[pty]?.[ptx];
        if(tile === 10 && S.currentZone !== 'town' && !S._inDungeon){
          /* §14.1 Dungeon entrance — find deepest accessible depth */
          const currentDepth = S._currentDepth || 'shallow';
          const depthOrder = ['shallow','mid','deep','abyss','core'];
          const currentIdx = depthOrder.indexOf(currentDepth);
          const clearKey = S.currentZone+'_'+currentDepth;
          const isCleared = S.rpg?.lifeSkills?.dungeonClears?.[clearKey];

          if(currentIdx >= depthOrder.length-1 && isCleared){
            /* Core is cleared — zone fully done */
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:'Zone fully cleared!',color:'#3dd497',ts:Date.now()});
          } else if(isCleared){
            /* Current depth already cleared — warp to next depth zone (skip dungeon) */
            const nextDepth = depthOrder[currentIdx+1];
            S._currentDepth = nextDepth;
            const dc = DEPTH_CONFIG[nextDepth];
            const zn = ZONES[S.currentZone];
            S.map = generateZoneMap(S.currentZone);
            S.monsters = spawnMonstersForZone(zn, dc?.levelMod||0);
            S.gatherNodes = spawnGatherNodes(S.currentZone, nextDepth);
            P.x = (zn.w/2)*TILE; P.y = (zn.h-3)*TILE;
            S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
            S._ambientParticles = [];
            S._zoneWipe = Date.now();
            const lvlRange = dc.lvlRange || [1,10];
            S.dmgNumbers.push({x:P.x,y:P.y-40,text:zn.name+' — '+nextDepth.toUpperCase(),color:ELEMENTS[zn.element]?.color||'#fff',ts:Date.now()});
            S.dmgNumbers.push({x:P.x,y:P.y-25,text:'Lv '+lvlRange[0]+'-'+lvlRange[1],color:'rgba(255,255,255,.5)',ts:Date.now()});
            BT_AUDIO.beep(500,0.08,0.1,'sine');
          } else {
            /* Current depth NOT cleared — enter dungeon fight! */
            const nextDepthMap = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'};
            const nextDepth = nextDepthMap[currentDepth];
            /* Enter dungeon! */
            S._inDungeon = true;
            S._dungeonZone = S.currentZone;
            S._dungeonDepth = currentDepth;
            S._dungeonWave = 0;
            S._dungeonMaxWaves = 3 + DEPTH_CONFIG[nextDepth].depthIdx;
            S._dungeonBossSpawned = false;
            S._dungeonComplete = false;
            S._preDungeonPos = {x:P.x, y:P.y};

            /* Generate small dungeon arena */
            const dW = 25, dH = 20;
            S._preDungeonMap = S.map;
            S._preDungeonMonsters = S.monsters;
            S._preDungeonNodes = S.gatherNodes;
            const dMap = Array.from({length:dH}, ()=> Array(dW).fill(0));
            /* Walls around edge */
            for(let x=0;x<dW;x++){ dMap[0][x]=7; dMap[dH-1][x]=7; }
            for(let y=0;y<dH;y++){ dMap[y][0]=7; dMap[y][dW-1]=7; }
            /* Path cross */
            const dMX=Math.floor(dW/2), dMY=Math.floor(dH/2);
            for(let x=1;x<dW-1;x++) dMap[dMY][x]=1;
            for(let y=1;y<dH-1;y++) dMap[y][dMX]=1;

            S.map = dMap;
            /* Add exit tile at bottom of dungeon (tile 9 = return) */
            dMap[dH-1][dMX] = 9; dMap[dH-1][dMX+1] = 9;
            TOWN_W = dW*TILE; TOWN_H = dH*TILE; COLS = dW; ROWS = dH;
            S.monsters = [];
            S.gatherNodes = [];
            S.groundLoot = [];
            S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
            P.x = dMX*TILE; P.y = (dH-3)*TILE;

            /* Spawn first wave */
            const zone = ZONES[S.currentZone];
            const dc = DEPTH_CONFIG[nextDepth];
            const waveLvl = zone.level[0] + dc.levelMod;
            const waveArchs = ['fodder','swarm','brute','sentinel','volatile','hexer','stalker'];
            for(let wi=0;wi<4+S._dungeonWave;wi++){
              const arch = waveArchs[Math.floor(Math.random()*waveArchs.length)];
              const mx = (3+Math.random()*(dW-6))*TILE;
              const my = (2+Math.random()*(dH/2-2))*TILE;
              const m = createMonster('dw-0-'+wi, arch, waveLvl+Math.floor(Math.random()*5), mx, my, zone.element);
              m.curHp = m.hp; m.type = arch;
              S.monsters.push(m);
            }

            S.dmgNumbers.push({x:P.x,y:P.y-40,text:'⚔️ DUNGEON: Wave 1/'+S._dungeonMaxWaves,color:'#ff5e6c',ts:Date.now()});
            BT_AUDIO.beep(200,0.15,0.2,'sawtooth');
            setTimeout(()=>BT_AUDIO.beep(150,0.2,0.25,'sawtooth'),100);
          }
        }
      }

      /* ═══ DUNGEON EXIT — tile 9 in dungeon returns to zone ═══ */
      if(S._inDungeon && S.map && ptx>=0 && pty>=0){
        const dTile = S.map[pty]?.[ptx];
        if(dTile === 9){
          /* Exit dungeon — return to combat zone at current depth */
          S._inDungeon = false;
          S._dungeonComplete = false;
          const zn = ZONES[S._dungeonZone || S.currentZone];
          const depth = S._currentDepth || 'shallow';
          S.map = generateZoneMap(S.currentZone);
          const dc = DEPTH_CONFIG[depth];
          TOWN_W = zn.w*TILE; TOWN_H = zn.h*TILE; COLS = zn.w; ROWS = zn.h;
          S.monsters = spawnMonstersForZone(zn, dc?.levelMod||0);
          S.gatherNodes = spawnGatherNodes(S.currentZone, depth);
          S.groundLoot = []; S.hitParticles = []; S.deathExplosions = []; S.arrows = [];
          S._ambientParticles = [];
          /* Spawn near dungeon entrance (north end of zone) */
          P.x = Math.floor(zn.w/2)*TILE; P.y = TILE*5;
          S._zoneWipe = Date.now();
          S.dmgNumbers.push({x:P.x,y:P.y-30,text:'Exited dungeon',color:'#3dd497',ts:Date.now()});
          BT_AUDIO.beep(500,0.05,0.06,'sine');
        }
      }

      /* ═══ WASTELAND — gate tile (12) fence climbing ═══ */
      if(S.map && S.currentZone === 'wasteland' && ptx>=0 && pty>=0 && pty<zone.h && ptx<zone.w){
        const gateTile = S.map[pty]?.[ptx];
        if(gateTile === 12){
          /* Player is on a gate tile — start climbing if not already */
          if(!S._fenceClimb){
            const safePad = ZONES.wasteland._safePad;
            /* Determine direction: if player is inside safe pad, climbing OUT. Otherwise climbing IN. */
            const inSafe = safePad && P.x >= safePad.x && P.x <= safePad.x+safePad.w && P.y >= safePad.y-TILE && P.y <= safePad.y+safePad.h;
            S._fenceClimb = { started: Date.now(), duration: 2000, direction: inSafe ? 'out' : 'in' };
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:'🧗 Climbing fence... (2s)',color:'#f5c542',ts:Date.now()});
            BT_AUDIO.beep(300,0.06,0.08,'triangle');
          }
        } else {
          /* Not on gate tile — cancel climb */
          if(S._fenceClimb){
            S._fenceClimb = null;
          }
        }
      } else if(S._fenceClimb && S.currentZone !== 'wasteland'){
        S._fenceClimb = null;
      }

      /* Fence climb progress — complete after 2 seconds */
      if(S._fenceClimb){
        const elapsed = Date.now() - S._fenceClimb.started;
        if(elapsed >= S._fenceClimb.duration){
          /* Climb complete! */
          if(S._fenceClimb.direction === 'out'){
            /* Climbing OUT of safe zone — now in lawless area */
            const gateY = ZONES.wasteland._gateY;
            P.y = gateY - TILE; /* place just north of fence */
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:'☠️ LAWLESS ZONE — All items at risk!',color:'#ff5e6c',ts:Date.now()});
            S.screenShake = 4;
            BT_AUDIO.beep(80,0.2,0.25,'sawtooth');
          } else {
            /* Climbing IN to safe zone — safe now */
            const safePad = ZONES.wasteland._safePad;
            P.y = safePad.y + TILE; /* place inside safe pad */
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:'🏠 Safe zone! Walk south to return to town.',color:'#3dd497',ts:Date.now()});
            BT_AUDIO.beep(500,0.08,0.1,'sine');
          }
          S._fenceClimb = null;
        }
        /* Cancel climb if player takes damage */
        if(S._fenceClimb && S.lastDamageTaken > S._fenceClimb.started){
          S.dmgNumbers.push({x:P.x,y:P.y-30,text:'Climb interrupted!',color:'#ff5e6c',ts:Date.now()});
          S._fenceClimb = null;
        }
      }

      /* ═══ ZONE-SPECIFIC MECHANICS ═══ */
      const zoneElem2 = ZONES[S.currentZone]?.element;

      /* ── FROZEN SHORE: Snowball projectiles ── */
      if(S._snowballs && S._snowballs.length > 0){
        S._snowballs = S._snowballs.filter(sb => {
          sb.x += sb.vx; sb.y += sb.vy;
          const age = Date.now() - sb.ts;
          if(age > 2000) return false; /* despawn after 2s */
          /* Hit detection against monsters */
          if(S.monsters){
            for(const m of S.monsters){
              if(!m.alive) continue;
              const d = Math.sqrt((sb.x-m.x)**2+(sb.y-m.y)**2);
              if(d < 20){
                if(m._invulnerable){ S.dmgNumbers.push({x:m.x,y:m.y-20,text:'IMMUNE',color:'#888',ts:Date.now()}); return false; }
                const dmg = SNOWBALL_DMG_BASE + (R?.power||0)*0.3;
                m.curHp -= dmg;
                m._stunUntil = Date.now() + SNOWBALL_STUN_MS;
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'❄️'+Math.round(dmg),color:'#a0d8f0',ts:Date.now()});
                S.hitParticles.push({x:sb.x,y:sb.y,vx:0,vy:-2,life:0.5,color:'#fff',size:3});
                for(let sp=0;sp<6;sp++) S.hitParticles.push({x:sb.x,y:sb.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:0.4,color:'#cce8ff',size:1.5});
                BT_AUDIO.beep(800,0.04,0.06,'sine');
                return false;
              }
            }
          }
          return true;
        });
      }

      /* ── FROZEN SHORE: Snowman decoy — draws aggro ── */
      if(S._snowmen && S._snowmen.length > 0){
        S._snowmen = S._snowmen.filter(sm => {
          if(Date.now() - sm.ts > SNOWMAN_DURATION) return false;
          if(sm.hp <= 0){
            S.dmgNumbers.push({x:sm.x,y:sm.y-20,text:'⛄ Melted!',color:'#a0d8f0',ts:Date.now()});
            for(let sp=0;sp<10;sp++) S.hitParticles.push({x:sm.x,y:sm.y,vx:(Math.random()-.5)*4,vy:-1-Math.random()*3,life:0.6,color:'#fff',size:2});
            return false;
          }
          /* Snowman draws aggro — monsters within radius target it instead of player */
          if(S.monsters){
            S.monsters.forEach(m=>{
              if(!m.alive) return;
              const d = Math.sqrt((sm.x-m.x)**2+(sm.y-m.y)**2);
              if(d < SNOWMAN_AGGRO_RADIUS && d < Math.sqrt((P.x-m.x)**2+(P.y-m.y)**2)){
                /* Monster targets snowman instead */
                const dx=sm.x-m.x, dy=sm.y-m.y, dist=Math.sqrt(dx*dx+dy*dy)||1;
                m.x += dx/dist*m.spd*0.5;
                m.y += dy/dist*m.spd*0.5;
                if(d < 18){ sm.hp -= m.dmg*0.5; m._atkCd = Date.now(); }
              }
            });
          }
          return true;
        });
      }

      /* ── FROZEN SHORE: Sled ride — fast movement in direction ── */
      if(S._sled && S.currentZone === 'frost'){
        const sledElapsed = Date.now() - S._sled.started;
        if(sledElapsed < SLED_DURATION){
          P.x += Math.cos(S._sled.angle) * S._sled.speed;
          P.y += Math.sin(S._sled.angle) * S._sled.speed;
          /* Sled hits monsters for damage */
          if(S.monsters){
            S.monsters.forEach(m=>{
              if(!m.alive) return;
              const d = Math.sqrt((P.x-m.x)**2+(P.y-m.y)**2);
              if(d < 25 && !m._sledHit){
                m._sledHit = true;
                const sledDmg = Math.ceil(20 + (R?.power||0)*0.5);
                m.curHp -= sledDmg;
                S.dmgNumbers.push({x:m.x,y:m.y-20,text:'🛷'+sledDmg,color:'#60a5fa',ts:Date.now()});
                S.screenShake = 3;
                BT_AUDIO.beep(300,0.08,0.1,'triangle');
              }
            });
          }
          /* Trail particles */
          S.hitParticles.push({x:P.x-Math.cos(S._sled.angle)*10,y:P.y-Math.sin(S._sled.angle)*10,
            vx:(Math.random()-.5)*2,vy:-1,life:0.3,color:'#cce8ff',size:2});
        } else {
          S._sled = null;
          S.dmgNumbers.push({x:P.x,y:P.y-30,text:'🛷 Sled stopped',color:'#a0d8f0',ts:Date.now()});
          /* Clear sled hit flags */
          if(S.monsters) S.monsters.forEach(m=>{ m._sledHit = false; });
        }
      }

      /* ── TIDAL CAVES: Tide level oscillation ── */
      if(S.currentZone === 'tidal'){
        const tidePhase = (Date.now() % TIDE_CYCLE_MS) / TIDE_CYCLE_MS; /* 0-1 */
        S._tideLevel = Math.sin(tidePhase * Math.PI * 2) * 0.5 + 0.5; /* 0=low, 1=high */
        /* At high tide, water tiles expand — check if player is in water */
        const onWater = S.map && S.map[pty]?.[ptx] === 2;
        if(onWater && !S._raft){
          /* Swimming — slow movement */
          S._swimming = true;
        } else {
          S._swimming = false;
        }
      } else {
        S._tideLevel = 0;
        S._swimming = false;
      }

      /* ── DEEP HOLLOWS: Torch timer ── */
      if(S._torch && Date.now() - S._torch.started > TORCH_DURATION){
        S._torch = null;
        S.dmgNumbers.push({x:P.x,y:P.y-30,text:'🔥 Torch burned out!',color:'#ea580c',ts:Date.now()});
        BT_AUDIO.beep(200,0.08,0.1,'triangle');
      }

      /* ── DEEP HOLLOWS: Echo mechanic — combat noise increases aggro range ── */
      if(S.currentZone === 'hollows' && S.autoAttack){
        S._echoActive = true; /* flag checked in monster aggro */
      } else {
        S._echoActive = false;
      }

      /* §14.1 Dungeon wave progression */
      if(S._inDungeon && !S._dungeonComplete){
        const allDead = S.monsters.every(m => !m.alive);
        if(allDead && S.monsters.length > 0){
          S._dungeonWave++;
          if(S._dungeonWave >= S._dungeonMaxWaves && !S._dungeonBossSpawned){
            /* Spawn boss wave! */
            S._dungeonBossSpawned = true;
            const zone = ZONES[S._dungeonZone];
            const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[S._dungeonDepth];
            const dc = DEPTH_CONFIG[nextDepth];
            const bossLvl = zone.level[0] + dc.levelMod + 10;
            const dW = S.map[0].length, dH = S.map.length;
            /* Boss = massive enemy with pattern-based attacks */
            const boss = createMonster('boss-0', 'brute', bossLvl, Math.floor(dW/2)*TILE, Math.floor(dH/3)*TILE, zone.element);
            boss.hp *= 8; boss.maxHp = boss.hp; boss.curHp = boss.hp;
            boss.dmg = Math.ceil(boss.dmg * 2);
            boss.emoji = '🐉'; boss.color = '#ff5e6c';
            boss._isBoss = true;
            boss._bossSize = 2.5; /* render 2.5x larger */
            /* Boss is INVULNERABLE except during attack recovery windows */
            boss._invulnerable = true;
            boss._attackPhase = 'idle'; /* idle → telegraph → attack → recovery(vulnerable) → idle */
            boss._phaseTimer = Date.now() + 2000; /* first attack after 2s */
            boss._attackPattern = 0; /* cycles through patterns */
            /* Boss abilities scale with depth */
            const depthIdx = dc.depthIdx || 0;
            boss._bossAbilities = ['slam','charge'];
            if(depthIdx >= 1) boss._bossAbilities.push('summon');
            if(depthIdx >= 2) boss._bossAbilities.push('sweep');
            if(depthIdx >= 3) boss._bossAbilities.push('enrage');
            boss._nextAbility = Date.now() + 3000;
            boss._abilityInterval = Math.max(3000, 6000 - depthIdx * 800);
            S.monsters = [boss];
            S.dmgNumbers.push({x:P.x,y:P.y-50,text:'🐉 BOSS FIGHT!',color:'#ff5e6c',ts:Date.now()});
            S.dmgNumbers.push({x:P.x,y:P.y-35,text:'Dodge attacks to expose weakness!',color:'#fbbf24',ts:Date.now()});
            BT_AUDIO.beep(100,0.25,0.3,'sawtooth');
            setTimeout(()=>BT_AUDIO.beep(80,0.3,0.35,'sawtooth'),150);
            S.screenShake = 8;
          } else if(S._dungeonBossSpawned){
            /* Boss killed — dungeon complete! */
            S._dungeonComplete = true;
            const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[S._dungeonDepth];
            const clearKey = S._dungeonZone + '_' + S._dungeonDepth;
            if(!S.rpg.lifeSkills.dungeonClears) S.rpg.lifeSkills.dungeonClears = {};
            S.rpg.lifeSkills.dungeonClears[clearKey] = true;
            /* Bonus rewards */
            const bonusGold = 100 * (DEPTH_CONFIG[nextDepth]?.depthIdx||1);
            const bonusXp = 200 * (DEPTH_CONFIG[nextDepth]?.depthIdx||1);
            S.rpg.coins += bonusGold;
            S.rpg.xp += bonusXp;
            S.dmgNumbers.push({x:P.x,y:P.y-60,text:'🏆 DUNGEON CLEARED!',color:'#f5c542',ts:Date.now()});
            S.dmgNumbers.push({x:P.x,y:P.y-45,text:'+'+bonusGold+'G +'+bonusXp+'XP',color:'#f5c542',ts:Date.now()});
            S.dmgNumbers.push({x:P.x,y:P.y-30,text:nextDepth.toUpperCase()+' depth unlocked!',color:'#a855f7',ts:Date.now()});
            /* ═══ SHADOW/RADIANT CONVERGENCE — clearing core unlocks endgame zones ═══ */
            if(nextDepth === 'core' || S._dungeonDepth === 'core'){
              S.dmgNumbers.push({x:P.x,y:P.y-15,text:'✦ Shadow & Radiant zones revealed!',color:'#F1C40F',ts:Date.now()});
              if(!S.rpg._questFlags) S.rpg._questFlags = {};
              S.rpg._questFlags.endgameUnlocked = true;
            }
            BT_AUDIO.levelUp();
            S.screenShake = 10;
            setRpgState({...S.rpg});
            try{localStorage.setItem('bt_rpg',JSON.stringify(S.rpg));}catch(e){}
            /* Return to zone at NEXT depth after 3 seconds */
            setTimeout(()=>{
              const st = stateRef.current;
              st._inDungeon = false;
              const zn = ZONES[st._dungeonZone];
              st._currentDepth = nextDepth;
              /* Generate fresh zone at the new deeper depth */
              st.map = generateZoneMap(st._dungeonZone);
              const dc = DEPTH_CONFIG[nextDepth];
              TOWN_W = zn.w*TILE; TOWN_H = zn.h*TILE; COLS = zn.w; ROWS = zn.h;
              st.monsters = spawnMonstersForZone(zn, dc?.levelMod||0);
              st.gatherNodes = spawnGatherNodes(st._dungeonZone, nextDepth);
              st.groundLoot = []; st.hitParticles = []; st.deathExplosions = []; st.arrows = [];
              st._ambientParticles = [];
              /* Spawn player at center of new depth zone */
              st.player.x = (zn.w/2)*TILE; st.player.y = (zn.h-3)*TILE;
              st._zoneWipe = Date.now();
              const lvlRange = dc.lvlRange || [1,10];
              st.dmgNumbers.push({x:st.player.x,y:st.player.y-40,text:zn.name+' — '+nextDepth.toUpperCase(),color:ELEMENTS[zn.element]?.color||'#fff',ts:Date.now()});
              st.dmgNumbers.push({x:st.player.x,y:st.player.y-25,text:'Lv '+lvlRange[0]+'-'+lvlRange[1],color:'rgba(255,255,255,.5)',ts:Date.now()});
            }, 3000);
          } else if(S._dungeonWave < S._dungeonMaxWaves){
            /* Spawn next wave */
            const zone = ZONES[S._dungeonZone];
            const nextDepth = {shallow:'mid',mid:'deep',deep:'abyss',abyss:'core'}[S._dungeonDepth];
            const dc = DEPTH_CONFIG[nextDepth];
            const waveLvl = zone.level[0] + dc.levelMod + S._dungeonWave*2;
            const dW = S.map[0].length, dH = S.map.length;
            const waveArchs = ['fodder','swarm','brute','sentinel','volatile','hexer','stalker'];
            const waveSize = 4 + S._dungeonWave + Math.floor(Math.random()*2);
            for(let wi=0;wi<waveSize;wi++){
              const arch = waveArchs[Math.floor(Math.random()*waveArchs.length)];
              const mx = (3+Math.random()*(dW-6))*TILE;
              const my = (2+Math.random()*(dH/2-2))*TILE;
              const m = createMonster('dw-'+S._dungeonWave+'-'+wi, arch, waveLvl, mx, my, zone.element);
              m.curHp = m.hp; m.type = arch;
              S.monsters.push(m);
            }
            S.dmgNumbers.push({x:P.x,y:P.y-40,text:'⚔️ Wave '+(S._dungeonWave+1)+'/'+S._dungeonMaxWaves,color:'#ff5e6c',ts:Date.now()});
            BT_AUDIO.beep(300,0.1,0.15,'sawtooth');
            S.screenShake = 4;
          }
        }
      }

      /* Check building proximity (town only) */
      const pTileX = Math.floor(P.x / TILE);
      const pTileY = Math.floor(P.y / TILE);
      let nearBldg = null;
      if(S.currentZone === 'town') {
      for(let i=0;i<BUILDINGS.length;i++){
        const b = BUILDINGS[i];
        /* Check if player is within 2 tiles of building edge */
        if(pTileX >= b.bx-2 && pTileX <= b.bx+b.bw+1 && pTileY >= b.by-2 && pTileY <= b.by+b.bh+1){
          nearBldg = i;
          break;
        }
      }
      S.nearBuilding = nearBldg;
      } else { S.nearBuilding = null; }

      /* ═══ PERSONAL FARM — house proximity sleep prompt ═══ */
      if(S.currentZone === 'farm_home' && ZONES.farm_home._house){
        const hb = ZONES.farm_home._house;
        const inHouse = P.x >= hb.x - TILE && P.x <= hb.x + hb.w + TILE &&
                        P.y >= hb.y - TILE && P.y <= hb.y + hb.h + TILE;
        S._nearHouse = inHouse;
      } else {
        S._nearHouse = false;
      }

      /* Detect nearest gatherable node */
      S._nearNode = null;
      if(S.gatherNodes){
        let closest = 60; /* max interaction range */
        S.gatherNodes.forEach(n => {
          if(!n.alive || (n.respawnAt && Date.now() < n.respawnAt)) return;
          const nd = Math.sqrt((n.x-P.x)**2+(n.y-P.y)**2);
          if(nd < closest){ closest = nd; S._nearNode = n; }
        });
      }

      /* Trail — record position every few frames */
      if(!S._trailTimer) S._trailTimer = 0;
      S._trailTimer++;
      if(S._trailTimer % 3 === 0 && (Math.abs(dx)>0.01||Math.abs(dy)>0.01)){
        S.trail.push({x:P.x, y:P.y, ts:now});
        if(S.trail.length > 20) S.trail.shift();
      }
      /* Expire old trail points */
      while(S.trail.length > 0 && now - S.trail[0].ts > 800) S.trail.shift();

      /* §5.5 Expire death drops globally */
      if(S._deathDrops && S._deathDrops.length > 0){
        S._deathDrops = S._deathDrops.filter(d => Date.now() < d.expiry);
      }

      /* Collectible pickup removed */

      /* §18.1 PET FOLLOW + AUTO-LOOT — active pet follows player and vacuums loot */
      if(S.rpg?.lifeSkills?.activePet !== null && S.rpg?.lifeSkills?.activePet !== undefined){
        const pets = S.rpg.lifeSkills.pets || [];
        const petIdx = S.rpg.lifeSkills.activePet;
        const pet = pets[petIdx];
        if(pet){
          /* Initialize pet position */
          if(!S._petX) { S._petX = P.x - 30; S._petY = P.y + 20; }
          /* Follow player — orbit slightly behind */
          const petDistToP = Math.sqrt((S._petX-P.x)**2+(S._petY-P.y)**2);
          const petTargetDist = 35;
          if(petDistToP > petTargetDist + 15){
            const pDx = P.x - S._petX, pDy = P.y - S._petY;
            const pDist = Math.sqrt(pDx*pDx+pDy*pDy)||1;
            S._petX += (pDx/pDist) * 2.0;
            S._petY += (pDy/pDist) * 2.0;
          } else if(petDistToP < petTargetDist - 10){
            /* Too close — drift outward */
            const bx = S._petX-P.x, by = S._petY-P.y;
            const bd = Math.sqrt(bx*bx+by*by)||1;
            S._petX += (bx/bd)*0.5;
            S._petY += (by/bd)*0.5;
          }
          /* Personality idle movement */
          if(pet.personality === 'playful') { S._petX += Math.sin(now/300)*0.3; S._petY += Math.cos(now/400)*0.2; }
          if(pet.personality === 'curious') { S._petX += Math.sin(now/500+1)*0.5; }
          if(pet.personality === 'anxious') { S._petX += (Math.random()-0.5)*0.4; S._petY += (Math.random()-0.5)*0.4; }

          /* AUTO-LOOT — pet collects nearby ground loot */
          if(S.groundLoot){
            S.groundLoot = S.groundLoot.filter(loot => {
              const ld = Math.sqrt((S._petX-loot.x)**2+(S._petY-loot.y)**2);
              if(ld < PET_LOOT_RADIUS && Date.now() > (loot.ts||0) + 500){
                /* Pet picks up the loot! */
                if(loot.isWeapon && loot.weapon){
                  /* Weapon drop — equip if better, stash otherwise */
                  const drop = loot.weapon;
                  const wpnDef = WEAPON_TYPES[drop.type];
                  const isRanged = wpnDef?.type === 'ranged';
                  const current = isRanged ? S.rpg.rangedWeapon : S.rpg.weapon;
                  const dropPower = drop.tierMult * (WEAPON_TYPES[drop.type]?.base||30);
                  const curPower = (current?.tierMult||1) * (WEAPON_TYPES[current?.type||'greatsword']?.base||30);
                  if(dropPower >= curPower){
                    if(current && current.name){
                      if(!S.rpg.weaponStash) S.rpg.weaponStash = [];
                      if(S.rpg.weaponStash.length < WEAPON_STASH_MAX) S.rpg.weaponStash.push({...current});
                    }
                    if(isRanged) S.rpg.rangedWeapon = drop; else S.rpg.weapon = drop;
                    S.dmgNumbers.push({x:S._petX,y:S._petY-15,text:pet.emoji+' → 🗡️'+drop.name,color:loot.tierColor||'#fff',ts:Date.now()});
                  } else {
                    if(!S.rpg.weaponStash) S.rpg.weaponStash = [];
                    if(S.rpg.weaponStash.length < WEAPON_STASH_MAX){
                      S.rpg.weaponStash.push(drop);
                      S.dmgNumbers.push({x:S._petX,y:S._petY-15,text:pet.emoji+' → 📦'+drop.name,color:'#8890b8',ts:Date.now()});
                    } else {
                      S.rpg.coins += Math.ceil(dropPower*0.5);
                      S.dmgNumbers.push({x:S._petX,y:S._petY-15,text:pet.emoji+' → sold',color:'#f5c542',ts:Date.now()});
                    }
                  }
                } else {
                  S.rpg.coins += loot.coins||0;
                  S.dmgNumbers.push({x:S._petX,y:S._petY-15,text:pet.emoji+' +'+(loot.coins||0)+'G',color:'#f5c542',ts:Date.now()});
                }
                BT_AUDIO.beep(600,0.03,0.04,'sine');
                if(!S.rpg._questFlags) S.rpg._questFlags = {};
                S.rpg._questFlags.petLootCount = (S.rpg._questFlags.petLootCount||0) + 1;
                setRpgState({...S.rpg});
                return false; /* remove loot */
              }
              return true;
            });
          }

          /* ═══ PET COMBAT — pet auto-attacks nearest enemy ═══ */
          if(S.monsters && !S._petAtkCd || Date.now() > (S._petAtkCd||0)){
            /* Find nearest alive monster to pet */
            let nearestM = null, nearestD = 80; /* 80px aggro range */
            S.monsters.forEach(m => {
              if(!m.alive) return;
              const d = Math.sqrt((S._petX-m.x)**2+(S._petY-m.y)**2);
              if(d < nearestD){ nearestD = d; nearestM = m; }
            });
            if(nearestM && nearestD < 40){ /* attack at 40px range */
              /* Pet deals 15% of player weapon damage, scales with pet level */
              const petLvl = pet.level || 1;
              const pDmgBase = S.rpg ? calcWeaponDmg(activeWpn?.type||'greatsword', S.rpg.power||0, activeWpn?.tierMult||1) : 5;
              const petDmg = Math.max(1, Math.ceil(pDmgBase * 0.15 * (1 + petLvl*0.02)));
              nearestM.curHp -= petDmg;
              S._petAtkCd = Date.now() + 1500; /* pet attacks every 1.5s */
              /* Visual feedback — small damage number from pet */
              S.dmgNumbers.push({x:nearestM.x,y:nearestM.y-10,text:pet.emoji+' -'+petDmg,color:pet.color||'#3dd497',ts:Date.now()});
              /* Pet attack particles */
              for(let pp=0;pp<3;pp++){
                S.hitParticles.push({x:nearestM.x+(Math.random()-0.5)*8,y:nearestM.y+(Math.random()-0.5)*8,
                  vx:(Math.random()-0.5)*2,vy:-1-Math.random(),life:0.3,color:pet.color||'#3dd497',size:1.5});
              }
              /* Pet moves toward target when attacking */
              const paDx = nearestM.x-S._petX, paDy = nearestM.y-S._petY;
              const paDist = Math.sqrt(paDx*paDx+paDy*paDy)||1;
              S._petX += (paDx/paDist)*3;
              S._petY += (paDy/paDist)*3;
            }
          }
        }
      }

      /* Update NPCs — §19.1 companion follow + quest interaction + wander */
      if(S.npcs){
        S.npcs.forEach(npc => {
          if(!npc.alive){
            if(Date.now() > npc.respawnAt){
              npc.alive = true; npc.hp = npc.maxHp;
              npc.x = npc.spawnX; npc.y = npc.spawnY;
            }
            return;
          }

          /* §19.1 Companion follow — NPC follows player if they have an active quest */
          const npcQuest = getNpcQuest(S.rpg, npc.name);
          const isActiveCompanion = npcQuest && npcQuest.status === 'active' &&
            npc.canFollow && npc.followZones?.includes(S.currentZone);
          const distToPlayer = Math.sqrt((npc.x-P.x)**2+(npc.y-P.y)**2);

          if(isActiveCompanion){
            /* Follow the player — stay 40-60px behind */
            if(distToPlayer > 60){
              const fDx = P.x - npc.x, fDy = P.y - npc.y;
              const fDist = Math.sqrt(fDx*fDx+fDy*fDy);
              npc.x += (fDx/fDist)*1.5;
              npc.y += (fDy/fDist)*1.5;
              if(Math.abs(fDx)>Math.abs(fDy)) npc._facing = fDx>0?'right':'left';
              else npc._facing = fDy>0?'down':'up';
            } else if(distToPlayer < 30){
              /* Too close — back off slightly */
              const bDx = npc.x-P.x, bDy = npc.y-P.y;
              const bDist = Math.sqrt(bDx*bDx+bDy*bDy)||1;
              npc.x += (bDx/bDist)*0.5;
              npc.y += (bDy/bDist)*0.5;
            }
            /* Quest-relevant chat — comment on progress */
            npc.chatTimer -= 16.7;
            if(npc.chatTimer <= 0){
              const quest = npcQuest.quest;
              const isComplete = quest.check(S.rpg, S);
              const phrase = isComplete ? quest.dialogue.complete : quest.dialogue.progress;
              npc.chatBubble = {text: phrase, ts: Date.now(), isQuest: true};
              BT_AUDIO.npcChat();
              npc.chatTimer = 12000 + Math.random()*8000;
            }
          } else {
            /* Normal wander behavior */
            npc.moveTimer -= 16.7;
            const distToTarget = Math.sqrt((npc.x-npc.targetX)**2+(npc.y-npc.targetY)**2);
            if(distToTarget < 4 || npc.moveTimer <= 0){
              const angle = Math.random()*Math.PI*2;
              const dist = Math.random()*npc.pathRadius;
              npc.targetX = npc.spawnX + Math.cos(angle)*dist;
              npc.targetY = npc.spawnY + Math.sin(angle)*dist;
              npc.targetX = Math.max(TILE*2, Math.min(TOWN_W-TILE*2, npc.targetX));
              npc.targetY = Math.max(TILE*2, Math.min(TOWN_H-TILE*2, npc.targetY));
              npc.moveTimer = 2000 + Math.random()*4000;
            }
            const nDx = npc.targetX - npc.x, nDy = npc.targetY - npc.y;
            const nDist = Math.sqrt(nDx*nDx+nDy*nDy);
            if(nDist > 2){
              npc.x += (nDx/nDist)*0.8; npc.y += (nDy/nDist)*0.8;
              if(Math.abs(nDx)>Math.abs(nDy)) npc._facing = nDx>0?'right':'left';
              else npc._facing = nDy>0?'down':'up';
            }
            /* Random chat */
            npc.chatTimer -= 16.7;
            if(npc.chatTimer <= 0){
              /* If NPC has available quest, hint at it */
              if(npcQuest && npcQuest.status === 'available' && distToPlayer < 100){
                npc.chatBubble = {text: '❗ I have a task for you! Tap me.', ts: Date.now(), isQuest: true};
              } else {
                npc.chatBubble = {text: npc.phrases[Math.floor(Math.random()*npc.phrases.length)], ts: Date.now()};
              }
              BT_AUDIO.npcChat();
              npc.chatTimer = 8000 + Math.random()*15000;
            }
          }
          npc.renderX += (npc.x - npc.renderX) * 0.12;
          npc.renderY += (npc.y - npc.renderY) * 0.12;
          if(npc.chatBubble && Date.now() - npc.chatBubble.ts > 5000) npc.chatBubble = null;

          /* Quest marker above NPC head — ! for available, ? for turn-in ready */
          npc._questMarker = null;
          if(npcQuest){
            if(npcQuest.status === 'available') npc._questMarker = '❗';
            else if(npcQuest.status === 'active' && npcQuest.quest.check(S.rpg, S)) npc._questMarker = '❓';
          }
        });
      }

      /* ═══ MONSTER AI + COMBAT ═══ */
      if(S.monsters && S.rpg){
        const R = S.rpg;
        /* §2.6 Tag player with Influence for status duration scaling */
        S.player._rpgInfluence = R.influence || 0;
        /* §4.4 Weapon Damage — uses new stat system */
        const activeWpn = getActiveWeapon(R);
        const wpnType = WEAPON_TYPES[activeWpn.type] || WEAPON_TYPES.greatsword;
        let pDmg = calcWeaponDmg(activeWpn.type, R.power, activeWpn.tierMult);
        /* §4 Amulet bonus — elemental damage boost */
        if(R._amuletBonus?.stat === 'elemDmg' && activeWpn.element1) pDmg *= (1 + R._amuletBonus.value / 100);
        /* §18.1 Food buff — damage multiplier */
        if(S._dmgBuff && Date.now() < S._dmgBuff) pDmg *= 1.20;
        /* Hexer curse debuff — reduces damage by 30% */
        if(S._cursedUntil && Date.now() < S._cursedUntil) pDmg *= 0.7;
        /* Swarm bleed tick — damage over time */
        if(S._bleedUntil && Date.now() < S._bleedUntil){
          if(!S._lastBleedTick || Date.now()-S._lastBleedTick > 500){
            S._lastBleedTick = Date.now();
            const bleedDmg = S._bleedDps || 1;
            R.hp = Math.max(1, R.hp - bleedDmg);
            S.dmgNumbers.push({x:P.x+8,y:P.y-15,text:'-'+bleedDmg,color:'#cc3333',ts:Date.now()});
          }
        }
        /* §2.1 Crit from Ferocity */
        const critChance = calcCritChance(R.ferocity);
        let critMult = calcCritMult(R.ferocity);
        if(R._amuletBonus?.stat === 'critDmg') critMult += R._amuletBonus.value / 100;
        const invuln = Date.now() < S.respawnTimer;

        S.monsters.forEach(m=>{
          if(!m.alive){
            if(Date.now() > m.respawnAt){
              m.alive = true; m.curHp = m.hp;
              m.statuses = {}; /* clear statuses on respawn */
              m.x = m.spawnX + (Math.random()-0.5)*60;
              m.y = m.spawnY + (Math.random()-0.5)*60;
            }
            return;
          }

          /* §9 — Tick statuses (DoT damage, expiry) */
          const expired = tickStatuses(m, 16.7/1000, Date.now(), R);

          /* ═══ ELEMENT STATUS OVERLAY — ambient particles on statused monsters ═══ */
          if(m.statuses && m.alive){
            Object.entries(m.statuses).forEach(([sid, st]) => {
              if(!st || !st.element) return;
              const fx = spawnElementStatusFX(m.x, m.y, st.element, Math.random());
              if(fx) S.hitParticles.push(fx);
            });
          }
          if(m._lastDotDmg && Date.now() - m._lastDotDmg.ts < 100){
            const dot = m._lastDotDmg;
            const dotElem = Object.keys(ELEMENTS).find(e => ELEMENTS[e].status === dot.statusId);
            const dotColor = dotElem ? ELEMENTS[dotElem].color : '#ff5e6c';
            S.dmgNumbers.push({x:m.x+(Math.random()-0.5)*10,y:m.y-22,text:dot.amount+'',color:dotColor,ts:Date.now()});
            m._lastDotDmg = null;
          }
          /* Check if DoT killed */
          if(m.curHp <= 0 && m.alive){
            m.alive = false; m.respawnAt = Date.now() + 30000;
            m.statuses = {};
            /* Quest kill tracking */
            if(R._questKills === undefined) R._questKills = {};
            Object.keys(QUEST_CHAINS).forEach(qid => {
              if(R._quests?.[qid] === QUEST_STATUS.active) R._questKills[qid] = (R._questKills[qid]||0) + 1;
            });
            /* Death feedback */
            S.dmgNumbers.push({x:m.x,y:m.y-30,text:'☠️',color:'#ff5e6c',ts:Date.now()});
            S.groundLoot.push({x:m.x,y:m.y,coins:m.gold||2,xp:0,skull:m.type,skullEmoji:'🦴',ts:Date.now()});
            S.screenShake = 3;
            /* Death particles */
            for(let dp=0;dp<12;dp++){
              S.hitParticles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,
                life:1,color:m.color,size:1.5+Math.random()*2});
            }
            BT_AUDIO.deathBoom();
            setRpgState({...R});
          }

          /* Skip if stunned */
          if(m._stunUntil && Date.now() < m._stunUntil) return;

          /* Status-based movement modifiers */
          let moveMult = 1.0;
          if(m.statuses.freeze) moveMult = 0; /* frozen = can't move */
          if(m.statuses.root) moveMult = 0;   /* rooted = can't move */
